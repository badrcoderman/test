<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GLM-008 SVGGeometryElement API lifetime</title>
</head>
<body>
<pre id="log">POC STARTED: GLM-008 SVGGeometryElement APIs
</pre>
<script>
if (window.testRunner) {
    testRunner.dumpAsText();
    testRunner.waitUntilDone();
}
function log(m) {
    document.getElementById("log").textContent += m + "\n";
}
function finish() {
    log("NO CRASH OBSERVED");
    log("DONE");
    if (window.testRunner)
        testRunner.notifyDone();
}
function safe(label, fn) {
    try {
        return fn();
    } catch (e) {
        log("ACTION: " + label + " threw " + e.name + ": " + e.message);
        return null;
    }
}
function makePoint(x, y) {
    if (window.DOMPoint)
        return new DOMPoint(x, y);
    if (window.SVGPoint) {
        let svg = document.querySelector("svg");
        let p = svg.createSVGPoint();
        p.x = x;
        p.y = y;
        return p;
    }
    return { x: x, y: y };
}
function mutate(svg, path, i) {
    log("PHASE: synchronous style/layout mutation " + i);
    safe("path data mutated", function() {
        path.setAttribute("d", i & 1
            ? "M0 0 L80 10 L10 80 Z"
            : "M5 5 C20 80 80 20 95 95");
        log("ACTION: path data mutated");
    });
    safe("SVGGeometryElement removal attempted", function() {
        path.remove();
        log("ACTION: SVGGeometryElement removal attempted");
    });
    safe("SVGGeometryElement reinsert attempted", function() {
        svg.appendChild(path);
        log("ACTION: SVGGeometryElement reinsert attempted");
    });
    safe("layout forced", function() {
        document.body.offsetTop;
        path.getBoundingClientRect();
        getComputedStyle(path).fill;
        log("ACTION: layout forced");
    });
}
function callGeometryAPIs(path) {
    safe("getTotalLength", function() {
        log("ACTION: getTotalLength -> " + path.getTotalLength());
    });
    safe("getPointAtLength", function() {
        let p = path.getPointAtLength(1);
        log("ACTION: getPointAtLength -> " + p.x + "," + p.y);
    });
    safe("isPointInFill", function() {
        if (!path.isPointInFill) {
            log("ACTION: isPointInFill unavailable");
            return;
        }
        log("ACTION: isPointInFill -> " + path.isPointInFill(makePoint(1, 1)));
    });
    safe("isPointInStroke", function() {
        if (!path.isPointInStroke) {
            log("ACTION: isPointInStroke unavailable");
            return;
        }
        log("ACTION: isPointInStroke -> " + path.isPointInStroke(makePoint(1, 1)));
    });
}
function run() {
    log("PHASE: setup SVG");
    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "120");
    svg.setAttribute("height", "120");
    let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", "M0 0 L100 0 L50 100 Z");
    path.setAttribute("fill", "red");
    path.setAttribute("stroke", "blue");
    svg.appendChild(path);
    document.body.appendChild(svg);
    for (let i = 0; i < 8; ++i) {
        log("PHASE: SVGGeometryElement API iteration " + i);
        mutate(svg, path, i);
        log("PHASE: call SVGGeometryElement APIs " + i);
        callGeometryAPIs(path);
    }
    safe("cleanup removed svg", function() {
        svg.remove();
        log("ACTION: cleanup removed svg");
    });
    finish();
}
try {
    run();
} catch (e) {
    log("TOP LEVEL ERROR: " + e.name + ": " + e.message);
    finish();
}
</script>
</body>
</html>
