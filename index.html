<body style="margin:0; padding:20px; font-family:monospace; background:black; color:white;">
    <div id="log" style="position:fixed; top:0; left:0; width:100%; height:100%; padding:20px; overflow:auto; white-space:pre-wrap;"></div>

<script>
    function log(m, color) {
        let el = document.createElement('div');
        el.innerHTML = "[LOG]: " + m;
        document.getElementById('log').appendChild(el);
        if (color) document.body.style.background = color;
    }

    // الاعتراض على أي خطأ يسبب Crash
    window.onerror = function(msg, url, line) {
        log("CRASH DETECTED: " + msg + " at line " + line, "#800");
    };

    log("1. بدء العمليات...", "green");

    try {
        // ... (كود الـ FontFace Trigger الخاص بك)
        log("2. جاري تنفيذ الـ Trigger...", "yellow");
        
        // هنا تضع الـ Spray الخاص بك
        log("3. جاري الـ Heap Spray...", "orange");

    } catch(e) {
        log("ERROR: " + e.message, "red");
    }
</script>
</body>
