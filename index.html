<!DOCTYPE html>
<html>
<head>
    <title>JSC JIT Structure Transition Blueprint</title>
</head>
<body>
    <h3 id="status">Testing Structure Transitions...</h3>
    <div id="log"></div>

    <script>
        function logger(msg) {
            document.getElementById("log").innerHTML += msg + "<br>";
        }

        // دالة تحاكي التعامل مع الأوفست (ByOffset)
        function getPropertyByOffset(obj) {
            return obj.p3;
        }

        window.onload = function() {
            logger("Step 1: Creating a specific Structure Transition Chain...");

            // بناء سلسلة تحولات (Transitions) متطابقة تجعل الـ JIT يحفظ التصميم (Layout)
            let arr = [];
            for (let i = 0; i < 100; i++) {
                let o = {};
                o.p1 = 1.1;
                o.p2 = 2.2;
                o.p3 = i + 0.3; // تعبئة أرقام عشرية ثابتة
                arr.push(o);
            }

            logger("Step 2: Warming up the compiler on the Transition Chain...");
            // إحماء الدالة لتبدأ مرحلة الـ Speculation على الأوفست الخاص بـ p3
            for (let i = 0; i < 40000; i++) {
                getPropertyByOffset(arr[i % 100]);
            }

            logger("Step 3: Simulating Type Break on the specific Layout...");
            // إنشاء كائن يكسر التصميم المفترض عن طريق تغيير نوع الخاصية p3 إلى كائن بدلاً من رقم
            let corruptedObj = {};
            corruptedObj.p1 = 1.1;
            corruptedObj.p2 = 2.2;
            corruptedObj.p3 = { target: "Badr" }; // كسر النوع هنا

            let finalResult = getPropertyByOffset(corruptedObj);
            logger("Final Result Type: " + typeof finalResult);
            
            if (typeof finalResult === "object") {
                logger("Successfully read object through transition check: " + finalResult.target);
            }

            document.getElementById("status").innerHTML = "Structure Transition Test Complete.";
        };
    </script>
</body>
</html>
