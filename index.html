<html>
<head>
<title>Hook</title>
</head>
<body>
    
<script>
    function probeInterface(ifaceName) {
        let obj = window[ifaceName];
        let methods = [];
        
        // استخراج جميع الدوال المتاحة داخل الواجهة
        for (let prop in obj) {
            if (typeof obj[prop] === 'function') {
                methods.push(prop);
            }
        }
        
        // إظهار النتائج عبر التنبيه
        alert("Interface: " + ifaceName + " | Methods: " + methods.join(', '));
    }

    probeInterface('SceShell');
    probeInterface('SceDownload');
</script>



</body>
</html>
