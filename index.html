<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Advanced WebKit Layout & Rendering Benchmark</title>
<style id="s">
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #09090b; color: #fafafa;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  overflow-y: auto;
}
#wrapper {
  max-width: 950px; margin: 40px auto; padding: 20px;
}
#dashboard {
  background: #18181b; border: 1px solid #27272a;
  border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#title {
  font-size: 28px; font-weight: bold; color: #10b981; margin-bottom: 8px;
}
#meta-env { font-size: 14px; color: #71717a; margin-bottom: 20px; }
#status-box {
  background: #27272a; padding: 16px; border-radius: 8px;
  font-size: 16px; line-height: 1.5; white-space: pre-line; margin-bottom: 24px;
}
.report-section { margin-top: 24px; display: none; }
.report-title { font-size: 20px; color: #3b82f6; margin-bottom: 12px; font-weight: bold; }
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th, td { padding: 10px; border: 1px solid #3f3f46; text-align: left; font-size: 13px; }
th { background: #27272a; color: #a1a1aa; }
.fps-indicator { color: #f59e0b; font-weight: bold; }
#c { position: absolute; left: -9999px; top: -9999px; }
</style>
</head>
<body>

<div id="wrapper">
  <div id="dashboard">
    <div id="title">ENGINE LAYOUT BENCHMARK Pro</div>
    <div id="meta-env">Detecting Environment...</div>
    
    <div id="status-box">Ready to initialize advanced benchmark sequence...</div>
    
    <div id="report" class="report-section">
      <div class="report-title">📊 Final Performance Statistics</div>
      <table id="metrics-table">
        <thead>
          <tr>
            <th>Engine Type</th>
            <th>Test Profile</th>
            <th>Mean Time</th>
            <th>Median Time</th>
            <th>Min Time</th>
            <th>Max Time</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      
      <div class="report-title" style="margin-top:20px;">🧠 System Telemetry Summary</div>
      <table id="telemetry-table">
        <thead>
          <tr>
            <th>Metric Group</th>
            <th>Recorded Value</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<canvas id="c" width="512" height="128"></canvas>

<script>
"use strict";

// إعدادات البيئة والاختبارات المتعددة
const RUNS = 1000;
const WARM_UP_RUNS = 100;
const SAMPLE_TEXTS = [
  "The quick brown fox jumps over the lazy dog",
  "مرحبا بالعالم العربي 123",
  "A"
];
const FONT_SIZES = [16, 32, 64];

let fpsFrameCount = 0;
let lastFpsUpdate = performance.now();
let averageFps = 60;

// حساب الـ FPS الفعلي أثناء التشغيل لضمان رصد أي جودة رسومية تعاني من البطء
function monitorFPS() {
  fpsFrameCount++;
  const now = performance.now();
  if (now - lastFpsUpdate >= 500) {
    averageFps = Math.round((fpsFrameCount * 1000) / (now - lastFpsUpdate));
    fpsFrameCount = 0;
    lastFpsUpdate = now;
  }
  requestAnimationFrame(monitorFPS);
}
requestAnimationFrame(monitorFPS);

function detectEnvironment() {
  const ua = navigator.userAgent || "";
  let env = "Standard Desktop Browser";
  let m = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  if (m && m[1]) env = "PlayStation 5 (Firmware: " + m[1] + ")";
  else if (/iPhone|iPad|iPod/i.test(ua)) env = "iOS Device WebKit";
  
  document.getElementById("meta-env").textContent = `Platform: ${env} | Agent: ${navigator.vendor || "Unknown Vendor"}`;
  return env;
}

function updateStatus(text) {
  document.getElementById("status-box").textContent = text;
}

// دالة حساب الإحصائيات الرياضية الصارمة (Mean, Median, Min, Max)
function calculateStats(latencies) {
  latencies.sort((a, b) => a - b);
  const sum = latencies.reduce((a, b) => a + b, 0);
  const mean = sum / latencies.length;
  
  let median;
  const mid = Math.floor(latencies.length / 2);
  if (latencies.length % 2 !== 0) {
    median = latencies[mid];
  } else {
    median = (latencies[mid - 1] + latencies[mid]) / 2;
  }
  
  return {
    mean: mean.toFixed(5),
    median: median.toFixed(5),
    min: latencies[0].toFixed(5),
    max: latencies[latencies.length - 1].toFixed(5)
  };
}

function runBenchmark() {
  const ctx = document.getElementById("c").getContext("2d");
  const tableBody = document.querySelector("#metrics-table tbody");
  const telemetryBody = document.querySelector("#telemetry-table tbody");
  
  let initialMemory = performance.memory ? performance.memory.usedJSHeapSize : null;
  
  // تكرار الفحص على مصفوفة النصوص والأحجام المطلوبة
  SAMPLE_TEXTS.forEach(text => {
    FONT_SIZES.forEach(size => {
      const fontSpec = `${size}px Arial`;
      
      // ==========================================
      // 1. BENCHMARK: CANVAS ENGINE
      // ==========================================
      ctx.font = fontSpec;
      
      // مرحلة الـ Warm-Up لمحرك الـ Canvas
      for (let i = 0; i < WARM_UP_RUNS; i++) {
        ctx.measureText(text);
      }
      
      // القياس الحقيقي المتكرر
      let canvasLatencies = [];
      for (let i = 0; i < RUNS; i++) {
        let t0 = performance.now();
        ctx.measureText(text);
        let t1 = performance.now();
        canvasLatencies.push(t1 - t0);
      }
      const canvasStats = calculateStats(canvasLatencies);
      appendTableRow(tableBody, "Canvas 2D", `Text: "${text.substring(0,15)}..." | Size: ${size}px`, canvasStats);

      // ==========================================
      // 2. BENCHMARK: DOM LAYOUT ENGINE
      // ==========================================
      const div = document.createElement("div");
      div.textContent = text;
      div.style.cssText = `position:absolute;left:-10000px;top:0;font:${fontSpec};`;
      document.body.appendChild(div);
      
      // مرحلة الـ Warm-Up لمحرك الـ DOM
      for (let i = 0; i < WARM_UP_RUNS; i++) {
        void div.offsetWidth;
      }
      
      let domLatencies = [];
      for (let i = 0; i < RUNS; i++) {
        let t0 = performance.now();
        void div.offsetWidth; // إجبار المحرك على حساب الـ Layout المتزامن
        let t1 = performance.now();
        domLatencies.push(t1 - t0);
      }
      document.body.removeChild(div);
      
      const domStats = calculateStats(domLatencies);
      appendTableRow(tableBody, "DOM Layout", `Text: "${text.substring(0,15)}..." | Size: ${size}px`, domStats);
    });
  });

  // جمع معلومات الذاكرة بعد الضغط وقياس التخزين
  let finalMemory = performance.memory ? performance.memory.usedJSHeapSize : null;
  
  appendTelemetryRow(telemetryBody, "Execution Fluidity (Average FPS)", `<span class="fps-indicator">${averageFps} FPS</span>`);
  if (initialMemory && finalMemory) {
    let deltaMB = ((finalMemory - initialMemory) / (1024 * 1024)).toFixed(3);
    appendTelemetryRow(telemetryBody, "JS Heap Delta (Memory Delta)", `${deltaMB} MB Generated`);
    appendTelemetryRow(telemetryBody, "Peak Allocated Heap Size", `${(finalMemory / (1024 * 1024)).toFixed(2)} MB`);
  } else {
    appendTelemetryRow(telemetryBody, "JS Heap Telemetry", "Not supported by this browser environment");
  }
  
  document.getElementById("report").style.display = "block";
  updateStatus("All batch cycles completed successfully. Metrics compiled below.");
}

function appendTableRow(tbody, engine, profile, stats) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><strong>${engine}</strong></td>
    <td>${profile}</td>
    <td>${stats.mean} ms</td>
    <td>${stats.median} ms</td>
    <td>${stats.min} ms</td>
    <td>${stats.max} ms</td>
  `;
  tbody.appendChild(tr);
}

function appendTelemetryRow(tbody, key, val) {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${key}</td><td><strong>${val}</strong></td>`;
  tbody.appendChild(tr);
}

window.onload = () => {
  const env = detectEnvironment();
  updateStatus("Initiating execution loop layers...\nPerforming pre-heat structural sync.");
  
  // تأخير بسيط لبدء المعايرة لضمان استقرار معدل الإطارات الأولية
  setTimeout(() => {
    updateStatus("Benchmark executing 1,000 iterations per node pool. Please wait...");
    // إدخال دورة تنفيذ خفيفة في الخلفية لعدم تجميد الشاشة بالكامل أثناء العمليات الحسابية
    setTimeout(() => {
      runBenchmark();
    }, 50);
  }, 1000);
};
</script>
</body>
</html>
