<!DOCTYPE html>
<html>
<head>
    <title>JSC GC Heap Pressure Exploration</title>
</head>
<body>
    <h3 id="status">Testing GC Heap Pressure...</h3>
    <div id="log"></div>

    <script>
        function logger(msg) {
            document.getElementById("log").innerHTML += msg + "<br>";
        }

        window.onload = function() {
            logger("Step 1: Preparing Heavy Butterfly Discarding Loop...");
            
            let start = performance.now();
            let lastCheck = start;

            // حلقة ضخمة تقوم بإنشاء وتدمير مصفوفات بشكل متسارع جداً 
            // لخلق ضغط عالي على الـ MarkedSpace (Heap Pressure)
            for (let i = 0; i < 60000; i++) {
                // إنشاء مصفوفة ونقلها فوراً ليتم هجر العنوان القديم
                let discardableArray = [1.1, 2.2, 3.3];
                discardableArray[1000] = i + 0.5; 
                
                // تفريغ المؤشر ليصبح جاهزاً للـ GC
                discardableArray = null;

                // رصد الوقت كل 15000 تكرار لمعرفة هل يحدث تباطؤ مفاجئ (GC Pause)
                if (i % 15000 === 0 && i > 0) {
                    let now = performance.now();
                    logger("Checkpoint at " + i + ": " + (now - lastCheck).toFixed(2) + " ms");
                    lastCheck = now;
                }
            }

            let end = performance.now();
            logger("GC Pressure Test Finished Total Time: " + (end - start).toFixed(2) + " ms");
            document.getElementById("status").innerHTML = "GC Exploration Complete.";
        };
    </script>
</body>
</html>
