<!DOCTYPE html>
<html>
<head>
    <title>JSC Dynamic Butterfly Boundary Exploration</title>
</head>
<body>
    <h3 id="status">Testing Butterfly Resizing Boundaries...</h3>
    <div id="log"></div>

    <script>
        function logger(msg) {
            document.getElementById("log").innerHTML += msg + "<br>";
        }

        // دالة تجبر المحرك على توسيع المصفوفة ديناميكياً بناءً على مؤشر متغير
        function resizeButterfly(arr, index, value) {
            arr[index] = value;
        }

        window.onload = function() {
            logger("Step 1: Initializing Baseline Arrays...");
            
            let start = performance.now();
            
            // حلقة تقوم بإنشاء مصفوفات وتوسيع حجمها بشكل مفاجئ وغير متوقع للـ JIT
            // لمعرفة كيف يتم إدارة الـ Memory Allocation داخلياً
            for (let i = 0; i < 20000; i++) {
                let testArray = [1.1, 2.2, 3.3]; // مصفوفة صغيرة ثابتة
                
                // دفع الـ JIT لتوسيع الـ Butterfly بشكل مفاجئ بمقدار أوفست كبير
                // هذا يجبر المحرك على نقل عناصر الـ Butterfly في الذاكرة
                resizeButterfly(testArray, i % 50 ? 4 : 500, i + 0.5);
            }

            let end = performance.now();
            logger("Resizing Boundary Test Complete in: " + (end - start).toFixed(2) + " ms");
            document.getElementById("status").innerHTML = "Butterfly Exploration Finished.";
        };
    </script>
</body>
</html>
