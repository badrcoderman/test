<!DOCTYPE html>
<html>
<head>
    <title>CVE-2025-31278 Memory Leak Diagnostic</title>
    <style>
        body { font-family: monospace; background: black; color: lime; }
        #output { white-space: pre; overflow: auto; max-height: 90vh; }
        .leak { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
<div id="output"></div>

<script>
const output = document.getElementById('output');
let logBuffer = [];

function log(msg, type = 'info') {
    const timestamp = new Date().toISOString();
    const formatted = `[${timestamp}] ${msg}`;
    logBuffer.push(formatted);
    
    const div = document.createElement('div');
    if (type === 'leak') div.className = 'leak';
    if (type === 'success') div.className = 'success';
    div.textContent = formatted;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
    console.log(formatted);
}

// ===== PHASE 1: Memory Leak Detection =====

function detectMemoryLeak() {
    log("=== PHASE 1: MEMORY LEAK DETECTION ===");
    
    const initialMemory = performance.memory?.usedJSHeapSize || 0;
    log(`Initial heap: ${(initialMemory / 1024 / 1024).toFixed(2)} MB`);
    
    let leakContainer = document.createElement('div');
    leakContainer.style.display = 'none';
    leakContainer.id = 'leak-container';
    document.body.appendChild(leakContainer);
    
    // Allocate many elements
    for (let i = 0; i < 1000; i++) {
        let elem = document.createElement('div');
        elem.innerHTML = "A".repeat(1000);
        elem.style.cssText = `
            position: absolute;
            left: ${Math.random() * 10000}px;
            top: ${Math.random() * 10000}px;
            width: 100px;
            height: 100px;
            background: red;
            overflow: hidden;
        `;
        leakContainer.appendChild(elem);
    }
    
    // Force layout
    let height = leakContainer.offsetHeight;
    log(`Created 1000 elements, container height: ${height}`);
    
    // Now remove them
    while (leakContainer.firstChild) {
        leakContainer.removeChild(leakContainer.firstChild);
    }
    
    // Check memory
    const afterMemory = performance.memory?.usedJSHeapSize || 0;
    const diff = (afterMemory - initialMemory) / 1024 / 1024;
    
    log(`Memory after cleanup: ${(afterMemory / 1024 / 1024).toFixed(2)} MB`);
    log(`Memory difference: ${diff.toFixed(2)} MB`, diff > 5 ? 'leak' : 'success');
    
    return diff > 5;
}

// ===== PHASE 2: Style Computation Corruption =====

function detectStyleCorruption() {
    log("\n=== PHASE 2: STYLE COMPUTATION CORRUPTION ===");
    
    let testDiv = document.createElement('div');
    testDiv.style.cssText = `
        width: 100px;
        height: 100px;
        background: blue;
        display: block;
    `;
    document.body.appendChild(testDiv);
    
    // Get initial style
    let style1 = window.getComputedStyle(testDiv);
    log(`Initial computed width: ${style1.width}`);
    log(`Initial computed height: ${style1.height}`);
    
    // Rapid style changes
    for (let i = 0; i < 100; i++) {
        testDiv.style.width = (100 + i) + 'px';
        testDiv.style.height = (100 + i) + 'px';
        
        let style = window.getComputedStyle(testDiv);
        let w = style.width;
        let h = style.height;
        
        // Look for corruption signs
        if (!w || w.includes('NaN') || w === '' || w === undefined) {
            log(`⚠️ CORRUPTION DETECTED at iteration ${i}:`, 'leak');
            log(`Width: "${w}", Height: "${h}"`, 'leak');
            return true;
        }
    }
    
    log("✅ No style corruption detected", 'success');
    return false;
}

// ===== PHASE 3: Layout Calculation Corruption =====

function detectLayoutCorruption() {
    log("\n=== PHASE 3: LAYOUT CALCULATION CORRUPTION ===");
    
    let parent = document.createElement('div');
    parent.style.cssText = 'width: 500px; height: 500px; background: yellow;';
    document.body.appendChild(parent);
    
    // Create nested layout
    for (let i = 0; i < 50; i++) {
        let child = document.createElement('div');
        child.style.cssText = `
            position: relative;
            width: ${100 - i}%;
            height: ${100 - i}%;
            background: rgb(${i * 5}, 0, 0);
        `;
        parent.appendChild(child);
    }
    
    // Force multiple layout recalculations
    let results = [];
    for (let i = 0; i < 10; i++) {
        let rect = parent.getBoundingClientRect();
        results.push({
            iteration: i,
            top: rect.top,
            left: rect.left,
            width: rect.width,
            height: rect.height
        });
        
        // Modify layout
        parent.style.width = (500 + i * 10) + 'px';
    }
    
    log("Layout calculation results:");
    let corrupted = false;
    results.forEach(r => {
        if (isNaN(r.width) || r.width < 0 || isNaN(r.height) || r.height < 0) {
            log(`  ⚠️ Iteration ${r.iteration}: W=${r.width}, H=${r.height}`, 'leak');
            corrupted = true;
        } else {
            log(`  ✓ Iteration ${r.iteration}: W=${r.width}, H=${r.height}`);
        }
    });
    
    return corrupted;
}

// ===== PHASE 4: RenderObject Tree Corruption =====

function detectRenderTreeCorruption() {
    log("\n=== PHASE 4: RENDER TREE CORRUPTION ===");
    
    // Create complex DOM tree
    let root = document.createElement('div');
    root.style.cssText = 'width: 100%; height: 100%; background: purple;';
    document.body.appendChild(root);
    
    // Build tree
    for (let i = 0; i < 100; i++) {
        let elem = document.createElement('span');
        elem.innerHTML = `Element${i}:`.repeat(50);
        elem.style.cssText = `
            display: inline-block;
            width: 50px;
            height: 50px;
            background: green;
            margin: 2px;
            padding: 5px;
            border: 1px solid black;
        `;
        root.appendChild(elem);
    }
    
    log(`Created render tree with ${root.children.length} nodes`);
    
    // Force render
    let firstChild = root.firstChild;
    let lastChild = root.lastChild;
    
    // Try to corrupt by removing during access
    let corruption = false;
    for (let i = 0; i < 20; i++) {
        try {
            // Access render properties
            let fc = root.firstChild;
            let lc = root.lastChild;
            
            // Modify tree
            if (root.children.length > 10) {
                root.removeChild(root.firstChild);
            }
            
            // Force reflow
            let h = root.offsetHeight;
            
            if (!fc || !lc) {
                log(`⚠️ Render tree inconsistency detected!`, 'leak');
                corruption = true;
                break;
            }
        } catch (e) {
            log(`❌ Exception in render tree access: ${e.message}`, 'leak');
            corruption = true;
            break;
        }
    }
    
    if (!corruption) {
        log("✅ Render tree stable", 'success');
    }
    
    return corruption;
}

// ===== PHASE 5: Memory Pattern Analysis =====

function analyzeMemoryPatterns() {
    log("\n=== PHASE 5: MEMORY PATTERN ANALYSIS ===");
    
    // Create TypedArray to analyze memory
    let buffer = new ArrayBuffer(0x10000);
    let view = new Uint32Array(buffer);
    
    // Fill with pattern
    for (let i = 0; i < view.length; i++) {
        view[i] = 0x41414141;  // 'AAAA'
    }
    
    log(`Created ${view.length * 4} bytes of pattern memory`);
    
    // Verify pattern
    let intact = 0;
    let corrupted = 0;
    for (let i = 0; i < Math.min(100, view.length); i++) {
        if (view[i] === 0x41414141) {
            intact++;
        } else {
            corrupted++;
            log(`Pattern corruption at offset ${i * 4}: ${view[i].toString(16)}`, 'leak');
        }
    }
    
    log(`Pattern integrity: ${intact}/100 intact, ${corrupted}/100 corrupted`);
    return corrupted > 0;
}

// ===== MAIN EXECUTION =====

async function runFullDiagnostic() {
    log("╔════════════════════════════════════════╗");
    log("║  CVE-2025-31278 PS5 DIAGNOSTIC TOOL   ║");
    log("║       Memory Corruption Detector       ║");
    log("╚════════════════════════════════════════╝");
    
    let findings = {
        memoryLeak: false,
        styleCorruption: false,
        layoutCorruption: false,
        renderTreeCorruption: false,
        memoryPatternCorruption: false
    };
    
    // Run all tests
    findings.memoryLeak = detectMemoryLeak();
    await new Promise(r => setTimeout(r, 500));
    
    findings.styleCorruption = detectStyleCorruption();
    await new Promise(r => setTimeout(r, 500));
    
    findings.layoutCorruption = detectLayoutCorruption();
    await new Promise(r => setTimeout(r, 500));
    
    findings.renderTreeCorruption = detectRenderTreeCorruption();
    await new Promise(r => setTimeout(r, 500));
    
    findings.memoryPatternCorruption = analyzeMemoryPatterns();
    
    // Summary
    log("\n╔════════════════════════════════════════╗");
    log("║           SUMMARY REPORT              ║");
    log("╚════════════════════════════════════════╝");
    
    const vulnerableCount = Object.values(findings).filter(v => v).length;
    
    log(`\nMemory Leak:          ${findings.memoryLeak ? '🔴 DETECTED' : '✅ NONE'}`, findings.memoryLeak ? 'leak' : 'success');
    log(`Style Corruption:     ${findings.styleCorruption ? '🔴 DETECTED' : '✅ NONE'}`, findings.styleCorruption ? 'leak' : 'success');
    log(`Layout Corruption:    ${findings.layoutCorruption ? '🔴 DETECTED' : '✅ NONE'}`, findings.layoutCorruption ? 'leak' : 'success');
    log(`RenderTree Corruption:${findings.renderTreeCorruption ? '🔴 DETECTED' : '✅ NONE'}`, findings.renderTreeCorruption ? 'leak' : 'success');
    log(`Memory Pattern:       ${findings.memoryPatternCorruption ? '🔴 DETECTED' : '✅ NONE'}`, findings.memoryPatternCorruption ? 'leak' : 'success');
    
    log(`\n📊 Vulnerabilities Found: ${vulnerableCount}/5`);
    
    if (vulnerableCount > 0) {
        log("\n🔴 ⚠️ VULNERABILITY PATTERN DETECTED!", 'leak');
        log("This system appears vulnerable to CVE-2025-31278 or similar");
        log("Next step: Build addrof/fakeobj primitives", 'leak');
    } else {
        log("\n✅ No obvious corruption detected", 'success');
        log("May need more aggressive payload patterns");
    }
}

// Auto-run on load
window.addEventListener('load', () => {
    setTimeout(runFullDiagnostic, 500);
});

</script>
</body>
</html>
