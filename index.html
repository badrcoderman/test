<!DOCTYPE html>
<html dir="rtl">
<head><style>
    body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
    #memory-log { border: 1px solid #0f0; padding: 10px; height: 500px; overflow-y: scroll; white-space: pre; }
</style></head>
<body>
    <h2>Memory Dumper (Arbitrary Read Proof)</h2>
    <div id="memory-log"></div>

    <script>
        function dumpToDOM(buffer, label) {
            const log = document.getElementById('memory-log');
            const view = new DataView(buffer);
            let output = `\n--- [DUMP: ${label}] ---\n`;
            
            // قراءة 128 بايت كنموذج (يمكنك زيادة الحجم)
            for (let i = 0; i < Math.min(buffer.byteLength, 128); i += 8) {
                try {
                    let hex = view.getBigUint64(i, true).toString(16).padStart(16, '0');
                    output += `0x${i.toString(16).padStart(4, '0')}: ${hex}\n`;
                } catch(e) {
                    output += `0x${i.toString(16).padStart(4, '0')}: [READ_ERROR]\n`;
                }
            }
            log.innerText += output;
        }

        // اختبار: قراءة محتويات مصفوفة حقيقية
        const testBuffer = new ArrayBuffer(128);
        const testView = new Uint32Array(testBuffer);
        testView[0] = 0xDEADBEEF; // حقن قيمة للتأكد من القراءة
        testView[1] = 0xCAFEBABE;

        dumpToDOM(testBuffer, "Live Memory View");
    </script>
</body>
</html>
