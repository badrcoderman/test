<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <p>
      This tests calling createContextualFragment with trusted types createHTML callback which clears range's endpoints.
      <br />
      WebKit should not crash or hit any assertions under ASAN and you should see PASS below:
    </p>
    <div id="result" style="font-size: 24px; font-weight: bold; color: #00ffa0; margin-top: 20px;">
      Testing...
    </div>

    <script>
      // دالة بديلة لمحاكاة الـ Garbage Collection في البيئات القياسية
      function triggerAlternativeGC() {
        if (typeof gc === 'function') {
          gc(); // لو كان المتصفح في وضع المطورين ويدعمها
        } else {
          // محاكاة دفع المحرك للتنظيف عبر إنشاء وحذف كتل ذاكرة مؤقتة مكثفة
          let storage = [];
          for (let i = 0; i < 200; i++) {
            storage.push(new ArrayBuffer(1024 * 64)); // كتل 64 كيلوبايت
          }
          storage = null; // تحريرها فوراً لإغراء الـ GC بالعمل
        }
      }

      const resultElement = document.getElementById('result');
      const range = document.createRange();
      let div = document.createElement('div');
      range.setStart(div, 0);
      range.setEnd(div, 0);

      let didRun = false;

      // التأكد من دعم المتصفح للـ trustedTypes أولاً لمنع توقف الكود
      if (window.trustedTypes) {
        trustedTypes.createPolicy('default', {
          createHTML(string) {
            if (didRun) return string;
            didRun = true;

            range.setEnd(document, 0); // إسقاط مراجع الـ Range للـ div
            div = null;                 // إسقاط مرجع الجافا سكريبت للـ div
            
            triggerAlternativeGC();     // استدعاء دالة التنظيف البديلة

            return string;
          }
        });

        try {
          range.createContextualFragment('x');
          resultElement.textContent = 'PASS';
        } catch(e) {
          resultElement.textContent = 'ERROR DURING EXECUTION:\n' + e.message;
        }
      } else {
        // إذا كان المتصفح قديماً ولا يدعم السياسة الأمنية الجديدة للـ Trusted Types
        resultElement.textContent = 'SKIPPED: trustedTypes API is not supported in this browser environment.';
        resultElement.style.color = '#ff9900';
      }
    </script>
  </body>
</html>
