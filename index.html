<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebKit Layout Performance & Stress Benchmark</title>
<style id="s">
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #050505;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}
#box {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 82%;
  max-width: 900px;
  padding: 38px 28px;
  border: 2px solid rgba(0, 255, 160, 0.8);
  border-radius: 22px;
  background: linear-gradient(135deg, rgba(0,40,25,.92), rgba(0,0,0,.92));
  box-shadow: 0 0 45px rgba(0,255,160,.35);
  text-align: center;
  z-index: 9999;
}
#title {
  font-size: 42px;
  font-weight: bold;
  color: #00ffa0;
  margin-bottom: 18px;
}
#msg {
  font-size: 26px;
  line-height: 1.45;
  white-space: pre-line;
}
#fw {
  margin-top: 14px;
  font-size: 22px;
  color: #00ffa0;
  font-weight: bold;
}
#c {
  position: absolute;
  left: -9999px;
  top: -9999px;
}
</style>
</head>
<body>
<div id="box">
  <div id="title">LAYOUT BENCHMARK</div>
  <div id="msg">Initializing test metrics...</div>
  <div id="fw">Detecting Environment...</div>
</div>
<canvas id="c" width="512" height="128"></canvas>

<script>
"use strict";

function detectEnvironment() {
  const ua = navigator.userAgent || "";
  let env = "Standard Browser";
  let m = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  if (m && m[1]) env = "PS5 / FW: " + m[1];
  
  const el = document.getElementById("fw");
  if (el) el.textContent = "Environment: " + env;
}

function showMessage(text, isNominal) {
  const msg = document.getElementById("msg");
  const title = document.getElementById("title");
  if (msg) msg.textContent = text;
  if (title) title.textContent = isNominal ? "✅ BENCHMARK COMPLETE" : "LAYOUT BENCHMARK";
}

window.onerror = function(message, source, lineno, colno, error) {
  showMessage("ERROR:\n" + message + "\nLine: " + lineno, false);
};

let fontRegistryPool = [];
let calculationRegistry = [];

// توليد بايتات خط افتراضية خفيفة لأغراض اختبار أداء التخطيط
const FONT_B64 = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FONT_BYTES = (() => {
  const s = atob(FONT_B64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes;
})();

function getFontBuffer() {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);
  return copy.buffer;
}

// دالة اختبار قياس جهد الذاكرة بشكل آمن دون التسبب في انهيار المتصفح
function runMemoryStressTest() {
  let temporaryGarbage = [];
  for (let i = 0; i < 50; i++) {
    let buffer = new ArrayBuffer(i * 1024); // حجز كتل منظمة بحجم 1 كيلوبايت تصاعدياً
    temporaryGarbage.push(buffer);
  }
  // تفريغ فوري للمصفوفة لمساعدة الـ Garbage Collector على حماية الأداء
  temporaryGarbage = null;
}

function loadBenchmarkFonts() {
  // شحن عدد محدود ومنظم من الخطوط لاختبار سرعة استجابة المحرك (Engine Throughput)
  for (let i = 0; i < 100; i++) {
    const f = new FontFace("BENCHMARK_FONT_" + i, getFontBuffer(), { unicodeRange: "U+0041" });
    document.fonts.add(f);
    fontRegistryPool.push(f);
  }
}

function executeMetricAnalysis(fontName) {
  const ctx = document.getElementById("c").getContext("2d");
  ctx.font = "64px " + fontName;
  
  // 1. حساب الأبعاد عبر محرك الـ Canvas
  let canvasStartTime = performance.now();
  let canvasWidth = ctx.measureText("AAAAIIIIWWWW").width;
  let canvasDuration = performance.now() - canvasStartTime;

  // 2. حساب الأبعاد عبر محرك الـ DOM
  let div = document.createElement("div");
  div.textContent = "AAAAIIIIWWWW";
  div.style.cssText = "position:absolute;left:-10000px;top:0;font:64px " + fontName;
  document.body.appendChild(div);
  
  let domStartTime = performance.now();
  let domOffset = div.offsetWidth;
  let domDuration = performance.now() - domStartTime;
  
  document.body.removeChild(div);

  // تسجيل المخرجات الزمنية للمقارنة
  calculationRegistry.push({ canvasWidth, domOffset, canvasDuration, domDuration });
  
  showMessage(
    `Render Metrics:\nCanvas Width: ${canvasWidth.toFixed(2)}px (${canvasDuration.toFixed(3)}ms)\nDOM Width: ${domOffset}px (${domDuration.toFixed(3)}ms)`, 
    true
  );
}

window.onload = () => {
  detectEnvironment();
  showMessage("Stage 1/2:\nRunning memory structure baseline...", false);
  
  runMemoryStressTest();
  loadBenchmarkFonts();

  showMessage("Stage 2/2:\nExecuting synchronous font layout resolution...", false);

  // استخدام وعود جافا سكريبت القياسية لضمان التوافقية الكاملة
  document.fonts.ready.then(() => {
    executeMetricAnalysis("BENCHMARK_FONT_0");
    
    // التحقق من سلامة كائنات الخطوط داخل النطاق الآمن
    let isRegistryStable = fontRegistryPool.every(f => f.status !== "error");
    
    if (isRegistryStable) {
      const lastMetric = calculationRegistry[calculationRegistry.length - 1];
      showMessage(
        `SUCCESS ✅\nLayout Engine Stable.\nCanvas Result: ${lastMetric.canvasWidth.toFixed(2)} | DOM Result: ${lastMetric.domOffset}`, 
        true
      );
    } else {
      showMessage("Benchmark completed with rendering layout warnings.", false);
    }
  }).catch(err => {
    showMessage("Benchmark execution failed:\n" + err, false);
  });
};
</script>
</body>
</html>
