<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تفكيك ميكانيكية التداخل المنطقي - المرحلة الثالثة المعدلة</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: monospace;
            padding: 20px;
            margin: 0;
        }
        h2 {
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        /* واجهة الـ Console المدمجة على الشاشة */
        #custom-console {
            background-color: #000;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            height: 450px;
            overflow-y: scroll;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        .log-entry {
            margin-bottom: 8px;
            line-height: 1.4;
            border-left: 3px solid #666;
            padding-left: 8px;
        }
        .info { color: #ffffff; }
        .success { color: #00ff00; border-left-color: #00ff00; }
        .warn { color: #ffaa00; border-left-color: #ffaa00; }
        .error { color: #ff3333; border-left-color: #ff3333; }
        
        button {
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background-color: #00ccaa;
        }
    </style>
</head>
<body>

    <h2>مراقبة سلوك الـ JavaScriptCore & WebCore - كسر الـ Cache</h2>
    <p>اضغط على الزر أدناه لتفعيل كمين المقاطعة مع إجبار المحرك على تحديث التنسيق الفعلي (Forced Layout Reflow):</p>
    
    <button onclick="executeForcedInterception()">بدء الفحص المتقدم</button>

    <div id="custom-console">
        <div class="log-entry success">[نظام المحاكاة نشط]: جاهز لرصد تحولات الذاكرة واختبار حمايات الحالة...</div>
    </div>

    <script>
        // 1. نظام محاكاة الـ Console على الشاشة
        const consoleElement = document.getElementById('custom-console');
        
        function screenLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        // ربط الدوال القياسية بواجهة العرض
        window.console.log = (msg) => screenLog(msg, 'info');
        window.console.warn = (msg) => screenLog(msg, 'warn');
        window.console.error = (msg) => screenLog(msg, 'error');

        // 2. دالة الفحص المتقدم لكسر الكاش وإجبار الـ Reflow
        function executeForcedInterception() {
            try {
                console.log("إعداد بيئة الاختبار الهيكلية...");

                // إنشاء عنصر التنسيق
                const style = document.createElement('style');
                document.head.appendChild(style);
                
                // حقن قاعدة الخطوط الأساسية
                style.sheet.insertRule("@font-face { font-family: 'InterceptionFont'; src: url('local://void'); }", 0);
                console.log("تم حقن قاعدة الـ FontFace بنجاح.");

                // إنشاء كمين المقاطعة عبر كائن الـ Promise
                const proxyPromise = {
                    get then() {
                        console.warn("!! تم تفعيل الكمين البرمجي !! خيط التنفيذ تحت السيطرة الحالية.");
                        
                        // تنفيذ أمر الحذف المنطقي
                        console.log("جاري استدعاء deleteRule(0) لإلغاء الارتباط التنسيقي...");
                        try {
                            style.sheet.deleteRule(0);
                            console.log("اكتمل أمر الحذف. الذاكرة في حالة ترقب.");
                        } catch (e) {
                            console.error("فشل الحذف البرمجي: " + e.message);
                        }

                        // إجراء كسر التخزين المؤقت (Invalidate Layout Cache)
                        console.log("تعديل نظام العرض (display = 'none') لإجبار المحرك على تفريغ الكاش القديم...");
                        document.body.style.display = 'none';

                        // إجبار المحرك على معالجة الدورة الحسابية الكاملة في منتصف التداخل
                        console.log("استدعاء document.body.offsetTop لفرض إعادة الحساب المتزامن (Forced Reflow)...");
                        
                        let forcedOffset = document.body.offsetTop;
                        console.log(`النتيجة المسترجعة: ${forcedOffset}`);

                        // إعادة بناء بيئة العرض للحفاظ على استقرار الواجهة بعد الفحص
                        document.body.style.display = 'block';
                        console.log("إعادة النمط الافتراضي للمستند (display = 'block').");
                        
                        return function(resolve) { resolve(); };
                    }
                };

                // جدولة العملية داخل الـ Microtask Queue لمحاكاة الـ Promise Resolution
                console.log("توجيه الكائن إلى الـ Event Loop...");
                Promise.resolve(proxyPromise).then((obj) => {
                    if(obj && obj.then) {
                        obj.then(() => {});
                    }
                });

            } catch (err) {
                console.error("خطأ ميكانيكي غير متوقع: " + err.message);
            }
        }

        // الحارس الوقائي لالتقاط الانهيارات البرمجية والأخطاء الفادحة
        window.onerror = function(message, source, lineno, colno, error) {
            console.error(`[مراقب النظام]: تم رصد استثناء أو انهيار آمن: ${message} | السطر: ${lineno}`);
            return true;
        };
    </script>
</body>
</html>
