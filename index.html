<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(nonexistent.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace; font-size: 18px; white-space: pre-wrap;">
        [1] Global Hook Active...
    </div>

    <script>
        const debug = document.getElementById('debug');
        
        function log(msg) {
            debug.innerText += "\n[+] " + msg;
        }

        // الاعتراض العالمي لكل وعود المتصفح
        const originalThen = Promise.prototype.then;
        Promise.prototype.then = function(onFulfilled, onRejected) {
            // هذا التلميح سيظهر لكل promise في الصفحة
            // يمكننا هنا إضافة شرط إذا أردنا تحديد الكائن بدقة
            // log("Promise encountered..."); 
            
            return originalThen.call(this, onFulfilled, onRejected);
        };

        window.onload = () => {
            log("Script Initialized.");
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            // نحاول الآن Hook الخاص بـ Prototype مرة أخرى ولكن مع علمنا بما يحدث
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    log("PROTOTYPE HOOK TRIGGERED!");
                    document.getElementById('s').sheet.deleteRule(0);
                    document.body.offsetTop;
                    return undefined;
                }
            });

            log("Calling fonts.load...");
            document.fonts.load('1em x', 'AB').catch((e) => {
                log("Caught: " + e.message);
            });
        };
    </script>
</body>
</html>
