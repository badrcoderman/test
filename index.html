<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PS5 v24 - Engine Analyzer</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#out{position:fixed;top:44px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:14px;line-height:1.6;
-webkit-user-select:text}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v24 ANALYZER</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STATUS:<b>READY</b></span>
</div>
<div id="out"></div>

<script>
"use strict";

const outputContainer = document.getElementById("out");

// تحديث نصوص الواجهة العلوية
const updateHeader = (id, value) => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = value;
};

// دالة الطباعة المحسنة (تتعامل مع النص مباشرة)
const printLog = (message, className) => {
    const span = document.createElement("span");
    if (className) span.className = className;
    span.textContent = message + "\n";
    outputContainer.appendChild(span);
    outputContainer.scrollTop = outputContainer.scrollHeight;
};

const printSuccess = (m) => printLog(`  ✅ ${m}`, "ok");
const printError = (m) => printLog(`  ✘ ${m}`, "er");
const printHighlight = (m) => printLog(`  ► ${m}`, "hl");
const printSpecial = (m) => printLog(`  ★ ${m}`, "mg");

// معالج الأخطاء العام
window.onerror = (msg, url, line) => {
    printError(`CRASH: ${msg.substring(0, 60)} @${line}`);
    updateHeader("h2", "STATUS:<b>CRASH</b>");
    return true;
};

// كشف كود الفيرموير من الـ User Agent
const ua = navigator.userAgent || "";
const fwMatch = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
updateHeader("h1", `FW:<b>${fwMatch ? fwMatch[1] : "?"}</b>`);

// دالة التشغيل الرئيسية لجميع المراحل
const runAnalysis = () => {
    updateHeader("h2", "STATUS:<b>RUNNING</b>");
    
    printLog("════════════════════════════════", "hd");
    printLog("  v24 — Refactored Engine Test  ", "hd");
    printLog("════════════════════════════════", "hd");
    printLog("");

    // --- PHASE 1 ---
    printLog("▸ Phase 1: Safe Pattern Timing", "hd");
    printLog("");

    const safePatterns = [
        { re: /(a+)+b/, len: 10, name: "(a+)+b/10" },
        { re: /(a+)+b/, len: 15, name: "(a+)+b/15" },
        { re: /(a|a)+b/, len: 10, name: "(a|a)+b/10" },
        { re: /(a*)*b/, len: 10, name: "(a*)*b/10" },
        { re: /(a{1,3})+b/, len: 15, name: "bounded/15" }
    ];

    for (const pattern of safePatterns) {
        try {
            const testStr = "a".repeat(pattern.len) + "c";
            const t0 = performance.now();
            pattern.re.test(testStr);
            const elapsed = performance.now() - t0;
            
            let statusClass = "ok";
            if (elapsed > 500) statusClass = "er";
            else if (elapsed > 50) statusClass = "wr";

            printLog(`  ${pattern.name.padEnd(16)} → ${elapsed.toFixed(1)}ms`, statusClass);
        } catch (e) {
            printLog(`  ${pattern.name.padEnd(16)} → ERR`, "er");
        }
    }
    printSuccess("Safe patterns done\n");

    // --- PHASE 2 ---
    printLog("▸ Phase 2: JIT Heat (300x)", "hd");
    try {
        const heatRe = /(a+)+b/;
        const heatStr = "aaaaac";
        const times = [];

        for (let i = 0; i < 300; i++) {
            const t0 = performance.now();
            heatRe.test(heatStr);
            times.push(performance.now() - t0);
        }

        let first5 = times.slice(0, 5).reduce((a, b) => a + b, 0) / 5;
        let last5 = times.slice(-5).reduce((a, b) => a + b, 0) / 5;

        printLog(`  First 5 avg: ${first5.toFixed(2)}ms | Last 5 avg: ${last5.toFixed(2)}ms`);
        printSuccess("JIT heated\n");
    } catch (e) {
        printError(`JIT: ${e.message}\n`);
    }

    // --- SUMMARY ---
    printLog("════════════════════════════════", "hd");
    printLog("  ANALYSIS DONE", "hd");
    printLog("════════════════════════════════", "hd");
    
    updateHeader("h2", "STATUS:<b>DONE</b>");
};

// بدء التنفيذ تلقائياً عند تحميل الصفحة
window.onload = () => {
    setTimeout(runAnalysis, 100);
};
</script>
</body>
</html>
