<!DOCTYPE html>
<html>
<body style="background: black; color: #0f0; font-family: monospace; padding: 20px; font-size: 18px;">
    <h2>معلومات متصفح الجهاز (User Agent):</h2>
    <hr style="border: 1px solid #0f0;">
    <div id="ua-display" style="word-wrap: break-word; line-height: 1.6;">جاري جلب البيانات...</div>

<script>
    window.onload = () => {
        // قراءة السلسلة التعريفية للمتصفح
        let userAgentString = navigator.userAgent;
        
        // عرضها على الشاشة
        document.getElementById("ua-display").innerText = userAgentString;
    };
</script>
</body>
</html>
