<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color:blue; font-family:monospace;">Status: Attaching Global Hook...</div>
    <script>
        const debug = document.getElementById('debug');
        
        // محاولة اعتراض الـ Promise.prototype.then عالمياً
        const originalThen = Promise.prototype.then;
        
        Promise.prototype.then = function(onFulfilled, onRejected) {
            // كشف أي promise يتم استدعاؤه
            if (this.constructor.name === 'FontFace') {
                debug.innerText = "!! Global Hook Captured FontFace Promise !!";
            }
            return originalThen.call(this, onFulfilled, onRejected);
        };

        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            // Trigger
            document.fonts.load('1em x', 'AB').then(() => {
                 debug.innerText += "\n(Load resolved)";
            }).catch(() => {
                 debug.innerText += "\n(Load rejected)";
            });
        };
    </script>
</body>
</html>
