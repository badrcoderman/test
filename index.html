        root.appendChild(elem);

        height: 100px;
        background: red;
        position: relative;
        left: 0px;
        top: 0px;
    `;
    container.appendChild(elem);
    
    // Trigger style recalculation
    let style1 = window.getComputedStyle(elem);
    console.log("[*] Initial width:", style1.width);

        elem.style.width = "200px";

            console.log("🔴 POSSIBLE UAF IN STYLE: width =", style2.width);
