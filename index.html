// ============================================================

function testWriteThrough() {
  log("=== WRITE-THROUGH TESTING ===");
  const results = {};

  // Find the confused RC face from resolved faces
  let rcFace = null;
  if (resolvedFaces) {

    confusedRCIndex = 0;

  if (!rcFace || !triggerFace) {
    log("Missing trigger or RC face for write-through test");
    return results;
  }

  log("Testing write-through: trigger ↔ RC_" + confusedRCIndex);

  // Test A: Write to trigger, read from RC

    {
      name: "trigger.weight → RC",
      write: () => { triggerFace.weight = "200"; },
      read: () => rcFace.weight,
      restore: () => { triggerFace.weight = "normal"; },
      expected: "200"

      name: "trigger.style → RC",
      write: () => { triggerFace.style = "oblique"; },
      read: () => rcFace.style,
      restore: () => { triggerFace.style = "normal"; },
      expected: "oblique"

    {
      name: "trigger.display → RC",
      write: () => { triggerFace.display = "fallback"; },
      read: () => rcFace.display,
      restore: () => { triggerFace.display = "auto"; },
      expected: "fallback"
    },
    {
      name: "trigger.unicodeRange → RC",
      write: () => { triggerFace.unicodeRange = "U+0043"; },
      read: () => rcFace.unicodeRange,
      restore: () => { triggerFace.unicodeRange = "U+0041"; },
      expected: "U+0043"
    }
  ];

  // Test B: Write to RC, read from trigger
  const reverseTests = [
    {
      name: "RC.weight → trigger",
      write: () => { rcFace.weight = "300"; },
      read: () => triggerFace.weight,
      restore: () => { rcFace.weight = "900"; },
      expected: "300"
    },
    {
      name: "RC.style → trigger",
      write: () => { rcFace.style = "normal"; },
      read: () => triggerFace.style,
      restore: () => { rcFace.style = "italic"; },
      expected: "normal"
    },
    {
      name: "RC.featureSettings → trigger",
      write: () => { rcFace.featureSettings = '"kern" off'; },
      read: () => triggerFace.featureSettings,
      restore: () => { rcFace.featureSettings = "normal"; },
      expected: '"kern" off'
    }
  ];

  // Run forward tests (trigger → RC)
  for (const t of tests) {
    try {
      t.write();
      forceStyle();
      const readback = t.read();
      const match = readback === t.expected;
      results[t.name] = { readback, match };
      log(t.name + ": readback=" + readback + " match=" + match);
      t.restore();
      forceStyle();
    } catch(e) {
      results[t.name] = { error: e.message };
      log(t.name + ": ERROR " + e.message);
      try { t.restore(); forceStyle(); } catch(e2) {}
    }
  }

  // Run reverse tests (RC → trigger)
  for (const t of reverseTests) {
    try {
      t.write();
      forceStyle();
      const readback = t.read();
      const match = readback === t.expected;
      results[t.name] = { readback, match };
      log(t.name + ": readback=" + readback + " match=" + match);
      t.restore();
      forceStyle();
    } catch(e) {
      results[t.name] = { error: e.message };
      log(t.name + ": ERROR " + e.message);
      try { t.restore(); forceStyle(); } catch(e2) {}
    }
  }

  // Test C: Write-through detected via check() oracle
  // This is the key test: even if property reads are cached,
  // the C++ state might have changed, affecting check() results
  log("Testing write-through via check() oracle...");

  // Baseline: trigger should match "900 italic" due to confusion
  const baseline900 = document.fonts.check("900 italic 64px trigger", "A");
  log("Baseline 900 italic: " + baseline900);

  // Change RC face to normal weight
  try {
    rcFace.weight = "normal";
    rcFace.style = "normal";
    forceStyle();
    const afterChange = document.fonts.check("900 italic 64px trigger", "A");
    const afterNormal = document.fonts.check("normal 64px trigger", "A");
    log("After RC→normal: 900italic=" + afterChange + " normal=" + afterNormal);

    if (afterChange !== baseline900) {
      log("★ WRITE-THROUGH CONFIRMED VIA CHECK() ★");
      results.checkWriteThrough = true;
    } else {
      results.checkWriteThrough = false;
    }

    rcFace.weight = "900";
    rcFace.style = "italic";
    forceStyle();
  } catch(e) {
    log("Check write-through error: " + e.message);
  }

  // Test D: Write-through via family name change
  // If we change RC face's family, does the confusion break?
  try {
    const origFamily = rcFace.family;
    rcFace.family = "modified_" + origFamily;
    forceStyle();
    const afterRename = document.fonts.check("900 italic 64px trigger", "A");
    log("After RC family rename: check=" + afterRename);
    results.familyRenameBreaksConfusion = !afterRename;
    rcFace.family = origFamily;
    forceStyle();
  } catch(e) {
    log("Family rename error: " + e.message);
  }

  return results;
}

// ============================================================
//  PHASE 4: Internal State Probing
//  Try to access C++ state that isn't cached in the JS wrapper
// ============================================================
function probeInternalState() {
  log("=== INTERNAL STATE PROBING ===");
  const results = {};

  if (!triggerFace) return results;

  // Test 1: Object.getOwnPropertyDescriptors
  try {
    const proto = Object.getPrototypeOf(triggerFace);
    const descriptors = Object.getOwnPropertyDescriptors(proto);
    const getterProps = [];
    const setterProps = [];

    for (const [key, desc] of Object.entries(descriptors)) {
      if (desc.get) getterProps.push(key);
      if (desc.set) setterProps.push(key);
    }

    log("Getter properties: " + getterProps.join(", "));
    log("Setter properties: " + setterProps.join(", "));
    results.getterProps = getterProps;
    results.setterProps = setterProps;

    // Test each getter for live C++ reads
    for (const prop of getterProps) {
      try {
        const val = triggerFace[prop];
        const type = typeof val;
        log("  trigger." + prop + " = " + (type === "object" ? "[" + type + "]" : val) +
            " (type: " + type + ")");
      } catch(e) {
        log("  trigger." + prop + " ERROR: " + e.message);
      }
    }
  } catch(e) {
    log("Descriptor probe error: " + e.message);
  }

  // Test 2: Reflect.ownKeys
  try {
    const keys = Reflect.ownKeys(triggerFace);
    log("Own keys: " + keys.join(", "));
    results.ownKeys = keys;
  } catch(e) {}

  // Test 3: Try to access internal slots
  const internalSlots = [
    "_internal", "_impl", "_cppObject", "_native", "_ptr",
    "_face", "_fontFace", "_cssFontFace", "_wrapper",
    "__v8_toString", "__revoke", "__proto__"
  ];

  for (const slot of internalSlots) {
    try {
      const val = triggerFace[slot];
      if (val !== undefined) {
        log("INTERNAL SLOT: trigger." + slot + " = " + val);
        results[slot] = val;
      }
    } catch(e) {
      if (!e.message.includes("not a function")) {
        log("Slot " + slot + " error: " + e.message);
      }
    }
  }

  // Test 4: Symbol properties
  try {
    const symbols = Object.getOwnPropertySymbols(triggerFace);
    for (const sym of symbols) {
      try {
        const val = triggerFace[sym];
        log("Symbol property: " + sym.toString() + " = " + val);
      } catch(e) {}
    }
    results.symbolCount = symbols.length;
  } catch(e) {}

  // Test 5: Try toString and valueOf overrides
  try {
    const origToString = triggerFace.toString;
    const str = triggerFace.toString();
    log("trigger.toString(): " + str);
    results.toStringResult = str;
  } catch(e) {
    log("toString error: " + e.message);
  }

  // Test 6: Check constructor and prototype chain
  try {
    log("Constructor: " + triggerFace.constructor.name);
    let proto = triggerFace;
    let depth = 0;
    while (proto && depth < 5) {
      proto = Object.getPrototypeOf(proto);
      if (proto) {
        const keys = Object.getOwnPropertyNames(proto).slice(0, 10);
        log("Proto[" + depth + "]: " + keys.join(", "));
      }
      depth++;
    }
  } catch(e) {}

  // Test 7: Performance.now() timing oracle
  // Access a property multiple times and measure timing
  // Cached reads should be faster than C++ reads
  try {
    const iterations = 1000;
    const times = {};

    for (const prop of ["status", "family", "weight", "style", "display"]) {
      const start = performance.now();
      for (let i = 0; i < iterations; i++) {
        void triggerFace[prop];
      }
      const elapsed = performance.now() - start;
      times[prop] = elapsed;
      log("Timing " + prop + ": " + elapsed.toFixed(3) + "ms for " + iterations + " reads");
    }

    // If "status" is significantly slower than "family", it's likely reading from C++
    results.timing = times;
  } catch(e) {
    log("Timing oracle error: " + e.message);
  }

  return results;
}
