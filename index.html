<!DOCTYPE html>
<html>
<body>
    <script>
        // استخدام عداد دقيق جداً (Performance API)
        const start = performance.now();
        
        // محاولة الوصول لخاصية محمية
        let x = {};
        for(let i = 0; i < 1000000; i++) {
            x.y = i;
        }
        
        const end = performance.now();
        const duration = end - start;
        
        // إذا كان الوقت أقل من المعتاد، فهذا يعني أننا نرى الذاكرة (Memory Leak)
        document.body.innerHTML = "Performance measured: " + duration + " ms";
    </script>
</body>
</html>
