<!DOCTYPE html>
<html>
<head>
    <title>JSC JIT Optimization Boundary Exploration</title>
</head>
<body>
    <h3 id="status">Testing Optimization Boundaries...</h3>
    <div id="log"></div>

    <script>
        function logger(msg) {
            document.getElementById("log").innerHTML += msg + "<br>";
        }

        // دالة نضعها داخل حلقة ضغط برمجية لمراقبة سلوك التخمين (Speculation)
        function optimizeAndInvalidate(obj, toggle) {
            // عملية منطقية تعتمد على نوع المدخل ديناميكياً
            if (toggle) {
                return obj.f1 + 1.1;
            } else {
                return obj.f1;
            }
        }

        window.onload = function() {
            logger("Step 1: Preparing contrasting structure types...");
            
            // نوعان مختلفان تماماً من الكائنات لإرباك الـ Speculation Profile
            let typeDouble = { f1: 2.2 };
            let typeObject = { f1: { name: "Badr" } };

            let start = performance.now();
            logger("Step 2: Triggering Rapid Optimization / Invalidation Loop...");

            // حلقة ضخمة تقوم بالتناوب السريع جداً بين إجبار الـ JIT على التحسين 
            // ثم إجباره فوراً على الـ OSR Exit ومراقبة استقرار الأداء
            for (let i = 0; i < 100000; i++) {
                if (i % 2 === 0) {
                    optimizeAndInvalidate(typeDouble, true);
                } else {
                    optimizeAndInvalidate(typeObject, false);
                }
            }

            let end = performance.now();
            logger("Boundary Test Complete in: " + (end - start).toFixed(2) + " ms");
            document.getElementById("status").innerHTML = "Boundary Exploration Finished.";
        };
    </script>
</body>
</html>
