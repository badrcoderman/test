<html>
<head>
<title>Hook</title>
</head>
<body>
    
<script>
    function blindCall(ifaceName, methodName) {
        try {
            if (window[ifaceName] && typeof window[ifaceName][methodName] === 'function') {
                window[ifaceName][methodName]();
                alert("Triggered: " + ifaceName + "." + methodName);
            }
        } catch(e) {
            // تجاهل الأخطاء العادية
        }
    }

    // محاولة استدعاء دوال شائعة (تخمين)
    blindCall('SceShell', 'getShellStatus');
    blindCall('SceShell', 'update');
    blindCall('SceDownload', 'start');
    blindCall('SceDownload', 'status');
</script>




</body>
</html>
