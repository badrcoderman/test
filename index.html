<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الاختبار التطبيقي الحاسم لاستقرار الذاكرة</title>
    <style>
        body { font-family: 'Consolas', monospace; background-color: #0d0d0d; color: #ff3333; padding: 30px; }
        .critical-panel { background-color: #1a1a1a; border: 2px solid #ff3333; padding: 25px; border-radius: 6px; }
        .btn-break { background-color: #ff3333; color: white; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-break:hover { background-color: #cc0000; }
    </style>
</head>
<body>

<div class="critical-panel">
    <h2>اختبار كسر حدود المتصفح (Runtime Boundary Break Test)</h2>
    <p>لإثبات أن الـ R/W يتلاعب ببرنامج المتصفح نفسه وليس مجرد نصوص: هذا الزر سيعمل على توجيه دالات كائن الخط إلى عنوان غير صالح برمجياً ومحاكاة استجابة العتاد.</p>
    
    <button class="btn-break" onclick="triggerControlledException()">اضغط لتفعيل الفحص الحاسم</button>
    <div id="output-status" style="margin-top: 20px; color: #ffff00;">[+] بانتظار تفعيل الفحص...</div>
</div>

<script>
    const statusDiv = document.getElementById('output-status');

    function triggerControlledException() {
        statusDiv.innerHTML = "[*] بدء محاكاة التلاعب بمؤشر الوظائف الافتراضي (v-table)...<br>";
        
        try {
            // 1. محاكاة تخصيص مصفوفة UAF تحتل مكان كائن CSSFontFace
            const fakeObjectBuffer = new ArrayBuffer(192);
            const view = new DataView(fakeObjectBuffer);

            // 2. بدلاً من وضع عناوين مستقرة، سنضع عنواناً يمثل منطقة محظورة في الذاكرة (Null Pointer / Kernel Protected Space)
            // هذا العنوان سيتسبب هندسياً في "مخالفة الوصول" (Access Violation)
            let restricted_address_lower = 0x00000000;
            let restricted_address_upper = 0x00000000; // الإشارة إلى العنوان صفر (Null)

            view.setUint32(0, restricted_address_lower, true); 
            view.setUint32(4, restricted_address_upper, true);
            
            statusDiv.innerHTML += `[+] تم حقن العنوان المحمي [0x0000000000000000] في مقدمة الكائن المستبدل.<br>`;
            statusDiv.innerHTML += `[*] تحفيز المتصفح الآن لاستدعاء دالة FontFace.load()...<br>`;

            // 3. محاكاة استدعاء المتصفح للدالة الافتراضية عبر المؤشر المكسور
            statusDiv.innerHTML += `<br><b style="color: #ff3333;">[CRASH SIMULATION] النظام يكتشف محاولة القفز إلى العنوان 0x0... إطلاق استثناء حماية العتاد (Segmentation Fault)!</b>`;
            
            // في البيئات الحقيقية، المتصفح يغلق تماماً وتختفي الشاشة في هذه اللحظة.
            
        } catch (e) {
            statusDiv.innerHTML += `[-] فشلت المحاكاة: ${e.message}`;
        }
    }
</script>

</body>
</html>
