<html>
<head>
<title>Hook</title>
</head>
<body>
    
    
<script>
    // الاستماع لأي رد من النظام
    window.addEventListener('message', (event) => {
        alert("System Response Received: " + JSON.stringify(event.data));
    });

    // إرسال "رسالة" عمياء لأي Service قد تكون مستمعة
    try {
        window.postMessage({cmd: 'status', target: 'SceShell'}, '*');
        window.postMessage({cmd: 'version', target: 'SceDownload'}, '*');
    } catch(e) {}
</script>




</body>
</html>
