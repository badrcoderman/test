<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5  Info </title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
// انسخ هذا الكود والصقه في أي حقل نصي أو console

// 1. معلومات النظام
var info = [];
info.push('UA: ' + navigator.userAgent);
info.push('Platform: ' + navigator.platform);
info.push('Screen: ' + screen.width + 'x' + screen.height);

// 2. فحص WebKit
info.push('WebKit: ' + (function(){
    var v = document.createElement('div');
    v.style.cssText = '-webkit-line-clamp: 2; -webkit-box-orient: vertical';
    return v.style.webkitLineClamp;
})());

// 3. فحص JIT
var t0 = performance.now();
var s = 0;
for (var i = 0; i < 1e8; i++) s += i;
var t1 = performance.now();
info.push('JIT test: ' + (t1-t0).toFixed(0) + 'ms (sum=' + s + ')');
// لو < 1000ms → JIT مفعل!
// لو > 5000ms → LLInt فقط

// 4. فحص APIs
info.push('WASM: ' + typeof WebAssembly);
info.push('SharedAB: ' + typeof SharedArrayBuffer);
info.push('USB: ' + typeof navigator.usb);
info.push('Bluetooth: ' + typeof navigator.bluetooth);

// 5. فحص CVE-2021-38003
try {
    var m = new Map();
    for (var i = 0; i < 100; i++) m.set(i, i);
    m.delete(0);
    var leak = m.get(0);
    info.push('Map leak: ' + leak);
} catch(e) {
    info.push('Map leak: ' + e.message);
}

// 6. فحص PS5 native APIs
info.push('sceVideoOut: ' + typeof window.sceVideoOutOpen);
info.push('sceSysmodule: ' + typeof window.sceSysmoduleLoad);

// عرض النتائج
document.title = info.join(' | ');
alert(info.join('\n'));
</script>
</body>
</html>
