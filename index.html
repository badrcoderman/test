<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(data:font/woff2;base64,d09GMgABAAAAA); }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace;">Testing...</div>

    <script>
        const debug = document.getElementById('debug');

        function trigger() {
            // بيانات وهمية للخط
            let A = new FontFace('x', 'url(data:font/woff2;base64,d09GMgABAAAAA)');
            
            // حقن مباشر
            A.then = function(resolve, reject) {
                debug.innerText = "Intercepted!";
                // الحذف هنا
                document.getElementById('s').sheet.deleteRule(0);
                return Promise.prototype.then.call(this, resolve, reject);
            };

            document.fonts.add(A);
            
            // تحميل الخط
            A.load().then(() => {
                debug.innerText = "Done!";
            }).catch((e) => {
                debug.innerText = "Caught: " + e.message;
            });
        }

        setTimeout(trigger, 1000);
    </script>
</body>
</html>
