<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>WebKit DOM Stability Tester</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        #status-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
        }
        .counter {
            font-size: 2em;
            color: #58a6ff;
            font-weight: bold;
        }
        #arena {
            display: none; /* إخفاء ساحة التوليد لتسريع العملية برمجياً */
        }
        .test-node {
            padding: 5px;
            border: 1px solid red;
            transform: rotate(1deg);
        }
    </style>
</head>
<body>

    <h1>WebKit DOM Stress Tester</h1>
    
    <div id="status-box">
        <p>جاري تشغيل حلقة الإجهاد المكثف لذاكرة المتصفح...</p>
        <div class="counter" id="cycle-count">0</div>
        <p id="log">بدء التخصيص الافتراضي لعناصر الذاكرة...</p>
    </div>

    <div id="arena"></div>

    <script>
        (function() {
            var arena = document.getElementById('arena');
            var cycleCountElem = document.getElementById('cycle-count');
            var logElem = document.getElementById('log');
            var cycle = 0;

            // دالة لتوليد شجرة عناصر متداخلة بعمق كبير لتحدي بنية الـ DOM Tree
            function createDeepTree(depth) {
                var root = document.createElement('div');
                root.className = 'test-node';
                var current = root;
                
                for (var i = 0; i < depth; i++) {
                    var child = document.createElement('div');
                    child.className = 'test-node';
                    // إضافة خصائص نصية وتنسيقية ديناميكية لتشتيت مفسر الأنماط
                    child.setAttribute('data-id', Math.random().toString());
                    child.style.margin = (Math.random() * 10) + 'px';
                    
                    current.appendChild(child);
                    current = child; // الانتقال للمستوى الأعمق
                }
                return root;
            }

            // الحلقة الأساسية للاختبار
            def runStressCycle() {
                cycle++;
                cycleCountElem.innerText = cycle;

                try {
                    // 1. توليد 500 شجرة عناصر عميقة في الذاكرة وحقنها
                    for (var i = 0; i < 500; i++) {
                        var tree = createDeepTree(20); // عمق 20 عنصر متداخل
                        arena.appendChild(tree);
                    }

                    // 2. إجبار المحرك على حساب التنسيقات (Force Layout Reflow)
                    // قراءة خاصية مثل offsetHeight تجبر الـ WebKit على معالجة كل العناصر فوراً في الذاكرة
                    var triggerReflow = arena.offsetHeight;

                    // 3. حذف كل العناصر دفعة واحدة لترك الذاكرة معلقة وتحفيز الـ Garbage Collection
                    arena.innerHTML = '';

                    // 4. استدعاء الدورة التالية بسرعة باستخدام setTimeout لمنع تعليق المتصفح المباشر
                    setTimeout(runStressCycle, 5);

                } catch (e) {
                    logElem.innerText = "حدث خطأ أثناء الدورة: " + e.message;
                    logElem.style.color = '#f85149';
                }
            }

            // بدء تشغيل الفحص التلقائي بمجرد تحميل الصفحة
            setTimeout(runStressCycle, 1000);
        })();
    </script>
</body>
</html>
