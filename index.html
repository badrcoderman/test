<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log">بدء العملية...</div>
<script>
    function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }
    
    try {
        let obj = { x: 0x1234 };
        let buffer = new ArrayBuffer(0x100);
        let view = new DataView(buffer);
        
        // استخدام تقنية "التداخل" لربط مصفوفة بذاكرة الكائن
        let arr = [obj]; 
        
        // محاولة تسريب العنوان الداخلي للكائن
        // هنا نجبر المحرك على قراءة البيانات الخام للمصفوفة
        log("جاري محاولة تسريب عنوان كائن...");
        
        // سنحاول قراءة أول 8 بايتات من مساحة المصفوفة
        // إذا نجحنا، سنرى عنوان الذاكرة (Memory Address) للكائن obj
        let leakedAddress = view.getBigUint64(0);
        
        log("العنوان المسرب (Address): " + leakedAddress.toString(16));
        
    } catch(e) {
        log("خطأ في التسريب: " + e.message);
    }
</script>


</body>
</html>
