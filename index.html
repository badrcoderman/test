<!DOCTYPE html>
<html>
<head>
    <style>
        @font-face {
            font-family: 'TargetFont';
            src: url('data:font/woff2;base64,d09GMgABAAAAA');
        }
        #box { font-family: 'TargetFont'; }
    </style>
</head>
<body>
    <div id="box">Exploitation Target</div>
    <script>
        // إجبار المتصفح على محاولة عرض العنصر (هذا يجبر الـ Pump)
        document.body.offsetTop;
        
        // استخدام MutationObserver لمراقبة متى سيبدأ المحرك في معالجة الخط
        const target = document.getElementById('box');
        const observer = new MutationObserver((mutations) => {
            // بمجرد أن يكتشف النظام الـ Font، سنقوم بالهجوم فوراً
            console.log("Font state changed");
        });
        observer.observe(target, { attributes: true });
    </script>
</body>
</html>
