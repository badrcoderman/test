<script>
(() => {
  const SOCKET_URL = 'ws://192.168.8.230:8000';
  let socketOpened = false;

  // ------------------------------------------------------------
  // 1. WebSocket: only log on open
  // ------------------------------------------------------------
  const ws = new WebSocket(SOCKET_URL);
  ws.onopen = () => {
    socketOpened = true;
    console.log('socket:open');
    // Run the diagnostic immediately after channel is established
    runDiagnostic();
  };
  ws.onerror = () => {
    // If socket fails, still attempt to run diagnostic (no-op if already ran)
    if (!socketOpened) runDiagnostic();
  };

  // ------------------------------------------------------------
  // 2. Core diagnostic – DOM re-entrancy via removeChild override
  // ------------------------------------------------------------
  function runDiagnostic() {
    try {
      // --- Heap grooming: concrete HTMLDivElement objects ---
      const container = document.createElement('div');
      const childCount = 200;
      const children = [];
      for (let i = 0; i < childCount; i++) {
        const div = document.createElement('div');
        div.textContent = 'c' + i;
        container.appendChild(div);
        children.push(div);
      }

      // Preserve original removeChild to avoid infinite recursion
      const originalRemove = Node.prototype.removeChild;
      let removalDepth = 0;
      const MAX_DEPTH = 10;          // safely small; avoids stack blowout and watchdog

      // Override: synchronous re-entrancy on every removal
      Node.prototype.removeChild = function (child) {
        // Perform the actual removal first (child is now detached)
        const removed = originalRemove.call(this, child);
        removalDepth++;

        // Re-entrant removal: remove another child from the *same parent*,
        // but only if depth is within limit and a sibling exists.
        if (removalDepth <= MAX_DEPTH && this.childNodes.length > 0) {
          // Pick a different sibling – here the first remaining child
          const nextChild = this.childNodes[0];
          if (nextChild && nextChild !== child) {
            // This call will re-enter the overridden removeChild
            this.removeChild(nextChild);
          }
        }

        // (Optional) benign access to the detached node to stress memory semantics
        // Accessing parentNode should be null, but internal representation may be stale.
        void (removed.parentNode === null);

        removalDepth--;
        return removed;
      };

      // --- Trigger the initial removal to start the chain ---
      if (container.firstChild) {
        container.removeChild(container.firstChild);
      }

      // --- Restore original to avoid side effects on page ---
      Node.prototype.removeChild = originalRemove;

      // --- Cooperative yield for system stability (no busy-wait) ---
      // Schedule a no-op that lets the event loop breathe.
      setTimeout(() => {
        // Optional: pressure GC if interface exists (PS5 may lack GCController)
        if (typeof GCController !== 'undefined') {
          GCController.collect();
        }
        // --- Final log: success ---
        console.log('done');
        ws.close();
      }, 0);

    } catch (e) {
      // --- Final log: native runtime error caught ---
      console.log('error: ' + e.message);
      ws.close();
    }
  }
})();
</script>
