<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; height: 500px; overflow-y: scroll; background: #0a0a0a; font-size: 12px; }
        .log { margin-bottom: 3px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <h3>JANUS_JIT_MEMORY_LEAKER v1.0</h3>
    <div id="console"></div>

<script>
    // 1. إنشاء ذاكرة خطية (Linear Memory) - هذا هو ملعبنا الحقيقي
    // تخصيص صفحة واحدة (64KB)
    const memory = new WebAssembly.Memory({ initial: 1 });
    const memoryBuffer = new Uint8Array(memory.buffer);

    // 2. محاكاة "ثغرة" (OOB Write)
    // لنفرض أن المصفوفة المنطقية تنتهي عند العنوان 10
    const ARRAY_SIZE = 10;
    
    function writeToMemory(index, value) {
        // "الثغرة" هنا: لا يوجد فحص للحدود (Bounds Checking)
        memoryBuffer[index] = value;
    }

    // 3. التنفيذ
    console.log("الوصول الطبيعي:");
    writeToMemory(5, 0xAA); // كتابة داخل النطاق
    
    console.log("الوصول غير القانوني (الثغرة):");
    writeToMemory(1000, 0xBB); // كتابة خارج النطاق في الذاكرة الخام!
    
    console.log("قيمة العنوان 1000 أصبحت: " + memoryBuffer[1000].toString(16));
</script>

</body>
</html>
