<script>
    // الاستماع لأي ردود معقدة من النظام
    window.addEventListener('message', (event) => {
        console.log("RAW SYSTEM RESPONSE:", event.data);
        alert("System Full Response: " + JSON.stringify(event.data));
    });

    // إرسال أوامر "مستهدفة" (Targeted Commands)
    // سنحاول التلاعب بالحالة (state) أو طلب تنفيذ (execute)
    const payloads = [
        {cmd: 'execute', action: 'get_version', target: 'SceShell'},
        {cmd: 'dump', target: 'SceDownload', path: '/dev/null'}, // اختبار المسارات
        {cmd: 'set_debug', mode: 'true', target: 'SceShell'}   // اختبار تفعيل وضع التصحيح
    ];

    payloads.forEach(p => {
        try {
            window.postMessage(p, '*');
            console.log("Sent Payload: ", p);
        } catch(e) {}
    });
</script>
