<!DOCTYPE html>
<html>
<head>
</head>
<body>
 <script>
    // سكربت استطلاع لبنية الذاكرة
    function probeMemory() {
        let objects = [];
        let sizes = [0x100, 0x1000, 0x10000]; // أحجام كتل مختلفة
        
        console.log("Starting memory probe...");
        
        try {
            for (let size of sizes) {
                for (let i = 0; i < 50; i++) {
                    // إنشاء مصفوفات بسيطة لرؤية كيف يتم تخصيصها
                    objects.push(new Uint8Array(size));
                }
            }
            console.log("Probe complete. Memory allocated: " + objects.length * 65536 + " bytes");
        } catch(e) {
            console.log("Memory limit reached at: " + objects.length);
        }
    }

    probeMemory();
</script>

</body>
</html>
