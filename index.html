<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 10px; }
        #console { width: 100%; height: 90vh; overflow-y: scroll; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="console"></div>
    <style id="s">@font-face { font-family: 'x'; src: local('Arial'); }</style>

    <script>
        const logBox = document.getElementById('console');
        
        // كونسول مباشر يعرض أي شيء يمر عبره
        function debug(msg) {
            logBox.innerHTML += `<div>[${performance.now().toFixed(2)}ms] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // مراقبة شاملة: اعتراض أي وصول للـ then في أي كائن
        Object.defineProperty(Object.prototype, 'then', {
            configurable: true,
            get() {
                debug("INTERCEPTED: Access to 'then' detected!");
                return undefined;
            }
        });

        window.onload = async () => {
            debug("System Initialized. Universal Hook active.");
            
            try {
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                debug("FontFace created.");
                
                document.fonts.add(A);
                debug("FontFace added to document.fonts.");

                debug("Starting Font load...");
                // استدعاء التحميل
                let p = document.fonts.load('1em x', 'AB');
                debug("Load() function called.");
                
                await p;
                debug("Load promise resolved.");
            } catch (e) {
                debug("CRITICAL ERROR: " + e.message);
            }
        };
    </script>
</body>
</html>
