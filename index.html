<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PS5 Range Endpoints Lifecycle Test</title>
  </head>
  <body>
    <p>
      Testing Range Endpoints tracking under synchronous DOM mutation.
      <br />
      The browser should remain stable, and you should see PASS below:
    </p>
    <div id="result" style="font-size: 24px; font-weight: bold; color: #00ffa0; margin-top: 20px;">
      Executing Mutation Sequence...
    </div>

    <div id="anchor"></div>

    <script>
      const resultElement = document.getElementById('result');
      const anchor = document.getElementById('anchor');
      
      const range = document.createRange();
      let div = document.createElement('div');
      
      // ربط الـ Range بالـ div
      range.setStart(div, 0);
      range.setEnd(div, 0);

      let fired = false;

      // استخدام حدث كلاسيكي مدعوم في WebKit لالتقاط نافذة التوقيت
      anchor.addEventListener('DOMNodeInserted', function() {
        if (fired) return;
        fired = true;

        // محاكاة نفس سلوك إسقاط المراجع في وسط التنفيذ
        range.setEnd(document, 0); // قطع علاقة الـ Range بالـ div
        div = null;                 // إزالة مرجع الجافا سكريبت

        // محاكاة دفع المحرك لتنظيف الذاكرة بشكل طبيعي
        let heapWeight = [];
        for (let i = 0; i < 100; i++) {
          heapWeight.push(new ArrayBuffer(1024 * 32));
        }
        heapWeight = null;
      });

      try {
        // إجبار المتصفح على إطلاق الحدث أثناء معالجة عناصر الـ DOM
        const span = document.createElement('span');
        anchor.appendChild(span);

        // إذا مر المحرك بسلام دون انهيار المؤشرات الخلفية لـ C++
        resultElement.textContent = 'PASS ✅ (Engine Defended Endpoints Successfully)';
      } catch (e) {
        resultElement.textContent = 'FAILED ❌: ' + e.message;
        resultElement.style.color = '#ff3333';
      }
    </script>
  </body>
</html>
