<script>
    // 1. توليد "قطع" صغيرة من الذاكرة لملء الـ Heap
    // نحاول زرع بيانات محددة يمكن البحث عنها لاحقاً في الذاكرة
    let spray = [];
    function heapSpray() {
        for (let i = 0; i < 5000; i++) {
            let chunk = "S".repeat(1024); // 1KB
            spray.push(chunk);
            
            // إرسال رسالة صغيرة مع كل قطعة
            window.postMessage({id: i, data: chunk}, '*');
        }
    }
    
    // زر التنفيذ
    document.body.innerHTML = '<button onclick="heapSpray()" style="padding:50px;">SPRAY HEAP & TRIGGER</button>';
</script>
