<!DOCTYPE html>
<html>
<head>
    <title>JIT Optimization & Type Tracking Analysis</title>
</head>
<body>
    <h1>JIT Optimization Inspector</h1>
    <p>الحالة: <span id="jit-status">جاري الفحص...</span></p>

    <script>
        // 1. دالة يتم استدعاؤها بكثافة ليقوم محرك الـ JIT بتحسين أصلها
        function optimizeTarget(arr) {
            // دالة افتراضية تعتمد على أن المدخلات هي أرقام فقط (فضاء محتسب)
            return arr[0] + 2.5;
        }

        function runJitAudit() {
            // إنشاء مصفوفة تحتوي على أعداد عائمة (Float64)
            let floatArray = [1.1, 2.2, 3.3];

            // تحفيز محرك الـ JIT عبر تكرار الاستدعاء (Warm-up Phase)
            // هذا يجعل المترجم يثبت نوع البيانات داخل الـ Cache
            for (let i = 0; i < 10000; i++) {
                optimizeTarget(floatArray);
            }

            // 2. مرحلة اختبار كسر النوع (Type Transition Test)
            // نقوم فجأة بتحويل أحد عناصر المصفوفة إلى "كائن" بدلاً من رقم
            floatArray[0] = { customProperty: 0x41414141 };

            try {
                // استدعاء الدالة بعد تغيير النوع
                // الأنظمة الحديثة يجب أن تكتشف التغيير فوراً وتلغي التحسين آلياً
                let result = optimizeTarget(floatArray);
                
                document.getElementById('jit-status').innerText = 
                    "اكتمل الفحص: المحرك تعامل مع كسر الأنواع بشكل آمن.";
            } catch (err) {
                document.getElementById('jit-status').innerText = 
                    "تم رصد استثناء منطقي: " + err.message;
            }
        }

        window.onload = runJitAudit;
    </script>
</body>
</html>
