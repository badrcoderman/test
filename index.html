<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 WebKit Remote Console Harness</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            padding: 30px;
            text-align: center;
        }
        .container {
            border: 2px dashed #00ff00;
            padding: 20px;
            display: inline-block;
            margin-top: 50px;
            background: #252525;
        }
        h1 { color: #00ff00; font-size: 20px; }
        p { color: #cccccc; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 بيئة فحص متصفح PS5 نشطة</h1>
        <p>يتم الآن نقل جميع سجلات الـ Console والأخطاء إلى الأيفون تلقائياً...</p>
    </div>

    <script>
        (function() {
            "use strict";

            // تم تحديث الـ IP الخاص بجهازك هنا تلقائياً
            var iPhone_IP = "192.168.8.230"; 
            var server_port = "8000";

            // إنشاء اتصال الـ WebSocket بالسيرفر المشغّل على iSH
            var socket = new WebSocket("ws://" + iPhone_IP + ":" + server_port);

            // عند نجاح الاتصال بالأيفون
            socket.onopen = function() {
                socket.send(JSON.stringify({ type: 'sys', data: 'PS5 Browser Connected Successfully!' }));
            };

            // اختطاف الـ console.log وتمرير مخرجاته للأيفون
            var oldLog = console.log;
            console.log = function() {
                var argsArray = Array.prototype.slice.call(arguments);
                var message = argsArray.join(' ');
                
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ type: 'log', data: message }));
                }
                oldLog.apply(console, arguments);
            };

            // اختطاف الأخطاء والـ Crashes غير المتوقعة وتنبيه الأيفون بها
            window.onerror = function(message, source, lineno, colno, error) {
                var errorDetails = message + " في الملف: " + source + " (السطر: " + lineno + ")";
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ type: 'error', data: errorDetails }));
                }
                return false;
            };
        })();

        // =====================================================================
        // 🛠️ مكان وضع أكواد الفحص واختبار الثغرات الخاصة بك (Your Test Code)
        // =====================================================================
        
        window.onload = function() {
            console.log("بداية تشغيل السكربت على البلايستيشن...");

            try {
                // سطر اختبار للتأكد من نجاح الربط
                console.log("إصدار المتصفح الحالي هو: " + navigator.userAgent);
                
                // ⏬ ضع كود الـ DOM Mutation أو الـ UAF الخاص بك هنا ⏬
                // ...
                // ...

            } catch (err) {
                console.log("خطأ في كود الفحص: " + err.message);
            }
        };
    </script>
</body>
</html>
