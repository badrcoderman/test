<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: targetFont; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
    <div id="status_panel" style="font-family: monospace; color: #00ff00; background: #000; padding: 10px;">
        [LAB] WebKit Alignment - Size Tuning (128-Byte Model)...
    </div>

<script>
// مدرسة هندسة الذاكرة - محاكاة حركة الـ Butterfly والـ StructureID

// 1. إنشاء كائن أساسي نظيف
let user = {
    name: "Badr", // يتم تخزينه في الـ Butterfly عند Offset سالب (مثلاً -1)
    age: 17       // يتم تخزينه عند Offset سالب تالي (مثلاً -2)
};
// في هذه اللحظة: المحرك أعطى هذا الكائن مثلاً StructureID = 0x1001

// 2. إنشاء كائن آخر بنفس الخصائص تماماً
let friend = {
    name: "Ali",
    age: 18
};
// تحسين الذاكرة: المتصفح يلاحظ التطابق، فيعطي كائن الصديق نفس الـ StructureID (0x1001)
// كلاهما يشيران إلى نفس الخريطة الذهنية في الذاكرة لفهم مكان الـ name والـ age

console.log("--- مرحلة تغيير هيكل البيانات ديناميكياً ---");

// 3. إضافة مصفوفة للكائن (تفعيل أجنحة الفراشة الموجبة والسالبة)
user.favorites = ["Cybersecurity", "Coding"]; 

/* ماذا حدث خلف الكواليس في الـ WebKit؟
  1. تم تغيير الـ StructureID الخاص بكائن user إلى معرف جديد تماماً (مثلاً 0x1002).
  2. مؤشر الـ Butterfly امتد الآن في الاتجاهين:
     - الاتجاه السالب (اليسار): يحتوي على الـ name والـ age والـ favorites.
     - الاتجاه الموجب (اليمين): يحتوي على عناصر المصفوفة [0] و [1].
     - تم تخزين طول المصفوفة (2) في ترويسة مخفية قبل العناصر الموجبة مباشرة.
*/

// 4. فحص الخصائص برمجياً
console.log("اسم المستخدم المباشر:", user.name); 
console.log("العنصر الأول في مصفوفة الفراشة الموجبة:", user.favorites[0]);

// صديقك لا يزال يحتفظ بالبنية القديمة (0x1001) ولم يتأثر بالامتداد الجديد للذاكرة
console.log("بنية كائن الصديق لا تزال مستقرة ومستقلة.");

</script>
</body>
