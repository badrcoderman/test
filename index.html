<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PS5 v24 - Engine Analyzer</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#out{position:fixed;top:44px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:14px;line-height:1.6;
-webkit-user-select:text}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v24 ANALYZER</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STATUS:<b>READY</b></span>
</div>
<div id="out"></div>

<script>
"use strict";

const outputContainer = document.getElementById("out");

class RuntimeAnalyzer {

    constructor() {
        this.phaseResults = [];
        this.logBuffer = [];
        this.flushScheduled = false;
        this.reentrancyDepth = 0;
        this.eventCounter = 0;
    }

    scheduleFlush() {

        if (this.flushScheduled)
            return;

        this.flushScheduled = true;

        requestAnimationFrame(() => {

            const fragment =
                document.createDocumentFragment();

            for (const item of this.logBuffer) {

                const line =
                    document.createElement("div");

                line.className =
                    item.className || "";

                line.textContent =
                    item.text;

                fragment.appendChild(line);
            }

            outputContainer.appendChild(fragment);

            outputContainer.scrollTop =
                outputContainer.scrollHeight;

            this.logBuffer.length = 0;
            this.flushScheduled = false;
        });
    }

    log(text, className = "") {

        this.logBuffer.push({
            text,
            className
        });

        this.scheduleFlush();
    }

    success(text) {
        this.log(`  ✅ ${text}`, "ok");
    }

    error(text) {
        this.log(`  ✘ ${text}`, "er");
    }

    warn(text) {
        this.log(`  ⚠ ${text}`, "wr");
    }

    highlight(text) {
        this.log(`  ► ${text}`, "hl");
    }

    header(text) {
        this.log(text, "hd");
    }

    async runPhase(name, executor) {

        const start =
            performance.now();

        try {

            await executor();

            const elapsed =
                performance.now() - start;

            this.phaseResults.push({
                name,
                success: true,
                elapsed
            });

            this.success(
                `${name} (${elapsed.toFixed(2)}ms)`
            );

        } catch (error) {

            this.phaseResults.push({
                name,
                success: false,
                error: error.message
            });

            this.error(
                `${name}: ${error.message}`
            );
        }
    }

    getMemoryInfo() {

        if (!performance.memory)
            return null;

        return {

            used:
                (
                    performance.memory.usedJSHeapSize /
                    1048576
                ).toFixed(2),

            total:
                (
                    performance.memory.totalJSHeapSize /
                    1048576
                ).toFixed(2),

            limit:
                (
                    performance.memory.jsHeapSizeLimit /
                    1048576
                ).toFixed(2)
        };
    }

    async measureFPS(duration = 1000) {

        return new Promise(resolve => {

            let frames = 0;
            const started =
                performance.now();

            const tick = () => {

                frames++;

                if (
                    performance.now() - started
                    >= duration
                ) {
                    resolve(frames);
                    return;
                }

                requestAnimationFrame(tick);
            };

            requestAnimationFrame(tick);
        });
    }

    collectEnvironment() {

        return {

            userAgent:
                navigator.userAgent,

            language:
                navigator.language,

            platform:
                navigator.platform,

            timezone:
                Intl.DateTimeFormat()
                .resolvedOptions()
                .timeZone,

            cores:
                navigator.hardwareConcurrency
                || "?",

            memory:
                navigator.deviceMemory
                || "?"
        };
    }

    async benchmarkRegexMatrix() {

        const patterns = [

            /(a+)+b/,
            /(a*)*b/,
            /(a|aa)+b/,
            /(a{1,4})+b/,
            /(ab|aab)+c/
        ];

        for (const regex of patterns) {

            const samples = [];

            for (
                let i = 0;
                i < 50;
                i++
            ) {

                const input =
                    "a".repeat(
                        10 + i
                    ) + "c";

                const start =
                    performance.now();

                regex.test(input);

                samples.push(
                    performance.now()
                    - start
                );
            }

            const average =
                samples.reduce(
                    (a,b)=>a+b,
                    0
                ) / samples.length;

            const peak =
                Math.max(...samples);

            this.log(
                `${regex} avg=${average.toFixed(3)}ms peak=${peak.toFixed(3)}ms`,
                average > 5
                    ? "wr"
                    : "ok"
            );
        }
    }

    monitorAsyncLifecycle() {

        const originalThen =
            Promise.prototype.then;

        const analyzer =
            this;

        Promise.prototype.then =
            function(...args) {

                analyzer.eventCounter++;

                return originalThen.apply(
                    this,
                    args
                );
            };
    }

    async verifyEventLoopHealth() {

        const delays = [];

        for (
            let i = 0;
            i < 25;
            i++
        ) {

            const start =
                performance.now();

            await new Promise(
                resolve =>
                    setTimeout(
                        resolve,
                        0
                    )
            );

            delays.push(
                performance.now()
                - start
            );
        }

        const average =
            delays.reduce(
                (a,b)=>a+b,
                0
            ) / delays.length;

        this.log(
            `EventLoop Avg Delay: ${average.toFixed(3)}ms`,
            average > 5
                ? "wr"
                : "ok"
        );
    }

    printSummary() {

        const passed =
            this.phaseResults
                .filter(
                    x => x.success
                )
                .length;

        const failed =
            this.phaseResults.length
            - passed;

        this.header(
            "════════════════════════════════"
        );

        this.header(
            "  ANALYSIS SUMMARY"
        );

        this.header(
            "════════════════════════════════"
        );

        this.log(
            `PASSED : ${passed}`,
            "ok"
        );

        this.log(
            `FAILED : ${failed}`,
            failed
                ? "er"
                : "ok"
        );

        this.log(
            `ASYNC EVENTS : ${this.eventCounter}`,
            "hl"
        );
    }
}

const analyzer =
    new RuntimeAnalyzer();

window.addEventListener(
    "error",
    event => {

        analyzer.error(
            `ERROR: ${event.message}`
        );

        updateHeader(
            "h2",
            "STATUS:<b>ERROR</b>"
        );
    }
);

window.addEventListener(
    "unhandledrejection",
    event => {

        analyzer.error(
            `PROMISE: ${String(
                event.reason
            )}`
        );
    }
);

function updateHeader(id, value) {

    const element =
        document.getElementById(id);

    if (element)
        element.innerHTML = value;
}

async function runAnalysis() {

    updateHeader(
        "h2",
        "STATUS:<b>RUNNING</b>"
    );

    analyzer.header(
        "════════════════════════════════"
    );

    analyzer.header(
        "  v25 Runtime Analyzer"
    );

    analyzer.header(
        "════════════════════════════════"
    );

    analyzer.monitorAsyncLifecycle();

    await analyzer.runPhase(
        "Environment Scan",
        async () => {

            const env =
                analyzer.collectEnvironment();

            Object.entries(env)
            .forEach(
                ([k,v]) =>
                    analyzer.log(
                        `${k}: ${v}`
                    )
            );
        }
    );

    await analyzer.runPhase(
        "Memory Telemetry",
        async () => {

            const memory =
                analyzer.getMemoryInfo();

            if (!memory) {

                analyzer.warn(
                    "Heap metrics unavailable"
                );

                return;
            }

            analyzer.log(
                `Heap Used : ${memory.used} MB`
            );

            analyzer.log(
                `Heap Total: ${memory.total} MB`
            );

            analyzer.log(
                `Heap Limit: ${memory.limit} MB`
            );
        }
    );

    await analyzer.runPhase(
        "Regex Matrix",
        async () => {

            await analyzer
                .benchmarkRegexMatrix();
        }
    );

    await analyzer.runPhase(
        "Event Loop Health",
        async () => {

            await analyzer
                .verifyEventLoopHealth();
        }
    );

    await analyzer.runPhase(
        "Frame Timing",
        async () => {

            const fps =
                await analyzer
                .measureFPS(1000);

            analyzer.log(
                `Frames/sec: ${fps}`,
                fps < 30
                    ? "wr"
                    : "ok"
            );
        }
    );

    analyzer.printSummary();

    updateHeader(
        "h2",
        "STATUS:<b>DONE</b>"
    );
}

const ua =
    navigator.userAgent || "";

const firmwareMatch =
    ua.match(
        /PlayStation\s*5\/?\s*([0-9.]+)/i
    );

updateHeader(
    "h1",
    `FW:<b>${
        firmwareMatch
        ? firmwareMatch[1]
        : "?"
    }</b>`
);

window.addEventListener(
    "load",
    () => setTimeout(
        runAnalysis,
        100
    )
);
</script>
</body>
</html>
