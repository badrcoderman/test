<!DOCTYPE html>
<html>
<body>
    <button onclick="measure()">Measure Memory Latency</button>
    <div id="status">Status: Ready</div>
    <script>
        function measure() {
            let buffer = new Uint32Array(1024 * 1024);
            let start = performance.now();
            
            // محاولة الوصول للذاكرة
            let val = buffer[0]; 
            
            let end = performance.now();
            document.getElementById('status').innerText = "Latency: " + (end - start).toFixed(4) + "ms | Value: " + val;
        }
    </script>
</body>
</html>
