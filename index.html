<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5WZK.woff2); }
    </style>
</head>
<body>
    <div id="debug" style="color: #0f0; font-family: monospace;">Testing...</div>

    <script>
        const debug = document.getElementById('debug');

        // إنشاء كائن FontFace جديد وإضافة الخاصية عليه مباشرة قبل تحميله
        // هذا يتجنب التلاعب المباشر بـ Prototype الأساسي
        function trigger() {
            let A = new FontFace('x', 'url(https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5WZK.woff2)');
            
            // حقن الـ then مباشرة في الكائن وليس في الـ Prototype
            A.then = function(onFulfilled, onRejected) {
                debug.innerText = "Intercepted!";
                document.getElementById('s').sheet.deleteRule(0);
                return Promise.prototype.then.call(this, onFulfilled, onRejected);
            };

            document.fonts.add(A);
            
            A.load().then(() => {
                debug.innerText = "Finished successfully.";
            }).catch((e) => {
                debug.innerText = "Caught: " + e.message;
            });
        }

        setTimeout(trigger, 1000);
    </script>
</body>
</html>
