<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>High-Volume Layout Engine Benchmark</title>
<style id="s">
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #09090b; color: #fafafa;
  font-family: ui-monospace, monospace;
}
#wrapper { max-width: 950px; margin: 40px auto; padding: 20px; }
#dashboard { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
#title { font-size: 28px; font-weight: bold; color: #10b981; margin-bottom: 20px; }
#status-box { background: #27272a; padding: 16px; border-radius: 8px; font-size: 16px; white-space: pre-line; margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th, td { padding: 10px; border: 1px solid #3f3f46; text-align: left; font-size: 13px; }
th { background: #27272a; color: #a1a1aa; }
</style>
</head>
<body>

<div id="wrapper">
  <div id="dashboard">
    <div id="title">ENGINE LAYOUT BENCHMARK (High Volume)</div>
    <div id="status-box">Ready to execute 10,000 iterations profile...</div>
    
    <div id="report">
      <table id="metrics-table">
        <thead>
          <tr>
            <th>Test Profile</th>
            <th>Canvas Total</th>
            <th>DOM Total</th>
            <th>Canvas/Op</th>
            <th>DOM/Op</th>
            <th>Faster Engine & Ratio</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<canvas id="c" width="512" height="128"></canvas>

<script>
"use strict";

const RUNS = 10000; // رفع التكرار بناءً على تقريرك التقني
const SAMPLE_TEXTS = [
  "The quick brown fox jumps over the lazy dog",
  "مرحبا بالعالم العربي 123"
];
const FONT_SIZES = [16, 64];

function runHighVolumeBenchmark() {
  const ctx = document.getElementById("c").getContext("2d");
  const tableBody = document.querySelector("#metrics-table tbody");
  
  SAMPLE_TEXTS.forEach(text => {
    FONT_SIZES.forEach(size => {
      const fontSpec = `${size}px Arial`;
      
      // 1. قياس الكتلة الكلية: Canvas
      ctx.font = fontSpec;
      let tCanvasStart = performance.now();
      for (let i = 0; i < RUNS; i++) {
        ctx.measureText(text);
      }
      let tCanvasTotal = performance.now() - tCanvasStart;
      
      // 2. قياس الكتلة الكلية: DOM (مع كسر الـ Cache عبر تغيير الهامش طفيفاً)
      const div = document.createElement("div");
      div.textContent = text;
      div.style.cssText = `position:absolute;left:-10000px;top:0;font:${fontSpec};`;
      document.body.appendChild(div);
      
      let tDomStart = performance.now();
      for (let i = 0; i < RUNS; i++) {
        div.style.paddingLeft = (i % 2) + "px"; // إجبار المحرك على الـ Re-layout كسر الـ Cache
        void div.offsetWidth;
      }
      let tDomTotal = performance.now() - tDomStart;
      document.body.removeChild(div);
      
      // حساب زمن العملية المفردة بالميكروثانية (µs)
      let canvasOp = (tCanvasTotal / RUNS) * 1000;
      let domOp = (tDomTotal / RUNS) * 1000;
      
      // حساب النسبة الرياضية الصحيحة
      let ratio = 0;
      let faster = "";
      if (canvasOp > domOp) {
        ratio = canvasOp / domOp;
        faster = `DOM Layout (${ratio.toFixed(1)}x faster)`;
      } else {
        ratio = domOp / canvasOp;
        faster = `Canvas 2D (${ratio.toFixed(1)}x faster)`;
      }
      
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>Size: ${size}px | "${text.substring(0,10)}..."</td>
        <td>${tCanvasTotal.toFixed(2)} ms</td>
        <td>${tDomTotal.toFixed(2)} ms</td>
        <td>${canvasOp.toFixed(3)} µs</td>
        <td>${domOp.toFixed(3)} µs</td>
        <td style="color:#10b981; font-weight:bold;">${faster}</td>
      `;
      tableBody.appendChild(tr);
    });
  });
  
  document.getElementById("status-box").textContent = "High-Volume Execution Completed. Metrics Compiled Below.";
}

window.onload = () => {
  setTimeout(runHighVolumeBenchmark, 1000);
};
</script>
</body>
</html>
