<!DOCTYPE html>
<html>
<head>
    <title>PS5 SIMPLE USERLAND WEBKIT</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        #log-window { 
            width: 90%; height: 400px; margin: 20px auto;
            background: #0a0a0a; border: 1px solid #333; 
            padding: 10px; overflow-y: auto; text-align: left; 
            font-family: monospace; color: #00d9ff;
        }
        #exec-btn { 
            padding: 15px 60px; font-size: 20px; font-weight: bold;
            background: #007bff; color: white; border: none; 
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        #exec-btn:active { background: #004085; transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>PS5 USERLAND WEBKIT BY SAMIRSCRIPTS</h1>
    <div id="log-window">
        <div style="color: #666;">[SYSTEM] Waiting for GO...</div>
    </div>

    <button id="exec-btn">GO</button>

    <script>
        function ssa(msg) {
            const win = document.getElementById('log-window');
            const line = document.createElement('div');
            line.innerHTML = "<span style='color: #fff;'>[>]</span> " + msg;
            win.appendChild(line);
            win.scrollTop = win.scrollHeight;
        }

        document.getElementById('exec-btn').onclick = function() {
            ssa("EXECUTING INJECT.JS");
            
            // This creates a fresh script tag every time you click
            var script = document.createElement('script');
            script.src = 'inject.js?t=' + Math.random(); // prevents caching
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
