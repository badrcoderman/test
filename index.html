<!DOCTYPE html>
<html>
<body>
    <div id="status">Grooming Heap...</div>
    <script>
        function groom() {
            let fillers = [];
            // 1. تصفيف الذاكرة بكتل ثابتة الحجم (0x1000)
            // هذا يخلق "شبكة" منتظمة في الذاكرة
            for (let i = 0; i < 500; i++) {
                fillers.push(new Uint8Array(0x1000));
            }
            
            // 2. إحداث "ثقوب" (نحذف كل عنصر ثاني)
            for (let i = 0; i < 500; i += 2) {
                fillers[i] = null; 
            }
            
            document.getElementById('status').innerHTML = "Heap Groomed. Holes created.";
            console.log("Heap groomed successfully.");
        }
        groom();
    </script>
</body>
</html>
