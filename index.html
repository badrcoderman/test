<html>
<head>
<title>Hook</title>
</head>
<body>
    
<script>
    function testAPI(name) {
        let start = performance.now();
        try {
            // محاولة الوصول للكائن
            let obj = window[name];
            let end = performance.now();
            
            // إذا كان الكائن موجوداً، الـ Access يكون أسرع من الـ Error
            if (end - start < 0.01) {
                document.body.style.backgroundColor = "green"; // إشارة نجاح (مخفية)
                alert("Found: " + name); 
            }
        } catch(e) {}
    }

    // سنختبر أسماء معروفة في أنظمة FreeBSD/WebKit
    testAPI('SceShell');
    testAPI('SceDownload');
    testAPI('navigator');
</script>


</body>
</html>
