<!DOCTYPE html>
<html>
<head>
    <title>JSC Composite Heap & JIT Exploration</title>
</head>
<body>
    <h3 id="status">Testing Composite Boundaries...</h3>
    <div id="log"></div>

    <script>
        function logger(msg) {
            document.getElementById("log").innerHTML += msg + "<br>";
        }

        // دالة الدمج: تغيير حجم المصفوفة لخلق نفاذ ونقل للـ Butterfly
        function compositeTrigger(arr, index, value) {
            arr[index] = value;
        }

        window.onload = function() {
            logger("Step 1: Starting Composite Stress Loop (JIT + Butterfly + GC)...");
            
            let start = performance.now();
            let lastCheck = start;

            for (let i = 0; i < 40000; i++) {
                // 1. خلق مصفوفة ديناميكية (تستهلك ذاكرة وتترك مخلفات للـ GC)
                let targetArray = [1.1, 2.2, 3.3];
                
                // 2. إجبار الـ JIT على عملية نقل وتوسيع مفاجئة للـ Butterfly
                compositeTrigger(targetArray, i % 100 === 0 ? 600 : 4, i + 0.5);
                
                // 3. تصفير المؤشر لخلق ضغط تنظيف فوري
                targetArray = null;

                // رصد المؤشرات الزمنية المركبة
                if (i % 10000 === 0 && i > 0) {
                    let now = performance.now();
                    logger("Composite Check at " + i + ": " + (now - lastCheck).toFixed(2) + " ms");
                    lastCheck = now;
                }
            }

            let end = performance.now();
            logger("Total Composite Time: " + (end - start).toFixed(2) + " ms");
            document.getElementById("status").innerHTML = "Composite Exploration Finished.";
        };
    </script>
</body>
</html>
