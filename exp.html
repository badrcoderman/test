<!DOCTYPE html>
<html>
<head>
<title>PS5 WebKit Test</title>
<style>
body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; padding: 20px; }
button { background: #0f3460; color: #fff; border: none; padding: 15px; margin: 5px; border-radius: 8px; cursor: pointer; }
#log { background: #111; padding: 10px; margin-top: 10px; height: 200px; overflow-y: auto; }
</style>
</head>
<body>
<h1>🎮 PS5 WebKit Scanner</h1>
<p>كشف قدرات متصفح PS5</p>
<button onclick="scanPS5()">🔍 فحص المتصفح</button>
<button onclick="testDNSRebind()">🌐 اختبار DNS Rebinding</button>
<div id="log"></div>

<script>
const log = document.getElementById('log');
function L(msg) { log.innerHTML += msg + '<br>'; }

function scanPS5() {
    L('═══ فحص PS5 WebKit ═══');
    
    // 1. اختبار JIT
    try {
        let sab = new SharedArrayBuffer(4);
        L('SharedArrayBuffer: ✅ متاح');
    } catch(e) {
        L('SharedArrayBuffer: ❌ محظور');
    }
    
    // 2. اختبار SOP
    try {
        let w = window.open('about:blank');
        w.location.href = 'https://example.com';
        L('SOP: ✅ يمكن فتح نوافذ');
    } catch(e) {
        L('SOP: ❌ مقفول');
    }
    
    // 3. اختبار UserAgent
    L('UA: ' + navigator.userAgent);
    
    // 4. اختبار WebSocket
    L('WebSocket: ' + (typeof WebSocket !== 'undefined' ? '✅' : '❌'));
    
    // 5. اختبار Network
    L('Platform: ' + navigator.platform);
    L('Cores: ' + navigator.hardwareConcurrency);
}

function testDNSRebind() {
    L('🧪 محاولة DNS Rebinding...');
    
    // امسح الشبكة المحلية
    for (let i = 1; i < 255; i++) {
        let ip = '192.168.1.' + i;
        let img = new Image();
        img.onload = () => L(`✅ ${ip} متاح`);
        img.onerror = () => {}; // تجاهل الأخطاء
        img.src = `http://${ip}:8080/test.png?${Date.now()}`;
    }
    
    L('🔍 فحص الشبكة بدأ...');
}
</script>
</body>
</html>
