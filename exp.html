<!doctype html>
<meta charset="utf-8">
<title>WebGL contextlost lifetime diagnostic</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; }
  button { font-size: 18px; padding: 10px; margin: 6px; }
  pre { white-space: pre-wrap; background: #222; padding: 12px; }
  iframe { width: 320px; height: 240px; border: 1px solid #555; }
</style>

<h1>WebGL contextlost lifetime diagnostic</h1>

<button onclick="runCanvasRemovalTest()">Run canvas-removal test</button>
<button onclick="runIframeDetachTest()">Run iframe-detach test</button>

<pre id="log"></pre>
<div id="host"></div>

<script>
const logEl = document.getElementById("log");
const host = document.getElementById("host");

function log(msg) {
  logEl.textContent += `[${new Date().toISOString()}] ${msg}\n`;
}

function makeGL(canvas) {
  const gl =
    canvas.getContext("webgl") ||
    canvas.getContext("experimental-webgl");

  if (!gl) {
    log("FAIL: WebGL unavailable");
    return null;
  }

  const ext = gl.getExtension("WEBGL_lose_context");
  if (!ext) {
    log("FAIL: WEBGL_lose_context extension unavailable");
    return null;
  }

  return { gl, ext };
}

function runCanvasRemovalTest() {
  log("=== canvas-removal test start ===");

  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256;
  document.body.appendChild(canvas);

  const setup = makeGL(canvas);
  if (!setup)
    return;

  const { gl, ext } = setup;

  canvas.addEventListener("webglcontextlost", function(event) {
    log("webglcontextlost fired: canvas-removal handler entered");

    // Required so WebKit considers restore requested/allowed.
    event.preventDefault();

    // Synchronous DOM mutation during WebGL context lost dispatch.
    canvas.remove();

    // Additional benign canvas mutation. No heap grooming, no spray.
    canvas.width = 1;
    canvas.height = 1;

    log("handler finished after remove + resize");
  }, { once: true });

  log("calling loseContext()");
  ext.loseContext();

  // Keep a tiny delayed check only for observation.
  setTimeout(() => {
    log("canvas-removal test survived timeout");
  }, 1000);
}

function runIframeDetachTest() {
  log("=== iframe-detach test start ===");

  host.textContent = "";

  const iframe = document.createElement("iframe");
  host.appendChild(iframe);

  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`
<!doctype html>
<meta charset="utf-8">
<body>
<canvas id="c" width="256" height="256"></canvas>
<script>
(function() {
  function parentLog(msg) {
    parent.postMessage({ type: "log", msg }, "*");
  }

  const canvas = document.getElementById("c");
  const gl =
    canvas.getContext("webgl") ||
    canvas.getContext("experimental-webgl");

  if (!gl) {
    parentLog("child FAIL: WebGL unavailable");
    return;
  }

  const ext = gl.getExtension("WEBGL_lose_context");
  if (!ext) {
    parentLog("child FAIL: WEBGL_lose_context unavailable");
    return;
  }

  canvas.addEventListener("webglcontextlost", function(event) {
    parentLog("child webglcontextlost handler entered");
    event.preventDefault();

    // Detach the entire iframe while WebGL contextlost dispatch is active.
    parent.postMessage({ type: "detach-iframe" }, "*");

    // Benign local mutation after detach request.
    canvas.width = 1;
    canvas.height = 1;

    parentLog("child handler finished after detach request");
  }, { once: true });

  parentLog("child calling loseContext()");
  ext.loseContext();
})();
<\/script>
</body>
`);
  doc.close();

  window.addEventListener("message", function onmsg(e) {
    if (!e.data || typeof e.data !== "object")
      return;

    if (e.data.type === "log") {
      log(e.data.msg);
      return;
    }

    if (e.data.type === "detach-iframe") {
      log("parent removing iframe synchronously");
      iframe.remove();
      setTimeout(() => {
        log("iframe-detach test survived timeout");
      }, 1000);
    }
  });
}
</script>
