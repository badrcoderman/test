<script>
// ---- Logger ----
const logEl = document.getElementById('log');
let results = { critical:0, high:0, medium:0, low:0, total:0 };

function L(msg, cls = 'info') {
  const t = new Date().toTimeString().slice(0,8);
  logEl.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function updateCounts() {
  document.getElementById('countCritical').textContent = `🔴 ${results.critical}`;
  document.getElementById('countHigh').textContent = `🟣 ${results.high}`;
  document.getElementById('countMedium').textContent = `🔵 ${results.medium}`;
  document.getElementById('countTotal').textContent = `🟢 ${results.total}/18`;
}

function result(type, success, msg) {
  const cls = success ? 'ok' : 'err';
  const status = success ? '✅' : '❌';
  L(`[${type}] ${status} ${msg}`, cls);
  if (success) {
    const typeMap = { 'CRITICAL':'critical', 'HIGH':'high', 'MEDIUM':'medium', 'LOW':'low' };
    const key = typeMap[type] || 'low';
    results[key]++;
  }
  results.total++;
  updateCounts();
}

// ---- Helpers ----
const wait = ms => new Promise(r => setTimeout(r, ms));


// ============================================================
//  2️⃣ SOP Bypass — postMessage
// ============================================================
async function testSOPBypassPostMsg() {
  L('── 2️⃣ SOP Bypass (postMessage) ──', 'sep');
  L('[*] CVE-2025-27834 — Cross-origin leak via postMessage');
  
  try {
    let received = false;
    let iframe = document.createElement('iframe');
    iframe.src = 'about:blank';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    
    window.addEventListener('message', (e) => {
      L(`[+] استقبلنا رسالة: ${JSON.stringify(e.data)}`, 'ok');
      received = true;
    });
    
    // إرسال رسالة للـ iframe
    await wait(200);
    iframe.contentWindow.postMessage({ test: 'PS5-SOP-Bypass' }, '*');
    await wait(300);
    
    result('CRITICAL', received, received ? 'postMessage يعمل عبر الأصول' : 'postMessage يعمل لكن مقيد');
    document.body.removeChild(iframe);
  } catch(e) {
    result('CRITICAL', false, `خطأ: ${e.message}`);
  }
}

// ============================================================
//  3️⃣ DNS Rebinding
// ============================================================
async function testDNSRebinding() {
  L('── 3️⃣ DNS Rebinding ──', 'sep');
  L('[*] CVE-2025-14174-like — فحص الشبكة الداخلية');
  
  let found = 0;
  let promises = [];
  
  for (let i = 1; i < 10; i++) {
    let ip = `192.168.1.${i}`;
    promises.push(new Promise((resolve) => {
      let img = new Image();
      img.onload = () => {
        L(`[+] ${ip} — متاح ✅`, 'ok');
        found++;
        resolve(true);
      };
      img.onerror = () => resolve(false);
      img.src = `http://${ip}:80/test.png?${Date.now()}`;
    }));
  }
  
  await Promise.race([Promise.all(promises), wait(3000)]);
  
  result('CRITICAL', found > 0, `تم كشف ${found} جهاز في الشبكة الداخلية`);
}

  let ports = [80, 443, 8080, 8443, 22, 21, 3306, 5432];
  let openPorts = [];
  
  for (let port of ports) {
    try {
      let img = new Image();
      await new Promise((resolve) => {
        img.onload = () => { openPorts.push(port); resolve(); };
        img.onerror = () => resolve();
        img.src = `http://127.0.0.1:${port}/?${Date.now()}`;

    } catch(e) {}
  }
  
  if (openPorts.length > 0) {
    L(`[+] منافذ مفتوحة: ${openPorts.join(', ')}`, 'ok');
  }
  
  result('CRITICAL', openPorts.length > 0, `تم كشف ${openPorts.length} منفذ داخلي`);
}

  if (typeof RTCPeerConnection !== 'undefined') {
    L('[+] WebRTC مدعوم ✅', 'ok');
    
    try {
      let pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      let ips = [];
      
      pc.onicecandidate = (e) => {
        if (e.candidate && e.candidate.candidate) {
          let ip = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);

      await pc.createOffer().then(o => pc.setLocalDescription(o));

      result('CRITICAL', ips.length > 0, `تم كشف ${ips.length} IP`);
    } catch(e) {
      result('CRITICAL', false, `WebRTC موجود لكن مقيد: ${e.message}`);

  L(`🟢 منخفضة: ${results.low}`, 'ok');
  L('══════════════════════════════════', 'sep');
}
