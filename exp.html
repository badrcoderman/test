<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CSSFontFace loaded callbacks pre-offset diagnostic</title>
<style>
@font-face {
  font-family: "fface-loaded-callbacks-ps5";
  src: local("DejaVuSans"), local("DejaVu Sans"), local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New");
  unicode-range: U+0042;
}
#probe {
  font-family: "fface-loaded-callbacks-ps5";
  position: absolute;
  left: -10000px;
  top: -10000px;
}
</style>
</head>
<body>
<span id="probe">B</span>
<pre id="result">running</pre>
<script>
(function () {
    "use strict";

    if (window.testRunner) {
        testRunner.dumpAsText();
        testRunner.waitUntilDone();
    }

    const resultElement = document.getElementById("result");
    const resultLines = [];
    let finished = false;
    let getterHits = 0;

    function record(message)
    {
        resultLines.push(message);
        try {
            console.log(message);
        } catch (e) {
        }
    }

    function finish()
    {
        if (finished)
            return;
        finished = true;
        try {
            resultElement.textContent = resultLines.join("\n");
        } catch (e) {
        }
        if (window.testRunner)
            testRunner.notifyDone();
    }

    function fail(message)
    {
        record(message);
        record("DONE");
        setTimeout(finish, 20);
    }

    function makeThenGetter()
    {
        return function () {
            ++getterHits;
            return undefined;
        };
    }

    function run()
    {
        record("POC STARTED: CSSFontFace loaded callbacks pre-offset diagnostic");

        if (!window.FontFace)
            return fail("FontFace API missing");
        if (!document.fonts)
            return fail("document.fonts missing");

        const family = "fface-loaded-callbacks-ps5";
        const jsFace = new FontFace(
            family,
            'local("DejaVuSans"), local("DejaVu Sans"), local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New")',
            { unicodeRange: "U+0041" }
        );

        Object.defineProperty(jsFace, "then", {
            configurable: true,
            get: makeThenGetter()
        });

        const loadedPromise = jsFace.loaded;
        loadedPromise.then(
            value => console.log("jsFace.loaded resolved callback; valueIsFace=" + (value === jsFace) + ", status=" + jsFace.status),
            error => console.log("jsFace.loaded rejected callback: " + error + ", status=" + jsFace.status)
        );

        document.fonts.add(jsFace);

        const checkA = document.fonts.check('16px "' + family + '"', "A");
        const checkB = document.fonts.check('16px "' + family + '"', "B");
        const checkAB = document.fonts.check('16px "' + family + '"', "AB");

        record("document.fonts.check A=" + checkA + " B=" + checkB + " AB=" + checkAB);
        record("then getter hits=" + getterHits);

        if (checkA === false && checkB === true && checkAB === false) {
            record("MATCHED ORIGINAL CRASH STATE A=false B=true AB=false");
            console.log("before body.offsetTop after loaded callbacks");
            const offset = document.body.offsetTop;
            console.log("after body.offsetTop value=" + offset);
            record("before body.offsetTop after loaded callbacks");
            record("after body.offsetTop value=" + offset);
        } else
            record("CHECK STATE DIFFERENT A=" + checkA + " B=" + checkB + " AB=" + checkAB);

        record("NO CRASH OBSERVED");
        record("DONE");
        setTimeout(finish, 20);
    }

    window.onerror = function (message, source, line, column)
    {
        record("window.onerror: " + message + " at " + line + ":" + column);
        record("DONE");
        setTimeout(finish, 20);
    };

    setTimeout(run, 0);
})();
</script>
</body>
</html>
