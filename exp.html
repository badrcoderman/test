<!doctype html>
<meta charset="utf-8">
<title>Observer ScriptExecutionContext lifetime diagnostic</title>

<style>
  body { font-family: sans-serif; background: #111; color: #eee; }
  button { font-size: 18px; padding: 10px; margin: 6px; }
  pre { white-space: pre-wrap; background: #222; padding: 12px; }
  iframe { width: 360px; height: 260px; border: 1px solid #666; margin: 8px; }
</style>

<h1>Observer ScriptExecutionContext lifetime diagnostic</h1>

<button onclick="runIntersectionObserverDetach()">Run IntersectionObserver iframe detach</button>
<button onclick="runMutationObserverDetach()">Run MutationObserver iframe detach</button>
<button onclick="runPerformanceObserverDetach()">Run PerformanceObserver iframe detach</button>

<pre id="log"></pre>
<div id="host"></div>

<script>
const logEl = document.getElementById("log");
const host = document.getElementById("host");

function log(msg) {
  logEl.textContent += `[${new Date().toISOString()}] ${msg}\n`;
}

window.addEventListener("message", event => {
  if (!event.data || typeof event.data !== "object")
    return;
  if (event.data.type === "log")
    log(event.data.msg);
});

function clearHost() {
  host.textContent = "";
}

function runIntersectionObserverDetach() {
  log("=== IntersectionObserver detach test start ===");
  clearHost();

  const iframe = document.createElement("iframe");
  host.appendChild(iframe);

  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`
<!doctype html>
<meta charset="utf-8">
<body style="margin:0; height:2000px;">
<div id="target" style="margin-top:1200px; width:100px; height:100px; background:red;"></div>

<script>
(function() {
  function parentLog(msg) {
    parent.postMessage({ type: "log", msg }, "*");
  }

  parentLog("child: IntersectionObserver test loaded");

  if (!("IntersectionObserver" in window)) {
    parentLog("child FAIL: IntersectionObserver unavailable");
    return;
  }

  const target = document.getElementById("target");

  const observer = new IntersectionObserver(function(entries) {
    parentLog("child: IntersectionObserver callback entered");

    try {
      // Synchronously detach this iframe/document during observer callback.
      if (frameElement)
        frameElement.remove();
      parentLog("child: frameElement.remove() called inside IntersectionObserver callback");
    } catch (e) {
      parentLog("child: detach failed: " + e);
    }

    // Benign post-detach JS work. No heap spray, no exploit primitives.
    try {
      document.body.textContent = "detached";
    } catch (e) {}

    parentLog("child: IntersectionObserver callback returning");
  }, { threshold: [0, 1] });

  observer.observe(target);

  requestAnimationFrame(function() {
    parentLog("child: scrolling to trigger IntersectionObserver");
    window.scrollTo(0, 1150);
  });
})();
<\/script>
</body>
`);
  doc.close();

  setTimeout(() => log("IntersectionObserver test survived timeout"), 2000);
}

function runMutationObserverDetach() {
  log("=== MutationObserver detach test start ===");
  clearHost();

  const iframe = document.createElement("iframe");
  host.appendChild(iframe);

  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`
<!doctype html>
<meta charset="utf-8">
<body>
<div id="target"></div>

<script>
(function() {
  function parentLog(msg) {
    parent.postMessage({ type: "log", msg }, "*");
  }

  parentLog("child: MutationObserver test loaded");

  if (!("MutationObserver" in window)) {
    parentLog("child FAIL: MutationObserver unavailable");
    return;
  }

  const target = document.getElementById("target");

  const observer = new MutationObserver(function(records) {
    parentLog("child: MutationObserver callback entered");

    try {
      // Synchronously detach this iframe/document during observer callback.
      if (frameElement)
        frameElement.remove();
      parentLog("child: frameElement.remove() called inside MutationObserver callback");
    } catch (e) {
      parentLog("child: detach failed: " + e);
    }

    // Benign post-detach JS work.
    try {
      target.textContent = "after detach";
    } catch (e) {}

    parentLog("child: MutationObserver callback returning");
  });

  observer.observe(target, { childList: true, characterData: true, subtree: true });

  parentLog("child: mutating target to trigger MutationObserver");
  target.textContent = "trigger";
})();
<\/script>
</body>
`);
  doc.close();

  setTimeout(() => log("MutationObserver test survived timeout"), 2000);
}

function runPerformanceObserverDetach() {
  log("=== PerformanceObserver detach test start ===");
  clearHost();

  const iframe = document.createElement("iframe");
  host.appendChild(iframe);

  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`
<!doctype html>
<meta charset="utf-8">
<body>

<script>
(function() {
  function parentLog(msg) {
    parent.postMessage({ type: "log", msg }, "*");
  }

  parentLog("child: PerformanceObserver test loaded");

  if (!("PerformanceObserver" in window)) {
    parentLog("child FAIL: PerformanceObserver unavailable");
    return;
  }

  let observer;
  try {
    observer = new PerformanceObserver(function(list) {
      parentLog("child: PerformanceObserver callback entered");

      try {
        // Synchronously detach this iframe/document during observer callback.
        if (frameElement)
          frameElement.remove();
        parentLog("child: frameElement.remove() called inside PerformanceObserver callback");
      } catch (e) {
        parentLog("child: detach failed: " + e);
      }

      // Benign post-detach work.
      try {
        performance.mark("after-detach");
      } catch (e) {}

      parentLog("child: PerformanceObserver callback returning");
    });

    observer.observe({ entryTypes: ["mark", "measure"] });

    parentLog("child: creating performance entries");
    performance.mark("a");
    performance.mark("b");
    performance.measure("m", "a", "b");
  } catch (e) {
    parentLog("child FAIL: PerformanceObserver setup failed: " + e);
  }
})();
<\/script>
</body>
`);
  doc.close();

  setTimeout(() => log("PerformanceObserver test survived timeout"), 2000);
}
</script>
