<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CSSFontFace load getter delete diagnostic</title>
</head>
<body>
<pre id="result">running</pre>
<script>
(function () {
    "use strict";

    if (window.testRunner) {
        testRunner.dumpAsText();
        testRunner.waitUntilDone();
    }

    const resultElement = document.getElementById("result");
    const resultLines = [];
    let finished = false;
    let getterHits = 0;
    let deleteRuleExecuted = false;
    let styleElement = null;

    function record(message)
    {
        resultLines.push(message);
        try {
            console.log(message);
        } catch (e) {
        }
    }

    function finish()
    {
        if (finished)
            return;
        finished = true;
        try {
            resultElement.textContent = resultLines.join("\n");
        } catch (e) {
        }
        if (window.testRunner)
            testRunner.notifyDone();
    }

    function makeThenGetter()
    {
        return function () {
            ++getterHits;
            try {
                localStorage.setItem("fface-load-getter-delete", "getter fired " + getterHits);
            } catch (e) {
            }
            console.log("getter fired");
            if (!deleteRuleExecuted) {
                deleteRuleExecuted = true;
                try {
                    if (styleElement && styleElement.sheet && styleElement.sheet.cssRules.length) {
                        styleElement.sheet.deleteRule(0);
                        console.log("deleteRule executed");
                    } else
                        console.log("deleteRule skipped");
                } catch (e) {
                    console.log("deleteRule threw: " + e.name + ": " + e.message);
                }
            }
            return undefined;
        };
    }

    function fail(message)
    {
        record(message);
        record("DONE");
        setTimeout(finish, 0);
    }

    function run()
    {
        record("POC STARTED: CSSFontFace load getter delete diagnostic");

        if (!window.FontFace)
            return fail("FontFace API missing");
        if (!document.fonts)
            return fail("document.fonts missing");

        styleElement = document.createElement("style");
        styleElement.textContent =
            '@font-face {\n' +
            '  font-family: x;\n' +
            '  src: local("DejaVuSans"), local("DejaVu Sans"), local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New");\n' +
            '  unicode-range: U+0042;\n' +
            '}\n';
        document.head.appendChild(styleElement);
        record("dynamic style appended");

        const jsFace = new FontFace(
            "trigger",
            'local("DejaVuSans"), local("DejaVu Sans"), local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New")',
            { unicodeRange: "U+0041" }
        );

        Object.defineProperty(jsFace, "then", {
            configurable: true,
            get: makeThenGetter()
        });

        document.fonts.add(jsFace);

        const loadPromise = document.fonts.load("1em trigger, x", "AB");
        loadPromise.then(function (faces) {
            record("load resolved; faces.length=" + (faces ? faces.length : "null"));
            record("getter hits=" + getterHits);
            record("deleteRule executed=" + deleteRuleExecuted);
            record("DONE");
            setTimeout(finish, 0);
        }, function (error) {
            record("load rejected: " + error);
            record("getter hits=" + getterHits);
            record("deleteRule executed=" + deleteRuleExecuted);
            record("DONE");
            setTimeout(finish, 0);
        });

        setTimeout(function () {
            if (finished)
                return;
            record("load timeout");
            record("getter hits=" + getterHits);
            record("deleteRule executed=" + deleteRuleExecuted);
            record("DONE");
            finish();
        }, 5000);
    }

    window.onerror = function (message, source, line, column)
    {
        record("window.onerror: " + message + " at " + line + ":" + column);
        record("DONE");
        setTimeout(finish, 0);
    };

    setTimeout(run, 0);
})();
</script>
</body>
</html>
