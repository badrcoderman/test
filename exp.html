const logEl = document.getElementById('log');
let results = { critical:0, high:0, medium:0, low:0, total:0 };

function L(msg, cls = 'info') {
  const t = new Date().toTimeString().slice(0,8);
  logEl.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function updateCounts() {
  document.getElementById('countCritical').textContent = `🔴 ${results.critical}`;
  document.getElementById('countHigh').textContent = `🟣 ${results.high}`;
  document.getElementById('countMedium').textContent = `🔵 ${results.medium}`;
  document.getElementById('countTotal').textContent = `🟢 ${results.total}/23`;
}

function result(type, success, msg) {
  const cls = success ? 'ok' : 'err';
  const status = success ? '✅' : '❌';
  L(`[${type}] ${status} ${msg}`, cls);
  if (success) {
    const m = { 'CRITICAL':'critical', 'HIGH':'high', 'MEDIUM':'medium', 'LOW':'low', 'NEW':'critical' };
    const k = m[type] || 'low';
    results[k]++;
  }
  results.total++;
  updateCounts();
}

const wait = ms => new Promise(r => setTimeout(r, ms));

async function testSOPBypassNav() {
  L('── 1️⃣ SOP Bypass (Nav API) ──', 'sep');
  try {
    let w = window.open('about:blank', '_blank', 'width=1,height=1');
    if (w) {
      w.location.href = 'https://example.com';
      await wait(500);
      try {
        let loc = w.location.href;
        result('CRITICAL', true, `قرأنا location: ${loc}`);
      } catch(e) {
        result('CRITICAL', false, 'SOP محمي');
      }
      if (!w.closed) w.close();
    } else {
      result('CRITICAL', false, 'Popup blocker');
    }
  } catch(e) { result('CRITICAL', false, e.message); }
}

async function testSOPBypassPostMsg() {
  L('── 2️⃣ SOP Bypass (postMessage) ──', 'sep');
  try {
    let received = false;
    let iframe = document.createElement('iframe');
    iframe.src = 'about:blank';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    window.addEventListener('message', () => { received = true; });
    await wait(200);
    iframe.contentWindow.postMessage({ test: 1 }, '*');
    await wait(300);
    result('CRITICAL', received, received ? 'postMessage يشتغل' : 'مقيد');
    document.body.removeChild(iframe);
  } catch(e) { result('CRITICAL', false, e.message); }
}

async function testDNSRebinding() {
  L('── 3️⃣ DNS Rebinding ──', 'sep');
  let found = 0;
  for (let i = 1; i < 10; i++) {
    let ip = `192.168.1.${i}`;
    let img = new Image();
    img.onload = () => { found++; L(`[+] ${ip} متاح`, 'ok'); };
    img.src = `http://${ip}:80/test.png?${Date.now()}`;
  }
  await wait(3000);
  result('CRITICAL', found > 0, `${found} أجهزة مكشوفة`);
}

async function testSSRF() {
  L('── 4️⃣ SSRF Scan ──', 'sep');
  let open = [];
  for (let port of [80, 443, 8080, 22]) {
    let img = new Image();
    await new Promise(r => {
      img.onload = () => { open.push(port); r(); };
      img.onerror = () => r();
      img.src = `http://127.0.0.1:${port}/?${Date.now()}`;
    });
  }
  result('CRITICAL', open.length > 0, `${open.length} منافذ مفتوحة`);
}

async function testWebRTCIPLeak() {
  L('── 1️⃣5️⃣ WebRTC IP Leak ──', 'sep');
  if (typeof RTCPeerConnection === 'undefined') { result('CRITICAL', false, 'غير مدعوم'); return; }
  try {
    let pc = new RTCPeerConnection({ iceServers: [] });
    pc.createDataChannel('');
    let ips = [];
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        let m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/);
        if (m && !ips.includes(m[0])) { ips.push(m[0]); L(`IP: ${m[0]}`, 'ok'); }
      }
    };
    await pc.createOffer().then(o => pc.setLocalDescription(o));
    await wait(2000);
    pc.close();
    result('CRITICAL', ips.length > 0, `${ips.length} IP مكشوف`);
  } catch(e) { result('CRITICAL', false, e.message); }
}

async function testCredentialTheft() {
  L('── 1️⃣6️⃣ Credential Theft ──', 'sep');
  try {
    await fetch('https://example.com', { credentials: 'include', mode: 'no-cors' });
    result('HIGH', true, 'يمكن إرسال كوكيز');
  } catch(e) { result('HIGH', false, 'مقيد'); }
}

async function testPortScan() {
  L('── 1️⃣7️⃣ Port Scan ──', 'sep');
  let open = [];
  for (let p of [80, 443, 8080]) {
    try {
      let ws = new WebSocket(`ws://127.0.0.1:${p}`);
      await new Promise(r => { ws.onopen = () => { open.push(p); ws.close(); r(); }; ws.onerror = () => r(); setTimeout(r, 500); });
    } catch(e) {}
  }
  result('HIGH', open.length > 0, `${open.length} منافذ مفتوحة`);
}

async function testMemoryProbe() {
  L('── 1️⃣8️⃣ Memory Probe ──', 'sep');

  L(`Memory: ${navigator.deviceMemory || '?'} GB`, 'info');
  L(`Platform: ${navigator.platform}`, 'info');
  result('LOW', true, 'معلومات الجهاز مسربة');
}
