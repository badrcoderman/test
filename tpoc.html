<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PS5 localStorage log viewer</title>
<style>
body {
    background: #101010;
    color: #eee;
    font-family: system-ui, sans-serif;
    padding: 16px;
}
pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #050505;
    color: #d7ffd7;
    padding: 12px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
}
button {
    font-size: 18px;
    padding: 10px 14px;
    margin: 8px 8px 8px 0;
}
</style>
</head>
<body>

<h1>PS5 localStorage log viewer</h1>

<button onclick="loadLogs()">Reload logs</button>
<button onclick="clearLogs()">Clear shown CSSFontFace logs</button>

<h2>Detected logs</h2>
<pre id="out">loading...</pre>

<script>
function loadLogs() {
    const out = document.getElementById("out");
    let text = "";

    try {
        text += "location.href:\n" + location.href + "\n\n";
        text += "location.hash:\n" + location.hash + "\n\n";

        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);

            if (
                key.indexOf("cssfontface") !== -1 ||
                key.indexOf("CSSFontFace") !== -1 ||
                key.indexOf("font") !== -1 ||
                key.indexOf("Font") !== -1
            ) {
                text += "===== KEY: " + key + " =====\n";
                text += localStorage.getItem(key) + "\n\n";
            }
        }

        if (!text.trim())
            text = "No matching localStorage logs found.";
    } catch (e) {
        text = "ERROR reading localStorage: " + e.name + ": " + e.message;
    }

    out.textContent = text;
}

function clearLogs() {
    try {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (
                key.indexOf("cssfontface") !== -1 ||
                key.indexOf("CSSFontFace") !== -1 ||
                key.indexOf("font") !== -1 ||
                key.indexOf("Font") !== -1
            ) {
                keys.push(key);
            }
        }

        for (const key of keys)
            localStorage.removeItem(key);

        loadLogs();
    } catch (e) {
        document.getElementById("out").textContent =
            "ERROR clearing logs: " + e.name + ": " + e.message;
    }
}

loadLogs();
</script>

</body>
</html>
