<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('leak_test');

// مصفوفة لنخزن فيها القيم المسربة
let leaked_array = new Float64Array(4);
leaked_array[0] = 1.1;
leaked_array[1] = 2.2;

// دالة سيستدعيها المحرك، وستقوم بتخزين قيمة في leaked_array
let trap = function() {
    // حاول قراءة this أو أي معلومة داخلية
    try {
        leaked_array[2] = this + 0; // قد يسبب خطأ但不crash
    } catch(e) {
        leaked_array[2] = 3.3;
    }
};

try {
    Array.prototype[Symbol.iterator] = function() {
        const a = this;
        let i = 0;
        return {
            next() {
                if (i >= a.length) return { done: true };
                let v = a[i];
                if (a.length === 3 && i >= 1) {
                    v = trap;
                }
                i++;
                return { value: v, done: false };
            }
        };
    };

    new TransformStream();
    
    // إذا وصلنا هنا، trap تم استدعاؤه
    let result = "";
    for (let j = 0; j < 4; j++) {
        result += leaked_array[j] + " | ";
    }
    localStorage.setItem('leak_test', 'SUCCESS: ' + result);
    
} catch(e) {
    localStorage.setItem('leak_test', 'CAUGHT: ' + e.message);
}

Array.prototype[Symbol.iterator] = [][Symbol.iterator];
document.getElementById("s").textContent = "Done.";
</script>
</body>
</html>
