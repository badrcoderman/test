<!DOCTYPE html>
<html>
<head>
<style>
body{background:#000;color:#0f0;font-family:monospace;font-size:13px;padding:8px}
.log{white-space:pre-wrap;word-break:break-all}
.ok{color:#0f0}.err{color:#f00}.warn{color:#ff0}.info{color:#0ff}.hit{color:#f0f;font-weight:bold}
</style>
</head>
<body>
<div id="log"></div>
<script>
function log(m,c){var d=document.createElement("div");d.className=c||'log';d.textContent=m;document.getElementById("log").appendChild(d)}

log("=== GETTER TRAP TEST ===","info");
log("");

let phase=0;
let buf=new ArrayBuffer(64);
let view=new DataView(buf);
let calls=[];

// كائن مع getter - عند قراءة أي خاصية، يسجل الاستدعاء
let trap=new Proxy({},{
    get:function(target,prop,receiver){
        calls.push(prop.toString());
        // أعد قيمة 0 - لا تسبب crash
        return 0;
    }
});

try{
    Array.prototype[Symbol.iterator]=function(){
        const a=this;
        let i=0;
        return{
            next(){
                if(i>=a.length)return{done:true};
                let v=a[i];
                if(a.length===3&&i>=1){
                    v=trap;
                }
                i++;
                return{value:v,done:false};
            }
        }
    };

    new TransformStream();
    log("NO CRASH!","ok");
    log("Properties read: "+calls.join(", "),"warn");
    log("Count: "+calls.length,"warn");

}catch(e){
    log("CAUGHT: "+e.message,"warn");
    log("Properties read before crash: "+calls.join(", "),"warn");
    log("Count: "+calls.length,"warn");
}

Array.prototype[Symbol.iterator]=[][Symbol.iterator];
log("","info");
log("=== DONE ===","info");
</script>
</body>
</html>
