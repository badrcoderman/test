<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

const sheet = new CSSStyleSheet();
try {
    sheet.insertRule(`@font-face { font-family: "test"; src: local(3.544848e-304); }`);
    L('[+] Rule accepted — parser confused!');
    L('  cssRules: ' + sheet.cssRules.length);
    if (sheet.cssRules.length > 0) {
        L('  src: ' + sheet.cssRules[0].style.getPropertyValue('src'));
    }
} catch(e) {
    L('[!] Rule REJECTED: ' + e.message);
    L('[*] CSSParser correctly validates token types.');
}
</script>
</body>
</html>
