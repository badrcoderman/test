<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('proxy_log');
localStorage.setItem('proxy_log', 'START');

let log = [];
let handler = {
    get: function(target, prop, receiver) {
        log.push(prop.toString());
        // إذا طلب خاصية، أعطه قيمة عشوائية لمعرفة ماذا سيفعل بها
        return 0x41414141;
    }
};
let p = new Proxy({}, handler);

try {
    Array.prototype[Symbol.iterator] = function() {
        const a = this;
        let i = 0;
        return {
            next() {
                if (i >= a.length) return { done: true };
                let v = a[i];
                if (a.length === 3 && i >= 1) {
                    // سجل كل خاصية يقرأها المحرك
                    v = p;
                }
                i++;
                return { value: v, done: false };
            }
        };
    };

    new TransformStream();
    localStorage.setItem('proxy_log', log.join(','));
    localStorage.setItem('proxy_result', 'NO_CRASH');
    
} catch(e) {
    localStorage.setItem('proxy_log', log.join(','));
    localStorage.setItem('proxy_result', 'CRASH_OR_CAUGHT');
}

Array.prototype[Symbol.iterator] = [][Symbol.iterator];
document.getElementById("s").textContent = "Done.";
</script>
</body>
</html>
