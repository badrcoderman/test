<!DOCTYPE html>
<html>
<body>
<button onclick="test()">اختبار: FontFaceSet forEach Reentrancy</button>
<pre id="log"></pre>
<script>
function log(m) { document.getElementById('log').textContent += m + '\n'; }

function test() {
    log('=== FontFaceSet.forEach Reentrancy Test ===');

    // أنشئ FontFaces كثيرة
    var faces = [];
    for (var i = 0; i < 100; i++) {
        var f = new FontFace('test' + i, 'local(Arial)', { unicodeRange: 'U+0041' });
        document.fonts.add(f);
        faces.push(f);
    }
    log('[*] تم إنشاء ' + faces.length + ' FontFace');

    var callCount = 0;
    var leaked = [];

    document.fonts.forEach(function(face, key, set) {
        callCount++;

        if (callCount === 50) {
            log('[*] حذف FontFaces أثناء forEach...');
            // احذف نصف الـ FontFaces
            for (var i = 0; i < 50; i++) {
                document.fonts.delete(faces[i]);
            }
            log('[*] تم حذف 50 FontFace');
        }

        if (callCount >= 50 && callCount <= 55) {
            // سجّل ما نقرأ بعد الحذف
            log('[!] call=' + callCount + ' family=' + face.family + ' weight=' + face.weight);
            leaked.push({ call: callCount, face: face });
        }
    });

    log('[*] إجمالي الاستدعاءات: ' + callCount);
    log('[*] القيم بعد الحذف:');
    leaked.forEach(function(l) {
        try {
            log('  call=' + l.call + ' family=' + l.face.family + ' status=' + l.face.status);
        } catch(e) {
            log('  call=' + l.call + ' ERROR: ' + e.message);
            log('  *** UAF DETECTED — Face已被freed! ***');
        }
    });

    // تنظيف
    faces.forEach(function(f) { try { document.fonts.delete(f); } catch(e) {} });

    log('=== انتهى ===');
}
</script>
</body>
</html>
