<!DOCTYPE html>
<html>
<body>
<button onclick="test()">اختبار: Sort Reentrancy</button>
<pre id="log"></pre>
<script>
function log(m) { document.getElementById('log').textContent += m + '\n'; }

function test() {
    log('=== Array.sort Reentrancy Test ===');

    // أنشئ مصفوفة كبيرة
    var arr = [];
    for (var i = 0; i < 1000; i++) arr.push(i);

    var callCount = 0;
    var leaked = [];

    arr.sort(function(a, b) {
        callCount++;
        if (callCount === 500) {
            // في منتصف الـ sort: عدّل المصفوفة
            log('[*] تعديل المصفوفة أثناء sort (call #' + callCount + ')');

            // احذف نصف العناصر
            arr.length = 500;
            log('[*] arr.length = ' + arr.length);

            // أضف عناصر جديدة
            for (var i = 0; i < 500; i++) arr.push(Math.random());
            log('[*] arr.length بعد الإضافة = ' + arr.length);
        }

        if (callCount === 501 || callCount === 502) {
            // سجلّ القيم بعد التعديل — هل نقرأ ذاكرة محررة؟
            leaked.push({ call: callCount, a: a, b: b });
            log('[!] call=' + callCount + ' a=' + a + ' b=' + b);
        }

        return a - b;
    });

    log('[*] إجمالي الاستدعاءات: ' + callCount);
    log('[*] القيم المسربة بعد التعديل:');
    leaked.forEach(function(l) {
        log('  call=' + l.call + ' a=' + l.a + ' b=' + l.b);
        // لو a أو b = NaN أو رقم ضخم أو سالب → 可能 مسرب ذاكرة
        if (isNaN(l.a) || isNaN(l.b)) log('  *** NaN DETECTED — possible leak! ***');
        if (Math.abs(l.a) > 1e15 || Math.abs(l.b) > 1e15) log('  *** LARGE VALUE — possible pointer! ***');
    });

    log('=== انتهى ===');
}
</script>
</body>
</html>
