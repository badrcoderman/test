<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CSSFontFace load no-check diagnostic</title>
<style>
html { font-family: system-ui, -apple-system, sans-serif; background:#111; color:#eee; }
body { margin:0; padding:16px; line-height:1.45; }
button { font:inherit; padding:10px 14px; margin:4px 8px 10px 0; }
.box { border:1px solid #444; border-radius:8px; padding:12px; margin:12px 0; background:#181818; }
.warn { color:#ffd479; }
#stage { font-size:21px; font-weight:700; }
#probe { position:absolute; left:-10000px; top:-10000px; }
#log, #previous {
    white-space:pre-wrap;
    word-break:break-word;
    background:#050505;
    color:#d7ffd7;
    padding:12px;
    border-radius:8px;
    min-height:150px;
    font-family:ui-monospace, Menlo, Consolas, monospace;
    font-size:13px;
}
</style>
</head>
<body>

<h1>CSSFontFace load no-check diagnostic</h1>

<div class="box warn">
Validation only. No heap spray, no exploit primitives, no ARW/addrof/fakeobj, no shellcode, no ROP/JOP.
This version removes document.fonts.check before load.
</div>

<div class="box">
    <div id="stage">Stage: ready</div>
    <button id="run-local">Run local CSS face</button>
    <button id="run-missing">Run missing CSS face</button>
    <button id="run-proto">Run prototype getter local</button>
    <button id="clear">Clear logs</button>
    <div id="probe">AB</div>
</div>

<div class="box">
    <h3>Current log</h3>
    <pre id="log"></pre>
</div>

<div class="box">
    <h3>Previous persisted log</h3>
    <pre id="previous"></pre>
</div>

<script>
(function () {
    "use strict";

    const STORAGE_KEY = "cssfontface-no-check-log";
    const logElement = document.getElementById("log");
    const previousElement = document.getElementById("previous");
    const stageElement = document.getElementById("stage");
    const probe = document.getElementById("probe");

    let seq = 0;
    let runId = 0;
    let active = null;
    let createdFaces = [];

    function now() {
        return new Date().toISOString();
    }

    function saveLine(line) {
        try {
            let old = localStorage.getItem(STORAGE_KEY) || "";
            old += line + "\n";

            /* keep persisted log small */
            const lines = old.split("\n");
            if (lines.length > 120)
                old = lines.slice(lines.length - 120).join("\n");

            localStorage.setItem(STORAGE_KEY, old);
        } catch (e) {
        }
    }

    function log(msg) {
        const line = "[" + (++seq) + "] " + now() + " :: " + msg;
        logElement.textContent += line + "\n";
        saveLine(line);
        try { console.log(line); } catch (e) {}
    }

    function stage(msg) {
        stageElement.textContent = "Stage: " + msg;
        log("STAGE => " + msg);
    }

    function clearLogs() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        seq = 0;
        logElement.textContent = "";
        previousElement.textContent = "";
        stage("logs cleared");
    }

    function loadPrevious() {
        try {
            previousElement.textContent = localStorage.getItem(STORAGE_KEY) || "";
        } catch (e) {
            previousElement.textContent = "localStorage unavailable";
        }
    }

    window.onerror = function (message, source, line, col, error) {
        log("window.onerror: " + message + " at " + line + ":" + col);
        if (error && error.stack)
            log("stack: " + error.stack);
    };

    window.onunhandledrejection = function (event) {
        log("unhandledrejection: " + event.reason);
    };

    window.addEventListener("beforeunload", function () {
        log("beforeunload");
    });

    function cleanup() {
        const oldStyles = document.querySelectorAll("style[data-cssfontface-test='1']");
        for (const s of oldStyles)
            s.remove();

        if (document.fonts) {
            for (const face of createdFaces) {
                try { document.fonts.delete(face); } catch (e) {}
            }
        }

        createdFaces = [];
        probe.style.fontFamily = "";
        probe.textContent = "AB";
        active = null;
    }

    function cssRuleCount(styleElement) {
        try {
            if (!styleElement || !styleElement.sheet)
                return "no-sheet";
            return styleElement.sheet.cssRules.length;
        } catch (e) {
            return "throws:" + e.name;
        }
    }

    function createStyle(family, variant) {
        const style = document.createElement("style");
        style.setAttribute("data-cssfontface-test", "1");

        let src;
        if (variant === "missing") {
            src = 'url("missing-font-' + Date.now() + '.woff") format("woff")';
        } else {
            src = 'local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New")';
        }

        style.textContent =
            '@font-face {\n' +
            '  font-family: "' + family + '";\n' +
            '  src: ' + src + ';\n' +
            '  unicode-range: U+0042;\n' +
            '}\n';

        document.head.appendChild(style);
        return style;
    }

    function forceRecalc(label) {
        try {
            const a = document.body.offsetTop;
            const b = probe.offsetWidth;
            const c = getComputedStyle(probe).fontFamily;
            log(label + ": recalc ok; offsetTop=" + a + ", probeWidth=" + b + ", fontFamily=" + c);
        } catch (e) {
            log(label + ": recalc threw " + e.name + ": " + e.message);
        }
    }

    function mutateFromGetter(label) {
        if (!active)
            return;

        active.reentered = true;
        active.reentryCount++;

        stage("RE-ENTRY FIRED");
        log("THEN GETTER FIRED from " + label);
        log("before deleteRule: cssRules=" + cssRuleCount(active.styleElement));

        try {
            const sheet = active.styleElement.sheet;
            const before = sheet.cssRules.length;

            if (before > 0) {
                sheet.deleteRule(0);
                log("deleteRule(0) executed");
            } else {
                log("deleteRule skipped: cssRules=0");
            }
        } catch (e) {
            log("deleteRule threw: " + e.name + ": " + e.message);
        }

        log("after deleteRule: cssRules=" + cssRuleCount(active.styleElement));
        forceRecalc("inside then getter");
    }

    function makeGetter(label) {
        return function () {
            log("then getter property read: " + label + ", armed=" + !!(active && active.armed));

            if (active && active.armed)
                mutateFromGetter(label);

            return undefined;
        };
    }

    function withTimeout(promise, ms) {
        return new Promise(function (resolve) {
            let done = false;

            const timer = setTimeout(function () {
                if (done)
                    return;
                done = true;
                resolve({ type: "timeout" });
            }, ms);

            promise.then(function (value) {
                if (done)
                    return;
                done = true;
                clearTimeout(timer);
                resolve({ type: "resolved", value: value });
            }, function (error) {
                if (done)
                    return;
                done = true;
                clearTimeout(timer);
                resolve({ type: "rejected", error: error });
            });
        });
    }

    function createJSFace(family) {
        const face = new FontFace(
            family,
            'local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New")',
            { unicodeRange: "U+0041" }
        );

        createdFaces.push(face);
        return face;
    }

    async function runTest(mode, variant) {
        cleanup();
        runId++;

        if (!window.FontFace) {
            stage("FontFace missing");
            log("FontFace API missing");
            return;
        }

        if (!document.fonts) {
            stage("document.fonts missing");
            log("document.fonts missing");
            return;
        }

        const family = "ps5-nocheck-" + mode + "-" + variant + "-" + Date.now() + "-" + runId;
        const styleElement = createStyle(family, variant);

        probe.style.fontFamily = '"' + family + '"';
        probe.textContent = "AB";

        active = {
            family: family,
            styleElement: styleElement,
            armed: false,
            reentered: false,
            reentryCount: 0
        };

        let oldProtoDesc = null;
        let protoChanged = false;

        try {
            stage("setup " + mode + " + " + variant);
            log("family=" + family);
            log("initial cssRules=" + cssRuleCount(styleElement));
            log("initial document.fonts.size=" + document.fonts.size);

            if (mode === "prototype") {
                oldProtoDesc = Object.getOwnPropertyDescriptor(FontFace.prototype, "then");
                Object.defineProperty(FontFace.prototype, "then", {
                    configurable: true,
                    get: makeGetter("FontFace.prototype.then")
                });
                protoChanged = true;
                log("installed getter on FontFace.prototype.then");
            }

            const jsFace = createJSFace(family);
            log("created JS FontFace; status=" + jsFace.status);

            if (mode === "own") {
                Object.defineProperty(jsFace, "then", {
                    configurable: true,
                    get: makeGetter("jsFace.then")
                });
                log("installed own getter on jsFace.then");
            }

            log('"then" in jsFace=' + ("then" in jsFace));
            log("own then descriptor=" + !!Object.getOwnPropertyDescriptor(jsFace, "then"));
            log("prototype then descriptor=" + !!Object.getOwnPropertyDescriptor(FontFace.prototype, "then"));

            /*
              Important:
              Create jsFace.loaded before document.fonts.load.
              This is what made direct jsFace.load read the then getter on your PS5.
            */
            const loadedPromise = jsFace.loaded;
            log("accessed jsFace.loaded; status=" + jsFace.status);

            loadedPromise.then(function (value) {
                log("jsFace.loaded resolved; valueIsFace=" + (value === jsFace) + ", status=" + jsFace.status);
            }, function (error) {
                log("jsFace.loaded rejected: " + error + ", status=" + jsFace.status);
            });

            document.fonts.add(jsFace);
            log("added JS face; document.fonts.size=" + document.fonts.size);

            //forceRecalc("before document.fonts.load");

            active.armed = true;
            stage("calling document.fonts.load");

            const p = document.fonts.load('16px "' + family + '"', "AB");
            log("document.fonts.load returned Promise");

            const result = await withTimeout(p, 7000);

            active.armed = false;

            if (result.type === "resolved") {
                const faces = result.value;
                log("document.fonts.load resolved; faces.length=" + (faces && faces.length));

                if (faces && faces.length) {
                    for (let i = 0; i < faces.length; i++)
                        log("returned face[" + i + "].status=" + faces[i].status + ", sameAsJSFace=" + (faces[i] === jsFace));
                }
            } else if (result.type === "rejected") {
                log("document.fonts.load rejected: " + result.error);
            } else {
                log("document.fonts.load timed out");
            }

            forceRecalc("after document.fonts.load");

            log("final cssRules=" + cssRuleCount(styleElement));
            log("final document.fonts.size=" + document.fonts.size);
            log("final reentered=" + active.reentered + ", reentryCount=" + active.reentryCount);

            if (active.reentered && cssRuleCount(styleElement) === 0)
                stage("RE-ENTRY + deleteRule reached");
            else if (active.reentered)
                stage("RE-ENTRY reached, deleteRule not confirmed");
            else
                stage("NO RE-ENTRY");

        } catch (e) {
            active.armed = false;
            stage("exception");
            log("exception: " + e.name + ": " + e.message);
            if (e.stack)
                log("stack: " + e.stack);
        } finally {
            active.armed = false;

            if (protoChanged) {
                try {
                    if (oldProtoDesc)
                        Object.defineProperty(FontFace.prototype, "then", oldProtoDesc);
                    else
                        delete FontFace.prototype.then;

                    log("restored FontFace.prototype.then");
                } catch (e) {
                    log("restore prototype threw: " + e.name + ": " + e.message);
                }
            }
        }
    }

    document.getElementById("run-local").onclick = function () {
        runTest("own", "local");
    };

    document.getElementById("run-missing").onclick = function () {
        runTest("own", "missing");
    };

    document.getElementById("run-proto").onclick = function () {
        runTest("prototype", "local");
    };

    document.getElementById("clear").onclick = clearLogs;

    loadPrevious();
    stage("ready");
})();
</script>

</body>
</html>
