<!doctype html>
<meta charset="utf-8">
<pre id="log"></pre>
<script>
const out = document.getElementById("log");

function log(x) {
  out.textContent += x + "\n";
}

function runCase(name, initialCSS, rule, index) {
  log("==== " + name + " ====");
  const style = document.createElement("style");
  style.textContent = initialCSS;
  document.head.appendChild(style);

  const sheet = style.sheet;
  log("before cssRules.length = " + sheet.cssRules.length);

  try {
    log("calling insertRule at index " + index);
    sheet.insertRule(rule, index);
    log("OK: after cssRules.length = " + sheet.cssRules.length);
  } catch (e) {
    log("Exception: " + e.name + ": " + e.message);
  }

  style.remove();
}

log("CSS insertRule namespace diagnostic start");

runCase(
  "baseline namespace at 0",
  "",
  "@namespace foo url(http://example.com);",
  0
);

runCase(
  "one import then namespace at 1",
  '@import url("data:text/css,body{}");',
  "@namespace foo url(http://example.com);",
  1
);

runCase(
  "five imports then namespace at 5",
  Array.from({length: 5}, (_, i) => '@import url("data:text/css,body{}?' + i + '");').join("\n"),
  "@namespace foo url(http://example.com);",
  5
);

runCase(
  "normal rule then namespace should fail safely",
  "body { color: red; }",
  "@namespace foo url(http://example.com);",
  1
);

log("DONE");
</script>
