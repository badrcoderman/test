<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PS5 FontFace Repeat OOM Test</title>
<style>
html {
    font-family: system-ui, -apple-system, sans-serif;
    background: #111;
    color: #eee;
}
body {
    margin: 0;
    padding: 16px;
    line-height: 1.45;
}
button, input, select {
    font: inherit;
    padding: 9px 12px;
    margin: 4px 8px 10px 0;
}
input {
    width: 80px;
}
.box {
    border: 1px solid #444;
    border-radius: 8px;
    padding: 12px;
    margin: 12px 0;
    background: #181818;
}
.warn {
    color: #ffd479;
}
.ok {
    color: #98f598;
}
.bad {
    color: #ff8f8f;
}
#stage {
    font-size: 22px;
    font-weight: 700;
}
#probe {
    position: absolute;
    left: -10000px;
    top: -10000px;
}
#log, #previous {
    white-space: pre-wrap;
    word-break: break-word;
    background: #050505;
    color: #d7ffd7;
    padding: 12px;
    border-radius: 8px;
    min-height: 160px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
}
</style>
</head>
<body>

<h1>PS5 FontFace Repeat OOM Test</h1>

<div class="box warn">
Validation-only test. No exploit primitives, no heap spray, no ARW/addrof/fakeobj, no shellcode, no ROP/JOP.
Goal: check whether repeated FontFace setup/check/recalc causes reproducible PS5 WebKit OOM.
</div>

<div class="box">
    <div id="stage">Stage: ready</div>

    <label>Iterations:</label>
    <input id="iterations" type="number" min="1" max="200" value="25">

    <label>Delay ms:</label>
    <input id="delay" type="number" min="0" max="5000" value="250">

    <br>

    <button id="run-add">Run repeat: add only</button>
    <button id="run-check">Run repeat: fonts.check</button>
    <button id="run-recalc">Run repeat: style recalc</button>
    <button id="run-mixed">Run repeat: mixed</button>
    <button id="stop">Stop</button>
    <button id="clear">Clear logs</button>

    <div id="probe">AB</div>
</div>

<div class="box">
    <h3>Current log</h3>
    <pre id="log"></pre>
</div>

<div class="box">
    <h3>Previous persisted log</h3>
    <pre id="previous"></pre>
</div>

<script>
(function () {
    "use strict";

    const STORAGE_KEY = "ps5-fontface-repeat-oom-log";

    const stageElement = document.getElementById("stage");
    const logElement = document.getElementById("log");
    const previousElement = document.getElementById("previous");
    const probe = document.getElementById("probe");

    const iterationsInput = document.getElementById("iterations");
    const delayInput = document.getElementById("delay");

    let seq = 0;
    let runId = 0;
    let running = false;
    let stopRequested = false;
    let faces = [];

    function now() {
        return new Date().toISOString();
    }

    function save(line) {
        try {
            let old = localStorage.getItem(STORAGE_KEY) || "";
            old += line + "\n";

            const lines = old.split("\n");
            if (lines.length > 160)
                old = lines.slice(lines.length - 160).join("\n");

            localStorage.setItem(STORAGE_KEY, old);
        } catch (e) {
        }
    }

    function log(message) {
        const line = "[" + (++seq) + "] " + now() + " :: " + message;
        logElement.textContent += line + "\n";
        save(line);

        try {
            console.log(line);
        } catch (e) {
        }
    }

    function stage(message) {
        stageElement.textContent = "Stage: " + message;
        log("STAGE => " + message);
    }

    function sleep(ms) {
        return new Promise(function (resolve) {
            setTimeout(resolve, ms);
        });
    }

    function clearLogs() {
        try {
            localStorage.removeItem(STORAGE_KEY);
        } catch (e) {
        }

        seq = 0;
        logElement.textContent = "";
        previousElement.textContent = "";
        stage("logs cleared");
    }

    function loadPrevious() {
        try {
            previousElement.textContent = localStorage.getItem(STORAGE_KEY) || "";
        } catch (e) {
            previousElement.textContent = "localStorage unavailable";
        }
    }

    window.onerror = function (message, source, line, col, error) {
        log("window.onerror: " + message + " at " + line + ":" + col);

        if (error && error.stack)
            log("stack: " + error.stack);
    };

    window.onunhandledrejection = function (event) {
        log("unhandledrejection: " + event.reason);
    };

    window.addEventListener("beforeunload", function () {
        log("beforeunload");
    });

    function cleanup() {
        const oldStyles = document.querySelectorAll("style[data-ps5-repeat-fontface='1']");

        for (const style of oldStyles)
            style.remove();

        if (document.fonts) {
            for (const face of faces) {
                try {
                    document.fonts.delete(face);
                } catch (e) {
                }
            }
        }

        faces = [];
        probe.style.fontFamily = "";
        probe.textContent = "AB";
    }

    function cssRuleCount(styleElement) {
        try {
            if (!styleElement || !styleElement.sheet)
                return "no-sheet";

            return styleElement.sheet.cssRules.length;
        } catch (e) {
            return "throws:" + e.name;
        }
    }

    function createStyle(family) {
        const style = document.createElement("style");
        style.setAttribute("data-ps5-repeat-fontface", "1");

        style.textContent =
            '@font-face {\n' +
            '  font-family: "' + family + '";\n' +
            '  src: local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New");\n' +
            '  unicode-range: U+0042;\n' +
            '}\n';

        document.head.appendChild(style);
        return style;
    }

    function createJSFace(family) {
        const face = new FontFace(
            family,
            'local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New")',
            { unicodeRange: "U+0041" }
        );

        faces.push(face);
        return face;
    }

    function setupOneCycle(iteration) {
        cleanup();

        const family = "ps5-repeat-" + Date.now() + "-" + runId + "-" + iteration;

        const styleElement = createStyle(family);
        const jsFace = createJSFace(family);

        probe.style.fontFamily = '"' + family + '"';
        probe.textContent = "AB";

        document.fonts.add(jsFace);

        return {
            family: family,
            styleElement: styleElement,
            jsFace: jsFace
        };
    }

    function doFontsCheck(ctx) {
        const a = document.fonts.check('16px "' + ctx.family + '"', "A");
        const b = document.fonts.check('16px "' + ctx.family + '"', "B");
        const ab = document.fonts.check('16px "' + ctx.family + '"', "AB");

        return "check A=" + a + ", B=" + b + ", AB=" + ab;
    }

    function doStyleRecalc(ctx) {
        const offsetTop = document.body.offsetTop;
        const width = probe.offsetWidth;
        const fontFamily = getComputedStyle(probe).fontFamily;

        return "recalc offsetTop=" + offsetTop + ", width=" + width + ", fontFamily=" + fontFamily;
    }

    async function runRepeat(mode) {
        if (running) {
            log("ignored: a test is already running");
            return;
        }

        if (!window.FontFace) {
            stage("FontFace API missing");
            log("FontFace API missing");
            return;
        }

        if (!document.fonts) {
            stage("document.fonts missing");
            log("document.fonts missing");
            return;
        }

        running = true;
        stopRequested = false;
        runId++;

        const iterations = Math.max(1, Math.min(200, Number(iterationsInput.value) || 25));
        const delayMs = Math.max(0, Math.min(5000, Number(delayInput.value) || 250));

        stage("starting repeat mode=" + mode);
        log("runId=" + runId + ", mode=" + mode + ", iterations=" + iterations + ", delayMs=" + delayMs);
        log("initial document.fonts.size=" + document.fonts.size);

        try {
            for (let i = 1; i <= iterations; i++) {
                if (stopRequested) {
                    stage("stopped at iteration " + i);
                    break;
                }

                stage("iteration " + i + "/" + iterations + " mode=" + mode);

                const ctx = setupOneCycle(i);

                log("iteration " + i + ": setup ok; cssRules=" + cssRuleCount(ctx.styleElement) + ", document.fonts.size=" + document.fonts.size);

                if (mode === "add") {
                    log("iteration " + i + ": add-only completed");
                } else if (mode === "check") {
                    log("iteration " + i + ": before fonts.check");
                    const result = doFontsCheck(ctx);
                    log("iteration " + i + ": " + result);
                } else if (mode === "recalc") {
                    log("iteration " + i + ": before style recalc");
                    const result = doStyleRecalc(ctx);
                    log("iteration " + i + ": " + result);
                } else if (mode === "mixed") {
                    log("iteration " + i + ": before fonts.check");
                    const checkResult = doFontsCheck(ctx);
                    log("iteration " + i + ": " + checkResult);

                    log("iteration " + i + ": before style recalc");
                    const recalcResult = doStyleRecalc(ctx);
                    log("iteration " + i + ": " + recalcResult);
                }

                cleanup();
                log("iteration " + i + ": cleanup done; document.fonts.size=" + document.fonts.size);

                await sleep(delayMs);
            }

            cleanup();
            stage("completed repeat mode=" + mode);
            log("completed; final document.fonts.size=" + document.fonts.size);
        } catch (e) {
            stage("exception");
            log("exception: " + e.name + ": " + e.message);

            if (e.stack)
                log("stack: " + e.stack);
        } finally {
            running = false;
            stopRequested = false;
        }
    }

    document.getElementById("run-add").onclick = function () {
        runRepeat("add");
    };

    document.getElementById("run-check").onclick = function () {
        runRepeat("check");
    };

    document.getElementById("run-recalc").onclick = function () {
        runRepeat("recalc");
    };

    document.getElementById("run-mixed").onclick = function () {
        runRepeat("mixed");
    };

    document.getElementById("stop").onclick = function () {
        stopRequested = true;
        log("stop requested");
    };

    document.getElementById("clear").onclick = clearLogs;

    loadPrevious();
    stage("ready");
})();
</script>

</body>
</html>
