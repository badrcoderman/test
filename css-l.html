<!DOCTYPE html>

<div id="s">Running...</div>
<script>
localStorage.removeItem('prop_test');

function testProp(propName, propValue) {
    try {
        Array.prototype[Symbol.iterator] = function() {
            const a = this;
            let i = 0;
            return {
                next() {
                    if (i >= a.length) return { done: true };
                    let v = a[i];
                    if (a.length === 3 && i >= 1) {
                        let obj = {};
                        obj[propName] = propValue;
                        v = obj;
                    }
                    i++;
                    return { value: v, done: false };
                }
            };
        };
        new TransformStream();
        return 'NO_CRASH';
    } catch(e) {
        return 'CAUGHT';
    } finally {
        Array.prototype[Symbol.iterator] = [][Symbol.iterator];
    }
}

// 1. اختبار خاصية size
let r1 = testProp('size', 0x41414141);
localStorage.setItem('prop_test', 'size: ' + r1);

// 2. اختبار خاصية highWaterMark

localStorage.setItem('prop_test', localStorage.getItem('prop_test') + ' | hwm: ' + r2);

document.getElementById("s").textContent = "Done. Check localStorage.";
