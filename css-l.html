<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('uaf_result');
localStorage.removeItem('uaf_data');

let buf = new ArrayBuffer(8);
let view = new DataView(buf);
let writer;

let sizeFunc = function(chunk) {
    // 1. سجل أننا داخل الدالة
    view.setFloat64(0, 1.1, true);
    
    // 2. حاول إغلاق الـ Stream أثناء التنفيذ!
    try {
        writer.close();
    } catch(e) {}
    
    // 3. حاول إعادة الكتابة لترى إذا كنا ما زلنا نعمل
    view.setFloat64(0, 2.2, true);
    
    return 1;
};

try {
    let stream = new TransformStream(
        { transform: (c, ctrl) => ctrl.enqueue(c) },
        { highWaterMark: 1, size: sizeFunc },
        { highWaterMark: 1, size: sizeFunc }
    );
    
    writer = stream.writable.getWriter();
    
    // اكتب chunk لتشغيل size()
    writer.write("test").then(() => {
        let hex = "";
        for (let i = 0; i < 8; i++) {
            hex += view.getUint8(i).toString(16).padStart(2,'0') + " ";
        }
        localStorage.setItem('uaf_result', 'WRITE_OK');
        localStorage.setItem('uaf_data', hex);
    }).catch((e) => {
        let hex = "";
        for (let i = 0; i < 8; i++) {
            hex += view.getUint8(i).toString(16).padStart(2,'0') + " ";
        }
        localStorage.setItem('uaf_result', 'WRITE_ERR: ' + e.message);
        localStorage.setItem('uaf_data', hex);
    });
    
    localStorage.setItem('uaf_result', 'STREAM_CREATED');
    
} catch(e) {
    localStorage.setItem('uaf_result', 'CREATE_ERR: ' + e.message);
}

document.getElementById("s").textContent = "Done.";
</script>
</body>
</html>
