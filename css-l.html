<!doctype html>
<meta charset="utf-8">
<title>@import only control</title>
<style>
body {
  background: #111;
  color: #0f0;
  font-family: monospace;
  white-space: pre-wrap;
}
</style>
<pre id="log"></pre>
<script>
const logEl = document.getElementById("log");
function L(s) { logEl.textContent += s + "\n"; }

async function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function run() {
  L("[*] @import only control");

  const style = document.createElement("style");
  document.head.appendChild(style);
  const sheet = style.sheet;

  for (let i = 0; i < 3; i++) {
    L("[*] inserting @import at " + i);
    try {
      sheet.insertRule('@import url("data:text/css,body{}");', i);
      L("[+] import inserted; cssRules.length=" + sheet.cssRules.length);
    } catch (e) {
      L("[!] import threw: " + e.name + ": " + e.message);
      L("DONE import exception");
      return;
    }
  }

  document.body.offsetTop;
  getComputedStyle(document.body).color;

  L("[*] waiting 5000ms");
  await delay(5000);

  L("DONE import-only safe");
}

run().catch(e => L("[FATAL] " + e));
</script>
