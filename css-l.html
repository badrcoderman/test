<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StreamHijack Probe — Director</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
    background: #0c0c12;
    color: #c8c8d0;
    padding: 24px;
    line-height: 1.6;
  }
  h1 {
    color: #7ee787;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .sub {
    color: #555;
    font-size: 10px;
    margin-bottom: 20px;
  }
  #feed {
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 4px;
    height: 55vh;
    overflow-y: auto;
    padding: 14px;
    font-size: 11px;
  }
  .entry {
    padding: 3px 0;
    border-bottom: 1px solid #16161f;
    animation: in 0.15s ease;
  }
  .entry.PASS { color: #7ee787; }
  .entry.FAIL { color: #ff6b6b; }
  .entry.INFO { color: #74c0fc; }
  .entry.WARN { color: #ffa94d; }
  .ts {
    color: #444;
    font-size: 9px;
    margin-right: 8px;
  }
  .tag {
    color: #666;
    font-size: 9px;
    margin-right: 6px;
  }
  #ctrl {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    background: #1a1a24;
    color: #aaa;
    border: 1px solid #2a2a3e;
    padding: 8px 18px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  button:hover {
    border-color: #7ee787;
    color: #c8c8d0;
  }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #bar {
    margin-top: 14px;
    padding: 10px 14px;
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 3px;
    font-size: 10px;
    color: #555;
    display: flex;
    justify-content: space-between;
  }
  #bar.live { color: #7ee787; }
  #bar.dead { color: #ff6b6b; }
  @keyframes in {
    from { opacity:0; transform:translateX(-6px); }
    to { opacity:1; transform:translateX(0); }
  }
  .dump {
    margin-top: 14px;
    padding: 14px;
    background: #0a0a10;
    border: 1px solid #1e1e2e;
    border-radius: 3px;
    font-size: 10px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    display: none;
    color: #888;
  }
  .dump.on { display: block; }
</style>
</head>
<body>

<h1>► STREAMHIJACK_PROBE</h1>
<div class="sub">Iterator hijack diagnostic — TransformStream type confusion surface</div>

<div id="feed"></div>

<div id="ctrl">
  <button id="btn-go" onclick="probe.ignite()">IGNITE</button>
  <button onclick="probe.clear()">CLEAR</button>
  <button onclick="probe.dump()">DUMP LOGS</button>
  <button onclick="probe.export()">EXPORT JSON</button>
</div>

<div id="bar">Idle — waiting for Director</div>
<div id="dump" class="dump"></div>

<script>
const LS_KEY = 'hijack_probe_v1';
const LS_CRASH = 'hijack_probe_crash';

class Feed {
  constructor() {
    this.buf = [];
    this.el = document.getElementById('feed');
    this.bar = document.getElementById('bar');
    this.recover();
  }

  recover() {
    const raw = localStorage.getItem(LS_KEY);
    const crash = localStorage.getItem(LS_CRASH);
    if (crash || raw) {
      this.write('SYSTEM', 'Recovered from previous session', 'INFO');
      if (raw) {
        try {
          const prev = JSON.parse(raw);
          prev.forEach(e => this.render(e));
          this.buf = prev;
        } catch(e) {}
      }
      localStorage.removeItem(LS_CRASH);
    }
  }

  write(tag, msg, cls = 'INFO') {
    const e = { t: Date.now(), tag, msg, cls };
    this.buf.push(e);
    this.persist();
    this.render(e);
  }

  persist() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(this.buf));
    } catch(e) {
      this.buf = this.buf.slice(-400);
      localStorage.setItem(LS_KEY, JSON.stringify(this.buf));
    }
  }

  render(e) {
    const d = document.createElement('div');
    d.className = `entry ${e.cls}`;
    const time = new Date(e.t).toLocaleTimeString('en-US',{hour12:false});
    d.innerHTML = `<span class="ts">${time}</span><span class="tag">[${e.tag}]</span>${e.msg}`;
    this.el.appendChild(d);
    this.el.scrollTop = this.el.scrollHeight;
  }

  clear() {
    this.buf = [];
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(LS_CRASH);
    this.el.innerHTML = '';
    this.status('Cleared — fresh slate', '');
  }

  status(msg, cls) {
    this.bar.textContent = msg;
    this.bar.className = cls;
  }

  guard(fn, tag) {
    try {
      localStorage.setItem(LS_CRASH, '1');
      const r = fn();
      localStorage.removeItem(LS_CRASH);
      return r;
    } catch(e) {
      this.write(tag, e.message || String(e), 'FAIL');
      this.status('CRASH — logs preserved', 'dead');
      throw e;
    }
  }

  snapshot() {
    return {
      t: Date.now(),
      ua: navigator.userAgent,
      plat: navigator.platform,
      vendor: navigator.vendor,
      lang: navigator.language,
      mem: performance?.memory ? {
        used: performance.memory.usedJSHeapSize,
        total: performance.memory.totalJSHeapSize
      } : null,
      buf: this.buf
    };
  }
}

class Probe {
  constructor() {
    this.feed = new Feed();
  }

  log(t, m, c) { this.feed.write(t, m, c); }
  status(m, c) { this.feed.status(m, c); }

  check(label, fn) {
    return this.feed.guard(() => {
      try {
        fn();
        this.log(label, 'did not throw — FAIL', 'FAIL');
      } catch (e) {
        if (e instanceof TypeError)
          this.log(label, 'threw TypeError — PASS', 'PASS');
        else
          this.log(label, `threw ${e} — FAIL`, 'FAIL');
      }
    }, label);
  }

  ignite() {
    document.getElementById('btn-go').disabled = true;
    this.status('Running — watch the feed', 'live');

    const orig = Array.prototype[Symbol.iterator];

    // Variant 1: plain object substitution
    Array.prototype[Symbol.iterator] = function() {
      const arr = this;
      let i = 0;
      return {
        next() {
          if (i >= arr.length) return { done: true };
          let val = arr[i];
          if (arr.length === 3 && i >= 1) val = { fake: true };
          i++;
          return { value: val, done: false };
        }
      };
    };
    this.check('v1_plain_object', () => new TransformStream());

    // Variant 2: object with heap pointer
    const buf = new ArrayBuffer(65536);
    Array.prototype[Symbol.iterator] = function() {
      const arr = this;
      let i = 0;
      return {
        next() {
          if (i >= arr.length) return { done: true };
          let val = arr[i];
          if (arr.length === 3 && i >= 1) val = { pad: 0, ptr: buf };
          i++;
          return { value: val, done: false };
        }
      };
    };
    this.check('v2_heap_pointer', () => new TransformStream());

    // Variant 3: truncated iterator
    Array.prototype[Symbol.iterator] = function() {
      return { next() { return { done: true }; } };
    };
    this.check('v3_truncated', () => new TransformStream());

    // Variant 4: custom — return Proxy at slot 2
    Array.prototype[Symbol.iterator] = function() {
      const arr = this;
      let i = 0;
      return {
        next() {
          if (i >= arr.length) return { done: true };
          let val = arr[i];
          if (arr.length === 3 && i === 2)
            val = new Proxy({}, {
              get(t, p) { return p === 'size' ? 0x1000 : t[p]; }
            });
          i++;
          return { value: val, done: false };
        }
      };
    };
    this.check('v4_proxy_slot2', () => new TransformStream());

    // Variant 5: custom — return function object at slot 2
    Array.prototype[Symbol.iterator] = function() {
      const arr = this;
      let i = 0;
      return {
        next() {
          if (i >= arr.length) return { done: true };
          let val = arr[i];
          if (arr.length === 3 && i === 2)
            val = function() { return 1; };
          i++;
          return { value: val, done: false };
        }
      };
    };
    this.check('v5_function_slot2', () => new TransformStream());

    Array.prototype[Symbol.iterator] = orig;

    setTimeout(() => {
      this.status('Complete — check the feed', '');
      document.getElementById('btn-go').disabled = false;
    }, 800);
  }

  clear() { this.feed.clear(); }

  dump() {
    const box = document.getElementById('dump');
    const snap = this.feed.snapshot();
    box.textContent = JSON.stringify(snap, null, 2);
    box.classList.toggle('on');
  }

  export() {
    const snap = this.feed.snapshot();
    const blob = new Blob([JSON.stringify(snap, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hijack_probe_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    this.log('SYSTEM', 'Exported to disk', 'PASS');
  }
}

const probe = new Probe();
probe.log('SYSTEM', 'Probe loaded — five variants ready', 'INFO');
</script>

</body>
</html>
