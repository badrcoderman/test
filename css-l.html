<!doctype html>
<meta charset="utf-8">
<title>@namespace isolation diagnostic</title>
<style>
body {
  background: #111;
  color: #0f0;
  font-family: monospace;
  white-space: pre-wrap;
}
</style>
<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
const KEY = "namespace_isolation_last_checkpoint";

function L(s) {
  logEl.textContent += s + "\n";
  try { localStorage.setItem(KEY, s); } catch (_) {}
}

function forceStyle(label) {
  try {
    document.body.offsetTop;
    getComputedStyle(document.body).color;
    L("[+] forced style: " + label);
  } catch (e) {
    L("[!] force style failed: " + e.name + ": " + e.message);
  }
}

function makeStyle() {
  const style = document.createElement("style");
  document.head.appendChild(style);
  forceStyle("after append empty style");
  return style;
}

async function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function run() {
  /*
    Change this mode manually:

    1 = namespace only, no remove
    2 = namespace only, then remove
    3 = namespace + style rule, no remove
    4 = namespace + style rule, then remove
    5 = namespace + style rule, force style, remove, force style
  */
  const mode = 3;

  L("[*] @namespace isolation diagnostic");
  L("[*] previous checkpoint: " + (localStorage.getItem(KEY) || "(none)"));
  L("[*] mode=" + mode);

  const style = makeStyle();
  const sheet = style.sheet;

  L("[*] inserting @namespace at 0");
  try {
    sheet.insertRule('@namespace diag "http://example.com/ns";', 0);
    L("[+] namespace inserted; cssRules.length=" + sheet.cssRules.length);
  } catch (e) {
    L("[!] namespace insert threw: " + e.name + ": " + e.message);
    L("DONE");
    return;
  }

  if (mode >= 3) {
    L("[*] inserting style rule at 1");
    try {
      sheet.insertRule('body { outline-color: rgb(1, 2, 3); }', 1);
      L("[+] style rule inserted; cssRules.length=" + sheet.cssRules.length);
    } catch (e) {
      L("[!] style rule insert threw: " + e.name + ": " + e.message);
    }
  }

  if (mode === 3) {
    forceStyle("mode 3 after insert, no remove");
    L("[*] waiting 3000ms without removing style");
    await delay(3000);
    L("DONE no-remove");
    return;
  }

  if (mode === 1) {
    forceStyle("mode 1 namespace only, no remove");
    L("[*] waiting 3000ms without removing style");
    await delay(3000);
    L("DONE namespace-only no-remove");
    return;
  }

  if (mode === 5) {
    forceStyle("before remove");
  }

  if (mode === 2 || mode === 4 || mode === 5) {
    L("[*] removing style element");
    try {
      style.remove();
      L("[+] style.remove returned");
    } catch (e) {
      L("[!] style.remove threw: " + e.name + ": " + e.message);
    }
  }

  if (mode === 5) {
    forceStyle("after remove");
  }

  L("[*] waiting 3000ms after operation");
  await delay(3000);

  L("DONE");
}

run().catch(e => {
  L("[FATAL] " + (e && e.stack || e));
});
</script>
