<!doctype html>
<meta charset="utf-8">
<title>Checkpoint Viewer</title>
<style>
body {
  background: #111;
  color: #0f0;
  font-family: monospace;
  white-space: pre-wrap;
  padding: 12px;
}
button {
  background: #222;
  color: #0f0;
  border: 1px solid #0f0;
  padding: 8px;
  margin: 4px;
  font-family: monospace;
}
.box {
  border: 1px solid #0f0;
  padding: 8px;
  margin-top: 10px;
}
.bad {
  color: #ff5555;
}
.good {
  color: #55ff55;
}
.warn {
  color: #ffff55;
}
</style>

<h2>Checkpoint Viewer</h2>

<button onclick="refresh()">Refresh</button>
<button onclick="clearCheckpoints()">Clear checkpoint keys</button>

<div id="out" class="box"></div>

<script>
const out = document.getElementById("out");

const interestingPrefixes = [
  "import_namespace",
  "namespace_isolation",
  "namespace_insert",
  "cssfontface",
  "fontface",
  "checkpoint"
];

function line(s, cls = "") {
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = s;
  out.appendChild(div);
}

function isInterestingKey(k) {
  return interestingPrefixes.some(p => k.toLowerCase().includes(p));
}

function refresh() {
  out.textContent = "";

  line("[*] Checkpoint Viewer");
  line("[*] origin: " + location.origin);
  line("[*] time: " + new Date().toISOString());
  line("");

  const keys = [];
  for (let i = 0; i < localStorage.length; i++)
    keys.push(localStorage.key(i));

  const interesting = keys.filter(isInterestingKey).sort();

  if (!interesting.length) {
    line("[!] No diagnostic checkpoint keys found.", "warn");
    line("[!] Make sure this page is on the SAME origin as the crash page:", "warn");
    line("    same protocol + same domain + same port", "warn");
    return;
  }

  line("[+] Found diagnostic keys:", "good");
  line("");

  for (const k of interesting) {
    let v = "";
    try { v = localStorage.getItem(k); }
    catch (e) { v = "[read failed: " + e + "]"; }

    line(k + " = " + v);
  }

  line("");
  interpret();
}

function get(k) {
  try { return localStorage.getItem(k); }
  catch (_) { return null; }
}

function interpret() {
  const cp =
    get("import_namespace_checkpoint_v2") ||
    get("import_namespace_last_checkpoint") ||
    get("namespace_isolation_last_checkpoint") ||
    get("namespace_insert_diagnostic_last_checkpoint");

  if (!cp) {
    line("[?] No known primary checkpoint value found.", "warn");
    return;
  }

  line("=== Interpretation ===");

  if (cp.includes("CP-21")) {
    line("[!] Last checkpoint was BEFORE namespace insertRule.", "bad");
    line("[!] Strong signal: crash likely happens inside sheet.insertRule('@namespace...', index).", "bad");
  } else if (cp.includes("CP-22")) {
    line("[!] namespace insertRule returned, then crash happened later.", "warn");
    line("[!] Signal: delayed corruption / style update / cleanup after insert.");
  } else if (cp.includes("forceStyle")) {
    line("[!] Crash likely around forced style/layout flush.", "warn");
  } else if (cp.includes("CP-30") || cp.includes("CP-31")) {
    line("[!] Crash likely around style.remove() / stylesheet cleanup.", "warn");
  } else if (cp.includes("DONE")) {
    line("[+] Last run reached DONE. That mode did not reproduce crash.", "good");
  } else {
    line("[*] Last checkpoint: " + cp);
  }
}

function clearCheckpoints() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++)
    keys.push(localStorage.key(i));

  for (const k of keys) {
    if (isInterestingKey(k))
      localStorage.removeItem(k);
  }

  refresh();
}

refresh();
</script>
