<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CSSFontFace pre-load recalc isolate</title>
<style>
html {
    font-family: system-ui, -apple-system, sans-serif;
    background: #101010;
    color: #eee;
}
body {
    margin: 0;
    padding: 16px;
    line-height: 1.45;
}
.box {
    border: 1px solid #444;
    border-radius: 8px;
    padding: 12px;
    margin: 12px 0;
    background: #181818;
}
.warn {
    color: #ffd479;
}
#stage {
    font-size: 21px;
    font-weight: 700;
}
#probe {
    position: absolute;
    left: -10000px;
    top: -10000px;
}
#log, #previous {
    white-space: pre-wrap;
    word-break: break-word;
    background: #050505;
    color: #d7ffd7;
    padding: 12px;
    border-radius: 8px;
    min-height: 160px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
}
</style>
</head>
<body>
<h1>CSSFontFace pre-load recalc isolate</h1>
<div class="box warn">
Diagnostic-only. No heap spray, no exploit primitives, no shellcode, no ROP/JOP, no sandbox escape.
</div>
<div class="box">
    <div id="stage">Stage: not started</div>
    <div id="probe">AB</div>
</div>
<div class="box">
    <h3>Current log</h3>
    <pre id="log"></pre>
</div>
<div class="box">
    <h3>Previous persisted log</h3>
    <pre id="previous"></pre>
</div>
<script>
(function () {
    "use strict";
    const STORAGE_KEY = "cssfontface-preload-recalc-isolate-log";
    const stageElement = document.getElementById("stage");
    const logElement = document.getElementById("log");
    const previousElement = document.getElementById("previous");
    const probe = document.getElementById("probe");
    let seq = 0;
    let finished = false;
    let createdFaces = [];
    function now() {
        return new Date().toISOString();
    }
    function persist(line) {
        try {
            const old = localStorage.getItem(STORAGE_KEY) || "";
            localStorage.setItem(STORAGE_KEY, old + line + "\n");
        } catch (e) {
        }
    }
    function log(msg) {
        const line = "[" + (++seq) + "] " + now() + " :: " + msg;
        logElement.textContent += line + "\n";
        persist(line);
        try { console.log(line); } catch (e) {}
    }
    function stage(msg) {
        stageElement.textContent = "Stage: " + msg;
        log("STAGE => " + msg);
    }
    function finish() {
        if (finished)
            return;
        finished = true;
        log("NO CRASH OBSERVED");
        log("DONE");
    }
    function loadPrevious() {
        try {
            previousElement.textContent = localStorage.getItem(STORAGE_KEY) || "";
        } catch (e) {
            previousElement.textContent = "localStorage unavailable: " + e;
        }
    }
    window.onerror = function (message, source, lineno, colno, error) {
        log("window.onerror: " + message + " at " + lineno + ":" + colno);
        if (error && error.stack)
            log("stack: " + error.stack);
    };
    window.onunhandledrejection = function (event) {
        log("unhandledrejection: " + event.reason);
    };
    window.addEventListener("beforeunload", function () {
        log("beforeunload fired");
    });
    function cleanup() {
        try {
            const oldStyles = document.querySelectorAll("style[data-test-style='1']");
            for (const s of oldStyles)
                s.remove();
        } catch (e) {
            log("cleanup styles threw: " + e.name + ": " + e.message);
        }
        try {
            if (document.fonts) {
                for (const face of createdFaces)
                    document.fonts.delete(face);
            }
        } catch (e) {
            log("cleanup fonts threw: " + e.name + ": " + e.message);
        }
        createdFaces = [];
        probe.style.fontFamily = "";
        probe.textContent = "AB";
    }
    function cssRuleCount(styleElement) {
        try {
            if (!styleElement || !styleElement.sheet)
                return "no-sheet";
            return String(styleElement.sheet.cssRules.length);
        } catch (e) {
            return "throws:" + e.name;
        }
    }
    function makeCSSFace(family) {
        const style = document.createElement("style");
        style.setAttribute("data-test-style", "1");
        style.textContent =
            '@font-face {\n' +
            '    font-family: "' + family + '";\n' +
            '    src: local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New");\n' +
            '    unicode-range: U+0042;\n' +
            '}\n';
        document.head.appendChild(style);
        return style;
    }
    function makeJSFace(family) {
        const face = new FontFace(
            family,
            'local("Arial"), local("Helvetica"), local("Times New Roman"), local("Courier New")',
            { unicodeRange: "U+0041" }
        );
        createdFaces.push(face);
        return face;
    }
    function checkFonts(label, family) {
        stage(label + " document.fonts.check A");
        try {
            log(label + " A=" + document.fonts.check('16px "' + family + '"', "A"));
        } catch (e) {
            log(label + " A threw: " + e.name + ": " + e.message);
        }
        stage(label + " document.fonts.check B");
        try {
            log(label + " B=" + document.fonts.check('16px "' + family + '"', "B"));
        } catch (e) {
            log(label + " B threw: " + e.name + ": " + e.message);
        }
        stage(label + " document.fonts.check AB");
        try {
            log(label + " AB=" + document.fonts.check('16px "' + family + '"', "AB"));
        } catch (e) {
            log(label + " AB threw: " + e.name + ": " + e.message);
        }
    }
    function forceStyleRecalc(label) {
        stage(label + " forceStyleRecalc: body.offsetTop");
        try {
            log(label + " body.offsetTop=" + document.body.offsetTop);
        } catch (e) {
            log(label + " body.offsetTop threw: " + e.name + ": " + e.message);
        }
        stage(label + " forceStyleRecalc: probe.offsetWidth");
        try {
            log(label + " probe.offsetWidth=" + probe.offsetWidth);
        } catch (e) {
            log(label + " probe.offsetWidth threw: " + e.name + ": " + e.message);
        }
        stage(label + " forceStyleRecalc: getComputedStyle");
        try {
            log(label + " fontFamily=" + getComputedStyle(probe).fontFamily);
        } catch (e) {
            log(label + " getComputedStyle threw: " + e.name + ": " + e.message);
        }
    }
    async function run() {
        loadPrevious();
        try {
            localStorage.removeItem(STORAGE_KEY);
        } catch (e) {
        }
        stage("ready");
        log("POC STARTED: CSSFontFace pre-load recalc isolate");
        cleanup();
        if (!window.FontFace) {
            stage("FontFace API missing");
            log("FontFace API unavailable");
            finish();
            return;
        }
        if (!document.fonts) {
            stage("document.fonts missing");
            log("document.fonts unavailable");
            finish();
            return;
        }
        const family = "ps5-preload-recalc-" + Date.now();
        stage("create CSS @font-face");
        const styleElement = makeCSSFace(family);
        log("family=" + family);
        log("cssRules after CSS face=" + cssRuleCount(styleElement));
        stage("create JS FontFace same family");
        const jsFace = makeJSFace(family);
        log("jsFace.status initial=" + jsFace.status);
        stage("assign probe font-family");
        probe.style.fontFamily = '"' + family + '"';
        probe.textContent = "AB";
        log("probe assigned family and text AB");
        stage("add JS face to document.fonts");
        try {
            document.fonts.add(jsFace);
            log("document.fonts.add completed; size=" + document.fonts.size + ", status=" + jsFace.status);
        } catch (e) {
            log("document.fonts.add threw: " + e.name + ": " + e.message);
            finish();
            return;
        }
        checkFonts("before recalc", family);
        log("ABOUT TO FORCE STYLE RECALC");
        forceStyleRecalc("preload");
        stage("after forceStyleRecalc");
        log("after recalc cssRules=" + cssRuleCount(styleElement));
        log("after recalc jsFace.status=" + jsFace.status);
        log("after recalc document.fonts.size=" + document.fonts.size);
        checkFonts("after recalc", family);
        stage("complete");
        finish();
    }
    setTimeout(function () {
        run().catch(function (e) {
            log("TOP LEVEL ERROR: " + e.name + ": " + e.message);
            finish();
        });
    }, 500);
})();
</script>
</body>
</html>
